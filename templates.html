<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet Email Templates</title>
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B;
    --red:#E24B4A; --red-dark:#A32D2D; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --r-input:6px; --r-ctl:8px; --r-menu:10px; --r-card:12px; --r-pill:999px; --h-ctl:30px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font); background:var(--page); color:var(--ink); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px; margin:0 auto; padding:18px 16px 60px;}

  .header-bar{display:flex; align-items:center; gap:12px; background:var(--card); border:0.5px solid var(--line); border-radius:var(--r-card); padding:12px 16px; margin-bottom:16px; position:sticky; top:0; z-index:31;}
  .header-bar::after{content:""; position:absolute; left:0; right:0; top:calc(100% + 1px); height:20px; background:var(--page);}
  .editor-card{background:var(--card); border:0.5px solid var(--line); border-radius:var(--r-card); padding:14px 16px 16px; margin-bottom:16px;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-name{font-size:16px; font-weight:700; color:var(--green-dark); letter-spacing:0.02em;}
  .brand-logo{height:24px; width:auto; display:block; flex:0 0 auto;}
  .brand-div{width:1px; height:20px; background:var(--line-strong);}
  .brand-sub{font-size:13px; color:var(--ink-2);}
  .navlink{font-size:12.5px; font-weight:500; color:var(--ink); text-decoration:none; padding:5px 12px; border:0.5px solid var(--line); border-radius:var(--r-ctl); background:var(--card);}
  .navlink:hover{background:var(--green-tint); border-color:var(--green-border);}

  .modebar{display:inline-flex; gap:2px; background:var(--panel); border-radius:var(--r-pill); padding:3px; margin-bottom:14px;}
  .mode{font-size:12.5px; padding:6px 18px; border-radius:var(--r-pill); border:0; background:transparent; color:var(--ink-2); cursor:pointer; font-family:var(--font);}
  .mode.on{background:var(--green-tint); color:var(--green-darker); font-weight:500;}

  .cols{display:grid; grid-template-columns:180px 1fr; gap:20px;}
  .tlist-head{font-size:11px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:8px;}
  .tlist{display:flex; flex-direction:column; gap:1px;}
  .titem{font-size:13px; padding:7px 10px; border-radius:var(--r-ctl); color:var(--ink-2); cursor:pointer; border:0; background:transparent; text-align:left; font-family:var(--font); width:100%;}
  .titem:hover{background:var(--panel);}
  .titem.on{background:var(--green-tint); color:var(--green-darker); font-weight:500;}
  .side-right{border-right:0.5px solid var(--line); padding-right:16px;}

  .field-label{font-size:12px; color:var(--ink-2); margin-bottom:4px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  input[type=text], textarea, select{
    width:100%; font-family:var(--font); font-size:13px; color:var(--ink);
    border:1px solid var(--line-strong); border-radius:var(--r-input);
    background:var(--card); padding:8px 10px;
  }
  input[type=text], select{height:var(--h-ctl); padding:0 10px;}
  textarea{line-height:1.5; resize:vertical; min-height:120px;}
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 2px var(--green-tint);}
  .mb12{margin-bottom:12px;}

  .audience{font-size:12px; line-height:1.55; color:var(--ink-2); background:var(--green-tint-2); border:0.5px solid var(--green-border); border-radius:var(--r-ctl); padding:10px 12px; margin-bottom:14px;}
  .audience b{color:var(--green-darker); font-weight:600;}
  .ph-row{display:flex; align-items:center; gap:6px; margin-top:8px; flex-wrap:wrap;}
  .ph-lab{font-size:11px; color:var(--ink-3);}
  .ph{font-size:11px; font-family:ui-monospace,Menlo,Consolas,monospace; background:#E6F1FB; color:#0C447C; padding:2px 7px; border-radius:4px;}

  .btnrow{display:flex; gap:8px; margin-top:16px; align-items:center;}
  .btn{font-family:var(--font); font-size:13px; height:var(--h-ctl); padding:0 16px; border-radius:var(--r-ctl); border:0.5px solid var(--line-strong); background:var(--card); color:var(--ink); cursor:pointer;}
  .btn:hover{background:var(--panel);}
  .btn.primary{background:var(--green-dark); border-color:var(--green-dark); color:#fff; font-weight:500;}
  .btn.primary:hover{background:var(--green-darker);}
  .btn:disabled{opacity:0.5; cursor:default;}
  .hint{font-size:12px; color:var(--ink-3);}

  .preview-wrap{background:var(--card); border:0.5px solid var(--line); border-radius:var(--r-card); padding:14px 16px 16px; margin-bottom:16px;}
  .preview-head{font-size:12px; color:var(--ink-2); margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  .locknote{display:flex; align-items:center; gap:6px; margin-top:10px; color:var(--ink-3); font-size:11px;}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:13px; padding:10px 18px; border-radius:var(--r-ctl); opacity:0; pointer-events:none; transition:opacity .2s; z-index:300;}
  .toast.show{opacity:1;}
  .toast.err{background:var(--red-dark);}

  .lookup{position:relative;}
  .lookup-drop{position:absolute; z-index:50; top:calc(100% + 2px); left:0; right:0; background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-menu); box-shadow:0 8px 30px rgba(0,0,0,0.12); max-height:200px; overflow-y:auto; display:none;}
  .lookup-drop.show{display:block;}
  .lookup-opt{padding:7px 10px; font-size:12.5px; cursor:pointer; border-bottom:0.5px solid var(--line);}
  .lookup-opt:last-child{border-bottom:0;}
  .lookup-opt:hover{background:var(--green-tint);}
  .lookup-opt .em{color:var(--ink-2); font-size:11px;}

  .lock{position:fixed; inset:0; background:var(--page); z-index:500; display:flex; align-items:center; justify-content:center;}
  .lock.hide{display:none;}
  .lock-card{background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-card); padding:32px 34px; width:320px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.1);}
  .lock-brand{font-size:18px; font-weight:700; color:var(--green-dark); margin-bottom:6px;}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; height:36px; margin-bottom:10px;}
  .lock-btn{width:100%; height:36px; background:var(--green-dark); color:#fff; border:0; border-radius:var(--r-ctl); font-size:14px; cursor:pointer;}
  .lock-err{color:var(--red-dark); font-size:12px; margin-top:8px;}

  .empty-state{padding:40px 20px; text-align:center; color:var(--ink-3);}
  .spinner{display:inline-block; width:14px; height:14px; border:2px solid var(--line-strong); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin-right:8px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-card">
    <div class="lock-brand">WASTENET</div>
    <div class="lock-sub">Enter the access code to continue.</div>
    <input class="lock-in" id="lockIn" type="password" placeholder="Access code" autofocus>
    <button class="lock-btn" id="lockBtn">Unlock</button>
    <div class="lock-err" id="lockErr" style="display:none;"></div>
  </div>
</div>

<div class="wrap">
  <div class="header-bar">
    <div class="brand">
      <img class="brand-logo" src="wastenet-logo.png?v=2026-07-15" alt="WasteNet">
      <div data-wn-nav data-label="Email Templates"></div>
    </div>
  </div>

  <div class="editor-card">
    <div class="modebar">
      <button class="mode on" id="modeTpl">Saved template</button>
      <button class="mode" id="modeBlank">Blank email</button>
    </div>

    <div id="body">
      <div class="empty-state"><span class="spinner"></span>Loading templates&hellip;</div>
    </div>
  </div>

  <div id="previewHost"></div>
</div>

<div class="toast" id="toast"></div>

<script src="logic.js?v=2026-07-15-icons"></script>
<script>
var API = "https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec";

var KEY = (function(){ try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; } catch(e){ return ""; } })();

function lockOut(msg){
  try { sessionStorage.removeItem("wastenet_dashboard_key"); } catch(e){}
  KEY = "";
  var lock = document.getElementById("lock");
  var err  = document.getElementById("lockErr");
  if(lock) lock.classList.remove("hide");
  if(err){ if(msg){ err.textContent = msg; err.style.display = "block"; } else { err.style.display = "none"; } }
  var inp = document.getElementById("lockIn");
  if(inp){ inp.value = ""; inp.focus(); }
}

function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var s;
  var timeout = setTimeout(function(){ cleanup(); cb({ ok:false, error:"Request timed out." }); }, 30000);
  function cleanup(){ clearTimeout(timeout); try{ delete window[name]; }catch(e){ window[name] = undefined; } if(s && s.parentNode) s.parentNode.removeChild(s); }
  window[name] = function(data){ cleanup(); if(data && data.authRequired){ lockOut("That access code was not accepted. Please try again."); return; } cb(data); };
  var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }).join("&");
  s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

var state = {
  mode: "template",
  templates: {},        // pill -> {subjectTemplate, bodyTemplate, toRole, ccRole}
  order: [],            // pill labels in display order
  current: null,        // selected pill
  loaded: false,
  contacts: [],         // flattened [{email,label}] for blank-mode lookup
  contactsLoaded: false
};

var PLACEHOLDER_TEMPLATES = { "Notice": 1, "Batch": 1 };

/* ============================================================
   THE EMAIL RENDERER - copied VERBATIM from messages.html, which
   is the flow that actually sends these. There must be exactly one
   renderer; a second, guessed-at copy would preview an email that
   is not the one that goes out. If messages.html changes, this
   block must be updated to match. Shared pieces: esc, fillHtml,
   boldLiteralSites, LOGO, DISCLAIMER, emailShell, confirmButton,
   htmlVals.
   ============================================================ */
function fillHtml(text, vals){
  var out = esc(String(text || ""));
  Object.keys(vals).forEach(function(k){
    out = out.split("[" + k + "]").join(vals[k]);
  });
  out = boldLiteralSites(out);
  return out.replace(/\n/g, "<br>");
}

function boldLiteralSites(html){
  var lines = html.split("\n");
  var out = [], arming = false;
  for(var i = 0; i < lines.length; i++){
    var raw = lines[i];
    var flat = raw.trim();
    if(arming && flat === ""){ arming = false; out.push(raw); continue; }
    if(arming && flat && flat.indexOf("<") === -1){
      out.push('<span style="color:#3B6D11;font-weight:bold;">\u2022 ' + flat + '</span>');
      continue;
    }
    out.push(raw);
    if(/compactor/i.test(flat) && /:\s*$/.test(flat)) arming = true;
  }
  return out.join("\n");
}

var LOGO = "https://dashboard.wastenetinc.com/WastenetLogo.png";
var DISCLAIMER =
  "This email and any files transmitted with it are confidential and intended solely for the " +
  "use of the individual or entity to whom they are addressed. If you have received this email " +
  "in error, please notify the system manager. This message contains confidential information " +
  "and is intended only for the individual named. If you are not the named addressee, you should " +
  "not disseminate, distribute, or copy this email. Please notify the sender immediately by email " +
  "if you have received this email by mistake and delete this email from your system. If you are " +
  "not the intended recipient, you are notified that disclosing, copying, distributing, or taking " +
  "any action in reliance on the contents of this information is strictly prohibited.";

function emailShell(innerHtml){
  return '' +
  '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#FAFBF8;padding:24px 12px;">' +
    '<tr><td align="center">' +
      '<table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#FFFFFF;border:1px solid #E4E7E0;border-radius:8px;">' +
        '<tr><td style="padding:26px 30px 22px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.65;color:#1A1D1A;">' +
          innerHtml +
        '</td></tr>' +
        '<tr><td style="padding:0 30px 22px;">' +
          '<img src="' + LOGO + '" alt="WasteNet" width="150" style="display:block;border:0;">' +
        '</td></tr>' +
        '<tr><td style="padding:16px 30px 22px;border-top:1px solid #E4E7E0;font-family:Arial,Helvetica,sans-serif;">' +
          '<div style="font-size:11px;font-weight:bold;color:#525A60;margin-bottom:5px;">Wasteflo, Inc. d.b.a. WasteNet</div>' +
          '<div style="font-size:10px;line-height:1.5;color:#8A8F8A;font-style:italic;">' + DISCLAIMER + '</div>' +
        '</td></tr>' +
      '</table>' +
    '</td></tr>' +
  '</table>';
}

function confirmButton(link){
  return '<table cellpadding="0" cellspacing="0" border="0" style="margin:22px 0 6px;">' +
    '<tr><td style="background:#5CAA16;border-radius:6px;">' +
      '<a href="' + esc(link) + '" style="display:inline-block;padding:13px 26px;' +
      'font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:bold;' +
      'color:#FFFFFF;text-decoration:none;">Confirm Service Scheduled</a>' +
    '</td></tr></table>';
}

function htmlVals(dateLong, boxLines, link){
  var list = boxLines.map(function(l){
    return '<span style="color:#3B6D11;font-weight:bold;">\u2022 ' + esc(l) + '</span>';
  }).join("<br>");
  return {
    "pickup date": '<span style="color:#3B6D11;font-weight:bold;">' + esc(dateLong) + '</span>',
    "box list": list,
    "service description": list,
    "box description": list,
    "confirm link": link ? confirmButton(link) : ""
  };
}

/* Render a template body for PREVIEW. Placeholders are filled with clearly
   labelled SAMPLE values so the preview shows what a recipient sees - green
   date, green bulleted site - rather than raw [tokens]. The sample values are
   never saved; only the raw template text is. */
function sampleVals(){
  return htmlVals(
    "Friday, July 18, 2026",
    ["Houston Zoo (TRASH) - 1513 Cambridge St - Houston, TX 77030"],
    ""
  );
}
function previewInner(subject, body){
  return fillHtml(body, sampleVals());
}

function toast(msg, isErr){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(function(){ t.className = "toast" + (isErr ? " err" : ""); }, 2600);
}

/* ---------- placeholders ---------- */
/* Who each template actually goes to, stated as the FACT it is - read from
   how the schedule/notify flow routes, not from a stored setting that could
   disagree with it. This replaces the old To/Cc role selectors, which were a
   second source of truth that drifted wrong (a customer notice mislabelled
   as going to the hauler). The audience is decided by the KIND of email and
   resolved per box; it is not a per-template choice. */
function audienceNote(pill){
  var p = String(pill || "").toLowerCase();
  var who = "";
  if(p === "notice"){
    who = "This goes to the <b>customer</b> (the site contact), so they unlock the gate and expect the truck. " +
          "One email per customer per date. Recipients are resolved per box &mdash; you edit the wording here, not the address.";
  } else if(p === "batch"){
    who = "This goes to the <b>hauler</b> as a service request, and only when several boxes share one hauler and date. " +
          "A <b>single-box</b> request uses that box\'s own wording from the Service Email Content tab, not this template. " +
          "Recipients are resolved per box &mdash; you edit the wording here, not the address.";
  } else {
    who = "This template is <b>not sent automatically</b> by the schedule or notify flow. " +
          "You can edit and preview it here, and send it as a one-off from <b>Blank email</b> (choose it as a starting point).";
  }
  return '<div class="audience">' + who + '</div>';
}

function placeholdersFor(pill){
  if(pill === "Notice") return ["[pickup date]", "[box description]"];
  if(pill === "Batch")  return ["[pickup date]", "[service description]"];
  return [];
}

/* ---------- render: template mode ---------- */
function renderTemplateMode(){
  var listHtml = state.order.map(function(pill){
    return '<button class="titem' + (state.current === pill ? " on" : "") + '" data-pill="' + esc(pill) + '">' + esc(pill) + '</button>';
  }).join("");

  var t = state.templates[state.current] || { subjectTemplate:"", bodyTemplate:"", toRole:"Hauler", ccRole:"" };
  var phs = placeholdersFor(state.current);
  var phHtml = phs.length
    ? '<div class="ph-row"><span class="ph-lab">Placeholders:</span>' +
        phs.map(function(p){ return '<span class="ph">' + esc(p) + '</span>'; }).join("") +
        '<span class="ph-lab">&mdash; keep these; they fill in automatically</span></div>'
    : "";

  var editor =
    audienceNote(state.current) +
    '<div class="field-label">Subject</div>' +
    '<input type="text" id="subj" class="mb12" value="' + esc(t.subjectTemplate) + '">' +
    '<div class="field-label">Body</div>' +
    '<textarea id="bodytext" style="height:150px;">' + esc(t.bodyTemplate) + '</textarea>' +
    phHtml +
    '<div class="btnrow">' +
      '<button class="btn primary" id="saveBtn">Save template</button>' +
      '<span class="hint" style="margin-left:auto;">Saved changes go live immediately</span>' +
    '</div>';

  document.getElementById("body").innerHTML =
    '<div class="cols">' +
      '<div class="side-right"><div class="tlist-head">Templates</div><div class="tlist">' + listHtml + '</div></div>' +
      '<div>' + editor + '</div>' +
    '</div>';
  document.getElementById("previewHost").innerHTML = previewBlock();

  wireTemplateMode();
  refreshPreview();
}

function previewBlock(){
  return '<div class="preview-wrap">' +
    '<div class="preview-head"><span>Preview &mdash; exactly what goes out</span></div>' +
    '<div id="preview"></div>' +
    '<div class="locknote">The logo and disclaimer are added automatically and can\'t be edited.</div>' +
  '</div>';
}

function refreshPreview(){
  var subj = (document.getElementById("subj") || {}).value || "";
  var bodyEl = document.getElementById("bodytext");
  var body = bodyEl ? bodyEl.value : "";
  var host = document.getElementById("preview");
  if(!host) return;
  var subjLine = '<div style="font-size:12px;color:#8A8F8A;padding:0 0 8px;">Subject: <b style="color:#1A1D1A;">' + fillHtml(subj, sampleVals()) + '</b></div>';
  var sampleNote = (state.mode === "template" && (subj.indexOf("[") !== -1 || body.indexOf("[") !== -1))
    ? '<div style="font-size:11px;color:#8A8F8A;padding:0 0 8px;">Placeholders shown with sample values &mdash; the real date and site(s) fill in per box when this sends.</div>'
    : "";
  host.innerHTML = subjLine + sampleNote + emailShell(previewInner(subj, body));
}

function wireTemplateMode(){
  document.querySelectorAll(".titem").forEach(function(el){
    el.onclick = function(){ state.current = el.getAttribute("data-pill"); renderTemplateMode(); };
  });
  var subj = document.getElementById("subj");
  var bt = document.getElementById("bodytext");
  if(subj) subj.oninput = refreshPreview;
  if(bt) bt.oninput = refreshPreview;

  var save = document.getElementById("saveBtn");
  if(save) save.onclick = function(){
    var pill = state.current;
    var subject = document.getElementById("subj").value;
    var body = document.getElementById("bodytext").value;
    save.disabled = true; save.textContent = "Saving…";
    jsonp({ action:"save_template", key:KEY, pill:pill, subject:subject, body:body }, function(data){
      save.disabled = false; save.textContent = "Save template";
      if(data && data.ok){
        state.templates[pill] = { subjectTemplate:subject, bodyTemplate:body };
        toast("Saved. Live now.");
      } else {
        toast((data && data.error) || "Could not save.", true);
      }
    });
  };
}

/* ---------- render: blank mode ---------- */
function renderBlankMode(){
  var tplOpts = '<option value="">Start from scratch</option>' +
    state.order.map(function(pill){
      return '<option value="' + esc(pill) + '">' + esc(pill) + '</option>';
    }).join("");

  var editor =
    '<div class="field-label">Start from a template <span style="color:var(--ink-3);font-weight:400;">(optional)</span></div>' +
    '<select id="tplPick" class="mb12">' + tplOpts + '</select>' +
    '<div class="field-label">To</div>' +
    '<div class="lookup mb12"><input type="text" id="toAddr" placeholder="name@example.com"><div class="lookup-drop" id="toDrop"></div></div>' +
    '<div class="row2">' +
      '<div class="lookup"><div class="field-label">Cc</div><input type="text" id="ccAddr" placeholder="Optional"><div class="lookup-drop" id="ccDrop"></div></div>' +
      '<div class="lookup"><div class="field-label">Bcc</div><input type="text" id="bccAddr" placeholder="Optional"><div class="lookup-drop" id="bccDrop"></div></div>' +
    '</div>' +
    '<div class="field-label">Subject</div>' +
    '<input type="text" id="subj" class="mb12" placeholder="Subject line">' +
    '<div class="field-label">Body</div>' +
    '<textarea id="bodytext" style="height:150px;" placeholder="Type your message"></textarea>' +
    '<div class="btnrow">' +
      '<button class="btn primary" id="sendBtn">Send</button>' +
      '<span class="hint" style="margin-left:auto;">Sends with the WasteNet footer &middot; copied to office@ for the record</span>' +
    '</div>';

  document.getElementById("body").innerHTML = '<div>' + editor + '</div>';
  document.getElementById("previewHost").innerHTML = previewBlock();
  wireBlankMode();
  refreshPreview();
}

function wireBlankMode(){
  var subj = document.getElementById("subj");
  var bt = document.getElementById("bodytext");
  if(subj) subj.oninput = refreshPreview;
  if(bt) bt.oninput = refreshPreview;

  /* Loading a template here is how the seven templates that no automated flow
     sends (Emptied, Missed, Repair, ...) actually get used: as a starting
     point for a one-off you address yourself. */
  var pick = document.getElementById("tplPick");
  if(pick) pick.onchange = function(){
    var t = state.templates[pick.value];
    if(!t) return;
    document.getElementById("subj").value = t.subjectTemplate || "";
    document.getElementById("bodytext").value = t.bodyTemplate || "";
    refreshPreview();
  };

  ["to","cc","bcc"].forEach(function(which){
    var inp = document.getElementById(which + "Addr");
    var drop = document.getElementById(which + "Drop");
    if(!inp || !drop) return;
    inp.oninput = function(){
      var q = inp.value.toLowerCase();
      var last = q.split(/[;,]/).pop().trim();
      if(last.length < 2 || !state.contacts.length){ drop.className = "lookup-drop"; return; }
      var hits = state.contacts.filter(function(c){
        return c.email.toLowerCase().indexOf(last) !== -1 || c.label.toLowerCase().indexOf(last) !== -1;
      }).slice(0, 8);
      if(!hits.length){ drop.className = "lookup-drop"; return; }
      drop.innerHTML = hits.map(function(c){
        return '<div class="lookup-opt" data-email="' + esc(c.email) + '"><b>' + esc(c.email) + '</b> <span class="em">' + esc(c.label) + '</span></div>';
      }).join("");
      drop.className = "lookup-drop show";
      drop.querySelectorAll(".lookup-opt").forEach(function(opt){
        opt.onclick = function(){
          var parts = inp.value.split(/[;,]/); parts.pop();
          parts.push(" " + opt.getAttribute("data-email"));
          inp.value = parts.join(",").replace(/^,\s*/, "").trim();
          drop.className = "lookup-drop";
          inp.focus();
        };
      });
    };
    inp.onblur = function(){ setTimeout(function(){ drop.className = "lookup-drop"; }, 150); };
  });

  var send = document.getElementById("sendBtn");
  if(send) send.onclick = function(){
    var to = document.getElementById("toAddr").value.trim();
    var cc = document.getElementById("ccAddr").value.trim();
    var bcc = document.getElementById("bccAddr").value.trim();
    /* Every WasteNet email is archived by BCC to office@ - the schedule and
       notify flows already do this, and a one-off must not be the exception,
       or it vanishes with no record. Appended, so a user cannot forget it and
       cannot remove it. */
    var OFFICE_BCC = "office@wastenetinc.com";
    if(bcc.toLowerCase().indexOf(OFFICE_BCC) === -1){
      bcc = bcc ? (bcc + ", " + OFFICE_BCC) : OFFICE_BCC;
    }
    var subject = document.getElementById("subj").value.trim();
    var body = document.getElementById("bodytext").value;
    if(!to){ toast("Add at least one To address.", true); return; }
    if(!subject){ toast("Add a subject.", true); return; }
    if(!body.trim()){ toast("The body is empty.", true); return; }
    /* A blank email has no placeholders to fill, so render its body straight
       through the same shell with an empty value set. */
    var html = emailShell(fillHtml(body, htmlVals("", [], "")));
    send.disabled = true; send.textContent = "Sending…";
    jsonp({ action:"send_email", key:KEY, to:to, cc:cc, bcc:bcc, subject:subject, body:body, html:html }, function(data){
      send.disabled = false; send.textContent = "Send";
      if(data && data.ok){ toast("Sent."); }
      else { toast((data && data.error) || "Could not send.", true); }
    });
  };
}

/* ---------- loaders ---------- */
function loadTemplates(){
  jsonp({ action:"email_templates", key:KEY }, function(data){
    if(!data || !data.ok){ document.getElementById("body").innerHTML = '<div class="empty-state">Could not load templates.</div>'; return; }
    state.templates = {};
    state.order = [];
    var t = data.templates || {};
    var preferred = ["Notice","Batch","Emptied","Missed","Premature","Problem","Repair","Usage","Weights"];
    preferred.forEach(function(p){ if(t[p]){ state.templates[p] = t[p]; state.order.push(p); } });
    Object.keys(t).forEach(function(p){ if(state.order.indexOf(p) === -1){ state.templates[p] = t[p]; state.order.push(p); } });
    state.loaded = true;
    if(!state.current && state.order.length) state.current = state.order[0];
    if(state.mode === "template") renderTemplateMode();
  });
}

function loadContacts(){
  if(state.contactsLoaded) return;
  jsonp({ action:"master_contacts", key:KEY }, function(data){
    var seen = {};
    var out = [];
    var c = (data && data.contacts) || {};
    Object.keys(c).forEach(function(boxId){
      var row = c[boxId] || {};
      [["toRecipients","customer"],["ccRecipients","customer cc"],["serviceToRecipients","hauler"],["serviceCcRecipients","hauler cc"]].forEach(function(pair){
        String(row[pair[0]] || "").split(/[;,]/).forEach(function(addr){
          addr = addr.trim();
          if(addr && addr.indexOf("@") !== -1 && !seen[addr.toLowerCase()]){
            seen[addr.toLowerCase()] = 1;
            out.push({ email:addr, label:pair[1] });
          }
        });
      });
    });
    state.contacts = out;
    state.contactsLoaded = true;
  });
}

/* ---------- mode switch ---------- */
function setMode(m){
  state.mode = m;
  document.getElementById("modeTpl").className = "mode" + (m==="template" ? " on" : "");
  document.getElementById("modeBlank").className = "mode" + (m==="blank" ? " on" : "");
  if(m === "template"){
    if(state.loaded) renderTemplateMode();
    else document.getElementById("body").innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading templates&hellip;</div>';
  } else {
    loadContacts();
    renderBlankMode();
  }
}

/* ---------- boot ---------- */
function boot(){
  document.getElementById("modeTpl").onclick = function(){ setMode("template"); };
  document.getElementById("modeBlank").onclick = function(){ setMode("blank"); };
  loadTemplates();
}

(function(){
  var lockBtn = document.getElementById("lockBtn");
  var lockIn = document.getElementById("lockIn");
  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    document.getElementById("lock").classList.add("hide");
    boot();
  }
  if(lockBtn) lockBtn.onclick = unlock;
  if(lockIn) lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){ document.getElementById("lock").classList.add("hide"); boot(); }
})();
</script>
