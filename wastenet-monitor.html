  return d < today;
}

/* ---------- interactions ---------- */
function wireRows(){
  var listEl = document.getElementById("list");
  // date pill switching
  listEl.querySelectorAll(".date-pill").forEach(function(p){
    p.addEventListener("click", function(e){
      e.stopPropagation();
      state.dateSel[p.getAttribute("data-haul")] = p.getAttribute("data-date");
      render();
    });
  });
  // row expand (accordion — one open at a time)
  listEl.querySelectorAll(".row").forEach(function(rw){
    rw.addEventListener("click", function(){
      var id = rw.getAttribute("data-id");
      state.openId = (state.openId===id) ? null : id;
      state.notesOpenId = null; // collapsing/switching a box resets its notes toggle
      render();
    });
  });
  // WN Staff Notes (i) toggle inside an open detail panel. stopPropagation
  // so clicking it doesn't bubble to the row handler above and collapse
  // the whole box.
  listEl.querySelectorAll(".notes-toggle").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();
      var id = bt.getAttribute("data-notes");
      state.notesOpenId = (state.notesOpenId===id) ? null : id;
      render();
    });
  });
}

/* ---------- data load ---------- */
function setBanner(msg, kind){
  var b = document.getElementById("banner");
  if(!msg){ b.className="banner"; b.innerHTML=""; return; }
  b.className = "banner show "+(kind||"info");
  b.innerHTML = msg;
}

function load(){
  document.getElementById("scanInfo").textContent = "Loading…";
  document.getElementById("list").innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading the latest scan…</div>';
  setBanner("");
  loadScan("latest");
  fetchTabList();
  fetchSetSchedule();
}

// Fetch each box's Column K "Set Schedule" value live from the Master Box
// List (via the days_cycles endpoint's `s` field) so hands-off boxes can be
// forced into No Action. Reads live, so a Column K edit reflects on next
// load with no scan. Failure is non-fatal: the map stays empty and every
// box just buckets normally (same as before this feature).
function fetchSetSchedule(){
  jsonp({ action:"days_cycles", key:KEY }, function(data){
    if(data && data.ok && data.map){
      var m = {};      // Column K "Set Schedule" (field s) → hands-off matching
      var rules = {};  // Scheduling Rule (field r) → suggested pickup date
      var notes = {};  // WN Staff Notes (field n) → detail-panel (i) reveal
      var notesUpd = {}; // Notes Updated (field nu) → shown with the notes
      Object.keys(data.map).forEach(function(id){
        var entry = data.map[id];
        var nid = normBoxId(id);
        var s = entry && entry.s;
        if(s) m[nid] = s;
        var r = entry && entry.r;
        if(r) rules[nid] = String(r).trim();
        var n = entry && entry.n;
        if(n) notes[nid] = String(n);
        var nu = entry && entry.nu;
        if(nu) notesUpd[nid] = String(nu);
      });
      state.setSchedById = m;
      state.schedRuleById = rules;
      state.staffNotesById = notes;
      state.staffNotesUpdById = notesUpd;
      render(); // re-classify + re-render now that K/rule/notes are known
    }
  });
}

// Load either the latest scan (action='latest') or a specific dated tab.
function loadScan(which){
  var params = (which==="latest") ? { action:"latest", key:KEY } : { action:"tab", name:which, key:KEY };
  document.getElementById("list").innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading scan…</div>';
  jsonp(params, function(data){
    if(!data || !data.ok){
      var msg = (data && data.authRequired) ? "Access code was rejected by the server." : (data && data.error) || "Could not load the scan.";
      setBanner(msg, "err");
      document.getElementById("scanInfo").textContent = "Couldn't load";
      document.getElementById("list").innerHTML = '<div class="empty-state"><div class="big">Couldn\'t load the scan</div>'+esc(msg)+'</div>';
      return;
    }
    state.scanTitle = data.scanTitle || data.sheetName || "";
    state.currentTab = data.sheetName || (which==="latest"?null:which);
    state.rows = (data.rows||[]).map(modelOf).filter(function(b){ return b.id; });
    // Determine if this is the latest tab (first in the tab list, once we have it).
    state.isLatest = (which==="latest") || (state.tabs.length>0 && state.currentTab===state.tabs[0]);
    document.getElementById("scanInfo").textContent = formatScanMeta(state.scanTitle) || (state.currentTab||"");
    updateDateNav();
    updatePastBanner();
    render();
  });
}

// Fetch the list of available scan dates for the picker + prev/next.
function fetchTabList(){
  jsonp({ action:"list_tabs", key:KEY }, function(data){
    if(data && data.ok && data.tabs){
      state.tabs = data.tabs; // newest first
      // now that we know the ordering, re-confirm isLatest for the current view
      if(state.currentTab) state.isLatest = (state.currentTab === state.tabs[0]);
      updateDateNav();
      updatePastBanner();
    }
  });
}

// (Re)build the dropdown(s) of available scan dates - both the full
// header's and the slim bar's, since they share the same tab list.
function updateDateNav(){
  ["dateDrop","slimDateDrop"].forEach(function(dropId){
    var drop = document.getElementById(dropId);
    if(!drop) return;
    drop.innerHTML = state.tabs.map(function(t, i){
      var cur = (t===state.currentTab);
      return '<div class="date-opt'+(cur?' cur':'')+'" data-tab="'+esc(t)+'">'+esc(scanDateShort(t))+
             (i===0?'<span class="latest-pill">latest</span>':'')+'</div>';
    }).join("") || '<div class="date-opt">No past scans found</div>';
    drop.querySelectorAll(".date-opt[data-tab]").forEach(function(o){
      o.addEventListener("click", function(){
        state.dropOpen = false;
        var d1=document.getElementById("dateDrop"); if(d1) d1.classList.remove("show");
        var d2=document.getElementById("slimDateDrop"); if(d2) d2.classList.remove("show");
        state.openId = null;
        loadScan(o.getAttribute("data-tab"));
      });
    });
  });
}

// Short label for a tab name like "2026-07-06" -> "Mon 7-6-26".
function scanDateShort(tabName){
  var m = String(tabName).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return tabName;
  var y=+m[1], mo=+m[2], d=+m[3];
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var dow = days[new Date(y,mo-1,d).getDay()];
  var extra = tabName.replace(/^\d{4}-\d{2}-\d{2}\s*/,""); // keep any " (2)" suffix
  return dow+" "+mo+"-"+d+"-"+String(y).slice(2)+(extra?" "+extra:"");
}

// Show/hide the "viewing past scan" banner (with its own back-to-latest).
function updatePastBanner(){
  var showPast = !state.isLatest && state.currentTab;
  if(showPast){
    setBanner('<div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">'+
      '<span>Viewing a past scan — '+esc(scanDateShort(state.currentTab))+'. This is not today\'s live data.</span>'+
      '<button id="bannerLatest" style="font-size:11px; font-weight:600; color:#fff; background:var(--green); border:none; padding:5px 12px; border-radius:14px; cursor:pointer;">Back to latest</button>'+
      '</div>', "warn");
    var bl = document.getElementById("bannerLatest");
    if(bl) bl.addEventListener("click", function(){ state.openId=null; loadScan("latest"); });
  } else {
    setBanner("");
  }
}

/* ---------- boot ---------- */
document.getElementById("refreshBtn").addEventListener("click", load);

document.getElementById("dateLabel").addEventListener("click", function(e){
  e.stopPropagation();
  var drop = document.getElementById("dateDrop");
  state.dropOpen = !state.dropOpen;
  drop.classList.toggle("show", state.dropOpen);
});
// Slim-bar date label + refresh are recreated on every render, so wire
// them by delegation on the document rather than a one-time binding.
document.addEventListener("click", function(e){
  var lbl = e.target.closest ? e.target.closest("#slimDateLabel") : null;
  if(lbl){
    e.stopPropagation();
    var drop = document.getElementById("slimDateDrop");
    state.dropOpen = !state.dropOpen;
    if(drop) drop.classList.toggle("show", state.dropOpen);
    return;
  }
  var rb = e.target.closest ? e.target.closest("#slimRefreshBtn") : null;
  if(rb){ e.stopPropagation(); load(); }
});
// close dropdown on outside click
document.addEventListener("click", function(){
  if(state.dropOpen){
    state.dropOpen=false;
    var d=document.getElementById("dateDrop"); if(d) d.classList.remove("show");
    var s=document.getElementById("slimDateDrop"); if(s) s.classList.remove("show");
  }
});

// Reveal the fixed slim bar once the full top card has scrolled out of
// view. This is flicker-proof: the slim bar is a SEPARATE fixed element
// that fades in via opacity only - showing it never changes page layout,
// so it can't shift the scroll or feed back into the trigger (the bug
// that plagued the earlier single-resizing-card approach). We observe
// the full card; when it leaves the viewport, show the bar.
(function(){
  var full = document.getElementById("topcard");
  var slim = document.getElementById("slimbar");
  if(!full || !slim) return;
  if("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      // full card intersecting (any part visible) = hide slim bar.
      slim.classList.toggle("show", !entries[0].isIntersecting);
    }, { threshold:0 });
    io.observe(full);
  } else {
    var onScroll = function(){
      slim.classList.toggle("show", full.getBoundingClientRect().bottom <= 0);
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    onScroll();
  }
})();

load();
</script>
