function monAutoPick(){
  // When a bucket has no selection (fresh view / load, but NOT an explicit close),
  // open the first box so the pane is never empty. openId===false means "closed on purpose".
  if(state.openId!==null || state._autopick) return;
  var listEl=document.getElementById("list");
  var first=listEl && listEl.querySelector(".mon-rows .row");
  if(!first) return;
  state.openId=first.getAttribute("data-id");
  state._autopick=true; render(); state._autopick=false;
}

function detailHtml(b){
  var open = state.openId === b.id;
  var decisionClass = (b.need.indexOf("YES")!==-1) ? "yes" : "no";
  var decisionText = (b.need.indexOf("YES")!==-1) ? "Service needed" : (b.need==="N/A"?"Not scanned":"No service needed");
  var forced = b.need.indexOf("FORCED")!==-1;

  // stat tile with an icon accent (top-right). Fullness gets a battery that
  // fills to the percentage; the others get a simple monochrome glyph.
  var ICON_CAL = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M16 3v4M8 3v4M4 11h16"/></svg>';
  var ICON_CYC = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 0 0-14-4M4 5v4h4"/><path d="M4 13a8 8 0 0 0 14 4M20 19v-4h-4"/></svg>';
  var ICON_CLK = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg>';
  var battery = function(pct, trig){
    if(pct==null) return '<svg viewBox="0 0 24 16" width="26" height="17" fill="none" stroke="var(--ink-3)" stroke-width="1.5"><rect x="1.5" y="3" width="18" height="10" rx="2"/><rect x="20.5" y="6" width="2.2" height="4" rx="1" fill="var(--ink-3)" stroke="none"/></svg>';
    var p = Math.max(0, Math.min(100, pct));
    var w = (p/100)*15;
    var col = (trig!=null && pct>=trig) ? '#A32D2D' : (trig!=null && pct>=trig*0.75 ? '#BA7517' : '#639922');
    return '<svg viewBox="0 0 24 16" width="26" height="17" fill="none" stroke="var(--ink-3)" stroke-width="1.5">'+
      '<rect x="1.5" y="3" width="18" height="10" rx="2"/>'+
      '<rect x="20.5" y="6" width="2.2" height="4" rx="1" fill="var(--ink-3)" stroke="none"/>'+
      '<rect x="3" y="4.5" width="'+w.toFixed(1)+'" height="7" rx="1" fill="'+col+'" stroke="none"/>'+
    '</svg>';
  };
  var stat = function(k,v,u,icon){
    return '<div class="dstat">'+
      '<div class="dstat-top"><span class="k">'+k+'</span><span class="dicon">'+(icon||'')+'</span></div>'+
      '<div class="v">'+v+(u?'<span class="u"> '+u+'</span>':'')+'</div>'+
    '</div>';
  };

  var stats =
    '<div class="dstats">'+
      stat("Fullness", b.pct==null?"—":Math.round(b.pct)+"%", b.trig!=null?"/ trig "+Math.round(b.trig):"", battery(b.pct, b.trig))+
      stat("Days since empty", b.days==null?"—":b.days, b.daysTrig!=null?"of "+b.daysTrig:"", ICON_CAL)+
      stat("Cycles", b.cycles==null?"—":b.cycles, b.cyclesTrig!=null?"of "+b.cyclesTrig:"", ICON_CYC)+
      stat("Last cycle", b.lastCycle==null?"—":humanHours(b.lastCycle), "", ICON_CLK)+
    '</div>';

  var rows = "";
  rows += '<div class="drow"><span class="dk">Decision</span><span class="dv"><span class="decision '+decisionClass+'">'+decisionText+(forced?' (forced)':'')+'</span></span></div>';
  if(b.advTokens.length) rows += '<div class="drow"><span class="dk">Schedule</span><span class="dv">'+esc(b.advTokens.join(" · "))+'</span></div>';
  if(b.puDate) rows += '<div class="drow"><span class="dk">Pickup date</span><span class="dv">'+esc(fmtDate(b.puDate))+'</span></div>';
  if(b.datePullReq) rows += '<div class="drow"><span class="dk">Date pull req\'d</span><span class="dv">'+esc(fmtDate(b.datePullReq))+'</span></div>';
  // Suggested pickup date from the box's Scheduling Rule (days_cycles field r),
  // computed off today's date via the shared suggestedPickupFor(). Display-only
  // here — this same value will feed the email subject/body and notifications
  // once that tool is wired. Shown ONLY on the schedule-service page (gated),
  // and silently absent when there's no/unknown rule.
  var sug = onSchedulePage() ? suggestedPickupFor(b) : null;
  if(sug) rows += '<div class="drow"><span class="dk">Suggested pickup</span><span class="dv">'+
    '<span style="color:var(--green-dark); font-weight:600;">'+esc(sug.label)+'</span>'+
    '<span style="color:var(--ink-3); margin-left:7px;">per '+esc(sug.rule)+'</span></span></div>';
  if(b.notes) rows += '<div class="drow"><span class="dk">Notes</span><span class="dv">'+esc(b.notes)+'</span></div>';
  // WN Staff Notes from the daily Box Management pull,
  // behind an (i) toggle so the panel stays compact - troubleshooting
  // reference, not daily-glance. Only rendered when the box actually has
  // a staff note. The note text is monospace with preserved line breaks
  // (it often holds bracketed codes and multi-line entries), revealed
  // in place when notesOpenId matches this box.
  var staffNote = state.staffNotesById ? state.staffNotesById[b.id] : null;
  if(staffNote){
    // Tidy the CES text for display only (the stored note is untouched):
    // collapse any run of 2+ blank lines down to a single blank line, drop
    // trailing spaces on each line, and trim leading/trailing blank lines -
    // The CES field often contains big vertical gaps that would
    // otherwise make this block needlessly tall.
    staffNote = String(staffNote)
      .replace(/[ \t]+(\r?\n)/g, '$1')   // strip trailing spaces per line
      .replace(/(\r?\n){3,}/g, '\n\n')   // 2+ blank lines -> one blank line
      .replace(/^\s+|\s+$/g, '');        // trim leading/trailing whitespace
    var noteOpen = (state.notesOpenId === b.id);
    var nu = state.staffNotesUpdById ? state.staffNotesUpdById[b.id] : null;
    rows += '<div class="drow"><span class="dk">WN Staff Notes</span><span class="dv">'+
      '<button type="button" class="notes-toggle'+(noteOpen?' open':'')+'" data-notes="'+esc(b.id)+'" '+
      'aria-label="'+(noteOpen?'Hide':'Show')+' WN staff notes" '+
      'title="'+(noteOpen?'Hide':'Show')+' staff notes">&#8505;</button>'+
      (noteOpen ? '' : '<span style="color:var(--ink-3); margin-left:8px; font-size:12px;">click to view</span>')+
      (noteOpen ? '<div class="staff-note">'+esc(staffNote)+
        (nu ? '<div class="staff-note-upd">updated '+esc(nu)+'</div>' : '')+
      '</div>' : '')+
      '</span></div>';
  }
  rows += '<div class="drow"><span class="dk">Full name</span><span class="dv">'+esc(b.fullDesc)+'</span></div>';

  // "Draft an email" and "Move this box" now live as icons on the row itself
  // (envelope + move), so the detail panel no longer carries them.
  var draftRow = "";

  return '<div class="detail'+(open?' show':'')+'" data-detail="'+esc(b.id)+'">'+
    '<div class="detail-inner">'+
      stats + rows + draftRow +
    '</div>'+
  '</div>';
}

/* ---------- bucket classification ----------
   A box is a STALE SCAN when its ONLY reason for being flagged is that it
   stopped cycling (forced YES by the last-cycle threshold) AND it has no
   genuine actionable trigger — no valid fill reading at/over trigger, and
   not over its days/cycles triggers. A genuinely-full or genuinely-overdue
   box stays in ACTION NEEDED even if it's also stale (it gets a flag). */
function isStaleScan(b){
  var forcedStale = /YES\s*\(forced\)[\s\S]*Last Cycle/i.test(b.notes) ||
                    (b.lastCycle!=null && b.lastCycle >= 168 && b.pct==null);
  if(!forcedStale) return false;
  // A stale box's days/cycles-over-trigger is a SYMPTOM of not cycling, not
  // an independent reason to act — so those don't rescue it from the stale
  // bucket. Only a genuine FILL reading at/over trigger means it's really
  // full and belongs in Action Needed (flagged as also-stale).
  var fullOverTrigger = (b.pct!=null && b.trig!=null && b.pct >= b.trig);
  if(fullOverTrigger) return false;
  return true;
}
function alsoStale(b){ return (b.lastCycle!=null && b.lastCycle >= 168); }
// Only count a CES scheduled pickup as CURRENT if its date is recent. CES
// leaves old un-cleared pickup rows around (box 890 showed an Apr 2025 date),
// and a year-old pickup is not a live schedule. Keep any date from the scan
// day back through SCHEDULE_STALE_DAYS ago, plus any FUTURE date (a genuine
// upcoming pickup); anything older drops out of Scheduled and re-buckets by
// its reading. No-date / unparseable rows are left as-is (they aren't the
// stale-date problem). Compared against the SCAN's date (tab), not "now", so
// past scans classify correctly.
var SCHEDULE_STALE_DAYS = 7;
function scanRefDate(){
  var m = String(state.currentTab||state.scanTitle||"").match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  return new Date(); // fall back to now (e.g. latest before the tab name resolves)
}
// Days the scheduled pickup date sits from the scan (>0 past-due, <0 future).
function schedAgeDays(b){
  if(!b.scheduledDate) return null;
  var d = new Date(b.scheduledDate);
  if(isNaN(d.getTime())) return null;
  return (scanRefDate() - d) / 86400000;
}
// Did the box empty on/after its scheduled date - i.e. it WAS serviced since?
// Signals, best first: it just physically emptied (needsEmpty); its last empty
// (days-since-empty) is more recent than the scheduled date; or it reads clearly
// near-empty now. Any of these => the pickup happened, so it's not "missed".
function servicedSinceScheduled(b){
  if(b.needsEmpty) return true;
  var schedAgo = schedAgeDays(b);
  if(schedAgo == null) return false;
  if(b.days != null && b.days <= schedAgo + 0.5) return true;   // emptied more recently than the schedule
  if(b.pct != null && b.trig != null && b.pct < b.trig * 0.5) return true; // clearly empty now
  return false;
}
function isScheduled(b){
  if(b.scheduledPickup !== true) return false;
  if(!b.scheduledDate) return true;            // no date -> not the stale problem, leave as-is
  var d = new Date(b.scheduledDate);
  if(isNaN(d.getTime())) return true;          // unparseable -> leave as-is
  var ageDays = (scanRefDate() - d) / 86400000; // >0 = in the past
  if(ageDays > SCHEDULE_STALE_DAYS) return false;              // stale year-old row -> not scheduled
  if(ageDays > 0.5 && servicedSinceScheduled(b)) return false; // past-due but already serviced -> not scheduled
  return true;                                  // future + recent-past kept
}
// A scheduled box whose date has passed and was NOT serviced since = potential
// missed pickup (flagged for research, sorted to the top of the Scheduled list).
function isSchedOverdue(b){
  var a = schedAgeDays(b);
  return a != null && a > 0.5 && !servicedSinceScheduled(b);
}
// Monitor Down: the CES 75000 sentinel fired, so the fill reading can't be
// trusted. This is an EQUIPMENT-health state, not a fill state, so it takes
// precedence over every fill-based bucket - a dead monitor must never hide
// in No Action (or get force-buried by closed-day logic) behind a phantom %.
function isMonitorDown(b){ return b.monitorDown === true; }
// Needs Marking Empty: box just emptied, not recorded. Takes precedence over
// every service-oriented bucket - a just-emptied box needs recording, not a
// pickup. Ranks just below hands-off (which is "do nothing at all").
function isNeedsEmpty(b){ return b.needsEmpty === true; }
// HANDS-OFF: boxes nobody services, per standing instruction - they go to No
// Action no matter what the reading says. Keyed on the EXACT Column K text
// (case-insensitive, whitespace-collapsed - NOT a prefix), because other
// "Never Schedule -" notes exist where the box IS still watched, and
// those must keep behaving normally. Column K arrives via the days_cycles
// endpoint (the box's Set Schedule value), fetched live from Master Box List,
// so changing a box's status is a one-cell edit - no code, no scan.
var HANDS_OFF = {
  "never schedule - myrna handles direct": "myrna",
  "never schedule - box not monitoring": "notmon"
};
function handsOffKind(b){
  var v = state.setSchedById[b.id];
  if(!v) return null;
  var norm = String(v).trim().toLowerCase().replace(/\s+/g, " ");
  return HANDS_OFF[norm] || null; // "myrna" | "notmon" | null
}
function isHandsOff(b){ return handsOffKind(b) !== null; }
// Reason codes that may be stacked in front of the 75000 sentinel (why the
// monitor is dark). Kept in sync with the Percent Full code sheet; an
// unknown code still shows as "reason NN" rather than nothing.
var MONITOR_REASONS = {
  "44":"another source","45":"compactor repairs","46":"new compactor","47":"wash",
  "48":"damaged by hauler","49":"power source problem","54":"corp audit","55":"blocked",
  "56":"bridging/jamming","57":"consecutive days","58":"customer request","59":"gate locked",
  "64":"hot/contaminated","65":"hauler/landfill","66":"unknown","67":"predetermined schedule",
  "68":"stop service","69":"wrong compactor","78":"weather","84":"dry run","85":"leaking",
  "86":"unexpected usage","88":"monitor problem","89":"weight","94":"canceled service",
  "95":"other comp broken","96":"changed service date","97":"bugs/other"
};
function monitorReasonText(code){
  if(!code) return "";
  return MONITOR_REASONS[code] || ("reason "+code);
}
// Which bucket a box belongs to (for search-result tags). Hands-off first.
function bucketOf(b){
  if(b.need==="N/A") return "inactive";
  if(isHandsOff(b)) return "handsoff";
  if(isNeedsEmpty(b)) return "needsempty";
  if(isMonitorDown(b)) return "monitor";
  if(isScheduled(b)) return "scheduled";
  if(b.need.indexOf("YES")===-1) return "clear";
  return isStaleScan(b) ? "stale" : "action";
}

/* ---------- grouping & render ---------- */
function render(){
  var listEl = document.getElementById("list");

  // Precedence, highest first: hands-off (do nothing) > needs-marking-empty
  // (just emptied, record it - NOT service) > monitor down > scheduled >
  // action > stale > no action. Each is pulled from what the previous left.
  /* ---- a moved-in box leaves its old bucket FIRST ----------------------
     This has to happen before the precedence chain, not after it. The chain
     strips out hands-off, needs-empty and monitor-down boxes at the top, and
     the action list is built from what survives - so a MONITOR-DOWN box could
     never be moved in, however hard anyone clicked the button.

     Which is exactly the case that matters. A dead monitor does not mean a dead
     compactor. The site is still filling it, it still needs emptying, and the
     one thing standing between it and a pickup is a scanner that cannot see.
     Same for a stale scan. The person can see what the machine cannot, and this
     is where they get to say so.

     Pulling them out here (rather than adding them back later) also keeps each
     box in exactly ONE bucket, so the six scorecard numbers still reconcile to
     the scan total. */
  var forcedIn = state.rows.filter(function(b){ return movedIn(b); });
  var pool0 = state.rows.filter(function(b){ return !movedIn(b); });

  var handsOff = pool0.filter(isHandsOff);
  var afterHandsOff = pool0.filter(function(b){ return !isHandsOff(b); });
  var needsEmpty = afterHandsOff.filter(isNeedsEmpty);
  var pool = afterHandsOff.filter(function(b){ return !isNeedsEmpty(b); });
  var monitorDown = pool.filter(isMonitorDown);
  var notDown = pool.filter(function(b){ return !isMonitorDown(b); });
  /* ---- what counts as HANDLED ----------------------------------------
     Not "CES shows a scheduled pickup" on its own. A box is handled when the
     CUSTOMER HAS BEEN TOLD - scheduling it and never announcing it leaves a
     site with a truck arriving unannounced, and the box would have vanished
     off the list as though the job were done. So a box leaves the action list
     when CES says a pickup is scheduled OR when our own ledger says the notice
     went out for the date currently on the box.

     Which is why a portal box you have booked but not announced KEEPS SITTING
     THERE, showing Scheduled and Confirmed but not Notified. Visibly half
     finished, because it is. */
  var handled = function(b){ return isScheduled(b) || notifiedLit(b); };

  var scheduled = notDown.filter(handled);
  var allYes = notDown.filter(function(b){ return b.need.indexOf("YES")!==-1 && !handled(b); });
  var stale  = allYes.filter(isStaleScan);

  var action = allYes.filter(function(b){ return !isStaleScan(b); });

  /* ---- then the people overrule the machine ----
     Moved-in boxes join the list even though the scanner said no - from ANY
     bucket, including monitor-down and stale, which is the whole point.
     Dismissed boxes leave it even though the scanner said yes. Both stay
     visible, both carry a reason, and neither touches what the scanner
     actually reported. */
  action = action.concat(forcedIn);

  /* A DISMISSAL DOES NOT REDUCE THE COUNT. Eight boxes need service; three have
     been set aside by a person. The scorecard keeps saying eight, and the LIST
     shows five with "3 dismissed today - show" beneath it.

     If the count fell to five, somebody could dismiss their way to an empty
     dashboard and it would look like a clean morning. The work does not stop
     existing because one person decided not to look at it. */
  var dismissed = action.filter(dismissedNow);
  state.dismissedBoxes = dismissed;
  // Published so Draft all uses the SAME list the page is showing. Working it
  // out a second time in the click handler is how the button ends up drafting a
  // set of boxes that is not the set on screen.
  state.actionBoxes = action.filter(function(b){ return !dismissedNow(b); });
  /* !handled, not !isScheduled: a box whose customer has been notified now sits
     in Scheduled, and without this it would ALSO sit in No Action and the six
     buckets would stop summing to the scan total.
     !movedIn for the same reason - a moved-in box is on the action list now. */
  var clearNormal = notDown.filter(function(b){
    return b.need.indexOf("YES")===-1 && b.need!=="N/A" && !handled(b) && !movedIn(b);
  });
  // Inactive boxes (need==="N/A" - descriptions starting X/Y/Z, retired).
  // Previously these fell into NO bucket, so the six scorecard numbers
  // summed to less than the total. They now ride in No Action (behind an
  // "Inactive" sub-tab), which makes the six buckets reconcile exactly to
  // the scan total. Pulled from the same notDown pool as clearNormal.
  var inactive = notDown.filter(function(b){ return b.need==="N/A"; });
  var clearActive = clearNormal.concat(handsOff); // hands-off ride in No Action's Active tab
  var clear  = clearActive.concat(inactive);      // No Action = active + inactive combined
  var total  = state.rows.length;

  var counts = { action:action.length, needsempty:needsEmpty.length, monitor:monitorDown.length, scheduled:scheduled.length, stale:stale.length, clear:clear.length };
  var pct = function(n){ return total? (n/total*100).toFixed(1) : 0; };

  // ----- clickable scorecard: three grouped cards, number + label -----
  // Each half carries data-view (the existing bucket key) so all filtering
  // behavior is unchanged.
  var half = function(key, color, darkColor, tintBg, n, label){
    var on = state.view===key;
    /* The (i) is a sibling of the clickable area, not inside it - otherwise
       asking WHY a bucket has nine boxes in it would also switch you to that
       bucket, which is not what you asked for. */
    return '<div class="score-half'+(on?' on':'')+'"'+
      (on?' style="box-shadow:inset 0 -2px 0 0 '+color+';"':'')+'>'+
      '<button class="lg-i" data-logic="'+key+'" title="How is this worked out?" '+
        'aria-label="How is this worked out?">i</button>'+
      '<div class="score-hit" data-view="'+key+'">'+
        '<div class="score-half-n" style="color:'+(on?darkColor:color)+';">'+n+'</div>'+
        '<div class="score-half-l">'+label+'</div>'+
      '</div>'+
    '</div>';
  };
  var group = function(caption, inner){
    return '<div><div class="score-cap">'+caption+'</div>'+
      '<div class="score-btn">'+inner+'</div></div>';
  };
  // total + search now live in the top header card (headerTools slot)
  document.getElementById("headerTools").innerHTML =
    '<div class="search-box"><i class="search-ico">⌕</i>'+
    '<input type="text" id="searchInput" placeholder="Search boxes\u2026" value="'+esc(state.search)+'" autocomplete="off">'+
    (state.search ? '<button class="search-x" id="searchClose" aria-label="Clear search">\u00d7</button>' : '')+
    '</div>';
  var _rc = document.getElementById("railCount"); if(_rc) _rc.textContent = total;
  var summaryEl = document.getElementById("summary");
  summaryEl.className = "summary scorecard";
  summaryEl.innerHTML =
      '<div class="score-groups">'+
        group("needs action",
          half("action","#A32D2D","#A32D2D","#FCEBEB",counts.action,"schedule service")+
          half("needsempty","#0F8C86","#0F6E56","#E1F5EE",counts.needsempty,"record empty"))+
        group("equipment concerns",
          half("monitor","#5B6470","#444441","#F1EFE8",counts.monitor,"monitor down")+
          half("stale","#BA7517","#854F0B","#FAEEDA",counts.stale,"stale scans"))+
        group("informational",
          half("scheduled","#378ADD","#185FA5","#E6F1FB",counts.scheduled,"scheduled")+
          half("clear","#639922","#3B6D11","#EAF3DE",counts.clear,"no action"))+
      '</div>';

  (function(){
    var rt=document.getElementById("railTriage"); if(!rt) return;
    var bk=[['action','#A32D2D','Schedule service',counts.action],['scheduled','#378ADD','Scheduled',counts.scheduled],['monitor','#5B6470','Monitor down',counts.monitor],['needsempty','#0F8C86','Record empty',counts.needsempty],['stale','#BA7517','Stale scans',counts.stale],['clear','#639922','No action',counts.clear]];
    var h='<div class="wn-tri-h">Triage</div>';
    bk.forEach(function(x,i){ if(i===4) h+='<div class="wn-tri-h">Watch</div>'; var on=state.view===x[0];
      h+='<button type="button" class="wn-tri score-hit'+(on?' on':'')+'" data-view="'+x[0]+'"><span class="wn-tri-dot" style="background:'+x[1]+'"></span><span class="wn-tri-l">'+x[2]+'</span><span class="wn-tri-n">'+x[3]+'</span></button>'; });
    rt.innerHTML=h;
  })();
  // ----- slim bar (fixed, fades in on scroll): compact header + a
  // short-label scorecard. Independent copy of the same buttons (same
  // data-view keys, so clicks filter identically - wired in wireScorecard).
  // Built here on every render so counts/active-view stay in sync. -----
  var slimHalf = function(key, color, darkColor, n, shortLabel){
    var on = state.view===key;
    return '<div class="score-half'+(on?' on':'')+'" data-view="'+key+'"'+
      (on?' style="box-shadow:inset 0 -2px 0 0 '+color+';"':'')+'>'+
      '<div class="score-half-n" style="color:'+(on?darkColor:color)+';">'+n+'</div>'+
      '<div class="score-half-l">'+shortLabel+'</div>'+
    '</div>';
  };
  var slimGroup = function(inner){ return '<div><div class="score-btn">'+inner+'</div></div>'; };
  document.getElementById("slimbarInner").innerHTML =
    '<div class="header-bar">'+
      '<div class="brand">'+
        /* The slim bar is what you actually look at once you have scrolled, which
           is most of the time. Nav that disappears when you scroll is not nav -
           so the same shared menu rides along here too, filled after this builds.
           The logo stays out of the slim bar to keep the scrolled view compact. */
        '<div data-wn-nav data-label="Monitoring Dashboard"></div></div>'+
      '<div class="header-right">'+
        (state.searchOpen
          ? '<div class="search-box"><i class="search-ico">⌕</i><input type="text" id="slimSearchInput" placeholder="Search box #, site, hauler…" value="'+esc(state.search)+'" autocomplete="off"><button class="search-x" id="slimSearchClose" aria-label="Close search">×</button></div>'
          : '<span class="score-total">'+total+' total</span><button class="search-btn" id="slimSearchOpen" aria-label="Search boxes" title="Search boxes">⌕</button>')+
        '<div class="date-nav"><button class="date-label" id="slimDateLabel" title="Pick a scan date"><span>'+esc(document.getElementById("scanInfo") ? document.getElementById("scanInfo").textContent : "")+'</span> <span class="date-caret">▾</span></button>'+
        '<div class="date-drop" id="slimDateDrop"></div></div>'+
        '<button class="btn ghost icon-btn" id="slimRefreshBtn" aria-label="Refresh">↻</button>'+
      '</div>'+
    '</div>'+
    '<div class="score-groups">'+
      slimGroup(
        slimHalf("action","#A32D2D","#A32D2D",counts.action,"to service")+
        slimHalf("needsempty","#0F8C86","#0F6E56",counts.needsempty,"to empty"))+
      slimGroup(
        slimHalf("monitor","#5B6470","#444441",counts.monitor,"down")+
        slimHalf("stale","#BA7517","#854F0B",counts.stale,"stale"))+
      slimGroup(
        slimHalf("scheduled","#378ADD","#185FA5",counts.scheduled,"scheduled")+
        slimHalf("clear","#639922","#3B6D11",counts.clear,"no action"))+
    '</div>';
  // Slim bar is rebuilt on scroll; fill its nav mount from the shared source.
  if (typeof wnNavHtml === "function") {
    var slimMount = document.querySelector('#slimbarInner [data-wn-nav]');
    if (slimMount) slimMount.innerHTML = wnNavHtml(slimMount.getAttribute("data-label") || "");
  }

  var html = "";
  var q = state.search.trim().toLowerCase();

  // ----- SEARCH: flat list of matches across ALL boxes, each tagged with its bucket -----
  if(q){
    var matches = state.rows.filter(function(b){
      // Inactive (N/A) boxes ARE searchable - if a box is in the scan you
      // should be able to find it. They're tagged with their bucket in the
      // results (bucketOf handles N/A), so results still show what each is.
      return (("#"+b.id).indexOf(q)!==-1) ||
             (b.id.toLowerCase().indexOf(q)!==-1) ||
             (b.fullDesc.toLowerCase().indexOf(q)!==-1) ||
             (b.desc.toLowerCase().indexOf(q)!==-1) ||
             (b.haulCode.toLowerCase().indexOf(q)!==-1);
    });
    if(matches.length===0){
      html += '<div class="empty-state" style="padding:40px 20px;"><div class="big">No matches</div>Nothing matches “'+esc(state.search)+'”. Try a box number, site name, or hauler code.</div>';
    } else {
      html += '<div class="section-note">'+matches.length+' match'+(matches.length===1?'':'es')+' for “'+esc(state.search)+'” · across all boxes</div>';
      html += '<div class="plain-list">'+ matches.map(function(b){ return rowHtml(b, false, bucketOf(b)); }).join("") +'</div>';
    }
    listEl.innerHTML = monWrap(html);
    wireRows();
    wireScorecard();
    wireSearch();
    return;
  }

  if(state.view === "action"){
    if(action.length === 0){
      html += '<div class="empty-state" style="padding:40px 20px;"><div class="big">Nothing needs action</div>Every box is below trigger or already handled. Check stale scans for boxes that stopped cycling.</div>';
    } else {
      var groups = {};
      action.forEach(function(b){ var k=b.haulCode||"—"; (groups[k]=groups[k]||[]).push(b); });
      var keys = Object.keys(groups).sort(function(a,b){
        var d = groups[b].length - groups[a].length; return d!==0 ? d : a.localeCompare(b);
      });
      /* Batches first, each in its own card; the singletons then collect in one
         plain list beneath them. Two containers, because there are two kinds of
         thing here - a trip that covers several boxes, and a box on its own.
         (An earlier comment here claimed every hauler got a header including
         single-box ones. It never did - haulGroupHtml returns a bare row for a
         group of one. The comment was describing an intention, not the code.) */
      /* Draft all. Thirty boxes is thirty rows but only a dozen emails, because
         one hauler drives one trip and one contact reads one message. Clicking
         each row's pill thirty times to discover that is not a workflow. */
      var mailable = state.actionBoxes.filter(function(b){ return !!pickupYmdFor(b); });
      if(mailable.length){
        html += '<div class="draft-bar">' +
          '<button class="draft-all" id="draftAll">Draft all \u2197</button>' +
          '<span class="draft-hint">' + mailable.length +
            (mailable.length === 1 ? " box" : " boxes") +
            ' \u2014 opens every request and notice for review. Nothing sends until you say so.</span>' +
        '</div>';
      }

      var batchKeys  = keys.filter(function(k){ return groups[k].length > 1; });
      var singleKeys = keys.filter(function(k){ return groups[k].length === 1; });

      html += batchKeys.map(function(k){ return haulGroupHtml(k, groups[k]); }).join("");

      if(singleKeys.length){
        html += '<div class="plain-list">' +
          singleKeys.map(function(k){ return haulGroupHtml(k, groups[k]); }).join("") +
        '</div>';
      }

      /* A dismissed box vanishes from the list. Without this it would be gone
         with no way back until tomorrow, and a mis-click would bury a full
         compactor for a day. The count is never hidden - it stays in the
         scorecard - but the row needs a door back too. */
      var dis = state.dismissedBoxes || [];
      if(dis.length){
        html += '<div class="dismiss-bar">' + dis.length +
          (dis.length === 1 ? " box dismissed today \u00b7 " : " boxes dismissed today \u00b7 ") +
          '<button class="dismiss-link" id="showDismissed">' +
            (state.showDismissed ? "hide" : "show") + '</button></div>';
        if(state.showDismissed){
          html += '<div class="plain-list" style="margin-top:8px;">' +
            dis.map(function(b){ return rowHtml(b, isMissed(b)); }).join("") +
          '</div>';
        }
      }
    }
  }
  else if(state.view === "scheduled"){
    var overdue = scheduled.filter(isSchedOverdue);
    var upcoming = scheduled.filter(function(b){ return !isSchedOverdue(b); });
    overdue.sort(function(a,b){ return (schedAgeDays(b)||0) - (schedAgeDays(a)||0); }); // most overdue first
    upcoming.sort(function(a,b){
      var ad=a.scheduledDate?new Date(a.scheduledDate):new Date(8640000000000000);
      var bd=b.scheduledDate?new Date(b.scheduledDate):new Date(8640000000000000);
      return ad-bd; // soonest first
    });
    if(scheduled.length === 0){
      html += '<div class="empty-state" style="padding:40px 20px;"><div class="big">Nothing scheduled</div>No boxes currently show a scheduled pickup in CES.</div>';
    } else {
      // sub-tab as a folder tab: active tab colored (red=past due, blue=upcoming),
      // inactive tab outlined + transparent, body neutral. Shows one subset.
      var stab = state.schedTab;
      if(stab!=="overdue" && stab!=="upcoming") stab = overdue.length ? "overdue" : "upcoming";
      if(stab==="overdue" && !overdue.length) stab = "upcoming";
      if(stab==="upcoming" && !upcoming.length && overdue.length) stab = "overdue";
      var odActive = stab==="overdue";
      html += '<div class="sfold">'+
        '<div class="sfold-tabs">'+
          '<button class="sfold-tab" data-schedtab="overdue" style="'+(odActive
              ? "background:#FCEBEB;color:#A32D2D;border-color:#E4A0A0;"
              : "background:transparent;color:#A87A7A;border-color:#EAC3C3;")+'">past due <span class="stab-n">'+overdue.length+'</span></button>'+
          '<button class="sfold-tab" data-schedtab="upcoming" style="'+(!odActive
              ? "background:#E6F1FB;color:#185FA5;border-color:#93BCE6;"
              : "background:transparent;color:#7892A8;border-color:#C4DAF0;")+'">upcoming <span class="stab-n">'+upcoming.length+'</span></button>'+
        '</div>'+
        '<div class="sfold-body">'+
          (odActive?overdue:upcoming).map(function(b){ return scheduledRowHtml(b, odActive); }).join("")+
        '</div>'+
      '</div>';
    }
  }
  else if(state.view === "stale"){
    stale.sort(function(a,b){
      var ah=a.lastCycle==null?Infinity:a.lastCycle, bh=b.lastCycle==null?Infinity:b.lastCycle; return ah-bh;
    });
    if(stale.length === 0){
      html += '<div class="empty-state" style="padding:40px 20px;"><div class="big">No stale scans</div>Every box is cycling normally.</div>';
    } else {
      html += '<div class="plain-list">'+ stale.map(function(b){ return staleRowHtml(b); }).join("") +'</div>';
    }
  }
  else if(state.view === "needsempty"){
    needsEmpty.sort(function(a,b){ return String(a.id).localeCompare(String(b.id), undefined, {numeric:true}); });
    if(needsEmpty.length === 0){
      html += '<div class="empty-state" style="padding:40px 20px;"><div class="big">Nothing to record</div>No box has an un-recorded empty right now.</div>';
    } else {
      html += '<div class="plain-list">'+ needsEmpty.map(function(b){ return needsEmptyRowHtml(b); }).join("") +'</div>';
    }
  }
  else if(state.view === "monitor"){
    // Longest-down first: boxes whose previous entry is also the sentinel
    // (dark 2+ cycles) lead, then the rest, each by box id.
    monitorDown.sort(function(a,b){
      if(a.monitorPrevSentinel !== b.monitorPrevSentinel) return a.monitorPrevSentinel ? -1 : 1;
      return String(a.id).localeCompare(String(b.id), undefined, {numeric:true});
    });
    if(monitorDown.length === 0){
      html += '<div class="empty-state" style="padding:40px 20px;"><div class="big">No monitors down</div>Every box is reporting data. Nothing shows the 75000 sentinel.</div>';
    } else {
      html += '<div class="plain-list">'+ monitorDown.map(function(b){ return monitorRowHtml(b); }).join("") +'</div>';
    }
  }
  else { // clear (No Action) - Active tab (cycling-fine + hands-off) and
         // Inactive tab (retired X/Y/Z boxes), so every box in the total
         // is reachable and the six buckets reconcile to the scan total.
    clearNormal.sort(function(a,b){ return (b.pct==null?-1:b.pct) - (a.pct==null?-1:a.pct); });
    handsOff.sort(function(a,b){ return String(a.id).localeCompare(String(b.id), undefined, {numeric:true}); });
    inactive.sort(function(a,b){ return String(a.id).localeCompare(String(b.id), undefined, {numeric:true}); });
    var activeCount = clearNormal.length + handsOff.length;

    // Default to Active; fall back sensibly if one side is empty.
    var ctab = state.clearTab;
    if(ctab!=="active" && ctab!=="inactive") ctab = "active";
    if(ctab==="active" && activeCount===0 && inactive.length) ctab = "inactive";
    if(ctab==="inactive" && inactive.length===0) ctab = "active";
    var actActive = ctab==="active";

    html += '<div class="sfold">'+
      '<div class="sfold-tabs">'+
        '<button class="sfold-tab" data-cleartab="active" style="'+(actActive
            ? "background:#EAF3DE;color:#3B6D11;border-color:#B7D98C;"
            : "background:transparent;color:#7C9460;border-color:#CFE1B6;")+'">active <span class="stab-n">'+activeCount+'</span></button>'+
        '<button class="sfold-tab" data-cleartab="inactive" style="'+(!actActive
            ? "background:#F1EFE8;color:#444441;border-color:#C7C4B8;"
            : "background:transparent;color:#8A877E;border-color:#DAD7CC;")+'">inactive <span class="stab-n">'+inactive.length+'</span></button>'+
      '</div>'+
      '<div class="sfold-body">';
    if(actActive){
      if(activeCount===0){
        html += '<div class="empty-state" style="padding:32px 20px;"><div class="big">Nothing here</div>No active no-action boxes right now.</div>';
      } else {
        html += clearNormal.map(function(b){ return rowHtml(b, false); }).join("");
        html += handsOff.map(function(b){ return handsOffRowHtml(b); }).join("");
      }
    } else {
      if(inactive.length===0){
        html += '<div class="empty-state" style="padding:32px 20px;"><div class="big">No inactive boxes</div>Every box in this scan is active.</div>';
      } else {
        html += inactive.map(function(b){ return rowHtml(b, false); }).join("");
      }
    }
    html += '</div></div>';
  }

  listEl.innerHTML = monWrap(html);
  wireRows();
  wireScorecard();
  wireSearch();
  monAutoPick();
}

function wireScorecard(){
  /* The (i) is a sibling of the clickable area, not a child of it. Asking WHY a
     bucket holds nine boxes should not also switch you into that bucket. */
  document.querySelectorAll("[data-logic]").forEach(function(el){
    el.addEventListener("click", function(e){
      e.stopPropagation();
      openLogic(el.getAttribute("data-logic"));
    });
  });
  var lgX = document.getElementById("logicClose");
  if(lgX) lgX.onclick = closeLogic;
  var lgM = document.getElementById("logicModal");
  if(lgM) lgM.onclick = function(e){ if(e.target === lgM) closeLogic(); };

  /* The big scorecard carries data-view on .score-hit (so the (i) can sit beside
     it); the slim bar still carries it on .score-half. Select on the ATTRIBUTE
     rather than the class, and both keep working. */
  document.querySelectorAll('.score-tab, .score-seg, .score-half[data-view], .score-hit').forEach(function(el){
    el.addEventListener("click", function(){
      state.view = el.getAttribute("data-view");
      state.openId = null;
      // switching bucket clears an active search
      state.search = ""; state.searchOpen = false;
      render();
      // Jump back to the top so the new bucket's list starts at its
      // first item, rather than staying parked wherever the previous
      // bucket was scrolled to (which lands you mid-list). This also
      // retracts the slim bar since the full card comes back into view.
      window.scrollTo(0, 0);
    });
  });
  document.querySelectorAll('.sfold-tab').forEach(function(el){
    el.addEventListener("click", function(){
      var st = el.getAttribute("data-schedtab");
      var ct = el.getAttribute("data-cleartab");
      if(st){ state.schedTab = st; }
      if(ct){ state.clearTab = ct; }
      state.openId = null;
      render();
    });
  });
}

function wireSearch(){
  var openBtn = document.getElementById("searchOpen");
  if(openBtn) openBtn.addEventListener("click", function(){ state.searchOpen = true; render(); setTimeout(function(){ var i=document.getElementById("searchInput"); if(i) i.focus(); }, 0); });
  var input = document.getElementById("searchInput");
  if(input){
    input.addEventListener("input", function(){ state.search = input.value; updateResults(); });
  }
  var closeBtn = document.getElementById("searchClose");
  if(closeBtn) closeBtn.addEventListener("click", function(){ state.search=""; state.searchOpen=false; render(); });
  // Slim-bar copies of the same controls (distinct IDs, identical actions).
  var slimOpen = document.getElementById("slimSearchOpen");
  if(slimOpen) slimOpen.addEventListener("click", function(){ state.searchOpen = true; render(); setTimeout(function(){ var i=document.getElementById("slimSearchInput"); if(i) i.focus(); }, 0); });
  var slimInput = document.getElementById("slimSearchInput");
  if(slimInput){
    slimInput.addEventListener("input", function(){ state.search = slimInput.value; updateResults(); });
  }
  var slimClose = document.getElementById("slimSearchClose");
  if(slimClose) slimClose.addEventListener("click", function(){ state.search=""; state.searchOpen=false; render(); });
}

// Update ONLY the results list as the user types — leaves the scorecard and
// its focused search input untouched so typing never loses focus.
function updateResults(){
  var listEl = document.getElementById("list");
  var q = state.search.trim().toLowerCase();
  var html = "";
  if(q){
    var matches = state.rows.filter(function(b){
      return (("#"+b.id).indexOf(q)!==-1) || (b.id.toLowerCase().indexOf(q)!==-1) ||
             (b.fullDesc.toLowerCase().indexOf(q)!==-1) || (b.desc.toLowerCase().indexOf(q)!==-1) ||
             (b.haulCode.toLowerCase().indexOf(q)!==-1);
    });
    if(matches.length===0){
      html = '<div class="empty-state" style="padding:40px 20px;"><div class="big">No matches</div>Nothing matches “'+esc(state.search)+'”. Try a box number, site name, or hauler code.</div>';
    } else {
      html = '<div class="section-note">'+matches.length+' match'+(matches.length===1?'':'es')+' for “'+esc(state.search)+'” · across all boxes</div>'+
             '<div class="plain-list">'+ matches.map(function(b){ return rowHtml(b, false, bucketOf(b)); }).join("") +'</div>';
    }
    listEl.innerHTML = monWrap(html);
    wireRows();
  } else {
    // search cleared but box still open — full re-render to restore bucket view
    render();
  }
}

/* One hauler, one group - inside the SAME .plain-list container every other
   bucket uses. This used to be a free-standing folder card, and a hauler with
   only ONE box fell through to a bare .solo card instead, which named no
   hauler at all: the single fact that decides who you telephone was visible
   for some boxes and invisible for others, depending on how many boxes that
   hauler happened to have that day.

   But a "group" of one is not a group. A header saying "1 box · email" over a
   single row, with a date chip repeating the date already sitting on that
   row, is chrome pretending to be information. So a hauler is only batched
   when there is more than one box to batch - and a lone box carries its own
   hauler code in its meta line instead.

   The old date tabs grouped by b.puDate - the pickup date CES already holds.
   But a box is ON this list precisely because its pickup has NOT been
   arranged, so puDate is empty for nearly all of them and every box collapsed
   into a single "Needs scheduling" tab. They filtered on a field that is blank
   here, while the date that actually matters - suggestedPickupFor(), the one
   you read down the phone - did no work at all.

   So: batch by hauler, order within by that suggested date, summarise the
   dates in the header as counts. Nothing is hidden. You read a hauler's whole
   list while you are on the call with them, rather than tabbing between dates
   mid-sentence. */
function haulGroupHtml(haulCode, boxes){
  /* A group of one is not a group. No header - the row says who hauls it. */
  if(boxes.length === 1){
    return rowHtml(boxes[0], isMissed(boxes[0]), null, true);
  }

  var chanLabel = boxes[0].channel;

  /* Count the suggested dates, and sort the rows by them. Boxes with no
     usable rule have no suggestion; they go last, under their own count, so
     they are not silently dropped to the bottom without explanation. */
  var counts = {}, order = [];
  boxes.forEach(function(b){
    var sug = suggestedPickupFor(b);
    var key = sug ? sug.value : "__none__";
    if(!counts[key]){
      counts[key] = { label: sug ? sug.label : "No rule", n:0 };
      order.push(key);
    }
    counts[key].n++;
  });
  order.sort(function(a, b){
    if(a === "__none__") return 1;      // no-rule boxes last
    if(b === "__none__") return -1;
    return a.localeCompare(b);          // yyyy-MM-dd sorts chronologically
  });

  var sorted = boxes.slice().sort(function(x, y){
    var sx = suggestedPickupFor(x), sy = suggestedPickupFor(y);
    var vx = sx ? sx.value : "9999-99-99";
    var vy = sy ? sy.value : "9999-99-99";
    if(vx !== vy) return vx.localeCompare(vy);
    return String(x.id).localeCompare(String(y.id), undefined, { numeric:true });
  });

  /* The count on a chip earns its place only when the batch SPLITS across
     dates - then "Tue Jul 14 . 2 / Wed Jul 15 . 1" is the only thing saying
     how it divides. When every box shares one date there is a single chip, and
     its count just says again what "2 boxes" already said two inches to the
     left. So: one chip, no number. */
  var splitDates = order.length > 1;
  var chips = order.map(function(k, i){
    var c = counts[k];
    return '<span class="haul-date' + (i === 0 ? ' first' : '') + '">' +
           esc(c.label) + (splitDates ? ' \u00b7 ' + c.n : '') + '</span>';
  }).join("");

  /* Only render a portal link when the sheet actually has a URL for this
     hauler. A dead link on a scheduling screen is worse than no link: it
     costs somebody a click and a page load to learn nothing. */
  var url = state.portalById[String(haulCode).toUpperCase()] || "";
  var portal = url
    ? '<a class="haul-portal" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' +
      'Open portal \u2197</a>'
    : '';

  return '' +
    '<div class="haul-group">' +
      '<div class="haul-head">' +
        '<span class="haul-code">' + esc(haulCode) + '</span>' +
        '<span class="haul-meta">' + boxes.length + ' boxes \u00b7 ' + esc(chanLabel) + '</span>' +
        '<span class="haul-spacer"></span>' +
        portal +
        chips +
      '</div>' +
      sorted.map(function(b){ return rowHtml(b, isMissed(b)); }).join("") +
    '</div>';
}

/* ---------- missed-pickup heuristic (display only, Phase 1) ----------
   A box is shown "missed" only when it has a confirmed pickup date that
   is in the PAST and it still needs action. Real detection (comparing to
   an actual empty event) is Phase 3 — this is a conservative display cue. */
function isMissed(b){
  if(!b.puDate || !b.confirmed) return false;
  var d = new Date(b.puDate);
  if(isNaN(d.getTime())) return false;
  var today = new Date(); today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return d < today;
}

/* ---------- interactions ---------- */
function wireRows(){
  var listEl = document.getElementById("list");
  // marked-empty checkbox: persist via mark_empty, update optimistically.
  listEl.querySelectorAll("input[data-emptycheck]").forEach(function(cb){
    cb.addEventListener("click", function(e){ e.stopPropagation(); });
    cb.addEventListener("change", function(e){
      e.stopPropagation();
      var id = cb.getAttribute("data-emptycheck");
      var nowChecked = cb.checked;
      // Optimistic local update so the UI responds instantly; the save
      // runs in the background. If it fails, re-sync from the server.
      if(!state.emptyMarkedById) state.emptyMarkedById = {};
      if(nowChecked){ state.emptyMarkedById[id] = "just now"; }
      else { delete state.emptyMarkedById[id]; }
      jsonp({ action:"mark_empty", boxId:id, marked:(nowChecked?"true":"false"), key:KEY }, function(data){
        if(!data || !data.ok){ fetchEmptyMarked(); }
      });
      render();
    });
  });
  /* ---- open the review queue ------------------------------------------
     The monitor hands over the box IDs AND the dates it displayed. messages.html
     does not recompute either: a second copy of the bucket rules is a second
     copy to drift, and a queue that quietly disagrees with the list it came from
     is worse than no queue. What you saw is what it drafts. */
  function openMessages(boxes){
    if(!boxes.length) return;
    var b = boxes.map(function(x){ return x.id + ":" + x.date; }).join(",");
    var tab = state.isLatest ? (state.currentTab || "") : (state.currentTab || "");
    if(!tab){ setBanner("No scan tab loaded yet.", "err"); return; }
    window.location.href = "messages.html?tab=" + encodeURIComponent(tab) +
                           "&b=" + encodeURIComponent(b);
  }

  var draftAll = document.getElementById("draftAll");
  if(draftAll) draftAll.addEventListener("click", function(){
    var boxes = [];
    (state.actionBoxes || []).forEach(function(b){
      var d = pickupYmdFor(b);
      if(d) boxes.push({ id:b.id, date:d });
    });
    openMessages(boxes);
  });

  listEl.querySelectorAll("button[data-mail]").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();   // the whole row is a click target; don't also expand it
      openMessages([{ id: bt.getAttribute("data-mail"), date: bt.getAttribute("data-date") }]);
    });
  });

  /* ---- overrides -------------------------------------------------------- */
  var showDis = document.getElementById("showDismissed");
  if(showDis) showDis.addEventListener("click", function(){
    state.showDismissed = !state.showDismissed;
    render();
  });

  listEl.querySelectorAll("button[data-move]").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();
      var id = bt.getAttribute("data-move");
      state.moveOpenId = (state.moveOpenId === id) ? null : id;
      state.moveBusy = false;
      render();
    });
  });
  // Row "Draft an email" icon: open the compose window for this box. The move
  // icon carries data-move and is wired by the loop above. Neither bubbles to
  // the row (stopPropagation), so clicking an icon does not expand the detail.
  listEl.querySelectorAll("button[data-draft]").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();

  listEl.querySelectorAll(".move-strip").forEach(function(st){

  });
  listEl.querySelectorAll("[data-movex]").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();
      state.moveOpenId = null; state.moveBusy = false; render();
    });
  });

  function writeOverride(id, kind, reason){
    if(state.moveBusy) return;
    state.moveBusy = true;
    render();
    jsonp({ action:"box_override", boxId:id, kind:kind, reason:reason,
            tab:(state.currentTab || ""), by:"dashboard", key:KEY }, function(data){
      state.moveBusy = false;
      if(data && data.ok){
        state.moveOpenId = null;
        setBanner(kind === "in"  ? ("Box " + esc(id) + " moved onto Schedule Service.")
                : kind === "out" ? ("Box " + esc(id) + " dismissed until tomorrow\u2019s scan.")
                :                  ("Override on box " + esc(id) + " removed."), "info");
        fetchLedgerMarks();   // overrides ride along with the marks
      } else {
        setBanner(esc((data && data.error) || "Could not record that."), "err");
        render();
      }
    });
  }

  var moveGo = document.getElementById("moveGo");
  if(moveGo) moveGo.addEventListener("click", function(e){
    e.stopPropagation();
    var inp = document.getElementById("moveReason");
    var reason = inp ? (inp.value || "").trim() : "";
    // Required. An override with no reason is indistinguishable from a mis-click
    // a week later, and it is the reason that makes a repeat dismissal legible
    // as a broken trigger rather than a mystery.
    if(!reason){
      setBanner("Give a reason \u2014 it is what makes this legible to whoever reads it next.", "err");
      if(inp) inp.focus();
      return;
    }
    writeOverride(moveGo.getAttribute("data-id"), moveGo.getAttribute("data-kind"), reason);
  });

  listEl.querySelectorAll("button[data-clear]").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();
      writeOverride(bt.getAttribute("data-clear"), "clear", "");
    });
  });

  /* ---- portal booking ------------------------------------------------
     stopPropagation everywhere: the whole row is a click target that expands
     the detail panel, so without it, opening the date picker would also open
     the accordion underneath and the strip would jump around while you type. */
  listEl.querySelectorAll("button[data-book]").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();
      var id = bt.getAttribute("data-book");
      state.bookOpenId = (state.bookOpenId === id) ? null : id;
      state.bookBusy = false;
      render();
    });
  });
  listEl.querySelectorAll(".book-strip").forEach(function(strip){
    strip.addEventListener("click", function(e){ e.stopPropagation(); });
  });
  var bookX = document.getElementById("bookX");
  if(bookX) bookX.addEventListener("click", function(e){
    e.stopPropagation();
    state.bookOpenId = null; state.bookBusy = false; render();
  });
  var bookGo = document.getElementById("bookGo");
  if(bookGo) bookGo.addEventListener("click", function(e){
    e.stopPropagation();
    if(state.bookBusy) return;
    var id = bookGo.getAttribute("data-id");
    var input = document.getElementById("bookDate");
    var date = input ? input.value : "";
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){
      setBanner("Pick a date first.", "err");
      return;
    }
    // NOT optimistic. The marked-empty checkbox above updates locally and
    // reconciles later, and that is fine - it is a note to self. This writes
    // a date that a customer is about to be told. If the write fails, the
    // dashboard must not sit there showing a booking that does not exist.
    state.bookBusy = true;
    render();
    jsonp({ action:"schedule_portal", tab:(state.currentTab||""), boxId:id, date:date, key:KEY },
      function(data){
        state.bookBusy = false;
        if(data && data.ok){
          state.bookOpenId = null;
          setBanner("Booked " + esc(id) + " for " + esc(date) + ".", "info");
          loadScan(state.isLatest ? "latest" : state.currentTab);  // Sch Date changed on the sheet
          fetchLedgerMarks();                                      // and so did the marks
        } else {
          setBanner(esc((data && data.error) || "Could not record the booking."), "err");
          render();
        }
      });
  });

  // row expand (accordion — one open at a time)
  listEl.querySelectorAll(".row").forEach(function(rw){
    rw.addEventListener("click", function(){
      var id = rw.getAttribute("data-id");
      state.openId = (state.openId===id) ? false : id;
      state.notesOpenId = null; // collapsing/switching a box resets its notes toggle
      render();
    });
  });
  // WN Staff Notes (i) toggle inside an open detail panel. stopPropagation
  // so clicking it doesn't bubble to the row handler above and collapse
  // the whole box.
  listEl.querySelectorAll(".notes-toggle").forEach(function(bt){
    bt.addEventListener("click", function(e){
      e.stopPropagation();
      var id = bt.getAttribute("data-notes");
      state.notesOpenId = (state.notesOpenId===id) ? null : id;
      render();
    });
  });
}

/* Service-content sync check: compares the Master Box List against the Service
   Email Content tab and shows a strip under the buckets. Quiet green when they
   match; amber with the exact Box IDs when a box was added (needs content) or
   removed (orphaned row). Non-fatal - on any failure the strip just stays
   empty, exactly as it looks today, rather than blocking the dashboard. */
function fetchServiceContentAudit(){
  var el = document.getElementById("syncStrip");
  if(!el) return;
  jsonp({ action:"service_content_audit", key:KEY }, function(data){
    if(!data || !data.ok || data.inSync){ el.className = ""; el.innerHTML = ""; return; }
    el.className = "sync-strip";
    var rows = "";
    if(data.needContent && data.needContent.length){
      rows +=
        '<div class="sync-row">' +

          '<div class="sync-row-ids">' + esc(data.needContent.join(", ")) + ' \u2014 a request for ' + (data.needContent.length===1?"this":"these") + ' would send with no wording or account code</div>' +
        '</div>';
    }
    if(data.orphaned && data.orphaned.length){
      rows +=

// The email templates (subject/body per kind), same source the Templates page
// reads. Used to render the per-box template pills in the detail panel. The
// pills exclude Notice and Batch: those two are sent by the schedule/notify
// flow automatically, not hand-picked per box. Non-fatal on failure - no
// templates means no pills, and the rest of the detail is unaffected.
function fetchTemplates(){
  jsonp({ action:"email_templates", key:KEY }, function(data){
    if(data && data.ok){
      state.templates = data.templates || {};
      var preferred = ["Emptied","Missed","Premature","Problem","Repair","Usage","Weights","DNA"];
      var have = Object.keys(state.templates);
      var ordered = preferred.filter(function(n){ return have.indexOf(n) !== -1; });
      have.forEach(function(n){
        if(ordered.indexOf(n) === -1 && n !== "Notice" && n !== "Batch") ordered.push(n);
      });
      state.templateOrder = ordered;
      render();
    }
  });
}

// Per-box recipients, straight off Master Box List (the same master_contacts
// the Contacts page reads): toRecipients = hauler, ccRecipients = customer.
// Keyed here by the normalized box id so a pill can resolve who its email
// would go to. Non-fatal on failure - the map stays empty and pills report

function fetchBoxContacts(){

// set. One definition, read the same way everywhere - not a per-template

// master_contacts (customer = ccRecipients, hauler = toRecipients).
var PILL_TO = {

// Resolve a box's hauler/customer/staff recipient strings (may be empty).
function boxRecip(boxId){
  var c = state.boxContacts[normBoxId(boxId)] || {};
  return {
    hauler:   String(c.toRecipients || "").trim(),
    customer: String(c.ccRecipients || "").trim(),
    corp:     String(c.corpRecipients || "").trim(),
    staff:    String(c.staffRecipients || "").trim()
  };
}
function splitEmails(s){ return String(s || "").split(/[;,]/).map(function(x){ return x.trim(); }).filter(Boolean); }
// A flat address book (email -> role) built from every box's contacts, for the
// compose type-ahead. Same source the Contacts page reads; assembled here, not
// copied. First role seen wins for display colour.
function buildAddressBook(){
  var seen = {};
  Object.keys(state.boxContacts || {}).forEach(function(id){
    var c = state.boxContacts[id] || {};
    splitEmails(c.toRecipients).forEach(function(e){ var k=e.toLowerCase(); if(!seen[k]) seen[k]={email:e,role:"hauler"}; });
    splitEmails(c.ccRecipients).forEach(function(e){ var k=e.toLowerCase(); if(!seen[k]) seen[k]={email:e,role:"customer"}; });
    splitEmails(c.corpRecipients).forEach(function(e){ var k=e.toLowerCase(); if(!seen[k]) seen[k]={email:e,role:"corp"}; });
    splitEmails(c.staffRecipients).forEach(function(e){ var k=e.toLowerCase(); if(!seen[k]) seen[k]={email:e,role:"staff"}; });
  });
  return Object.keys(seen).map(function(k){ return seen[k]; });
}

// Fetch what we have told people, per box: the pickup date the service
// request claimed, and the pickup date the customer notice claimed. The
// Apps Script reports those two facts and stops - whether a check mark is

// dashboard interprets.

// Non-fatal on failure, and the failure is honest: the map stays empty, so
// every mark reads "not done". That is exactly what the dashboard showed

// Fetch each box's Column K "Set Schedule" value live from the Master Box
// List (via the days_cycles endpoint's `s` field) so hands-off boxes can be
// forced into No Action. Reads live, so a Column K edit reflects on next
// load with no scan. Failure is non-fatal: the map stays empty and every
// box just buckets normally (same as before this feature).
function fetchSetSchedule(){
  jsonp({ action:"days_cycles", key:KEY }, function(data){
    if(data && data.ok && data.map){
      var m = {};      // Column K "Set Schedule" (field s) → hands-off matching
      var rules = {};  // Scheduling Rule (field r) → suggested pickup date
      var notes = {};  // WN Staff Notes (field n) → detail-panel (i) reveal
      var notesUpd = {}; // Notes Updated (field nu) → shown with the notes
      Object.keys(data.map).forEach(function(id){
        var entry = data.map[id];
        var nid = normBoxId(id);
        var s = entry && entry.s;
        if(s) m[nid] = s;
        var r = entry && entry.r;
        if(r) rules[nid] = String(r).trim();
        var n = entry && entry.n;
        if(n) notes[nid] = String(n);
        var nu = entry && entry.nu;
        if(nu) notesUpd[nid] = String(nu);
      });
      state.setSchedById = m;
      state.schedRuleById = rules;
      state.staffNotesById = notes;
      state.staffNotesUpdById = notesUpd;
      render(); // re-classify + re-render now that K/rule/notes are known
    }
  });
}

// Load either the latest scan (action='latest') or a specific dated tab.
function loadScan(which){
  var params = (which==="latest") ? { action:"latest", key:KEY } : { action:"tab", name:which, key:KEY };
  document.getElementById("list").innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading scan…</div>';
  jsonp(params, function(data){
    if(!data || !data.ok){
      var msg = (data && data.authRequired) ? "Access code was rejected by the server." : (data && data.error) || "Could not load the scan.";
      setBanner(msg, "err");
      document.getElementById("scanInfo").textContent = "Couldn't load";
      document.getElementById("list").innerHTML = '<div class="empty-state"><div class="big">Couldn\'t load the scan</div>'+esc(msg)+'</div>';
      return;
    }
    state.scanTitle = data.scanTitle || data.sheetName || "";
    state.currentTab = data.sheetName || (which==="latest"?null:which);
    state.rows = (data.rows||[]).map(modelOf).filter(function(b){ return b.id; });
    // Determine if this is the latest tab (first in the tab list, once we have it).
    state.isLatest = (which==="latest") || (state.tabs.length>0 && state.currentTab===state.tabs[0]);
    document.getElementById("scanInfo").textContent = formatScanMeta(state.scanTitle) || (state.currentTab||"");
    updateDateNav();
    updatePastBanner();
    render();
  });
}

// Fetch the list of available scan dates for the picker + prev/next.
function fetchTabList(){
  jsonp({ action:"list_tabs", key:KEY }, function(data){
    if(data && data.ok && data.tabs){
      state.tabs = data.tabs; // newest first
      // now that we know the ordering, re-confirm isLatest for the current view
      if(state.currentTab) state.isLatest = (state.currentTab === state.tabs[0]);
      updateDateNav();
      updatePastBanner();
    }
  });
}

// (Re)build the dropdown(s) of available scan dates - both the full
// header's and the slim bar's, since they share the same tab list.
function updateDateNav(){
  ["dateDrop","slimDateDrop"].forEach(function(dropId){
    var drop = document.getElementById(dropId);
    if(!drop) return;
    drop.innerHTML = state.tabs.map(function(t, i){
      var cur = (t===state.currentTab);
      return '<div class="date-opt'+(cur?' cur':'')+'" data-tab="'+esc(t)+'">'+esc(scanDateShort(t))+
             (i===0?'<span class="latest-pill">latest</span>':'')+'</div>';
    }).join("") || '<div class="date-opt">No past scans found</div>';
    drop.querySelectorAll(".date-opt[data-tab]").forEach(function(o){
      o.addEventListener("click", function(){
        state.dropOpen = false;
        var d1=document.getElementById("dateDrop"); if(d1) d1.classList.remove("show");
        var d2=document.getElementById("slimDateDrop"); if(d2) d2.classList.remove("show");
        state.openId = null;
        loadScan(o.getAttribute("data-tab"));
      });
    });
  });

// Short label for a tab name like "2026-07-06" -> "Mon 7-6-26".
function scanDateShort(tabName){
  var m = String(tabName).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return tabName;
  var y=+m[1], mo=+m[2], d=+m[3];
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var dow = days[new Date(y,mo-1,d).getDay()];
  var extra = tabName.replace(/^\d{4}-\d{2}-\d{2}\s*/,""); // keep any " (2)" suffix
  return dow+" "+mo+"-"+d+"-"+String(y).slice(2)+(extra?" "+extra:"");
}

      '<span>Viewing a past scan — '+esc(scanDateShort(state.currentTab))+'. This is not today\'s live data.</span>'+

      '</div>', "warn");

    if(bl) bl.addEventListener("click", function(){ state.openId=null; loadScan("latest"); });
  } else {

  }
}

// Reveal the fixed slim bar as soon as the SCORECARD reaches the top of
// the screen - not when the whole card has fully scrolled away (which
// felt late and let the bar drop in over the first list rows). We watch
// a zero-height sentinel placed just above the scorecard: once it passes
// above the viewport top, show the slim bar. Still flicker-proof - the
// slim bar is a separate fixed element that fades in via opacity, so
// showing it never shifts layout or feeds back into the trigger.
(function(){
  var sentinel = document.getElementById("scoreSentinel");
  var slim = document.getElementById("slimbar");
  if(!sentinel || !slim) return;
  if("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      // sentinel intersecting (still on/below the top edge) = hide bar;
      // once it scrolls above the top, show the bar.
      slim.classList.toggle("show", !entries[0].isIntersecting);
    }, { threshold:0 });
    io.observe(sentinel);
  } else {
    var onScroll = function(){
      slim.classList.toggle("show", sentinel.getBoundingClientRect().top <= 0);
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    onScroll();
  }
})();

  "This email and any files transmitted with it are confidential and intended solely for the " +

function boxById(id){
  id = normBoxId(id);
  for(var i=0;i<state.rows.length;i++){ if(String(state.rows[i].id) === id) return state.rows[i]; }
  return null;

function boldLiteralSites(html){
  var lines = String(html).split("\n"), out = [], arming = false;
  for(var i=0;i<lines.length;i++){
    var raw = lines[i], flat = raw.trim();
    if(arming && flat === ""){ arming = false; out.push(raw); continue; }
    if(arming && flat && flat.indexOf("<") === -1){
      out.push('<span style="color:#3B6D11;font-weight:bold;">\u2022 ' + flat + '</span>'); continue;
    }
    out.push(raw);
    if(/compactor/i.test(flat) && /:\s*$/.test(flat)) arming = true;
  }
  return out.join("\n");
}
function composeFill(text, vals){
  var out = esc(String(text || ""));
  Object.keys(vals).forEach(function(k){ out = out.split("[" + k + "]").join(vals[k]); });
  out = boldLiteralSites(out);
  return out.replace(/\n/g, "<br>");
}
function composeShell(innerHtml){
