<!-- ONE copy of the explanations, shared by all three pages. Not inlined -
     an inlined copy is a copy, and copies drift. This is the whole point. -->
<script src="logic.js?v=2026-07-15-menu"></script>
<script>
/* ============================================================
   WasteNet Box Monitor — Phase 1 monitoring view
   Reads the live `latest` scan via JSONP. Writes nothing.
   Scheduling / notifying / confirming are shown as dormant
   design only — not wired to anything.
   ============================================================ */

var API = "https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec";
/* Access code. NOT hardcoded - this file's source is public on GitHub,
   so a baked-in key would protect nothing. The code is entered on the
   lock screen, held in sessionStorage for the tab session, and sent with
   every request for the Apps Script to check server-side. Shares the
   same sessionStorage entry as index.html and the accounting page, so
   unlocking once covers all three for the session. */
var KEY = (function(){
  try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; }
  catch(e){ return ""; }
})();

function lockOut(msg){
  try { sessionStorage.removeItem("wastenet_dashboard_key"); } catch(e){}
  KEY = "";
  var lock = document.getElementById("lock");
  var err  = document.getElementById("lockErr");
  if(lock) lock.classList.remove("hide");
  if(err){
    if(msg){ err.textContent = msg; err.style.display = "block"; }
    else { err.style.display = "none"; }
  }
  var inp = document.getElementById("lockIn");
  if(inp){ inp.value = ""; inp.focus(); }
}

var state = { rows: [], scanTitle: "", openId: null, staleOpen: false, view: "action",
  tabs: [], currentTab: null, isLatest: true, dropOpen: false, search: "", searchOpen: false, setSchedById: {}, schedRuleById: {}, staffNotesById: {}, staffNotesUpdById: {}, emptyMarkedById: {}, ledgerById: {}, overrideById: {}, portalById: {}, actionBoxes: [], moveOpenId: null, moveBusy: false, showDismissed: false, bookOpenId: null, bookBusy: false, notesOpenId: null, schedTab: null, clearTab: null, templates: {}, templateOrder: [], boxContacts: {} };

/* ---------- JSONP ---------- */
function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var timeout = setTimeout(function(){ cleanup(); cb({ ok:false, error:"Request timed out. Check your connection and the access code." }); }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){
    cleanup();
    if(data && data.authRequired){
      lockOut("That access code was not accepted. Please try again.");
      return;
    }
    cb(data);
  };
  var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }).join("&");
  var s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* ---------- helpers ---------- */
function normBoxId(v){ if(v==null) return ""; var s=String(v); return s.slice(-2)===".0" ? s.slice(0,-2) : s; }

function toNum(v){ if(v===""||v==null) return null; var n=Number(v); return isNaN(n)?null:n; }

// Abbreviate a long description to "Customer · short locator".
// Simple dashboard-side shortening for Phase 1; refine later.
function abbrev(desc){
  if(!desc) return "(no description)";
  var d = String(desc);
  var acctM = d.match(/\((\d{2,5})\)/);            // account/unit number, e.g. (601)
  var acct = acctM ? acctM[1] : "";
  // strip trailing bracket codes and "Formerly" tails
  d = d.replace(/\s*\[[^\]]*\]\s*/g, " ").replace(/\s*-\s*Formerly.*$/i,"").trim();
  // take before the first " - " (usually customer + unit), fall back to whole
  var parts = d.split(" - ");
  var head = parts[0].trim();
  var appendedLoc = false;
  // if there's a street-ish second part, append a shortened form
  if(parts.length > 1){
    var loc = parts[1].replace(/,.*$/,"").replace(/^\(\d{2,5}\)\s*/,"").trim(); // drop city/state + leading acct
    if(loc && loc.length <= 26){ head = head + " · " + loc; appendedLoc = true; }
  }
  // when the name would otherwise stand alone, append the account number so
  // same-named sites (e.g. two "Metro National"s) are distinguishable
  if(acct && !appendedLoc) head = head + " · " + acct;
  return head.length > 46 ? head.slice(0,44).trim() + "…" : head;
}

// Parse "Days: 11 of 7 | Cycles: 123 of 230 | ..." advisory string.
function parseAdvisory(adv){
  var out = { days:null, daysTrig:null, cycles:null, cyclesTrig:null, tokens:[] };
  if(!adv) return out;
  var s = String(adv);
  var dm = s.match(/Days:\s*([\d.]+)(?:\s*of\s*([\d.]+))?/i);
  if(dm){ out.days = toNum(dm[1]); out.daysTrig = dm[2]!=null?toNum(dm[2]):null; }
  var cm = s.match(/Cycles:\s*([\d.]+)(?:\s*of\s*([\d.]+))?/i);
  if(cm){ out.cycles = toNum(cm[1]); out.cyclesTrig = cm[2]!=null?toNum(cm[2]):null; }
  // surface any SET SCHED / NEVER SCHED style markers
  s.split("|").forEach(function(t){
    t = t.trim();
    if(/SET SCHED|NEVER SCHED/i.test(t)) out.tokens.push(t);
  });
  return out;
}

// Determine the channel from Srvc Mthd / Haul Code.
function channelOf(r){
  var hc = String(r["Haul Code"]||"").toUpperCase();
  var sm = String(r["Srvc Mthd"]||"").toLowerCase();
  if(hc.indexOf("MYRNA") !== -1) return "phone";
  if(sm.indexOf("portal") !== -1) return "portal";
  if(sm.indexOf("phone") !== -1) return "phone";
  if(sm.indexOf("email") !== -1) return "email";
  return sm || "—";
}

// Fill color ramp by how close to / over trigger.
function fillColor(pct, trig){
  if(pct==null) return {bar:"#B4B2A9", txt:"#5F5E5A"};
  var t = trig==null ? 50 : trig;
  if(pct >= t) return {bar:"#E24B4A", txt:"#A32D2D"};          // at/over trigger
  if(pct >= t*0.75) return {bar:"#EF9F27", txt:"#854F0B"};      // approaching
  return {bar:"#639922", txt:"#3B6D11"};                        // low
}
function edgeColor(pct, trig){
  if(pct==null) return "#B4B2A9";
  var t = trig==null ? 50 : trig;
  if(pct >= t) return "#E24B4A";
  if(pct >= t*0.75) return "#EF9F27";
  return "#639922";
}

function fmtDate(v){
  if(!v) return "";
  var d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return (d.getMonth()+1)+"/"+d.getDate()+"/"+String(d.getFullYear()).slice(2);
}
function shortDay(v){
  if(!v) return "";
  var d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return days[d.getDay()]+" "+mo[d.getMonth()]+" "+d.getDate();
}
/* ------------------------------------------------------------------
   ONE DATE, TWO SPELLINGS

   The ledger writes a pickup date as the plain string "2026-07-16".
   Sch Date is a real date cell, and arrives from Apps Script as
   "2026-07-16T04:00:00.000Z" - midnight Eastern, expressed in UTC.

   They are the same day. Compared as strings they are not equal, and
   compared as Dates they are STILL a trap: new Date("2026-07-16")
   parses as midnight UTC, and asking a browser in Eastern what day
   that is gets you the 15th. A check mark that goes dark overnight,
   for boxes nobody touched, in some timezones and not others.

   So both spellings are reduced to yyyy-MM-dd before they ever meet:
   an ISO-looking string is cut at the day and never parsed at all,
   and anything else is parsed once and read back in local time.
   ------------------------------------------------------------------ */
function toYmd(v){
  if(!v) return "";
  var s = String(v).trim();
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+"-"+m[2]+"-"+m[3];          // already a day. Don't touch it.
  var d = new Date(s);
  if(isNaN(d.getTime())) return "";
  var mo = String(d.getMonth()+1); if(mo.length < 2) mo = "0"+mo;
  var dy = String(d.getDate());    if(dy.length < 2) dy = "0"+dy;
  return d.getFullYear()+"-"+mo+"-"+dy;
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }



/* ------------------------------------------------------------------
   The numbers in an explanation must never be written down.

   "We flag a box at 80%" becomes a lie the day somebody changes it to
   75%, and it lies from INSIDE the tool, where a new person will trust
   it over the code. So the prose describes the SHAPE of the rule, and
   every figure is read out of the scan sitting in front of you right
   now. A number that was never written down cannot go stale.
   ------------------------------------------------------------------ */
function liveNoteFor(key){
  var rows = state.rows || [];
  if(!rows.length) return "";
  var inBucket = function(k){ return rows.filter(function(b){ return bucketOf(b) === k; }); };

  if(key === "action"){
    var a = inBucket("action");
    if(!a.length) return "<b>Right now:</b> no box is over its trigger.";
    var trigs = a.map(function(b){ return b.trig; }).filter(function(t){ return t != null; });
    var note = "<b>Right now:</b> " + a.length + " box" + (a.length>1?"es":"") + " over trigger.";
    if(trigs.length){
      note += " Their triggers run from <b>" + Math.min.apply(null,trigs) + "%</b> to <b>" +
              Math.max.apply(null,trigs) + "%</b> \u2014 each read from CES in this scan, " +
              "not set by us: ";
      note += a.slice(0,4).map(function(b){
        return "#" + esc(b.id) + " is at " + (b.pct==null?"\u2014":b.pct+"%") +
               " against its own trigger of " + b.trig;
      }).join("; ") + (a.length>4 ? "; \u2026" : "") + ".";
    }
    return note;
  }

  if(key === "stale"){
    var st = inBucket("stale");
    if(!st.length) return "<b>Right now:</b> every box is cycling.";
    var hrs = st.map(function(b){ return b.lastCycle; }).filter(function(h){ return h != null; });
    var worst = hrs.length ? Math.max.apply(null, hrs) : null;
    return "<b>Right now:</b> " + st.length + " stale. The threshold is <b>168 hours</b> \u2014 " +
      "seven days without a single cycle" +
      (worst ? "; the quietest has not cycled in <b>" + Math.round(worst) + " hours</b>, which is " +
        Math.round(worst/24) + " days" : "") + ".";
  }

  if(key === "monitor"){
    var md = inBucket("monitor");
    return "<b>Right now:</b> " + md.length + " monitor" + (md.length===1?"":"s") +
      " returning CES's <b>75000</b> sentinel \u2014 the value that means \u201cno reading\u201d. " +
      "It is not a fill level. Nobody knows how full these boxes are.";
  }

  if(key === "scheduled"){
    var sc = inBucket("scheduled");
    var missed = sc.filter(isMissed);
    return "<b>Right now:</b> " + sc.length + " with a pickup booked in CES" +
      (missed.length ? ", of which <b>" + missed.length + "</b> " + (missed.length===1?"is":"are") +
        " past the promised date and still not emptied. The hauler said they would come, and did not." : "") + ".";
  }

  if(key === "clear"){
    var cl = inBucket("clear");
    var inact = cl.filter(function(b){ return b.need === "N/A"; });
    return "<b>Right now:</b> " + (cl.length - inact.length) + " active and below trigger, " +
      inact.length + " inactive (CES has them marked N/A).";
  }

  if(key === "needsempty"){
    var ne = inBucket("needsempty");
    if(!ne.length) return "<b>Right now:</b> nothing waiting to be marked.";
    return "<b>Right now:</b> " + ne.length + " emptied but not yet marked in CES. Until they are, " +
      "CES keeps counting days and cycles from the WRONG pickup date \u2014 so they will start " +
      "asking to be serviced again when they do not need it.";
  }
  return "";
}

function openLogic(key){
  document.getElementById("logicBody").innerHTML = logicPanelHtml(key, liveNoteFor(key));
  document.getElementById("logicModal").classList.add("show");
}
function closeLogic(){ document.getElementById("logicModal").classList.remove("show"); }
document.addEventListener("keydown", function(e){ if(e.key === "Escape") closeLogic(); });

/* ---------- suggested pickup date ----------
   Ported VERBATIM from the ops dashboard (index.html) so the two views can
   never disagree on a suggested date. Same NBD/1-BD/2-BD interpretation, same
   core-6 holiday set, same observed-date shifting. When the email/notification
   tool is built, it should call suggestedPickupFor() at SEND time rather than
   re-implementing any of this — one place for the rule logic. */

// Returns the nth occurrence of a given weekday in a month (or the LAST
// occurrence when n is -1). weekday: 0=Sun...6=Sat. Used to compute floating
// holidays (Memorial Day, Labor Day, Thanksgiving) without hardcoding dates.
function nthWeekdayOfMonth(year, monthIndex, weekday, n){
  if(n > 0){
    var first = new Date(year, monthIndex, 1);
    var day = 1 + ((weekday - first.getDay() + 7) % 7) + (n - 1) * 7;
    return new Date(year, monthIndex, day);
  }
  var lastDay = new Date(year, monthIndex + 1, 0);
  var d = lastDay.getDate() - ((lastDay.getDay() - weekday + 7) % 7);
  return new Date(year, monthIndex, d);
}

// Shifts a fixed-date holiday landing on a weekend to the observed day:
// Saturday -> Friday, Sunday -> Monday. Standard US business practice.
function observedHolidayDate(date){
  var dow = date.getDay();
  var result = new Date(date);
  if(dow === 6) result.setDate(result.getDate() - 1);
  else if(dow === 0) result.setDate(result.getDate() + 1);
  return result;
}

// The "core 6" holidays most waste haulers actually close for — deliberately
// NOT the full federal list. Computed algorithmically so it never needs yearly
// upkeep.
function getCoreHolidaysForYear(year){
  return [
    observedHolidayDate(new Date(year, 0, 1)),   // New Year's Day
    nthWeekdayOfMonth(year, 4, 1, -1),           // Memorial Day - last Mon of May
    observedHolidayDate(new Date(year, 6, 4)),   // July 4th
    nthWeekdayOfMonth(year, 8, 1, 1),            // Labor Day - 1st Mon of Sep
    nthWeekdayOfMonth(year, 10, 4, 4),           // Thanksgiving - 4th Thu of Nov
    observedHolidayDate(new Date(year, 11, 25))  // Christmas
  ];
}

// Set of yyyy-MM-dd holiday strings spanning this year and next (so a count
// crossing the year boundary still catches New Year's Day).
function buildHolidaySet(year){
  var dates = getCoreHolidaysForYear(year).concat(getCoreHolidaysForYear(year + 1));
  return new Set(dates.map(toDateInputValue));
}

// Adds a number of BUSINESS days (skipping Sat/Sun and the core-6 holidays)
// to a date and returns the resulting Date.
function addBusinessDays(date, days, holidaySet){
  var result = new Date(date);
  var added = 0;
  while(added < days){
    result.setDate(result.getDate() + 1);
    var dow = result.getDay();
    var isWeekend = dow === 0 || dow === 6;
    var isHoliday = holidaySet && holidaySet.has(toDateInputValue(result));
    if(!isWeekend && !isHoliday) added++;
  }
  return result;
}

// yyyy-MM-dd for a Date (matches index.html: UTC getters resolve a local-
// midnight date to the same calendar day in timezones behind UTC).
function toDateInputValue(value){
  if(!value) return "";
  var d = new Date(value);
  if(isNaN(d.getTime())) return "";
  var yyyy = d.getUTCFullYear();
  var mm = String(d.getUTCMonth() + 1).padStart(2, "0");
  var dd = String(d.getUTCDate()).padStart(2, "0");
  return yyyy + "-" + mm + "-" + dd;
}

// Turns a per-box Scheduling Rule ("NBD","1-BD","2-BD",...) into a suggested
// Pick-Up Date computed from TODAY. "N-BD" = N business days ON TOP OF the
// next-business-day baseline: NBD=+1, "1-BD"=+2, "2-BD"=+3. Business days skip
// weekends AND the core-6 holidays (no awareness of one-off site closures —
// same blind spot the scanner has). Returns null for unrecognized rules.
function computeSuggestedPickupDate(rule){
  if(!rule) return null;
  var normalized = String(rule).trim().toUpperCase();
  var businessDays = null;
  if(normalized === "NBD"){
    businessDays = 1;
  } else {
    var m = normalized.match(/^(\d+)-BD$/);
    if(m) businessDays = parseInt(m[1], 10) + 1;
  }
  if(businessDays === null) return null;
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var holidaySet = buildHolidaySet(today.getFullYear());
  return addBusinessDays(today, businessDays, holidaySet);
}

// Single source of truth for the suggested pickup date on a box. The detail
// panel is the first consumer today; the future email/notification tool should
// call THIS (at send time) so subject line, body, and notifications all read
// the exact same value. Resolves the box's Scheduling Rule (Master Box List,
// days_cycles field `r`) from the live map. Returns { rule, date, value, label,
// dateReq } or null when there's no rule or the rule string is unrecognized.
function suggestedPickupFor(b){
  var rule = (b && b.id && state.schedRuleById) ? state.schedRuleById[b.id] : null;
  if(!rule) return null;
  var d = computeSuggestedPickupDate(rule);
  if(!d) return null;
  return {
    rule: rule,
    date: d,                          // Date object
    value: toDateInputValue(d),       // yyyy-MM-dd (form inputs / API payloads)
    label: shortDay(d)                // "Mon Jul 13" (display)
  };
}

// The suggested pickup date (row chip + detail-panel row) belongs ONLY on the
// schedule-service page — scorecard "schedule service" == view "action" — and
// not while searching across buckets. On monitor-down / stale / scheduled / no-
// action it's misleading noise, so it's gated everywhere by this single check.
function onSchedulePage(){ return state.view === "action" && !state.search.trim(); }

// Format the scan title into "Tue 7-7-26 · 11:57 AM" — date and time only.
// Input looks like "Scan completed: 2026-07-07 11:57" (may have extra tail).
function formatScanMeta(title){
  if(!title) return "";
  var m = String(title).match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
  if(!m) return String(title); // unrecognized — show as-is
  var y=+m[1], mo=+m[2], d=+m[3], hh=+m[4], mm=m[5];
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var dow = days[new Date(y, mo-1, d).getDay()];
  var ampm = hh>=12 ? "PM" : "AM";
  var h12 = hh%12; if(h12===0) h12=12;
  var yy = String(y).slice(2);
  return dow+" "+mo+"-"+d+"-"+yy+" · "+h12+":"+mm+" "+ampm;
}
// a day or more → "56d 14h" (days and remaining hours).
function humanHours(h){
  if(h==null) return "—";
  if(h < 24) return (Math.round(h*10)/10)+"h";
  var d = Math.floor(h/24);
  var rem = Math.round(h - d*24);
  if(rem === 24){ d += 1; rem = 0; }
  return rem>0 ? (d+"d "+rem+"h") : (d+"d");
}

/* ---------- build a normalized box model from a raw sheet row ---------- */
function modelOf(r){
  var pct = toNum(r["Max Pct"]);
  // Sanity guard: a real fill percent is roughly 0–150 (allowing some
  // overflow for genuinely over-full boxes). Out-of-band service
  // codes (e.g. 1556070) live in the weight table's Percent Full cell, not
  // in Max Pct — but if any such value ever leaked into Max Pct, treat it
  // as "no valid fill reading" so the row falls through to its real trigger
  // reason instead of displaying a nonsense percentage.
  if(pct != null && (pct < 0 || pct > 150)) pct = null;
  var t1 = toNum(r["Trigr1 Pct"]);
  var t2 = toNum(r["Trigr2 Pct"]);
  var used = String(r["Trigr Used"]||"");
  var trig = used.toLowerCase().indexOf("trigger2")!==-1 ? t2 : t1;
  if(trig==null) trig = t1!=null?t1:t2;
  var adv = parseAdvisory(r["Advisory"]);
  var need = String(r["Srvc Need"]||"").toUpperCase();
  return {
    id: normBoxId(r["Box ID"]),
    desc: abbrev(r["Description"]),
    fullDesc: String(r["Description"]||""),
    haulCode: String(r["Haul Code"]||"").trim() || "—",
    channel: channelOf(r),
    pct: pct, trig: trig,
    lastCycle: toNum(r["Last Cycle Hrs"]),
    days: adv.days, daysTrig: adv.daysTrig,
    cycles: adv.cycles, cyclesTrig: adv.cyclesTrig,
    advTokens: adv.tokens,
    advRaw: String(r["Advisory"]||""),
    need: need,                                  // YES / NO / N/A / YES (FORCED)
    notes: String(r["Notes"]||""),
    schDate: r["Sch Date"] || "",
    puDate: r["P/U Date"] || "",
    confirmed: r["Cnfrmd"]===true || String(r["Cnfrmd"]).toLowerCase()==="true",
    datePullReq: r["Date Pull Req'd"] || "",
    scheduledPickup: String(r["Scheduled Pickup"]||"").toUpperCase()==="YES" || r["Scheduled Pickup"]===true,
    scheduledDate: r["Scheduled Date"] || "",
    // Monitor Down (scanner v4.10): CES reports the 75000 sentinel, so the
    // monitor isn't sending data and the fill % is meaningless. Reason code
    // is the 2-digit code stacked in front (e.g. 45 = compactor repairs);
    // prevSentinel = the previous entry was the sentinel too (dark 2+ cycles).
    monitorDown: String(r["Monitor Not Reporting"]||"").toUpperCase()==="YES" || r["Monitor Not Reporting"]===true,
    monitorReason: String(r["Monitor Reason Code"]||"").trim(),
    monitorPrevSentinel: String(r["Monitor Prev Sentinel"]||"").toUpperCase()==="YES" || r["Monitor Prev Sentinel"]===true,
    // Needs Marking Empty (scanner v4.13): box physically emptied (drop-to-low
    // + no red X) but it hasn't been recorded. Takes precedence over service -
    // a just-emptied box needs recording, not a pickup.
    needsEmpty: String(r["Needs Marking Empty"]||"").toUpperCase()==="YES" || r["Needs Marking Empty"]===true
  };
}

/* ---------- checklist steps ----------------------------------------
   NOT "has this box ever been emailed". That question is useless: a box
   notified in May is not notified now, and a mark that only ever goes
   forward is a mark that lies by the second week.

   The question is whether the box was notified about THE PICKUP IT IS
   WAITING FOR. So the ledger records the date we told them, and a mark
   lights only while that date is still the date on the box. Move the
   pickup and the two stop matching, so the marks go dark on their own -
   which is correct, because a new date means the hauler and the site
   both have to be told again. Nobody has to remember to clear anything.

   BOTH sides must be non-empty, not merely equal. A box with no Sch Date
   and no sends compares blank against blank, and blank equals blank -
   which would light every mark on every box nobody has ever touched.

   Confirmed is date-gated too, and it took seeing it wrong to know why.
   Read off the Cnfrmd column alone, a rescheduled box showed

       Scheduled [ ]  Notified [ ]  Confirmed [x]

   - a hauler had agreed to a pickup that nobody had requested and nobody
   had announced. Glance at that on a busy morning and it reads as "this
   one is handled". It is not. A green mark asserting something false is
   worse than a dark one, so a hauler's click now records the date they
   were looking at, and Confirmed is held to the same test as the rest.

   The cost of that: a Cnfrmd ticked by hand on the sheet carries no date,
   so it will not light here. That is the intended direction. Every green
   mark on this row is backed by a date somebody actually stated. */
function stepsHtml(b){
  var told      = state.ledgerById[b.id] || {};
  var onBox     = toYmd(b.schDate);
  var lit       = function(d){ return !!onBox && !!d && toYmd(d) === onBox; };

  var scheduled = lit(told.scheduled);  // request emailed, OR booked in a portal
  var notified  = lit(told.notified);   // the site was told
  var confirmed = lit(told.confirmed);  // hauler clicked their link, OR a portal accepted it

  /* ---- Scheduled is clickable on PORTAL boxes ONLY ----
     On a portal box, nothing is sent - you go and book it yourself, and the
     only thing that can ever know you did is you. So you say so, and the click
     is the record.

     On an email or phone box it must NOT be clickable. There, Scheduled means
     "the request went out", and the send is what lights it. A hand-clickable
     box would let somebody tick a request they never actually sent - the same
     false-green we spent this morning removing, wearing a different hat. */
  var canBook = onSchedulePage() && b.channel === "portal";

  function step(done, label){
    if(done) return '<span class="step done"><span class="chk">\u2713</span><span class="lbl-txt">'+label+'</span></span>';
    return '<span class="step todo"><span class="box"></span><span class="lbl-txt">'+label+'</span></span>';
  }
  function bookStep(done){
    if(done) return step(true, "Scheduled");
    return '<button class="step todo step-btn" data-book="'+esc(b.id)+'" title="Book this in the portal, then record the date you got">'+
             '<span class="box"></span><span class="lbl-txt">Scheduled</span></button>';
  }

  var sep = '<span class="step-sep">\u203a</span>';
  return '<span class="steps">'+
    (canBook ? bookStep(scheduled) : step(scheduled,"Scheduled")) + sep +
    step(notified,"Notified") + sep +
    step(confirmed,"Confirmed") +
  '</span>';
}

/* ---------- suggested-pickup chip (schedule-service rows only) ----------
   Trails after the Scheduled › Notified › Confirmed block so those three stay
   anchored. Shows the same suggestedPickupFor() value as the detail panel — the
   date typed into the portal. Empty string when the box has no usable
   rule, so it simply doesn't render. Suppression on "Notified" happens once
   that write-back exists (Phase 2); until then it shows for every action box. */

/* ---------- a person disagreeing with the scanner ----------
   The scanner never reads any of this. It recomputes every box from CES facts
   at 4:30 each morning and knows nothing about overrides. This is a dashboard
   overlay, and it is deliberately ASYMMETRIC:

     MOVED IN  survives the night. It creates work, and work quietly forgotten
               is the failure that matters. It ends when the customer is told.

     DISMISSED does NOT survive the night - it is scoped to the scan tab it was
               made on, so tomorrow it simply is not there. It HIDES work, and a
               hidden full compactor is the failure that matters. Worst case the
               box nags again tomorrow. Annoying; never dangerous.

   Each one lives exactly as long as its own failure direction stays safe. */
function notifiedLit(b){
  var told = state.ledgerById[b.id] || {};
  var onBox = toYmd(b.schDate);
  return !!onBox && !!told.notified && toYmd(told.notified) === onBox;
}
function movedIn(b){
  var o = state.overrideById[b.id];
  // Ends when the customer has been told - the same rule that takes any other
  // box off the list. No separate expiry to write, or to forget to write.
  return !!o && o.kind === "in" && !notifiedLit(b);
}
function dismissedNow(b){
  var o = state.overrideById[b.id];
  // Only honoured on the tab it was made on. That IS the expiry.
  return !!o && o.kind === "out" && o.tab && o.tab === state.currentTab;
}

/* ---------- the date we would actually put in an email ----------
   Sch Date if the box has one - somebody booked that, in a portal, and took
   whatever day the portal had. Our suggestion only when nothing real exists. */
function pickupYmdFor(b){
  var onBox = toYmd(b.schDate);
  if(onBox) return onBox;
  var sug = suggestedPickupFor(b);
  return sug ? sug.value : "";
}

function fmtChipDate(ymd){
  var p = String(ymd || "").split("-");
  if(p.length !== 3) return ymd || "";
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  if(isNaN(d.getTime())) return ymd;
  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var mons = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return days[d.getDay()] + " " + mons[d.getMonth()] + " " + d.getDate();
}

/* ---------- the split pill: [ date | Email(s) ] ----------
   The date is not decoration sitting beside a button. It is the ARGUMENT the
   button acts on - press it and that is the date the hauler and the customer
   are both told. Read left to right it says what will happen, which is why the
   halves are welded together instead of being two separate chips.

   It says Email(s), not Send. Nothing leaves from here: it opens the review
   queue, and you send from there having read what you are about to say. A
   button labelled Send that does not send has already started lying. */
function emailPillHtml(b){
  var ymd = pickupYmdFor(b);
  if(!ymd) return "";
  var booked = !!toYmd(b.schDate);
  var sug = suggestedPickupFor(b);
  var label = booked ? fmtChipDate(ymd) : (sug ? sug.label : fmtChipDate(ymd));
  var title = booked ? ("Scheduled for " + ymd)
                     : ("Suggested pickup" + (sug ? " per " + sug.rule : ""));
  return '<span class="em-pill">'+
    '<span class="em-date" title="'+esc(title)+'">'+esc(label)+'</span>'+
    '<button class="em-go" data-mail="'+esc(b.id)+'" data-date="'+esc(ymd)+'" '+
      'title="Open the drafts for this box">Email(s) \u2197</button>'+
  '</span>';
}

/* ---------- why is this box on the action list? ----------
   A box can be flagged for service by fill, by days-overdue, by cycles,
   or by a set-schedule rule. When there's no fill reading, surface
   whichever trigger is actually driving the YES so the row explains
   itself instead of showing an empty bar. Returns null when fill exists
   (the fill bar is the reason and the hero). */
function triggerReason(b){
  // Helper: express a large hour count as readable days + hours.
  function dur(h){
    return humanHours(h) + " since cycle";
  }
  // set-schedule marker is the explanation if present — it's a rule, not a reading
  var setTok = b.advTokens.find(function(t){ return /SET SCHED/i.test(t); });
  if(setTok) return { kind:"sched", label:"set schedule", detail:setTok.replace(/^SET SCHED\s*-?\s*/i,"") };
  // STALE / OFFLINE wins over days-overdue: a box that hasn't cycled in a
  // week+ is an offline problem (the root cause), not merely "overdue for a
  // pickup". The scanner's own stale threshold is ~168h (7 days). Surfacing
  // this as "stale" is more accurate than "60 of 7 days overdue".
  if(b.lastCycle!=null && b.lastCycle >= 168)
    return { kind:"stale", label:"not cycling", detail:dur(b.lastCycle) };
  // days over its trigger (genuinely overdue but still cycling)
  if(b.days!=null && b.daysTrig!=null && b.days >= b.daysTrig)
    return { kind:"days", label:"days overdue", detail:b.days+" of "+b.daysTrig+" days" };
  // cycles over its trigger
  if(b.cycles!=null && b.cyclesTrig!=null && b.cycles >= b.cyclesTrig)
    return { kind:"cycles", label:"over cycles", detail:b.cycles+" of "+b.cyclesTrig+" cycles" };
  // lesser staleness (24h–168h) — quieter than "not cycling" but still worth noting
  if(b.lastCycle!=null && b.lastCycle >= 24)
    return { kind:"stale", label:"stale", detail:dur(b.lastCycle) };
  // fallback: days present without trigger, or nothing specific
  if(b.days!=null) return { kind:"days", label:"days", detail:b.days+(b.daysTrig!=null?" of "+b.daysTrig:"")+" days" };
  return { kind:"other", label:"flagged", detail:"" };
}

function fillIndicator(b, fc, pctW, trigL){
  // Fill reading exists → the recessed fill bar is the hero.
  if(b.pct != null){
    var _n=10, _on=Math.max(0,Math.min(_n,Math.round(b.pct/10))), _bars='';
    for(var _k=0;_k<_n;_k++){ _bars += '<i style="height:'+(5+_k*1.35).toFixed(1)+'px;background:'+(_k<_on?fc.bar:'var(--track)')+';"></i>'; }
    return '<div class="fill-wrap">'+
      '<div class="gauge-row">'+
        '<span class="gauge-pct" style="color:'+fc.txt+';">'+Math.round(b.pct)+'%</span>'+
        '<span class="gauge-bars">'+_bars+'</span>'+
      '</div>'+
      (b.trig==null?'':'<div class="gauge-trig">trig '+Math.round(b.trig)+'</div>')+
    '</div>';
  }
  // No fill reading → surface the real trigger reason instead of an empty bar.
  var r = triggerReason(b);
  return '<div class="fill-wrap reason reason-'+r.kind+'">'+
    '<div class="reason-label">'+esc(r.label)+'</div>'+
    (r.detail?'<div class="reason-detail">'+esc(r.detail)+'</div>':'')+
  '</div>';
}

/* ---------- row html ---------- */
/* showHaul: put the hauler code in the row's own meta line.
   It used to be welded to bucketTag - the search-results flag - so the only
   way to show a hauler was to also stamp the row with a "schedule service"
   chip it did not need. A box standing on its own with no group header above
   it still has to say who hauls it; that is the one fact the whole page
   exists to answer. So the two are now separate switches. */
// The two per-row action icons - Draft an email (envelope) and Move this box
// (folder+arrow) - shown on EVERY box in every view, so any box can be emailed
// about or moved regardless of its bucket. Move still requires a typed reason
// (moveStripHtml) and a new scan overrides it, so it can't happen silently.
function rowActionsHtml(b){
  return '<div class="row-acts">'+
    '<button class="rowicon" type="button" data-draft="'+esc(b.id)+'" aria-label="Draft an email">'+
      '<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>'+
      '<span class="tip">Draft an email</span></button>'+
    '<button class="rowicon" type="button" data-move="'+esc(b.id)+'" aria-label="Move this box">'+
      '<svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M10 13h6m0 0-2.2-2.2M16 13l-2.2 2.2"/></svg>'+
      '<span class="tip">'+(movedIn(b) || dismissedNow(b) ? "Review the override" : "Move this box")+'</span></button>'+
  '</div>';
}

function rowHtml(b, missed, bucketTag, showHaul){
  var fc = fillColor(b.pct, b.trig);
  var ec = edgeColor(b.pct, b.trig);
  var pctW = b.pct==null ? 0 : Math.max(0, Math.min(100, b.pct));
  var trigL = b.trig==null ? null : Math.max(0, Math.min(100, b.trig));
  var open = state.openId === b.id;

  // In search results, tag which bucket the box lives in.
  var bTag = "";
  if(bucketTag){
    var labels = { action:"schedule service", needsempty:"record empty", handsoff:"hands-off", monitor:"monitor down", scheduled:"scheduled", stale:"stale", clear:"clear", inactive:"inactive" };
    bTag = '<span class="bucket-tag bt-'+bucketTag+'">'+labels[bucketTag]+'</span>';
  }

  var metaInner;
  if(missed){
    metaInner = '<span class="missed-flag">⚠ missed pickup'+(b.puDate?' · expected '+esc(shortDay(b.puDate)):'')+'</span>' + bTag;
  } else {
    metaInner = '<span class="row-id"><span class="box-id-strong">#'+esc(b.id)+'</span>'+
      ((bucketTag || showHaul) ? ' · '+esc(b.haulCode) : '')+' · '+esc(b.channel)+'</span>' + bTag +
      (movedIn(b) ? '<span class="moved-tag">moved in</span>' : '') +
      (dismissedNow(b) ? '<span class="moved-tag">dismissed</span>' : '') +
      (alsoStale(b) ? '<span class="also-stale-tag">also not cycling</span>' : '');
  }

  var fillBlock = fillIndicator(b, fc, pctW, trigL);

  return ''+
    '<div class="row'+(open?' open':'')+(missed?' missed':'')+(movedIn(b)?' moved-in':'')+'" data-id="'+esc(b.id)+'">'+
      '<div class="edge" style="background:'+(missed?'#A32D2D':ec)+';"></div>'+
      '<div class="row-main">'+
        (function(){var _dp=String(b.desc||'').split(' \u00b7 ');var _c=_dp[0]||String(b.desc||'');var _s=_dp.slice(1).join(' \u00b7 ');return '<div class="row-name"><span class="row-name-text">'+esc(_c)+'</span>'+(_s?'<span class="row-site">'+esc(_s)+'</span>':'')+'</div>';})()+
        '<div class="row-meta">'+metaInner+'</div>'+
        (movedIn(b) || dismissedNow(b)
          ? '<div class="moved-why">'+esc(state.overrideById[b.id].reason || "no reason given")+
            ' \u2014 the scanner said ' + esc(b.pct==null ? "no reading" : (b.pct + "%")) +
            ', ' + (b.need.indexOf("YES")!==-1 ? "service needed" : "no action") + '</div>'
          : '')+
      '</div>'+
      fillBlock+
      rowActionsHtml(b)+
      '<div class="chev">▾</div>'+
    '</div>'+
    bookStripHtml(b)+
    moveStripHtml(b);
}

/* ---------- the move strip ----------------------------------------------
   It lives in the EXPANDED row, not on the meta line. That line already carries
   the box id, the channel, three marks and the pill; a fifth thing tips it over.
   It also means a move cannot happen by accident - you open the row, you type a
   reason, you commit.

   The reason is required. Not bureaucracy: an override with no reason is
   indistinguishable from a mis-click a week later, and it is the reason that
   turns a box dismissed three mornings running into a bug report about its
   trigger rather than a box that keeps mysteriously coming back. */
function moveStripHtml(b){
  if(state.moveOpenId !== b.id) return "";
  var onAction = state.actionBoxes.indexOf(b) !== -1 || dismissedNow(b);
  var out = onAction && !movedIn(b);   // on the action list -> the move is OUT

  if(movedIn(b)){
    return '<div class="move-strip in">'+
      '<span class="move-q">Moved onto the list by hand</span>'+
      '<span class="move-note">' + esc(state.overrideById[b.id].reason || "") + '</span>'+
      '<button class="move-go in" data-clear="'+esc(b.id)+'">Undo the move</button>'+
      '<button class="move-x" data-movex="1">Close</button>'+
    '</div>';
  }
  if(dismissedNow(b)){
    return '<div class="move-strip out">'+
      '<span class="move-q">Dismissed for today</span>'+
      '<span class="move-note">' + esc(state.overrideById[b.id].reason || "") + '</span>'+
      '<button class="move-go out" data-clear="'+esc(b.id)+'">Put it back</button>'+
      '<button class="move-x" data-movex="1">Close</button>'+
    '</div>';
  }
  if(out){
    return '<div class="move-strip out">'+
      '<span class="move-q">Dismiss until tomorrow\u2019s scan \u2014 why?</span>'+
      '<input class="move-in-txt" id="moveReason" placeholder="e.g. sensor stuck, called the site \u2014 box is empty">'+
      '<button class="move-go out" id="moveGo" data-id="'+esc(b.id)+'" data-kind="out">'+
        (state.moveBusy ? "Saving\u2026" : "Dismiss for today") + '</button>'+
      '<button class="move-x" data-movex="1">Cancel</button>'+
      '<span class="move-note">Gone from this list until the 4:30 AM scan. The scanner does not '+
        'know about this and will judge the box tomorrow exactly as it would any other day.</span>'+
    '</div>';
  }
  return '<div class="move-strip in">'+
    '<span class="move-q">Move to Schedule Service \u2014 why?</span>'+
    '<input class="move-in-txt" id="moveReason" placeholder="e.g. site called, they need it Thursday">'+
    '<button class="move-go in" id="moveGo" data-id="'+esc(b.id)+'" data-kind="in">'+
      (state.moveBusy ? "Saving\u2026" : "Move it") + '</button>'+
    '<button class="move-x" data-movex="1">Cancel</button>'+
    '<span class="move-note">Stays on the list until the customer has been notified.</span>'+
  '</div>';
}

/* ---------- the booking strip ------------------------------------------
   THE WHOLE POINT OF THIS THING is that the date is editable.

   The dashboard suggests Tuesday. The portal offers Thursday, and you take
   Thursday, because that is how portals go. If this recorded the SUGGESTION,
   the sheet would hold a date no hauler ever agreed to - and then the customer
   notice would announce it, and all three marks would validate happily against
   it, and nothing anywhere would look wrong. The wrong day would simply
   propagate, quietly, to a customer.

   Pre-filled with the suggestion because that is usually right; one keystroke
   from being changed because sometimes it is not. */
function bookStripHtml(b){
  if(state.bookOpenId !== b.id) return "";
  var sug = suggestedPickupFor(b);
  var val = sug ? sug.value : toDateInputValue(new Date());
  return '<div class="book-strip" data-book-strip="'+esc(b.id)+'">'+
    '<span class="book-q">Booked in the portal for</span>'+
    '<input type="date" id="bookDate" value="'+esc(val)+'">'+
    '<button class="book-go" id="bookGo" data-id="'+esc(b.id)+'">'+
      (state.bookBusy ? 'Saving\u2026' : 'Record it')+'</button>'+
    '<button class="book-x" id="bookX">Cancel</button>'+
    '<span class="book-hint">Ticks Scheduled and Confirmed \u2014 the portal accepting it is the confirmation.</span>'+
  '</div>';
}

/* ---------- expanded detail (monitoring focus) ---------- */
function monWrap(html){
  return '<div class="mon-split"><div class="mon-rows">'+html+'</div>'+

function monDetailPane(){

  var _wf=stepsHtml(b)+(onSchedulePage()?emailPillHtml(b):"");
  var _parts=String(b.desc||'').split(' \u00b7 ');

         '<div class="mdh-hero">'+
           '<div class="mdh-fill" style="color:'+(_p==null?'var(--ink-3)':_fc.txt)+';">'+(_p==null?'\u2014':_p+'%')+'</div>'+
           '<div class="mdh-cap">Fill level'+(b.trig!=null?' \u00b7 trigger '+Math.round(b.trig)+'%':'')+'</div>'+
           (_p==null?'':'<div class="mdh-track"><span style="width:'+_p+'%;background:'+_fc.bar+';"></span></div>')+

           ' Compose service email</button>'+
         (_wf?'<div class="mdh-wf"><span class="mdh-wf-t">Scheduling</span>'+_wf+'</div>':'')+
