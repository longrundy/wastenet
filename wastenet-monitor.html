    '<tr><td style="padding:0 28px 20px;"><img src="'+COMPOSE_LOGO+'" alt="WasteNet" width="150" style="display:block;border:0;"></td></tr>'+
    '<tr><td style="padding:14px 28px 20px;border-top:1px solid #E4E7E0;font-family:Arial,Helvetica,sans-serif;">'+
    '<div style="font-size:11px;font-weight:bold;color:#525A60;margin-bottom:5px;">Wasteflo, Inc. d.b.a. WasteNet</div>'+
    '<div style="font-size:10px;line-height:1.5;color:#8A8F8A;font-style:italic;">'+COMPOSE_DISCLAIMER+'</div>'+
    '</td></tr></table></td></tr></table>';
}
var COMPOSE_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var compose = { boxId:null, type:null, months:{}, year:"2026" };
var composeRsOpen = false, composeDiscOpen = false;

function composeBccAll(){
  var b = compose.bcc.slice();
  if(b.map(function(x){ return x.toLowerCase(); }).indexOf("office@wastenetinc.com") === -1) b = b.concat(["office@wastenetinc.com"]);
  return b;
}
function composeRecipSummaryHtml(){
  if(!compose.type) return "";
  var bcc = composeBccAll();
  function part(l, arr){ return arr.length ? '<span class="rs-part">'+l+': <b>'+arr.length+'</b></span>' : '<span class="rs-part dim">'+l+': \u2014</span>'; }
  function detail(l, arr, note){ return '<div class="rd"><span class="rk">'+l+'</span><span class="rv">'+(arr.length ? esc(arr.join("; ")) : '<span class="auto">none</span>')+(note ? ' <span class="auto">'+note+'</span>' : '')+'</span></div>'; }
  return '<div class="cmp-recip-sum'+(composeRsOpen ? " open" : "")+'">'+
    '<div class="rs-line" onclick="toggleComposeRs()">'+part("To", compose.to)+'<span class="sep">\u00b7</span>'+part("Cc", compose.cc)+'<span class="sep">\u00b7</span><span class="rs-part">Bcc: <b>'+bcc.length+'</b></span><span class="rs-car">\u25be</span></div>'+
    '<div class="rs-detail">'+detail("To", compose.to)+detail("Cc", compose.cc)+detail("Bcc", bcc, "(office@ always added)")+'</div>'+
  '</div>';
}
function toggleComposeRs(){
  composeRsOpen = !composeRsOpen;
  var el = document.querySelector(".cmp-recip-sum");
  if(el) el.classList.toggle("open", composeRsOpen);
}
function toggleComposeDisc(){
  composeDiscOpen = !composeDiscOpen;
  var t = document.querySelector(".cmp-disc-toggle"), b = document.querySelector(".cmp-disc-body");
  if(t){ t.classList.toggle("open", composeDiscOpen); var l = t.querySelector(".lbl"); if(l) l.textContent = (composeDiscOpen ? "Hide" : "Show")+" legal disclaimer"; }
  if(b) b.classList.toggle("show", composeDiscOpen);
}

// The values this box fills into a draft's placeholders, for the preview.
function composeVals(box){
  var loc = box ? String(box.fullDesc || box.desc || "") : "";
  var green = function(s){ return '<span style="color:#3B6D11;font-weight:bold;">'+esc(s)+'</span>'; };
  var siteLine = loc ? '<span style="color:#3B6D11;font-weight:bold;">\u2022 '+esc(loc)+'</span>' : "";
  var v = { "box description":siteLine, "box list":siteLine, "service description":siteLine };
  var sug = box ? (function(){ try { return suggestedPickupFor(box); } catch(e){ return null; } })() : null;
  if(sug && sug.label) v["pickup date"] = green(sug.label);
  if(compose.type === "Weights"){
    v["year"] = green(compose.year || "2026");
    var ms = COMPOSE_MONTHS.filter(function(n,i){ return compose.months[i]; }).join(", ");
    v["months"] = ms ? green(ms) : '[months]';
  }
  return v;
}
function composeMonthsStr(){ return COMPOSE_MONTHS.filter(function(n,i){ return compose.months[i]; }).join(", "); }

function refreshComposePreview(){
  var rsum = document.getElementById("cmpRsum");
  if(rsum) rsum.innerHTML = composeRecipSummaryHtml();
  var prev = document.getElementById("cmpPreview");
  if(!prev) return;
  var subjEl = document.getElementById("cmpSubj"), bodyEl = document.getElementById("cmpBody");
  if(!subjEl || !bodyEl){
    prev.innerHTML = '<div class="cmp-empty">Pick an email type to see the preview build here.</div>';
    return;
  }
  var box = boxById(compose.boxId);
  var vals = composeVals(box);
  var subj = String(subjEl.value || "");
  Object.keys(vals).forEach(function(k){
    var plain = String(vals[k]).replace(/<[^>]+>/g,"").replace(/^\u2022\s*/,"");
    subj = subj.split("["+k+"]").join(plain);
  });
  var bodyHtml = composeFill(bodyEl.value, vals);
  prev.innerHTML =
    '<div class="cmp-prev-subj">Subject: <b>'+esc(subj)+'</b></div>'+
    '<div class="cmp-shell">'+
      '<div class="cmp-shell-body">'+bodyHtml+'</div>'+
      '<div class="cmp-shell-logo"><img src="'+COMPOSE_LOGO+'" alt="WasteNet" onerror="this.parentNode.innerHTML=\'<b style=&quot;color:#5CAA16;font-size:18px&quot;>WASTENET</b>\'"></div>'+
      '<div class="cmp-shell-foot">'+
        '<button type="button" class="cmp-disc-toggle'+(composeDiscOpen?" open":"")+'" onclick="toggleComposeDisc()"><span class="lbl">'+(composeDiscOpen?"Hide":"Show")+' legal disclaimer</span> <span class="c">\u25be</span></button>'+
        '<div class="cmp-disc-body'+(composeDiscOpen?" show":"")+'"><div class="co">Wasteflo, Inc. d.b.a. WasteNet</div>'+COMPOSE_DISCLAIMER+'</div>'+
      '</div>'+
    '</div>';
  var ro = document.getElementById("cmpMonthsRO");
  if(ro){ var ms = composeMonthsStr(); ro.innerHTML = ms ? '<b>[months]</b> \u2192 <b>'+esc(ms)+'</b>' : '<span class="muted">Pick the months you need.</span>'; }
}

var RECIP_ROLE = {
  hauler:   { label:"Hauler",   cls:"hauler",   dot:"#5CAA16" },
  customer: { label:"Customer", cls:"customer", dot:"#274766" },
  corp:     { label:"Corporate", cls:"corp",    dot:"#4A2E83" },
  staff:    { label:"Staff",    cls:"staff",    dot:"#7A5320" }
};
function recipRole(email){
  var k = String(email).toLowerCase();
  var f = (compose._book || []).filter(function(b){ return b.email.toLowerCase() === k; })[0];
  return f ? f.role : null;
}
function addRecip(which, email){
  email = String(email).trim(); if(!email) return;
  if(compose[which].indexOf(email) === -1) compose[which].push(email);
  renderRecip(which);
  refreshComposePreview();
}
function delRecip(which, email){
  compose[which] = compose[which].filter(function(e){ return e !== email; });
  renderRecip(which);
  refreshComposePreview();
}
function closeRecipMenus(){
  var m = document.querySelectorAll(".cmp-rmenu, .cmp-ta");
  for(var i=0;i<m.length;i++) m[i].parentNode.removeChild(m[i]);
}
function renderRecip(which){
  var box = document.getElementById("cmp-"+which+"-box");
  if(!box) return;
  var toks = compose[which].map(function(e){
    var r = recipRole(e), cls = r ? (" "+RECIP_ROLE[r].cls) : "";
    return '<span class="cmp-tok'+cls+'"><span class="a" title="'+esc(e)+'">'+esc(e)+'</span>'+
      '<button type="button" class="tx" data-del="'+esc(which)+'\u0001'+esc(e)+'">\u00d7</button></span>';
  }).join("");
  box.innerHTML = toks +
    '<input class="cmp-rin" data-rin="'+which+'" placeholder="'+(compose[which].length?"":"Type a name or address\u2026")+'">'+
    '<button type="button" class="cmp-addbtn" data-radd="'+which+'">+ Add \u25be</button>';
  wireRecip(which);
}
function wireRecip(which){
  var box = document.getElementById("cmp-"+which+"-box");
  if(!box) return;
  box.querySelectorAll("[data-del]").forEach(function(b){
    b.addEventListener("click", function(){ var p = b.getAttribute("data-del").split("\u0001"); delRecip(p[0], p[1]); });
  });
  var inp = box.querySelector("[data-rin]");
  inp.addEventListener("input", function(){ showRecipTypeahead(which, inp); });
  inp.addEventListener("keydown", function(e){ if(e.key === "Enter" && inp.value.trim()){ e.preventDefault(); addRecip(which, inp.value); closeRecipMenus(); } });
  inp.addEventListener("focus", function(){ box.closest(".cmp-rfield").classList.add("focus"); });
  inp.addEventListener("blur", function(){ box.closest(".cmp-rfield").classList.remove("focus"); });
  box.querySelector("[data-radd]").addEventListener("click", function(e){
    e.stopPropagation(); openRecipAddMenu(which, box.querySelector("[data-radd]"));
  });
}
function openRecipAddMenu(which, anchor){
  closeRecipMenus();
  var recip = boxRecip(compose.boxId);
  var roles = [["hauler",recip.hauler],["customer",recip.customer],["corp",recip.corp],["staff",recip.staff]].filter(function(r){ return r[1]; });
  if(!roles.length){ return; }
  var m = document.createElement("div"); m.className = "cmp-rmenu";
  m.innerHTML = '<div class="sec">Add this box\u2019s</div>' +
    roles.map(function(r){
      var meta = RECIP_ROLE[r[0]], n = splitEmails(r[1]).length;
      return '<button type="button" class="mi" data-role="'+which+'\u0001'+r[0]+'">'+
        '<span class="dot" style="background:'+meta.dot+'"></span>'+meta.label+
        '<span class="n">'+n+'</span></button>';
    }).join("");
  anchor.parentNode.appendChild(m);
  m.querySelectorAll("[data-role]").forEach(function(b){
    b.addEventListener("click", function(){
      var p = b.getAttribute("data-role").split("\u0001");
      splitEmails(boxRecip(compose.boxId)[p[1]]).forEach(function(e){ addRecip(p[0], e); });
      closeRecipMenus();
    });
  });
}
function showRecipTypeahead(which, inp){
  closeRecipMenus();
  var q = inp.value.trim().toLowerCase(); if(q.length < 2) return;
  var hits = (compose._book || []).filter(function(b){
    return b.email.toLowerCase().indexOf(q) !== -1 && compose[which].indexOf(b.email) === -1;
  }).slice(0, 6);
  if(!hits.length) return;
  var t = document.createElement("div"); t.className = "cmp-ta";
  t.innerHTML = hits.map(function(h){
    return '<div class="opt" data-pick="'+which+'\u0001'+esc(h.email)+'"><b>'+esc(h.email)+'</b><span class="role">'+esc(h.role)+'</span></div>';
  }).join("");
  inp.closest(".cmp-rfield").appendChild(t);
  t.querySelectorAll("[data-pick]").forEach(function(o){
    o.addEventListener("mousedown", function(){ var p = o.getAttribute("data-pick").split("\u0001"); addRecip(p[0], p[1]); closeRecipMenus(); });
  });
}

// Close recipient menus/type-ahead when clicking outside them (only while the
// compose modal is open). Attached once.
document.addEventListener("mousedown", function(e){
  var modal = document.getElementById("composeModal");
  if(!modal || !modal.classList.contains("show")) return;
  if(!e.target.closest(".cmp-rmenu, .cmp-ta, [data-radd], [data-rin]")) closeRecipMenus();
});

function openCompose(boxId){
  compose = { boxId:boxId, type:null, months:{}, year:"2026", to:[], cc:[], bcc:[], _book:buildAddressBook() };
  composeRsOpen = false; composeDiscOpen = false;
  var box = boxById(boxId);
  var desc = box ? String(box.fullDesc || box.desc || "") : "";

  var typeOpts = '<option value="">Choose a template\u2026</option>' +
    state.templateOrder.map(function(n){ return '<option value="'+esc(n)+'">'+esc(n)+'</option>'; }).join("") +
    '<option value="Blank">Blank email \u2014 custom</option>';

  var body_ =
    '<div class="cmp-head"><div class="cmp-title">Draft an email \u00b7 #'+esc(boxId)+(desc ? ' <span class="cmp-desc">\u2014 '+esc(desc)+'</span>' : '')+'</div>'+
      '<button class="cmp-x" type="button" id="cmpClose">Cancel</button></div>'+
    '<div class="cmp-panes">'+
      '<div class="cmp-left">'+
        '<div class="cmp-typebar"><label>Email type</label>'+
          '<select class="cmp-type" id="cmpType">'+typeOpts+'</select></div>'+
        '<div id="cmpForm"></div>'+
      '</div>'+
      '<div class="cmp-right">'+
        '<div class="cmp-rhead">Preview \u2014 exactly what goes out</div>'+
        '<div id="cmpRsum"></div>'+
        '<div class="cmp-prevwrap" id="cmpPreview"></div>'+
      '</div>'+
    '</div>'+
    '<div class="cmp-foot"><span class="cmp-note">Editing here never changes the saved template \u00b7 office@ auto-BCC\u2019d</span>'+
      '<button class="cmp-btn" type="button" id="cmpCancel">Close</button>'+
      '<button class="cmp-btn primary" type="button" id="cmpSend" disabled title="Sending turns on in the final step">Send</button></div>';

  var modal = document.getElementById("composeModal");
  modal.querySelector(".cmp-card").innerHTML = body_;
  modal.classList.add("show");

  document.getElementById("cmpClose").addEventListener("click", closeCompose);
  document.getElementById("cmpCancel").addEventListener("click", closeCompose);
  document.getElementById("cmpType").addEventListener("change", function(){ loadComposeType(this.value); });
  loadComposeType("");
}

// (Re)build the compose form for the chosen type. A named template pre-loads its
// recipients (as removable tokens), subject and body; Blank starts empty;
// switching type reloads fresh. Editing here never touches the saved template.
function loadComposeType(type){
  compose.type = type || null;
  compose.to = []; compose.cc = []; compose.bcc = []; compose.months = {}; compose.year = "2026";
  var form = document.getElementById("cmpForm");
  if(!form) return;

  if(!type){
    form.innerHTML = '<div class="cmp-empty">Pick an email type above \u2014 a template to start from, or Blank for a custom message.</div>';
    refreshComposePreview();
    return;
  }

  var isBlank = (type === "Blank");
  var tpl = (state.templates && state.templates[type]) || null;
  var rule = PILL_TO[type];
  var recip = boxRecip(compose.boxId);
  if(!isBlank && rule){
    splitEmails(recip[rule.to]).forEach(function(e){ compose.to.push(e); });
    if(rule.cc) splitEmails(recip[rule.cc]).forEach(function(e){ compose.cc.push(e); });
  }
  var subject = (!isBlank && tpl) ? (tpl.subjectTemplate || "") : "";
  var body    = (!isBlank && tpl) ? (tpl.bodyTemplate || "")    : "";

  var picker = "";
  if(type === "Weights"){
    picker = '<div class="cmp-picker"><div class="cmp-picker-h">Year &amp; months to request</div>'+
      '<div class="cmp-yr-row"><span class="cmp-lab">Year</span>'+
        '<select id="cmpYear" class="cmp-year"><option>2026</option><option>2027</option><option>2028</option></select></div>'+
      '<div class="cmp-months" id="cmpMonths">'+
        COMPOSE_MONTHS.map(function(n,i){ return '<button type="button" class="cmp-mo" data-mo="'+i+'">'+esc(n.slice(0,3))+'</button>'; }).join("")+
      '</div><div class="cmp-months-ro" id="cmpMonthsRO"></div></div>';
  }

  form.innerHTML =
    '<div class="cmp-rfield" data-f="to"><span class="rlabel">To</span><div class="cmp-rbox" id="cmp-to-box"></div></div>'+
    '<div class="cmp-rfield" data-f="cc"><span class="rlabel">Cc</span><div class="cmp-rbox" id="cmp-cc-box"></div></div>'+
    '<div class="cmp-rfield" data-f="bcc"><span class="rlabel">Bcc</span><div class="cmp-rbox" id="cmp-bcc-box"></div></div>'+
    picker+
    '<div class="cmp-field"><label>Subject</label><input class="cmp-input" id="cmpSubj" value="'+esc(subject)+'"></div>'+
    '<div class="cmp-field"><label>Body</label><textarea class="cmp-input cmp-textarea" id="cmpBody">'+esc(body)+'</textarea></div>';

  document.getElementById("cmpSubj").addEventListener("input", refreshComposePreview);
  document.getElementById("cmpBody").addEventListener("input", refreshComposePreview);
  renderRecip("to"); renderRecip("cc"); renderRecip("bcc");
  if(type === "Weights"){
    document.getElementById("cmpYear").addEventListener("change", function(){ compose.year = this.value; refreshComposePreview(); });
    form.querySelectorAll(".cmp-mo").forEach(function(mo){
      mo.addEventListener("click", function(){
        var i = +mo.getAttribute("data-mo");
        compose.months[i] = !compose.months[i];
        mo.classList.toggle("on", !!compose.months[i]);
        refreshComposePreview();
      });
    });
  }
  refreshComposePreview();
}

function closeCompose(){
  var modal = document.getElementById("composeModal");
  modal.classList.remove("show");
  modal.querySelector(".cmp-card").innerHTML = "";
}


/* ---------- lock screen ---------- (nav lives in logic.js) */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.classList.add("hide");
    document.getElementById("lockErr").style.display = "none";
    load();
  }

  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  // Already unlocked earlier this session? Go straight in.
  if(KEY){
    lock.classList.add("hide");
    load();
  } else {
    lockIn.focus();
  }
})();
</script>
