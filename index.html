              row) - the actions are visible the moment the proof
              opens instead of below a long scroll. The × close was
              retired at the same time: Back does the identical thing
              and two ways out of the same door read as clutter. */}
          {/* NO flexWrap here, per explicit design decision
              (2026-07-06): with a long box description the button
              group used to wrap onto its own row and land at the far
              LEFT (Box 967). Instead the text block shrinks and wraps
              WITHIN its own column (minWidth: 0 + wordBreak on the
              description) while the buttons stay pinned top-right on
              every proof, long description or short. */}
          <div style={{
            padding: '10px 14px 10px 20px', borderBottom: '1px solid ' + BRAND.line, background: BRAND.green,
            display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10,
          }}>
            {/* Two-line header, per explicit design decision
                (2026-07-06, matching the detail panel's header): Box
                ID + EMAIL PROOF on the title line, the box's
                description below it - so every proof states plainly
                which box it belongs to. Callers that don't pass box
                identity fall back to the plain one-line title. */}
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontFamily: monoFont, fontSize: 16, fontWeight: 800, color: '#CCFF66' }}>
                {boxId ? 'BOX #' + boxId + ' — EMAIL PROOF' : 'EMAIL PROOF'}
              </div>
              {boxDescription && (
                <div style={{ fontFamily: font, fontSize: 13, fontWeight: 700, color: '#FFFFFF', marginTop: 2, wordBreak: 'break-word' }}>
                  {boxDescription}
                </div>
              )}
            </div>
            {/* Stacked, equal-width action column pinned top-RIGHT,
                per explicit design decision (2026-07-06; right side
                chosen to match the detail panel's close placement and
                the identity-left / actions-right order every other
                card follows): Close (with an \u00D7 mark - a text
                glyph, never an emoji) on top in the electric header
                green, Send Email beneath it - same width, so the
                column reads as one symmetrical unit on every proof. */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'stretch', flexShrink: 0, width: 128 }}>
              <button
                onClick={() => { if (!sending) onCancel(); }}
                disabled={sending}
                style={{
                  padding: '7px 0', fontSize: 13, fontWeight: 700, borderRadius: 5,
                  border: 'none', cursor: sending ? 'default' : 'pointer',
                  background: '#CCFF66', color: BRAND.greenDark,
                  boxShadow: '0 1px 3px rgba(0,0,0,0.25)', fontFamily: font, whiteSpace: 'nowrap',
                }}
              >{'\u00D7'} Close</button>
              <button
                onClick={onConfirm}
                disabled={sending}
                style={sendLocked ? {
                  padding: '7px 0', fontSize: 13, fontWeight: 700, borderRadius: 5,
                  border: '1.5px solid rgba(255,255,255,0.6)', cursor: 'pointer',
                  background: 'transparent', color: '#E8F3DF', fontFamily: font, whiteSpace: 'nowrap',
                } : {
                  padding: '7px 0', fontSize: 13, fontWeight: 700, borderRadius: 5,
                  border: 'none', cursor: sending ? 'default' : 'pointer',
                  background: '#FFFFFF', color: sending ? BRAND.muted : BRAND.greenDark,
                  boxShadow: '0 1px 3px rgba(0,0,0,0.25)', fontFamily: font, whiteSpace: 'nowrap',
                }}
              >{sending ? 'Sending…' : 'Send Email'}</button>
            </div>
          </div>
          {/* Send-failure notice - was in the retired footer; now
              pinned directly under the header so it sits right next
              to the Send Email button that triggered it. */}
          {sendState === 'error' && (
            <div style={{
              margin: '10px 20px 0', padding: '6px 10px', background: 'rgba(179,64,43,0.08)',
              border: '1px solid ' + BRAND.red, borderRadius: 5, color: BRAND.red,
              fontSize: 12, fontWeight: 600,
            }}>Could not send: {sendError}</div>
          )}
          <div className="modal-body" style={{ flex: 1, overflow: 'auto' }}>
            {/* Optional caller-supplied controls rendered at the top
                of the proof sheet - the Quick Service proof puts its
                editable Pick-Up Date here; the detail panel passes
                nothing and the proof renders exactly as before. */}
            {headerExtra || null}
            <div style={{
              border: '1px solid #E2E6DE', borderRadius: 6, padding: '10px 12px',
              background: '#FFFFFF', boxShadow: '0 1px 3px rgba(0,0,0,0.15)', marginBottom: 12,
            }}>
              {/* From: row deliberately NOT shown, per explicit
                  design decision (2026-07-06, same treatment as Bcc)
                  - every email sends from WasteNet
                  <office@wastenetinc.com>, so the line carried no
                  information worth the space. */}
              {previewRow('To:', effectiveTo)}
              {previewRow('Cc:', effectiveCc)}
              {/* Bcc row deliberately NOT shown, per explicit design
                  decision (2026-07-06) - the office@ blind copy still
                  goes out on every send, it just doesn't need a line
                  on the proof. */}
              {previewRow('Subject:', subject)}
            </div>
            {/* The body gets the whole rest of the sheet, uncapped -
                the sheet itself scrolls, so a long email reads like a
                document instead of peering through a small box. When
                an HTML version exists (it always does for dashboard
                sends), the proof renders THAT - green confirm button
                and all - so what's proofed here is pixel-for-pixel
                what the recipient's mail client will show. Safe to
                inject: buildEmailHtml escapes every template-derived
                character before adding its own markup. */}
            {htmlBody ? (
              <div
                style={{ wordBreak: 'break-word' }}
                dangerouslySetInnerHTML={{ __html: htmlBody }}
              />
            ) : (
              <div style={{
                fontSize: 13, fontFamily: monoFont, color: BRAND.ink, lineHeight: 1.55,
                whiteSpace: 'pre-wrap', wordBreak: 'break-word',
              }}>{body}</div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // Idle state. The DETAIL panel arms proofing externally (the
  // Proof Email dropdown under the email-type pills) and shows its
  // missing-To warning up in the recipients section, so it renders
  // nothing here at all; the BATCH panel keeps this button and badge.
  if (hideIdleButton) return null;
  return (
    <div>
      <button
        onClick={() => canSend && onArm()}
        disabled={!canSend}
        style={{
          // White with the standard drop shadow, soft green label -
          // matching the MOVE button family, per explicit design
          // decision. When proofing isn't possible yet (no To
          // recipient), the label goes muted and the cursor says so.
          display: 'block', width: '100%', padding: '10px', textAlign: 'center',
          borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: font,
          border: '1px solid #E2E6DE', cursor: canSend ? 'pointer' : 'not-allowed',
          background: '#FFFFFF', boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
          color: canSend ? '#7CB84E' : '#C7CCC2',
        }}
      >{sendLabel}</button>
      {/* White pill with the standard drop shadow and red text, per
          explicit design decision (replacing the earlier solid-red
          version). Shared component = identical in the detail panel
          AND the batch panel. */}
      {!effectiveTo && noRecipientHint && (
        <div style={{
          marginTop: 8, padding: '8px 14px', background: '#FFFFFF',
          border: '1px solid #E2E6DE', boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
          borderRadius: 5, color: BRAND.red, textAlign: 'center',
          fontSize: 12.5, fontWeight: 700,
        }}>{noRecipientHint}</div>
      )}
    </div>
  );
}

// Quick Service proof - opened straight from a row's SRVC EMAIL pill
// on the Action Needed view, per explicit request (2026-07-06):
// tapping the pill goes DIRECTLY to the full-screen proof sheet of
// that box's Service email, skipping the detail panel entirely. The
// Pick-Up Date starts at the box's saved date (if any) or its
// Scheduling Rule's suggested date, and is editable right on the
// proof sheet - changing it live-rebuilds the subject, body, and
// confirm link before anything sends. Composition mirrors the detail
// panel's Service flow exactly (same fillEmailTemplate, same confirm
// link + token, same buildEmailHtml with the same bold phrases), so
// the two paths can never drift apart in what they send. Fixed
// recipient defaults, per explicit design decision: Haulers -> To,
// Customers -> Cc, no staff - anything fancier belongs in the detail
// panel, which remains one tap away on the row itself. Sending here
// does NOT write the Pick-Up Date to the sheet (composing never
// writes implicitly, same rule as everywhere else) - saving the date
// still happens in the detail panel.
function QuickServiceProof({ box, contacts, sheetName, onSendEmail, onSave, onClose, monoFont, font }) {
  const c = contacts || {};
  const schedSuggestedDate = c.schedulingRule ? computeSuggestedPickupDate(c.schedulingRule) : null;
  const schedSuggestedValue = schedSuggestedDate ? toDateInputValue(schedSuggestedDate) : '';
  const [puDateInput, setPuDateInput] = React.useState(() => toDateInputValue(box.puDate) || schedSuggestedValue);
  // Opens ALREADY in preview - that is this component's whole point.
  const [sendState, setSendState] = React.useState('preview');
  const [sendError, setSendError] = React.useState(null);
  // Save Date to Box - right on the proof sheet, per explicit request
  // (2026-07-06, replacing the earlier detail-panel-only rule for
  // THIS flow). Still its own deliberate button - sending an email
  // never writes the sheet implicitly.
  const [dateSaveState, setDateSaveState] = React.useState('idle'); // idle | saving | saved | error
  const [dateSaveError, setDateSaveError] = React.useState(null);
  const handleSaveDate = async () => {
    if (!puDateInput || dateSaveState === 'saving') return;
    setDateSaveState('saving');
    setDateSaveError(null);
    try {
      await onSave(box.boxId, { puDate: puDateInput });
      setDateSaveState('saved');
    } catch (err) {
      setDateSaveState('error');
      setDateSaveError(err.message || String(err));
    }
  };
  // Any edit to the date invalidates a shown "Saved" - the sheet now
  // holds something different from the screen.
  React.useEffect(() => {
    if (dateSaveState === 'saved' || dateSaveState === 'error') setDateSaveState('idle');
  }, [puDateInput]);

  // Send is BLOCKED until the date on screen has been saved to the
  // box, per explicit request (2026-07-06): a service email whose
  // date was never recorded on the sheet leaves no Request History
  // entry and no advisory trail. "Saved" means either the Save
  // button was used this session, or the box already had this exact
  // date saved when the proof opened. Editing the date after a save
  // re-blocks Send (the invalidation effect above flips saved ->
  // idle) until the new date is saved too.
  const dateIsSaved = dateSaveState === 'saved' ||
    (!!box.puDate && toDateInputValue(box.puDate) === puDateInput);

  // Service recipients now live on the Service Email Content tab
  // (column D = To, column E = Cc), per explicit design decision
  // (2026-07-06) - the SERVICE email is the only type that uses them.
  // Migration fallback: a box whose D/E cells are still blank uses its
  // Master Box List G/H recipients instead, so half-populated states
  // can never produce a recipient-less send; once D/E is filled for a
  // box, D/E is the only source its Service email uses.
  const effectiveTo = String(c.serviceToRecipients || '').trim() || String(c.toRecipients || '').trim();
  const effectiveCc = String(c.serviceCcRecipients || '').trim() || String(c.ccRecipients || '').trim();
  const outgoingBcc = withOfficeBcc('');

  const filled = fillEmailTemplate(c.subjectTemplate || '', c.bodyTemplate || '', puDateInput);
  const finalSubject = filled.subject;
  let finalBody = filled.body;
  // Bullet the compactor list - before the confirm link is appended,
  // so the link line can never pick up a bullet.
  finalBody = addBulletsToServiceList(finalBody);

  let confirmUrl = null;
  if (sheetName && finalBody) {
    confirmUrl = 'https://dashboard.wastenetinc.com/confirm' +
      '?b=' + encodeURIComponent(box.boxId) +
      '&t=' + encodeURIComponent(sheetName) +
      '&k=' + confirmToken(box.boxId, sheetName);
    if (/\[confirm link\]/i.test(finalBody)) {
      finalBody = finalBody.replace(/\[confirm link\]/gi, confirmUrl);
    } else {
      finalBody += '\n\n' + confirmUrl + '\n' + SERVICE_CONFIRM_SENTENCE_PLAIN;
    }
  }

  // Highlight phrases: the Service body's OWN compactor lines (with
  // and without their bullet, so the bullet character goes green
  // too), not just the Master Box List description - the two often
  // differ, and it's the template's wording that must stand out.
  const svcDescLines = getServiceDescriptionLines(c);
  const htmlBody = finalBody ? buildEmailHtml(finalBody, confirmUrl, 'Confirm Service Scheduled',
    [formatDateInputValue(puDateInput), box.description, 'FIRM SERVICE DATE!', 'Firm Service Date!']
      .concat(svcDescLines.map(l => '\u2022 ' + l))
      .concat(svcDescLines),
    SERVICE_CONFIRM_SENTENCE_PLAIN, SERVICE_CONFIRM_SENTENCE_HTML) : '';
  const bodyForSend = finalBody ? finalBody + emailSignaturePlain() : finalBody;
  const canSend = !!(effectiveTo && finalSubject && finalBody);

  const handleConfirmSend = async () => {
    if (sendState === 'sending') return;
    // Hard gate: no save, no send. The Send button renders in its
    // locked (outline) style and the red save-first message sits
    // beside the Save button until the date is saved.
    if (!dateIsSaved) return;
    setSendState('sending');
    setSendError(null);
    try {
      await onSendEmail({
        to: effectiveTo,
        cc: effectiveCc,
        bcc: outgoingBcc,
        subject: finalSubject,
        body: bodyForSend,
        html: htmlBody,
      });
      setSendState('sent');
    } catch (err) {
      setSendState('error');
      setSendError(err.message || String(err));
    }
  };

  // Editable Pick-Up Date, rendered INSIDE the proof sheet via
  // EmailSendBlock's headerExtra slot. The suggestion note matches
  // the detail panel's adaptive wording: holding the suggestion says
  // so plainly; anything else brings back a clickable "Suggested:".
  const dateEditor = (
    <div style={{
      border: '1px solid #E2E6DE', borderRadius: 6, padding: '8px 12px 9px',
      background: '#FFFFFF', boxShadow: '0 1px 3px rgba(0,0,0,0.15)', marginBottom: 12,
    }}>
      {/* Consolidated single card, per explicit design decision
          (2026-07-06): the header line carries the label, the
          suggestion state, and the Sched Rule pill together; the
          button row carries the save action and its status/lock
          message inline. Two content rows total (plus the date
          field), replacing the old label + note + button + notice
          stack that made this card dominate the sheet. */}
      <div style={{
        marginBottom: 6,
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8, flexWrap: 'wrap',
      }}>
        <span style={{
          fontSize: 11.5, fontWeight: 700, color: BRAND.green, textTransform: 'uppercase',
          letterSpacing: '0.03em', fontFamily: monoFont,
        }}>Pick-Up Date — edits update the email below</span>
        <span style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
          {/* Suggestion state lives up here now: quiet confirmation
              when the field holds the rule's own date, a clickable
              "Sug:" link to snap back when it doesn't. */}
          {schedSuggestedValue && (
            puDateInput === schedSuggestedValue ? (
              <span style={{ fontSize: 11.5, color: BRAND.muted, fontWeight: 400, textTransform: 'none', letterSpacing: 'normal' }}>suggested date shown</span>
            ) : (
              <button
                type="button"
                onClick={() => setPuDateInput(schedSuggestedValue)}
                title="Set back to the suggested date per this box's rule"
                style={{
                  background: 'none', border: 'none', padding: 0, margin: 0,
                  color: BRAND.greenDark, fontWeight: 700, fontFamily: font,
                  fontSize: 11.5, cursor: 'pointer', textDecoration: 'underline',
                }}
              >Sug: {schedSuggestedDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</button>
            )
          )}
          {c.schedulingRule && (
            <span style={{
              fontSize: 11, fontFamily: monoFont, fontWeight: 700, color: BRAND.green,
              background: '#FFFFFF', border: '1px solid #E2E6DE',
              boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
              borderRadius: 3, padding: '2px 6px',
            }}>Sched Rule: {c.schedulingRule}</span>
          )}
        </span>
      </div>
      <FriendlyDateInput
        value={puDateInput}
        onChange={e => setPuDateInput(e.target.value)}
        font={font}
      />
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 7, flexWrap: 'wrap' }}>
        <button
          onClick={handleSaveDate}
          disabled={!puDateInput || dateSaveState === 'saving'}
          title="Writes this date to the box's P/U Date field on the sheet"
          style={{
            padding: '7px 16px', fontSize: 13, fontWeight: 700, borderRadius: 5,
            border: 'none', fontFamily: font, color: '#FFFFFF', flexShrink: 0,
            background: dateSaveState === 'saving' ? BRAND.muted : BRAND.green,
            cursor: (!puDateInput || dateSaveState === 'saving') ? 'default' : 'pointer',
            opacity: (!puDateInput && dateSaveState !== 'saving') ? 0.55 : 1,
          }}
        >{dateSaveState === 'saving' ? 'Saving…' : 'Save Date to Box'}</button>
        {/* Everything to the right of the button is ONE inline status
            slot: red lock message while unsaved (firming up after a
            blocked Send attempt), green confirmation once saved, save
            error if the write failed. */}
        {dateSaveState === 'error' ? (
          <span style={{ fontSize: 12, fontWeight: 600, color: BRAND.red }}>Could not save: {dateSaveError}</span>
        ) : dateSaveState === 'saved' ? (
          <span style={{ fontSize: 12, fontWeight: 700, color: BRAND.greenDark }}>✓ Saved to Box {box.boxId}</span>
        ) : dateIsSaved ? (
          <span style={{ fontSize: 12, fontWeight: 700, color: BRAND.greenDark }}>✓ This date is already saved to the box</span>
        ) : (
          <span style={{ fontSize: 12.5, fontWeight: 700, color: BRAND.red }}>
            You must Save Date to Box to unlock the Send Email button above.
          </span>
        )}
      </div>
    </div>
  );

  // Post-send success card - the shared EmailSendBlock renders its
  // 'sent' state as an inline card (built for a parent panel), so
  // this standalone flow wraps that moment in its own small overlay
  // with a Done button instead.
  if (sendState === 'sent') {
    return (
      <div
        onClick={onClose}
        className="modal-overlay"
        style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.5)', zIndex: 95,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}
      >
        <div onClick={e => e.stopPropagation()} style={{
          background: BRAND.panel, borderRadius: 10, boxShadow: '0 12px 48px rgba(0,0,0,0.35)',
          padding: 20, maxWidth: 420, width: 'calc(100vw - 48px)', fontFamily: font,
        }}>
          <div style={{
            padding: '12px 14px', background: 'rgba(92,170,22,0.12)',
            border: '1.5px solid ' + BRAND.green, borderRadius: 6, color: BRAND.greenDark,
            fontSize: 13, fontWeight: 600, textAlign: 'center',
          }}>
            ✓ Service email sent for Box {box.boxId}
            <div style={{ fontSize: 11.5, fontWeight: 500, color: BRAND.greenDark, marginTop: 3 }}>
              Sent from office@wastenetinc.com — a copy was Bcc'd to the office@ mailbox.
            </div>
          </div>
          <button
            onClick={onClose}
            style={{
              display: 'block', width: '100%', marginTop: 10, padding: '10px', fontSize: 13.5,
              fontWeight: 700, borderRadius: 5, border: 'none',
              background: BRAND.green, color: '#FFFFFF', cursor: 'pointer', fontFamily: font,
            }}
          >Done</button>
        </div>
      </div>
    );
  }

  return (
    <EmailSendBlock
      sendLabel=""
      hideIdleButton={true}
      effectiveTo={effectiveTo}
      effectiveCc={effectiveCc}
      outgoingBcc={outgoingBcc}
      subject={finalSubject}
      body={bodyForSend}
      htmlBody={htmlBody}
      canSend={canSend}
      noRecipientHint=""
      sendState={sendState}
      sendError={sendError}
      onArm={() => setSendState('preview')}
      onCancel={onClose}
      onConfirm={handleConfirmSend}
      onReset={onClose}
      headerExtra={dateEditor}
      sendLocked={!dateIsSaved}
      boxId={box.boxId}
      boxDescription={box.description}
      monoFont={monoFont}
      font={font}
    />
  );
}

function QueueView({ boxes, onSelect, masterContacts, onSaveConfirmed, showConfirmPill, onMoveBox, activeView, sortBy, onSendEmail, sheetName, monoFont, font }) {
  // Per-row Confirmed save tracking for the CONF'D checkbox pills.
  // Keyed by boxId; an entry exists only while that row's save is in
  // flight ({ value }) or just failed ('error'). While saving, the
  // checkbox optimistically shows the value being saved; on success
  // the entry is cleared and the checkbox falls back to the fresh
  // server value (onSaveConfirmed re-fetches the tab as part of
  // saving); on failure it reverts to the last-known-good server
  // value and the row shows a brief error - the screen never shows a
  // checked box that didn't actually make it into the Sheet.
  const [confirmSaves, setConfirmSaves] = React.useState({});

  // Which box's Quick Service proof is open (SRVC EMAIL pill on the
  // Action Needed view) - straight-to-proof, no detail panel stop.
  const [quickProofBox, setQuickProofBox] = React.useState(null);

  // MOVE button state: which row's move menu is open (one at a time),
  // and per-row save tracking, same pattern as confirmSaves.
  // A successful move writes the View Override column and re-fetches
  // the tab, at which point the box naturally disappears from THIS
  // page and shows up on the chosen one - no manual list surgery.
  const [moveMenuBoxId, setMoveMenuBoxId] = React.useState(null);
  const [moveSaves, setMoveSaves] = React.useState({});
  const handleMoveBox = async (b, overrideValue) => {
    if (moveSaves[b.boxId] === 'saving') return;
    setMoveMenuBoxId(null);
    setMoveSaves(prev => ({ ...prev, [b.boxId]: 'saving' }));
    try {
      await onMoveBox(b.boxId, { viewOverride: overrideValue });
      setMoveSaves(prev => { const copy = { ...prev }; delete copy[b.boxId]; return copy; });
    } catch (err) {
      setMoveSaves(prev => ({ ...prev, [b.boxId]: 'error' }));
      setTimeout(() => {
        setMoveSaves(prev => { const copy = { ...prev }; if (copy[b.boxId] === 'error') delete copy[b.boxId]; return copy; });
      }, 3500);
    }
  };

  const handleToggleConfirmed = async (b) => {
    const current = confirmSaves[b.boxId];
    if (current && current !== 'error') return; // save already in flight for this row
    const next = !b.confirmed;
    setConfirmSaves(prev => ({ ...prev, [b.boxId]: { value: next } }));
    try {
      await onSaveConfirmed(b.boxId, { confirmed: next });
      setConfirmSaves(prev => { const copy = { ...prev }; delete copy[b.boxId]; return copy; });
    } catch (err) {
      setConfirmSaves(prev => ({ ...prev, [b.boxId]: 'error' }));
      setTimeout(() => {
        setConfirmSaves(prev => { const copy = { ...prev }; if (copy[b.boxId] === 'error') delete copy[b.boxId]; return copy; });
      }, 3500);
    }
  };

  if (boxes.length === 0) {
    return (
      <div style={{ textAlign: 'center', padding: '80px 20px', color: BRAND.muted }}>
        <div style={{ fontSize: 15, fontFamily: font }}>No boxes need attention right now.</div>
        <div style={{ fontSize: 12.5, marginTop: 6, fontFamily: monoFont }}>Adjust filters, or check back after the next scan.</div>
      </div>
    );
  }
  // One box row, rendered as a helper - all views render rows as a
  // flat list. (The batch feature's grouped folder-tab rendering was
  // removed per explicit design decision, 2026-07-06 - may return.)
  const renderRow = (b) => (
        <div key={b._key} className="row-hover" onClick={() => onSelect(b)} style={{
          display: 'flex', alignItems: 'center', gap: 16, padding: '14px 16px', cursor: 'pointer',
          background: '#FFFFFF', border: '1px solid #E2E6DE', borderRadius: 7,
          boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
        }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 0, flex: 1 }}>
                <span style={{ fontFamily: monoFont, fontSize: 15, color: BRAND.ink, fontWeight: 400 }}>
                  Box ID {b.boxId}{b.isInactive && <span style={{ fontWeight: 400, color: BRAND.muted }}> (Inactive Box)</span>}
                </span>
                <span style={{ fontWeight: 700, fontSize: 14.5, fontFamily: font, color: BRAND.green }}>{b.description}</span>
              </div>
              {/* MOVE button - white with a soft drop shadow and soft
                  green label, top-right of every card on all three
                  pages, per explicit design decision. Opens a small
                  dropdown of the three pages (current one disabled);
                  choosing one writes the View Override column via
                  update_box and the box hops pages on the refresh.
                  stopPropagation on the wrapper keeps every click in
                  here from also opening the detail panel. */}
              <div onClick={e => e.stopPropagation()} style={{ position: 'relative', flexShrink: 0 }}>
                <button
                  onClick={() => setMoveMenuBoxId(moveMenuBoxId === b.boxId ? null : b.boxId)}
                  disabled={moveSaves[b.boxId] === 'saving'}
                  style={{
                    background: '#FFFFFF',
                    color: moveSaves[b.boxId] === 'error' ? BRAND.red : '#7CB84E',
                    border: '1px solid #E2E6DE', borderRadius: 5, padding: '4px 12px',
                    fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, letterSpacing: '0.03em',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
                    cursor: moveSaves[b.boxId] === 'saving' ? 'default' : 'pointer',
                    opacity: moveSaves[b.boxId] === 'saving' ? 0.6 : 1,
                    whiteSpace: 'nowrap',
                  }}
                >{moveSaves[b.boxId] === 'saving' ? 'MOVING…' : moveSaves[b.boxId] === 'error' ? 'MOVE FAILED' : 'MOVE'}</button>
                {moveMenuBoxId === b.boxId && (
                  <React.Fragment>
                    {/* Invisible full-screen backdrop - a click
                        anywhere outside the menu closes it. */}
                    <div
                      onClick={() => setMoveMenuBoxId(null)}
                      style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 60 }}
                    />
                    <div style={{
                      position: 'absolute', right: 0, top: 'calc(100% + 4px)', zIndex: 61,
                      background: '#FFFFFF', border: '1px solid ' + BRAND.line, borderRadius: 6,
                      boxShadow: '0 4px 16px rgba(0,0,0,0.18)', minWidth: 190, overflow: 'hidden',
                    }}>
                      <div style={{
                        padding: '6px 12px', fontSize: 10, fontWeight: 700, color: BRAND.muted,
                        textTransform: 'uppercase', letterSpacing: '0.04em',
                        borderBottom: '1px solid ' + BRAND.line, fontFamily: monoFont,
                      }}>Move to…</div>
                      {MOVE_TARGETS.map(([viewKey, overrideValue, label]) => {
                        const isCurrent = viewKey === activeView;
                        return (
                          <button
                            key={viewKey}
                            disabled={isCurrent}
                            onClick={() => handleMoveBox(b, overrideValue)}
                            style={{
                              display: 'block', width: '100%', textAlign: 'left', padding: '9px 12px',
                              fontSize: 12.5, fontWeight: 600, fontFamily: font, border: 'none',
                              background: 'transparent',
                              color: isCurrent ? BRAND.muted : BRAND.ink,
                              cursor: isCurrent ? 'default' : 'pointer',
                            }}
                          >{label}{isCurrent ? ' (current page)' : ''}</button>
                        );
                      })}
                    </div>
                  </React.Fragment>
                )}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              {b.crossedStatus === 'crossed' && b.staleStatus !== 'stale' && <StatusPill meta={FILL_STATUS_META} statusKey="crossed" />}
              {/* Combined staleness pill - per explicit design
                  decision, the separate STALE SCAN pill + bare hours
                  pill were overkill on a page where every row is by
                  definition stale, so they're now ONE pill reading
                  "LAST CYCLE: 127h" (the hours figure comes from the
                  scanner's own "Last Cycle is X hours" note - it's
                  how long since the box last ran a compaction cycle,
                  which is exactly why it was flagged stale). Falls
                  back to the plain STALE SCAN pill for the rare box
                  flagged stale without a parseable hours figure. */}
              {b.staleStatus === 'stale' && (
                b.staleHours !== null ? (
                  <span style={{
                    fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.amber,
                    background: '#FFFFFF', border: '1px solid #E2E6DE',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
                    borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                  }}>LAST CYCLE: {formatDaysHours(b.staleHours)}</span>
                ) : (
                  <StatusPill meta={STALE_STATUS_META} statusKey="stale" />
                )
              )}
              {/* Hauler Code pill - informational (neutral gray rather
                  than a status color, so it never reads as an alert),
                  shown only when the box actually has a hauler code
                  rather than displaying a pointless placeholder pill
                  on every row. */}
              {/* Hauler pill - REMOVED entirely per explicit design
                  decision (was previously shown on the Action Needed
                  view only). The Haul Code data still rides on every
                  row, so Sort: Hauler keeps working unchanged. */}
              {/* Set Schedule marker - compact list-row companion to
                  the detail panel's full Set Schedule pill, driven by
                  Master Box List column K via masterContacts. Two
                  variants: red "NEVER SCHED" for hauler-self-managed
                  boxes (the do-not-order warning belongs at list
                  level, visible before anyone opens the box), and
                  green "SET SCHED" for named-day boxes WasteNet is
                  responsible for ordering. Kept to those two words
                  deliberately - the full text ("Every Monday and
                  Friday", the Box 1030 hybrid sentence) lives in the
                  detail panel where there's room; a list row just
                  needs the flag. Boxes with a blank column K get no
                  marker at all. */}
              {(() => {
                const ss = String(((masterContacts || {})[b.boxId] || {}).setSchedule || '').trim();
                if (!ss) return null;
                const neverSched = /^never\s+schedule/i.test(ss);
                return (
                  <span title={ss} style={{
                    fontSize: 10.5, fontWeight: 700, fontFamily: monoFont,
                    color: neverSched ? '#B3402B' : BRAND.green,
                    background: '#FFFFFF',
                    border: neverSched ? '1px solid #B3402B' : '1px solid #E2E6DE',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
                    borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                  }}>{neverSched ? '\u26D4 NEVER SCHED' : 'SET SCHED'}</span>
                );
              })()}
              {/* SRVC EMAIL pill - Action Needed view only, per
                  explicit request (2026-07-06): one tap goes STRAIGHT
                  to the proof sheet of this box's Service email (see
                  QuickServiceProof) with the suggested date already
                  filled in and editable right on the proof. Not
                  offered when the hauler is portal-serviced (no
                  Service email exists for them at all), when the box
                  is flagged NEVER SCHED (a one-tap order button
                  directly beside a do-not-order warning would be a
                  footgun), or when the box has no Service template on
                  the Master Box List. Muted-but-visible when the box
                  has no hauler To: address on file - visible bad data
                  is fixable data. stopPropagation keeps the tap from
                  also opening the detail panel. */}
              {activeView === 'crossed' && (() => {
                const c = (masterContacts || {})[b.boxId] || {};
                if (isPortalServicedHauler(b.haulCode)) return null;
                if (/^never\s+schedule/i.test(String(c.setSchedule || '').trim())) return null;
                if (!c.subjectTemplate && !c.bodyTemplate) return null;
                const hasTo = !!(String(c.serviceToRecipients || '').trim() || String(c.toRecipients || '').trim());
                return (
                  <button
                    onClick={e => { e.stopPropagation(); if (hasTo) setQuickProofBox(b); }}
                    disabled={!hasTo}
                    title={hasTo ? 'Proof & send this box\u2019s Service email' : 'No hauler email on file for this box - add one to the Master Box List'}
                    style={{
                      fontSize: 10.5, fontWeight: 700, fontFamily: monoFont,
                      color: hasTo ? BRAND.green : '#C7CCC2',
                      background: '#FFFFFF', border: '1px solid #E2E6DE',
                      boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
                      borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                      cursor: hasTo ? 'pointer' : 'not-allowed',
                    }}
                  >{/* Inline SVG envelope instead of the \u2709
                      character, per explicit design decision
                      (2026-07-06): Chrome OS (and some other
                      platforms) ignore the text-presentation
                      variation selector and force the BLUE color
                      emoji glyph regardless of CSS color. An SVG
                      with currentColor stroke inherits the pill's
                      green (and its muted gray when disabled) on
                      every platform, no font lottery. */}
                    <svg width="11" height="9" viewBox="0 0 16 12" fill="none" style={{ verticalAlign: '-1px', marginRight: 3 }}>
                      <rect x="0.75" y="0.75" width="14.5" height="10.5" rx="1.5" stroke="currentColor" strokeWidth="1.5" />
                      <path d="M1 1.5 L8 7 L15 1.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                    SRVC EMAIL</button>
                );
              })()}
              {/* Pickup Date pill - still only shown once a Pick-Up
                  Date has actually been saved for this box. */}
              {b.puDate && (
                <span style={{
                  fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.green,
                  background: 'rgba(92,170,22,0.08)', border: '1px solid rgba(92,170,22,0.3)',
                  borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                }}>PICKUP {formatSimpleDate(b.puDate)}</span>
              )}
              {/* CONF'D checkbox pill - per explicit design decision,
                  shown on EVERY row of the Action Needed view (and only
                  that view), NOT gated on a Pick-Up Date existing,
                  since portal-scheduled boxes (C-300/C-599) never get
                  a date entered here at all yet still need confirming.
                  Checking/unchecking saves to the Sheet immediately -
                  this replaced the detail panel's old Confirmed Yes/No
                  section entirely, so confirmations can be recorded
                  straight from the list without opening each box.
                  stopPropagation keeps the tap from ALSO opening the
                  row's detail panel. */}
              {showConfirmPill && (() => {
                const saveState = confirmSaves[b.boxId];
                const isSaving = saveState && saveState !== 'error';
                const isError = saveState === 'error';
                const shownChecked = isSaving ? saveState.value : b.confirmed;
                return (
                  <label
                    onClick={e => e.stopPropagation()}
                    style={{
                      display: 'inline-flex', alignItems: 'center', gap: 5,
                      // marginLeft auto pushes this pill to the FAR
                      // RIGHT of the pill row (flexbox), so CONF'D
                      // checkboxes line up vertically down the whole
                      // list for fast one-column check-off - per
                      // explicit design decision.
                      marginLeft: 'auto',
                      fontSize: 10.5, fontWeight: 700, fontFamily: monoFont,
                      color: isError ? '#FFFFFF' : '#1B4E79',
                      background: isError ? BRAND.red : '#FFFFFF',
                      border: '1px solid ' + (isError ? BRAND.red : '#E2E6DE'),
                      boxShadow: isError ? 'none' : '0 1px 3px rgba(0,0,0,0.15)',
                      borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                      cursor: isSaving ? 'default' : 'pointer', opacity: isSaving ? 0.6 : 1,
                    }}
                  >
                    <input
                      type="checkbox"
                      checked={shownChecked}
                      disabled={isSaving}
                      onChange={() => handleToggleConfirmed(b)}
                      style={{ width: 13, height: 13, accentColor: '#1B4E79', cursor: isSaving ? 'default' : 'pointer', margin: 0 }}
                    />
                    {isError ? 'SAVE FAILED' : "CONF'D"}
                  </label>
                );
              })()}
            </div>
          </div>
          {/* Trailing chevron - the only visual cue (besides cursor:pointer,
              which touchscreens ignore entirely) that this whole row is
              tappable. Sits outside the flexible content column so it never
              competes with the pill row for width, and stays put regardless
              of how many pills a box ends up showing. */}
          <span aria-hidden="true" style={{
            flexShrink: 0, fontSize: 20, lineHeight: 1, color: BRAND.muted, fontFamily: font,
          }}>›</span>
        </div>
  );

  return (
    <React.Fragment>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {boxes.map(b => renderRow(b))}
      </div>
      {quickProofBox && (
        <QuickServiceProof
          box={quickProofBox}
          contacts={(masterContacts || {})[quickProofBox.boxId]}
          sheetName={sheetName}
          onSendEmail={onSendEmail}
          onSave={onMoveBox}
          onClose={() => setQuickProofBox(null)}
          monoFont={monoFont}
          font={font}
        />
      )}
    </React.Fragment>
  );
}

// Converts an ISO timestamp string (or empty/missing value) into the
// yyyy-MM-dd format an HTML <input type="date"> requires. Uses UTC
// components for the same reason formatSimpleDate does above - the
// date a person picked shouldn't shift depending on the viewer's local
// timezone. Returns '' for anything unparseable, which is exactly what
// a date input needs to show as genuinely empty.
function toDateInputValue(value) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return '';
  const yyyy = d.getUTCFullYear();
  const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(d.getUTCDate()).padStart(2, '0');
  return yyyy + '-' + mm + '-' + dd;
}

// Converts a yyyy-MM-dd value (the live, in-progress Pick-Up Date INPUT
// value, not necessarily what's saved yet - per explicit design
// decision, the email should reflect whatever date is currently showing
// on screen) into the M/D/YYYY format used elsewhere on this dashboard.
// Parsed as separate y/m/d components rather than via `new Date(...)`
// directly, since a bare "yyyy-MM-dd" string is otherwise interpreted
// as UTC midnight by the Date constructor and can display as the
// previous day in timezones behind UTC.
function formatDateInputValue(value) {
  if (!value) return '';
  const parts = value.split('-');
  if (parts.length !== 3) return '';
  const year = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10);
  const day = parseInt(parts[2], 10);
  if (!year || !month || !day) return '';
  return month + '/' + day + '/' + year;
}

// Fills the Subject/Body templates from Master Box List with the
// current Pick-Up Date. Per explicit design decision (first of
// presumably more template fields to come): the Subject template
// already ends in a dash, and the date is appended right after it; the
// Body template contains the literal phrase "Firm Service Date!" and
// the date is inserted right after that phrase. If the Pick-Up Date
// input is empty, the templates are returned with that insertion point
// left as-is (nothing appended) rather than inserting a blank or
// placeholder-looking value, so an unscheduled box doesn't produce a
// confusing half-finished email.
function fillEmailTemplate(subjectTemplate, bodyTemplate, puDateInputValue) {
  const dateStr = formatDateInputValue(puDateInputValue);

  // Two ways the Pick-Up Date lands in a Service template, checked in
  // this order:
  //  1. An explicit [pickup date] placeholder (case-insensitive,
  //     replaced everywhere it appears) - the self-documenting option,
  //     visible as a reminder when editing the Service Email Content
  //     tab. Added per explicit design decision precisely so the
  //     insertion point isn't invisible to someone editing templates.
  //  2. If no placeholder exists, the ORIGINAL rules still apply
  //     unchanged, so no existing template needs editing: the Subject's
  //     trailing dash gets the date appended after it, and the Body's
  //     "Firm Service Date!" phrase gets the date inserted in front.
  // Either way, an empty Pick-Up Date leaves the template as-is
  // (placeholder visibly intact), never inserting a blank.
  let subject = subjectTemplate || '';
  if (dateStr && subject) {
    if (/\[pickup date\]/i.test(subject)) {
      subject = subject.replace(/\[pickup date\]/gi, dateStr);
    } else {
      subject = subject.replace(/-\s*$/, '- ' + dateStr);
    }
  }

  let body = bodyTemplate || '';
  if (dateStr && body) {
    if (/\[pickup date\]/i.test(body)) {
      body = body.replace(/\[pickup date\]/gi, dateStr);
    } else {
      body = body.replace(/Firm Service Date!/, dateStr + ' Firm Service Date!');
    }
  }

  return { subject, body };
}

// Parses a Service body template's property list for the per-property
// checkbox picker. The anchor is the "Please empty & return the
// following compactor(s):" line (matched loosely - case-insensitive,
// "&" or "and", tolerant of the exact wording around it), and - per
// explicit design decision, relying on the confirmed fact that the
// property list is always the LAST thing in every Service body - the
// block runs from the line after the anchor to the end of the body.
// Within the block, structure is detected rather than worded: a line
// ENDING IN A COLON (e.g. "Metro National Property:") is a group
// header, not a selectable property; every other non-blank line is one
// selectable property. Returns null when there's no anchor (not a
// standard service-request body). propCount lets the caller skip the
// picker UI entirely for single-property boxes, where there's nothing
// to choose.
function parseServiceProperties(bodyTemplate) {
  if (!bodyTemplate) return null;
  const lines = String(bodyTemplate).split(/\r?\n/);
  let anchorIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (/empty\s*(&|and)\s*return the following/i.test(lines[i])) { anchorIdx = i; break; }
  }
  if (anchorIdx === -1) return null;

  const items = [];
  for (let i = anchorIdx + 1; i < lines.length; i++) {
    const t = lines[i].trim();
    if (!t) continue;
    items.push({ type: /:\s*$/.test(t) ? 'header' : 'property', text: t });
  }
  const propCount = items.filter(function (it) { return it.type === 'property'; }).length;
  return { lines: lines, anchorIdx: anchorIdx, items: items, propCount: propCount };
}

// Extracts a box's SERVICE-facing compactor description line(s) from
// its Service Email Content body (column C) - the lines under the
// "Please empty & return the following compactor(s):" anchor, minus
// group headers, confirm-link placeholders, and any bullets a
// template author already typed. These are the descriptions the
// [service description] placeholder expands to in ANY email type, and
// the phrases the HTML bold+green pass highlights - deliberately NOT
// the Master Box List description, per explicit design decision
// (2026-07-06): the Service body's wording (David's service-facing
// text, phone numbers and all) is the one that recipients act on.
// Returns [] when the box has no Service body or no anchor line - and
// the placeholder is then deliberately left as literal text in the
// draft, same leave-it-visible convention as [months]: an obvious
// [service description] in the proof is a "this box's Service Email
// Content needs fixing" flag, where silent substitution could let a
// wrong description go out unnoticed.
function getServiceDescriptionLines(contacts) {
  const parsed = parseServiceProperties(String((contacts || {}).bodyTemplate || ''));
  if (!parsed) return [];
  return parsed.items
    .filter(function (it) { return it.type === 'property'; })
    .map(function (it) { return it.text.replace(/^[\u2022\-\*]\s*/, ''); })
    .filter(function (t) { return t && !/\[confirm link\]/i.test(t) && !/^https?:/i.test(t); });
}

// Rebuilds a Service body so its property block contains ONLY the
// checked properties (selectedIndexes = positions within parsed.items),
// preserving original order. A group header is kept exactly when at
// least one property beneath it (i.e. after it, before the next
// header) is checked - so a header can never go out dangling over an
// empty group. Everything from the start of the body through the
// anchor line is kept verbatim; one blank line separates it from the
// rebuilt list.
function rebuildServiceBody(parsed, selectedIndexes) {
  const sel = {};
  selectedIndexes.forEach(function (i) { sel[i] = true; });

  const headerHasChecked = {};
  let currentHeader = -1;
  parsed.items.forEach(function (it, idx) {
    if (it.type === 'header') currentHeader = idx;
    else if (sel[idx] && currentHeader !== -1) headerHasChecked[currentHeader] = true;
  });

  const kept = parsed.items.filter(function (it, idx) {
    return it.type === 'header' ? !!headerHasChecked[idx] : !!sel[idx];
  });

  return parsed.lines.slice(0, parsed.anchorIdx + 1).join('\n') + '\n\n' +
    kept.map(function (it) { return it.text; }).join('\n');
}

// Adds a bullet in front of every property line in a Service body's
// compactor list, per explicit request (2026-07-06) - headers (lines
// ending in a colon) stay plain, and lines that already start with a
// bullet or dash are left alone so a template author's own bullets
// are never doubled. Runs on the FINAL body (after any property-
// picker rebuild) and BEFORE the confirm link is appended, so exactly
// the lines that will send get bulleted and nothing else. Bodies
// without the anchor line pass through untouched; a literal
// [confirm link] placeholder line is skipped too.
function addBulletsToServiceList(body) {
  const parsed = parseServiceProperties(body);
  if (!parsed) return body;
  const out = parsed.lines.slice(0, parsed.anchorIdx + 1);
  for (let i = parsed.anchorIdx + 1; i < parsed.lines.length; i++) {
    const raw = parsed.lines[i];
    const t = raw.trim();
    if (t && !/:\s*$/.test(t) && !/^[\u2022\-\*]/.test(t) && !/\[confirm link\]/i.test(t) && !/^https?:/i.test(t)) {
      out.push('\u2022 ' + t);
    } else {
      out.push(raw);
    }
  }
  return out.join('\n');
}

function DetailPanel({ box, onClose, onSave, onSendEmail, contacts, emailTemplates, scanTitle, sheetName, onLoadHistory, monoFont, font, displayFont }) {
  // Request History - fetched fresh from the ledger each time a box's
  // panel opens (keyed on boxId, not object identity, so background
  // refreshes don't re-fetch it). null = still loading.
  const [history, setHistory] = React.useState(null);
  const [historyError, setHistoryError] = React.useState(null);

  // Reusable fetch - called on open (below) and again right after any
  // successful save from this panel (Save Date / Clear), so the
  // Request History card reflects the action that was just taken
  // without needing to close and reopen the box. Deliberately does NOT
  // blank the list while refreshing, so an update reads as the new
  // entry appearing rather than the whole card flickering through a
  // loading state.
  const fetchHistory = React.useCallback(async () => {
    try {
      const entries = await onLoadHistory(box.boxId);
      setHistory(entries);
      setHistoryError(null);
    } catch (err) {
      setHistoryError(err.message || String(err));
      setHistory([]);
    }
  }, [box.boxId, onLoadHistory]);

  React.useEffect(() => {
    setHistory(null);
    setHistoryError(null);
    fetchHistory();
  }, [fetchHistory]);

  // Turns a ledger entry into a friendly one-line description.
  const describeHistoryEntry = (e) => {
    const when = (() => {
      const d = new Date(e.ts);
      if (isNaN(d.getTime())) return e.ts;
      let hour = d.getHours();
      const ampm = hour >= 12 ? 'PM' : 'AM';
      hour = hour % 12; if (hour === 0) hour = 12;
      const min = String(d.getMinutes()).padStart(2, '0');
      return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear() + ' ' + hour + ':' + min + ampm;
    })();
    let what;
    if (e.event === 'REQUEST') what = 'Pickup scheduled for ' + (formatDateInputValue(e.pickupDate) || e.pickupDate);
    else if (e.event === 'CLEARED') what = 'Dates cleared';
    else if (e.event === 'CONFIRMED (link)') what = 'Confirmed ' + e.detail + ' (via email link)';
    else if (e.event === 'CONFIRMED (manual)') what = 'Confirmed manually on dashboard';
    else if (e.event === 'UNCONFIRMED (manual)') what = 'Confirmation unchecked on dashboard';
    else if (e.event === 'FORCED SRVC') what = 'Manually forced to Action Needed';
    else what = e.event + (e.detail ? ' — ' + e.detail : '');
    return { when, what };
  };

  // Suggested Pick-Up Date from the box's Scheduling Rule (NBD /
  // N-BD + weekend/holiday math). Computed up here because, per
  // explicit design decision (2026-07-05), it now PRE-FILLS the
  // Pick-Up Date field whenever the box has no saved date - so
  // scheduling the normal case is just one click on Save Date. A
  // saved date always wins over the suggestion.
  const schedSuggestedDate = (contacts && contacts.schedulingRule)
    ? computeSuggestedPickupDate(contacts.schedulingRule) : null;
  const schedSuggestedValue = schedSuggestedDate ? toDateInputValue(schedSuggestedDate) : '';
  const [puDateInput, setPuDateInput] = React.useState(() => toDateInputValue(box.puDate) || schedSuggestedValue);

  // Which email category pill is active. 'Service' uses the per-box
  // template from Master Box List (contacts.subjectTemplate/
  // bodyTemplate); any other label looks up the matching entry in
  // emailTemplates instead (the separate, generic Email Templates tab).
  // Defaults to the first non-Service category with a template, since
  // Service no longer appears in this panel at all (2026-07-06) - the
  // list page's SRVC EMAIL pill owns that flow now, for every box.
  const [emailCategory, setEmailCategory] = React.useState('Service');

  const portalServiced = isPortalServicedHauler(box.haulCode);
  React.useEffect(() => {
    if (emailCategory === 'Service') {
      setEmailCategory(firstNonServiceCategory(emailTemplates));
    }
  }, [box.boxId]);

  // Freeform draft for the 'Blank' email type - no sheet, no template,
  // just a subject line and body typed on the spot. Reset when a
  // different box is opened; deliberately KEPT when switching pills
  // back and forth so a half-written draft survives a peek at another
  // category.
  const [customSubject, setCustomSubject] = React.useState('');
  const [customBody, setCustomBody] = React.useState('');
  React.useEffect(() => { setCustomSubject(''); setCustomBody(''); }, [box.boxId]);

  // Send flow state - idle | preview | sending | sent | error (see
  // EmailSendBlock). Lives HERE at the top of DetailPanel (not inside
  // the email-section render block below) because React hooks aren't
  // allowed inside conditional render logic - same reasoning as the
  // Weights selections below. Reset whenever a DIFFERENT box is opened
  // or the email category pill changes, so an armed preview for one
  // email can never be confirmed after the content underneath it has
  // been swapped out. Keyed on boxId, not object identity, so the
  // 5-minute background refresh never wipes an in-progress preview.
  const [sendState, setSendState] = React.useState('idle');
  const [sendError, setSendError] = React.useState(null);
  React.useEffect(() => { setSendState('idle'); setSendError(null); }, [box.boxId, emailCategory]);

  // Which individual WasteNet Staff addresses are checked for
  // inclusion. Unlike Haulers/Customers (whole-group only), the Staff
  // group is a per-person multi-select: each address from the Master
  // Box List's Staff column renders as its own checkbox, and only the
  // CHECKED people ride along in whatever placement (To/Cc/Bcc) the
  // Staff selector is set to. Defaults to NONE checked per the same
  // design rule as the property picker - selecting is a deliberate
  // act each time. Reset when a DIFFERENT box is opened (keyed on
  // boxId, not object identity, so background refreshes never wipe
  // selections mid-edit).
  const [selectedStaff, setSelectedStaff] = React.useState([]);
  React.useEffect(() => { setSelectedStaff([]); }, [box.boxId]);

  // Which email-type pill's dropdown is open. The standalone Proof
  // Email button was removed per explicit design decision - proofing
  // now lives in a small dropdown under whichever category pill was
  // clicked. Reset keyed on box.boxId ONLY (not emailCategory),
  // because clicking a pill both selects the category AND opens its
  // menu - a category-keyed reset would slam the menu shut the same
  // instant it opened.
  const [emailMenuFor, setEmailMenuFor] = React.useState(null);
  React.useEffect(() => { setEmailMenuFor(null); }, [box.boxId]);
  const toggleStaff = (addr) => {
    setSelectedStaff(prev =>
      prev.includes(addr) ? prev.filter(a => a !== addr) : [...prev, addr]
    );
  };

  // Weights email month/year selections. The Weights template's body
  // contains literal [months], [year], and [box description]
  // placeholders (Email Templates tab, Pill Label "Weights") - months
  // is a multi-select (any number of the 12 can be checked), year is a
  // single choice between the current and previous year only, computed
  // fresh from today's date so this never needs a manual update each
  // January. Both live HERE at the top of DetailPanel (not inside the
  // email-section render block below) because React hooks aren't
  // allowed inside conditional render logic. Defaults: no months
  // checked (forcing a deliberate choice each time, since the whole
  // point is that the request is specific per email), current year.
  const [selectedMonths, setSelectedMonths] = React.useState([]);
  const [selectedYear, setSelectedYear] = React.useState(String(new Date().getFullYear()));

  const toggleMonth = (month) => {
    setSelectedMonths(prev =>
      prev.includes(month) ? prev.filter(m => m !== month) : [...prev, month]
    );
  };

  // Which properties (by position within the parsed Service property
  // list) are checked for inclusion in a composed Service email.
  // Defaults to NONE checked per explicit design decision - selecting
  // is a deliberate act each time. Reset whenever a DIFFERENT box is
  // opened (keyed on boxId, not object identity, since the box prop
  // object is replaced by every background refresh and resetting on
  // that would wipe selections mid-edit every few minutes).
  const [selectedProps, setSelectedProps] = React.useState([]);
  React.useEffect(() => { setSelectedProps([]); }, [box.boxId]);
  const togglePropItem = (idx) => {
    setSelectedProps(prev =>
      prev.includes(idx) ? prev.filter(i => i !== idx) : [...prev, idx]
    );
  };

  // Portal-scheduled haulers - per explicit design decision, boxes
  // whose Hauler Code is C-300 (Republic Services) or C-599 (WM) are
  // NOT scheduled by entering dates here at all: service requests for
  // these haulers go through their own online portals. For those
  // boxes, the Scheduling box's date fields / Save / Confirmed
  // controls are replaced entirely with a link to the right portal.
  // The code match is normalized (uppercased, punctuation/spaces
  // stripped) so "C-300", "C300", and "c-300" all count as the same
  // code rather than depending on exactly how it was typed into
  // Master Box List.
  const PORTAL_LINKS = {
    'C300': { name: 'Republic Services', url: 'https://www.republicservices.com/service-support/request' },
    'C599': { name: 'WM (Waste Management)', url: 'https://ebusiness.wmsbs.wm.com/Customer/Locations#' },
  };
  const normalizedHaulCode = String(box.haulCode || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const portal = PORTAL_LINKS[normalizedHaulCode] || null;

  // Three fully independent placement controls - per explicit design
  // decision, "Primary" (Master Box List's "To: Recipients" / Haulers
  // column), "Secondary" ("Cc: Recipients" / Customers), and "Staff"
  // (the "WasteNet Staff" column) are just three named groups, not
  // fixed to a specific email field. Each one independently can be
  // used as the email's To line, its Cc line, its Bcc line, or left
  // out of the email entirely ('off'). Any combination landing in the
  // same field (e.g. all three 'to') is also valid - they simply
  // combine into that one field. Per explicit design decision
  // (revised): ALL THREE now default to 'off', so every email starts
  // with no recipients at all and each group must be deliberately
  // switched on per send - no group is ever included by default.
  const [primaryPlacement, setPrimaryPlacement] = React.useState('off'); // 'to' | 'cc' | 'bcc' | 'off'
  const [secondaryPlacement, setSecondaryPlacement] = React.useState('off'); // 'to' | 'cc' | 'bcc' | 'off'
  const [staffPlacement, setStaffPlacement] = React.useState('off'); // 'to' | 'cc' | 'bcc' | 'off'

  // Save track for the date fields' manual Save button. (Confirmed no
  // longer lives on this panel at all - per explicit design decision
  // it moved to the list view as a checkbox pill on the Action Needed
  // view, where it can be toggled without opening each box; see
  // QueueView.)
  const [dateSaveState, setDateSaveState] = React.useState('idle'); // idle | saving | saved | error
  const [dateSaveError, setDateSaveError] = React.useState(null);

  // If a fresh poll/reload brings in updated values for this same box
  // (e.g. someone else already saved a change), reflect that rather
  // than silently keep showing what was on screen when the panel first
  // opened - but only when the user hasn't started editing yet, so we
  // never clobber input they're actively in the middle of working with.
  React.useEffect(() => {
    if (dateSaveState === 'idle') {
      // Saved date wins; otherwise fall back to the rule suggestion
      // (so e.g. right after a Clear, the field re-arms with the
      // suggested date, ready for the next one-click save).
      setPuDateInput(toDateInputValue(box.puDate) || schedSuggestedValue);
    }
  }, [box.puDate, dateSaveState]);

  // Saves the Pick-Up Date only, per explicit design decision: the
  // Scheduled Date input was removed from this panel entirely - the
  // request date is captured automatically (the Apps Script stamps
  // today into a blank Scheduled Date whenever a pickup is saved, and
  // the Request Ledger records the exact request moment shown in the
  // Request History section below), so there's nothing left for a
  // person to enter. schDate is deliberately OMITTED from this save so
  // the server-side auto-fill owns that column.
  const handleSaveDates = async () => {
    setDateSaveState('saving');
    setDateSaveError(null);
    try {
      await onSave(box.boxId, { puDate: puDateInput });
      setDateSaveState('saved');
      setTimeout(() => setDateSaveState('idle'), 2500);
      fetchHistory();
    } catch (err) {
      setDateSaveState('error');
      setDateSaveError(err.message || String(err));
    }
  };

  // Clears both date fields AND saves that cleared state straight to
  // the Sheet in one tap - per explicit design decision (revised),
  // replacing the old two-step clear-then-Save flow. Reuses the same
  // save track as Save Dates, so the same ✓ Saved / error feedback
  // appears.
  const handleClearDates = async () => {
    setPuDateInput('');
    setDateSaveState('saving');
    setDateSaveError(null);
    try {
      await onSave(box.boxId, { schDate: '', puDate: '' });
      setDateSaveState('saved');
      setTimeout(() => setDateSaveState('idle'), 2500);
      fetchHistory();
    } catch (err) {
      setDateSaveState('error');
      setDateSaveError(err.message || String(err));
    }
  };

  return (
    <div
      onClick={onClose}
      className="modal-overlay"
      style={{
        position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
        background: 'rgba(0,0,0,0.35)', zIndex: 89,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        className="modal-panel"
        style={{
          position: 'relative',
          background: BRAND.panel, boxShadow: '0 12px 48px rgba(0,0,0,0.3)',
          zIndex: 90, display: 'flex', flexDirection: 'column', fontFamily: font, overflow: 'hidden',
        }}
      >
      <div style={{ padding: '18px 20px', borderBottom: '1px solid ' + BRAND.line, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', background: BRAND.green }}>
        <div>
          <div style={{ fontFamily: monoFont, fontSize: 18, fontWeight: 800, color: '#CCFF66' }}>BOX #{box.boxId}</div>
          <div style={{ fontWeight: 700, fontSize: 16, marginTop: 2, color: '#FFFFFF' }}>{box.description}</div>
        </div>
        <button onClick={onClose} style={{
          background: 'transparent', border: 'none', color: '#E8F3DF', fontSize: 20, cursor: 'pointer', lineHeight: 1,
        }}>×</button>
      </div>
      <div className="modal-body" style={{ flex: 1, overflow: 'auto' }}>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between' }}>
          {formatScanTimestamp(scanTitle) && (
            <span style={{ fontSize: 12, color: BRAND.muted, fontFamily: monoFont }}>
              <span style={{ fontWeight: 700, color: BRAND.ink }}>As of:</span> {formatScanTimestamp(scanTitle)}
            </span>
          )}
          {/* Status pills - per explicit design decision, only pills
              carrying real signal render: TRIGR HIT / NO SERVICE
              NEEDED, and STALE SCAN. The old SCAN FRESH and NO READING
              pills were removed entirely - "fresh" and "no reading"
              are the absence of a signal, and an absence doesn't need
              a badge. */}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {(() => {
              const fillKey = box.staleStatus === 'stale' && box.crossedStatus === 'crossed' ? 'unknown' : box.crossedStatus;
              return fillKey !== 'unknown' ? <StatusPill meta={FILL_STATUS_META} statusKey={fillKey} /> : null;
            })()}
            {box.staleStatus === 'stale' && <StatusPill meta={STALE_STATUS_META} statusKey="stale" />}
          </div>
        </div>

        {/* Manual-move note - shown only when this box's page placement
            came from the MOVE button rather than the scanner's own
            classification, so nobody wonders why a box is sitting on a
            page its numbers don't seem to justify. */}
        {box.viewOverride && (
          <div style={{
            marginBottom: 14, padding: '7px 12px', background: 'rgba(230,195,0,0.10)',
            border: '1px solid rgba(180,150,0,0.35)', borderRadius: 5,
            fontSize: 12, fontWeight: 600, color: '#8A6D00',
          }}>
            This box is on the {viewOverrideLabel(box.viewOverride)} page because it was manually moved there. The scanner's own classification applies again on the next scan.
          </div>
        )}

        {box.notes && (() => {
          // The notes banner doubles as the "confirmed" banner once a
          // hauler confirmation lands ("Confirmed by NAME on ..."
          // appended to Notes). Display rules, per explicit design
          // decision: while the box IS currently confirmed, the banner
          // shows in loud highlighter yellow with bold text. If the
          // confirmation was later UNchecked, the "Confirmed by..."
          // text is removed from the DISPLAY entirely - a banner
          // asserting a confirmation that isn't currently true is
          // worse than no banner - while the sheet's Notes column
          // keeps the full text as the permanent paper trail. Any
          // OTHER note content (Last Cycle, chart issues, etc.) stays
          // visible in the ordinary soft style either way.
          const isConfirmed = box.confirmed && /confirmed by/i.test(box.notes);
          const displayNotes = isConfirmed
            ? box.notes
            : String(box.notes)
                .replace(/\s*\|\s*Confirmed by [^|]+/gi, '')
                .replace(/^\s*Confirmed by [^|]+?(\s*\|\s*|$)/i, '')
                .trim();
          if (!displayNotes) return null;
          return (
            <div style={{
              background: isConfirmed ? '#FFF200' : '#FBF6E9',
              border: '1px solid ' + (isConfirmed ? '#D6C400' : '#E8D9A8'),
              borderRadius: 6, padding: 10,
              fontSize: 12, fontWeight: isConfirmed ? 700 : 400,
              color: isConfirmed ? '#1A1D1A' : '#7A5E1E',
              marginBottom: 16, fontFamily: font,
            }}>{displayNotes}</div>
          );
        })()}

        {/* Editable service tracking - the whole point of this panel
            for the dashboard's primary day-to-day user: enter what was
            scheduled, when pickup will happen, and whether the hauler
            confirmed, then save it straight back to the Sheet. Large,
            simple controls and an unmistakable saved/error message,
            since this is built for someone who isn't comfortable with
            technology and needs to know immediately and clearly that
            the save worked. */}
        <div style={{
          border: '1px solid #E2E6DE', borderRadius: 8, padding: 12, marginBottom: 14,
          background: '#FFFFFF', boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
            gap: 10, marginBottom: 8, flexWrap: 'wrap',
          }}>
            <div style={{
              fontSize: 12, fontWeight: 700, color: BRAND.green, textTransform: 'uppercase',
              letterSpacing: '0.03em', fontFamily: monoFont,
            }}>Scheduling</div>
            {/* Scheduling Rule - per-box value from Master Box List
                column J ("Scheduling Rule"), delivered alongside the
                email contacts in the same master_contacts lookup.
                Only rendered when the box actually has a rule filled
                in, so boxes without one don't show an empty label.
                Per explicit design decision, styled as a bold yellow
                rounded pill so it visibly stands out from the rest of
                the Scheduling box - this is a per-site constraint the
                person scheduling needs to notice BEFORE picking dates,
                not incidental reference info. */}
            {contacts && contacts.schedulingRule && (
              <div style={{
                fontSize: 12, fontFamily: monoFont, fontWeight: 700, color: BRAND.green,
                background: '#FFFFFF', border: '1px solid #E2E6DE',
                boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
                borderRadius: 3, padding: '3px 8px', minWidth: 0,
              }}>
                Sched Rule: {contacts.schedulingRule}
              </div>
            )}
            {/* Set Schedule pill - per-box value from Master Box List
                column K ("Set Schedule"), delivered in the same
                master_contacts lookup. Three flavors of text in use:
                named days ("Every Monday and Friday" = WASTENET is
                responsible for ordering pulls on those days - a
                standing to-do, not hands-off), "Never Schedule - On
                Set Schedule with Hauler" (the hauler self-manages;
                WasteNet must NOT order pulls), and hybrids (Box 1030).
                "Never Schedule" entries render in red as a hard
                warning to whoever opened this panel intending to
                schedule a pickup; named-day entries render in the
                standard green pill style. Only rendered when the box
                has an entry - blank column K = normal reading-driven
                box, no pill. */}
            {contacts && contacts.setSchedule && (() => {
              const neverSched = /^never\s+schedule/i.test(contacts.setSchedule.trim());
              return (
                <div style={{
                  fontSize: 12, fontFamily: monoFont, fontWeight: 700,
                  color: neverSched ? '#B3402B' : BRAND.green,
                  background: '#FFFFFF',
                  border: neverSched ? '1px solid #B3402B' : '1px solid #E2E6DE',
                  boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
                  borderRadius: 3, padding: '3px 8px', minWidth: 0,
                }}>
                  {neverSched ? '\u26D4 ' : ''}Set Schedule: {contacts.setSchedule}
                </div>
              );
            })()}
          </div>

          {/* For C-300 / C-599 boxes the entire dates-and-confirmed
              workflow below is replaced with a single portal link -
              see PORTAL_LINKS above. Everything inside the
              React.Fragment in the else-branch is the normal
              Scheduling workflow, completely unchanged. */}
          {portal ? (
            <div>
              <div style={{ fontSize: 13, color: BRAND.ink, marginBottom: 10, fontFamily: font }}>
                Service for this box is scheduled through the {portal.name} online portal, not by entering dates here.
              </div>
              <a
                href={portal.url}
                target="_blank"
                rel="noopener"
                style={{
                  display: 'block', padding: '10px', textAlign: 'center',
                  borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: font,
                  background: BRAND.green, color: '#FFFFFF', textDecoration: 'none',
                }}
              >Open {portal.name} Portal</a>
            </div>
          ) : (
          <React.Fragment>
          {/* Single Pick-Up Date field, per explicit design
              decision: the Scheduled Date
              input is gone - the request date is captured
              automatically (server-side auto-fill of the sheet column
              + the Request Ledger entry shown in Request History), so
              only the date a person actually decides remains. */}
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: 'block' }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 3 }}>Pick-Up Date</div>
              {/* Long-format display ("Monday, July 6, 2026") per
                  explicit design decision - see FriendlyDateInput. */}
              <FriendlyDateInput
                value={puDateInput}
                onChange={e => setPuDateInput(e.target.value)}
                font={font}
              />
            </label>
            {/* Suggestion note, per explicit design decision
                (2026-07-05, revised): the suggested date now
                PRE-FILLS the field above, so the normal case is just
                Save Date. The note below adapts honestly to what's
                actually in the field: when the field holds the
                suggestion, it says so plainly; when the user has
                typed a different date (or a saved date is showing),
                it reverts to the clickable "Suggested: ..." link so
                the suggestion is always one tap away. Only rendered
                when the rule exists and is recognized. */}
            {contacts && contacts.schedulingRule && schedSuggestedDate && (() => {
              const suggestedLabel = schedSuggestedDate.toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
              });
              if (puDateInput === schedSuggestedValue) {
                return (
                  <div style={{ fontSize: 12, color: BRAND.muted, marginTop: 5 }}>
                    Date above is the <b>suggested date</b> per Sched Rule: {contacts.schedulingRule} — just hit Save Date, or change it first.
                  </div>
                );
              }
              return (
                <div style={{ fontSize: 12, color: BRAND.muted, marginTop: 5 }}>
                  Suggested (per {contacts.schedulingRule}):{' '}
                  <button
                    type="button"
                    onClick={() => setPuDateInput(schedSuggestedValue)}
                    style={{
                      background: 'none', border: 'none', padding: 0, margin: 0,
                      color: BRAND.greenDark, fontWeight: 700, fontFamily: font,
                      fontSize: 12, cursor: 'pointer', textDecoration: 'underline',
                    }}
                  >{suggestedLabel}</button>
                </div>
              );
            })()}
          </div>

          <div style={{ display: 'flex', gap: 8 }}>
            <button
              onClick={handleSaveDates}
              disabled={dateSaveState === 'saving'}
              style={{
                flex: 2, padding: '8px', fontSize: 14, fontWeight: 700, borderRadius: 5,
                border: 'none', cursor: dateSaveState === 'saving' ? 'default' : 'pointer',
                background: dateSaveState === 'saving' ? BRAND.muted : BRAND.green, color: '#FFFFFF',
                fontFamily: font,
              }}
            >
              {dateSaveState === 'saving' ? 'Saving…' : 'Save Date'}
            </button>
            <button
              onClick={handleClearDates}
              disabled={dateSaveState === 'saving' || (!box.puDate && !box.schDate)}
              title="Removes the saved date from this box's record immediately"
              style={{
                flex: 1, padding: '8px', fontSize: 13, fontWeight: 600, borderRadius: 5,
                border: '1.5px solid ' + BRAND.line,
                cursor: (dateSaveState === 'saving' || (!box.puDate && !box.schDate)) ? 'default' : 'pointer',
                background: BRAND.panel,
                color: (!box.puDate && !box.schDate) ? '#C7CCBE' : BRAND.muted,
                fontFamily: font,
              }}
            >
              Clear Saved Date
            </button>
          </div>

          {dateSaveState === 'saved' && (
            <div style={{
              marginTop: 8, padding: '6px 10px', background: 'rgba(92,170,22,0.12)',
              border: '1px solid ' + BRAND.green, borderRadius: 5, color: BRAND.greenDark,
              fontSize: 12.5, fontWeight: 600, textAlign: 'center',
            }}>✓ Saved successfully</div>
          )}
          {dateSaveState === 'error' && (
            <div style={{
              marginTop: 8, padding: '6px 10px', background: 'rgba(179,64,43,0.08)',
