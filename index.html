<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WasteNet Box Monitor Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #F1F3EC; }
  ::-webkit-scrollbar-thumb { background: #C7CCBE; border-radius: 4px; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid #5CAA16; outline-offset: 1px;
  }
  .row-hover:hover { background: #F1F4EC !important; }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ============================================================
// CONFIG - change this if you ever redeploy the Apps Script to a new URL
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec';

// WasteNet brand palette - sampled directly from the WASTENET logo (#5CAA16)
const BRAND = {
  green: '#5CAA16',
  greenDark: '#315A0C',
  greenLight: '#89C156',
  ink: '#525A60',
  dark: '#1A1D1A',
  paper: '#FAFBF8',
  panel: '#FFFFFF',
  line: '#E2E6DE',
  amber: '#C97A1A',
  red: '#B3402B',
  muted: '#6B7268',
};

const FILL_STATUS_META = {
  crossed: { label: 'TRIGGER REACHED', color: BRAND.red, bg: 'rgba(179,64,43,0.08)', ring: 'rgba(179,64,43,0.3)' },
  clear: { label: 'NO SERVICE NEEDED', color: BRAND.green, bg: 'rgba(92,170,22,0.08)', ring: 'rgba(92,170,22,0.3)' },
  unknown: { label: 'NO READING', color: BRAND.muted, bg: 'rgba(107,114,104,0.08)', ring: 'rgba(107,114,104,0.25)' },
};

const STALE_STATUS_META = {
  stale: { label: 'STALE SCAN', color: BRAND.amber, bg: 'rgba(201,122,26,0.08)', ring: 'rgba(201,122,26,0.3)' },
  fresh: { label: 'SCAN FRESH', color: BRAND.green, bg: 'rgba(92,170,22,0.06)', ring: 'rgba(92,170,22,0.2)' },
};

function parseNum(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

// Converts a raw spreadsheet tab name (e.g. "2026-06-29" or
// "2026-06-28 (2)" for a same-day re-run) into a friendly display label
// (e.g. "Tue 6-29-26" or "Tue 6-28-26 (2)") for the dropdown. The
// underlying tab name itself is NEVER changed - only how it's shown to
// the user - since the real yyyy-MM-dd name is what the Apps Script
// relies on for finding "today's tab" and handling same-day collisions.
// Falls back to the raw name unchanged if it doesn't match the
// expected pattern, so an unexpected tab name never breaks the dropdown.
function formatTabLabel(tabName) {
  const m = String(tabName).match(/^(\d{4})-(\d{2})-(\d{2})(\s*\(\d+\))?$/);
  if (!m) return tabName;
  const year = m[1], month = m[2], day = m[3], suffix = m[4];
  const dateObj = new Date(Number(year), Number(month) - 1, Number(day));
  if (isNaN(dateObj.getTime())) return tabName;
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const dayLabel = dayNames[dateObj.getDay()];
  const shortYear = year.slice(-2);
  const label = dayLabel + ' ' + Number(month) + '-' + Number(day) + '-' + shortYear;
  return suffix ? label + ' ' + suffix.trim() : label;
}

function parseHoursFromNotes(notes) {
  if (!notes) return null;
  const m = String(notes).match(/Last Cycle is ([\d.]+) hours/i);
  return m ? parseFloat(m[1]) : null;
}

// Converts an ISO timestamp string (e.g. "2026-06-25T08:58:43.000Z", as
// sent by the Apps Script for any Sheets date field) into a simple
// month/day/year display (e.g. "6/25/2026") for the detail panel.
// Falls back to the raw value unchanged if it isn't a parseable date,
// so a blank or already-plain value is never mangled.
function formatSimpleDate(value) {
  if (!value) return value;
  const d = new Date(value);
  if (isNaN(d.getTime())) return value;
  return (d.getUTCMonth() + 1) + '/' + d.getUTCDate() + '/' + d.getUTCFullYear();
}

function normalizeRow(raw, idx) {
  const maxPct = parseNum(raw['Max Pct']);
  const t1 = parseNum(raw['Trigr1 Pct']);
  const t2 = parseNum(raw['Trigr2 Pct']);
  const triggerUsedRaw = String(raw['Trigr Used'] || '').toLowerCase();
  const activeTrigger = triggerUsedRaw.includes('2') ? t2 : t1;

  // 'Crossed Trigr' is the RAW, pre-suppression signal (did the fill
  // level cross the trigger line at all, before accounting for recent
  // pull requests or an Empty marker on the chart). 'Srvc Need' is the
  // FINAL, authoritative decision after the Tampermonkey scanner
  // applies suppression - a box can show Crossed Trigr=YES but
  // Srvc Need=NO if it was already requested recently or the chart
  // shows it was actually emptied. The dashboard's "Action Needed" /
  // "No Action Needed" buckets must reflect the final decision
  // (Srvc Need), not the raw pre-suppression signal - using the raw
  // signal here was a real bug: it could show a box as needing action
  // when the authoritative answer (accounting for suppression) was
  // actually "no." crossedRaw is kept separately for reference/display
  // in the detail panel, but no longer drives the action-needed status.
  const crossedRaw = String(raw['Crossed Trigr'] || '').toUpperCase().trim();
  const srvcNeedRaw = String(raw['Srvc Need'] || '').toUpperCase().trim();
  const crossed = srvcNeedRaw === 'YES' ? 'crossed' : srvcNeedRaw === 'NO' ? 'clear' : 'unknown';

  const notes = raw['Notes'] || '';
  const hours = parseHoursFromNotes(notes);
  const forcedStale = /YES \(forced\)/i.test(notes) || (hours !== null && hours > 24);
  const stale = forcedStale ? 'stale' : 'fresh';

  // Matches the Tampermonkey scanner's own isInactiveBoxDescription()
  // rule exactly: a description starting with X, Y, or Z (case
  // insensitive) marks a box as inactive/not scanned. Kept in sync with
  // that source-of-truth logic so a box flagged inactive there is
  // labeled the same way here.
  const description = raw['Description'] || '(no description)';
  const isInactive = /^[xyz]/i.test(description.trim());

  return {
    _key: raw['Box ID'] != null ? String(raw['Box ID']) + '-' + idx : 'row-' + idx,
    boxId: raw['Box ID'] != null ? String(raw['Box ID']) : '—',
    cell: raw['Cell'] || '',
    description: description,
    isInactive: isInactive,
    haulCode: raw['Haul Code'] || '—',
    serviceMethod: raw['Srvc Mthd'] || '—',
    shortcut: raw['Txt Blz Shrtct'] || '',
    trigger1: t1,
    trigger2: t2,
    triggerUsedLabel: raw['Trigr Used'] || '—',
    activeTrigger: activeTrigger,
    maxPct: maxPct,
    crossedStatus: crossed,
    crossedTrigrRaw: crossedRaw,
    staleStatus: stale,
    staleHours: hours,
    srvcNeed: srvcNeedRaw,
    notes: notes,
    datePullReqd: raw["Date Pull Req'd"] || '',
    schDate: raw['Sch Date'] || '',
    puDate: raw['P/U Date'] || '',
    confirmed: raw['Cnfrmd'] === true || String(raw['Cnfrmd']).toUpperCase() === 'TRUE',
    toRecipients: raw['To Recipients'] || '',
    ccRecipients: raw['Cc Recipients'] || '',
    staffRecipients: raw['Staff Recipients'] || '',
  };
}

function StatusPill({ meta, statusKey }) {
  const m = meta[statusKey];
  if (!m) return null;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 8px',
      borderRadius: 3, fontSize: 10.5, fontWeight: 700, letterSpacing: '0.04em',
      color: m.color, background: m.bg, border: '1px solid ' + m.ring, whiteSpace: 'nowrap',
      fontFamily: "Arial, Helvetica, sans-serif",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: m.color, boxShadow: '0 0 6px ' + m.color }} />
      {m.label}
    </span>
  );
}

function Gauge({ pct, size = 36 }) {
  if (pct === null) {
    return (
      <div style={{
        width: size, height: size * 1.5, borderRadius: 4, border: '1.5px dashed #C7CCBE',
        background: '#F1F3EC', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 9, color: BRAND.muted, flexShrink: 0, fontFamily: "Arial, Helvetica, sans-serif", textAlign: 'center',
      }}>N/A</div>
    );
  }
  const clamped = Math.max(0, Math.min(100, pct));
  const color = clamped >= 70 ? BRAND.red : clamped >= 45 ? BRAND.amber : BRAND.green;
  return (
    <div style={{
      position: 'relative', width: size, height: size * 1.5, borderRadius: 4,
      border: '1.5px solid #D8DCD2', background: '#F1F3EC', overflow: 'hidden', flexShrink: 0,
    }}>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, height: clamped + '%',
        background: 'linear-gradient(180deg, ' + color + 'cc, ' + color + ')',
        transition: 'height 0.4s ease',
      }} />
      <div style={{ position: 'absolute', top: '33%', left: 0, right: 0, borderTop: '1px dashed #BFC4B6' }} />
      <div style={{ position: 'absolute', top: '66%', left: 0, right: 0, borderTop: '1px dashed #BFC4B6' }} />
    </div>
  );
}

// localStorage-backed persistence (replaces the Claude-Artifact-only
// window.storage API, which does not exist outside Claude). Plain
// browser localStorage - same device/browser only, no cross-device
// sync. If you want shared state across staff, that would need a real
// backend; this keeps things simple for now.
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveLocal(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}

function WasteNetDashboard() {
  const [rows, setRows] = useState([]);
  const [sheetName, setSheetName] = useState(null);
  const [scanTitle, setScanTitle] = useState(null);
  const [fetchState, setFetchState] = useState('loading'); // loading | ok | error
  const [fetchError, setFetchError] = useState(null);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);

  // null = viewing today's/latest live data (auto-refreshes); any other
  // value = a specific past tab the user picked from the dropdown
  // (frozen - auto-refresh won't silently pull them back to "today"
  // while they're looking at an older scan).
  const [viewingTab, setViewingTab] = useState(null);
  const [availableTabs, setAvailableTabs] = useState([]);
  const [tabsLoadError, setTabsLoadError] = useState(null);
  const [masterContacts, setMasterContacts] = useState({});
  const [emailTemplates, setEmailTemplates] = useState({});
  // Whether the custom date-picker dropdown is currently open - native
  // <select> elements can't have a different font size for their
  // closed button vs. their open option list (browsers always render
  // both at the same size), so per explicit design decision this is a
  // hand-built dropdown instead: a big, bold button showing the
  // current date, and a small, separately-styled popover list when
  // opened, so the selected date can stay large and prominent while
  // the list of other dates stays compact and doesn't take over the
  // screen once there are many of them.
  const [dateDropdownOpen, setDateDropdownOpen] = useState(false);

  const [query, setQuery] = useState('');
  const [signalFilter, setSignalFilter] = useState('crossed'); // ALL | crossed | stale | both | clear
  const [sortBy, setSortBy] = useState('description'); // valid options depend on which view is active, see SORT_OPTIONS_BY_VIEW below
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);

  // Each stat-button view offers its own subset of sort options - per
  // explicit design decision: Action Needed gets Pickup Confirmation
  // (since that's specifically about already-scheduled boxes needing a
  // follow-up), Stale Scans gets Most/Least Hours (since recency-of-
  // staleness is what matters there), and No Action Needed only offers
  // the two generic options, since neither extra sort makes sense for
  // boxes that don't need attention in the first place.
  const SORT_OPTIONS_BY_VIEW = {
    crossed: [
      ['boxId', 'Sort: Box Number'],
      ['description', 'Sort: Description'],
      ['confirmation', 'Sort: Pickup Confirmation'],
    ],
    stale: [
      ['boxId', 'Sort: Box Number'],
      ['description', 'Sort: Description'],
      ['hoursDesc', 'Sort: Most Hours'],
      ['hoursAsc', 'Sort: Least Hours'],
    ],
    clear: [
      ['boxId', 'Sort: Box Number'],
      ['description', 'Sort: Description'],
    ],
  };

  // Switches which stat-button view is active, and resets sortBy back
  // to Box Number whenever the CURRENTLY selected sort option wouldn't
  // even appear in the new view's dropdown - prevents the dropdown from
  // silently showing a stale, no-longer-relevant selection (e.g.
  // leaving "Pickup Confirmation" selected after switching away from
  // Action Needed, where that option doesn't exist).
  const handleSelectSignalFilter = (key) => {
    const validOptions = (SORT_OPTIONS_BY_VIEW[key] || []).map(([val]) => val);
    if (!validOptions.includes(sortBy)) {
      setSortBy('boxId');
    }
    setSignalFilter(key);
  };

  const pollRef = useRef(null);
  const dateDropdownRef = useRef(null);

  // Closes the custom date dropdown if the user clicks anywhere outside
  // of it - standard expected behavior for any dropdown-style control,
  // and without this it would only ever close by picking an option,
  // with no way to back out of it.
  useEffect(() => {
    if (!dateDropdownOpen) return;
    const handleClickOutside = (e) => {
      if (dateDropdownRef.current && !dateDropdownRef.current.contains(e.target)) {
        setDateDropdownOpen(false);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, [dateDropdownOpen]);

  // JSONP loader - used instead of fetch()/XHR because Apps Script Web
  // App URLs always 302-redirect internally to a googleusercontent.com
  // echo endpoint, and that redirected response doesn't carry an
  // Access-Control-Allow-Origin header, so a normal fetch() is blocked
  // by CORS even though the same URL works fine when visited directly.
  // A <script> tag isn't subject to that restriction, so we load the
  // URL that way and have the Apps Script (via its `callback` query
  // parameter) wrap its JSON as a call to a one-off global function we
  // define here.
  const jsonpLoad = useCallback((url) => {
    return new Promise((resolve, reject) => {
      const callbackName = 'wastenetJsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
      const script = document.createElement('script');
      let settled = false;

      const cleanup = () => {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        clearTimeout(timeoutId);
      };

      window[callbackName] = (data) => {
        if (settled) return;
        settled = true;
        cleanup();
        resolve(data);
      };

      const timeoutId = setTimeout(() => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('Timed out waiting for a response (30s) - the sheet may be slow to respond right now. Try again in a moment.'));
      }, 30000);

      script.onerror = () => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('Could not load the script (network error or invalid URL).'));
      };

      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
      document.head.appendChild(script);
    });
  }, []);

  // Loads either the live/latest scan (tabName omitted) or a specific
  // past tab by exact name. Used for the initial load, the 5-minute
  // auto-poll (live only), and whenever the user picks a date from the
  // dropdown.
  const loadTab = useCallback(async (tabName) => {
    setFetchState((prev) => (prev === 'ok' ? 'ok' : 'loading'));
    try {
      const url = tabName
        ? SHEET_URL + '?action=tab&name=' + encodeURIComponent(tabName)
        : SHEET_URL + '?action=latest';
      const json = await jsonpLoad(url);
      if (!json.ok) throw new Error(json.error || 'Unknown error from sheet endpoint');
      const normalized = (json.rows || []).map(normalizeRow);
      setRows(normalized);
      setSheetName(json.sheetName || null);
      setScanTitle(json.scanTitle || null);
      setFetchState('ok');
      setFetchError(null);
      setLastFetchedAt(new Date());
    } catch (err) {
      setFetchState('error');
      setFetchError(err.message || String(err));
    }
  }, [jsonpLoad]);

  // Writes Sch Date / P/U Date / Cnfrmd back to the Sheet for one box,
  // via the same JSONP mechanism used for reads (a true POST isn't
  // usable here for the same CORS/redirect reason - see jsonpLoad
  // above). Writes to whichever tab is CURRENTLY DISPLAYED
  // (sheetName), not necessarily "today" - per explicit design
  // decision, a confirmation can legitimately arrive after the scan
  // that originally flagged a box, so editing is allowed on any visible
  // date, not just the live/latest one. fields is an object where each
  // key (schDate/puDate/confirmed) is OPTIONAL - only the keys actually
  // present get sent, matching the Apps Script's "omitted = don't
  // touch, empty string = clear" distinction. Re-fetches the current
  // tab afterward so the on-screen row immediately reflects the save
  // rather than showing stale data until the next poll.
  const saveBoxFields = useCallback(async (boxId, fields) => {
    if (!sheetName) throw new Error('No tab is currently loaded - cannot save.');
    const params = ['action=update_box', 'tab=' + encodeURIComponent(sheetName), 'boxId=' + encodeURIComponent(boxId)];
    Object.keys(fields).forEach(key => {
      params.push(key + '=' + encodeURIComponent(fields[key]));
    });
    const url = SHEET_URL + '?' + params.join('&');
    const json = await jsonpLoad(url);
    if (!json.ok) throw new Error(json.error || 'Unknown error saving to the sheet');
    await loadTab(viewingTab || undefined);
    return json;
  }, [jsonpLoad, sheetName, viewingTab, loadTab]);

  // Fetches the dropdown's list of selectable past-scan tabs once on
  // load. A failure here is non-fatal - the dashboard still works fine
  // showing only live data, just without the history dropdown - so this
  // is tracked separately from the main fetchState/fetchError.
  const loadTabList = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=list_tabs');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading tab list');
      setAvailableTabs(json.tabs || []);
      setTabsLoadError(null);
    } catch (err) {
      setTabsLoadError(err.message || String(err));
    }
  }, [jsonpLoad]);

  // Fetches the Box ID -> To/Cc email lookup once on load. This data
  // lives on the Master Box List tab, not in any daily scan tab, so it
  // has to be fetched separately and joined to the selected box by ID
  // client-side - see getMasterContactsAsJson() in the Apps Script for
  // why it's kept as one single fetch rather than duplicated per-day.
  // A failure here is non-fatal, same reasoning as loadTabList - the
  // dashboard still works fine without contact emails showing, it just
  // won't have that one extra section in the detail panel.
  const loadMasterContacts = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=master_contacts');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading contact emails');
      setMasterContacts(json.contacts || {});
    } catch (err) {
      // Silent - see comment above.
    }
  }, [jsonpLoad]);

  // Fetches the generic (non-per-box) email category templates -
  // Emptied, Missed, Notice, Premature, Problem, Repair, Usage - from
  // the separate "Email Templates" tab, keyed by Pill Label. Same
  // "fetch once on load, fail silently" pattern as loadMasterContacts
  // above, for the same reasons.
  const loadEmailTemplates = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=email_templates');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading email templates');
      setEmailTemplates(json.templates || {});
    } catch (err) {
      // Silent - see comment above.
    }
  }, [jsonpLoad]);

  const handleSelectTab = useCallback((name) => {
    if (name === '') {
      // Empty option = back to live
      setViewingTab(null);
      loadTab();
    } else {
      setViewingTab(name);
      loadTab(name);
    }
  }, [loadTab]);

  useEffect(() => {
    loadTab();
    loadTabList();
    loadMasterContacts();
    loadEmailTemplates();
  }, [loadTab, loadTabList, loadMasterContacts, loadEmailTemplates]);

  useEffect(() => {
    // Only auto-refresh while viewing live/latest data - if the user has
    // picked a specific past tab from the dropdown, leave it alone so
    // it doesn't silently snap back to "today" out from under them.
    if (viewingTab !== null) return;
    pollRef.current = setInterval(() => loadTab(), 5 * 60 * 1000);
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [viewingTab, loadTab]);

  const filtered = useMemo(() => {
    return rows.filter(r => {
      if (signalFilter === 'crossed' && (r.crossedStatus !== 'crossed' || r.staleStatus === 'stale')) return false;
      if (signalFilter === 'stale' && r.staleStatus !== 'stale') return false;
      if (signalFilter === 'both' && !(r.crossedStatus === 'crossed' && r.staleStatus === 'stale')) return false;
      if (signalFilter === 'clear' && (r.crossedStatus === 'crossed' || r.staleStatus === 'stale')) return false;
      if (query) {
        const q = query.toLowerCase();
        const hay = (r.description + ' ' + r.boxId + ' ' + r.haulCode + ' ' + r.cell).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [rows, signalFilter, query]);

  const actionQueue = useMemo(() => {
    // Default view (signalFilter === 'ALL') shows only boxes that need
    // attention (crossed or stale) - that's the "queue" concept. But if
    // the dropdown is explicitly set to something else (e.g. "No action
    // needed"), `filtered` has already narrowed to exactly that signal,
    // so re-applying the crossed/stale-only rule here would always
    // produce an empty list for "No action needed" - respect the
    // explicit choice instead of double-filtering against it.
    const base = signalFilter === 'ALL'
      ? filtered.filter(r => r.crossedStatus === 'crossed' || r.staleStatus === 'stale')
      : filtered;
    const list = base.slice();

    const sortByBoxId = (a, b) => {
      const numA = parseInt(a.boxId, 10);
      const numB = parseInt(b.boxId, 10);
      if (Number.isFinite(numA) && Number.isFinite(numB)) return numA - numB;
      return String(a.boxId).localeCompare(String(b.boxId));
    };
    const sortByDescription = (a, b) => a.description.localeCompare(b.description);

    if (sortBy === 'confirmation') {
      // Pickup Confirmation (Action Needed view only) - per explicit
      // design decision: boxes with a scheduled Pick-Up Date that are
      // NOT yet confirmed come first (these are what most urgently need
      // a follow-up call/email), confirmed ones next, and boxes with no
      // Pick-Up Date at all (nothing to confirm yet) sort to the very
      // bottom rather than being mixed in - they're not part of this
      // sort's actual concern. Box Number is the tiebreaker within each
      // group, for a stable, predictable order rather than relying on
      // whatever order the data happened to arrive in.
      list.sort((a, b) => {
        const rank = (r) => {
          if (!r.puDate) return 2; // no pickup scheduled - bottom
          return r.confirmed ? 1 : 0; // No=0 (top), Yes=1
        };
        const diff = rank(a) - rank(b);
        if (diff !== 0) return diff;
        return sortByBoxId(a, b);
      });
    } else if (sortBy === 'hoursDesc' || sortBy === 'hoursAsc') {
      // Most Hours / Least Hours (Stale Scans view only) - replaces the
      // old hardcoded always-ascending behavior with an actual choice,
      // now that this view has its own dropdown options. Boxes with no
      // parseable hours value sort to the end regardless of direction,
      // rather than crashing or landing arbitrarily.
      list.sort((a, b) => {
        const ha = a.staleHours === null ? Infinity : a.staleHours;
        const hb = b.staleHours === null ? Infinity : b.staleHours;
        return sortBy === 'hoursAsc' ? ha - hb : (hb === Infinity && ha === Infinity ? 0 : hb - ha);
      });
    } else if (sortBy === 'description') {
      list.sort(sortByDescription);
    } else {
      list.sort(sortByBoxId);
    }
    return list;
  }, [filtered, signalFilter, sortBy]);

  const counts = useMemo(() => {
    const c = { crossed: 0, stale: 0, both: 0, clear: 0, total: rows.length };
    rows.forEach(r => {
      const isCrossed = r.crossedStatus === 'crossed';
      const isStale = r.staleStatus === 'stale';
      if (isCrossed && isStale) c.both += 1;
      else if (isCrossed) c.crossed += 1;
      else if (isStale) c.stale += 1;
      else c.clear += 1;
    });
    return c;
  }, [rows]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  };

  const font = "Arial, Helvetica, sans-serif";
  const monoFont = "Arial, Helvetica, sans-serif";
  const displayFont = "Arial, Helvetica, sans-serif";

  return (
    <div style={{
      fontFamily: font, background: BRAND.paper, color: BRAND.ink, height: '100vh',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',

      {/* Header */}
      <header style={{
        borderBottom: '1px solid ' + BRAND.line, padding: '12px 24px',

        background: BRAND.paper, textAlign: 'center',

          style={{ height: 60, width: 'auto', flexShrink: 0 }}
        />
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
          <div style={{
            fontFamily: displayFont, fontWeight: 700, fontSize: 16, letterSpacing: '0.04em',
            textTransform: 'uppercase', lineHeight: 1.1, color: BRAND.green,
          }}>Box Monitor Dashboard</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 4 }}>
            {availableTabs.length > 0 ? (
              <div ref={dateDropdownRef} style={{ position: 'relative', display: 'inline-block' }}>
                <button
                  onClick={() => setDateDropdownOpen(o => !o)}
                  style={{
                    padding: '10px 20px', borderRadius: 10,
                    border: '2px solid ' + BRAND.green, background: 'rgba(92,170,22,0.06)',
                    color: BRAND.green, fontSize: 26, fontWeight: 800, fontFamily: displayFont,
                    cursor: 'pointer', textAlign: 'center', letterSpacing: '0.01em',
                  }}
                >
                  {fetchState === 'ok' && sheetName ? formatTabLabel(sheetName) : fetchState === 'loading' ? 'Loading…' : 'Unavailable'}
                </button>
                {dateDropdownOpen && (
                  <div style={{
                    position: 'absolute', top: 'calc(100% + 6px)', left: '50%', transform: 'translateX(-50%)',
                    background: BRAND.panel, border: '1px solid ' + BRAND.line, borderRadius: 8,
                    boxShadow: '0 8px 24px rgba(0,0,0,0.15)', zIndex: 50,
                    maxHeight: 280, overflowY: 'auto', minWidth: 200, padding: 4,
                  }}>
                    <button
                      onClick={() => { handleSelectTab(''); setDateDropdownOpen(false); }}
                      style={{
                        display: 'block', width: '100%', textAlign: 'left', padding: '7px 10px',
                        borderRadius: 5, border: 'none', cursor: 'pointer', fontFamily: monoFont,
                        fontSize: 12.5, fontWeight: viewingTab === null ? 700 : 400,
                        background: viewingTab === null ? 'rgba(92,170,22,0.1)' : 'transparent',
                        color: viewingTab === null ? BRAND.green : BRAND.ink,
                      }}
                    >Live (latest scan)</button>
                    {availableTabs.map(t => (
                      <button
                        key={t}
                        onClick={() => { handleSelectTab(t); setDateDropdownOpen(false); }}
                        style={{
                          display: 'block', width: '100%', textAlign: 'left', padding: '7px 10px',
                          borderRadius: 5, border: 'none', cursor: 'pointer', fontFamily: monoFont,
                          fontSize: 12.5, fontWeight: viewingTab === t ? 700 : 400,
                          background: viewingTab === t ? 'rgba(92,170,22,0.1)' : 'transparent',
                          color: viewingTab === t ? BRAND.green : BRAND.ink,

                      >{formatTabLabel(t)}</button>
                    ))}

                )}
              </div>
            ) : (
              <span style={{ fontSize: 22, fontWeight: 700, color: BRAND.green, fontFamily: displayFont }}>
                {fetchState === 'ok' && sheetName ? formatTabLabel(sheetName) : fetchState === 'loading' ? 'Connecting to live sheet…' : 'Live data unavailable'}
              </span>
            )}
          </div>
        </div>
      </header>

      {fetchState === 'error' && (
        <div style={{
          background: '#FCEDE9', borderBottom: '1px solid ' + BRAND.red, padding: '10px 24px',
          fontSize: 13, color: '#7A2D1E', fontFamily: font, display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
        }}>
          <strong>Couldn't reach the live sheet.</strong>
          <span style={{ fontFamily: monoFont, fontSize: 12 }}>{fetchError}</span>
          <span>Try reloading the page.</span>

      {/* Stat strip - each one is also the signal filter control */}
      <div style={{

        overflowX: 'auto', padding: '8px 24px', justifyContent: 'center',
      }}>
        {[
          { key: 'crossed', label: 'Action Needed', value: counts.crossed },
          { key: 'stale', label: 'Stale Scans', value: counts.stale + counts.both },
          { key: 'clear', label: 'No Action Needed', value: counts.clear },
        ].map((s, i) => {
          const isActive = signalFilter === s.key;
          return (
            <button
              key={i}
              onClick={() => handleSelectSignalFilter(s.key)}
              aria-pressed={isActive}
              style={{
                flex: '0 0 auto', width: 150, padding: '8px 14px', textAlign: 'center',
                borderRadius: 8, cursor: 'pointer', fontFamily: font,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                border: '1.5px solid ' + (isActive ? BRAND.green : BRAND.line),
                background: isActive ? BRAND.green : BRAND.panel,
                boxShadow: isActive ? '0 2px 8px rgba(92,170,22,0.25)' : 'none',
                transition: 'background 0.15s, border-color 0.15s',
              }}
              onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = '#F1F4EC'; }}
              onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = BRAND.panel; }}
            >
              <span style={{
                fontSize: 19, fontWeight: isActive ? 700 : 600, fontFamily: displayFont,
                color: isActive ? '#FFFFFF' : BRAND.green, flexShrink: 0,
              }}>
                {s.value}
              </span>
              <span style={{
                fontSize: 11.5, textTransform: 'uppercase', letterSpacing: '0.03em', fontFamily: monoFont,
                color: isActive ? '#FFFFFF' : BRAND.muted, fontWeight: isActive ? 700 : 400,
                textAlign: 'left', lineHeight: 1.2,
              }}>
                {s.label}
              </span>
            </button>

        })}
      </div>

      {/* Filters */}
      <div style={{
        display: 'flex', gap: 10, padding: '12px 24px', borderBottom: '1px solid ' + BRAND.line,
        background: BRAND.panel, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center', width: '100%', maxWidth: 720 }}>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="Search site, box ID, hauler…"
          style={{
            flex: '1 1 220px', padding: '8px 12px', borderRadius: 5, border: '1px solid ' + BRAND.line,
            background: BRAND.paper, color: BRAND.ink, fontSize: 13, fontFamily: font,
          }}
        />
        <select
          value={sortBy}
          onChange={e => setSortBy(e.target.value)}
          style={{
            padding: '8px 12px', borderRadius: 5, border: '1px solid ' + BRAND.line,
            background: BRAND.paper, color: BRAND.ink, fontSize: 13, fontFamily: font, cursor: 'pointer',
          }}
        >
          {(SORT_OPTIONS_BY_VIEW[signalFilter] || SORT_OPTIONS_BY_VIEW.clear).map(([val, label]) => (
            <option key={val} value={val}>{label}</option>
          ))}
        </select>
        </div>
      </div>
      </div>

      {/* Main content - this is the part that scrolls; everything above
          (title bar, stat/filter buttons, search) stays pinned in view. */}
      <div style={{ flex: 1, padding: '20px 24px', overflowY: 'auto' }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          {fetchState === 'loading' && rows.length === 0 && (
            <div style={{ textAlign: 'center', padding: '80px 20px', color: BRAND.muted, fontFamily: font }}>
              Loading live data from the sheet…
            </div>
          )}
          {rows.length > 0 && (
            <QueueView boxes={actionQueue} onSelect={setSelected} monoFont={monoFont} font={font} />
          )}
        </div>
      </div>

      {selected && (
        <DetailPanel
          box={selected}
          onClose={() => setSelected(null)}
          onSave={saveBoxFields}
          contacts={masterContacts[selected.boxId]}
          emailTemplates={emailTemplates}
          monoFont={monoFont}
          font={font}
          displayFont={displayFont}
        />
      )}

      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: BRAND.dark, border: '1px solid ' + BRAND.greenLight, color: '#FAFBF8',
          padding: '10px 18px', borderRadius: 6, fontSize: 13, fontFamily: font,
          boxShadow: '0 8px 24px rgba(0,0,0,0.25)', zIndex: 100, maxWidth: '80vw',

    </div>
  );
}

              {b.staleStatus === 'stale' && <StatusPill meta={STALE_STATUS_META} statusKey="stale" />}

                  fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.amber,
                  background: 'rgba(201,122,26,0.08)', border: '1px solid rgba(201,122,26,0.3)',
                  borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                }}>{Math.round(b.staleHours).toLocaleString()}h</span>
              )}
              {/* Pickup Date + Confirmed pills - per explicit design
                  decision, both appear together and ONLY once a
                  Pick-Up Date has actually been saved for this box, so
                  the queue list surfaces at-a-glance which
                  already-scheduled boxes still need their confirmation
                  followed up on, without opening each one individually. */}
              {b.puDate && (
                <React.Fragment>
                  <span style={{
                    fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.green,
                    background: 'rgba(92,170,22,0.08)', border: '1px solid rgba(92,170,22,0.3)',
                    borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                  }}>PICKUP {formatSimpleDate(b.puDate)}</span>
                  <span style={{
                    fontSize: 10.5, fontWeight: 700, fontFamily: monoFont,
                    color: b.confirmed ? BRAND.green : BRAND.red,
                    background: b.confirmed ? 'rgba(92,170,22,0.08)' : 'rgba(179,64,43,0.08)',
                    border: '1px solid ' + (b.confirmed ? 'rgba(92,170,22,0.3)' : 'rgba(179,64,43,0.3)'),
                    borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                  }}>CONFIRMED: {b.confirmed ? 'YES' : 'NO'}</span>
                </React.Fragment>
              )}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// Converts an ISO timestamp string (or empty/missing value) into the
// yyyy-MM-dd format an HTML <input type="date"> requires. Uses UTC
// components for the same reason formatSimpleDate does above - the
// date a person picked shouldn't shift depending on the viewer's local
// timezone. Returns '' for anything unparseable, which is exactly what
// a date input needs to show as genuinely empty.
function toDateInputValue(value) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return '';
  const yyyy = d.getUTCFullYear();
  const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(d.getUTCDate()).padStart(2, '0');
  return yyyy + '-' + mm + '-' + dd;
}

// Converts a yyyy-MM-dd value (the live, in-progress Pick-Up Date INPUT
// value, not necessarily what's saved yet - per explicit design
// decision, the email should reflect whatever date is currently showing
// on screen) into the M/D/YYYY format used elsewhere on this dashboard.
// Parsed as separate y/m/d components rather than via `new Date(...)`
// directly, since a bare "yyyy-MM-dd" string is otherwise interpreted
// as UTC midnight by the Date constructor and can display as the
// previous day in timezones behind UTC.
function formatDateInputValue(value) {
  if (!value) return '';
  const parts = value.split('-');
  if (parts.length !== 3) return '';
  const year = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10);
  const day = parseInt(parts[2], 10);
  if (!year || !month || !day) return '';
  return month + '/' + day + '/' + year;
}

// Fills the Subject/Body templates from Master Box List with the
// current Pick-Up Date. Per explicit design decision (first of
// presumably more template fields to come): the Subject template
// already ends in a dash, and the date is appended right after it; the
// Body template contains the literal phrase "Firm Service Date!" and
// the date is inserted right after that phrase. If the Pick-Up Date
// input is empty, the templates are returned with that insertion point
// left as-is (nothing appended) rather than inserting a blank or
// placeholder-looking value, so an unscheduled box doesn't produce a
// confusing half-finished email.
function fillEmailTemplate(subjectTemplate, bodyTemplate, puDateInputValue) {
  const dateStr = formatDateInputValue(puDateInputValue);

  let subject = subjectTemplate || '';
  if (dateStr && subject) {
    subject = subject.replace(/-\s*$/, '- ' + dateStr);
  }

  let body = bodyTemplate || '';
  if (dateStr && body) {
    body = body.replace(/Firm Service Date!/, 'Firm Service Date! ' + dateStr);
  }

  return { subject, body };
}

function DetailPanel({ box, onClose, onSave, contacts, emailTemplates, monoFont, font, displayFont }) {
  const [schDateInput, setSchDateInput] = React.useState(() => toDateInputValue(box.schDate));
  const [puDateInput, setPuDateInput] = React.useState(() => toDateInputValue(box.puDate));
  const [confirmedInput, setConfirmedInput] = React.useState(box.confirmed);

  // Which email category pill is active. 'Service' uses the per-box
  // template from Master Box List (contacts.subjectTemplate/
  // bodyTemplate); any other label looks up the matching entry in
  // emailTemplates instead (the separate, generic Email Templates tab).
  // Defaults to Service since that's the original, most-used category.
  const [emailCategory, setEmailCategory] = React.useState('Service');

  // Three fully independent placement controls - per explicit design
  // decision, "Primary" (Master Box List's "To: Recipients" / Haulers
  // column), "Secondary" ("Cc: Recipients" / Customers), and "Staff"
  // (the "WasteNet Staff" column) are just three named groups, not
  // fixed to a specific email field. Each one independently can be
  // used as the email's To line, its Cc line, or left out of the email
  // entirely ('off') - e.g. Primary->To + Secondary->off is a perfectly
  // valid choice, same as the old fixed To/Cc mapping, or Secondary
  // alone in To with Primary completely omitted. Any combination
  // landing in the same field (e.g. all three 'to') is also valid -
  // they simply combine into that one field. Defaults match the
  // original, most common setup: Primary in To, Secondary in Cc, and
  // Staff off (this group is new and empty for every box until
  // populated, so it defaults out of outgoing emails until
  // deliberately turned on for a given box).
  const [primaryPlacement, setPrimaryPlacement] = React.useState('to'); // 'to' | 'cc' | 'off'
  const [secondaryPlacement, setSecondaryPlacement] = React.useState('cc'); // 'to' | 'cc' | 'off'
  const [staffPlacement, setStaffPlacement] = React.useState('off'); // 'to' | 'cc' | 'off'

  // Two fully independent save tracks, since these represent two
  // different real-world moments per explicit design decision:
  // scheduling (Scheduled Date + Pick-Up Date together, entered when
  // service is first arranged) happens at a different time than
  // confirming (entered later, once the hauler calls/emails back to
  // confirm) - sharing one Save button forced re-submitting unrelated
  // date fields just to record a confirmation, or risked silently
  // re-saving stale dates. dateSaveState drives the manual Save button
  // below the date fields; confirmedSaveState drives the small inline
  // feedback next to the checkbox, which saves itself immediately on
  // toggle with no button to click at all.
  const [dateSaveState, setDateSaveState] = React.useState('idle'); // idle | saving | saved | error
  const [dateSaveError, setDateSaveError] = React.useState(null);
  const [confirmedSaveState, setConfirmedSaveState] = React.useState('idle'); // idle | saving | saved | error
  const [confirmedSaveError, setConfirmedSaveError] = React.useState(null);

  // If a fresh poll/reload brings in updated values for this same box
  // (e.g. someone else already saved a change), reflect that rather
  // than silently keep showing what was on screen when the panel first
  // opened - but only when the user hasn't started editing that
  // specific field's track yet, so we never clobber input they're
  // actively in the middle of working with. The two tracks are checked
  // independently since they can now be mid-edit at different times.
  React.useEffect(() => {
    if (dateSaveState === 'idle') {
      setSchDateInput(toDateInputValue(box.schDate));
      setPuDateInput(toDateInputValue(box.puDate));
    }
  }, [box.schDate, box.puDate, dateSaveState]);

  React.useEffect(() => {
    if (confirmedSaveState === 'idle') {
      setConfirmedInput(box.confirmed);
    }
  }, [box.confirmed, confirmedSaveState]);

  const handleSaveDates = async () => {
    setDateSaveState('saving');
    setDateSaveError(null);
    try {
      await onSave(box.boxId, { schDate: schDateInput, puDate: puDateInput });
      setDateSaveState('saved');
      setTimeout(() => setDateSaveState('idle'), 2500);
    } catch (err) {
      setDateSaveState('error');
      setDateSaveError(err.message || String(err));
    }
  };

  // Clears the date INPUTS only - does not touch the Sheet by itself.
  // Per explicit design decision (guarding against an accidental clear
  // on the wrong box), this is a deliberately two-step action: Clear
  // empties the fields on screen, then the existing Save Dates button
  // is still required to actually commit that empty state back to the
  // Sheet - exactly the same save step every other date edit already
  // goes through, so a stray click on Clear alone can never erase real
  // data without a second, deliberate Save.
  const handleClearDates = () => {
    setSchDateInput('');
    setPuDateInput('');
  };

  // Confirmed has no Save button at all - checking/unchecking it saves
  // immediately, since per explicit design decision this needs to be a
  // single, foolproof action for the dashboard's primary day-to-day
  // user (no separate button to find or forget). If the save fails,
  // the checkbox visually reverts to its last-known-good state so the
  // screen never silently shows a checked box that didn't actually
  // make it into the Sheet.
  const handleSetConfirmed = async (next) => {
    if (next === confirmedInput) return; // already in this state, no need to re-save
    setConfirmedInput(next);
    setConfirmedSaveState('saving');
    setConfirmedSaveError(null);
    try {
      await onSave(box.boxId, { confirmed: next });
      setConfirmedSaveState('saved');
      setTimeout(() => setConfirmedSaveState('idle'), 2000);
    } catch (err) {
      setConfirmedInput(!next);
      setConfirmedSaveState('error');
      setConfirmedSaveError(err.message || String(err));
    }
  };

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
        background: 'rgba(0,0,0,0.35)', zIndex: 89,
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          position: 'relative', width: 'min(480px, 100%)', maxHeight: '85vh',
          background: BRAND.panel, borderRadius: 10, boxShadow: '0 12px 48px rgba(0,0,0,0.3)',
          zIndex: 90, display: 'flex', flexDirection: 'column', fontFamily: font, overflow: 'hidden',
        }}
      >
      <div style={{ padding: '18px 20px', borderBottom: '1px solid ' + BRAND.line, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', background: BRAND.green }}>
        <div>
          <div style={{ fontFamily: monoFont, fontSize: 18, fontWeight: 800, color: '#CCFF66' }}>BOX #{box.boxId}</div>
          <div style={{ fontWeight: 700, fontSize: 16, marginTop: 2, color: '#FFFFFF' }}>{box.description}</div>
        </div>
        <button onClick={onClose} style={{
          background: 'transparent', border: 'none', color: '#E8F3DF', fontSize: 20, cursor: 'pointer', lineHeight: 1,
        }}>×</button>
      </div>
      <div style={{ padding: 20, flex: 1, overflow: 'auto' }}>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
          <StatusPill meta={FILL_STATUS_META} statusKey={box.staleStatus === 'stale' && box.crossedStatus === 'crossed' ? 'unknown' : box.crossedStatus} />
          <StatusPill meta={STALE_STATUS_META} statusKey={box.staleStatus} />
        </div>

        {box.notes && (
          <div style={{
            background: '#FBF6E9', border: '1px solid #E8D9A8', borderRadius: 6, padding: 10,
            fontSize: 12, color: '#7A5E1E', marginBottom: 16, fontFamily: font,
          }}>{box.notes}</div>
        )}

        {/* Editable service tracking - the whole point of this panel
            for the dashboard's primary day-to-day user: enter what was
            scheduled, when pickup will happen, and whether the hauler
            confirmed, then save it straight back to the Sheet. Large,
            simple controls and an unmistakable saved/error message,
            since this is built for someone who isn't comfortable with
            technology and needs to know immediately and clearly that
            the save worked. */}
        <div style={{
          border: '2px solid ' + BRAND.green, borderRadius: 8, padding: 12, marginBottom: 14,
          background: 'rgba(92,170,22,0.05)',
        }}>
          <div style={{
            fontSize: 12, fontWeight: 700, color: BRAND.green, textTransform: 'uppercase',
            letterSpacing: '0.03em', marginBottom: 8, fontFamily: monoFont,
          }}>Scheduling</div>

          <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
            <label style={{ flex: 1, display: 'block' }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 3 }}>Scheduled Date</div>
              <input
                type="date"
                value={schDateInput}
                onChange={e => setSchDateInput(e.target.value)}
                style={{
                  width: '100%', padding: '7px 8px', fontSize: 14, borderRadius: 5,
                  border: '1.5px solid ' + BRAND.line, fontFamily: font, color: BRAND.ink, boxSizing: 'border-box',
                }}
              />
            </label>

            <label style={{ flex: 1, display: 'block' }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 3 }}>Pick-Up Date</div>
              <input
                type="date"
                value={puDateInput}
                onChange={e => setPuDateInput(e.target.value)}
                style={{
                  width: '100%', padding: '7px 8px', fontSize: 14, borderRadius: 5,
                  border: '1.5px solid ' + BRAND.line, fontFamily: font, color: BRAND.ink, boxSizing: 'border-box',
                }}
              />
            </label>
          </div>

          <div style={{ display: 'flex', gap: 8 }}>
            <button
              onClick={handleSaveDates}
              disabled={dateSaveState === 'saving'}
              style={{
                flex: 2, padding: '8px', fontSize: 14, fontWeight: 700, borderRadius: 5,
                border: 'none', cursor: dateSaveState === 'saving' ? 'default' : 'pointer',
                background: dateSaveState === 'saving' ? BRAND.muted : BRAND.green, color: '#FFFFFF',
                fontFamily: font,
              }}
            >
              {dateSaveState === 'saving' ? 'Saving…' : 'Save Dates'}
            </button>
            <button
              onClick={handleClearDates}
              disabled={dateSaveState === 'saving'}
              title="Clears the fields above - click Save Dates afterward to remove them from the sheet"
              style={{
                flex: 1, padding: '8px', fontSize: 13, fontWeight: 600, borderRadius: 5,
                border: '1.5px solid ' + BRAND.line, cursor: dateSaveState === 'saving' ? 'default' : 'pointer',
                background: BRAND.panel, color: BRAND.muted, fontFamily: font,
              }}
            >
              Clear
            </button>
          </div>

          {dateSaveState === 'saved' && (
            <div style={{
              marginTop: 8, padding: '6px 10px', background: 'rgba(92,170,22,0.12)',
              border: '1px solid ' + BRAND.green, borderRadius: 5, color: BRAND.greenDark,
              fontSize: 12.5, fontWeight: 600, textAlign: 'center',
            }}>✓ Saved successfully</div>
          )}
          {dateSaveState === 'error' && (
            <div style={{
              marginTop: 8, padding: '6px 10px', background: 'rgba(179,64,43,0.08)',
              border: '1px solid ' + BRAND.red, borderRadius: 5, color: BRAND.red,
              fontSize: 12, fontWeight: 600,
            }}>Could not save: {dateSaveError}</div>
          )}

          {/* Confirmation is its own separate action, entered later
              once the hauler actually calls/emails back - it has no
              Save button at all and saves itself the instant Yes or No
              is tapped, since per explicit design decision this needs
              to be a single, foolproof action for the dashboard's
              primary day-to-day user. Yes/No buttons (rather than a
              checkbox) per explicit design decision, so reversing a
              false confirmation is just as clear and easy an action as
              making one - both states are always visible and equally
              tappable, instead of "unchecked" reading as an absence of
              a real choice. */}
          <div style={{ borderTop: '1px solid ' + BRAND.line, marginTop: 10, paddingTop: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: BRAND.ink, marginBottom: 6 }}>Confirmed</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <button
                onClick={() => handleSetConfirmed(true)}
                disabled={confirmedSaveState === 'saving'}
                style={{
                  flex: 1, padding: '7px', fontSize: 13, fontWeight: 700, borderRadius: 5,
                  border: '1.5px solid ' + (confirmedInput ? BRAND.green : BRAND.line),
                  cursor: confirmedSaveState === 'saving' ? 'default' : 'pointer',
                  background: confirmedInput ? BRAND.green : BRAND.panel,
                  color: confirmedInput ? '#FFFFFF' : BRAND.muted, fontFamily: font,
                }}
              >Yes</button>
              <button
                onClick={() => handleSetConfirmed(false)}
                disabled={confirmedSaveState === 'saving'}
                style={{
                  flex: 1, padding: '7px', fontSize: 13, fontWeight: 700, borderRadius: 5,
                  border: '1.5px solid ' + (!confirmedInput ? BRAND.red : BRAND.line),
                  cursor: confirmedSaveState === 'saving' ? 'default' : 'pointer',
                  background: !confirmedInput ? BRAND.red : BRAND.panel,
                  color: !confirmedInput ? '#FFFFFF' : BRAND.muted, fontFamily: font,
                }}
              >No</button>
              {confirmedSaveState === 'saving' && (
                <span style={{ fontSize: 11, color: BRAND.muted, fontStyle: 'italic' }}>Saving…</span>
              )}
              {confirmedSaveState === 'saved' && (
                <span style={{ fontSize: 11, color: BRAND.greenDark, fontWeight: 600 }}>✓ Saved</span>
              )}
            </div>
            {confirmedSaveState === 'error' && (
              <div style={{
                marginTop: 10, padding: '10px 12px', background: 'rgba(179,64,43,0.08)',
                border: '1px solid ' + BRAND.red, borderRadius: 6, color: BRAND.red,
                fontSize: 13, fontWeight: 600,
              }}>Could not save: {confirmedSaveError}</div>
            )}
          </div>
        </div>

        {/* Email recipients, pulled from Master Box List (columns G/H,
            plus K for Staff) via a separate lookup, not the per-day
            scan data - per explicit design decision, only shown for
            boxes that actually have this data rather than displaying
            an empty dash for every box. */}
        {contacts && (contacts.toRecipients || contacts.ccRecipients || contacts.staffRecipients || contacts.subjectTemplate || contacts.bodyTemplate) && (() => {
          // Combines whichever of Primary/Secondary/Staff are placed
          // into each field - any number of groups can land in the
          // same field (e.g. two or three all 'to'), in which case
          // they're joined together rather than one overwriting the
          // other, since sending to multiple groups at once via the
          // same field is a perfectly normal thing to do.
          const groupsForPlacement = (placement) => {
            const parts = [];
            if (primaryPlacement === placement && contacts.toRecipients) parts.push(contacts.toRecipients);
            if (secondaryPlacement === placement && contacts.ccRecipients) parts.push(contacts.ccRecipients);
            if (staffPlacement === placement && contacts.staffRecipients) parts.push(contacts.staffRecipients);
            return parts.join('; ');
          };
          const effectiveTo = groupsForPlacement('to');
          const effectiveCc = groupsForPlacement('cc');

          // The 8 category pills: Service uses the per-box template
          // already on Master Box List; the other 7 look up their
          // Subject/Body from the separate Email Templates tab by Pill
          // Label. A pill only renders as usable if its template
          // actually has content - an empty/未-set-up category still
          // shows as a pill (so the full set is always visible and
          // consistent) but is visually disabled and does nothing if
          // tapped, rather than silently composing a blank email.
          const PILL_LABELS = ['Service', 'Emptied', 'Missed', 'Notice', 'Premature', 'Problem', 'Repair', 'Usage'];
          const getTemplateFor = (label) => {
            if (label === 'Service') {
              return { subjectTemplate: contacts.subjectTemplate, bodyTemplate: contacts.bodyTemplate };
            }
            return emailTemplates[label] || { subjectTemplate: '', bodyTemplate: '' };
          };

          const activeTemplate = getTemplateFor(emailCategory);
          const hasActiveTemplate = !!(activeTemplate.subjectTemplate || activeTemplate.bodyTemplate);

          const filled = fillEmailTemplate(activeTemplate.subjectTemplate, activeTemplate.bodyTemplate, puDateInput);
          const mailtoParams = [];
          if (effectiveCc) mailtoParams.push('cc=' + encodeURIComponent(effectiveCc));
          if (filled.subject) mailtoParams.push('subject=' + encodeURIComponent(filled.subject));
          if (filled.body) mailtoParams.push('body=' + encodeURIComponent(filled.body));
          const mailtoHref = 'mailto:' + encodeURIComponent(effectiveTo || '') +
            (mailtoParams.length ? '?' + mailtoParams.join('&') : '');

          // Small shared 3-way control (To / Cc / Off) for one
          // recipient group - used three times below, once each for
          // Primary, Secondary, and Staff, so all three stay visually
          // and behaviorally identical.
          const PlacementSelector = ({ value, onChange }) => (
            <div style={{ display: 'flex', gap: 4 }}>
              {[['to', 'To'], ['cc', 'Cc'], ['off', 'Off']].map(([val, label]) => (
                <button
                  key={val}
                  onClick={() => onChange(val)}
                  style={{
                    fontSize: 11, fontWeight: 600, padding: '4px 9px', borderRadius: 4,
                    border: '1px solid ' + (value === val ? BRAND.green : BRAND.line),
                    background: value === val ? BRAND.green : BRAND.panel,
                    color: value === val ? '#FFFFFF' : BRAND.muted,
                    cursor: 'pointer', fontFamily: monoFont,
                  }}
                >{label}</button>
              ))}
            </div>
          );

          return (
            <div style={{ marginTop: 16, paddingTop: 12, borderTop: '1px solid ' + BRAND.line }}>
              <div style={{
                fontSize: 12, fontWeight: 700, color: BRAND.muted, textTransform: 'uppercase',
                letterSpacing: '0.03em', marginBottom: 10, fontFamily: monoFont,
              }}>Email Recipients</div>

              {contacts.toRecipients && (
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 10 }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3 }}>Haulers</div>
                    <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word' }}>{contacts.toRecipients}</div>
                  </div>
                  <PlacementSelector value={primaryPlacement} onChange={setPrimaryPlacement} />
                </div>
              )}
              {contacts.ccRecipients && (
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 14 }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3 }}>Customers</div>
                    <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word' }}>{contacts.ccRecipients}</div>
                  </div>
                  <PlacementSelector value={secondaryPlacement} onChange={setSecondaryPlacement} />
                </div>
              )}
              {contacts.staffRecipients && (
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 14 }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3 }}>WasteNet Staff</div>
                    <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word' }}>{contacts.staffRecipients}</div>
                  </div>
                  <PlacementSelector value={staffPlacement} onChange={setStaffPlacement} />
                </div>
              )}

              <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 6 }}>Email Type</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
                {PILL_LABELS.map(label => {
                  const isActive = emailCategory === label;
                  const templateExists = !!(getTemplateFor(label).subjectTemplate || getTemplateFor(label).bodyTemplate);
                  return (
                    <button
                      key={label}
                      onClick={() => setEmailCategory(label)}
                      disabled={!templateExists}
                      title={templateExists ? '' : 'No template set up for this category yet'}
                      style={{
                        fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 20,
                        border: '1.5px solid ' + (isActive ? BRAND.green : BRAND.line),
                        background: isActive ? BRAND.green : BRAND.panel,
                        color: !templateExists ? '#C7CCC2' : (isActive ? '#FFFFFF' : BRAND.muted),
                        cursor: templateExists ? 'pointer' : 'not-allowed', fontFamily: font,
                        opacity: templateExists ? 1 : 0.6,
                      }}
                    >{label}</button>
                  );
                })}
              </div>

              {/* Compose button - builds a standard mailto: link with
                  the Pick-Up Date already inserted per
                  fillEmailTemplate's rules, using whichever category
                  pill is currently active - opens in whatever email
                  client/app is already the default on this device
                  (Outlook, Gmail, etc.), fully pre-filled and ready to
                  review and send, since a web page itself cannot send
                  email directly. */}
              {hasActiveTemplate ? (
                <a
                  href={mailtoHref}
                  target="_blank"
                  rel="noopener"
                  style={{
                    display: 'block', padding: '10px', textAlign: 'center',
                    borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: font,
                    background: BRAND.green, color: '#FFFFFF', textDecoration: 'none',
                  }}
                >Compose {emailCategory} Email</a>
              ) : (
                <div style={{
                  padding: '10px', textAlign: 'center', borderRadius: 6, fontSize: 13,
                  background: '#F1F3EC', color: BRAND.muted, fontFamily: font,
                }}>No template available for "{emailCategory}" yet</div>
              )}
            </div>
          );
        })()}

        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 16px',
          padding: '14px 0 0', borderTop: '1px solid ' + BRAND.line, marginTop: 16,
        }}>
          {[
            ['Hauler Code', box.haulCode],
            ['Service Method', box.serviceMethod],
            ['Text Blaze Shortcut', box.shortcut || '—'],
            ['Box Monitor Cell', box.cell || '—'],
            ['Trigger 1', box.trigger1 !== null ? box.trigger1 + '%' : '—'],
            ['Trigger 2', box.trigger2 !== null ? box.trigger2 + '%' : '—'],
            ['Trigger Used', box.triggerUsedLabel],
            ['Hours Since Last Cycle', box.staleHours !== null ? box.staleHours.toFixed(1) + ' h' : '—'],
            ['Service Needed?', box.srvcNeed || '—'],
            ['Crossed Trigger (Raw)', box.crossedTrigrRaw || '—'],
            ['Recent Date Pull Request', formatSimpleDate(box.datePullReqd) || '—'],
          ].map(([k, v]) => (
            <div key={k} style={{ minWidth: 0 }}>
              <div style={{ fontSize: 10.5, color: BRAND.muted, lineHeight: 1.2 }}>{k}</div>
              <div style={{ fontSize: 13, fontFamily: monoFont, fontWeight: 600, marginTop: 1 }}>{String(v)}</div>
            </div>
          ))}
        </div>
      </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WasteNetDashboard />);
</script>
</body>
</html>
