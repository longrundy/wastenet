            <div style={{ fontWeight: 700, fontSize: 16, marginTop: 2, color: '#FFFFFF' }}>Hauler {haulCode} — {boxes.length} box{boxes.length === 1 ? '' : 'es'}</div>
          </div>
          <button onClick={onClose} style={{
            background: 'transparent', border: 'none', color: '#E8F3DF', fontSize: 20, cursor: 'pointer', lineHeight: 1,
          }}>×</button>
        </div>
        <div className="modal-body" style={{ flex: 1, overflow: 'auto' }}>

          <div style={{
            fontSize: 12, fontWeight: 700, color: BRAND.muted, textTransform: 'uppercase',
            letterSpacing: '0.03em', marginBottom: 8, fontFamily: monoFont,
          }}>Boxes in this email</div>
          <div style={{
            border: '1px solid ' + BRAND.line, borderRadius: 6, padding: '10px 12px', marginBottom: 16,
            maxHeight: 180, overflowY: 'auto',
          }}>
            {boxes.map(b => (
              <div key={b.boxId} style={{ fontSize: 12.5, fontFamily: monoFont, padding: '3px 0', borderBottom: '1px solid #F1F3EC' }}>
                <span style={{ color: BRAND.muted }}>#{b.boxId}</span> {b.description}
              </div>
            ))}
          </div>

          <div style={{
            border: '2px solid ' + BRAND.green, borderRadius: 8, padding: 12, marginBottom: 16,
            background: 'rgba(92,170,22,0.05)',
          }}>
            <div style={{
              fontSize: 12, fontWeight: 700, color: BRAND.green, textTransform: 'uppercase',
              letterSpacing: '0.03em', marginBottom: 8, fontFamily: monoFont,
            }}>Shared Pick-Up Date</div>
            <input
              type="date"
              value={puDateInput}
              onChange={e => setPuDateInput(e.target.value)}
              style={{
                width: '100%', padding: '7px 8px', fontSize: 14, borderRadius: 5,
                border: '1.5px solid ' + BRAND.line, fontFamily: font, color: BRAND.ink, boxSizing: 'border-box',
                marginBottom: 8,
              }}
            />
            <button
              onClick={handleSaveDateToAll}
              disabled={!puDateInput || dateSaveState === 'saving'}
              style={{
                width: '100%', padding: '8px', fontSize: 13.5, fontWeight: 700, borderRadius: 5,
                border: 'none', cursor: (!puDateInput || dateSaveState === 'saving') ? 'default' : 'pointer',
                background: (!puDateInput || dateSaveState === 'saving') ? BRAND.muted : BRAND.green,
                color: '#FFFFFF', fontFamily: font,
              }}
            >{dateSaveState === 'saving' ? (dateSaveProgress || 'Saving…') : 'Save Date to All ' + boxes.length + ' Boxes'}</button>
            {dateSaveState === 'saved' && (
              <div style={{
                marginTop: 8, padding: '6px 10px', background: 'rgba(92,170,22,0.12)',
                border: '1px solid ' + BRAND.green, borderRadius: 5, color: BRAND.greenDark,
                fontSize: 12.5, fontWeight: 600, textAlign: 'center',
              }}>✓ Saved to all {boxes.length} boxes</div>
            )}
            {dateSaveState === 'error' && (
              <div style={{
                marginTop: 8, padding: '6px 10px', background: 'rgba(179,64,43,0.08)',
                border: '1px solid ' + BRAND.red, borderRadius: 5, color: BRAND.red,
                fontSize: 12, fontWeight: 600,
              }}>{dateSaveError}</div>
            )}
          </div>

          <div style={{
            fontSize: 12, fontWeight: 700, color: BRAND.muted, textTransform: 'uppercase',
            letterSpacing: '0.03em', marginBottom: 10, fontFamily: monoFont,
          }}>Email Recipients</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 10 }}>
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3, fontWeight: 700, textDecoration: 'underline' }}>Haulers:</div>
              <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word', minHeight: 16 }}>{haulerEmails}</div>
            </div>
            <PlacementSelector value={haulerPlacement} onChange={setHaulerPlacement} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 14 }}>
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3, fontWeight: 700, textDecoration: 'underline' }}>WasteNet Staff:</div>
              <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word', minHeight: 16 }}>{staffEmails}</div>
            </div>
            <PlacementSelector value={staffPlacement} onChange={setStaffPlacement} />
          </div>

          {hasTemplate ? (
            <EmailSendBlock
              sendLabel={'Proof Batch Email Draft (' + boxes.length + ' boxes)'}
              effectiveTo={effectiveTo}
              effectiveCc={effectiveCc}
              outgoingBcc={outgoingBcc}
              subject={finalSubject}
              body={finalBody}
              htmlBody={htmlBody}
              canSend={canSend}
              noRecipientHint="No To recipient yet - set the Haulers (or Staff) group to To before sending."
              sendState={sendState}
              sendError={sendError}
              onArm={() => setSendState('preview')}
              onCancel={() => { setSendState('idle'); setSendError(null); }}
              onConfirm={handleConfirmSend}
              onReset={() => { setSendState('idle'); setSendError(null); }}
              monoFont={monoFont}
              font={font}
            />
          ) : (
            <div style={{
              padding: '10px', textAlign: 'center', borderRadius: 6, fontSize: 13,
              background: '#F1F3EC', color: BRAND.muted, fontFamily: font,
            }}>No "Batch" template found - add a row to the Email Templates tab with Pill Label exactly "Batch".</div>
          )}
        </div>
      </div>
    </div>
  );
}

function QueueView({ boxes, onSelect, masterContacts, onSaveConfirmed, showConfirmPill, onForceService, showForcePill, activeView, sortBy, onOpenBatch, monoFont, font }) {
  // Batch grouping is active only on the Action Needed view while
  // sorted by Hauler - the exact combination where "everything this
  // hauler needs, as one email" is the task at hand. Rows get an
  // include checkbox (ALL INCLUDED by default - the batch email's
  // whole point is listing everything needing action, so exclusion is
  // the exception) and each hauler group gets a header with a Batch
  // Email button. excludedIds stores the EXCEPTIONS, so the default
  // empty set means everything's in; it resets whenever the view/sort
  // combination changes so a stale exclusion never silently carries
  // into a later session with different rows.
  const batchMode = activeView === 'crossed' && sortBy === 'haulCode' && !!onOpenBatch;
  const [excludedIds, setExcludedIds] = React.useState({});
  React.useEffect(() => { setExcludedIds({}); }, [activeView, sortBy]);
  const toggleExcluded = (boxId) => {
    setExcludedIds(prev => {
      const copy = { ...prev };
      if (copy[boxId]) delete copy[boxId]; else copy[boxId] = true;
      return copy;
    });
  };
  // Per-row Confirmed save tracking for the CONF'D checkbox pills.
  // Keyed by boxId; an entry exists only while that row's save is in
  // flight ({ value }) or just failed ('error'). While saving, the
  // checkbox optimistically shows the value being saved; on success
  // the entry is cleared and the checkbox falls back to the fresh
  // server value (onSaveConfirmed re-fetches the tab as part of
  // saving); on failure it reverts to the last-known-good server
  // value and the row shows a brief error - the screen never shows a
  // checked box that didn't actually make it into the Sheet.
  const [confirmSaves, setConfirmSaves] = React.useState({});

  // Same per-row save-tracking pattern for the FORCE SRVC buttons
  // (Stale Scans / No Action Needed views). A successful force writes
  // "YES (FORCED)" into the box's Srvc Need cell and re-fetches the
  // tab, at which point the box naturally disappears from THIS list
  // and shows up under Action Needed instead - no manual list surgery
  // needed here, the normal filter logic does it.
  const [forceSaves, setForceSaves] = React.useState({});

  const handleForceService = async (b) => {
    if (forceSaves[b.boxId] === 'saving') return;
    setForceSaves(prev => ({ ...prev, [b.boxId]: 'saving' }));
    try {
      await onForceService(b.boxId, { srvcNeed: 'YES (FORCED)' });
      setForceSaves(prev => { const copy = { ...prev }; delete copy[b.boxId]; return copy; });
    } catch (err) {
      setForceSaves(prev => ({ ...prev, [b.boxId]: 'error' }));
      setTimeout(() => {
        setForceSaves(prev => { const copy = { ...prev }; if (copy[b.boxId] === 'error') delete copy[b.boxId]; return copy; });
      }, 3500);
    }
  };

  const handleToggleConfirmed = async (b) => {
    const current = confirmSaves[b.boxId];
    if (current && current !== 'error') return; // save already in flight for this row
    const next = !b.confirmed;
    setConfirmSaves(prev => ({ ...prev, [b.boxId]: { value: next } }));
    try {
      await onSaveConfirmed(b.boxId, { confirmed: next });
      setConfirmSaves(prev => { const copy = { ...prev }; delete copy[b.boxId]; return copy; });
    } catch (err) {
      setConfirmSaves(prev => ({ ...prev, [b.boxId]: 'error' }));
      setTimeout(() => {
        setConfirmSaves(prev => { const copy = { ...prev }; if (copy[b.boxId] === 'error') delete copy[b.boxId]; return copy; });
      }, 3500);
    }
  };

  if (boxes.length === 0) {
    return (
      <div style={{ textAlign: 'center', padding: '80px 20px', color: BRAND.muted }}>
        <div style={{ fontSize: 15, fontFamily: font }}>No boxes need attention right now.</div>
        <div style={{ fontSize: 12.5, marginTop: 6, fontFamily: monoFont }}>Adjust filters, or check back after the next scan.</div>
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {boxes.map((b, boxIdx) => (
        <React.Fragment key={b._key}>
        {/* Hauler group header - inserted before the first row of each
            hauler code when batch mode is active. Shows the group's
            size and its Batch Email button, which opens the batch
            compose panel with this group's INCLUDED boxes (everything
            not explicitly unchecked below). Boxes with no hauler code
            get a labeled group too, but no button - there's no hauler
            to email. */}
        {batchMode && (boxIdx === 0 || boxes[boxIdx - 1].haulCode !== b.haulCode) && (() => {
          const groupBoxes = boxes.filter(x => x.haulCode === b.haulCode);
          const includedBoxes = groupBoxes.filter(x => !excludedIds[x.boxId]);
          const hasCode = b.haulCode && b.haulCode !== '—';
          return (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
              padding: '10px 14px', marginTop: boxIdx === 0 ? 0 : 8,
              background: 'rgba(92,170,22,0.07)', border: '1px solid ' + BRAND.greenLight,
              borderRadius: 7, flexWrap: 'wrap',
            }}>
              <span style={{ fontFamily: monoFont, fontSize: 13.5, fontWeight: 700, color: BRAND.greenDark }}>
                {hasCode ? 'HAULER ' + b.haulCode : 'NO HAULER CODE'}
                <span style={{ fontWeight: 400, color: BRAND.muted }}> — {includedBoxes.length} of {groupBoxes.length} box{groupBoxes.length === 1 ? '' : 'es'} included</span>
              </span>
              {hasCode && (
                <button
                  onClick={() => onOpenBatch(b.haulCode, includedBoxes)}
                  disabled={includedBoxes.length === 0}
                  style={{
                    fontSize: 12, fontWeight: 700, fontFamily: font, padding: '6px 14px',
                    borderRadius: 5, border: 'none',
                    background: includedBoxes.length === 0 ? BRAND.muted : BRAND.green, color: '#FFFFFF',
                    cursor: includedBoxes.length === 0 ? 'default' : 'pointer',
                  }}
                >Batch Email ({includedBoxes.length})</button>
              )}
            </div>
          );
        })()}
        <div className="row-hover" onClick={() => onSelect(b)} style={{
          display: 'flex', alignItems: 'center', gap: 16, padding: '14px 16px', cursor: 'pointer',
          background: BRAND.panel, border: '1px solid ' + BRAND.greenLight, borderRadius: 7,
          boxShadow: '0 2px 8px rgba(26,29,26,0.12)',
          opacity: batchMode && excludedIds[b.boxId] ? 0.55 : 1,
        }}>
          {/* Include-in-batch checkbox - batch mode only. Checked =
              included in this hauler's batch email (the default);
              unchecking excludes just this box. stopPropagation keeps
              the tap from opening the detail panel. */}
          {batchMode && (
            <label onClick={e => e.stopPropagation()} style={{ flexShrink: 0, display: 'flex', alignItems: 'center', cursor: 'pointer' }}>
              <input
                type="checkbox"
                checked={!excludedIds[b.boxId]}
                onChange={() => toggleExcluded(b.boxId)}
                style={{ width: 17, height: 17, accentColor: BRAND.green, cursor: 'pointer' }}
              />
            </label>
          )}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              <span style={{ fontFamily: monoFont, fontSize: 15, color: BRAND.ink, fontWeight: 400 }}>
                Box ID {b.boxId}{b.isInactive && <span style={{ fontWeight: 400, color: BRAND.muted }}> (Inactive Box)</span>}
              </span>
              <span style={{ fontWeight: 700, fontSize: 14.5, fontFamily: font, color: BRAND.green }}>{b.description}</span>
            </div>
            <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              {b.crossedStatus === 'crossed' && b.staleStatus !== 'stale' && <StatusPill meta={FILL_STATUS_META} statusKey="crossed" />}
              {/* Combined staleness pill - per explicit design
                  decision, the separate STALE SCAN pill + bare hours
                  pill were overkill on a page where every row is by
                  definition stale, so they're now ONE pill reading
                  "LAST CYCLE: 127h" (the hours figure comes from the
                  scanner's own "Last Cycle is X hours" note - it's
                  how long since the box last ran a compaction cycle,
                  which is exactly why it was flagged stale). Falls
                  back to the plain STALE SCAN pill for the rare box
                  flagged stale without a parseable hours figure. */}
              {b.staleStatus === 'stale' && (
                b.staleHours !== null ? (
                  <span style={{
                    fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.amber,
                    background: 'rgba(201,122,26,0.08)', border: '1px solid rgba(201,122,26,0.3)',
                    borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                  }}>LAST CYCLE: {formatDaysHours(b.staleHours)}</span>
                ) : (
                  <StatusPill meta={STALE_STATUS_META} statusKey="stale" />
                )
              )}
              {/* Hauler Code pill - informational (neutral gray rather
                  than a status color, so it never reads as an alert),
                  shown only when the box actually has a hauler code
                  rather than displaying a pointless placeholder pill
                  on every row. */}
              {/* Hauler pill - per explicit design decision, now shown
                  ONLY on the Action Needed view; removed from Stale
                  Scans and No Action Needed. */}
              {activeView === 'crossed' && b.haulCode && b.haulCode !== '—' && (
                <span style={{
                  fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.green,
                  background: 'rgba(92,170,22,0.10)', border: '1px solid rgba(92,170,22,0.3)',
                  borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                }}>HAULER {b.haulCode}</span>
              )}
              {/* Pickup Date pill - still only shown once a Pick-Up
                  Date has actually been saved for this box. */}
              {b.puDate && (
                <span style={{
                  fontSize: 10.5, fontWeight: 700, fontFamily: monoFont, color: BRAND.green,
                  background: 'rgba(92,170,22,0.08)', border: '1px solid rgba(92,170,22,0.3)',
                  borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                }}>PICKUP {formatSimpleDate(b.puDate)}</span>
              )}
              {/* CONF'D checkbox pill - per explicit design decision,
                  shown on EVERY row of the Action Needed view (and only
                  that view), NOT gated on a Pick-Up Date existing,
                  since portal-scheduled boxes (C-300/C-599) never get
                  a date entered here at all yet still need confirming.
                  Checking/unchecking saves to the Sheet immediately -
                  this replaced the detail panel's old Confirmed Yes/No
                  section entirely, so confirmations can be recorded
                  straight from the list without opening each box.
                  stopPropagation keeps the tap from ALSO opening the
                  row's detail panel. */}
              {showConfirmPill && (() => {
                const saveState = confirmSaves[b.boxId];
                const isSaving = saveState && saveState !== 'error';
                const isError = saveState === 'error';
                const shownChecked = isSaving ? saveState.value : b.confirmed;
                return (
                  <label
                    onClick={e => e.stopPropagation()}
                    style={{
                      display: 'inline-flex', alignItems: 'center', gap: 5,
                      fontSize: 10.5, fontWeight: 700, fontFamily: monoFont,
                      color: isError ? '#FFFFFF' : '#1B4E79',
                      background: isError ? BRAND.red : '#DCEEF9',
                      border: '1px solid ' + (isError ? BRAND.red : '#9CC4E0'),
                      borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                      cursor: isSaving ? 'default' : 'pointer', opacity: isSaving ? 0.6 : 1,
                    }}
                  >
                    <input
                      type="checkbox"
                      checked={shownChecked}
                      disabled={isSaving}
                      onChange={() => handleToggleConfirmed(b)}
                      style={{ width: 13, height: 13, accentColor: '#1B4E79', cursor: isSaving ? 'default' : 'pointer', margin: 0 }}
                    />
                    {isError ? 'SAVE FAILED' : "CONF'D"}
                  </label>
                );
              })()}
              {/* FORCE SRVC button pill - per explicit design
                  decision, shown on the Stale Scans and No Action
                  Needed views only. One tap writes "YES (FORCED)"
                  into the box's Srvc Need cell on the current tab,
                  which (via normalizeRow's forcedSrvc handling) moves
                  the box to the Action Needed page immediately - even
                  a stale box, since a manual force overrides
                  staleness (option 1). stopPropagation keeps the tap
                  from also opening the detail panel. */}
              {showForcePill && (() => {
                const state = forceSaves[b.boxId];
                const isSaving = state === 'saving';
                const isError = state === 'error';
                return (
                  <button
                    onClick={e => { e.stopPropagation(); handleForceService(b); }}
                    disabled={isSaving}
                    style={{
                      fontSize: 10.5, fontWeight: 700, fontFamily: monoFont,
                      color: isError ? '#FFFFFF' : BRAND.red,
                      background: isError ? BRAND.red : 'rgba(179,64,43,0.08)',
                      border: '1px solid ' + (isError ? BRAND.red : 'rgba(179,64,43,0.3)'),
                      borderRadius: 3, padding: '3px 8px', whiteSpace: 'nowrap',
                      cursor: isSaving ? 'default' : 'pointer', opacity: isSaving ? 0.6 : 1,
                    }}
                  >{isError ? 'SAVE FAILED' : isSaving ? 'SAVING…' : 'FORCE SRVC'}</button>
                );
              })()}
            </div>
          </div>
          {/* Trailing chevron - the only visual cue (besides cursor:pointer,
              which touchscreens ignore entirely) that this whole row is
              tappable. Sits outside the flexible content column so it never
              competes with the pill row for width, and stays put regardless
              of how many pills a box ends up showing. */}
          <span aria-hidden="true" style={{
            flexShrink: 0, fontSize: 20, lineHeight: 1, color: BRAND.muted, fontFamily: font,
          }}>›</span>
        </div>
        </React.Fragment>
      ))}
    </div>
  );
}

// Converts an ISO timestamp string (or empty/missing value) into the
// yyyy-MM-dd format an HTML <input type="date"> requires. Uses UTC
// components for the same reason formatSimpleDate does above - the
// date a person picked shouldn't shift depending on the viewer's local
// timezone. Returns '' for anything unparseable, which is exactly what
// a date input needs to show as genuinely empty.
function toDateInputValue(value) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return '';
  const yyyy = d.getUTCFullYear();
  const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(d.getUTCDate()).padStart(2, '0');
  return yyyy + '-' + mm + '-' + dd;
}

// Converts a yyyy-MM-dd value (the live, in-progress Pick-Up Date INPUT
// value, not necessarily what's saved yet - per explicit design
// decision, the email should reflect whatever date is currently showing
// on screen) into the M/D/YYYY format used elsewhere on this dashboard.
// Parsed as separate y/m/d components rather than via `new Date(...)`
// directly, since a bare "yyyy-MM-dd" string is otherwise interpreted
// as UTC midnight by the Date constructor and can display as the
// previous day in timezones behind UTC.
function formatDateInputValue(value) {
  if (!value) return '';
  const parts = value.split('-');
  if (parts.length !== 3) return '';
  const year = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10);
  const day = parseInt(parts[2], 10);
  if (!year || !month || !day) return '';
  return month + '/' + day + '/' + year;
}

// Fills the Subject/Body templates from Master Box List with the
// current Pick-Up Date. Per explicit design decision (first of
// presumably more template fields to come): the Subject template
// already ends in a dash, and the date is appended right after it; the
// Body template contains the literal phrase "Firm Service Date!" and
// the date is inserted right after that phrase. If the Pick-Up Date
// input is empty, the templates are returned with that insertion point
// left as-is (nothing appended) rather than inserting a blank or
// placeholder-looking value, so an unscheduled box doesn't produce a
// confusing half-finished email.
function fillEmailTemplate(subjectTemplate, bodyTemplate, puDateInputValue) {
  const dateStr = formatDateInputValue(puDateInputValue);

  // Two ways the Pick-Up Date lands in a Service template, checked in
  // this order:
  //  1. An explicit [pickup date] placeholder (case-insensitive,
  //     replaced everywhere it appears) - the self-documenting option,
  //     visible as a reminder when editing the Service Email Content
  //     tab. Added per explicit design decision precisely so the
  //     insertion point isn't invisible to someone editing templates.
  //  2. If no placeholder exists, the ORIGINAL rules still apply
  //     unchanged, so no existing template needs editing: the Subject's
  //     trailing dash gets the date appended after it, and the Body's
  //     "Firm Service Date!" phrase gets the date inserted in front.
  // Either way, an empty Pick-Up Date leaves the template as-is
  // (placeholder visibly intact), never inserting a blank.
  let subject = subjectTemplate || '';
  if (dateStr && subject) {
    if (/\[pickup date\]/i.test(subject)) {
      subject = subject.replace(/\[pickup date\]/gi, dateStr);
    } else {
      subject = subject.replace(/-\s*$/, '- ' + dateStr);
    }
  }

  let body = bodyTemplate || '';
  if (dateStr && body) {
    if (/\[pickup date\]/i.test(body)) {
      body = body.replace(/\[pickup date\]/gi, dateStr);
    } else {
      body = body.replace(/Firm Service Date!/, dateStr + ' Firm Service Date!');
    }
  }

  return { subject, body };
}

// Parses a Service body template's property list for the per-property
// checkbox picker. The anchor is the "Please empty & return the
// following compactor(s):" line (matched loosely - case-insensitive,
// "&" or "and", tolerant of the exact wording around it), and - per
// explicit design decision, relying on the confirmed fact that the
// property list is always the LAST thing in every Service body - the
// block runs from the line after the anchor to the end of the body.
// Within the block, structure is detected rather than worded: a line
// ENDING IN A COLON (e.g. "Metro National Property:") is a group
// header, not a selectable property; every other non-blank line is one
// selectable property. Returns null when there's no anchor (not a
// standard service-request body). propCount lets the caller skip the
// picker UI entirely for single-property boxes, where there's nothing
// to choose.
function parseServiceProperties(bodyTemplate) {
  if (!bodyTemplate) return null;
  const lines = String(bodyTemplate).split(/\r?\n/);
  let anchorIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (/empty\s*(&|and)\s*return the following/i.test(lines[i])) { anchorIdx = i; break; }
  }
  if (anchorIdx === -1) return null;

  const items = [];
  for (let i = anchorIdx + 1; i < lines.length; i++) {
    const t = lines[i].trim();
    if (!t) continue;
    items.push({ type: /:\s*$/.test(t) ? 'header' : 'property', text: t });
  }
  const propCount = items.filter(function (it) { return it.type === 'property'; }).length;
  return { lines: lines, anchorIdx: anchorIdx, items: items, propCount: propCount };
}

// Rebuilds a Service body so its property block contains ONLY the
// checked properties (selectedIndexes = positions within parsed.items),
// preserving original order. A group header is kept exactly when at
// least one property beneath it (i.e. after it, before the next
// header) is checked - so a header can never go out dangling over an
// empty group. Everything from the start of the body through the
// anchor line is kept verbatim; one blank line separates it from the
// rebuilt list.
function rebuildServiceBody(parsed, selectedIndexes) {
  const sel = {};
  selectedIndexes.forEach(function (i) { sel[i] = true; });

  const headerHasChecked = {};
  let currentHeader = -1;
  parsed.items.forEach(function (it, idx) {
    if (it.type === 'header') currentHeader = idx;
    else if (sel[idx] && currentHeader !== -1) headerHasChecked[currentHeader] = true;
  });

  const kept = parsed.items.filter(function (it, idx) {
    return it.type === 'header' ? !!headerHasChecked[idx] : !!sel[idx];
  });

  return parsed.lines.slice(0, parsed.anchorIdx + 1).join('\n') + '\n\n' +
    kept.map(function (it) { return it.text; }).join('\n');
}

function DetailPanel({ box, onClose, onSave, onSendEmail, contacts, emailTemplates, scanTitle, sheetName, onLoadHistory, monoFont, font, displayFont }) {
  // Request History - fetched fresh from the ledger each time a box's
  // panel opens (keyed on boxId, not object identity, so background
  // refreshes don't re-fetch it). null = still loading.
  const [history, setHistory] = React.useState(null);
  const [historyError, setHistoryError] = React.useState(null);

  // Reusable fetch - called on open (below) and again right after any
  // successful save from this panel (Save Date / Clear), so the
  // Request History card reflects the action that was just taken
  // without needing to close and reopen the box. Deliberately does NOT
  // blank the list while refreshing, so an update reads as the new
  // entry appearing rather than the whole card flickering through a
  // loading state.
  const fetchHistory = React.useCallback(async () => {
    try {
      const entries = await onLoadHistory(box.boxId);
      setHistory(entries);
      setHistoryError(null);
    } catch (err) {
      setHistoryError(err.message || String(err));
      setHistory([]);
    }
  }, [box.boxId, onLoadHistory]);

  React.useEffect(() => {
    setHistory(null);
    setHistoryError(null);
    fetchHistory();
  }, [fetchHistory]);

  // Turns a ledger entry into a friendly one-line description.
  const describeHistoryEntry = (e) => {
    const when = (() => {
      const d = new Date(e.ts);
      if (isNaN(d.getTime())) return e.ts;
      let hour = d.getHours();
      const ampm = hour >= 12 ? 'PM' : 'AM';
      hour = hour % 12; if (hour === 0) hour = 12;
      const min = String(d.getMinutes()).padStart(2, '0');
      return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear() + ' ' + hour + ':' + min + ampm;
    })();
    let what;
    if (e.event === 'REQUEST') what = 'Pickup scheduled for ' + (formatDateInputValue(e.pickupDate) || e.pickupDate);
    else if (e.event === 'CLEARED') what = 'Dates cleared';
    else if (e.event === 'CONFIRMED (link)') what = 'Confirmed ' + e.detail + ' (via email link)';
    else if (e.event === 'CONFIRMED (manual)') what = 'Confirmed manually on dashboard';
    else if (e.event === 'UNCONFIRMED (manual)') what = 'Confirmation unchecked on dashboard';
    else if (e.event === 'FORCED SRVC') what = 'Manually forced to Action Needed';
    else what = e.event + (e.detail ? ' — ' + e.detail : '');
    return { when, what };
  };

  const [puDateInput, setPuDateInput] = React.useState(() => toDateInputValue(box.puDate));

  // Which email category pill is active. 'Service' uses the per-box
  // template from Master Box List (contacts.subjectTemplate/
  // bodyTemplate); any other label looks up the matching entry in
  // emailTemplates instead (the separate, generic Email Templates tab).
  // Defaults to Service since that's the original, most-used category.
  const [emailCategory, setEmailCategory] = React.useState('Service');

  // Send flow state - idle | preview | sending | sent | error (see
  // EmailSendBlock). Lives HERE at the top of DetailPanel (not inside
  // the email-section render block below) because React hooks aren't
  // allowed inside conditional render logic - same reasoning as the
  // Weights selections below. Reset whenever a DIFFERENT box is opened
  // or the email category pill changes, so an armed preview for one
  // email can never be confirmed after the content underneath it has
  // been swapped out. Keyed on boxId, not object identity, so the
  // 5-minute background refresh never wipes an in-progress preview.
  const [sendState, setSendState] = React.useState('idle');
  const [sendError, setSendError] = React.useState(null);
  React.useEffect(() => { setSendState('idle'); setSendError(null); }, [box.boxId, emailCategory]);

  // Which individual WasteNet Staff addresses are checked for
  // inclusion. Unlike Haulers/Customers (whole-group only), the Staff
  // group is a per-person multi-select: each address from the Master
  // Box List's Staff column renders as its own checkbox, and only the
  // CHECKED people ride along in whatever placement (To/Cc/Bcc) the
  // Staff selector is set to. Defaults to NONE checked per the same
  // design rule as the property picker - selecting is a deliberate
  // act each time. Reset when a DIFFERENT box is opened (keyed on
  // boxId, not object identity, so background refreshes never wipe
  // selections mid-edit).
  const [selectedStaff, setSelectedStaff] = React.useState([]);
  React.useEffect(() => { setSelectedStaff([]); }, [box.boxId]);
  const toggleStaff = (addr) => {
    setSelectedStaff(prev =>
      prev.includes(addr) ? prev.filter(a => a !== addr) : [...prev, addr]
    );
  };

  // Weights email month/year selections. The Weights template's body
  // contains literal [months], [year], and [box description]
  // placeholders (Email Templates tab, Pill Label "Weights") - months
  // is a multi-select (any number of the 12 can be checked), year is a
  // single choice between the current and previous year only, computed
  // fresh from today's date so this never needs a manual update each
  // January. Both live HERE at the top of DetailPanel (not inside the
  // email-section render block below) because React hooks aren't
  // allowed inside conditional render logic. Defaults: no months
  // checked (forcing a deliberate choice each time, since the whole
  // point is that the request is specific per email), current year.
  const [selectedMonths, setSelectedMonths] = React.useState([]);
  const [selectedYear, setSelectedYear] = React.useState(String(new Date().getFullYear()));

  const toggleMonth = (month) => {
    setSelectedMonths(prev =>
      prev.includes(month) ? prev.filter(m => m !== month) : [...prev, month]
    );
  };

  // Which properties (by position within the parsed Service property
  // list) are checked for inclusion in a composed Service email.
  // Defaults to NONE checked per explicit design decision - selecting
  // is a deliberate act each time. Reset whenever a DIFFERENT box is
  // opened (keyed on boxId, not object identity, since the box prop
  // object is replaced by every background refresh and resetting on
  // that would wipe selections mid-edit every few minutes).
  const [selectedProps, setSelectedProps] = React.useState([]);
  React.useEffect(() => { setSelectedProps([]); }, [box.boxId]);
  const togglePropItem = (idx) => {
    setSelectedProps(prev =>
      prev.includes(idx) ? prev.filter(i => i !== idx) : [...prev, idx]
    );
  };

  // Portal-scheduled haulers - per explicit design decision, boxes
  // whose Hauler Code is C-300 (Republic Services) or C-599 (WM) are
  // NOT scheduled by entering dates here at all: service requests for
  // these haulers go through their own online portals. For those
  // boxes, the Scheduling box's date fields / Save / Confirmed
  // controls are replaced entirely with a link to the right portal.
  // The code match is normalized (uppercased, punctuation/spaces
  // stripped) so "C-300", "C300", and "c-300" all count as the same
  // code rather than depending on exactly how it was typed into
  // Master Box List.
  const PORTAL_LINKS = {
    'C300': { name: 'Republic Services', url: 'https://www.republicservices.com/service-support/request' },
    'C599': { name: 'WM (Waste Management)', url: 'https://ebusiness.wmsbs.wm.com/Customer/Locations#' },
  };
  const normalizedHaulCode = String(box.haulCode || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const portal = PORTAL_LINKS[normalizedHaulCode] || null;

  // Three fully independent placement controls - per explicit design
  // decision, "Primary" (Master Box List's "To: Recipients" / Haulers
  // column), "Secondary" ("Cc: Recipients" / Customers), and "Staff"
  // (the "WasteNet Staff" column) are just three named groups, not
  // fixed to a specific email field. Each one independently can be
  // used as the email's To line, its Cc line, its Bcc line, or left
  // out of the email entirely ('off'). Any combination landing in the
  // same field (e.g. all three 'to') is also valid - they simply
  // combine into that one field. Per explicit design decision
  // (revised): ALL THREE now default to 'off', so every email starts
  // with no recipients at all and each group must be deliberately
  // switched on per send - no group is ever included by default.
  const [primaryPlacement, setPrimaryPlacement] = React.useState('off'); // 'to' | 'cc' | 'bcc' | 'off'
  const [secondaryPlacement, setSecondaryPlacement] = React.useState('off'); // 'to' | 'cc' | 'bcc' | 'off'
  const [staffPlacement, setStaffPlacement] = React.useState('off'); // 'to' | 'cc' | 'bcc' | 'off'

  // Save track for the date fields' manual Save button. (Confirmed no
  // longer lives on this panel at all - per explicit design decision
  // it moved to the list view as a checkbox pill on the Action Needed
  // view, where it can be toggled without opening each box; see
  // QueueView.)
  const [dateSaveState, setDateSaveState] = React.useState('idle'); // idle | saving | saved | error
  const [dateSaveError, setDateSaveError] = React.useState(null);

  // If a fresh poll/reload brings in updated values for this same box
  // (e.g. someone else already saved a change), reflect that rather
  // than silently keep showing what was on screen when the panel first
  // opened - but only when the user hasn't started editing yet, so we
  // never clobber input they're actively in the middle of working with.
  React.useEffect(() => {
    if (dateSaveState === 'idle') {
      setPuDateInput(toDateInputValue(box.puDate));
    }
  }, [box.puDate, dateSaveState]);

  // Saves the Pick-Up Date only, per explicit design decision
  // (consistency with the batch panel's single date field): the
  // Scheduled Date input was removed from this panel entirely - the
  // request date is captured automatically (the Apps Script stamps
  // today into a blank Scheduled Date whenever a pickup is saved, and
  // the Request Ledger records the exact request moment shown in the
  // Request History section below), so there's nothing left for a
  // person to enter. schDate is deliberately OMITTED from this save so
  // the server-side auto-fill owns that column.
  const handleSaveDates = async () => {
    setDateSaveState('saving');
    setDateSaveError(null);
    try {
      await onSave(box.boxId, { puDate: puDateInput });
      setDateSaveState('saved');
      setTimeout(() => setDateSaveState('idle'), 2500);
      fetchHistory();
    } catch (err) {
      setDateSaveState('error');
      setDateSaveError(err.message || String(err));
    }
  };

  // Clears both date fields AND saves that cleared state straight to
  // the Sheet in one tap - per explicit design decision (revised),
  // replacing the old two-step clear-then-Save flow. Reuses the same
  // save track as Save Dates, so the same ✓ Saved / error feedback
  // appears.
  const handleClearDates = async () => {
    setPuDateInput('');
    setDateSaveState('saving');
    setDateSaveError(null);
    try {
      await onSave(box.boxId, { schDate: '', puDate: '' });
      setDateSaveState('saved');
      setTimeout(() => setDateSaveState('idle'), 2500);
      fetchHistory();
    } catch (err) {
      setDateSaveState('error');
      setDateSaveError(err.message || String(err));
    }
  };

  return (
    <div
      onClick={onClose}
      className="modal-overlay"
      style={{
        position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
        background: 'rgba(0,0,0,0.35)', zIndex: 89,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        className="modal-panel"
        style={{
          position: 'relative',
          background: BRAND.panel, boxShadow: '0 12px 48px rgba(0,0,0,0.3)',
          zIndex: 90, display: 'flex', flexDirection: 'column', fontFamily: font, overflow: 'hidden',
        }}
      >
      <div style={{ padding: '18px 20px', borderBottom: '1px solid ' + BRAND.line, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', background: BRAND.green }}>
        <div>
          <div style={{ fontFamily: monoFont, fontSize: 18, fontWeight: 800, color: '#CCFF66' }}>BOX #{box.boxId}</div>
          <div style={{ fontWeight: 700, fontSize: 16, marginTop: 2, color: '#FFFFFF' }}>{box.description}</div>
        </div>
        <button onClick={onClose} style={{
          background: 'transparent', border: 'none', color: '#E8F3DF', fontSize: 20, cursor: 'pointer', lineHeight: 1,
        }}>×</button>
      </div>
      <div className="modal-body" style={{ flex: 1, overflow: 'auto' }}>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between' }}>
          {formatScanTimestamp(scanTitle) && (
            <span style={{ fontSize: 12, color: BRAND.muted, fontFamily: monoFont }}>
              <span style={{ fontWeight: 700, color: BRAND.ink }}>As of:</span> {formatScanTimestamp(scanTitle)}
            </span>
          )}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <StatusPill meta={FILL_STATUS_META} statusKey={box.staleStatus === 'stale' && box.crossedStatus === 'crossed' ? 'unknown' : box.crossedStatus} />
            <StatusPill meta={STALE_STATUS_META} statusKey={box.staleStatus} />
          </div>
        </div>

        {box.notes && (() => {
          // The notes banner doubles as the "confirmed" banner once a
          // hauler confirmation lands ("Confirmed by NAME on ..."
          // appended to Notes). Display rules, per explicit design
          // decision: while the box IS currently confirmed, the banner
          // shows in loud highlighter yellow with bold text. If the
          // confirmation was later UNchecked, the "Confirmed by..."
          // text is removed from the DISPLAY entirely - a banner
          // asserting a confirmation that isn't currently true is
          // worse than no banner - while the sheet's Notes column
          // keeps the full text as the permanent paper trail. Any
          // OTHER note content (Last Cycle, chart issues, etc.) stays
          // visible in the ordinary soft style either way.
          const isConfirmed = box.confirmed && /confirmed by/i.test(box.notes);
          const displayNotes = isConfirmed
            ? box.notes
            : String(box.notes)
                .replace(/\s*\|\s*Confirmed by [^|]+/gi, '')
                .replace(/^\s*Confirmed by [^|]+?(\s*\|\s*|$)/i, '')
                .trim();
          if (!displayNotes) return null;
          return (
            <div style={{
              background: isConfirmed ? '#FFF200' : '#FBF6E9',
              border: '1px solid ' + (isConfirmed ? '#D6C400' : '#E8D9A8'),
              borderRadius: 6, padding: 10,
              fontSize: 12, fontWeight: isConfirmed ? 700 : 400,
              color: isConfirmed ? '#1A1D1A' : '#7A5E1E',
              marginBottom: 16, fontFamily: font,
            }}>{displayNotes}</div>
          );
        })()}

        {/* Editable service tracking - the whole point of this panel
            for the dashboard's primary day-to-day user: enter what was
            scheduled, when pickup will happen, and whether the hauler
            confirmed, then save it straight back to the Sheet. Large,
            simple controls and an unmistakable saved/error message,
            since this is built for someone who isn't comfortable with
            technology and needs to know immediately and clearly that
            the save worked. */}
        <div style={{
          border: '2px solid ' + BRAND.green, borderRadius: 8, padding: 12, marginBottom: 14,
          background: 'rgba(92,170,22,0.05)',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
            gap: 10, marginBottom: 8, flexWrap: 'wrap',
          }}>
            <div style={{
              fontSize: 12, fontWeight: 700, color: BRAND.green, textTransform: 'uppercase',
              letterSpacing: '0.03em', fontFamily: monoFont,
            }}>Scheduling</div>
            {/* Scheduling Rule - per-box value from Master Box List
                column J ("Scheduling Rule"), delivered alongside the
                email contacts in the same master_contacts lookup.
                Only rendered when the box actually has a rule filled
                in, so boxes without one don't show an empty label.
                Per explicit design decision, styled as a bold yellow
                rounded pill so it visibly stands out from the rest of
                the Scheduling box - this is a per-site constraint the
                person scheduling needs to notice BEFORE picking dates,
                not incidental reference info. */}
            {contacts && contacts.schedulingRule && (
              <div style={{
                fontSize: 12, fontFamily: monoFont, fontWeight: 700, color: '#8A6D00',
                background: 'rgba(230,195,0,0.14)', border: '1px solid rgba(180,150,0,0.4)',
                borderRadius: 3, padding: '3px 8px', minWidth: 0,
              }}>
                Sched Rule: {contacts.schedulingRule}
              </div>
            )}
          </div>

          {/* For C-300 / C-599 boxes the entire dates-and-confirmed
              workflow below is replaced with a single portal link -
              see PORTAL_LINKS above. Everything inside the
              React.Fragment in the else-branch is the normal
              Scheduling workflow, completely unchanged. */}
          {portal ? (
            <div>
              <div style={{ fontSize: 13, color: BRAND.ink, marginBottom: 10, fontFamily: font }}>
                Service for this box is scheduled through the {portal.name} online portal, not by entering dates here.
              </div>
              <a
                href={portal.url}
                target="_blank"
                rel="noopener"
                style={{
                  display: 'block', padding: '10px', textAlign: 'center',
                  borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: font,
                  background: BRAND.green, color: '#FFFFFF', textDecoration: 'none',
                }}
              >Open {portal.name} Portal</a>
            </div>
          ) : (
          <React.Fragment>
          {/* Single Pick-Up Date field, per explicit design decision
              (consistency with the batch panel): the Scheduled Date
              input is gone - the request date is captured
              automatically (server-side auto-fill of the sheet column
              + the Request Ledger entry shown in Request History), so
              only the date a person actually decides remains. */}
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: 'block' }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 3 }}>Pick-Up Date</div>
              <input
                type="date"
                value={puDateInput}
                onChange={e => setPuDateInput(e.target.value)}
                style={{
                  width: '100%', padding: '7px 8px', fontSize: 14, borderRadius: 5,
                  border: '1.5px solid ' + BRAND.line, fontFamily: font, color: BRAND.ink, boxSizing: 'border-box',
                }}
              />
            </label>
            {/* Suggested Pick-Up Date hint - derived from the box's
                Scheduling Rule pill (NBD / N-BD) and today's actual
                date, per explicit design decision. Clickable so it
                fills the field above rather than being read-only
                reference text. Only rendered when the rule is present
                and recognized. */}
            {contacts && contacts.schedulingRule && (() => {
              const suggested = computeSuggestedPickupDate(contacts.schedulingRule);
              if (!suggested) return null;
              const suggestedLabel = suggested.toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
              });
              return (
                <div style={{ fontSize: 12, color: BRAND.muted, marginTop: 5 }}>
                  Suggested (per {contacts.schedulingRule}):{' '}
                  <button
                    type="button"
                    onClick={() => setPuDateInput(toDateInputValue(suggested))}
                    style={{
                      background: 'none', border: 'none', padding: 0, margin: 0,
                      color: BRAND.greenDark, fontWeight: 700, fontFamily: font,
                      fontSize: 12, cursor: 'pointer', textDecoration: 'underline',
                    }}
                  >{suggestedLabel}</button>
                </div>
              );
            })()}
          </div>

          <div style={{ display: 'flex', gap: 8 }}>
            <button
              onClick={handleSaveDates}
              disabled={dateSaveState === 'saving'}
              style={{
                flex: 2, padding: '8px', fontSize: 14, fontWeight: 700, borderRadius: 5,
                border: 'none', cursor: dateSaveState === 'saving' ? 'default' : 'pointer',
                background: dateSaveState === 'saving' ? BRAND.muted : BRAND.green, color: '#FFFFFF',
                fontFamily: font,
              }}
            >
              {dateSaveState === 'saving' ? 'Saving…' : 'Save Date'}
            </button>
            <button
              onClick={handleClearDates}
              disabled={dateSaveState === 'saving' || (!box.puDate && !box.schDate)}
              title="Removes the saved date from this box's record immediately"
              style={{
                flex: 1, padding: '8px', fontSize: 13, fontWeight: 600, borderRadius: 5,
                border: '1.5px solid ' + BRAND.line,
                cursor: (dateSaveState === 'saving' || (!box.puDate && !box.schDate)) ? 'default' : 'pointer',
                background: BRAND.panel,
                color: (!box.puDate && !box.schDate) ? '#C7CCBE' : BRAND.muted,
                fontFamily: font,
              }}
            >
              Clear Saved Date
            </button>
          </div>

          {dateSaveState === 'saved' && (
            <div style={{
              marginTop: 8, padding: '6px 10px', background: 'rgba(92,170,22,0.12)',
              border: '1px solid ' + BRAND.green, borderRadius: 5, color: BRAND.greenDark,
              fontSize: 12.5, fontWeight: 600, textAlign: 'center',
            }}>✓ Saved successfully</div>
          )}
          {dateSaveState === 'error' && (
            <div style={{
              marginTop: 8, padding: '6px 10px', background: 'rgba(179,64,43,0.08)',
              border: '1px solid ' + BRAND.red, borderRadius: 5, color: BRAND.red,
              fontSize: 12, fontWeight: 600,
            }}>Could not save: {dateSaveError}</div>
          )}
          </React.Fragment>
          )}
        </div>

        {/* Email recipients, pulled from Master Box List (columns G/H,
            plus I for Staff) via a separate lookup, not the per-day
            scan data. Per explicit design decision (revised): this
            section now appears for EVERY box, always listing all three
            groups in a fixed order - Haulers, Customers, WasteNet
            Staff - with a group that has no addresses simply showing
            blank rather than being hidden. Always seeing the same
            three rows in the same places makes a missing group's
            blankness itself visible information ("this box has no
            hauler emails set up yet"), instead of the section quietly
            rearranging itself per box. */}
        {(() => {
          // Safe fallback for boxes with no Master Box List entry at
          // all - every field reads as blank/empty, and the section
          // still renders in full.
          const c = contacts || {};
          // Combines whichever of Primary/Secondary/Staff are placed
          // into each field - any number of groups can land in the
          // same field (e.g. two or three all 'to'), in which case
          // they're joined together rather than one overwriting the
          // other, since sending to multiple groups at once via the
          // same field is a perfectly normal thing to do.
          // Staff is the one per-person group: split the raw column
          // value into individual entries (semicolon/comma separated,
          // exactly how the Apps Script parses recipients later) and
          // keep only the checked ones. Non-email stray values (e.g.
          // a note that wandered into the column) still show up as
          // checkboxes rather than being hidden - visible bad data is
          // fixable data - they just should not be checked.
          const staffList = String(c.staffRecipients || '').split(/[;,]/)
            .map(s => s.trim()).filter(s => s);
          const checkedStaffStr = staffList.filter(a => selectedStaff.includes(a)).join('; ');

          const groupsForPlacement = (placement) => {
            const parts = [];
            if (primaryPlacement === placement && c.toRecipients) parts.push(c.toRecipients);
            if (secondaryPlacement === placement && c.ccRecipients) parts.push(c.ccRecipients);
            if (staffPlacement === placement && checkedStaffStr) parts.push(checkedStaffStr);
            return parts.join('; ');
          };
          const effectiveTo = groupsForPlacement('to');
          const effectiveCc = groupsForPlacement('cc');
          const effectiveBcc = groupsForPlacement('bcc');

          // The 8 category pills: Service uses the per-box template
          // already on Master Box List; the other 7 look up their
          // Subject/Body from the separate Email Templates tab by Pill
          // Label. A pill only renders as usable if its template
          // actually has content - an empty/未-set-up category still
          // shows as a pill (so the full set is always visible and
          // consistent) but is visually disabled and does nothing if
          // tapped, rather than silently composing a blank email.
          const PILL_LABELS = ['Service', 'Emptied', 'Missed', 'Notice', 'Premature', 'Problem', 'Repair', 'Usage', 'Weights'];
          const getTemplateFor = (label) => {
            if (label === 'Service') {
              return { subjectTemplate: c.subjectTemplate || '', bodyTemplate: c.bodyTemplate || '' };
            }
            return emailTemplates[label] || { subjectTemplate: '', bodyTemplate: '' };
          };

          const activeTemplate = getTemplateFor(emailCategory);
          const hasActiveTemplate = !!(activeTemplate.subjectTemplate || activeTemplate.bodyTemplate);

          const filled = fillEmailTemplate(activeTemplate.subjectTemplate, activeTemplate.bodyTemplate, puDateInput);

          // Property picker (Service only): parsed from the RAW body
          // template - the date fill above only ever edits within
          // existing lines, so line/item positions match between this
          // parse and the compose-time parse of the filled body below.
          // Only offered when there's genuinely a choice to make (2+
          // properties).
          const serviceProps = emailCategory === 'Service' ? parseServiceProperties(activeTemplate.bodyTemplate) : null;
          const showPropertyPicker = !!(serviceProps && serviceProps.propCount > 1);

          // Weights placeholder fill - the Weights template's body (and
          // subject, harmlessly, in case placeholders are ever added
          // there too) contains literal [months], [year], and
          // [box description] markers. [months] becomes the checked
          // months joined with commas in calendar order (the order the
          // MONTH_NAMES list is defined in, regardless of what order
          // they were clicked); [year] becomes the chosen year;
          // [box description] becomes this box's description straight
          // from the scan data - no clicking needed for that one.
          // Matching is case-insensitive to be forgiving of how the
          // placeholder happens to be typed in the template. A
          // placeholder with NOTHING selected for it is deliberately
          // left as-is in the draft (same principle as the Service
          // template's Pick-Up Date fill): an obvious [months] sitting
          // in the draft email is a clear "you forgot to pick" signal,
          // where silently deleting it could let a half-finished
          // request go out unnoticed.
          const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          let finalSubject = filled.subject;
          let finalBody = filled.body;
          if (emailCategory === 'Weights') {
            const monthsStr = MONTH_NAMES.filter(m => selectedMonths.includes(m)).join(', ');
            if (monthsStr) {
              finalSubject = finalSubject.replace(/\[months\]/gi, monthsStr);
              finalBody = finalBody.replace(/\[months\]/gi, monthsStr);
            }
            if (selectedYear) {
              finalSubject = finalSubject.replace(/\[year\]/gi, selectedYear);
              finalBody = finalBody.replace(/\[year\]/gi, selectedYear);
            }
            finalSubject = finalSubject.replace(/\[box description\]/gi, box.description);
            finalBody = finalBody.replace(/\[box description\]/gi, box.description);
          }

          // Property selection rebuild - runs BEFORE the confirmation
          // link is appended below, so the link always lands after the
          // final property list. If NOTHING is checked, the body is
          // deliberately left with its full original list (today's
          // behavior), never an empty request - the picker's hint text
          // makes this explicit.
          if (emailCategory === 'Service' && showPropertyPicker && selectedProps.length > 0) {
            const parsedFinal = parseServiceProperties(finalBody);
            if (parsedFinal) {
              finalBody = rebuildServiceBody(parsedFinal, selectedProps);
            }
          }

          // Hauler confirmation link - Service emails only, per
          // explicit design decision (hybrid placement): if this box's
          // Service body template contains a literal [confirm link]
          // placeholder, the link goes exactly there; if not, a
          // standard confirmation paragraph is appended to the end of
          // the body - so no per-box template editing is required for
          // every box to get the link, while placement control stays
          // available for any box whose template wants it. The link
          // opens the Apps Script's confirmation page (box details +
          // required name field + Confirm button - NOT
          // confirm-on-click, so email security scanners pre-fetching
          // the link can't trigger a false confirmation), carrying the
          // CURRENT tab's name so the confirmation is recorded on the
          // tab the request was actually sent from (plus the latest
          // tab - see the Apps Script's handleConfirmSubmit). Portal
          // and phone-serviced boxes are naturally unaffected: no
          // composed Service email, no link.
          let confirmUrl = null;
          if (emailCategory === 'Service' && sheetName && finalBody) {
            // Short, branded link (dashboard.wastenetinc.com/confirm)
            // rather than the raw Apps Script URL - per explicit
            // design decision: the long script.google.com URL looked
            // suspicious and unwieldy in real emails. A tiny redirect
            // page at /confirm in this same repo translates it to the
            // real confirmation page; b/t/k = boxId/tab/token.
            confirmUrl = 'https://dashboard.wastenetinc.com/confirm' +
              '?b=' + encodeURIComponent(box.boxId) +
              '&t=' + encodeURIComponent(sheetName) +
              '&k=' + confirmToken(box.boxId, sheetName);
            // Wording deliberately says "click below" rather than
            // naming a link or a button, because it precedes BOTH: the
            // raw URL in the plain-text fallback and the green button
            // in the HTML version.
            if (/\[confirm link\]/i.test(finalBody)) {
              finalBody = finalBody.replace(/\[confirm link\]/gi, confirmUrl);
            } else {
              finalBody += '\n\nPlease confirm this service is scheduled by clicking on the button below. No reply email is necessary.\n' + confirmUrl;
            }
          }

          // HTML version of the email - the confirm link renders as a
          // proper green button in real mail clients (see
          // buildEmailHtml). Non-Service emails have no confirmUrl and
          // simply get the nicely formatted HTML body.
          const htmlBody = finalBody ? buildEmailHtml(finalBody, confirmUrl, 'Confirm Service Scheduled',
            [formatDateInputValue(puDateInput), box.description]) : '';

          // Server-side send (SendGrid via the Apps Script's
          // send_email action) - a copy always Bcc'd to office@ per
          // explicit design decision, and a To recipient is required
          // (SendGrid rejects an email with only Cc/Bcc recipients).
          const outgoingBcc = withOfficeBcc(effectiveBcc);
          const canSend = !!(effectiveTo && finalSubject && finalBody);
          const handleConfirmSend = async () => {
            if (sendState === 'sending') return;
            setSendState('sending');
            setSendError(null);
            try {
              await onSendEmail({
                to: effectiveTo,
                cc: effectiveCc,
                bcc: outgoingBcc,
                subject: finalSubject,
                body: finalBody,
                html: htmlBody,
              });
              setSendState('sent');
            } catch (err) {
              setSendState('error');
              setSendError(err.message || String(err));
            }
          };

          // Small shared 3-way control (To / Cc / Bcc) for one
          // recipient group - used three times below, once each for
          // Primary, Secondary, and Staff, so all three stay visually
          // and behaviorally identical. There is no visible "Off"
          // button anymore (removed per explicit design decision, now
          // that every group defaults to off): 'off' is simply the
          // state where none of the three buttons is lit. Clicking a
          // button selects that placement; clicking the SAME button
          // again deselects it (back to off) - without this toggle
          // there would be no way to remove a group from an email
          // after turning it on.
          const PlacementSelector = ({ value, onChange }) => (
            <div style={{ display: 'flex', gap: 4 }}>
              {[['to', 'To'], ['cc', 'Cc'], ['bcc', 'Bcc']].map(([val, label]) => (
                <button
                  key={val}
                  onClick={() => onChange(value === val ? 'off' : val)}
                  style={{
                    fontSize: 11, fontWeight: 600, padding: '4px 9px', borderRadius: 4,
                    border: '1px solid ' + (value === val ? BRAND.green : BRAND.line),
                    background: value === val ? BRAND.green : BRAND.panel,
                    color: value === val ? '#FFFFFF' : BRAND.muted,
                    cursor: 'pointer', fontFamily: monoFont,
                  }}
                >{label}</button>
              ))}
            </div>
          );

          return (
            <div style={{ marginTop: 16, paddingTop: 12, borderTop: '1px solid ' + BRAND.line }}>
              <div style={{
                fontSize: 12, fontWeight: 700, color: BRAND.muted, textTransform: 'uppercase',
                letterSpacing: '0.03em', marginBottom: 10, fontFamily: monoFont,
              }}>Email Recipients</div>

              {/* All three groups always render, in this fixed order,
                  whether or not they have any addresses - a group with
                  nothing in Master Box List just shows a blank line
                  under its label. */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 10 }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3, fontWeight: 700, textDecoration: 'underline' }}>Haulers:</div>
                  <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word', minHeight: 16 }}>{c.toRecipients || ''}</div>
                </div>
                <PlacementSelector value={primaryPlacement} onChange={setPrimaryPlacement} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 10 }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3, fontWeight: 700, textDecoration: 'underline' }}>Customers:</div>
                  <div style={{ fontSize: 12.5, fontFamily: monoFont, wordBreak: 'break-word', minHeight: 16 }}>{c.ccRecipients || ''}</div>
                </div>
                <PlacementSelector value={secondaryPlacement} onChange={setSecondaryPlacement} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 14 }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontSize: 12.5, color: BRAND.muted, marginBottom: 3, fontWeight: 700, textDecoration: 'underline' }}>WasteNet Staff:</div>
                  {staffList.length === 0 ? (
                    <div style={{ fontSize: 12.5, fontFamily: monoFont, minHeight: 16 }}></div>
                  ) : (
                    <div className="staff-grid">
                      {staffList.map(addr => (
                        <label key={addr} style={{
                          display: 'flex', alignItems: 'flex-start', gap: 6, fontSize: 12.5,
                          fontFamily: monoFont, color: BRAND.ink, cursor: 'pointer',
                        }}>
                          <input
                            type="checkbox"
                            checked={selectedStaff.includes(addr)}
                            onChange={() => toggleStaff(addr)}
                            style={{ width: 15, height: 15, accentColor: BRAND.green, cursor: 'pointer', flexShrink: 0, marginTop: 1 }}
                          />
                          <span style={{ wordBreak: 'break-word' }}>{addr}</span>
                        </label>
                      ))}
                      {staffPlacement !== 'off' && selectedStaff.length === 0 && (
                        <div style={{
                          gridColumn: '1 / -1', marginTop: 2, padding: '4px 8px', background: '#FBF6E9',
                          border: '1px solid #E8D9A8', borderRadius: 5, color: '#7A5E1E',
                          fontSize: 11.5, fontWeight: 600,
                        }}>No staff checked yet - check who to include.</div>
                      )}
                    </div>
                  )}
                </div>
                <PlacementSelector value={staffPlacement} onChange={setStaffPlacement} />
              </div>

              <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 6 }}>Email Type</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
                {PILL_LABELS.map(label => {
                  const isActive = emailCategory === label;
                  const templateExists = !!(getTemplateFor(label).subjectTemplate || getTemplateFor(label).bodyTemplate);
                  return (
                    <button
                      key={label}
                      onClick={() => setEmailCategory(label)}
                      disabled={!templateExists}
                      title={templateExists ? '' : 'No template set up for this category yet'}
                      style={{
                        fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 20,
                        border: '1.5px solid ' + (isActive ? BRAND.green : BRAND.line),
                        background: isActive ? BRAND.green : BRAND.panel,
                        color: !templateExists ? '#C7CCC2' : (isActive ? '#FFFFFF' : BRAND.muted),
                        cursor: templateExists ? 'pointer' : 'not-allowed', fontFamily: font,
                        opacity: templateExists ? 1 : 0.6,
                      }}
                    >{label}</button>
                  );
                })}
              </div>

              {/* Service property picker - only for Service emails on
                  boxes whose body template lists 2+ properties. Group
                  headers (lines ending in a colon on the template)
                  show as bold labels, not checkboxes. Default is
                  nothing checked, per explicit design decision;
                  composing with nothing checked sends the FULL
                  original list, stated plainly in the hint below so
                  that fallback is never a surprise. */}
              {showPropertyPicker && (
                <div style={{
                  border: '1.5px solid ' + BRAND.line, borderRadius: 6, padding: 12,
                  marginBottom: 14, background: BRAND.paper,
                }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 6 }}>
                    Properties to include
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                    {serviceProps.items.map((it, idx) => (
                      it.type === 'header' ? (
                        <div key={idx} style={{
                          fontSize: 12.5, fontWeight: 700, color: BRAND.ink, marginTop: idx === 0 ? 0 : 4,
                        }}>{it.text}</div>
                      ) : (
                        <label key={idx} style={{
                          display: 'flex', alignItems: 'flex-start', gap: 6, fontSize: 12.5,
                          fontFamily: monoFont, color: BRAND.ink, cursor: 'pointer',
                        }}>
                          <input
                            type="checkbox"
                            checked={selectedProps.includes(idx)}
                            onChange={() => togglePropItem(idx)}
                            style={{ width: 15, height: 15, accentColor: BRAND.green, cursor: 'pointer', flexShrink: 0, marginTop: 1 }}
                          />
                          <span style={{ wordBreak: 'break-word' }}>{it.text}</span>
                        </label>
                      )
                    ))}
                  </div>
                  {selectedProps.length === 0 && (
                    <div style={{
                      marginTop: 10, padding: '6px 10px', background: '#FBF6E9',
                      border: '1px solid #E8D9A8', borderRadius: 5, color: '#7A5E1E',
                      fontSize: 12, fontWeight: 600,
                    }}>Nothing selected yet - the email will include the full property list.</div>
                  )}
                </div>
              )}

              {/* Weights month/year picker - only appears while the
                  Weights pill is active, since these selections only
                  mean anything to that template's [months]/[year]
                  placeholders. Months are real checkboxes (any number
                  can be picked); Year is a two-way choice between the
                  current and previous year only, computed from today's
                  date. Sits directly above the Compose button so the
                  natural top-to-bottom flow is: pick the type, pick
                  the months/year, compose. */}
              {emailCategory === 'Weights' && hasActiveTemplate && (
                <div style={{
                  border: '1.5px solid ' + BRAND.line, borderRadius: 6, padding: 12,
                  marginBottom: 14, background: BRAND.paper,
                }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 6 }}>
                    Months to request
                  </div>
                  <div style={{
                    display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(105px, 1fr))',
                    gap: '4px 10px', marginBottom: 12,
                  }}>
                    {MONTH_NAMES.map(month => (
                      <label key={month} style={{
                        display: 'flex', alignItems: 'center', gap: 6, fontSize: 12.5,
                        fontFamily: font, color: BRAND.ink, cursor: 'pointer', whiteSpace: 'nowrap',
                      }}>
                        <input
                          type="checkbox"
                          checked={selectedMonths.includes(month)}
                          onChange={() => toggleMonth(month)}
                          style={{ width: 15, height: 15, accentColor: BRAND.green, cursor: 'pointer', flexShrink: 0 }}
                        />
                        {month}
                      </label>
                    ))}
                  </div>
                  <div style={{ fontSize: 12.5, fontWeight: 600, color: BRAND.ink, marginBottom: 6 }}>
                    Year
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    {[String(new Date().getFullYear()), String(new Date().getFullYear() - 1)].map(yr => (
                      <button
                        key={yr}
                        onClick={() => setSelectedYear(yr)}
                        style={{
                          flex: 1, padding: '7px', fontSize: 13, fontWeight: 700, borderRadius: 5,
                          border: '1.5px solid ' + (selectedYear === yr ? BRAND.green : BRAND.line),
                          background: selectedYear === yr ? BRAND.green : BRAND.panel,
                          color: selectedYear === yr ? '#FFFFFF' : BRAND.muted,
                          cursor: 'pointer', fontFamily: font,
                        }}
                      >{yr}</button>
                    ))}
                  </div>
                  {selectedMonths.length === 0 && (
                    <div style={{
                      marginTop: 10, padding: '6px 10px', background: '#FBF6E9',
                      border: '1px solid #E8D9A8', borderRadius: 5, color: '#7A5E1E',
                      fontSize: 12, fontWeight: 600,
                    }}>No months selected yet - the email's [months] spot will be left for you to fill in manually.</div>
                  )}
                </div>
              )}

              {/* Send button - sends the composed email directly
                  through the Apps Script's send_email action (SendGrid
                  API, From: WasteNet <office@wastenetinc.com>, replies
                  routed by the server to the monitored mailbox, a copy
                  always Bcc'd to office@ for team visibility), with
                  the Pick-Up Date already inserted per
                  fillEmailTemplate's rules, using whichever category
                  pill is currently active. No email client is ever
                  launched. Never one-click: the first click opens a
                  full preview of exactly what will go out, and only
                  Confirm & Send inside that preview actually sends -
                  see EmailSendBlock. */}
              {hasActiveTemplate ? (
                <EmailSendBlock
                  sendLabel={'Proof ' + emailCategory + ' Email Draft'}
                  effectiveTo={effectiveTo}
                  effectiveCc={effectiveCc}
                  outgoingBcc={outgoingBcc}
                  subject={finalSubject}
                  body={finalBody}
                  htmlBody={htmlBody}
                  canSend={canSend}
                  noRecipientHint="No To recipient yet - set at least one group (Haulers, Customers, or Staff) to To before sending."
                  sendState={sendState}
                  sendError={sendError}
                  onArm={() => setSendState('preview')}
                  onCancel={() => { setSendState('idle'); setSendError(null); }}
                  onConfirm={handleConfirmSend}
                  onReset={() => { setSendState('idle'); setSendError(null); }}
                  monoFont={monoFont}
                  font={font}
                />
              ) : (
                <div style={{
                  padding: '10px', textAlign: 'center', borderRadius: 6, fontSize: 13,
                  background: '#F1F3EC', color: BRAND.muted, fontFamily: font,
                }}>No template available for "{emailCategory}" yet</div>
              )}
            </div>
          );
        })()}

        <div className="detail-info-grid" style={{
          display: 'grid', gap: '8px 16px',
          padding: '14px 0 0', borderTop: '1px solid ' + BRAND.line, marginTop: 16,
        }}>
          {[
            ['Hauler Code', box.haulCode],
            ['Service Method', box.serviceMethod],
            ['Box Monitor Cell', box.cell || '—'],
            ['Trigger 1', box.trigger1 !== null ? box.trigger1 + '%' : '—'],
            ['Trigger 2', box.trigger2 !== null ? box.trigger2 + '%' : '—'],
            ['Trigger Used', box.triggerUsedLabel],
            ['Service Needed?', box.srvcNeed || '—'],
            ['Recent Date Pull Request', formatSimpleDate(box.datePullReqd) || '—'],
          ].map(([k, v]) => (
            <div key={k} style={{ minWidth: 0 }}>
              <div style={{ fontSize: 10.5, color: BRAND.muted, lineHeight: 1.2 }}>{k}</div>
              <div style={{ fontSize: 13, fontFamily: monoFont, fontWeight: 600, marginTop: 1 }}>{String(v)}</div>
            </div>
          ))}
        </div>

        {/* Request History - the box's permanent request/confirmation
            trail from the Request Ledger, independent of daily tabs.
            Per explicit design decision: lives at the VERY BOTTOM of
            the panel and is styled as a dark, compact "log card" -
            deliberately unlike every other section - so it reads as a
            system record rather than another form to work in. Newest
            first, capped at the 20 most recent events. */}
        <div style={{
          marginTop: 18, background: BRAND.dark, borderRadius: 8, padding: '12px 14px',
        }}>
          <div style={{
            fontSize: 11, fontWeight: 700, color: BRAND.greenLight, textTransform: 'uppercase',
            letterSpacing: '0.05em', marginBottom: 8, fontFamily: monoFont,
          }}>Request History</div>
          {history === null ? (
            <div style={{ fontSize: 11.5, color: '#9AA39A', fontStyle: 'italic' }}>Loading history…</div>
          ) : historyError ? (
            <div style={{ fontSize: 11.5, color: '#E8A093' }}>Could not load history: {historyError}</div>
          ) : history.length === 0 ? (
            <div style={{ fontSize: 11.5, color: '#9AA39A' }}>No request history yet for this box.</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
              {history.map((e, i) => {
                const { when, what } = describeHistoryEntry(e);
                return (
                  <div key={i} style={{
                    fontSize: 11.5, fontFamily: monoFont, lineHeight: 1.45,
                  }}>
                    <span style={{ color: BRAND.greenLight }}>{when}</span>
                    <span style={{ color: '#9AA39A' }}> — </span>
                    <span style={{ color: '#E8ECE6' }}>{what}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WasteNetDashboard />);
</script>
</body>
</html>
