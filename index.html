<!DOCTYPE html>
<!-- wastenet index · build 2026-07-11-landing-b · front door -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet</title>
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --red:#E24B4A; --red-dark:#A32D2D; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:var(--font); background:var(--page); color:var(--ink);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
    min-height:100%; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }

  .stage{width:min(520px,100%); text-align:center;}
  .logo{width:200px; height:auto; margin:0 auto 34px; display:block;}

  /* lock */
  .lock-card{width:min(340px,100%); margin:0 auto; background:var(--card); border:0.5px solid var(--line-strong); border-radius:12px; padding:22px; box-shadow:0 3px 14px rgba(0,0,0,0.06);}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:14px;}
  .lock-in{width:100%; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:6px; font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:10px; padding:11px; font-size:14px; font-weight:600; border-radius:6px; border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font); transition:background .12s;}
  .lock-btn:hover{background:var(--green-dark);}
  .lock-err{margin-top:11px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:6px; color:var(--red-dark); font-size:12.5px; font-weight:600;}

  /* choices - no cards, just icon + label. The disc is the affordance. */
  .picker{display:none;}
  .picker.show{display:flex; justify-content:center; gap:56px;}

  .pick{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    text-decoration:none; cursor:pointer; padding:6px 4px;
    -webkit-tap-highlight-color:transparent;
  }
  .disc{
    width:84px; height:84px; border-radius:50%;
    background:var(--green-tint-2); border:1px solid var(--green-border);
    display:flex; align-items:center; justify-content:center;
    color:var(--green-dark);
    transition:background .16s ease, border-color .16s ease, color .16s ease, transform .16s ease;
  }
  .pick:hover .disc{
    background:var(--green); border-color:var(--green); color:#fff;
    transform:translateY(-3px);
  }
  .disc svg{width:36px; height:36px; display:block;}
  .pick-t{
    font-size:14px; font-weight:600; color:var(--ink-2); letter-spacing:0.01em;
    transition:color .16s ease;
  }
  .pick:hover .pick-t{color:var(--green-dark);}

  @media (max-width:460px){
    .picker.show{gap:34px;}
    .logo{width:165px;}
    .disc{width:74px; height:74px;}
    .disc svg{width:32px; height:32px;}
  }
</style>
</head>
<body>

<div class="stage">

  <img class="logo" src="WastenetLogo.png" alt="WasteNet">

  <div class="lock-card" id="lockCard">
    <div class="lock-sub">Enter the access code to continue.</div>
    <input class="lock-in" id="lockIn" type="password" placeholder="Access code" autofocus>
    <button class="lock-btn" id="lockBtn">Unlock</button>
    <div class="lock-err" id="lockErr" style="display:none;"></div>
  </div>

  <div class="picker" id="picker">

    <a class="pick" href="wastenet-monitor.html">
      <div class="disc">
        <!-- compactor with a fill level -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7h16l-1.4 12.2a1 1 0 0 1-1 .8H6.4a1 1 0 0 1-1-.8L4 7z"/>
          <path d="M3 7l1.6-2.6a1 1 0 0 1 .86-.4h13.08a1 1 0 0 1 .86.4L21 7"/>
          <path d="M5.4 14h13.2" stroke-width="2.4"/>
        </svg>
      </div>
      <div class="pick-t">Box Monitoring</div>
    </a>

    <a class="pick" href="wastenet-accounting.html">
      <div class="disc">
        <!-- invoice -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 3h12v18l-2.4-1.6L13.2 21 12 19.6 10.8 21l-2.4-1.6L6 21V3z"/>
          <path d="M9.6 8.4h4.8"/>
          <path d="M9.6 12h4.8"/>
          <path d="M9.6 15.6h2.6"/>
        </svg>
      </div>
      <div class="pick-t">Accounting</div>
    </a>

  </div>

</div>

<script>
/* ============================================================
   WasteNet front door.

   This page loads no data of its own, so the code entered here
   isn't validated against anything yet - it's simply remembered
   in sessionStorage and sent by whichever dashboard you open
   next, where the Apps Script checks it server-side. A wrong
   code therefore fails on THAT page's lock screen, not this one.

   The point of gating here is convenience, not security: unlock
   once, and both dashboards open for the rest of the session.

   The legacy dashboard still lives at wastenet-legacy.html - it
   just isn't linked from here any more.
   ============================================================ */

var STORE = "wastenet_dashboard_key";

var lockCard = document.getElementById("lockCard");
var picker   = document.getElementById("picker");
var lockIn   = document.getElementById("lockIn");
var lockBtn  = document.getElementById("lockBtn");

function haveKey(){
  try { return !!sessionStorage.getItem(STORE); }
  catch(e){ return false; }
}

function showPicker(){
  lockCard.style.display = "none";
  picker.classList.add("show");
}

function unlock(){
  var v = (lockIn.value || "").trim();
  if(!v) return;
  try { sessionStorage.setItem(STORE, v); } catch(e){}
  showPicker();
}

lockBtn.onclick = unlock;
lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

if(haveKey()) showPicker();
else lockIn.focus();
</script>
</body>
</html>
