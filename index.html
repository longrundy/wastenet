<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WasteNet Box Monitor Scan</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #F1F3EC; }
  ::-webkit-scrollbar-thumb { background: #C7CCBE; border-radius: 4px; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid #5CAA16; outline-offset: 1px;
  }
  .row-hover:hover { background: #F1F4EC !important; }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ============================================================
// CONFIG - change this if you ever redeploy the Apps Script to a new URL
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec';

// WasteNet brand palette - sampled directly from the WASTENET logo (#5CAA16)
const BRAND = {
  green: '#5CAA16',
  greenDark: '#315A0C',
  greenLight: '#89C156',
  ink: '#525A60',
  dark: '#1A1D1A',
  paper: '#FAFBF8',
  panel: '#FFFFFF',
  line: '#E2E6DE',
  amber: '#C97A1A',
  red: '#B3402B',
  muted: '#6B7268',
};

const FILL_STATUS_META = {
  crossed: { label: 'TRIGGER CROSSED', color: BRAND.red, bg: 'rgba(179,64,43,0.08)', ring: 'rgba(179,64,43,0.3)' },
  clear: { label: 'BELOW TRIGGER', color: BRAND.green, bg: 'rgba(92,170,22,0.08)', ring: 'rgba(92,170,22,0.3)' },
  unknown: { label: 'NO READING', color: BRAND.muted, bg: 'rgba(107,114,104,0.08)', ring: 'rgba(107,114,104,0.25)' },
};

const STALE_STATUS_META = {
  stale: { label: 'SCAN STALE', color: BRAND.amber, bg: 'rgba(201,122,26,0.08)', ring: 'rgba(201,122,26,0.3)' },
  fresh: { label: 'SCAN FRESH', color: BRAND.green, bg: 'rgba(92,170,22,0.06)', ring: 'rgba(92,170,22,0.2)' },
};

function parseNum(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

// Converts a raw spreadsheet tab name (e.g. "2026-06-29" or
// "2026-06-28 (2)" for a same-day re-run) into a friendly display label
// (e.g. "Tue 6-29-26" or "Tue 6-28-26 (2)") for the dropdown. The
// underlying tab name itself is NEVER changed - only how it's shown to
// the user - since the real yyyy-MM-dd name is what the Apps Script
// relies on for finding "today's tab" and handling same-day collisions.
// Falls back to the raw name unchanged if it doesn't match the
// expected pattern, so an unexpected tab name never breaks the dropdown.
function formatTabLabel(tabName) {
  const m = String(tabName).match(/^(\d{4})-(\d{2})-(\d{2})(\s*\(\d+\))?$/);
  if (!m) return tabName;
  const year = m[1], month = m[2], day = m[3], suffix = m[4];
  const dateObj = new Date(Number(year), Number(month) - 1, Number(day));
  if (isNaN(dateObj.getTime())) return tabName;
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const dayLabel = dayNames[dateObj.getDay()];
  const shortYear = year.slice(-2);
  const label = dayLabel + ' ' + Number(month) + '-' + Number(day) + '-' + shortYear;
  return suffix ? label + ' ' + suffix.trim() : label;
}

function parseHoursFromNotes(notes) {
  if (!notes) return null;
  const m = String(notes).match(/Last Cycle is ([\d.]+) hours/i);
  return m ? parseFloat(m[1]) : null;
}

function normalizeRow(raw, idx) {
  const maxPct = parseNum(raw['Max Pct']);
  const t1 = parseNum(raw['Trigr1 Pct']);
  const t2 = parseNum(raw['Trigr2 Pct']);
  const triggerUsedRaw = String(raw['Trigr Used'] || '').toLowerCase();
  const activeTrigger = triggerUsedRaw.includes('2') ? t2 : t1;
  const crossedRaw = String(raw['Crossed Trigr'] || '').toUpperCase().trim();
  const crossed = crossedRaw === 'YES' ? 'crossed' : crossedRaw === 'NO' ? 'clear' : 'unknown';

  const notes = raw['Notes'] || '';
  const hours = parseHoursFromNotes(notes);
  const forcedStale = /YES \(forced\)/i.test(notes) || (hours !== null && hours > 24);
  const stale = forcedStale ? 'stale' : 'fresh';

  const srvcNeedRaw = String(raw['Srvc Need'] || '').toUpperCase().trim();

  return {
    _key: raw['Box ID'] != null ? String(raw['Box ID']) + '-' + idx : 'row-' + idx,
    boxId: raw['Box ID'] != null ? String(raw['Box ID']) : '—',
    cell: raw['Cell'] || '',
    description: raw['Description'] || '(no description)',
    haulCode: raw['Haul Code'] || '—',
    serviceMethod: raw['Srvc Mthd'] || '—',
    shortcut: raw['Txt Blz Shrtct'] || '',
    trigger1: t1,
    trigger2: t2,
    triggerUsedLabel: raw['Trigr Used'] || '—',
    activeTrigger: activeTrigger,
    maxPct: maxPct,
    crossedStatus: crossed,
    staleStatus: stale,
    staleHours: hours,
    srvcNeed: srvcNeedRaw,
    notes: notes,
    datePullReqd: raw["Date Pull Req'd"] || '',
    schDate: raw['Sch Date'] || '',
    puDate: raw['P/U Date'] || '',
    confirmed: raw['Cnfrmd'] === true || String(raw['Cnfrmd']).toUpperCase() === 'TRUE',
  };
}

function StatusPill({ meta, statusKey }) {
  const m = meta[statusKey];
  if (!m) return null;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 8px',
      borderRadius: 3, fontSize: 10.5, fontWeight: 700, letterSpacing: '0.04em',
      color: m.color, background: m.bg, border: '1px solid ' + m.ring, whiteSpace: 'nowrap',
      fontFamily: "Arial, Helvetica, sans-serif",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: m.color, boxShadow: '0 0 6px ' + m.color }} />
      {m.label}
    </span>
  );
}

function Gauge({ pct, size = 36 }) {
  if (pct === null) {
    return (
      <div style={{
        width: size, height: size * 1.5, borderRadius: 4, border: '1.5px dashed #C7CCBE',
        background: '#F1F3EC', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 9, color: BRAND.muted, flexShrink: 0, fontFamily: "Arial, Helvetica, sans-serif", textAlign: 'center',
      }}>N/A</div>
    );
  }
  const clamped = Math.max(0, Math.min(100, pct));
  const color = clamped >= 70 ? BRAND.red : clamped >= 45 ? BRAND.amber : BRAND.green;
  return (
    <div style={{
      position: 'relative', width: size, height: size * 1.5, borderRadius: 4,
      border: '1.5px solid #D8DCD2', background: '#F1F3EC', overflow: 'hidden', flexShrink: 0,
    }}>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, height: clamped + '%',
        background: 'linear-gradient(180deg, ' + color + 'cc, ' + color + ')',
        transition: 'height 0.4s ease',
      }} />
      <div style={{ position: 'absolute', top: '33%', left: 0, right: 0, borderTop: '1px dashed #BFC4B6' }} />
      <div style={{ position: 'absolute', top: '66%', left: 0, right: 0, borderTop: '1px dashed #BFC4B6' }} />
    </div>
  );
}

// localStorage-backed persistence (replaces the Claude-Artifact-only
// window.storage API, which does not exist outside Claude). Plain
// browser localStorage - same device/browser only, no cross-device
// sync. If you want shared state across staff, that would need a real
// backend; this keeps things simple for now.
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveLocal(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}

function WasteNetDashboard() {
  const [rows, setRows] = useState([]);
  const [sheetName, setSheetName] = useState(null);
  const [scanTitle, setScanTitle] = useState(null);
  const [fetchState, setFetchState] = useState('loading'); // loading | ok | error
  const [fetchError, setFetchError] = useState(null);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);

  // null = viewing today's/latest live data (auto-refreshes); any other
  // value = a specific past tab the user picked from the dropdown
  // (frozen - auto-refresh won't silently pull them back to "today"
  // while they're looking at an older scan).
  const [viewingTab, setViewingTab] = useState(null);
  const [availableTabs, setAvailableTabs] = useState([]);
  const [tabsLoadError, setTabsLoadError] = useState(null);

  const [query, setQuery] = useState('');
  const [signalFilter, setSignalFilter] = useState('crossed'); // ALL | crossed | stale | both | clear
  const [sortBy, setSortBy] = useState('description'); // boxId | description
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);

  const pollRef = useRef(null);

  // JSONP loader - used instead of fetch()/XHR because Apps Script Web
  // App URLs always 302-redirect internally to a googleusercontent.com
  // echo endpoint, and that redirected response doesn't carry an
  // Access-Control-Allow-Origin header, so a normal fetch() is blocked
  // by CORS even though the same URL works fine when visited directly.
  // A <script> tag isn't subject to that restriction, so we load the
  // URL that way and have the Apps Script (via its `callback` query
  // parameter) wrap its JSON as a call to a one-off global function we
  // define here.
  const jsonpLoad = useCallback((url) => {
    return new Promise((resolve, reject) => {
      const callbackName = 'wastenetJsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
      const script = document.createElement('script');
      let settled = false;

      const cleanup = () => {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        clearTimeout(timeoutId);
      };

      window[callbackName] = (data) => {
        if (settled) return;
        settled = true;
        cleanup();
        resolve(data);
      };

      const timeoutId = setTimeout(() => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('Timed out waiting for a response (15s) - check the Apps Script URL and deployment.'));
      }, 15000);

      script.onerror = () => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('Could not load the script (network error or invalid URL).'));
      };

      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
      document.head.appendChild(script);
    });
  }, []);

  // Loads either the live/latest scan (tabName omitted) or a specific
  // past tab by exact name. Used for the initial load, the 5-minute
  // auto-poll (live only), and whenever the user picks a date from the
  // dropdown.
  const loadTab = useCallback(async (tabName) => {
    setFetchState((prev) => (prev === 'ok' ? 'ok' : 'loading'));
    try {
      const url = tabName
        ? SHEET_URL + '?action=tab&name=' + encodeURIComponent(tabName)
        : SHEET_URL + '?action=latest';
      const json = await jsonpLoad(url);
      if (!json.ok) throw new Error(json.error || 'Unknown error from sheet endpoint');
      const normalized = (json.rows || []).map(normalizeRow);
      setRows(normalized);
      setSheetName(json.sheetName || null);
      setScanTitle(json.scanTitle || null);
      setFetchState('ok');
      setFetchError(null);
      setLastFetchedAt(new Date());
    } catch (err) {
      setFetchState('error');
      setFetchError(err.message || String(err));
    }
  }, [jsonpLoad]);

  // Fetches the dropdown's list of selectable past-scan tabs once on
  // load. A failure here is non-fatal - the dashboard still works fine
  // showing only live data, just without the history dropdown - so this
  // is tracked separately from the main fetchState/fetchError.
  const loadTabList = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=list_tabs');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading tab list');
      setAvailableTabs(json.tabs || []);
      setTabsLoadError(null);
    } catch (err) {
      setTabsLoadError(err.message || String(err));
    }
  }, [jsonpLoad]);

  const handleSelectTab = useCallback((name) => {
    if (name === '') {
      // Empty option = back to live
      setViewingTab(null);
      loadTab();
    } else {
      setViewingTab(name);
      loadTab(name);
    }
  }, [loadTab]);

  useEffect(() => {
    loadTab();
    loadTabList();
  }, [loadTab, loadTabList]);

  useEffect(() => {
    // Only auto-refresh while viewing live/latest data - if the user has
    // picked a specific past tab from the dropdown, leave it alone so
    // it doesn't silently snap back to "today" out from under them.
    if (viewingTab !== null) return;
    pollRef.current = setInterval(() => loadTab(), 5 * 60 * 1000);
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [viewingTab, loadTab]);

  const filtered = useMemo(() => {
    return rows.filter(r => {
      if (signalFilter === 'crossed' && r.crossedStatus !== 'crossed') return false;
      if (signalFilter === 'stale' && r.staleStatus !== 'stale') return false;
      if (signalFilter === 'both' && !(r.crossedStatus === 'crossed' && r.staleStatus === 'stale')) return false;
      if (signalFilter === 'clear' && (r.crossedStatus === 'crossed' || r.staleStatus === 'stale')) return false;
      if (query) {
        const q = query.toLowerCase();
        const hay = (r.description + ' ' + r.boxId + ' ' + r.haulCode + ' ' + r.cell).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [rows, signalFilter, query]);

  const actionQueue = useMemo(() => {
    // Default view (signalFilter === 'ALL') shows only boxes that need
    // attention (crossed or stale) - that's the "queue" concept. But if
    // the dropdown is explicitly set to something else (e.g. "No action
    // needed"), `filtered` has already narrowed to exactly that signal,
    // so re-applying the crossed/stale-only rule here would always
    // produce an empty list for "No action needed" - respect the
    // explicit choice instead of double-filtering against it.
    const base = signalFilter === 'ALL'
      ? filtered.filter(r => r.crossedStatus === 'crossed' || r.staleStatus === 'stale')
      : filtered;
    const list = base.slice();
    if (sortBy === 'description') {
      list.sort((a, b) => a.description.localeCompare(b.description));
    } else {
      list.sort((a, b) => {
        const numA = parseInt(a.boxId, 10);
        const numB = parseInt(b.boxId, 10);
        if (Number.isFinite(numA) && Number.isFinite(numB)) return numA - numB;
        return String(a.boxId).localeCompare(String(b.boxId));
      });
    }
    return list;
  }, [filtered, signalFilter, sortBy]);

  const counts = useMemo(() => {
    const c = { crossed: 0, stale: 0, both: 0, clear: 0, total: rows.length };
    rows.forEach(r => {
      const isCrossed = r.crossedStatus === 'crossed';
      const isStale = r.staleStatus === 'stale';
      if (isCrossed && isStale) c.both += 1;
      else if (isCrossed) c.crossed += 1;
      else if (isStale) c.stale += 1;
      else c.clear += 1;
    });
    return c;
  }, [rows]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  };

  const font = "Arial, Helvetica, sans-serif";
  const monoFont = "Arial, Helvetica, sans-serif";
  const displayFont = "Arial, Helvetica, sans-serif";

  return (
    <div style={{
      fontFamily: font, background: BRAND.paper, color: BRAND.ink, height: '100vh',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      {/* Frozen top section: title bar, stat/filter buttons, and search - stays
          visible while the box list below scrolls. */}
      <div style={{ flexShrink: 0, position: 'sticky', top: 0, zIndex: 10, background: BRAND.paper }}>
      {/* Header */}
      <header style={{
        borderBottom: '1px solid ' + BRAND.line, padding: '24px 24px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4,
        background: BRAND.paper, textAlign: 'center',
      }}>
        <div style={{
          fontFamily: displayFont, fontWeight: 700, fontSize: 30, letterSpacing: '0.02em',
          textTransform: 'uppercase', lineHeight: 1.1, color: BRAND.green,
        }}>WasteNet Box Monitor Scan</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', justifyContent: 'center', marginTop: 2 }}>
          <span style={{ fontSize: 12, color: BRAND.muted, fontFamily: monoFont, letterSpacing: '0.03em' }}>
            {fetchState === 'ok' && sheetName ? '"' + formatTabLabel(sheetName) + '"' : fetchState === 'loading' ? 'Connecting to live sheet…' : 'Live data unavailable'}
          </span>
          {availableTabs.length > 0 && (
            <select
              value={viewingTab || ''}
              onChange={e => handleSelectTab(e.target.value)}
              style={{
                padding: '4px 8px', borderRadius: 5, border: '1px solid ' + BRAND.line,
                background: BRAND.panel, color: BRAND.ink, fontSize: 12, fontFamily: monoFont, cursor: 'pointer',
              }}
            >
              <option value="">Live (latest scan)</option>
              {availableTabs.map(t => <option key={t} value={t}>{formatTabLabel(t)}</option>)}
            </select>
          )}
        </div>
      </header>

      {fetchState === 'error' && (
        <div style={{
          background: '#FCEDE9', borderBottom: '1px solid ' + BRAND.red, padding: '10px 24px',
          fontSize: 13, color: '#7A2D1E', fontFamily: font, display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
        }}>
          <strong>Couldn't reach the live sheet.</strong>
          <span style={{ fontFamily: monoFont, fontSize: 12 }}>{fetchError}</span>
          <span>Check the Apps Script deployment.</span>
        </div>
      )}

      {/* Stat strip - each one is also the signal filter control */}
      <div style={{
        display: 'flex', gap: 10, background: BRAND.paper, borderBottom: '1px solid ' + BRAND.line,
        overflowX: 'auto', padding: '14px 24px', justifyContent: 'center',
      }}>
        {[
          { key: 'crossed', label: 'Yes - Action Needed', value: counts.crossed + counts.both },
          { key: 'stale', label: 'Stale Cycles', value: counts.stale + counts.both },
          { key: 'clear', label: 'No - Action Not Needed', value: counts.clear },
        ].map((s, i) => {
          const isActive = signalFilter === s.key;
          return (
            <button
              key={i}
              onClick={() => setSignalFilter(s.key)}
              aria-pressed={isActive}
              style={{
                flex: '0 0 auto', width: 150, padding: '14px 18px', textAlign: 'center',
                borderRadius: 10, cursor: 'pointer', fontFamily: font,
                border: '1.5px solid ' + (isActive ? BRAND.green : BRAND.line),
                background: isActive ? BRAND.green : BRAND.panel,
                boxShadow: isActive ? '0 2px 10px rgba(92,170,22,0.25)' : 'none',
                transition: 'background 0.15s, border-color 0.15s',
              }}
              onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = '#F1F4EC'; }}
              onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = BRAND.panel; }}
            >
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                fontSize: 15, textTransform: 'uppercase', letterSpacing: '0.04em', fontFamily: monoFont, marginBottom: 4,
                color: isActive ? '#FFFFFF' : BRAND.muted,
              }}>
                {isActive && <span style={{ fontSize: 14 }}>✓</span>}
                {s.label}
              </div>
              <div style={{
                fontSize: 26, fontWeight: 700, fontFamily: displayFont,
                color: isActive ? '#FFFFFF' : BRAND.green,
              }}>
                {s.value}
              </div>
            </button>
          );
        })}
      </div>

      {/* Filters */}
      <div style={{
        display: 'flex', gap: 10, padding: '12px 24px', borderBottom: '1px solid ' + BRAND.line,
        background: BRAND.panel, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center', width: '100%', maxWidth: 720 }}>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="Search site, box ID, hauler…"
          style={{
            flex: '1 1 220px', padding: '8px 12px', borderRadius: 5, border: '1px solid ' + BRAND.line,
            background: BRAND.paper, color: BRAND.ink, fontSize: 13, fontFamily: font,
          }}
        />
        <select
          value={sortBy}
          onChange={e => setSortBy(e.target.value)}
          style={{
            padding: '8px 12px', borderRadius: 5, border: '1px solid ' + BRAND.line,
            background: BRAND.paper, color: BRAND.ink, fontSize: 13, fontFamily: font, cursor: 'pointer',
          }}
        >
          <option value="boxId">Sort: Box Number</option>
          <option value="description">Sort: Description</option>
        </select>
        </div>
      </div>
      </div>

      {/* Main content - this is the part that scrolls; everything above
          (title bar, stat/filter buttons, search) stays pinned in view. */}
      <div style={{ flex: 1, padding: '20px 24px', overflowY: 'auto' }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          {fetchState === 'loading' && rows.length === 0 && (
            <div style={{ textAlign: 'center', padding: '80px 20px', color: BRAND.muted, fontFamily: font }}>
              Loading live data from the sheet…
            </div>
          )}
          {rows.length > 0 && (
            <QueueView boxes={actionQueue} onSelect={setSelected} monoFont={monoFont} font={font} />
          )}
        </div>
      </div>

      {selected && (
        <DetailPanel
          box={selected}
          onClose={() => setSelected(null)}
          monoFont={monoFont}
          font={font}
          displayFont={displayFont}
        />
      )}

      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: BRAND.dark, border: '1px solid ' + BRAND.greenLight, color: '#FAFBF8',
          padding: '10px 18px', borderRadius: 6, fontSize: 13, fontFamily: font,
          boxShadow: '0 8px 24px rgba(0,0,0,0.25)', zIndex: 100, maxWidth: '80vw',
        }}>{toast}</div>
      )}
    </div>
  );
}

function QueueView({ boxes, onSelect, monoFont, font }) {
  if (boxes.length === 0) {
    return (
      <div style={{ textAlign: 'center', padding: '80px 20px', color: BRAND.muted }}>
        <div style={{ fontSize: 15, fontFamily: font }}>No boxes need attention right now.</div>
        <div style={{ fontSize: 12.5, marginTop: 6, fontFamily: monoFont }}>Adjust filters, or check back after the next scan.</div>
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {boxes.map(b => (
        <div key={b._key} className="row-hover" onClick={() => onSelect(b)} style={{
          display: 'flex', alignItems: 'center', gap: 16, padding: '14px 16px', cursor: 'pointer',
          background: BRAND.panel, border: '1px solid ' + BRAND.line, borderRadius: 7,
          borderLeft: '3px solid ' + BRAND.green,
        }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
              <span style={{ fontFamily: monoFont, fontSize: 15, color: BRAND.green, fontWeight: 700 }}>#{b.boxId}</span>
              <span style={{ fontWeight: 600, fontSize: 14.5, fontFamily: font }}>{b.description}</span>
            </div>
            <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap' }}>
              {b.crossedStatus === 'crossed' && <StatusPill meta={FILL_STATUS_META} statusKey="crossed" />}
              {b.staleStatus === 'stale' && <StatusPill meta={STALE_STATUS_META} statusKey="stale" />}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function DetailPanel({ box, onClose, monoFont, font, displayFont }) {
  return (
    <div style={{
      position: 'fixed', top: 0, right: 0, height: '100vh', width: 'min(440px, 100vw)',
      background: BRAND.panel, borderLeft: '1px solid ' + BRAND.line, boxShadow: '-12px 0 32px rgba(0,0,0,0.15)',
      zIndex: 90, display: 'flex', flexDirection: 'column', fontFamily: font,
    }}>
      <div style={{ padding: '18px 20px', borderBottom: '1px solid ' + BRAND.line, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', background: BRAND.dark }}>
        <div>
          <div style={{ fontFamily: monoFont, fontSize: 12, color: '#9CA597' }}>BOX #{box.boxId}</div>
          <div style={{ fontWeight: 700, fontSize: 16, marginTop: 2, color: '#FAFBF8' }}>{box.description}</div>
        </div>
        <button onClick={onClose} style={{
          background: 'transparent', border: 'none', color: '#9CA597', fontSize: 20, cursor: 'pointer', lineHeight: 1,
        }}>×</button>
      </div>
      <div style={{ padding: 20, flex: 1, overflow: 'auto' }}>
        <div style={{ display: 'flex', gap: 16, alignItems: 'center', marginBottom: 16 }}>
          <Gauge pct={box.maxPct} size={48} />
          <div>
            <div style={{ fontSize: 28, fontWeight: 700, fontFamily: displayFont, color: box.maxPct === null ? BRAND.muted : (box.maxPct >= 70 ? BRAND.red : box.maxPct >= 45 ? BRAND.amber : BRAND.green) }}>
              {box.maxPct !== null ? box.maxPct + '%' : 'No reading'}
            </div>
            <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap' }}>
              <StatusPill meta={FILL_STATUS_META} statusKey={box.crossedStatus} />
              <StatusPill meta={STALE_STATUS_META} statusKey={box.staleStatus} />
            </div>
          </div>
        </div>

        {box.notes && (
          <div style={{
            background: '#FBF6E9', border: '1px solid #E8D9A8', borderRadius: 6, padding: 10,
            fontSize: 12, color: '#7A5E1E', marginBottom: 16, fontFamily: font,
          }}>{box.notes}</div>
        )}

        {[
          ['Hauler code', box.haulCode],
          ['Service method', box.serviceMethod],
          ['Text Blaze shortcut', box.shortcut || '—'],
          ['Sensor phone', box.cell || '—'],
          ['Trigger 1', box.trigger1 !== null ? box.trigger1 + '%' : '—'],
          ['Trigger 2', box.trigger2 !== null ? box.trigger2 + '%' : '—'],
          ['Trigger used', box.triggerUsedLabel],
          ['Hours since last cycle', box.staleHours !== null ? box.staleHours.toFixed(1) + ' h' : '—'],
          ['Service need (sheet)', box.srvcNeed || '—'],
          ['Date pull requested', box.datePullReqd || '—'],
          ['Scheduled date', box.schDate || '—'],
          ['Pick-up date', box.puDate || '—'],
          ['Confirmed', box.confirmed ? 'Yes' : 'No'],
        ].map(([k, v]) => (
          <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '9px 0', borderBottom: '1px solid ' + BRAND.line, fontSize: 13, gap: 12 }}>
            <span style={{ color: BRAND.muted, flexShrink: 0 }}>{k}</span>
            <span style={{ fontFamily: monoFont, textAlign: 'right' }}>{String(v)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WasteNetDashboard />);
</script>
</body>
</html>
