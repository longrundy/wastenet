<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WasteNet Box Monitor Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #F1F3EC; }
  ::-webkit-scrollbar-thumb { background: #C7CCBE; border-radius: 4px; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid #5CAA16; outline-offset: 1px;
  }
  .row-hover:hover { background: #F1F4EC !important; }
  /* Modal sizing lives HERE (classes, not inline styles) because it
     needs media queries. Desktop/tablet: a centered card, widened to
     780px (was 640px) for more email-composing room, 90vh tall.
     Phones (<=640px, same breakpoint as .detail-info-grid): the modal
     becomes a true full-screen sheet - full width, full height, no
     rounded corners, no outer gutter - so every pixel of a small
     screen is working space. 100dvh (with 100vh fallback for older
     browsers) tracks the REAL visible height on mobile browsers whose
     URL bar collapses on scroll. */
  .modal-overlay { padding: 20px; }
  .modal-panel { width: min(780px, 100%); max-height: 90vh; border-radius: 10px; }
  .modal-body { padding: 20px; }
  @media (max-width: 640px) {
    .modal-overlay { padding: 0; }
    .modal-panel {
      width: 100%;
      height: 100vh; height: 100dvh;
      max-height: 100vh; max-height: 100dvh;
      border-radius: 0;
    }
    .modal-body { padding: 14px; }
  }
  /* WasteNet Staff checkboxes: two tidy columns on any normal screen,
     collapsing to one column only on very narrow phones where two
     columns of email addresses would wrap into unreadable shards. */
  .staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  @media (max-width: 480px) {
    .staff-grid { grid-template-columns: 1fr; }
  }
  .detail-info-grid { grid-template-columns: 1fr 1fr; }
  @media (min-width: 640px) {
    .detail-info-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ============================================================
// CONFIG - change this if you ever redeploy the Apps Script to a new URL
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec';

// All dashboard emails go out server-side via the Apps Script's
// send_email action (SendGrid API) as "WasteNet <office@wastenetinc.com>",
// with replies routed by the server to the monitored lgrundy@ mailbox.
// A copy of EVERY outgoing email is Bcc'd to this address so sent mail
// is always visible to the whole team in the shared mailbox - per
// explicit design decision.
const OFFICE_EMAIL = 'office@wastenetinc.com';

// WasteNet brand palette - sampled directly from the WASTENET logo (#5CAA16)
const BRAND = {
  green: '#5CAA16',
  greenDark: '#315A0C',
  greenLight: '#89C156',
  ink: '#525A60',
  dark: '#1A1D1A',
  paper: '#FAFBF8',
  panel: '#FFFFFF',
  line: '#E2E6DE',
  amber: '#C97A1A',
  red: '#B3402B',
  muted: '#6B7268',
};

const FILL_STATUS_META = {
  crossed: { label: 'TRIGR HIT', color: BRAND.red, bg: 'rgba(179,64,43,0.08)', ring: 'rgba(179,64,43,0.3)' },
  clear: { label: 'NO SERVICE NEEDED', color: BRAND.green, bg: 'rgba(92,170,22,0.08)', ring: 'rgba(92,170,22,0.3)' },
  unknown: { label: 'NO READING', color: BRAND.muted, bg: 'rgba(107,114,104,0.08)', ring: 'rgba(107,114,104,0.25)' },
};

const STALE_STATUS_META = {
  stale: { label: 'STALE SCAN', color: BRAND.amber, bg: 'rgba(201,122,26,0.08)', ring: 'rgba(201,122,26,0.3)' },
  fresh: { label: 'SCAN FRESH', color: BRAND.green, bg: 'rgba(92,170,22,0.06)', ring: 'rgba(92,170,22,0.2)' },
};

function parseNum(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

// Converts a raw spreadsheet tab name (e.g. "2026-06-29" or
// "2026-06-28 (2)" for a same-day re-run) into a friendly display label
// (e.g. "Tue 6-29-26" or "Tue 6-28-26 (2)") for the dropdown. The
// underlying tab name itself is NEVER changed - only how it's shown to
// the user - since the real yyyy-MM-dd name is what the Apps Script
// relies on for finding "today's tab" and handling same-day collisions.
// Falls back to the raw name unchanged if it doesn't match the
// expected pattern, so an unexpected tab name never breaks the dropdown.
function formatTabLabel(tabName) {
  const m = String(tabName).match(/^(\d{4})-(\d{2})-(\d{2})(\s*\(\d+\))?$/);
  if (!m) return tabName;
  const year = m[1], month = m[2], day = m[3], suffix = m[4];
  const dateObj = new Date(Number(year), Number(month) - 1, Number(day));
  if (isNaN(dateObj.getTime())) return tabName;
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const dayLabel = dayNames[dateObj.getDay()];
  const shortYear = year.slice(-2);
  const label = dayLabel + ' ' + Number(month) + '-' + Number(day) + '-' + shortYear;
  return suffix ? label + ' ' + suffix.trim() : label;
}

function parseHoursFromNotes(notes) {
  if (!notes) return null;
  const m = String(notes).match(/Last Cycle is ([\d.]+) hours/i);
  return m ? parseFloat(m[1]) : null;
}

// Converts a raw hours figure into a days-first display (e.g. 2477
// hours -> "103d 5h") for the LAST CYCLE pill - per explicit design
// decision, a big raw hour count like "2,477h" is not something most
// people can mentally convert to a length of time, where days
// immediately are. Values under a full day just show hours ("18h")
// rather than a pointless "0d" prefix.
function formatDaysHours(totalHours) {
  const rounded = Math.round(totalHours);
  const days = Math.floor(rounded / 24);
  const hrs = rounded % 24;
  if (days === 0) return hrs + 'h';
  return days.toLocaleString() + 'd ' + hrs + 'h';
}

// Converts an ISO timestamp string (e.g. "2026-06-25T08:58:43.000Z", as
// sent by the Apps Script for any Sheets date field) into a simple
// month/day/year display (e.g. "6/25/2026") for the detail panel.
// Falls back to the raw value unchanged if it isn't a parseable date,
// so a blank or already-plain value is never mangled.
function formatSimpleDate(value) {
  if (!value) return value;
  const d = new Date(value);
  if (isNaN(d.getTime())) return value;
  return (d.getUTCMonth() + 1) + '/' + d.getUTCDate() + '/' + d.getUTCFullYear();
}

// Returns the nth occurrence of a given weekday in a month (or the
// LAST occurrence when n is -1). weekday: 0=Sun...6=Sat. Used to
// compute floating holidays (Memorial Day, Labor Day, Thanksgiving)
// without hardcoding dates per year.
function nthWeekdayOfMonth(year, monthIndex, weekday, n) {
  if (n > 0) {
    const first = new Date(year, monthIndex, 1);
    const day = 1 + ((weekday - first.getDay() + 7) % 7) + (n - 1) * 7;
    return new Date(year, monthIndex, day);
  }
  const lastDay = new Date(year, monthIndex + 1, 0);
  const day = lastDay.getDate() - ((lastDay.getDay() - weekday + 7) % 7);
  return new Date(year, monthIndex, day);
}

// Shifts a fixed-date holiday that lands on a weekend to the day a
// business would actually observe it: Saturday -> observed Friday,
// Sunday -> observed Monday. Standard US business practice.
function observedHolidayDate(date) {
  const dow = date.getDay();
  const result = new Date(date);
  if (dow === 6) result.setDate(result.getDate() - 1);
  else if (dow === 0) result.setDate(result.getDate() + 1);
  return result;
}

// The "core 6" holidays most waste haulers actually close for, per
// explicit design decision - deliberately NOT the full federal
// holiday list (Presidents Day, Columbus Day, etc. don't typically
// affect pickup). Computed algorithmically so this never needs
// updating year to year.
function getCoreHolidaysForYear(year) {
  return [
    observedHolidayDate(new Date(year, 0, 1)),               // New Year's Day
    nthWeekdayOfMonth(year, 4, 1, -1),                        // Memorial Day - last Mon of May
    observedHolidayDate(new Date(year, 6, 4)),                // July 4th
    nthWeekdayOfMonth(year, 8, 1, 1),                         // Labor Day - 1st Mon of Sep
    nthWeekdayOfMonth(year, 10, 4, 4),                        // Thanksgiving - 4th Thu of Nov
    observedHolidayDate(new Date(year, 11, 25)),              // Christmas
  ];
}

// Builds a Set of yyyy-MM-dd holiday strings spanning the given
// year and the next (so a business-day count that crosses a year
// boundary, e.g. computed in late December, still catches New
// Year's Day) for fast lookup in addBusinessDays.
function buildHolidaySet(year) {
  const dates = [...getCoreHolidaysForYear(year), ...getCoreHolidaysForYear(year + 1)];
  return new Set(dates.map(toDateInputValue));
}

// Adds a number of BUSINESS days (skipping Sat/Sun and, when a
// holidaySet is provided, the core-6 holidays too) to a given date
// and returns the resulting Date.
function addBusinessDays(date, days, holidaySet) {
  const result = new Date(date);
  let added = 0;
  while (added < days) {
    result.setDate(result.getDate() + 1);
    const dow = result.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isHoliday = holidaySet && holidaySet.has(toDateInputValue(result));
    if (!isWeekend && !isHoliday) added++;
  }
  return result;
}

// Turns a per-box Scheduling Rule ("NBD", "1-BD", "2-BD", ...) into a
// suggested Pick-Up Date, computed from TODAY. Per explicit design
// decision: "N-BD" means N business days ON TOP OF the next business
// day baseline - so NBD = +1 business day, "1-BD" = +2 business days,
// "2-BD" = +3 business days. Example: today is Monday, rule is
// "1-BD" -> next business day is Tuesday (+1), then one more
// business day (+1) lands on Wednesday. Business days skip weekends
// AND the core-6 holidays (see getCoreHolidaysForYear) - still no
// awareness of one-off site closures, same blind spot the scanner
// has. Returns null for unrecognized rule strings so the caller can
// simply omit the hint.
function computeSuggestedPickupDate(rule) {
  if (!rule) return null;
  const normalized = String(rule).trim().toUpperCase();
  let businessDays = null;
  if (normalized === 'NBD') {
    businessDays = 1;
  } else {
    const m = normalized.match(/^(\d+)-BD$/);
    if (m) businessDays = parseInt(m[1], 10) + 1;
  }
  if (businessDays === null) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const holidaySet = buildHolidaySet(today.getFullYear());
  return addBusinessDays(today, businessDays, holidaySet);
}

// Extracts the scan timestamp out of a report tab's scanTitle string
// (e.g. "Scan completed: 2026-07-01 08:09") and reformats it as
// "7-1-26 (8:09AM)" for the detail panel's "As of:" label - per
// explicit design decision, deliberately compact (no leading zeros,
// 2-digit year, 12-hour clock with no space before AM/PM) so it sits
// comfortably next to the status pills without crowding them. Returns
// null if scanTitle is missing or doesn't match the expected pattern,
// so the caller can simply omit the label rather than show something
// broken.
function formatScanTimestamp(scanTitle) {
  if (!scanTitle) return null;
  const m = String(scanTitle).match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if (!m) return null;
  const year = m[1], month = parseInt(m[2], 10), day = parseInt(m[3], 10);
  let hour = parseInt(m[4], 10);
  const minute = m[5];
  const ampm = hour >= 12 ? 'PM' : 'AM';
  hour = hour % 12;
  if (hour === 0) hour = 12;
  return month + '-' + day + '-' + year.slice(-2) + ' (' + hour + ':' + minute + ampm + ')';
}

// Deterministic per-link token for the hauler confirmation link -
// MUST stay identical to the confirmToken() function in the Apps
// Script, which verifies it when a hauler clicks. This is a
// lightweight deterrent against casually guessing other boxes' links,
// NOT real authentication (this file's source is public on GitHub
// Pages, so anyone determined enough could compute tokens) - a
// limitation explicitly accepted, since the worst a forged
// confirmation can do is set a stray checkmark, and the name
// attribution written to Notes makes any confirmation visible and
// attributable anyway. djb2-xor hash, hex output.
function confirmToken(boxId, tab) {
  const str = String(boxId) + '|' + String(tab) + '|WN2026CONFIRM';
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;
  }
  return h.toString(16);
}

// Appends office@wastenetinc.com to whatever Bcc addresses the user
// placed, de-duplicated case-insensitively, so the shared-mailbox copy
// always goes out exactly once even if someone already put office@ (or
// a differently-cased spelling of it) in a Bcc'd recipient group.
function withOfficeBcc(bccStr) {
  const seen = {};
  const out = [];
  (String(bccStr || '') + ';' + OFFICE_EMAIL).split(/[;,]/)
    .map(s => s.trim()).filter(s => s)
    .forEach(addr => {
      const key = addr.toLowerCase();
      if (!seen[key]) { seen[key] = true; out.push(addr); }
    });
  return out.join('; ');
}

// Minimal HTML-escaper for building the HTML version of outgoing
// emails - everything user/template-derived is escaped before any
// markup is added around it.
function escapeEmailHtml(value) {
  return String(value === null || value === undefined ? '' : value)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Builds the HTML version of an outgoing email from the plain-text
// body. Every email goes out with BOTH versions (SendGrid multipart):
// the plain text is the universal fallback and keeps the raw confirm
// URL, while the HTML version - what virtually every real mail client
// shows - renders the confirm link as a proper green button. The
// button is built the email-safe way (a table cell with bgcolor and a
// padded anchor, all styles inline) so it renders correctly even in
// Outlook's Word-based renderer, with a small "copy this link" line
// underneath as insurance for anything that mangles the button.
// confirmUrl is optional - emails without one (Weights, Problem, etc.)
// just get the nicely formatted HTML body with no button.
// boldPhrases is an optional array of exact strings (e.g. the pickup
// date and the box description) to render in bold everywhere they
// appear in the body - the two things a recipient actually needs to
// read, made to jump out. Matching is literal (split/join, no regex),
// on the ESCAPED text so phrases containing characters like & still
// match. Applied AFTER the button insertion so a phrase can never
// accidentally rewrite part of the button's URL markup.
function buildEmailHtml(plainBody, confirmUrl, buttonLabel, boldPhrases) {
  let html = escapeEmailHtml(plainBody).replace(/\r?\n/g, '<br>');
  if (confirmUrl) {
    const escapedUrl = escapeEmailHtml(confirmUrl);
    const button =
      '<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:16px 0 8px;">' +
      '<tr><td align="center" bgcolor="#5CAA16" style="border-radius:6px;">' +
      '<a href="' + escapedUrl + '" target="_blank" ' +
      'style="display:inline-block;padding:13px 30px;font-family:Arial,Helvetica,sans-serif;' +
      'font-size:15px;font-weight:bold;color:#FFFFFF;text-decoration:none;">' +
      escapeEmailHtml(buttonLabel || 'Confirm') + '</a>' +
      '</td></tr></table>' +
      '<span style="font-size:12px;color:#777777;">If the button does not work, copy and paste this link into your browser:<br>' +
      '<a href="' + escapedUrl + '" style="color:#5CAA16;word-break:break-all;">' + escapedUrl + '</a></span>';
    // The plain body contains the URL exactly once (either at the
    // template's [confirm link] spot or in the appended standard
    // paragraph) - swap that occurrence for the button block.
    html = html.replace(escapedUrl, button);
  }
  if (boldPhrases && boldPhrases.length > 0) {
    // Longest first, so when one phrase contains another the longer
    // match wins whole rather than being chopped up by the shorter.
    const phrases = boldPhrases
      .map(p => escapeEmailHtml(p))
      .filter(p => p)
      .sort((a, b) => b.length - a.length);
    phrases.forEach(p => {
      html = html.split(p).join('<strong>' + p + '</strong>');
    });
  }
  return '<div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#333333;line-height:1.5;">' +
    html + '</div>';
}

// Counts the addresses in a ';'/','-separated recipient string - used
// only for friendly "Sent to N recipients" wording, so it deliberately
// mirrors the Apps Script's split-and-trim parsing rather than doing
// any real validation.
function countRecipients(str) {
  return String(str || '').split(/[;,]/).map(s => s.trim()).filter(s => s).length;
}

function normalizeRow(raw, idx) {
  const maxPct = parseNum(raw['Max Pct']);
  const t1 = parseNum(raw['Trigr1 Pct']);
  const t2 = parseNum(raw['Trigr2 Pct']);
  const triggerUsedRaw = String(raw['Trigr Used'] || '').toLowerCase();
  const activeTrigger = triggerUsedRaw.includes('2') ? t2 : t1;

  // 'Crossed Trigr' is the RAW, pre-suppression signal (did the fill
  // level cross the trigger line at all, before accounting for recent
  // pull requests or an Empty marker on the chart). 'Srvc Need' is the
  // FINAL, authoritative decision after the Tampermonkey scanner
  // applies suppression - a box can show Crossed Trigr=YES but
  // Srvc Need=NO if it was already requested recently or the chart
  // shows it was actually emptied. The dashboard's "Action Needed" /
  // "No Action Needed" buckets must reflect the final decision
  // (Srvc Need), not the raw pre-suppression signal - using the raw
  // signal here was a real bug: it could show a box as needing action
  // when the authoritative answer (accounting for suppression) was
  // actually "no." crossedRaw is kept separately for reference/display
  // in the detail panel, but no longer drives the action-needed status.
  const crossedRaw = String(raw['Crossed Trigr'] || '').toUpperCase().trim();
  const srvcNeedRaw = String(raw['Srvc Need'] || '').toUpperCase().trim();
  // "YES (FORCED)" is written by the dashboard's FORCE SRVC button
  // (list view, Stale Scans / No Action Needed pages) - a manual
  // override saying "I've looked at this box and it needs service."
  // It counts as YES here, and additionally overrides staleness below
  // (per explicit design decision, option 1): a force always pulls
  // the box into Action Needed, even if its scan is stale, since the
  // whole point of forcing is putting it in the work queue.
  const forcedSrvc = srvcNeedRaw.indexOf('FORCED') !== -1;
  const crossed = srvcNeedRaw.indexOf('YES') === 0 ? 'crossed' : srvcNeedRaw.indexOf('NO') === 0 ? 'clear' : 'unknown';

  const notes = raw['Notes'] || '';
  const hours = parseHoursFromNotes(notes);
  const forcedStale = /YES \(forced\)/i.test(notes) || (hours !== null && hours > 24);
  const stale = forcedStale && !forcedSrvc ? 'stale' : 'fresh';

  // Matches the Tampermonkey scanner's own isInactiveBoxDescription()
  // rule exactly: a description starting with X, Y, or Z (case
  // insensitive) marks a box as inactive/not scanned. Kept in sync with
  // that source-of-truth logic so a box flagged inactive there is
  // labeled the same way here.
  const description = raw['Description'] || '(no description)';
  const isInactive = /^[xyz]/i.test(description.trim());

  return {
    _key: raw['Box ID'] != null ? String(raw['Box ID']) + '-' + idx : 'row-' + idx,
    boxId: raw['Box ID'] != null ? String(raw['Box ID']) : '—',
    cell: raw['Cell'] || '',
    description: description,
    isInactive: isInactive,
    haulCode: raw['Haul Code'] || '—',
    serviceMethod: raw['Srvc Mthd'] || '—',
    shortcut: raw['Txt Blz Shrtct'] || '',
    trigger1: t1,
    trigger2: t2,
    triggerUsedLabel: raw['Trigr Used'] || '—',
    activeTrigger: activeTrigger,
    maxPct: maxPct,
    crossedStatus: crossed,
    crossedTrigrRaw: crossedRaw,
    staleStatus: stale,
    staleHours: hours,
    srvcNeed: srvcNeedRaw,
    notes: notes,
    datePullReqd: raw["Date Pull Req'd"] || '',
    schDate: raw['Sch Date'] || '',
    puDate: raw['P/U Date'] || '',
    confirmed: raw['Cnfrmd'] === true || String(raw['Cnfrmd']).toUpperCase() === 'TRUE',
    toRecipients: raw['To Recipients'] || '',
    ccRecipients: raw['Cc Recipients'] || '',
    staffRecipients: raw['Staff Recipients'] || '',
  };
}

function StatusPill({ meta, statusKey }) {
  const m = meta[statusKey];
  if (!m) return null;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 8px',
      borderRadius: 3, fontSize: 10.5, fontWeight: 700, letterSpacing: 'normal',
      color: m.color, background: m.bg, border: '1px solid ' + m.ring, whiteSpace: 'nowrap',
      fontFamily: "Arial, Helvetica, sans-serif",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: m.color, boxShadow: '0 0 6px ' + m.color }} />
      {m.label}
    </span>
  );
}

function Gauge({ pct, size = 36 }) {
  if (pct === null) {
    return (
      <div style={{
        width: size, height: size * 1.5, borderRadius: 4, border: '1.5px dashed #C7CCBE',
        background: '#F1F3EC', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 9, color: BRAND.muted, flexShrink: 0, fontFamily: "Arial, Helvetica, sans-serif", textAlign: 'center',
      }}>N/A</div>
    );
  }
  const clamped = Math.max(0, Math.min(100, pct));
  const color = clamped >= 70 ? BRAND.red : clamped >= 45 ? BRAND.amber : BRAND.green;
  return (
    <div style={{
      position: 'relative', width: size, height: size * 1.5, borderRadius: 4,
      border: '1.5px solid #D8DCD2', background: '#F1F3EC', overflow: 'hidden', flexShrink: 0,
    }}>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, height: clamped + '%',
        background: 'linear-gradient(180deg, ' + color + 'cc, ' + color + ')',
        transition: 'height 0.4s ease',
      }} />
      <div style={{ position: 'absolute', top: '33%', left: 0, right: 0, borderTop: '1px dashed #BFC4B6' }} />
      <div style={{ position: 'absolute', top: '66%', left: 0, right: 0, borderTop: '1px dashed #BFC4B6' }} />
    </div>
  );
}

// localStorage-backed persistence (replaces the Claude-Artifact-only
// window.storage API, which does not exist outside Claude). Plain
// browser localStorage - same device/browser only, no cross-device
// sync. If you want shared state across staff, that would need a real
// backend; this keeps things simple for now.
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveLocal(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}

function WasteNetDashboard() {
  const [rows, setRows] = useState([]);
  const [sheetName, setSheetName] = useState(null);
  const [scanTitle, setScanTitle] = useState(null);
  const [fetchState, setFetchState] = useState('loading'); // loading | ok | error
  const [fetchError, setFetchError] = useState(null);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);

  // Dashboard access code - checked server-side by the Apps Script
  // against its DASHBOARD_KEY Script Property on every request, so
  // this is real protection of the data endpoint, not just a
  // front-door curtain (this page's source is public on GitHub, so a
  // key baked into code here would protect nothing). Per explicit
  // design decision (revised again): remembered in sessionStorage -
  // the middle setting between "saved forever on this device" and
  // "retype on every reload". A reload within the same tab does NOT
  // re-prompt, but closing the tab or the browser wipes it, so every
  // new session starts at the lock screen. If the Apps Script rejects
  // the entered key (mistyped, or the code was rotated), the lock
  // screen reappears with an explanation. The hauler confirmation
  // pages are exempt server-side, so haulers clicking email links
  // never see any of this.
  const [accessKey, setAccessKey] = useState(() => {
    try { return sessionStorage.getItem('wastenet_dashboard_key') || null; } catch (e) { return null; }
  });
  const [keyInput, setKeyInput] = useState('');
  const [authError, setAuthError] = useState(null);

  // null = viewing today's/latest live data (auto-refreshes); any other
  // value = a specific past tab the user picked from the dropdown
  // (frozen - auto-refresh won't silently pull them back to "today"
  // while they're looking at an older scan).
  const [viewingTab, setViewingTab] = useState(null);
  const [availableTabs, setAvailableTabs] = useState([]);
  const [tabsLoadError, setTabsLoadError] = useState(null);
  const [masterContacts, setMasterContacts] = useState({});
  const [emailTemplates, setEmailTemplates] = useState({});
  // Whether the custom date-picker dropdown is currently open - native
  // <select> elements can't have a different font size for their
  // closed button vs. their open option list (browsers always render
  // both at the same size), so per explicit design decision this is a
  // hand-built dropdown instead: a big, bold button showing the
  // current date, and a small, separately-styled popover list when
  // opened, so the selected date can stay large and prominent while
  // the list of other dates stays compact and doesn't take over the
  // screen once there are many of them.
  const [dateDropdownOpen, setDateDropdownOpen] = useState(false);

  const [query, setQuery] = useState('');
  const [signalFilter, setSignalFilter] = useState('crossed'); // ALL | crossed | stale | both | clear
  const [sortBy, setSortBy] = useState('haulCode'); // Action Needed (the default view) defaults to Sort: Hauler per explicit design decision - see handleSelectSignalFilter
  const [selected, setSelected] = useState(null);
  const [batchTarget, setBatchTarget] = useState(null); // { haulCode, boxes } | null
  const [toast, setToast] = useState(null);

  // Each stat-button view offers its own subset of sort options - per
  // explicit design decision: Action Needed gets Pickup Confirmation
  // (since that's specifically about already-scheduled boxes needing a
  // follow-up), Stale Scans gets Most/Least Hours (since recency-of-
  // staleness is what matters there), and No Action Needed only offers
  // the two generic options, since neither extra sort makes sense for
  // boxes that don't need attention in the first place.
  const SORT_OPTIONS_BY_VIEW = {
    crossed: [
      ['boxId', 'Sort: Box Number'],
      ['description', 'Sort: Description'],
      ['haulCode', 'Sort: Hauler'],
      ['confirmation', 'Sort: Pickup Confirmation'],
    ],
    stale: [
      ['boxId', 'Sort: Box Number'],
      ['description', 'Sort: Description'],
      ['haulCode', 'Sort: Hauler'],
      ['hoursDesc', 'Sort: Most Hours'],
      ['hoursAsc', 'Sort: Least Hours'],
    ],
    clear: [
      ['boxId', 'Sort: Box Number'],
      ['description', 'Sort: Description'],
      ['haulCode', 'Sort: Hauler'],
    ],
  };

  // Switches which stat-button view is active. Per explicit design
  // decision, selecting Action Needed always lands on Sort: Hauler
  // (the batch-email working order); the other views reset sortBy back
  // to Box Number whenever the CURRENTLY selected sort option wouldn't
  // even appear in the new view's dropdown - prevents the dropdown
  // from silently showing a stale, no-longer-relevant selection.
  const handleSelectSignalFilter = (key) => {
    if (key === 'crossed') {
      setSortBy('haulCode');
    } else {
      const validOptions = (SORT_OPTIONS_BY_VIEW[key] || []).map(([val]) => val);
      if (!validOptions.includes(sortBy)) {
        setSortBy('boxId');
      }
    }
    setSignalFilter(key);
  };

  const pollRef = useRef(null);
  const dateDropdownRef = useRef(null);

  // Closes the custom date dropdown if the user clicks anywhere outside
  // of it - standard expected behavior for any dropdown-style control,
  // and without this it would only ever close by picking an option,
  // with no way to back out of it.
  useEffect(() => {
    if (!dateDropdownOpen) return;
    const handleClickOutside = (e) => {
      if (dateDropdownRef.current && !dateDropdownRef.current.contains(e.target)) {
        setDateDropdownOpen(false);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, [dateDropdownOpen]);

  // JSONP loader - used instead of fetch()/XHR because Apps Script Web
  // App URLs always 302-redirect internally to a googleusercontent.com
  // echo endpoint, and that redirected response doesn't carry an
  // Access-Control-Allow-Origin header, so a normal fetch() is blocked
  // by CORS even though the same URL works fine when visited directly.
  // A <script> tag isn't subject to that restriction, so we load the
  // URL that way and have the Apps Script (via its `callback` query
  // parameter) wrap its JSON as a call to a one-off global function we
  // define here.
  const jsonpLoad = useCallback((url) => {
    return new Promise((resolve, reject) => {
      const callbackName = 'wastenetJsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
      const script = document.createElement('script');
      let settled = false;

      const cleanup = () => {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        clearTimeout(timeoutId);
      };

      window[callbackName] = (data) => {
        if (settled) return;
        settled = true;
        cleanup();
        // Server-side access-code rejection: clear the remembered key
        // and drop back to the lock screen with an explanation, rather
        // than surfacing a cryptic fetch error. Covers both a mistyped
        // code on first entry and a stored key invalidated by rotating
        // DASHBOARD_KEY in Script Properties.
        if (data && data.authRequired) {
          try { sessionStorage.removeItem('wastenet_dashboard_key'); } catch (e) {}
          setAccessKey(null);
          setAuthError('That access code was not accepted. Please try again.');
          reject(new Error('Access code required.'));
          return;
        }
        resolve(data);
      };

      const timeoutId = setTimeout(() => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('Timed out waiting for a response (30s) - the sheet may be slow to respond right now. Try again in a moment.'));
      }, 30000);

      script.onerror = () => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('Could not load the script (network error or invalid URL).'));
      };

      // Every dashboard request carries the access code for the Apps
      // Script's server-side check (harmlessly ignored if the script's
      // DASHBOARD_KEY property hasn't been set yet).
      const keyParam = accessKey ? '&key=' + encodeURIComponent(accessKey) : '';
      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName + keyParam;
      document.head.appendChild(script);
    });
  }, [accessKey]);

  // Loads either the live/latest scan (tabName omitted) or a specific
  // past tab by exact name. Used for the initial load, the 5-minute
  // auto-poll (live only), and whenever the user picks a date from the
  // dropdown.
  const loadTab = useCallback(async (tabName) => {
    setFetchState((prev) => (prev === 'ok' ? 'ok' : 'loading'));
    try {
      const url = tabName
        ? SHEET_URL + '?action=tab&name=' + encodeURIComponent(tabName)
        : SHEET_URL + '?action=latest';
      const json = await jsonpLoad(url);
      if (!json.ok) throw new Error(json.error || 'Unknown error from sheet endpoint');
      const normalized = (json.rows || []).map(normalizeRow);
      setRows(normalized);
      setSheetName(json.sheetName || null);
      setScanTitle(json.scanTitle || null);
      setFetchState('ok');
      setFetchError(null);
      setLastFetchedAt(new Date());
    } catch (err) {
      setFetchState('error');
      setFetchError(err.message || String(err));
    }
  }, [jsonpLoad]);

  // Writes Sch Date / P/U Date / Cnfrmd back to the Sheet for one box,
  // via the same JSONP mechanism used for reads (a true POST isn't
  // usable here for the same CORS/redirect reason - see jsonpLoad
  // above). Writes to whichever tab is CURRENTLY DISPLAYED
  // (sheetName), not necessarily "today" - per explicit design
  // decision, a confirmation can legitimately arrive after the scan
  // that originally flagged a box, so editing is allowed on any visible
  // date, not just the live/latest one. fields is an object where each
  // key (schDate/puDate/confirmed) is OPTIONAL - only the keys actually
  // present get sent, matching the Apps Script's "omitted = don't
  // touch, empty string = clear" distinction. Re-fetches the current
  // tab afterward so the on-screen row immediately reflects the save
  // rather than showing stale data until the next poll.
  const saveBoxFields = useCallback(async (boxId, fields) => {
    if (!sheetName) throw new Error('No tab is currently loaded - cannot save.');
    const params = ['action=update_box', 'tab=' + encodeURIComponent(sheetName), 'boxId=' + encodeURIComponent(boxId)];
    Object.keys(fields).forEach(key => {
      params.push(key + '=' + encodeURIComponent(fields[key]));
    });
    const url = SHEET_URL + '?' + params.join('&');
    const json = await jsonpLoad(url);
    if (!json.ok) throw new Error(json.error || 'Unknown error saving to the sheet');
    await loadTab(viewingTab || undefined);
    return json;
  }, [jsonpLoad, sheetName, viewingTab, loadTab]);

  // Sends an email server-side through the Apps Script's send_email
  // action (SendGrid, From: WasteNet <office@wastenetinc.com>) - the
  // same GET-with-query-params JSONP pattern as saveBoxFields, for the
  // same CORS/redirect reason. The subject and body ride in the URL,
  // which comfortably fits normal Service/Batch emails; anything
  // pathological (a multi-page body) would fail loudly with a network
  // error rather than sending truncated. replyTo is deliberately NOT
  // sent - the Apps Script's own default (lgrundy@wastenetinc.com)
  // stays the single source of truth for where replies route.
  const sendEmail = useCallback(async ({ to, cc, bcc, subject, body, html }) => {
    const params = [
      'action=send_email',
      'to=' + encodeURIComponent(to || ''),
      'subject=' + encodeURIComponent(subject || ''),
      'body=' + encodeURIComponent(body || ''),
    ];
    if (cc) params.push('cc=' + encodeURIComponent(cc));
    if (bcc) params.push('bcc=' + encodeURIComponent(bcc));
    if (html) params.push('html=' + encodeURIComponent(html));
    const json = await jsonpLoad(SHEET_URL + '?' + params.join('&'));
    if (!json.ok) throw new Error(json.error || 'Unknown error sending the email');
    return json;
  }, [jsonpLoad]);

  // Fetches the dropdown's list of selectable past-scan tabs once on
  // load. A failure here is non-fatal - the dashboard still works fine
  // showing only live data, just without the history dropdown - so this
  // is tracked separately from the main fetchState/fetchError.
  const loadTabList = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=list_tabs');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading tab list');
      setAvailableTabs(json.tabs || []);
      setTabsLoadError(null);
    } catch (err) {
      setTabsLoadError(err.message || String(err));
    }
  }, [jsonpLoad]);

  // Fetches the Box ID -> To/Cc email lookup once on load. This data
  // lives on the Master Box List tab, not in any daily scan tab, so it
  // has to be fetched separately and joined to the selected box by ID
  // client-side - see getMasterContactsAsJson() in the Apps Script for
  // why it's kept as one single fetch rather than duplicated per-day.
  // A failure here is non-fatal, same reasoning as loadTabList - the
  // dashboard still works fine without contact emails showing, it just
  // won't have that one extra section in the detail panel.
  const loadMasterContacts = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=master_contacts');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading contact emails');
      setMasterContacts(json.contacts || {});
    } catch (err) {
      // Silent - see comment above.
    }
  }, [jsonpLoad]);

  // Fetches the generic (non-per-box) email category templates -
  // Emptied, Missed, Notice, Premature, Problem, Repair, Usage - from
  // the separate "Email Templates" tab, keyed by Pill Label. Same
  // "fetch once on load, fail silently" pattern as loadMasterContacts
  // above, for the same reasons.
  const loadEmailTemplates = useCallback(async () => {
    try {
      const json = await jsonpLoad(SHEET_URL + '?action=email_templates');
      if (!json.ok) throw new Error(json.error || 'Unknown error loading email templates');
      setEmailTemplates(json.templates || {});
    } catch (err) {
      // Silent - see comment above.
    }
  }, [jsonpLoad]);

  // Fetches one box's permanent request/confirmation history from the
  // Request Ledger for the detail panel's Request History section -
  // this is the record that survives the daily tab resets, so "when
  // did we request this?" is answerable from the dashboard on any day.
  const loadBoxHistory = useCallback(async (boxId) => {
    const json = await jsonpLoad(SHEET_URL + '?action=box_history&boxId=' + encodeURIComponent(boxId));
    if (!json.ok) throw new Error(json.error || 'Could not load request history');
    return json.entries || [];
  }, [jsonpLoad]);

  const handleSelectTab = useCallback((name) => {
    if (name === '') {
      // Empty option = back to live
      setViewingTab(null);
      loadTab();
    } else {
      setViewingTab(name);
      loadTab(name);
    }
  }, [loadTab]);

  // Keeps an OPEN detail panel in sync with fresh data. Every
  // re-fetch (including the one right after a successful save)
  // rebuilds the rows array with brand-new objects, but `selected`
  // still pointed at the OLD object captured when the row was first
  // clicked - so a couple of seconds after saving a Pick-Up Date, the
  // panel's sync-from-server effect would "refresh" the inputs from
  // that stale snapshot and visibly wipe the just-saved date back to
  // blank (the sheet itself was correct the whole time - only the
  // display reverted, though a Compose done after the revert would
  // then genuinely be missing the date). Re-pointing `selected` at
  // the matching fresh row whenever rows change fixes the whole class
  // of problem: dates, Confirmed, and Notes shown in the panel now
  // always track the latest fetch.
  useEffect(() => {
    if (!selected) return;
    const updated = rows.find(r => r.boxId === selected.boxId);
    if (updated && updated !== selected) setSelected(updated);
  }, [rows, selected]);

  useEffect(() => {
    // No loads until an access code has been entered - and because
    // these callbacks are rebuilt when accessKey changes (via
    // jsonpLoad), this effect automatically re-runs and performs the
    // initial load the moment the lock screen is passed.
    if (!accessKey) return;
    loadTab();
    loadTabList();
    loadMasterContacts();
    loadEmailTemplates();
  }, [accessKey, loadTab, loadTabList, loadMasterContacts, loadEmailTemplates]);

  useEffect(() => {
    // Only auto-refresh while viewing live/latest data - if the user has
    // picked a specific past tab from the dropdown, leave it alone so
    // it doesn't silently snap back to "today" out from under them.
    // Poll interval is 1 MINUTE (down from the original 5) per
    // explicit design decision, so an incoming hauler confirmation
    // shows up on screen within about a minute of the click - a true
    // instant push isn't possible with this architecture (the page
    // can only ask the sheet, the sheet can't call the page), so a
    // fast poll is the practical ceiling.
    if (!accessKey) return;
    if (viewingTab !== null) return;
    pollRef.current = setInterval(() => loadTab(), 60 * 1000);
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [accessKey, viewingTab, loadTab]);

  const filtered = useMemo(() => {
    return rows.filter(r => {
      if (signalFilter === 'crossed' && (r.crossedStatus !== 'crossed' || r.staleStatus === 'stale')) return false;
      if (signalFilter === 'stale' && r.staleStatus !== 'stale') return false;
      if (signalFilter === 'both' && !(r.crossedStatus === 'crossed' && r.staleStatus === 'stale')) return false;
      if (signalFilter === 'clear' && (r.crossedStatus === 'crossed' || r.staleStatus === 'stale')) return false;
      if (query) {
        const q = query.toLowerCase();
        const hay = (r.description + ' ' + r.boxId + ' ' + r.haulCode + ' ' + r.cell).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [rows, signalFilter, query]);

  const actionQueue = useMemo(() => {
    // Default view (signalFilter === 'ALL') shows only boxes that need
    // attention (crossed or stale) - that's the "queue" concept. But if
    // the dropdown is explicitly set to something else (e.g. "No action
    // needed"), `filtered` has already narrowed to exactly that signal,
    // so re-applying the crossed/stale-only rule here would always
    // produce an empty list for "No action needed" - respect the
    // explicit choice instead of double-filtering against it.
    const base = signalFilter === 'ALL'
      ? filtered.filter(r => r.crossedStatus === 'crossed' || r.staleStatus === 'stale')
      : filtered;
    const list = base.slice();

    const sortByBoxId = (a, b) => {
      const numA = parseInt(a.boxId, 10);
      const numB = parseInt(b.boxId, 10);
      if (Number.isFinite(numA) && Number.isFinite(numB)) return numA - numB;
      return String(a.boxId).localeCompare(String(b.boxId));
    };
    const sortByDescription = (a, b) => a.description.localeCompare(b.description);

    if (sortBy === 'confirmation') {
      // Pickup Confirmation (Action Needed view only) - per explicit
      // design decision: boxes with a scheduled Pick-Up Date that are
      // NOT yet confirmed come first (these are what most urgently need
      // a follow-up call/email), confirmed ones next, and boxes with no
      // Pick-Up Date at all (nothing to confirm yet) sort to the very
      // bottom rather than being mixed in - they're not part of this
      // sort's actual concern. Box Number is the tiebreaker within each
      // group, for a stable, predictable order rather than relying on
      // whatever order the data happened to arrive in.
      list.sort((a, b) => {
        const rank = (r) => {
          if (!r.puDate) return 2; // no pickup scheduled - bottom
          return r.confirmed ? 1 : 0; // No=0 (top), Yes=1
        };
        const diff = rank(a) - rank(b);
        if (diff !== 0) return diff;
        return sortByBoxId(a, b);
      });
    } else if (sortBy === 'hoursDesc' || sortBy === 'hoursAsc') {
      // Most Hours / Least Hours (Stale Scans view only) - replaces the
      // old hardcoded always-ascending behavior with an actual choice,
      // now that this view has its own dropdown options. Boxes with no
      // parseable hours value sort to the end regardless of direction,
      // rather than crashing or landing arbitrarily.
      list.sort((a, b) => {
        const ha = a.staleHours === null ? Infinity : a.staleHours;
        const hb = b.staleHours === null ? Infinity : b.staleHours;
        return sortBy === 'hoursAsc' ? ha - hb : (hb === Infinity && ha === Infinity ? 0 : hb - ha);
      });
    } else if (sortBy === 'haulCode') {
      // Hauler (available in all three views) - groups boxes by their
      // hauler code so everything going to the same hauler sits
      // together in the list. Codes that look like numbers compare
      // numerically (so 45 sorts before 312 rather than after it, as a
      // plain text compare would put them); boxes with no hauler code
      // at all sort to the very bottom rather than being mixed in.
      // Box Number is the tiebreaker within each hauler, same stable-
      // order reasoning as the Pickup Confirmation sort above.
      list.sort((a, b) => {
        const aMissing = !a.haulCode || a.haulCode === '—';
        const bMissing = !b.haulCode || b.haulCode === '—';
        if (aMissing && bMissing) return sortByBoxId(a, b);
        if (aMissing) return 1;
        if (bMissing) return -1;
        const numA = parseInt(a.haulCode, 10);
        const numB = parseInt(b.haulCode, 10);
        let diff;
        if (Number.isFinite(numA) && Number.isFinite(numB)) diff = numA - numB;
        else diff = String(a.haulCode).localeCompare(String(b.haulCode));
        if (diff !== 0) return diff;
        return sortByBoxId(a, b);
      });
    } else if (sortBy === 'description') {
      list.sort(sortByDescription);
    } else {
      list.sort(sortByBoxId);
    }
    return list;
  }, [filtered, signalFilter, sortBy]);

  const counts = useMemo(() => {
    const c = { crossed: 0, stale: 0, both: 0, clear: 0, total: rows.length };
    rows.forEach(r => {
      const isCrossed = r.crossedStatus === 'crossed';
      const isStale = r.staleStatus === 'stale';
      if (isCrossed && isStale) c.both += 1;
      else if (isCrossed) c.crossed += 1;
      else if (isStale) c.stale += 1;
      else c.clear += 1;
    });
    return c;
  }, [rows]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  };

  const font = "Arial, Helvetica, sans-serif";
  const monoFont = "Arial, Helvetica, sans-serif";
  const displayFont = "Arial, Helvetica, sans-serif";

  // Lock screen - shown until an access code is entered on this
  // device. This early return sits AFTER every hook declaration above
  // (a React requirement), and deliberately renders nothing of the
  // dashboard itself. The code entered here isn't validated locally
  // (nothing local could validate it without exposing it) - it's
  // simply remembered and sent with the first data request; a wrong
  // code bounces straight back to this screen via jsonpLoad's
  // authRequired handling.
  const handleUnlock = () => {
    const trimmed = keyInput.trim();
    if (!trimmed) return;
    try { sessionStorage.setItem('wastenet_dashboard_key', trimmed); } catch (e) {}
    setAccessKey(trimmed);
    setAuthError(null);
    setKeyInput('');
  };

  if (!accessKey) {
    return (
      <div style={{
        fontFamily: font, background: BRAND.paper, color: BRAND.ink, height: '100vh',
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
      }}>
        <div style={{
          width: 'min(360px, 100%)', background: BRAND.panel, border: '1px solid ' + BRAND.greenLight,
          borderRadius: 8, padding: 24, boxShadow: '0 2px 8px rgba(26,29,26,0.12)', textAlign: 'center',
        }}>
          <div style={{
            fontFamily: displayFont, fontWeight: 700, fontSize: 16, letterSpacing: '0.04em',
            textTransform: 'uppercase', color: BRAND.green, marginBottom: 4,
          }}>WasteNet Dashboard</div>
          <div style={{ fontSize: 13, color: BRAND.muted, marginBottom: 16 }}>Enter the access code to continue.</div>
          <input
            type="password"
            value={keyInput}
            onChange={e => setKeyInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') handleUnlock(); }}
            placeholder="Access code"
            autoFocus
            style={{
              width: '100%', boxSizing: 'border-box', padding: '10px 12px', fontSize: 15,
              border: '1.5px solid ' + BRAND.line, borderRadius: 5, fontFamily: font, color: BRAND.ink,
            }}
          />
          <button
            onClick={handleUnlock}
            style={{
              width: '100%', marginTop: 12, padding: '11px', fontSize: 14, fontWeight: 700,
              borderRadius: 6, border: 'none', cursor: 'pointer',
              background: BRAND.green, color: '#FFFFFF', fontFamily: font,
            }}
          >Unlock</button>
          {authError && (
            <div style={{
              marginTop: 12, padding: '8px 10px', background: 'rgba(179,64,43,0.08)',
              border: '1px solid ' + BRAND.red, borderRadius: 5, color: BRAND.red,
              fontSize: 12.5, fontWeight: 600,
            }}>{authError}</div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{
      fontFamily: font, background: BRAND.paper, color: BRAND.ink, height: '100vh',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      {/* Frozen top section: title bar, stat/filter buttons, and search - stays
          visible while the box list below scrolls. */}
      <div style={{ flexShrink: 0, position: 'sticky', top: 0, zIndex: 10, background: BRAND.paper }}>
      {/* Header */}
      <header style={{
        borderBottom: '1px solid ' + BRAND.line, padding: '12px 24px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4,
        background: BRAND.paper, textAlign: 'center',

339tcO3tevjlONji4BTRvPmifAjjfM5tvxDwQs2GYBWAWyVlmmAXaTBgTgMUAxEjGz/632blrpANgAH0CvsFyIHOAjcN4msSYwUZpOGXACSNO0PEIYCMgDxn4nvn+wfzrQ+8UdQasiIiISMD9Pxo+TTsKmPxBAAAAAElFTkSuQmCC"
          alt="WasteNet"
          style={{ height: 60, width: 'auto', flexShrink: 0 }}
        />
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
          <div style={{
            fontFamily: displayFont, fontWeight: 700, fontSize: 16, letterSpacing: '0.04em',
            textTransform: 'uppercase', lineHeight: 1.1, color: BRAND.green,
          }}>Box Monitor Dashboard</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 4 }}>
            {availableTabs.length > 0 ? (
              <div ref={dateDropdownRef} style={{ position: 'relative', display: 'inline-block' }}>
                <button
                  onClick={() => setDateDropdownOpen(o => !o)}
                  style={{
                    padding: '10px 20px', borderRadius: 10,
                    border: '2px solid ' + BRAND.green, background: 'rgba(92,170,22,0.06)',
                    color: BRAND.green, fontSize: 26, fontWeight: 800, fontFamily: displayFont,
                    cursor: 'pointer', textAlign: 'center', letterSpacing: '0.01em',
                  }}
                >
                  {fetchState === 'ok' && sheetName ? formatTabLabel(sheetName) : fetchState === 'loading' ? 'Loading…' : 'Unavailable'}
                </button>
                {dateDropdownOpen && (
                  <div style={{
                    position: 'absolute', top: 'calc(100% + 6px)', left: '50%', transform: 'translateX(-50%)',
                    background: BRAND.panel, border: '1px solid ' + BRAND.line, borderRadius: 8,
                    boxShadow: '0 8px 24px rgba(0,0,0,0.15)', zIndex: 50,
                    maxHeight: 280, overflowY: 'auto', minWidth: 200, padding: 4,
                  }}>
                    <button
                      onClick={() => { handleSelectTab(''); setDateDropdownOpen(false); }}
                      style={{
                        display: 'block', width: '100%', textAlign: 'left', padding: '7px 10px',
                        borderRadius: 5, border: 'none', cursor: 'pointer', fontFamily: monoFont,
                        fontSize: 12.5, fontWeight: viewingTab === null ? 700 : 400,
                        background: viewingTab === null ? 'rgba(92,170,22,0.1)' : 'transparent',
                        color: viewingTab === null ? BRAND.green : BRAND.ink,
                      }}
                    >Live (latest scan)</button>
                    {availableTabs.map(t => (
                      <button
                        key={t}
                        onClick={() => { handleSelectTab(t); setDateDropdownOpen(false); }}
                        style={{
                          display: 'block', width: '100%', textAlign: 'left', padding: '7px 10px',
                          borderRadius: 5, border: 'none', cursor: 'pointer', fontFamily: monoFont,
                          fontSize: 12.5, fontWeight: viewingTab === t ? 700 : 400,
                          background: viewingTab === t ? 'rgba(92,170,22,0.1)' : 'transparent',
                          color: viewingTab === t ? BRAND.green : BRAND.ink,
                        }}
                      >{formatTabLabel(t)}</button>
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <span style={{ fontSize: 22, fontWeight: 700, color: BRAND.green, fontFamily: displayFont }}>
                {fetchState === 'ok' && sheetName ? formatTabLabel(sheetName) : fetchState === 'loading' ? 'Connecting to live sheet…' : 'Live data unavailable'}
              </span>
            )}
          </div>
        </div>
      </header>

      {fetchState === 'error' && (
        <div style={{
          background: '#FCEDE9', borderBottom: '1px solid ' + BRAND.red, padding: '10px 24px',
          fontSize: 13, color: '#7A2D1E', fontFamily: font, display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
        }}>
          <strong>Couldn't reach the live sheet.</strong>
          <span style={{ fontFamily: monoFont, fontSize: 12 }}>{fetchError}</span>
          <span>Try reloading the page.</span>
        </div>
      )}

      {/* Stat strip - each one is also the signal filter control */}
      <div style={{
        display: 'flex', gap: 8, background: BRAND.paper, borderBottom: '1px solid ' + BRAND.line,
        flexWrap: 'wrap', padding: '8px 24px', justifyContent: 'center',
      }}>
        {[
          { key: 'crossed', label: 'Action Needed', value: counts.crossed },
          { key: 'clear', label: 'No Action Needed', value: counts.clear },
          { key: 'stale', label: 'Stale Scans', value: counts.stale + counts.both },
        ].map((s, i) => {
          const isActive = signalFilter === s.key;
          return (
            <button
              key={i}
              onClick={() => handleSelectSignalFilter(s.key)}
              aria-pressed={isActive}
              style={{
                flex: '1 1 130px', minWidth: 108, maxWidth: 170, padding: '8px 14px', textAlign: 'center',
                borderRadius: 8, cursor: 'pointer', fontFamily: font,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                border: '1.5px solid ' + (isActive ? BRAND.green : BRAND.line),
                background: isActive ? BRAND.green : BRAND.panel,
                boxShadow: isActive ? '0 2px 8px rgba(92,170,22,0.25)' : 'none',
                transition: 'background 0.15s, border-color 0.15s',
              }}
              onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = '#F1F4EC'; }}
              onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = BRAND.panel; }}
            >
              <span style={{
                fontSize: 19, fontWeight: isActive ? 700 : 600, fontFamily: displayFont,
                color: isActive ? '#FFFFFF' : BRAND.green, flexShrink: 0,
              }}>
                {s.value}
              </span>
              <span style={{
                fontSize: 11.5, textTransform: 'uppercase', letterSpacing: '0.03em', fontFamily: monoFont,
                color: isActive ? '#FFFFFF' : BRAND.muted, fontWeight: isActive ? 700 : 400,
                textAlign: 'left', lineHeight: 1.2,
              }}>
                {s.label}
              </span>
            </button>
          );
        })}
        {/* Sum check - deliberately NOT a button, and styled quietly
            (no border, no background, muted color) so it reads as an
            annotation rather than a fourth clickable filter. Sits to
            the RIGHT of the three buttons so the whole strip reads as
            an equation - Action Needed + No Action Needed + Stale
            Scans = total - making it instantly visible whether the
            three counts account for every box in the scan (they
            should always sum to the full box count; if this number
            ever disagrees with the known fleet size, boxes were
            missed). Wraps below the buttons on narrow screens, which
            is fine - it stays adjacent either way. */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,
          padding: '8px 10px', flexShrink: 0,
        }}>
          <span style={{
            fontSize: 19, fontWeight: 700, fontFamily: displayFont, color: BRAND.muted,
          }}>=</span>
          <span style={{
            fontSize: 19, fontWeight: 700, fontFamily: displayFont, color: BRAND.muted,
          }}>{counts.total}</span>
          <span style={{
            fontSize: 11.5, textTransform: 'uppercase', letterSpacing: '0.03em', fontFamily: monoFont,
            color: BRAND.muted, lineHeight: 1.2,
          }}>Total Boxes</span>
        </div>
      </div>

      {/* Filters */}
      <div style={{
        display: 'flex', gap: 10, padding: '12px 24px', borderBottom: '1px solid ' + BRAND.line,
        background: BRAND.panel, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center', width: '100%', maxWidth: 720 }}>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="Search site, box ID, hauler…"
          style={{
            flex: '1 1 220px', padding: '8px 12px', borderRadius: 5, border: '1px solid ' + BRAND.line,
            background: BRAND.paper, color: BRAND.ink, fontSize: 13, fontFamily: font,
          }}
        />
        <select
          value={sortBy}
          onChange={e => setSortBy(e.target.value)}
          style={{
            padding: '8px 12px', borderRadius: 5, border: '1px solid ' + BRAND.line,
            background: BRAND.paper, color: BRAND.ink, fontSize: 13, fontFamily: font, cursor: 'pointer',
          }}
        >
          {(SORT_OPTIONS_BY_VIEW[signalFilter] || SORT_OPTIONS_BY_VIEW.clear).map(([val, label]) => (
            <option key={val} value={val}>{label}</option>
          ))}
        </select>
        </div>
      </div>
      </div>

      {/* Main content - this is the part that scrolls; everything above
          (title bar, stat/filter buttons, search) stays pinned in view. */}
      <div style={{ flex: 1, padding: '20px 24px', overflowY: 'auto' }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          {fetchState === 'loading' && rows.length === 0 && (
            <div style={{ textAlign: 'center', padding: '80px 20px', color: BRAND.muted, fontFamily: font }}>
              Loading live data from the sheet…
            </div>
          )}
          {rows.length > 0 && (
            <QueueView
              boxes={actionQueue}
              onSelect={setSelected}
              masterContacts={masterContacts}
              onSaveConfirmed={saveBoxFields}
              showConfirmPill={signalFilter === 'crossed'}
              onForceService={saveBoxFields}
              showForcePill={signalFilter === 'stale' || signalFilter === 'clear'}
              activeView={signalFilter}
              sortBy={sortBy}
              onOpenBatch={(haulCode, batchBoxes) => setBatchTarget({ haulCode, boxes: batchBoxes })}
              monoFont={monoFont}
              font={font}
            />
          )}
        </div>
      </div>

      {selected && (
        <DetailPanel
          box={selected}
          onClose={() => setSelected(null)}
          onSave={saveBoxFields}
          onSendEmail={sendEmail}
          contacts={masterContacts[selected.boxId]}
          emailTemplates={emailTemplates}
          scanTitle={scanTitle}
          sheetName={sheetName}
          onLoadHistory={loadBoxHistory}
          monoFont={monoFont}
          font={font}
          displayFont={displayFont}
        />
      )}

      {batchTarget && (
        <BatchPanel
          haulCode={batchTarget.haulCode}
          boxes={batchTarget.boxes}
          onClose={() => setBatchTarget(null)}
          onSave={saveBoxFields}
          onSendEmail={sendEmail}
          masterContacts={masterContacts}
          emailTemplates={emailTemplates}
          sheetName={sheetName}
          monoFont={monoFont}
          font={font}
        />
      )}

      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: BRAND.dark, border: '1px solid ' + BRAND.greenLight, color: '#FAFBF8',
          padding: '10px 18px', borderRadius: 6, fontSize: 13, fontFamily: font,
          boxShadow: '0 8px 24px rgba(0,0,0,0.25)', zIndex: 100, maxWidth: '80vw',
        }}>{toast}</div>
      )}
    </div>
  );
}

// Batch Service Email panel - opened from a hauler group's Batch Email
// button on the Action Needed view (sorted by Hauler). One email
// covering every included box for that hauler: one shared Pick-Up Date
// (same hauler = same service date, per explicit design decision), one
// combined box list, one confirm-all link the hauler can click to
// confirm every listed box at once. The Subject/Body come from a
// shared "Batch" row on the Email Templates tab (Pill Label exactly
// "Batch"), with [box list] and [pickup date] placeholders - per-box
// Service templates don't fit a multi-box email. Customers are
// deliberately NOT offered as recipients here at all: a batch email
// spans multiple sites, and cc'ing every site's customer contacts onto
// one email would expose each customer's business to the others.
// Shared send-email control used by BOTH the per-box detail panel and
// the Batch Service Email panel, so the two flows stay visually and
// behaviorally identical. Sending is server-side (SendGrid via the
// Apps Script) and therefore IMMEDIATE and IRREVERSIBLE once
// confirmed, so this is deliberately never one-click: the "Proof ...
// Email Draft" button opens a dedicated FULL-SCREEN PROOF SHEET - its
// own overlay layer above the panel, showing nothing but the email
// itself (From/To/Cc/Bcc/Subject and the complete body, laid out like
// a document) with a Send Email button and a Back button - and only
// Send Email on that sheet actually sends. A proof sheet was chosen
// over a real popup window per explicit design decision: an actual
// window.open gets eaten intermittently by popup blockers (ChromeOS
// and mobile especially) and can't share the panel's access-code
// session or JSONP send machinery, while an in-app overlay looks and
// reads the same and always opens.
//
// States (owned by the PARENT, so a background data refresh never
// resets an in-progress proof): 'idle' -> 'preview' -> 'sending' ->
// 'sent' | 'error' (error keeps the proof sheet open with the reason
// shown and Send Email re-enabled for a retry).
function EmailSendBlock({ sendLabel, effectiveTo, effectiveCc, outgoingBcc, subject, body, htmlBody, canSend, noRecipientHint, sendState, sendError, onArm, onCancel, onConfirm, onReset, monoFont, font }) {
  const previewRow = (label, value) => (
    value ? (
      <div style={{ display: 'flex', gap: 8, marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, fontWeight: 700, color: BRAND.muted, width: 52, flexShrink: 0, textAlign: 'right' }}>{label}</div>
        <div style={{ fontSize: 11.5, fontFamily: monoFont, color: BRAND.ink, wordBreak: 'break-word', minWidth: 0 }}>{value}</div>
      </div>
    ) : null
  );

  if (sendState === 'sent') {
    return (
      <div>
        <div style={{
          padding: '12px 14px', background: 'rgba(92,170,22,0.12)',
          border: '1.5px solid ' + BRAND.green, borderRadius: 6, color: BRAND.greenDark,
          fontSize: 13, fontWeight: 600, textAlign: 'center', fontFamily: font,
        }}>
          ✓ Email sent to {countRecipients(effectiveTo)} recipient{countRecipients(effectiveTo) === 1 ? '' : 's'}
          <div style={{ fontSize: 11.5, fontWeight: 500, color: BRAND.greenDark, marginTop: 3 }}>
            Sent from office@wastenetinc.com — a copy was Bcc'd to the office@ mailbox.
          </div>
        </div>
        <button
          onClick={onReset}
          style={{
            display: 'block', width: '100%', marginTop: 8, padding: '8px', fontSize: 12.5,
            fontWeight: 600, borderRadius: 5, border: '1.5px solid ' + BRAND.line,
            background: BRAND.panel, color: BRAND.muted, cursor: 'pointer', fontFamily: font,
          }}
        >Compose Another Email</button>
      </div>
    );
  }

  if (sendState === 'preview' || sendState === 'sending' || sendState === 'error') {
    const sending = sendState === 'sending';
    return (
      <div
        onClick={() => { if (!sending) onCancel(); }}
        className="modal-overlay"
        style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.5)', zIndex: 95,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}
      >
        <div
          onClick={e => e.stopPropagation()}
          className="modal-panel"
          style={{
            position: 'relative', background: BRAND.panel,
            boxShadow: '0 12px 48px rgba(0,0,0,0.35)', zIndex: 96,
            display: 'flex', flexDirection: 'column', fontFamily: font, overflow: 'hidden',
          }}
        >
          <div style={{
            padding: '14px 20px', borderBottom: '1px solid ' + BRAND.line, background: BRAND.green,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <div style={{ fontFamily: monoFont, fontSize: 16, fontWeight: 800, color: '#CCFF66' }}>EMAIL PROOF</div>
            <button
              onClick={() => { if (!sending) onCancel(); }}
              style={{ background: 'transparent', border: 'none', color: '#E8F3DF', fontSize: 20, cursor: 'pointer', lineHeight: 1 }}
            >×</button>
          </div>
          <div className="modal-body" style={{ flex: 1, overflow: 'auto' }}>
            <div style={{
              border: '1px solid ' + BRAND.line, borderRadius: 6, padding: '10px 12px',
              background: BRAND.paper, marginBottom: 12,
            }}>
              {previewRow('From:', 'WasteNet <office@wastenetinc.com>')}
              {previewRow('To:', effectiveTo)}
              {previewRow('Cc:', effectiveCc)}
              {previewRow('Bcc:', outgoingBcc)}
              {previewRow('Subject:', subject)}
            </div>
            {/* The body gets the whole rest of the sheet, uncapped -
                the sheet itself scrolls, so a long email reads like a
                document instead of peering through a small box. When
                an HTML version exists (it always does for dashboard
                sends), the proof renders THAT - green confirm button
                and all - so what's proofed here is pixel-for-pixel
                what the recipient's mail client will show. Safe to
                inject: buildEmailHtml escapes every template-derived
                character before adding its own markup. */}
            {htmlBody ? (
              <div
                style={{ wordBreak: 'break-word' }}
                dangerouslySetInnerHTML={{ __html: htmlBody }}
              />
            ) : (
              <div style={{
                fontSize: 13, fontFamily: monoFont, color: BRAND.ink, lineHeight: 1.55,
                whiteSpace: 'pre-wrap', wordBreak: 'break-word',
              }}>{body}</div>
            )}
          </div>
          <div style={{ padding: '12px 20px', borderTop: '1px solid ' + BRAND.line, background: BRAND.paper }}>
            {sendState === 'error' && (
              <div style={{
                marginBottom: 8, padding: '6px 10px', background: 'rgba(179,64,43,0.08)',
                border: '1px solid ' + BRAND.red, borderRadius: 5, color: BRAND.red,
                fontSize: 12, fontWeight: 600,
              }}>Could not send: {sendError}</div>
            )}
            <div style={{ display: 'flex', gap: 8 }}>
              <button
                onClick={onConfirm}
                disabled={sending}
                style={{
                  flex: 2, padding: '11px', fontSize: 14, fontWeight: 700, borderRadius: 5,
                  border: 'none', cursor: sending ? 'default' : 'pointer',
                  background: sending ? BRAND.muted : BRAND.green, color: '#FFFFFF', fontFamily: font,
                }}
              >{sending ? 'Sending…' : 'Send Email'}</button>
              <button
                onClick={onCancel}
                disabled={sending}
                style={{
                  flex: 1, padding: '11px', fontSize: 13, fontWeight: 600, borderRadius: 5,
                  border: '1.5px solid ' + BRAND.line, cursor: sending ? 'default' : 'pointer',
                  background: BRAND.panel, color: BRAND.muted, fontFamily: font,
                }}
              >Back</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button
        onClick={() => canSend && onArm()}
        disabled={!canSend}
        style={{
          display: 'block', width: '100%', padding: '10px', textAlign: 'center',
          borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: font,
          border: 'none', cursor: canSend ? 'pointer' : 'not-allowed',
          background: canSend ? BRAND.green : BRAND.muted, color: '#FFFFFF',
        }}
      >{sendLabel}</button>
      {!effectiveTo && (
        <div style={{
          marginTop: 8, padding: '6px 10px', background: '#FBF6E9',
          border: '1px solid #E8D9A8', borderRadius: 5, color: '#7A5E1E',
          fontSize: 12, fontWeight: 600,
        }}>{noRecipientHint}</div>
      )}
    </div>
  );
}

function BatchPanel({ haulCode, boxes, onClose, onSave, onSendEmail, masterContacts, emailTemplates, sheetName, monoFont, font }) {
  const [puDateInput, setPuDateInput] = React.useState('');
  const [haulerPlacement, setHaulerPlacement] = React.useState('to'); // hauler emails default To - emailing the hauler IS this panel's purpose
  const [staffPlacement, setStaffPlacement] = React.useState('off');
  const [dateSaveState, setDateSaveState] = React.useState('idle'); // idle | saving | saved | error
  const [dateSaveProgress, setDateSaveProgress] = React.useState('');
  const [dateSaveError, setDateSaveError] = React.useState(null);
  const [sendState, setSendState] = React.useState('idle'); // idle | preview | sending | sent | error - see EmailSendBlock
  const [sendError, setSendError] = React.useState(null);

  // Union of the included boxes' Haulers addresses, de-duplicated
  // case-insensitively - for one hauler code these SHOULD be identical
  // across boxes, but if any box's Master Box List row has drifted,
  // the union (rather than "first box wins") means nobody silently
  // drops off, and the visible combined list makes any drift easy to
  // spot right on this panel.
  const dedupeEmails = (fieldName) => {
    const seen = {};
    const out = [];
    boxes.forEach(b => {
      const raw = ((masterContacts || {})[b.boxId] || {})[fieldName] || '';
      raw.split(';').map(s => s.trim()).filter(s => s).forEach(addr => {
        const key = addr.toLowerCase();
        if (!seen[key]) { seen[key] = true; out.push(addr); }
      });
    });
    return out.join('; ');
  };
  const haulerEmails = dedupeEmails('toRecipients');
  const staffEmails = dedupeEmails('staffRecipients');

  const batchTemplate = (emailTemplates || {})['Batch'] || { subjectTemplate: '', bodyTemplate: '' };
  const hasTemplate = !!(batchTemplate.subjectTemplate || batchTemplate.bodyTemplate);

  const dateStr = formatDateInputValue(puDateInput);
  const boxListText = boxes.map(b => b.description).join('\n');

  const fillBatch = (template) => {
    let t = template || '';
    if (dateStr) t = t.replace(/\[pickup date\]/gi, dateStr);
    t = t.replace(/\[box list\]/gi, boxListText);
    return t;
  };
  let finalSubject = fillBatch(batchTemplate.subjectTemplate);
  let finalBody = fillBatch(batchTemplate.bodyTemplate);

  // If the Batch body has no [box list] placeholder, the list is
  // appended rather than silently omitted - a batch email without its
  // box list is pointless.
  if (finalBody && !/\[box list\]/i.test(batchTemplate.bodyTemplate || '') && boxListText) {
    finalBody += '\n\nPlease empty & return the following compactor(s):\n\n' + boxListText;
  }

  // Confirm-all link: one link carrying EVERY included Box ID
  // (comma-separated, sorted numerically so the same selection always
  // produces the same token). Same hybrid placement rule as single
  // Service emails: [confirm link] placeholder if present, standard
  // paragraph appended otherwise.
  let confirmUrl = null;
  if (sheetName && finalBody && boxes.length > 0) {
    const idsCsv = boxes.map(b => b.boxId).slice().sort((a, b) => {
      const na = parseInt(a, 10), nb = parseInt(b, 10);
      if (Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
      return String(a).localeCompare(String(b));
    }).join(',');
    confirmUrl = 'https://dashboard.wastenetinc.com/confirm' +
      '?b=' + encodeURIComponent(idsCsv) +
      '&t=' + encodeURIComponent(sheetName) +
      '&k=' + confirmToken(idsCsv, sheetName);
    // Wording deliberately says "click below" rather than naming a
    // link or a button, because it precedes BOTH: the raw URL in the
    // plain-text fallback and the green button in the HTML version.
    if (/\[confirm link\]/i.test(finalBody)) {
      finalBody = finalBody.replace(/\[confirm link\]/gi, confirmUrl);
    } else {
      finalBody += '\n\nTo confirm ALL of the above services are scheduled, please click below and enter your name - no reply email needed:\n' + confirmUrl;
    }
  }

  // HTML version of the email - the confirm link renders as a proper
  // green button in real mail clients (see buildEmailHtml).
  const htmlBody = finalBody ? buildEmailHtml(finalBody, confirmUrl, 'Confirm All Services Scheduled',
    [dateStr].concat(boxes.map(b => b.description))) : '';

  const fieldsFor = (placement) => {
    const parts = [];
    if (haulerPlacement === placement && haulerEmails) parts.push(haulerEmails);
    if (staffPlacement === placement && staffEmails) parts.push(staffEmails);
    return parts.join('; ');
  };
  const effectiveTo = fieldsFor('to');
  const effectiveCc = fieldsFor('cc');
  const effectiveBcc = fieldsFor('bcc');

  // Server-side send (SendGrid via the Apps Script's send_email
  // action) - a copy always Bcc'd to office@ per explicit design
  // decision, and a To recipient is required (SendGrid rejects an
  // email with only Cc/Bcc, and a batch email with no hauler in To is
  // a mistake anyway).
  const outgoingBcc = withOfficeBcc(effectiveBcc);
  const canSend = !!(effectiveTo && finalSubject && finalBody);
  const handleConfirmSend = async () => {
    if (sendState === 'sending') return;
    setSendState('sending');
    setSendError(null);
    try {
      await onSendEmail({
        to: effectiveTo,
        cc: effectiveCc,
        bcc: outgoingBcc,
        subject: finalSubject,
        body: finalBody,
        html: htmlBody,
      });
      setSendState('sent');
    } catch (err) {
      setSendState('error');
      setSendError(err.message || String(err));
    }
  };

  // Writes the shared Pick-Up Date into EVERY included box's P/U Date
  // field, one save at a time (sequential, with visible progress) -
  // the batch counterpart of entering the date box-by-box in the
  // detail panel. Deliberately its own button, never something Compose
  // does implicitly, so the sheet is only written when that's exactly
  // what was asked for.
  const handleSaveDateToAll = async () => {
    if (!puDateInput || dateSaveState === 'saving') return;
    setDateSaveState('saving');
    setDateSaveError(null);
    const failures = [];
    for (let i = 0; i < boxes.length; i++) {
      setDateSaveProgress('Saving ' + (i + 1) + ' of ' + boxes.length + '…');
      try {
        await onSave(boxes[i].boxId, { puDate: puDateInput });
      } catch (err) {
        failures.push(boxes[i].boxId);
      }
    }
    setDateSaveProgress('');
    if (failures.length === 0) {
      setDateSaveState('saved');
      setTimeout(() => setDateSaveState('idle'), 2500);
    } else {
      setDateSaveState('error');
      setDateSaveError('Could not save for Box ' + failures.join(', ') + ' - the rest saved fine.');
    }
  };

  const PlacementSelector = ({ value, onChange }) => (
    <div style={{ display: 'flex', gap: 4 }}>
      {[['to', 'To'], ['cc', 'Cc'], ['bcc', 'Bcc']].map(([val, label]) => (
        <button
          key={val}
          onClick={() => onChange(value === val ? 'off' : val)}
          style={{
            fontSize: 11, fontWeight: 600, padding: '4px 9px', borderRadius: 4,
            border: '1px solid ' + (value === val ? BRAND.green : BRAND.line),
            background: value === val ? BRAND.green : BRAND.panel,
            color: value === val ? '#FFFFFF' : BRAND.muted,
            cursor: 'pointer', fontFamily: monoFont,
          }}
        >{label}</button>
      ))}
    </div>
  );

  return (
    <div
      onClick={onClose}
      className="modal-overlay"
      style={{
        position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
        background: 'rgba(0,0,0,0.35)', zIndex: 89,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        className="modal-panel"
        style={{
          position: 'relative',
          background: BRAND.panel, boxShadow: '0 12px 48px rgba(0,0,0,0.3)',
          zIndex: 90, display: 'flex', flexDirection: 'column', fontFamily: font, overflow: 'hidden',
        }}
      >
        <div style={{ padding: '18px 20px', borderBottom: '1px solid ' + BRAND.line, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', background: BRAND.green }}>
          <div>
            <div style={{ fontFamily: monoFont, fontSize: 18, fontWeight: 800, color: '#CCFF66' }}>BATCH SERVICE EMAIL</div>
