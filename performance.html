<!DOCTYPE html>
<!-- wastenet box performance · build 2026-07-17-a · fullness-at-pull tiers -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet — Box Performance</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B;
    --red:#E24B4A; --red-dark:#A32D2D; --red-darker:#791F1F; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --r-input:6px; --r-ctl:8px; --r-menu:10px; --r-card:12px; --r-pill:999px; --h-ctl:30px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{font-family:var(--font); background:var(--page); color:var(--ink); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 80px;}
  .topcard{border:0.5px solid var(--line); border-radius:var(--r-card); background:var(--card); padding:12px 16px 15px;}
  .header{display:flex; align-items:center; gap:10px;}
  .perf-sticky{position:sticky; top:0; z-index:50; background:var(--page); margin-bottom:12px;}
  .perf-sticky .topcard{margin-bottom:14px;}
  .header-left{display:flex; align-items:center; gap:10px;}
  .brand-logo{height:24px; width:auto; display:block; flex:0 0 auto;}

  .spinner{display:inline-block; width:16px; height:16px; background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNzkgMjA2Ij48ZyBmaWxsPSIjNUNBQTE2Ij48cGF0aCBkPSJNMCAwIEMyLjggMC4zIDMuOCAwLjggNS43IDMuMCBDNi4yIDMuOSA2LjggNC44IDcuNCA1LjcgQzguMCA2LjcgOC42IDcuNiA5LjIgOC43IEM5LjkgOS43IDEwLjUgMTAuOCAxMS4yIDExLjkgQzExLjkgMTMuMCAxMi41IDE0LjAgMTMuMiAxNS4yIEMxOC45IDI0LjUgMjMuNyAzNC4wIDI4IDQ0IEMyOC4zIDQ0LjcgMjguNiA0NS4zIDI4LjkgNDYuMCBDMzMuMiA1NS43IDM1LjggNjUuNiAzOCA3NiBDMzguMiA3Ni44IDM4LjQgNzcuNSAzOC41IDc4LjMgQzQzLjAgMTA0LjEgMzYuOSAxMjguMiAyMi44IDE0OS44IEMxMi40IDE2NC4wIC0xLjEgMTc0LjQgLTE2LjEgMTgzLjIgQy0yMi43IDE4Ny4yIC0yNi43IDE5MS40IC0yOSAxOTkgQy0yOS40IDIwMS4zIC0yOS43IDIwMy43IC0zMCAyMDYgQy0zNC42IDIwNiAtMzkuMiAyMDYgLTQ0IDIwNiBDLTQ0LjUgMTk1LjcgLTQzLjYgMTg5LjIgLTM5IDE4MCBDLTM4LjIgMTc4LjQgLTM3LjUgMTc2LjcgLTM2LjcgMTc1LjEgQy0zMy4wIDE2Ny4yIC0yOS4zIDE1OS40IC0yNS4xIDE1MS43IEMtMTIuOSAxMjkuMyAtNC4wIDEwNy4zIC0xIDgyIEMtMS4xIDgyLjMgLTEuMSA4Mi4zIC0xLjUgODMuNiBDLTYuNyA5OS40IC0xMi43IDExNC41IC0yMC45IDEyOS4wIEMtMjEuOSAxMzAuOCAtMjIuOCAxMzIuNiAtMjMuOCAxMzQuNCBDLTI0LjAgMTM0LjggLTI0LjAgMTM0LjggLTI1LjMgMTM3LjEgQy0yNS43IDEzNy45IC0yNi4xIDEzOC42IC0yNi42IDEzOS40IEMtMjguNSAxNDEuNiAtMzAuMiAxNDEuNyAtMzMgMTQyIEMtMzUuMyAxMzguNiAtMzUuNSAxMzYuMyAtMzYuMiAxMzIuMyBDLTM4LjQgMTIwLjMgLTQzLjMgMTA5LjUgLTUwLjcgOTkuOCBDLTUyIDk4IC01MiA5OCAtNTIgOTYgQy01Mi43IDk2IC01My4zIDk2IC01NCA5NiBDLTU1LjUgOTQuMyAtNTYuOSA5Mi42IC01OC4zIDkwLjggQy02MS40IDg3LjAgLTY0LjUgODMuNCAtNjggODAgQy02Ny4zIDc4LjMgLTY2LjcgNzYuNyAtNjYgNzUgQy02NS4zIDc1IC02NC43IDc1IC02NCA3NSBDLTYzLjggNzQuNSAtNjMuNSA3My45IC02My4zIDczLjQgQy02MC4zIDY3LjkgLTU1LjAgNjEuMCAtNDkgNTkgQy00OC4zIDU3LjcgLTQ3LjYgNTYuMyAtNDcgNTUgQy00NS42IDUzLjQgLTQ1LjYgNTMuNCAtNDQuMCA1MS44IEMtNDMuNCA1MS4yIC00Mi44IDUwLjcgLTQyLjIgNTAuMSBDLTQxLjYgNDkuNSAtNDEuMCA0OC45IC00MC4zIDQ4LjIgQy0zNC40IDQyLjQgLTI4LjggMzYuNiAtMjMuNyAzMCBDLTIzLjEgMjkuMyAtMjIuNiAyOC43IC0yMiAyOCBDLTIxLjMgMjggLTIwLjcgMjggLTIwIDI4IEMtMTkuOCAyNy41IC0xOS42IDI3LjAgLTE5LjMgMjYuNCBDLTE3LjUgMjMu   @keyframes spin{to{transform:rotate(360deg);}}

  .lock{position:fixed; inset:0; z-index:100; background:var(--page); display:flex; align-items:center; justify-content:center; padding:20px;}
  .lock-card{width:min(360px,100%); background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-card); padding:24px; text-align:center; box-shadow:0 3px 14px rgba(0,0,0,0.07);}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:var(--r-input); font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:12px; padding:11px; font-size:14px; font-weight:600; border-radius:var(--r-input); border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font);}
  .lock-err{margin-top:12px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:var(--r-input); color:var(--red-dark); font-size:12.5px; font-weight:600;}

  .perf-title{display:flex; align-items:baseline; gap:12px; margin-bottom:14px;}
  .perf-title h1{font-size:18px; font-weight:600; margin:0;}
  .perf-sub{font-size:12.5px; color:var(--ink-3);}

  .tier-btns{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding-bottom:12px;}
  .tier-btn{cursor:pointer; text-align:left; background:var(--panel); border:0.5px solid var(--line); border-radius:var(--r-card); padding:10px 12px; font-family:var(--font); transition:background .12s, border-color .12s, padding .14s;}
  .tier-btn:hover{background:#fff;}
  .tier-btn.on{background:#fff;}
  .tier-bat{margin-bottom:6px; height:20px;}
  .tier-bat svg{transition:width .14s, height .14s;}
  .tier-name{font-size:15px; font-weight:600; color:var(--ink);}
  .tier-btn.on .tier-name{color:var(--btnc);}
  .tier-n{font-size:11.5px; color:var(--ink-2); margin-top:1px;}
  @media (max-width:640px){ .tier-btns{grid-template-columns:repeat(2,1fr);} }

  /* Slim state: once you scroll into the list, the title collapses and the four
     buttons compress to a single-line, smaller-battery form so they stay in
     reach without taking up the screen. */
  .perf-sticky.slim .perf-title{display:none;}
  .perf-sticky.slim .topcard{margin-bottom:10px;}
  .perf-sticky.slim .tier-btn{padding:6px 11px; display:flex; align-items:center; gap:9px;}
  .perf-sticky.slim .tier-bat{margin:0; height:15px;}
  .perf-sticky.slim .tier-bat svg{width:28px; height:14px;}
  .perf-sticky.slim .tier-name{font-size:12.5px;}
  .perf-sticky.slim .tier-n{margin:0 0 0 auto; font-size:11px;}

  .tier-note{font-size:11.5px; color:var(--ink-3); margin-bottom:10px;}
  .tier-list{background:var(--card); border:0.5px solid var(--line); border-radius:var(--r-card); overflow:hidden;}
  .prow{display:grid; grid-template-columns:52px 1fr 104px 56px 44px auto; align-items:center; gap:10px; padding:9px 13px; border-top:0.5px solid var(--line); font-size:12.5px;}
  .prow:first-child{border-top:none;}
  .prow .pid{color:var(--ink-3);}
  .prow .psite{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .prow .pcad{color:var(--ink-2);}
  .prow .pw{color:#c9c9c1;}
  .bar{display:inline-block; width:56px; height:6px; background:#EDEDE7; border-radius:3px; vertical-align:middle; overflow:hidden;}
  .bar > span{display:block; height:6px;}
  .pavg{font-weight:600; margin-left:5px;}
  .flag{font-size:10.5px; padding:2px 7px; border-radius:5px; white-space:nowrap;}
  .flag-bridging{background:#FAEEDA; color:var(--amber-dark);}
  .flag-hauler-set{background:#F1EFE8; color:var(--ink-2);}
  .tier-foot{padding:8px 13px; border-top:0.5px solid var(--line); font-size:11.5px; color:#a7a7a0;}
  .perf-meta{margin-top:12px; font-size:11.5px; color:var(--ink-3);}
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-card">
    <div class="lock-sub">WasteNet</div>
    <input class="lock-in" id="lockIn" type="password" placeholder="Access key" autocomplete="off">
    <button class="lock-btn" id="lockBtn">Open</button>
    <div class="lock-err" id="lockErr" style="display:none;">That key is not right.</div>
  </div>
</div>

<div class="wrap" id="app" style="display:none;">
  <div id="perfSentinel" style="height:1px;"></div>
  <div class="perf-sticky" id="perfSticky">
    <div class="topcard header">
      <div class="header-left">
        <img class="brand-logo" src="wastenet-logo.png?v=2026-07-15" alt="WasteNet">
        <div data-wn-nav data-label="Box Performance"></div>
      </div>
    </div>
    <div id="perfHead"></div>
    <div class="tier-btns" id="tierBtns"></div>
  </div>

  <div id="body"><div class="empty-state"><span class="spinner"></span>Reading pull history&hellip;</div></div>
</div>

<script src="logic.js?v=2026-07-17-perf"></script>
<script>
var API = "https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec";
var KEY = (function(){ try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; } catch(e){ return ""; } })();

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var timeout = setTimeout(function(){ cleanup(); cb({ ok:false, error:"Request timed out." }); }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){ cleanup(); cb(data); };
  var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]); }).join("&");
  var s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* The four tiers, best to worst. The battery drains left to right - full green
   on Maxed Out down to a red sliver on Empty Runs - so the fleet's health reads
   before a single word does. Order and thresholds live in the backend
   (getBoxPerformanceAsJson); this only labels and colours what it returns. */
var TIERS = [
  { key:"maxed",  name:"Maxed Out",   range:"85%+ full at pull", color:"#5CAA16", bat:95 },
  { key:"packed", name:"Well Packed", range:"70\u201384%",       color:"#639922", bat:76 },
  { key:"light",  name:"Light Loads", range:"55\u201369%",       color:"#EF9F27", bat:48 },
  { key:"empty",  name:"Empty Runs",  range:"under 55%",         color:"#E24B4A", bat:22 }
];

/* Default to Empty Runs - that's the work list, the boxes worth acting on. */
var state = { data: null, active: "empty" };

function battery(fill, color){
  var w = Math.max(2, Math.round(24 * Math.min(fill,100) / 100));
  return '<svg width="40" height="20" viewBox="0 0 40 20" aria-hidden="true">' +
    '<rect x="1" y="3" width="32" height="14" rx="3" fill="none" stroke="'+color+'" stroke-width="1.5"/>' +
    '<rect x="34" y="7" width="3" height="6" rx="1.5" fill="'+color+'"/>' +
    '<rect x="4" y="6" width="'+w+'" height="8" rx="1.5" fill="'+color+'"/></svg>';
}
function bar(pct, color){
  return '<span class="bar"><span style="width:'+Math.min(pct,100)+'%;background:'+color+';"></span></span>';
}
function flagHtml(f){
  if(f === "bridging")   return '<span class="flag flag-bridging">bridging</span>';
  if(f === "hauler-set") return '<span class="flag flag-hauler-set">hauler-set</span>';
  return "";
}

function render(){
  var d = state.data;
  if(!d || !d.ok){
    document.getElementById("body").innerHTML = '<div class="empty-state">Could not load performance data.</div>';
    return;
  }
  var tierMeta = {};
  TIERS.forEach(function(t){ tierMeta[t.key] = t; });
  var active = tierMeta[state.active];

  var btns = TIERS.map(function(t){
    var n = (d.tiers && d.tiers[t.key]) || 0;
    var on = (t.key === state.active);
    return '<button class="tier-btn'+(on?" on":"")+'" data-tier="'+t.key+'" style="--btnc:'+t.color+';'+(on?"border-color:"+t.color+";box-shadow:inset 0 0 0 1px "+t.color+";":"")+'">' +
      '<div class="tier-bat">'+battery(t.bat, t.color)+'</div>' +
      '<div class="tier-name">'+t.name+'</div>' +
      '<div class="tier-n">'+n+' boxes</div>' +
    '</button>';
  }).join("");

  /* Unflagged (actionable) boxes first, then worst fullness first - so the top
     of any tier is the real work, and the explained boxes sit below. */
  var list = (d.boxes || []).filter(function(b){ return b.tier === state.active; });
  list.sort(function(a,b){
    var af = a.flag ? 1 : 0, bf = b.flag ? 1 : 0;
    if(af !== bf) return af - bf;
    return a.avg - b.avg;
  });

  var rowsHtml = list.map(function(b){
    return '<div class="prow">' +
      '<span class="pid">#'+esc(b.id)+'</span>' +
      '<span class="psite">'+esc(b.desc || ("Box "+b.id))+'</span>' +
      '<span>'+bar(b.avg, active.color)+'<b class="pavg">'+b.avg+'%</b></span>' +
      '<span class="pcad">'+(b.cadence==null?"\u2014":(b.cadence+"d"))+'</span>' +
      '<span class="pw">\u2014</span>' +
      '<span>'+flagHtml(b.flag)+'</span>' +
    '</div>';
  }).join("");
  if(!rowsHtml) rowsHtml = '<div class="tier-foot">No boxes in this tier.</div>';

  var extra = [];
  if(d.buildingCount)  extra.push(d.buildingCount + " box" + (d.buildingCount===1?"":"es") + " still building history (under 5 pulls)");
  if(d.noHistoryCount) extra.push(d.noHistoryCount + " with no pulls yet");

  document.getElementById("perfHead").innerHTML =
    '<div class="perf-title"><h1>Box performance</h1>' +
      '<span class="perf-sub">'+(d.boxes?d.boxes.length:0)+' boxes \u00b7 '+(d.totalPulls||0).toLocaleString()+' pulls \u00b7 avg '+d.portfolioAvg+'% full at pull</span></div>';

  document.getElementById("tierBtns").innerHTML = btns;
  document.querySelectorAll("#tierBtns .tier-btn").forEach(function(btn){
    btn.addEventListener("click", function(){ state.active = btn.getAttribute("data-tier"); render(); });
  });

  document.getElementById("body").innerHTML =
    '<div class="tier-note">'+active.name+' \u00b7 '+active.range+' \u00b7 '+((d.tiers&&d.tiers[state.active])||0)+' boxes \u2014 unflagged (actionable) first. Weight fills in as it\u2019s recorded.</div>' +
    '<div class="tier-list">'+rowsHtml+'</div>' +
    (extra.length ? '<div class="perf-meta">'+extra.join(" \u00b7 ")+'</div>' : "");

  setupSlimObserver();
}

/* Compress the frozen tier buttons to their slim form once the sticky zone
   reaches the top. A 1px sentinel just above it flips the state exactly when it
   sticks - no scroll math, no jump. */
var slimWired = false;
function setupSlimObserver(){
  if(slimWired) return;
  var sentinel = document.getElementById("perfSentinel");
  var sticky = document.getElementById("perfSticky");
  if(!sentinel || !sticky || typeof IntersectionObserver === "undefined") return;
  slimWired = true;
  new IntersectionObserver(function(entries){
    sticky.classList.toggle("slim", !entries[0].isIntersecting);
  }, { threshold: 0 }).observe(sentinel);
}

function load(){
  document.getElementById("body").innerHTML = '<div class="empty-state"><span class="spinner"></span>Reading pull history&hellip;</div>';
  jsonp({ action:"box_performance", key:KEY }, function(data){
    state.data = data;
    render();
  });
}

/* ---------- lock ---------- */
(function(){
  var lock = document.getElementById("lock"), lockIn = document.getElementById("lockIn"), lockBtn = document.getElementById("lockBtn");
  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.style.display = "none";
    document.getElementById("app").style.display = "";
    document.getElementById("lockErr").style.display = "none";
    load();
  }
  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };
  if(KEY){
    lock.style.display = "none";
    document.getElementById("app").style.display = "";
    load();
  }
})();
</script>
</body>
</html>
