<!DOCTYPE html>
<!-- wastenet-accounting · build 2026-07-13-d · Deposits: wider payment search; refuses to guess -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet Accounting</title>
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B; --amber-tint:#FAEEDA;
    --coral:#D85A30; --coral-dark:#712B13; --coral-tint:#FAECE7;
    --red:#E24B4A; --red-dark:#A32D2D; --red-darker:#791F1F; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --pinh:0px; --slimh:0px;

    /* ---- SHAPE ----
       Chrome is rectangular, tokens are round.
       Anything that FRAMES content - a toolbar control, a card, a menu, an
       inner panel - is a rectangle. Anything that IS a small piece of
       content - a status you read, a filter you toggle - is a pill.
       That one line decides every future case without another audit.

       These six values are identical in wastenet-monitor.html. The two
       dashboards do different jobs; they should not look like they were
       drawn by different people. Before this there were SEVEN radii doing
       four jobs, and the same control was 14px on one dashboard and 8px on
       the other. */
    --r-input:6px;    /* text fields */
    --r-ctl:8px;      /* buttons, selects, dropdown triggers, search, inner panels */
    --r-menu:10px;    /* popovers */
    --r-card:12px;    /* containers, cards, list wrappers */
    --r-pill:999px;   /* status chips and filter toggles */
    --h-ctl:30px;     /* every toolbar control is this tall */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font); background:var(--page); color:var(--ink);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  /* Identical in wastenet-monitor.html. The two pages sat at different
     distances from the top of the window - 16px here, 20px there - which is
     the sort of thing you cannot unsee once you have switched between them
     twice. */
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 80px;}

  /* ---- top card: brand + sections + compact scorecard ---- */
  /* The top card scrolls away NORMALLY - it is not sticky, and it never
     resizes. A separate fixed .slimbar fades in once it leaves. Two
     independent elements that never change size is what keeps this from
     shifting the page or feeding back into its own scroll trigger. The
     old design pinned the month tabs at top:0 and let the section
     switcher scroll off entirely, which meant that halfway down a list
     you could no longer get to Payments without scrolling back up. */
  .topcard{border:0.5px solid var(--line); border-radius:var(--r-card); background:var(--card); padding:10px 14px 12px; margin-bottom:14px;}

  .slimbar{position:fixed; left:0; right:0; top:0; z-index:60; background:var(--card);
           border-bottom:0.5px solid var(--line-strong); box-shadow:0 3px 12px rgba(0,0,0,0.10);
           opacity:0; visibility:hidden; transition:opacity .15s ease, visibility .15s ease;}
  .slimbar.show{opacity:1; visibility:visible;}
  .slimbar-inner{max-width:820px; margin:0 auto; padding:7px 16px;
                 display:flex; align-items:center; gap:10px;}
  .slimbar .brand{flex:0 0 auto;}
  /* The four sections are the whole point of the bar - they get the room. */
  .slimbar .sections{margin-bottom:0; flex:1 1 auto; justify-content:flex-end;
                     flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;}
  .slimbar .sections::-webkit-scrollbar{display:none;}
  .slimbar .sec{padding:4px 11px; font-size:11.5px;}
  .slimbar .btn{flex:0 0 auto;}
  @media (max-width:640px){
    .slimbar .brand-name, .slimbar .brand-div{display:none;}
  }

  .header-bar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;}
  .brand{display:flex; align-items:center; gap:9px; min-width:0;}
  .brand-name{font-size:15px; font-weight:800; letter-spacing:0.04em; color:var(--green); flex:0 0 auto;}
  .brand-div{width:1px; height:14px; background:var(--line-strong); flex:0 0 auto;}
  .header-right{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .stamp{font-size:10.5px; color:var(--ink-3); white-space:nowrap;}
  .btn{font-size:12px; color:var(--ink); background:var(--card); border:0.5px solid var(--line-strong); height:var(--h-ctl); padding:0 11px; border-radius:var(--r-ctl); cursor:pointer; font-family:var(--font); display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box; transition:background .12s;}
  .btn:hover{background:var(--panel);}

  /* A bare word with a 9px grey arrow next to it does not read as a control.
     It reads as a label that happens to have a speck beside it. Give it the
     chrome of the thing it actually is: a button that opens a menu. */
  .viewnav{position:relative; flex:0 0 auto;}
  .view-label{font-size:12.5px; font-weight:500; color:var(--ink); font-family:var(--font);
              background:var(--card); border:0.5px solid var(--line-strong);
              height:var(--h-ctl); padding:0 9px 0 11px; border-radius:var(--r-ctl);
              cursor:pointer; display:inline-flex; align-items:center; gap:6px;
              white-space:nowrap; box-sizing:border-box;
              transition:background .12s, border-color .12s;}
  .view-label:hover{background:var(--panel); border-color:var(--ink-3);}
  .view-label.open{background:var(--green-tint); border-color:var(--green-border); color:var(--green-darker);}
  .view-caret{font-size:11px; color:var(--ink-2); transition:transform .14s ease;}
  .view-label:hover .view-caret{color:var(--ink);}
  .view-label.open .view-caret{transform:rotate(180deg); color:var(--green-dark);}
  .view-drop{position:absolute; top:100%; left:0; margin-top:6px; background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-menu); box-shadow:0 4px 14px rgba(0,0,0,0.10); min-width:190px; z-index:80; display:none; overflow:hidden;}
  .view-drop.open{display:block;}
  .view-opt{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13px; color:var(--ink); background:transparent; border:none; cursor:pointer; font-family:var(--font);}
  .view-opt:hover{background:var(--panel);}
  .view-opt.cur{color:var(--green-dark); font-weight:600; background:var(--green-tint-2);}

  /* section switcher */
  .sections{display:flex; gap:6px; margin-bottom:11px; flex-wrap:wrap;}
  .sec{
    font-size:12px; font-weight:500; font-family:var(--font);
    padding:5px 13px; border-radius:var(--r-pill); cursor:pointer; white-space:nowrap;
    border:0.5px solid var(--line-strong); background:var(--card); color:var(--ink-2);
    transition:background .12s, color .12s, border-color .12s;
  }
  .sec:hover:not(.on){background:var(--panel);}
  .sec.on{background:var(--green); border-color:var(--green); color:#fff;}

  /* compact scorecard - one strip, four figures */
  .score{display:flex; border:0.5px solid var(--line); border-radius:var(--r-card); overflow:hidden;}
  .score-cell{flex:1; min-width:0; padding:8px 6px; text-align:center; border-right:0.5px solid var(--line);}
  .score-cell:last-child{border-right:none;}
  .score-n{font-size:17px; font-weight:600; letter-spacing:-0.01em; line-height:1.2;}
  .score-l{font-size:10px; color:var(--ink-2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .n-ink{color:var(--ink);}
  .n-red{color:var(--red-dark);}
  .n-green{color:var(--green-dark);}

  /* ---- deposits: the Frost statement, against the invoices ---- */
  .dz{border:1px dashed var(--line-strong); border-radius:var(--r-card); padding:28px 20px;
      text-align:center; background:var(--panel); transition:border-color .12s, background .12s;}
  .dz.over{border-color:var(--green); background:var(--green-tint-2);}
  .dz-t{font-size:14px; font-weight:600; margin-bottom:5px;}
  .dz-d{font-size:12px; color:var(--ink-2); line-height:1.6; max-width:420px; margin:0 auto;}
  .dpaste{width:100%; margin-top:12px; padding:9px 11px;
          font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
          font-size:11px; border:0.5px solid var(--line-strong); border-radius:var(--r-input);
          resize:vertical; outline:none; color:var(--ink); background:var(--card);}
  .dpaste:focus{border-color:var(--green);}
  .dnote{margin-top:16px; padding:10px 13px; background:var(--green-tint-2);
         border:0.5px solid var(--green-border); border-radius:var(--r-ctl);
         font-size:11.5px; color:var(--green-darker); line-height:1.6;}

  .drow{padding:11px 4px; border-bottom:0.5px solid var(--line);}
  .drow:last-child{border-bottom:none;}
  /* A deposit needing nothing should not compete for attention with one that
     does. It stays on the page - it happened - but it recedes. */
  .drow.quiet{opacity:0.5;}
  .drow.quiet:hover{opacity:1;}
  .dmain{display:flex; align-items:center; gap:10px;}
  .dc-date{width:74px; flex:0 0 74px; font-size:11.5px; color:var(--ink-2); white-space:nowrap;}
  .ddesc{flex:1; min-width:0; font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .damt{width:96px; flex:0 0 96px; text-align:right; font-size:13.5px; font-weight:600;}
  .dtag{width:112px; flex:0 0 112px; text-align:right;}
  .dwho{font-size:11.5px; color:var(--ink-2); margin-top:5px; padding-left:84px;}
  .dwhy{font-size:11.5px; color:var(--ink-2); line-height:1.6; margin-top:6px; margin-left:84px;
        padding:7px 10px; background:var(--panel); border-radius:var(--r-ctl);}

  /* Already recorded. The receipt, not just the assertion - which payment,
     keyed when. A confirmation you cannot check is just a claim. */
  .ddone{margin-top:6px; margin-left:84px; padding:7px 11px; display:flex; flex-wrap:wrap;
         align-items:center; gap:4px 10px;
         background:var(--green-tint-2); border:0.5px solid var(--green-border);
         border-radius:var(--r-ctl);}
  .dd-t{font-size:11px; font-weight:700; color:var(--green-darker); flex:0 0 auto; min-width:74px;}

  .dcands{margin-top:7px; padding-left:84px; display:flex; flex-direction:column; gap:5px;}
  .dhint{font-size:11px; color:var(--amber-dark); margin-bottom:2px; line-height:1.5;}
  /* Each candidate is a whole answer, so it is one button - you take it or you
     do not. Ticking invoices one at a time would invite a combination that adds
     up to nothing. */
  .dcand{display:flex; flex-wrap:wrap; align-items:center; gap:4px 10px; width:100%; text-align:left;
         padding:8px 11px; border:0.5px solid var(--line-strong); border-radius:var(--r-ctl);
         background:var(--card); cursor:pointer; font-family:var(--font);
         transition:background .12s, border-color .12s;}
  .dcand:hover{border-color:var(--green); background:var(--green-tint-2);}
  .dcand.on{border-color:var(--green); background:var(--green-tint);}
  .dc-sum{font-size:12.5px; font-weight:700; color:var(--green-darker); flex:0 0 auto;
          min-width:74px;}
  .dc-inv{font-size:11.5px; color:var(--ink-2); white-space:nowrap;}
  .dc-inv b{color:var(--green-dark);}
  .dc-amt{color:var(--ink-3);}

  /* ---- folder: five tabs, one body. Tabs + bar pin on scroll. ---- */
  .folder{margin-bottom:20px;}

  /* The tabs pin BELOW the slim bar, not under it. By the time the tabs
     reach the top the slim bar is always already showing - the sentinel
     that reveals it sits higher up the page - so this offset is always
     the right one. */
  .pinhead{position:sticky; top:var(--slimh); z-index:30; background:var(--page); padding-top:6px;}

  .folder-tabs{display:flex; gap:4px; flex-wrap:wrap; padding-left:2px;}
  /* Months don't wrap - a year of them would stack three deep. Scroll
     sideways instead, newest first. */
  .folder-tabs.scroll{flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding-bottom:0;}
  .folder-tabs.scroll::-webkit-scrollbar{display:none;}
  .folder-tabs.scroll .ftab{flex:0 0 auto;}

  /* There are years of months, so the tab strip scrolls sideways. The
     fade is on the WRAPPER, not the scroller - on the scroller it would
     slide away with the content and stop meaning anything. It hides
     itself once you reach the end. */
  /* year picker - first thing in the green bar */
  .yrsel{
    font-size:12px; font-family:var(--font); font-weight:600;
    color:var(--green-dark); background:var(--card);
    border:0.5px solid var(--green-border); border-radius:var(--r-ctl);
    height:var(--h-ctl); box-sizing:border-box;
    padding:0 28px 0 13px; cursor:pointer; outline:none; flex:0 0 auto;
    max-width:190px;
    /* the native arrow sits flush against the text in a control this small,
       so draw our own and give it room */
    appearance:none; -webkit-appearance:none; -moz-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='9' height='6' viewBox='0 0 9 6'%3E%3Cpath d='M1 1l3.5 3.5L8 1' stroke='%233B6D11' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 10px center;
  }
  .yrsel:focus{border-color:var(--green);}

  .tabscroll{position:relative;}  .tabscroll{position:relative;}
  .tabscroll::after{
    content:""; position:absolute; top:0; right:0; bottom:0; width:44px;
    pointer-events:none; opacity:1; transition:opacity .15s;
    background:linear-gradient(to right, rgba(250,251,248,0), var(--page) 72%);
  }
  .tabscroll.at-end::after{opacity:0;}
  .ftab{
    display:inline-flex; align-items:center;
    background:var(--green-tint); border:0.5px solid var(--green-border);
    border-bottom:none; border-radius:var(--r-menu) var(--r-menu) 0 0;
    padding:7px 13px 8px; font-size:12px; font-weight:600;
    color:var(--green-dark); cursor:pointer; font-family:var(--font);
    white-space:nowrap; position:relative; z-index:1; margin-bottom:-1px;
    transition:background .12s, color .12s;
  }
  .ftab:hover:not(.sel){background:var(--green-border);}
  .ftab.sel{background:var(--card); color:var(--green-darker); z-index:3; padding-bottom:9px;}

  /* the green bar - last thing that stays put when you scroll */
  .fbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 14px; background:var(--green-tint-2);
    border-left:0.5px solid var(--green-border);
    border-right:0.5px solid var(--green-border);
    border-top:0.5px solid var(--green-border);
    border-bottom:0.5px solid var(--line);
    position:relative; z-index:2;
  }
  .fbar-t{font-size:12.5px; font-weight:600; color:var(--green-darker); min-width:0; flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fbar-t .amt{font-weight:400; color:var(--green-dark); font-size:11.5px;}

  .search{font-size:11.5px; height:var(--h-ctl); padding:0 10px; border:0.5px solid var(--green-border); border-radius:var(--r-ctl); width:165px; outline:none; font-family:var(--font); color:var(--ink); background:var(--card); flex:0 0 auto; box-sizing:border-box;}
  .search:focus{border-color:var(--green);}

  .folder-lower{
    border-left:0.5px solid var(--green-border);
    border-right:0.5px solid var(--green-border);
    border-bottom:0.5px solid var(--green-border);
    border-radius:0 0 var(--r-card) var(--r-card);
    background:var(--card); padding:0 16px 6px;
  }

  table{width:100%; border-collapse:collapse; table-layout:fixed;}
  thead th{
    position:sticky; top:var(--pinh); z-index:5; background:var(--card);
    font-size:10.5px; font-weight:600; color:var(--ink-2); text-align:left;
    padding:7px 4px; border-bottom:0.5px solid var(--line-strong);
    cursor:pointer; user-select:none; white-space:nowrap;
  }
  thead th:hover{color:var(--ink);}
  th .sc{color:var(--ink-3); font-size:9px;}
  td{padding:8px 4px; border-bottom:0.5px solid var(--line); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel);}
  .num{text-align:right;}
  .muted{color:var(--ink-2);}

  /* invoice numbers link straight into QuickBooks */
  .ilink{color:var(--green-dark); text-decoration:none; border-bottom:1px dotted var(--green-border);}
  .ilink:hover{color:var(--green-darker); border-bottom-color:var(--green); background:var(--green-tint-2);}
  .agflag .ilink{color:var(--amber-dark); border-bottom-color:var(--amber);}
  .agflag .ilink:hover{background:rgba(255,255,255,0.5);}

  .chip{display:inline-block; padding:2px 8px; border-radius:var(--r-pill); font-size:10.5px; font-weight:600; white-space:nowrap;}
  .chip-cur{background:var(--green-tint); color:var(--green-darker);}
  .chip-30{background:var(--amber-tint); color:var(--amber-dark);}
  .chip-60{background:var(--coral-tint); color:var(--coral-dark);}
  .chip-90{background:var(--red-tint); color:var(--red-dark);}
  .chip-90p{background:var(--red-tint); color:var(--red-darker);}

  /* agent payout rows */
  .agrow{border-bottom:0.5px solid var(--line);}
  .agrow:last-child{border-bottom:none;}

  /* An OPEN agent becomes a bounded card. Without this the detail table
     runs straight into the next agent's row, and the eye reads the next
     agent's payout as if it belonged to the expanded one - on a page
     about money, that is a misreading worth designing out. */
  .agrow.open{
    border:0.5px solid var(--green-border);
    border-radius:var(--r-card);
    background:var(--green-tint-2);
    margin:8px 0 12px;
    box-shadow:0 1px 6px rgba(0,0,0,0.04);
  }
  .agrow.open + .agrow{border-top:none;}

  .aghead{display:flex; align-items:center; gap:10px; padding:11px 4px; cursor:pointer;}
  .aghead:hover{background:var(--panel);}
  .agrow.open .aghead{
    padding:11px 12px;
    background:transparent;
    border-bottom:0.5px solid var(--green-border);
    border-radius:var(--r-card) var(--r-card) 0 0;
  }
  .agrow.open .aghead:hover{background:rgba(255,255,255,0.4);}

  .agcaret{font-size:9px; color:var(--ink-3); width:10px; flex:0 0 auto; transition:transform .12s;}
  .agrow.open .agcaret{transform:rotate(90deg); color:var(--green-dark);}
  .agname{font-size:13.5px; font-weight:600; flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .agrow.open .agname{color:var(--green-darker);}
  .agshare{font-size:10.5px; color:var(--ink-3); background:var(--panel); border-radius:var(--r-pill); padding:2px 7px; flex:0 0 auto;}
  .agrow.open .agshare{background:var(--card);}
  .agmeta{font-size:11px; color:var(--ink-2); flex:0 0 auto; text-align:right; white-space:nowrap;}
  .agpay{font-size:15px; font-weight:600; color:var(--green-dark); flex:0 0 auto; text-align:right; min-width:88px;}

  .agdetail{display:none;}
  .agrow.open .agdetail{
    display:block;
    padding:11px 12px 4px;
    background:var(--card);
    border-radius:0 0 var(--r-card) var(--r-card);
  }
  /* the detail table sits on white, so it needs its own quiet frame */
  .agrow.open .agdetail table{margin-top:2px;}
  .agrow.open .agdetail thead th{background:var(--card); position:static;}
  .agmath{font-size:11.5px; color:var(--ink-2); background:var(--panel); border:0.5px solid var(--line); border-radius:var(--r-ctl); padding:9px 12px; margin-bottom:10px; line-height:1.7;}
  .agmath b{color:var(--ink); font-weight:600;}

  .agflag{background:var(--amber-tint); border:0.5px solid var(--amber); color:var(--amber-dark); border-radius:var(--r-ctl); padding:8px 11px; font-size:11.5px; margin-bottom:9px;}

  .soon{border:0.5px solid var(--line); border-radius:var(--r-card); background:var(--card); padding:30px 26px; text-align:center;}
  .soon-disc{width:52px; height:52px; border-radius:50%; margin:0 auto 14px; background:var(--green-tint); border:1px solid var(--green-border); display:flex; align-items:center; justify-content:center; color:var(--green-dark);}
  .soon-disc svg{width:24px; height:24px;}
  .soon-t{font-size:15px; font-weight:600; margin-bottom:5px;}
  .soon-tag{display:inline-block; font-size:10.5px; font-weight:600; color:var(--amber-dark); background:var(--amber-tint); padding:2px 9px; border-radius:var(--r-pill); margin-bottom:12px;}
  .soon-d{font-size:13px; color:var(--ink-2); line-height:1.6; max-width:440px; margin:0 auto 16px;}
  .soon-list{text-align:left; max-width:390px; margin:0 auto; font-size:12.5px; color:var(--ink-2); line-height:1.9;}
  .soon-list li{margin:0;}
  .soon-note{margin-top:16px; font-size:11.5px; color:var(--ink-3); font-style:italic;}

  .empty-state{text-align:center; padding:36px 16px; color:var(--ink-2); font-size:13px;}
  .banner{display:none; border-radius:var(--r-card); padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner.show{display:block; background:var(--red-tint); color:var(--red-darker); border:0.5px solid var(--red);}
  .spinner{display:inline-block; width:13px; height:13px; border:2px solid var(--line-strong); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin-right:7px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* invoice panel - the invoice itself, no QuickBooks login required */
  .ivbg{position:fixed; inset:0; z-index:150; background:rgba(26,29,26,0.42); display:none; align-items:flex-start; justify-content:center; padding:36px 16px; overflow-y:auto;}

  .ivcard{width:min(720px,100%); background:var(--card); border-radius:var(--r-card); box-shadow:0 12px 44px rgba(0,0,0,0.22); overflow:hidden;}

  .ivhead{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:15px 18px; background:var(--green-tint-2); border-bottom:0.5px solid var(--green-border);}
  .ivtitle{font-size:15px; font-weight:600; color:var(--green-darker);}
  .ivsub{font-size:12px; color:var(--ink-2); margin-top:3px;}
  .ivclose{background:transparent; border:none; font-size:19px; color:var(--ink-3); cursor:pointer; line-height:1; padding:2px 5px; font-family:var(--font);}
  .ivclose:hover{color:var(--ink);}

  .ivbody{padding:14px 18px 18px; max-height:66vh; overflow-y:auto;}

  .ivsum{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:13px;}
  .ivstat{flex:1; min-width:96px; border:0.5px solid var(--line); border-radius:var(--r-pill); padding:8px 10px;}
  .ivstat-n{font-size:15px; font-weight:600;}
  .ivstat-l{font-size:10px; color:var(--ink-2); margin-top:1px;}

  .ivtable{width:100%; border-collapse:collapse; table-layout:auto;}
  .ivtable th{font-size:10.5px; font-weight:600; color:var(--ink-2); text-align:left; padding:6px 6px; border-bottom:0.5px solid var(--line-strong); white-space:nowrap; position:static; background:var(--card);}
  .ivtable td{padding:8px 6px; border-bottom:0.5px solid var(--line); font-size:12.5px; vertical-align:top; white-space:normal;}
  .ivtable tr.charge td{background:var(--red-tint);}
  .ivtable tr.header-line td{background:var(--panel); color:var(--ink-2); font-style:italic;}

  .ivkind{display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:var(--r-pill); white-space:nowrap;}
  .k-box{background:var(--green-tint); color:var(--green-darker);}
  .k-charge{background:var(--red-tint); color:var(--red-dark);}
  .k-header{background:var(--panel); color:var(--ink-3);}
  .ivwhy{font-size:10.5px; color:var(--red-dark); margin-top:2px;}

  .ivpaid{margin-top:13px; font-size:12px; color:var(--ink-2); background:var(--green-tint-2); border:0.5px solid var(--green-border); border-radius:var(--r-pill); padding:9px 12px;}
  .ivnote{margin-top:11px; font-size:11.5px; color:var(--ink-3); line-height:1.6;}

  /* billing draft */
  .bfilter{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .bchip{font-size:11px; font-family:var(--font); padding:4px 10px; border-radius:var(--r-pill); cursor:pointer;
         border:0.5px solid var(--green-border); background:var(--card); color:var(--green-dark); white-space:nowrap;}
  .bchip.on{background:var(--green); border-color:var(--green); color:#fff;}
  .bchip:hover:not(.on){background:var(--green-tint);}

  /* A billing row is an AGENT ROW. Not a card - the Agents page already
     solved "a row that opens to hold more", and inventing a second answer
     to the same question is what made this page look like it came from a
     different product. So .agrow / .aghead / .agdetail are reused whole,
     and only the columns are new.
     The flags reuse .chip too, which is what Receivables already speaks:
     a red chip means money that is late. */
  .bc-inv{width:56px; flex:0 0 56px; font-weight:600; color:var(--green-dark); font-size:12px;}
  .bc-mon{width:66px; flex:0 0 66px; font-size:11.5px; color:var(--ink-2); white-space:nowrap;}
  .bc-amt{width:104px; flex:0 0 104px; text-align:right; font-size:13px; font-weight:600; white-space:nowrap;}
  .bc-amt .bx{font-size:11px; font-weight:400; color:var(--ink-3);}
  .bc-del{width:56px; flex:0 0 56px; text-align:center;}
  .bc-flag{width:110px; flex:0 0 110px; text-align:right;}

  /* The QuickBooks name earns its place only when it differs from the one
     Kim actually says out loud. On one line now, not two - the row is a
     row. */
  .bname{font-size:13.5px; font-weight:600; flex:1 1 auto; min-width:0;
         overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bname .dba{font-weight:400; font-size:11px; color:var(--ink-3); margin-left:7px;}

  /* Column labels. Sortable, like Receivables and Payments. */
  .bhead{display:flex; align-items:center; gap:10px; padding:7px 4px;

  /* The header reuses the row's column classes so the two line up exactly -
     but those classes carry the ROW's type sizes, which would render the
     labels at 13.5px. Pull them back to header type. */
  .bhead .bname, .bhead .bc-inv, .bhead .bc-amt, .bhead .bc-mon{
    font-size:10.5px; font-weight:600; color:var(--ink-2);}
  .bhead [data-bsort]{cursor:pointer;}
  .bhead [data-bsort]:hover{color:var(--ink);}

  /* Said once, in the panel, to the person who opened it - rather than
     shouted on every one of fifty rows. */
  .bwhy{font-size:11.5px; color:var(--ink-2); background:var(--panel);
        border:0.5px solid var(--line); border-radius:var(--r-ctl); padding:9px 12px;

  .bxlbl.out{color:var(--amber-dark); font-weight:600;}

  .bedit.saved{border-color:var(--green); background:var(--green-tint-2);}

     that opens, beside the note it almost always needs explaining. */
  .bfee{width:76px; font-family:var(--font); font-size:11.5px; text-align:right; color:var(--ink);
        background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-input);
        padding:4px 6px; outline:none; flex:0 0 auto;}
  .bfee:focus{border-color:var(--green); background:#fff;}
  .bfee.saved{border-color:var(--green); background:var(--green-tint-2);}
  .bfee.saving{border-color:var(--amber); background:var(--amber-tint);}

  /* What the fee IS. This text goes ON the customer's invoice, so it is
     tinted like the thing it is - outbound - rather than looking like the
     internal note sitting directly beneath it. */
  .bfdesc{flex:1; min-width:0; font-family:var(--font); font-size:11.5px; color:var(--ink);
          background:var(--card); border:0.5px solid var(--amber); border-radius:var(--r-input);
          padding:5px 7px; outline:none;}
  .bfdesc:focus{border-color:var(--amber-dark); background:#fff;}
  .bfdesc.saved{border-color:var(--green); background:var(--green-tint-2);}
  .bfdesc.saving{border-color:var(--amber); background:var(--amber-tint);}

  /* When a fee IS charged, the amount stops being one number and becomes a
     sum. Say so, under the total. */
  .bbase{font-size:10px; color:var(--green-dark); font-weight:600; text-align:right; margin-top:2px;}
  .binv{font-weight:600; color:var(--green-dark);}

  /* lock */
  .lock{position:fixed; inset:0; z-index:200; background:var(--page); display:flex; align-items:center; justify-content:center; padding:20px;}
  .lock.hide{display:none;}
  .lock-card{width:min(360px,100%); background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-card); padding:24px; text-align:center; box-shadow:0 3px 14px rgba(0,0,0,0.07);}
  .lock-brand{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); margin-bottom:4px;}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:var(--r-input); font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:12px; padding:11px; font-size:14px; font-weight:600; border-radius:var(--r-input); border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font);}
  .lock-err{margin-top:12px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:var(--r-input); color:var(--red-dark); font-size:12.5px; font-weight:600;}

  @media (max-width:560px){
    .search{width:104px;}
    th:nth-child(3), td:nth-child(3){display:none;}
    .score-n{font-size:15px;}
    .ftab{padding:6px 9px 7px; font-size:11px;}
  }
</style>

<script>
/* ============================================================
   WasteNet Accounting

   Three sections, three different jobs:
     Receivables  - who owes us (open invoices, by aging bucket)
     Payments     - what actually came in, by month
     Agents       - what the six agents are owed      [coming]

   Reads the `receivables` action, which returns ONLY the open
   invoices plus the counts the scorecard needs. The Invoices tab
   holds ~6,000 rows; shipping all of them to render ~140 was why
   this page used to load slowly.
   ============================================================ */

var API = "https://script.google.com/macros/s/AKfycbwvvAfVChkEJPlgz8c0iRbH23YIrtxM7SGjm5YgNz-kgs43N7hCGtd8nqBewJJOt8mV/exec";
var MONITOR_URL = "wastenet-monitor.html";

/* Access code. NOT hardcoded - this file's source is public on GitHub,
   so a baked-in key would protect nothing. Entered on the lock screen,
   held in sessionStorage, sent with every request for the Apps Script
   to check server-side. Same session entry as index and the monitor. */
var KEY = (function(){
  try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; }
  catch(e){ return ""; }
})();

function lockOut(msg){
  try { sessionStorage.removeItem("wastenet_dashboard_key"); } catch(e){}
  KEY = "";
  var lock = document.getElementById("lock");
  var err  = document.getElementById("lockErr");
  if(lock) lock.classList.remove("hide");
  if(err){
    if(msg){ err.textContent = msg; err.style.display = "block"; }
    else { err.style.display = "none"; }
  }
  var inp = document.getElementById("lockIn");
  if(inp){ inp.value = ""; inp.focus(); }
}

var state = {
  section: "receivables",
  invoices: [],      // open only
  paidCount: 0,
  totalCount: 0,
  loaded: false,
  age: "current",
  search: "",
  sortKey: "age",
  sortDir: "desc",

  // collections
  months: [],          // [{month,total,count}] newest first
  month: "",           // selected yyyy-mm
  payments: [],        // rows for the selected month
  ytd: 0,
  colLoaded: false,
  colLoading: false,
  colSearch: "",
  colSortKey: "date",
  colSortDir: "desc",
  year: "",           // which year is loaded
  years: [],          // [{year,total}] newest first
  payByYear: {},      // year -> payment rows, so month switching is free

  // agents
  agMonth: "",
  agYear: "",
  agMonths: [],
  agYears: [],
  agByYear: {},       // year -> { "yyyy-mm": {agents, unmapped} }
  agLoaded: false,
  agLoading: false,
  agOpen: {},         // which agent rows are expanded

  // deposits - reconciling the Frost statement against open invoices
  dRaw: "",           // the pasted / dropped CSV
  dRows: [],          // parsed deposits
  dMatched: [],       // each deposit + its candidate invoice combinations
  dPayers: [],        // the Payer Map, from the sheet
  dPayersLoaded: false,
  dPick: {},          // deposit key -> which candidate the human chose
  dFilter: "todo",

  // billing
  bMonth: "",
  bRows: [],
  bStart: 0,
  bName: "",
  bFilter: "all",
  bHistory: false,
  bSearch: "",        // the only one of the four pages that lacked one
  bSortKey: "name",
  bSortDir: "asc",
  bOpen: {},          // which billing rows are expanded - same idea as agOpen
  bMonths: [],        // months already logged
  bYear: "",
  bByYear: {},        // year -> { "yyyy-mm": rows }  - loaded once, switched free
  bYears: [],
  bDraftMonth: "",
  bDraft: null,
  bNotDue: [],
  bLoaded: false,
  bLoading: false
};

/* Whatever is loaded for the selected month. Month switching is a lookup,
   not a request - the whole year is already here.

   agMonth === "" means the YEAR view: every month in the loaded year,
   rolled up per agent. */
function agMonthData(){
  var y = state.agByYear[state.agYear] || {};

  if(state.agMonth) return y[state.agMonth] || { agents: [], unmapped: [] };

  /* --- roll the whole year up --- */
  var acc = {}, orphans = {};

  Object.keys(y).sort().forEach(function(m){
    (y[m].agents || []).forEach(function(a){
      if(!acc[a.agent]){
        acc[a.agent] = {
          agent: a.agent, name: a.name, share: a.share,
          rateSet: {},
          collected: 0, monitoring: 0, boxes: 0, fees: 0, payout: 0,
          review: 0, reviewList: [], invoices: [], months: []
        };
      }
      (a.rates || [a.share]).forEach(function(r){ acc[a.agent].rateSet[r] = true; });
      var t = acc[a.agent];
      t.collected  += a.collected;
      t.monitoring += a.monitoring;
      t.boxes      += a.boxes;
      t.fees       += a.fees;
      t.payout     += a.payout;
      t.review     += a.review;
      if(a.reviewList) t.reviewList = t.reviewList.concat(a.reviewList);
      // In the year view the useful breakdown is by month, not a list of
      // several hundred invoices.
      t.months.push({
        month: m,
        payout: a.payout,
        boxes: a.boxes,
        invoices: a.invoices.length
      });
    });

    (y[m].unmapped || []).forEach(function(u){
      if(!orphans[u.customer]) orphans[u.customer] = { amount: 0, months: [] };
      orphans[u.customer].amount += u.amount;
      orphans[u.customer].months.push(m);
    });
  });

  var agents = Object.keys(acc).map(function(k){
    var a = acc[k];
    a.rates = Object.keys(a.rateSet).map(Number).sort();
    a.collected  = Math.round(a.collected * 100) / 100;
    a.monitoring = Math.round(a.monitoring * 100) / 100;
    a.fees       = Math.round(a.fees * 100) / 100;
    a.payout     = Math.round(a.payout * 100) / 100;
    a.boxes      = Math.round(a.boxes * 100) / 100;
    a.months.reverse();   // newest first
    return a;
  }).sort(function(a,b){ return b.payout - a.payout; });

  var unmapped = Object.keys(orphans).map(function(c){
    return {
      customer: c,
      amount: Math.round(orphans[c].amount * 100) / 100,
      months: orphans[c].months.sort().reverse()
    };
  }).sort(function(a,b){ return b.amount - a.amount; });

  return { agents: agents, unmapped: unmapped, isYear: true };
}

/* ---------- JSONP ---------- */
function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var s;
  var timeout = setTimeout(function(){
    cleanup();
    cb({ ok:false, error:"Request timed out. Check your connection." });
  }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){
    cleanup();
    if(data && data.authRequired){
      lockOut("That access code was not accepted. Please try again.");
      return;
    }
    cb(data);
  };
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);
  }).join("&");
  s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* ---------- helpers ---------- */
function money(n){
  n = Number(n) || 0;
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function moneyShort(n){
  n = Number(n) || 0;
  return "$" + Math.round(n).toLocaleString("en-US");
}
/* Dates on this page read MM/DD/YYYY. The sheet stores yyyy-MM-dd because
   that sorts correctly as text; humans read the other one. */
function usDate(s){
  s = String(s || "");
  if(s.length < 10) return s;
  var y = s.slice(0,4), m = s.slice(5,7), d = s.slice(8,10);
  if(!/^\d{4}$/.test(y)) return s;
  return m + "/" + d + "/" + y;
}

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* Clicking an invoice number opens the invoice HERE, not in QuickBooks.
 *
 * The obvious thing was to link to qbo.intuit.com - but not everyone who
 * needs to read an invoice has a QuickBooks login, and that link sends them
 * to a sign-in page they can't get past. Worse than no link.
 *
 * So we render it ourselves from the stored lines. Which is better anyway:
 * we can show WHICH line was excluded from a payout, and why. That is the
 * question someone would actually be asking. */
function invLink(doc, qboId, cls){
  if(!doc) return "";
  var text = esc(doc);
  return '<a class="ilink' + (cls ? " " + cls : "") + '" href="#" ' +
         'data-invoice="' + text + '" ' +
         'title="View invoice ' + text + '">' + text + '</a>';
}

/* ---------- invoice panel ---------- */
var ivCache = {};

function openInvoice(doc){
  var bg = document.getElementById("ivbg");
  document.getElementById("ivtitle").textContent = "Invoice " + doc;
  document.getElementById("ivsub").textContent = "";
  document.getElementById("ivbody").innerHTML =
    '<div class="empty-state"><span class="spinner"></span>Loading invoice&hellip;</div>';
  bg.classList.add("show");

  if(ivCache[doc]){ paintInvoice(ivCache[doc]); return; }

  jsonp({ action:"invoice", key:KEY, doc:doc }, function(data){
    if(!data || !data.ok){
      document.getElementById("ivbody").innerHTML =
        '<div class="empty-state">' + esc((data && data.error) || "Could not load that invoice.") + '</div>';
      return;
    }
    ivCache[doc] = data;
    paintInvoice(data);
  });
}

function paintInvoice(d){
  var h = d.invoice || {};
  var lines = d.lines || [];

  document.getElementById("ivtitle").textContent =
    "Invoice " + (h.docNumber || "") + " \u00b7 " + (h.customer || "");
  document.getElementById("ivsub").textContent =
    (h.txnDate ? "Dated " + usDate(h.txnDate) : "") +
    (h.dueDate ? " \u00b7 due " + usDate(h.dueDate) : "") +
    (h.status ? " \u00b7 " + h.status : "");

  var stats = '<div class="ivsum">' +
    '<div class="ivstat"><div class="ivstat-n">$' + fmt(h.total) + '</div>' +
      '<div class="ivstat-l">invoice total</div></div>' +
    '<div class="ivstat"><div class="ivstat-n">' + fmtN(h.boxes) + '</div>' +
      '<div class="ivstat-l">boxes</div></div>' +
    '<div class="ivstat"><div class="ivstat-n" style="color:var(--green-dark)">$' + fmt(h.monitoring) + '</div>' +
      '<div class="ivstat-l">monitoring</div></div>' +
    (h.charges
      ? '<div class="ivstat"><div class="ivstat-n" style="color:var(--red-dark)">$' + fmt(h.charges) + '</div>' +
        '<div class="ivstat-l">one-time fees</div></div>'
      : '') +
  '</div>';

  var rows = lines.map(function(l){
    var cls = l.kind === 'CHARGE' ? ' class="charge"'
            : l.kind === 'HEADER' ? ' class="header-line"' : '';
    var kind = l.kind === 'CHARGE' ? '<span class="ivkind k-charge">one-time</span>'
             : l.kind === 'HEADER' ? '<span class="ivkind k-header">heading</span>'
             : '<span class="ivkind k-box">box</span>';
    return '<tr' + cls + '>' +
      '<td style="width:46%">' + esc(l.desc) +
        (l.why ? '<div class="ivwhy">excluded \u2014 ' + esc(l.why) + '</div>' : '') + '</td>' +
      '<td class="num" style="width:8%">' + (l.qty == null ? '\u2014' : fmtN(l.qty)) + '</td>' +
      '<td class="num" style="width:13%">' + (l.rate == null ? '\u2014' : '$' + fmt(l.rate)) + '</td>' +
      '<td class="num" style="width:14%">$' + fmt(l.amount) + '</td>' +
      '<td style="width:19%">' + kind + '</td>' +
    '</tr>';
  }).join("");

  var table = '<table class="ivtable"><thead><tr>' +
      '<th>Description</th><th class="num">Qty</th><th class="num">Rate</th>' +
      '<th class="num">Amount</th><th>Counted as</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>';

  var paid = "";
  if(d.payments && d.payments.length){
    var tot = d.payments.reduce(function(s,p){ return s + p.amount; }, 0);
    paid = '<div class="ivpaid"><b>Paid:</b> ' +
      d.payments.map(function(p){
        return '$' + fmt(p.amount) + ' on ' + esc(usDate(p.date));
      }).join(' \u00b7 ') +
      (d.payments.length > 1 ? ' &nbsp;\u2014 total $' + fmt(tot) : '') +
      '</div>';
  } else {
    paid = '<div class="ivpaid" style="background:var(--panel); border-color:var(--line); color:var(--ink-2);">' +
           'No payment recorded against this invoice yet.</div>';
  }

  var note = h.charges
    ? '<div class="ivnote">Rows shaded red are one-time fees \u2014 a new box, a ' +
      'replacement, a lost monitor. They are excluded from the box count and earn ' +
      'no commission. Everything else is a monitored box.</div>'
    : '';

  document.getElementById("ivbody").innerHTML = stats + table + paid + note;
}

(function(){
  var bg = document.getElementById("ivbg");

  // Any invoice number, anywhere on the page, opens the panel.
  document.addEventListener("click", function(e){
    var a = e.target.closest && e.target.closest("[data-invoice]");
    if(a){
      e.preventDefault();
      openInvoice(a.getAttribute("data-invoice"));
      return;
    }
    if(e.target === bg) bg.classList.remove("show");
  });

  document.getElementById("ivclose").onclick = function(){ bg.classList.remove("show"); };
  document.addEventListener("keydown", function(e){
    if(e.key === "Escape") bg.classList.remove("show");
  });
})();

/* Days past due. Zero or negative = not yet due. */
function daysOverdue(inv){
  if(!inv.dueDate) return 0;
  var due = new Date(inv.dueDate + "T00:00:00");
  if(isNaN(due.getTime())) return 0;
  var t = new Date();
  t = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  return Math.floor((t - due) / 86400000);
}

function bucketOf(inv){
  var d = daysOverdue(inv);
  if(d <= 0)  return "current";
  if(d <= 30) return "b30";
  if(d <= 60) return "b60";
  if(d <= 90) return "b90";
  return "b90p";
}

var BUCKETS = [
  { key:"current", label:"Current",         chip:"chip-cur"  },
  { key:"b30",     label:"1\u201330 days",  chip:"chip-30"   },
  { key:"b60",     label:"31\u201360 days", chip:"chip-60"   },
  { key:"b90",     label:"61\u201390 days", chip:"chip-90"   },
  { key:"b90p",    label:"90+ days",        chip:"chip-90p"  }
];

function chipFor(inv){
  var d = daysOverdue(inv);
  var meta = BUCKETS.filter(function(x){ return x.key === bucketOf(inv); })[0];
  return '<span class="chip ' + meta.chip + '">' + (d <= 0 ? "Current" : d + "d") + '</span>';
}

/* ---------- scorecard ---------- */
function cell(n, label, cls){
  return '<div class="score-cell">' +
           '<div class="score-n ' + (cls || "n-ink") + '">' + n + '</div>' +
           '<div class="score-l">' + label + '</div>' +
         '</div>';
}

var MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function monthLabel(m){
  if(!m || m.length < 7) return m || "";
  var mi = parseInt(m.slice(5,7), 10) - 1;
  return (MONTH_NAMES[mi] || "?") + " " + m.slice(0,4);
}

/* Tabs show the month alone - the year is right there in the dropdown,
   and dropping it lets all twelve sit on one row. */
function monthShort(m){
  if(!m || m.length < 7) return m || "";
  return MONTH_NAMES[parseInt(m.slice(5,7), 10) - 1] || "?";
}

function renderSummary(){
  var el = document.getElementById("summary");

  if(state.section === "billing"){
    if(!state.bLoaded){ el.innerHTML = ""; return; }
    var md = bMonthRows();
    var rws = md.rows;
    var tot = rws.reduce(function(s,r){ return s + (r.amount || 0); }, 0);

    if(md.history){
      var nums = rws.map(function(r){ return Number(r.invoiceNo) || 0; })
                    .filter(Boolean).sort(function(a,b){ return a-b; });
      el.innerHTML = '<div class="score">' +
        cell(rws.length, "invoices", "n-ink") +
        cell("$" + fmt(tot), "billed", "n-ink") +
        cell(nums.length ? nums[0] : "\u2014", "first #", "n-ink") +
        cell(nums.length ? nums[nums.length-1] : "\u2014", "last #", "n-ink") +
      '</div>';
      return;
    }

    var un = rws.filter(function(r){ return r.unpaid; });
    var bx = rws.filter(function(r){ return r.boxChange; });
    el.innerHTML = '<div class="score">' +
      cell(rws.length, "to invoice", "n-ink") +
      cell("$" + fmt(tot), "to bill", "n-ink") +
      cell(un.length, "unpaid last month", un.length ? "n-red" : "n-green") +
      cell(bx.length, "box count moved", "n-ink") +
    '</div>';
    return;
  }

  if(state.section === "agents"){
    if(!state.agLoaded){ el.innerHTML = ""; return; }
    var ags = agMonthData().agents;
    var tot = ags.reduce(function(s,a){ return s + a.payout; }, 0);
    var box = ags.reduce(function(s,a){ return s + a.boxes; }, 0);
    var col = ags.reduce(function(s,a){ return s + a.collected; }, 0);
    el.innerHTML = '<div class="score">' +
      cell("$" + fmt(tot), (state.agMonth ? monthLabel(state.agMonth) : state.agYear) + " payouts", "n-green") +
      cell(ags.length, "agents", "n-ink") +
      cell(fmtN(box), "boxes", "n-ink") +
      cell("$" + fmt(col), "collected", "n-ink") +
    '</div>';
    return;
  }

  if(state.section === "payments"){
    if(!state.colLoaded){ el.innerHTML = ""; return; }

    var cur  = state.months[0];
    var prev = state.months[1];
    var sel  = state.months.filter(function(m){ return m.month === state.month; })[0];

    el.innerHTML = '<div class="score">' +
      cell(moneyShort(sel ? sel.total : 0), monthLabel(state.month) + " collected", "n-ink") +
      cell(moneyShort(prev ? prev.total : 0), monthLabel(prev ? prev.month : ""), "n-ink") +
      cell(moneyShort(state.ytd), "year to date", "n-green") +
      cell(sel ? sel.count : 0, "payments", "n-ink") +
    '</div>';
    return;
  }

  var open = state.invoices;
  var outstanding = open.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);
  var pastDueAmt = open.filter(function(i){ return daysOverdue(i) > 0; })
                       .reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  el.innerHTML = '<div class="score">' +
    cell(moneyShort(outstanding), "outstanding", "n-ink") +
    cell(moneyShort(pastDueAmt),  "past due",    "n-red") +
    cell(open.length,             "open",        "n-ink") +
    cell(state.paidCount.toLocaleString("en-US"), "paid", "n-green") +
  '</div>';
}

/* ---------- receivables ---------- */
function renderReceivables(){
  var open = state.invoices;

  var counts = {};
  BUCKETS.forEach(function(b){ counts[b.key] = 0; });
  open.forEach(function(i){ counts[bucketOf(i)] += 1; });

  /* Five folder tabs. No counts on them - the green bar below reports
     the count and the dollar total for whichever tab is open. */
  var tabs = '<div class="folder-tabs">' + BUCKETS.map(function(b){
    return '<button class="ftab' + (state.age === b.key ? " sel" : "") + '" data-age="' + b.key + '">' +
             b.label + '</button>';
  }).join("") + '</div>';

  var rows = open.filter(function(i){ return bucketOf(i) === state.age; });

  if(state.search){
    var q = state.search.toLowerCase();
    rows = rows.filter(function(i){
      return String(i.customer).toLowerCase().indexOf(q) !== -1 ||
             String(i.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.sortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.sortKey){
      case "inv":     av = String(a.docNumber); bv = String(b.docNumber); break;
      case "cust":    av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "due":     av = String(a.dueDate); bv = String(b.dueDate); break;
      case "balance": av = Number(a.balance)||0; bv = Number(b.balance)||0; break;
      default:        av = daysOverdue(a); bv = daysOverdue(b);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.sortKey !== k) return "";
    return ' <span class="sc">' + (state.sortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-sort="inv"     style="width:13%">Invoice'  + caret("inv")  + '</th>' +
      '<th data-sort="cust"    style="width:36%">Customer' + caret("cust") + '</th>' +
      '<th data-sort="due"     style="width:17%">Due'      + caret("due")  + '</th>' +
      '<th data-sort="balance" style="width:18%" class="num">Balance' + caret("balance") + '</th>' +
      '<th data-sort="age"     style="width:16%" class="num">Age' + caret("age") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="5" style="text-align:center; padding:26px 8px; color:var(--ink-2);">Nothing in this bucket.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(i){
      return '<tr>' +
        '<td>' + invLink(i.docNumber, i.qboId) + '</td>' +
        '<td title="' + esc(i.customer) + '">' + esc(i.customer) + '</td>' +
        '<td class="muted">' + (i.dueDate ? esc(usDate(i.dueDate)) : "\u2014") + '</td>' +
        '<td class="num">' + money(i.balance) + '</td>' +
        '<td class="num">' + chipFor(i) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var cur = BUCKETS.filter(function(b){ return b.key === state.age; })[0];
  var owed = rows.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<div class="fbar-t">' + cur.label +
            ' <span class="amt">\u00b7 ' + rows.length + ' invoices \u00b7 ' + moneyShort(owed) + '</span></div>' +
          '<input class="search" id="search" type="text" placeholder="Search customer or #" value="' + esc(state.search) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower"><table>' + head + tbody + '</table></div>' +
    '</div>';
}
