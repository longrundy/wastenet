<!DOCTYPE html>
<!-- wastenet-accounting · build 2026-07-11-c · sections + sticky folder -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet Accounting</title>
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B; --amber-tint:#FAEEDA;
    --coral:#D85A30; --coral-dark:#712B13; --coral-tint:#FAECE7;
    --red:#E24B4A; --red-dark:#A32D2D; --red-darker:#791F1F; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --pinh:0px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font); background:var(--page); color:var(--ink);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px; margin:0 auto; padding:16px 16px 60px;}

  /* ---- top card: brand + sections + compact scorecard ---- */
  .topcard{border:0.5px solid var(--line); border-radius:12px; background:var(--card); padding:10px 14px 12px; margin-bottom:14px;}

  .header-bar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;}
  .brand{display:flex; align-items:center; gap:9px; min-width:0;}
  .brand-name{font-size:15px; font-weight:800; letter-spacing:0.04em; color:var(--green); flex:0 0 auto;}
  .brand-div{width:1px; height:14px; background:var(--line-strong); flex:0 0 auto;}
  .header-right{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .stamp{font-size:10.5px; color:var(--ink-3); white-space:nowrap;}
  .btn{font-size:12px; color:var(--ink); background:var(--card); border:0.5px solid var(--line-strong); padding:4px 9px; border-radius:14px; cursor:pointer; font-family:var(--font); transition:background .12s;}
  .btn:hover{background:var(--panel);}

  .viewnav{position:relative; flex:0 0 auto;}
  .view-label{font-size:12.5px; color:var(--ink-2); background:transparent; border:none; padding:2px 4px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-family:var(--font);}
  .view-label:hover{color:var(--ink);}
  .view-caret{font-size:9px; color:var(--ink-3);}
  .view-drop{position:absolute; top:100%; left:0; margin-top:6px; background:var(--card); border:0.5px solid var(--line-strong); border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,0.10); min-width:190px; z-index:80; display:none; overflow:hidden;}
  .view-drop.open{display:block;}
  .view-opt{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13px; color:var(--ink); background:transparent; border:none; cursor:pointer; font-family:var(--font);}
  .view-opt:hover{background:var(--panel);}
  .view-opt.cur{color:var(--green-dark); font-weight:600; background:var(--green-tint-2);}

  /* section switcher */
  .sections{display:flex; gap:6px; margin-bottom:11px; flex-wrap:wrap;}
  .sec{
    font-size:12px; font-weight:500; font-family:var(--font);
    padding:5px 13px; border-radius:15px; cursor:pointer; white-space:nowrap;
    border:0.5px solid var(--line-strong); background:var(--card); color:var(--ink-2);
    transition:background .12s, color .12s, border-color .12s;
  }
  .sec:hover:not(.on){background:var(--panel);}
  .sec.on{background:var(--green); border-color:var(--green); color:#fff;}

  /* compact scorecard - one strip, four figures */
  .score{display:flex; border:0.5px solid var(--line); border-radius:10px; overflow:hidden;}
  .score-cell{flex:1; min-width:0; padding:8px 6px; text-align:center; border-right:0.5px solid var(--line);}
  .score-cell:last-child{border-right:none;}
  .score-n{font-size:17px; font-weight:600; letter-spacing:-0.01em; line-height:1.2;}
  .score-l{font-size:10px; color:var(--ink-2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .n-ink{color:var(--ink);}
  .n-red{color:var(--red-dark);}
  .n-green{color:var(--green-dark);}

  /* ---- folder: five tabs, one body. Tabs + bar pin on scroll. ---- */
  .folder{margin-bottom:20px;}

  .pinhead{position:sticky; top:0; z-index:30; background:var(--page); padding-top:6px;}

  .folder-tabs{display:flex; gap:4px; flex-wrap:wrap; padding-left:2px;}
  /* Months don't wrap - a year of them would stack three deep. Scroll
     sideways instead, newest first. */
  .folder-tabs.scroll{flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding-bottom:0;}
  .folder-tabs.scroll::-webkit-scrollbar{display:none;}
  .folder-tabs.scroll .ftab{flex:0 0 auto;}

  /* There are years of months, so the tab strip scrolls sideways. The
     fade is on the WRAPPER, not the scroller - on the scroller it would
     slide away with the content and stop meaning anything. It hides
     itself once you reach the end. */
  /* year picker - first thing in the green bar */
  .yrsel{
    font-size:12px; font-family:var(--font); font-weight:600;
    color:var(--green-dark); background:var(--card);
    border:0.5px solid var(--green-border); border-radius:15px;
    padding:6px 28px 6px 13px; cursor:pointer; outline:none; flex:0 0 auto;
    max-width:190px;
    /* the native arrow sits flush against the text in a pill this small,
       so draw our own and give it room */
    appearance:none; -webkit-appearance:none; -moz-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='9' height='6' viewBox='0 0 9 6'%3E%3Cpath d='M1 1l3.5 3.5L8 1' stroke='%233B6D11' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 10px center;
  }
  .yrsel:focus{border-color:var(--green);}

  .tabscroll{position:relative;}  .tabscroll{position:relative;}
  .tabscroll::after{
    content:""; position:absolute; top:0; right:0; bottom:0; width:44px;
    pointer-events:none; opacity:1; transition:opacity .15s;
    background:linear-gradient(to right, rgba(250,251,248,0), var(--page) 72%);
  }
  .tabscroll.at-end::after{opacity:0;}
  .ftab{
    display:inline-flex; align-items:center;
    background:var(--green-tint); border:0.5px solid var(--green-border);
    border-bottom:none; border-radius:9px 9px 0 0;
    padding:7px 13px 8px; font-size:12px; font-weight:600;
    color:var(--green-dark); cursor:pointer; font-family:var(--font);
    white-space:nowrap; position:relative; z-index:1; margin-bottom:-1px;
    transition:background .12s, color .12s;
  }
  .ftab:hover:not(.sel){background:var(--green-border);}
  .ftab.sel{background:var(--card); color:var(--green-darker); z-index:3; padding-bottom:9px;}

  /* the green bar - last thing that stays put when you scroll */
  .fbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 14px; background:var(--green-tint-2);
    border-left:0.5px solid var(--green-border);
    border-right:0.5px solid var(--green-border);
    border-top:0.5px solid var(--green-border);
    border-bottom:0.5px solid var(--line);
    position:relative; z-index:2;
  }
  .fbar-t{font-size:12.5px; font-weight:600; color:var(--green-darker); min-width:0; flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fbar-t .amt{font-weight:400; color:var(--green-dark); font-size:11.5px;}

  .search{font-size:11.5px; padding:5px 10px; border:0.5px solid var(--green-border); border-radius:14px; width:165px; outline:none; font-family:var(--font); color:var(--ink); background:var(--card); flex:0 0 auto;}
  .search:focus{border-color:var(--green);}

  .folder-lower{
    border-left:0.5px solid var(--green-border);
    border-right:0.5px solid var(--green-border);
    border-bottom:0.5px solid var(--green-border);
    border-radius:0 0 12px 12px;
    background:var(--card); padding:0 16px 6px;
  }

  table{width:100%; border-collapse:collapse; table-layout:fixed;}
  thead th{
    position:sticky; top:var(--pinh); z-index:5; background:var(--card);
    font-size:10.5px; font-weight:600; color:var(--ink-2); text-align:left;
    padding:7px 4px; border-bottom:0.5px solid var(--line-strong);
    cursor:pointer; user-select:none; white-space:nowrap;
  }
  thead th:hover{color:var(--ink);}
  th .sc{color:var(--ink-3); font-size:9px;}
  td{padding:8px 4px; border-bottom:0.5px solid var(--line); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel);}
  .num{text-align:right;}
  .muted{color:var(--ink-2);}

  /* invoice numbers link straight into QuickBooks */
  .ilink{color:var(--green-dark); text-decoration:none; border-bottom:1px dotted var(--green-border);}
  .ilink:hover{color:var(--green-darker); border-bottom-color:var(--green); background:var(--green-tint-2);}
  .agflag .ilink{color:var(--amber-dark); border-bottom-color:var(--amber);}
  .agflag .ilink:hover{background:rgba(255,255,255,0.5);}

  .chip{display:inline-block; padding:2px 8px; border-radius:11px; font-size:10.5px; font-weight:600; white-space:nowrap;}
  .chip-cur{background:var(--green-tint); color:var(--green-darker);}
  .chip-30{background:var(--amber-tint); color:var(--amber-dark);}
  .chip-60{background:var(--coral-tint); color:var(--coral-dark);}
  .chip-90{background:var(--red-tint); color:var(--red-dark);}
  .chip-90p{background:var(--red-tint); color:var(--red-darker);}

  /* agent payout rows */
  .agrow{border-bottom:0.5px solid var(--line);}
  .agrow:last-child{border-bottom:none;}

  /* An OPEN agent becomes a bounded card. Without this the detail table
     runs straight into the next agent's row, and the eye reads the next
     agent's payout as if it belonged to the expanded one - on a page
     about money, that is a misreading worth designing out. */
  .agrow.open{
    border:0.5px solid var(--green-border);
    border-radius:10px;
    background:var(--green-tint-2);
    margin:8px 0 12px;
    box-shadow:0 1px 6px rgba(0,0,0,0.04);
  }
  .agrow.open + .agrow{border-top:none;}

  .aghead{display:flex; align-items:center; gap:10px; padding:11px 4px; cursor:pointer;}
  .aghead:hover{background:var(--panel);}
  .agrow.open .aghead{
    padding:11px 12px;
    background:transparent;
    border-bottom:0.5px solid var(--green-border);
    border-radius:10px 10px 0 0;
  }
  .agrow.open .aghead:hover{background:rgba(255,255,255,0.4);}

  .agcaret{font-size:9px; color:var(--ink-3); width:10px; flex:0 0 auto; transition:transform .12s;}
  .agrow.open .agcaret{transform:rotate(90deg); color:var(--green-dark);}
  .agname{font-size:13.5px; font-weight:600; flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .agrow.open .agname{color:var(--green-darker);}
  .agshare{font-size:10.5px; color:var(--ink-3); background:var(--panel); border-radius:10px; padding:2px 7px; flex:0 0 auto;}
  .agrow.open .agshare{background:var(--card);}
  .agmeta{font-size:11px; color:var(--ink-2); flex:0 0 auto; text-align:right; white-space:nowrap;}
  .agpay{font-size:15px; font-weight:600; color:var(--green-dark); flex:0 0 auto; text-align:right; min-width:88px;}

  .agdetail{display:none;}
  .agrow.open .agdetail{
    display:block;
    padding:11px 12px 4px;
    background:var(--card);
    border-radius:0 0 10px 10px;
  }
  /* the detail table sits on white, so it needs its own quiet frame */
  .agrow.open .agdetail table{margin-top:2px;}
  .agrow.open .agdetail thead th{background:var(--card); position:static;}
  .agmath{font-size:11.5px; color:var(--ink-2); background:var(--panel); border:0.5px solid var(--line); border-radius:8px; padding:9px 12px; margin-bottom:10px; line-height:1.7;}
  .agmath b{color:var(--ink); font-weight:600;}

  .agflag{background:var(--amber-tint); border:0.5px solid var(--amber); color:var(--amber-dark); border-radius:8px; padding:8px 11px; font-size:11.5px; margin-bottom:9px;}

  .soon{border:0.5px solid var(--line); border-radius:14px; background:var(--card); padding:30px 26px; text-align:center;}
  .soon-disc{width:52px; height:52px; border-radius:50%; margin:0 auto 14px; background:var(--green-tint); border:1px solid var(--green-border); display:flex; align-items:center; justify-content:center; color:var(--green-dark);}
  .soon-disc svg{width:24px; height:24px;}
  .soon-t{font-size:15px; font-weight:600; margin-bottom:5px;}
  .soon-tag{display:inline-block; font-size:10.5px; font-weight:600; color:var(--amber-dark); background:var(--amber-tint); padding:2px 9px; border-radius:11px; margin-bottom:12px;}
  .soon-d{font-size:13px; color:var(--ink-2); line-height:1.6; max-width:440px; margin:0 auto 16px;}
  .soon-list{text-align:left; max-width:390px; margin:0 auto; font-size:12.5px; color:var(--ink-2); line-height:1.9;}
  .soon-list li{margin:0;}
  .soon-note{margin-top:16px; font-size:11.5px; color:var(--ink-3); font-style:italic;}

  .empty-state{text-align:center; padding:36px 16px; color:var(--ink-2); font-size:13px;}
  .banner{display:none; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner.show{display:block; background:var(--red-tint); color:var(--red-darker); border:0.5px solid var(--red);}
  .spinner{display:inline-block; width:13px; height:13px; border:2px solid var(--line-strong); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin-right:7px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* invoice panel - the invoice itself, no QuickBooks login required */
  .ivbg{position:fixed; inset:0; z-index:150; background:rgba(26,29,26,0.42); display:none; align-items:flex-start; justify-content:center; padding:36px 16px; overflow-y:auto;}
  .ivbg.show{display:flex;}
  .ivcard{width:min(720px,100%); background:var(--card); border-radius:14px; box-shadow:0 12px 44px rgba(0,0,0,0.22); overflow:hidden;}

  .ivhead{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:15px 18px; background:var(--green-tint-2); border-bottom:0.5px solid var(--green-border);}
  .ivtitle{font-size:15px; font-weight:600; color:var(--green-darker);}
  .ivsub{font-size:12px; color:var(--ink-2); margin-top:3px;}
  .ivclose{background:transparent; border:none; font-size:19px; color:var(--ink-3); cursor:pointer; line-height:1; padding:2px 5px; font-family:var(--font);}
  .ivclose:hover{color:var(--ink);}

  .ivbody{padding:14px 18px 18px; max-height:66vh; overflow-y:auto;}

  .ivsum{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:13px;}
  .ivstat{flex:1; min-width:96px; border:0.5px solid var(--line); border-radius:9px; padding:8px 10px;}
  .ivstat-n{font-size:15px; font-weight:600;}
  .ivstat-l{font-size:10px; color:var(--ink-2); margin-top:1px;}

  .ivtable{width:100%; border-collapse:collapse; table-layout:auto;}
  .ivtable th{font-size:10.5px; font-weight:600; color:var(--ink-2); text-align:left; padding:6px 6px; border-bottom:0.5px solid var(--line-strong); white-space:nowrap; position:static; background:var(--card);}
  .ivtable td{padding:8px 6px; border-bottom:0.5px solid var(--line); font-size:12.5px; vertical-align:top; white-space:normal;}
  .ivtable tr.charge td{background:var(--red-tint);}
  .ivtable tr.header-line td{background:var(--panel); color:var(--ink-2); font-style:italic;}

  .ivkind{display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:10px; white-space:nowrap;}
  .k-box{background:var(--green-tint); color:var(--green-darker);}
  .k-charge{background:var(--red-tint); color:var(--red-dark);}
  .k-header{background:var(--panel); color:var(--ink-3);}
  .ivwhy{font-size:10.5px; color:var(--red-dark); margin-top:2px;}

  .ivpaid{margin-top:13px; font-size:12px; color:var(--ink-2); background:var(--green-tint-2); border:0.5px solid var(--green-border); border-radius:9px; padding:9px 12px;}
  .ivnote{margin-top:11px; font-size:11.5px; color:var(--ink-3); line-height:1.6;}

  /* billing draft */
  .bfilter{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .bchip{font-size:11px; font-family:var(--font); padding:4px 10px; border-radius:13px; cursor:pointer;
         border:0.5px solid var(--green-border); background:var(--card); color:var(--green-dark); white-space:nowrap;}
  .bchip.on{background:var(--green); border-color:var(--green); color:#fff;}
  .bchip:hover:not(.on){background:var(--green-tint);}

  .btable{width:100%; border-collapse:collapse; table-layout:fixed;}
  .btable th{font-size:10.5px; font-weight:600; color:var(--ink-2); text-align:left; padding:7px 5px;
             border-bottom:0.5px solid var(--line-strong); position:sticky; top:var(--pinh);
             background:var(--card); z-index:5; white-space:nowrap;}
  .btable td{padding:9px 5px; border-bottom:0.5px solid var(--line); font-size:12.5px; vertical-align:top;}
  .btable tr:hover td{background:var(--panel);}
  .btable tr.flagged td{background:var(--amber-tint);}
  .btable tr.unpaid td{background:var(--red-tint);}

  .bname{font-weight:600; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  /* the QuickBooks name, the box count, the date - all secondary lines that
     must sit UNDER their heading, never run into it */
  .bsub{font-size:10.5px; color:var(--ink-3); display:block; margin-top:2px; line-height:1.35;
        overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bwarn{font-size:10.5px; margin-top:4px; font-weight:600; line-height:1.4; white-space:normal;}
  .bwarn.pay{color:var(--red-dark);}
  .bwarn.box{color:var(--amber-dark);}
  /* Delivery is its own thing now - not a scrap buried in a note. */
  .bdeliv{font-size:10.5px; font-weight:600; border-radius:9px; padding:3px 9px; white-space:nowrap;
          display:inline-block; text-decoration:none;}
  .d-email{background:var(--green-tint); color:var(--green-darker);}
  .d-portal{background:var(--amber-tint); color:var(--amber-dark);
            border:0.5px solid var(--amber); cursor:pointer;}
  .d-portal:hover{background:var(--amber); color:#fff;}
  .d-mail{background:var(--panel); color:var(--ink-2);}
  /* Notes get read - a URL or an instruction is useless truncated. They wrap. */
  .bnote{font-size:11.5px; color:var(--ink-2); line-height:1.5; white-space:normal; word-break:break-word;}

  /* Quarterly customers who aren't due. Said out loud, because a name simply
     missing from the list looks like a mistake. */
  .bskip{margin:0 0 10px; padding:9px 12px; font-size:11.5px; line-height:1.6;
         background:var(--panel); border:0.5px solid var(--line-strong);
         border-radius:9px; color:var(--ink-2);}
  .bskip b{color:var(--ink);}

  /* Editable, but only for the month being billed. A past month is a record
     and stays read-only. */
  .bedit{width:100%; font-family:var(--font); font-size:11.5px; color:var(--ink);
         background:var(--card); border:0.5px solid var(--line-strong); border-radius:6px;
         padding:5px 7px; outline:none; resize:vertical; min-height:30px; line-height:1.45;}
  .bedit:focus{border-color:var(--green); background:#fff;}
  .bedit.saving{border-color:var(--amber); background:var(--amber-tint);}
  .bedit.saved{border-color:var(--green); background:var(--green-tint-2);}

  /* The one-time fee gets its own line. Squeezed in beside the amount, its
     label had nowhere to go and was clipped to a single letter. */
  .bfeewrap{margin-top:6px; display:flex; align-items:center; gap:3px; justify-content:flex-end;}
  .bfeelbl{font-size:11px; color:var(--ink-3); flex:0 0 auto;}
  .bfee{width:72px; font-family:var(--font); font-size:11.5px; text-align:right; color:var(--ink);
        background:var(--card); border:0.5px solid var(--line-strong); border-radius:6px;
        padding:4px 6px; outline:none; flex:0 0 auto;}
  .bfee:focus{border-color:var(--green); background:#fff;}
  .bfee.saved{border-color:var(--green); background:var(--green-tint-2);}
  .bfee.saving{border-color:var(--amber); background:var(--amber-tint);}
  .bfeehint{font-size:9.5px; color:var(--ink-3); text-align:right; margin-top:2px;}
  .bbase{font-size:10px; color:var(--green-dark); font-weight:600; text-align:right; margin-top:3px;}
  .binv{font-weight:600; color:var(--green-dark);}

  /* lock */
  .lock{position:fixed; inset:0; z-index:200; background:var(--page); display:flex; align-items:center; justify-content:center; padding:20px;}
  .lock.hide{display:none;}
  .lock-card{width:min(360px,100%); background:var(--card); border:0.5px solid var(--line-strong); border-radius:12px; padding:24px; text-align:center; box-shadow:0 3px 14px rgba(0,0,0,0.07);}
  .lock-brand{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); margin-bottom:4px;}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:6px; font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:12px; padding:11px; font-size:14px; font-weight:600; border-radius:6px; border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font);}
  .lock-err{margin-top:12px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:6px; color:var(--red-dark); font-size:12.5px; font-weight:600;}

  @media (max-width:560px){
    .search{width:104px;}
    th:nth-child(3), td:nth-child(3){display:none;}
    .score-n{font-size:15px;}
    .ftab{padding:6px 9px 7px; font-size:11px;}
  }
</style>
</head>
<body>

<div class="ivbg" id="ivbg">
  <div class="ivcard" id="ivcard">
    <div class="ivhead">
      <div>
        <div class="ivtitle" id="ivtitle">Invoice</div>

  <div class="lock-card">

    <input class="lock-in" id="lockIn" type="password" placeholder="Access code" autofocus>

</div>

<div class="wrap">

  <div class="topcard">
    <div class="header-bar">

        <div class="brand-name">WASTENET</div>
        <div class="brand-div"></div>
        <div class="viewnav">
          <button class="view-label" id="viewBtn">Accounting <span class="view-caret">&#9662;</span></button>

  <div id="body">
    <div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>
  </div>

</div>

<script>
/* ============================================================
   WasteNet Accounting

   Three sections, three different jobs:
     Receivables  - who owes us (open invoices, by aging bucket)
     Payments     - what actually came in, by month
     Agents       - what the six agents are owed      [coming]

   Reads the `receivables` action, which returns ONLY the open
   invoices plus the counts the scorecard needs. The Invoices tab
   holds ~6,000 rows; shipping all of them to render ~140 was why
   this page used to load slowly.
   ============================================================ */

var API = "https://script.google.com/macros/s/AKfycbwvvAfVChkEJPlgz8c0iRbH23YIrtxM7SGjm5YgNz-kgs43N7hCGtd8nqBewJJOt8mV/exec";
var MONITOR_URL = "wastenet-monitor.html";

/* Access code. NOT hardcoded - this file's source is public on GitHub,
   so a baked-in key would protect nothing. Entered on the lock screen,
   held in sessionStorage, sent with every request for the Apps Script
   to check server-side. Same session entry as index and the monitor. */
var KEY = (function(){
  try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; }
  catch(e){ return ""; }
})();

function lockOut(msg){
  try { sessionStorage.removeItem("wastenet_dashboard_key"); } catch(e){}
  KEY = "";
  var lock = document.getElementById("lock");
  var err  = document.getElementById("lockErr");
  if(lock) lock.classList.remove("hide");
  if(err){
    if(msg){ err.textContent = msg; err.style.display = "block"; }
    else { err.style.display = "none"; }
  }
  var inp = document.getElementById("lockIn");
  if(inp){ inp.value = ""; inp.focus(); }
}

var state = {
  section: "receivables",
  invoices: [],      // open only
  paidCount: 0,
  totalCount: 0,
  loaded: false,
  age: "current",
  search: "",
  sortKey: "age",
  sortDir: "desc",

  // collections
  months: [],          // [{month,total,count}] newest first
  month: "",           // selected yyyy-mm
  payments: [],        // rows for the selected month
  ytd: 0,
  colLoaded: false,
  colLoading: false,
  colSearch: "",
  colSortKey: "date",
  colSortDir: "desc",
  year: "",           // which year is loaded
  years: [],          // [{year,total}] newest first
  payByYear: {},      // year -> payment rows, so month switching is free

  // agents
  agMonth: "",
  agYear: "",
  agMonths: [],
  agYears: [],
  agByYear: {},       // year -> { "yyyy-mm": {agents, unmapped} }
  agLoaded: false,
  agLoading: false,
  agOpen: {},         // which agent rows are expanded

  // billing
  bMonth: "",
  bRows: [],
  bStart: 0,
  bName: "",
  bFilter: "all",
  bHistory: false,
  bMonths: [],        // months already logged
  bYear: "",
  bByYear: {},        // year -> { "yyyy-mm": rows }  - loaded once, switched free
  bYears: [],
  bDraftMonth: "",
  bDraft: null,
  bNotDue: [],
  bLoaded: false,
  bLoading: false
};

/* Whatever is loaded for the selected month. Month switching is a lookup,
   not a request - the whole year is already here.

   agMonth === "" means the YEAR view: every month in the loaded year,
   rolled up per agent. */
function agMonthData(){
  var y = state.agByYear[state.agYear] || {};

  if(state.agMonth) return y[state.agMonth] || { agents: [], unmapped: [] };

  /* --- roll the whole year up --- */
  var acc = {}, orphans = {};

  Object.keys(y).sort().forEach(function(m){
    (y[m].agents || []).forEach(function(a){
      if(!acc[a.agent]){
        acc[a.agent] = {
          agent: a.agent, name: a.name, share: a.share,
          rateSet: {},
          collected: 0, monitoring: 0, boxes: 0, fees: 0, payout: 0,
          review: 0, reviewList: [], invoices: [], months: []
        };
      }
      (a.rates || [a.share]).forEach(function(r){ acc[a.agent].rateSet[r] = true; });
      var t = acc[a.agent];
      t.collected  += a.collected;
      t.monitoring += a.monitoring;
      t.boxes      += a.boxes;
      t.fees       += a.fees;
      t.payout     += a.payout;
      t.review     += a.review;
      if(a.reviewList) t.reviewList = t.reviewList.concat(a.reviewList);
      // In the year view the useful breakdown is by month, not a list of
      // several hundred invoices.
      t.months.push({
        month: m,
        payout: a.payout,
        boxes: a.boxes,
        invoices: a.invoices.length
      });
    });

    (y[m].unmapped || []).forEach(function(u){
      if(!orphans[u.customer]) orphans[u.customer] = { amount: 0, months: [] };
      orphans[u.customer].amount += u.amount;
      orphans[u.customer].months.push(m);
    });
  });

  var agents = Object.keys(acc).map(function(k){
    var a = acc[k];
    a.rates = Object.keys(a.rateSet).map(Number).sort();
    a.collected  = Math.round(a.collected * 100) / 100;
    a.monitoring = Math.round(a.monitoring * 100) / 100;
    a.fees       = Math.round(a.fees * 100) / 100;
    a.payout     = Math.round(a.payout * 100) / 100;
    a.boxes      = Math.round(a.boxes * 100) / 100;
    a.months.reverse();   // newest first
    return a;
  }).sort(function(a,b){ return b.payout - a.payout; });

  var unmapped = Object.keys(orphans).map(function(c){
    return {
      customer: c,
      amount: Math.round(orphans[c].amount * 100) / 100,
      months: orphans[c].months.sort().reverse()
    };
  }).sort(function(a,b){ return b.amount - a.amount; });

  return { agents: agents, unmapped: unmapped, isYear: true };
}

/* ---------- JSONP ---------- */
function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var s;
  var timeout = setTimeout(function(){
    cleanup();
    cb({ ok:false, error:"Request timed out. Check your connection." });
  }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){
    cleanup();
    if(data && data.authRequired){
      lockOut("That access code was not accepted. Please try again.");
      return;
    }
    cb(data);
  };
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);
  }).join("&");
  s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* ---------- helpers ---------- */
function money(n){
  n = Number(n) || 0;
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function moneyShort(n){
  n = Number(n) || 0;
  return "$" + Math.round(n).toLocaleString("en-US");
}
/* Dates on this page read MM/DD/YYYY. The sheet stores yyyy-MM-dd because
   that sorts correctly as text; humans read the other one. */
function usDate(s){
  s = String(s || "");
  if(s.length < 10) return s;
  var y = s.slice(0,4), m = s.slice(5,7), d = s.slice(8,10);
  if(!/^\d{4}$/.test(y)) return s;
  return m + "/" + d + "/" + y;
}

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* Clicking an invoice number opens the invoice HERE, not in QuickBooks.
 *
 * The obvious thing was to link to qbo.intuit.com - but not everyone who
 * needs to read an invoice has a QuickBooks login, and that link sends them
 * to a sign-in page they can't get past. Worse than no link.
 *
 * So we render it ourselves from the stored lines. Which is better anyway:
 * we can show WHICH line was excluded from a payout, and why. That is the
 * question someone would actually be asking. */
function invLink(doc, qboId, cls){
  if(!doc) return "";
  var text = esc(doc);
  return '<a class="ilink' + (cls ? " " + cls : "") + '" href="#" ' +
         'data-invoice="' + text + '" ' +
         'title="View invoice ' + text + '">' + text + '</a>';
}

/* ---------- invoice panel ---------- */
var ivCache = {};

function openInvoice(doc){
  var bg = document.getElementById("ivbg");
  document.getElementById("ivtitle").textContent = "Invoice " + doc;
  document.getElementById("ivsub").textContent = "";
  document.getElementById("ivbody").innerHTML =
    '<div class="empty-state"><span class="spinner"></span>Loading invoice&hellip;</div>';
  bg.classList.add("show");

  if(ivCache[doc]){ paintInvoice(ivCache[doc]); return; }

  jsonp({ action:"invoice", key:KEY, doc:doc }, function(data){
    if(!data || !data.ok){
      document.getElementById("ivbody").innerHTML =
        '<div class="empty-state">' + esc((data && data.error) || "Could not load that invoice.") + '</div>';
      return;
    }
    ivCache[doc] = data;
    paintInvoice(data);
  });
}

function paintInvoice(d){
  var h = d.invoice || {};
  var lines = d.lines || [];

  document.getElementById("ivtitle").textContent =
    "Invoice " + (h.docNumber || "") + " \u00b7 " + (h.customer || "");
  document.getElementById("ivsub").textContent =
    (h.txnDate ? "Dated " + usDate(h.txnDate) : "") +
    (h.dueDate ? " \u00b7 due " + usDate(h.dueDate) : "") +
    (h.status ? " \u00b7 " + h.status : "");

  var stats = '<div class="ivsum">' +
    '<div class="ivstat"><div class="ivstat-n">$' + fmt(h.total) + '</div>' +
      '<div class="ivstat-l">invoice total</div></div>' +
    '<div class="ivstat"><div class="ivstat-n">' + fmtN(h.boxes) + '</div>' +
      '<div class="ivstat-l">boxes</div></div>' +
    '<div class="ivstat"><div class="ivstat-n" style="color:var(--green-dark)">$' + fmt(h.monitoring) + '</div>' +
      '<div class="ivstat-l">monitoring</div></div>' +
    (h.charges
      ? '<div class="ivstat"><div class="ivstat-n" style="color:var(--red-dark)">$' + fmt(h.charges) + '</div>' +
        '<div class="ivstat-l">one-time fees</div></div>'
      : '') +
  '</div>';

  var rows = lines.map(function(l){
    var cls = l.kind === 'CHARGE' ? ' class="charge"'
            : l.kind === 'HEADER' ? ' class="header-line"' : '';
    var kind = l.kind === 'CHARGE' ? '<span class="ivkind k-charge">one-time</span>'
             : l.kind === 'HEADER' ? '<span class="ivkind k-header">heading</span>'
             : '<span class="ivkind k-box">box</span>';
    return '<tr' + cls + '>' +
      '<td style="width:46%">' + esc(l.desc) +
        (l.why ? '<div class="ivwhy">excluded \u2014 ' + esc(l.why) + '</div>' : '') + '</td>' +
      '<td class="num" style="width:8%">' + (l.qty == null ? '\u2014' : fmtN(l.qty)) + '</td>' +
      '<td class="num" style="width:13%">' + (l.rate == null ? '\u2014' : '$' + fmt(l.rate)) + '</td>' +
      '<td class="num" style="width:14%">$' + fmt(l.amount) + '</td>' +
      '<td style="width:19%">' + kind + '</td>' +
    '</tr>';
  }).join("");

  var table = '<table class="ivtable"><thead><tr>' +
      '<th>Description</th><th class="num">Qty</th><th class="num">Rate</th>' +
      '<th class="num">Amount</th><th>Counted as</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>';

  var paid = "";
  if(d.payments && d.payments.length){
    var tot = d.payments.reduce(function(s,p){ return s + p.amount; }, 0);
    paid = '<div class="ivpaid"><b>Paid:</b> ' +
      d.payments.map(function(p){
        return '$' + fmt(p.amount) + ' on ' + esc(usDate(p.date));
      }).join(' \u00b7 ') +
      (d.payments.length > 1 ? ' &nbsp;\u2014 total $' + fmt(tot) : '') +
      '</div>';
  } else {
    paid = '<div class="ivpaid" style="background:var(--panel); border-color:var(--line); color:var(--ink-2);">' +
           'No payment recorded against this invoice yet.</div>';
  }

  var note = h.charges
    ? '<div class="ivnote">Rows shaded red are one-time fees \u2014 a new box, a ' +
      'replacement, a lost monitor. They are excluded from the box count and earn ' +
      'no commission. Everything else is a monitored box.</div>'
    : '';

  document.getElementById("ivbody").innerHTML = stats + table + paid + note;
}

(function(){
  var bg = document.getElementById("ivbg");

  // Any invoice number, anywhere on the page, opens the panel.
  document.addEventListener("click", function(e){
    var a = e.target.closest && e.target.closest("[data-invoice]");
    if(a){
      e.preventDefault();
      openInvoice(a.getAttribute("data-invoice"));
      return;
    }
    if(e.target === bg) bg.classList.remove("show");
  });

  document.getElementById("ivclose").onclick = function(){ bg.classList.remove("show"); };
  document.addEventListener("keydown", function(e){
    if(e.key === "Escape") bg.classList.remove("show");
  });
})();

/* Days past due. Zero or negative = not yet due. */
function daysOverdue(inv){
  if(!inv.dueDate) return 0;
  var due = new Date(inv.dueDate + "T00:00:00");
  if(isNaN(due.getTime())) return 0;
  var t = new Date();
  t = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  return Math.floor((t - due) / 86400000);
}

function bucketOf(inv){
  var d = daysOverdue(inv);
  if(d <= 0)  return "current";
  if(d <= 30) return "b30";
  if(d <= 60) return "b60";
  if(d <= 90) return "b90";
  return "b90p";
}

var BUCKETS = [
  { key:"current", label:"Current",         chip:"chip-cur"  },
  { key:"b30",     label:"1\u201330 days",  chip:"chip-30"   },
  { key:"b60",     label:"31\u201360 days", chip:"chip-60"   },
  { key:"b90",     label:"61\u201390 days", chip:"chip-90"   },
  { key:"b90p",    label:"90+ days",        chip:"chip-90p"  }
];

function chipFor(inv){
  var d = daysOverdue(inv);
  var meta = BUCKETS.filter(function(x){ return x.key === bucketOf(inv); })[0];
  return '<span class="chip ' + meta.chip + '">' + (d <= 0 ? "Current" : d + "d") + '</span>';
}

/* ---------- scorecard ---------- */
function cell(n, label, cls){
  return '<div class="score-cell">' +
           '<div class="score-n ' + (cls || "n-ink") + '">' + n + '</div>' +
           '<div class="score-l">' + label + '</div>' +
         '</div>';
}

var MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function monthLabel(m){
  if(!m || m.length < 7) return m || "";
  var mi = parseInt(m.slice(5,7), 10) - 1;
  return (MONTH_NAMES[mi] || "?") + " " + m.slice(0,4);
}

/* Tabs show the month alone - the year is right there in the dropdown,
   and dropping it lets all twelve sit on one row. */
function monthShort(m){
  if(!m || m.length < 7) return m || "";
  return MONTH_NAMES[parseInt(m.slice(5,7), 10) - 1] || "?";
}

function renderSummary(){
  var el = document.getElementById("summary");

  if(state.section === "billing"){
    if(!state.bLoaded){ el.innerHTML = ""; return; }
    var md = bMonthRows();
    var rws = md.rows;
    var tot = rws.reduce(function(s,r){ return s + (r.amount || 0); }, 0);

    if(md.history){
      var nums = rws.map(function(r){ return Number(r.invoiceNo) || 0; })
                    .filter(Boolean).sort(function(a,b){ return a-b; });
      el.innerHTML = '<div class="score">' +
        cell(rws.length, "invoices", "n-ink") +
        cell("$" + fmt(tot), "billed", "n-ink") +
        cell(nums.length ? nums[0] : "\u2014", "first #", "n-ink") +
        cell(nums.length ? nums[nums.length-1] : "\u2014", "last #", "n-ink") +
      '</div>';
      return;
    }

    var un = rws.filter(function(r){ return r.unpaid; });
    var bx = rws.filter(function(r){ return r.boxChange; });
    el.innerHTML = '<div class="score">' +
      cell(rws.length, "to invoice", "n-ink") +
      cell("$" + fmt(tot), "to bill", "n-ink") +
      cell(un.length, "unpaid last month", un.length ? "n-red" : "n-green") +
      cell(bx.length, "box count moved", "n-ink") +
    '</div>';
    return;
  }

  if(state.section === "agents"){
    if(!state.agLoaded){ el.innerHTML = ""; return; }
    var ags = agMonthData().agents;
    var tot = ags.reduce(function(s,a){ return s + a.payout; }, 0);
    var box = ags.reduce(function(s,a){ return s + a.boxes; }, 0);
    var col = ags.reduce(function(s,a){ return s + a.collected; }, 0);
    el.innerHTML = '<div class="score">' +
      cell("$" + fmt(tot), (state.agMonth ? monthLabel(state.agMonth) : state.agYear) + " payouts", "n-green") +
      cell(ags.length, "agents", "n-ink") +
      cell(fmtN(box), "boxes", "n-ink") +
      cell("$" + fmt(col), "collected", "n-ink") +
    '</div>';
    return;
  }

  if(state.section === "payments"){
    if(!state.colLoaded){ el.innerHTML = ""; return; }

    var cur  = state.months[0];
    var prev = state.months[1];
    var sel  = state.months.filter(function(m){ return m.month === state.month; })[0];

    el.innerHTML = '<div class="score">' +
      cell(moneyShort(sel ? sel.total : 0), monthLabel(state.month) + " collected", "n-ink") +
      cell(moneyShort(prev ? prev.total : 0), monthLabel(prev ? prev.month : ""), "n-ink") +
      cell(moneyShort(state.ytd), "year to date", "n-green") +
      cell(sel ? sel.count : 0, "payments", "n-ink") +
    '</div>';
    return;
  }

  var open = state.invoices;
  var outstanding = open.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);
  var pastDueAmt = open.filter(function(i){ return daysOverdue(i) > 0; })
                       .reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  el.innerHTML = '<div class="score">' +
    cell(moneyShort(outstanding), "outstanding", "n-ink") +
    cell(moneyShort(pastDueAmt),  "past due",    "n-red") +
    cell(open.length,             "open",        "n-ink") +
    cell(state.paidCount.toLocaleString("en-US"), "paid", "n-green") +
  '</div>';
}

/* ---------- receivables ---------- */
function renderReceivables(){
  var open = state.invoices;

  var counts = {};
  BUCKETS.forEach(function(b){ counts[b.key] = 0; });
  open.forEach(function(i){ counts[bucketOf(i)] += 1; });

  /* Five folder tabs. No counts on them - the green bar below reports
     the count and the dollar total for whichever tab is open. */
  var tabs = '<div class="folder-tabs">' + BUCKETS.map(function(b){
    return '<button class="ftab' + (state.age === b.key ? " sel" : "") + '" data-age="' + b.key + '">' +
             b.label + '</button>';
  }).join("") + '</div>';

  var rows = open.filter(function(i){ return bucketOf(i) === state.age; });

  if(state.search){
    var q = state.search.toLowerCase();
    rows = rows.filter(function(i){
      return String(i.customer).toLowerCase().indexOf(q) !== -1 ||
             String(i.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.sortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.sortKey){
      case "inv":     av = String(a.docNumber); bv = String(b.docNumber); break;
      case "cust":    av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "due":     av = String(a.dueDate); bv = String(b.dueDate); break;
      case "balance": av = Number(a.balance)||0; bv = Number(b.balance)||0; break;
      default:        av = daysOverdue(a); bv = daysOverdue(b);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.sortKey !== k) return "";
    return ' <span class="sc">' + (state.sortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-sort="inv"     style="width:13%">Invoice'  + caret("inv")  + '</th>' +
      '<th data-sort="cust"    style="width:36%">Customer' + caret("cust") + '</th>' +
      '<th data-sort="due"     style="width:17%">Due'      + caret("due")  + '</th>' +
      '<th data-sort="balance" style="width:18%" class="num">Balance' + caret("balance") + '</th>' +
      '<th data-sort="age"     style="width:16%" class="num">Age' + caret("age") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="5" style="text-align:center; padding:26px 8px; color:var(--ink-2);">Nothing in this bucket.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(i){
      return '<tr>' +
        '<td>' + invLink(i.docNumber, i.qboId) + '</td>' +
        '<td title="' + esc(i.customer) + '">' + esc(i.customer) + '</td>' +
        '<td class="muted">' + (i.dueDate ? esc(usDate(i.dueDate)) : "\u2014") + '</td>' +
        '<td class="num">' + money(i.balance) + '</td>' +
        '<td class="num">' + chipFor(i) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var cur = BUCKETS.filter(function(b){ return b.key === state.age; })[0];
  var owed = rows.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<div class="fbar-t">' + cur.label +
            ' <span class="amt">\u00b7 ' + rows.length + ' invoices \u00b7 ' + moneyShort(owed) + '</span></div>' +
          '<input class="search" id="search" type="text" placeholder="Search customer or #" value="' + esc(state.search) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower"><table>' + head + tbody + '</table></div>' +
    '</div>';
}

/* ---------- coming soon panels ---------- */

var ICON_COMMISSION =
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" ' +

/* ---------- agents ---------- */
function renderAgents(){
  if(!state.agLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Working out payouts&hellip;</div>';
  }
  if(!state.agMonths.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  var yrList = state.agYears;
  var yr = state.agYear;
  var inYear = state.agMonths.filter(function(m){ return m.slice(0,4) === yr; });

  var md = agMonthData();
  var agents = md.agents;

  var tabs = '<div class="folder-tabs">' +
    '<button class="ftab' + (state.agMonth === "" ? " sel" : "") + '" data-agmonth="">' +
      yr + '</button>' +
    inYear.map(function(m){
      return '<button class="ftab' + (state.agMonth === m ? " sel" : "") + '" ' +
             'data-agmonth="' + m + '">' + monthShort(m) + '</button>';
    }).join("") + '</div>';

  var yrOpts = yrList.map(function(y){
    return '<option value="' + y + '"' + (yr === y ? " selected" : "") + '>' + y + '</option>';
  }).join("");

  var total = agents.reduce(function(s,a){ return s + a.payout; }, 0);

  var body;
  if(!agents.length){
    body = '<div class="empty-state">No commissionable payments in ' + (state.agMonth ? monthLabel(state.agMonth) : yr) + '.</div>';
  } else {
    body = agents.map(function(a){
      var open = state.agOpen[a.agent] ? " open" : "";

      /* The arithmetic, shown rather than asserted. If a number looks
         wrong, the working is right there to check it against. */
      /* With one rate the arithmetic can be stated outright. With two -
         Bob Bell has Costco at 25% and Hilton at 50% - a single "x 25%"
         would be a lie, so the per-invoice rates below do the talking. */
      var oneRate = (a.rates && a.rates.length === 1);

      var math = '<div class="agmath">' +
        '<b>$' + fmt(a.monitoring) + '</b> monitoring collected' +
        ' \u2212 <b>$' + fmt(a.fees) + '</b> cellular fees (' +
        fmtN(a.boxes) + ' boxes \u00d7 $25)' +
        ' = <b>$' + fmt(a.monitoring - a.fees) + '</b>' +
        (oneRate
          ? '<br>\u00d7 <b>' + Math.round(a.rates[0] * 100) + '%</b> share' +
            ' = <b>$' + fmt(a.payout) + '</b>'
          : '<br>paid at ' + (a.rates || []).map(function(r){
              return '<b>' + Math.round(r * 100) + '%</b>';
            }).join(' and ') + ' depending on the account' +
            ' \u2014 total <b>$' + fmt(a.payout) + '</b>') +
        '</div>';

      /* Name the invoices. "2 invoices contain a flagged line" is a dead
         end; "inv 6018 (Jun 2026), inv 5962 (Mar 2026)" can be looked up. */
      var flag = '';
      if(a.review){
        var rl = (a.reviewList || []).slice();
        rl.sort(function(x,y){ return String(y.date).localeCompare(String(x.date)); });

        var listed = rl.slice(0, 6).map(function(r){
          return 'inv ' + invLink(r.doc, r.qboId) + ' \u00b7 ' + esc(usDate(r.date)) +
                 ' \u00b7 ' + esc(String(r.customer).slice(0, 28));
        }).join('<br>');

        flag = '<div class="agflag">' +
          '<b>' + a.review + ' invoice(s) here contain a line the engine judged to be a ' +
          'one-time fee from its price rather than its wording.</b> Those lines earn no ' +
          'commission. Worth a look if this figure seems light.<br><br>' +
          listed +
          (rl.length > 6 ? '<br>\u2026and ' + (rl.length - 6) + ' more' : '') +
          '</div>';
      }

      /* Year view: a month-by-month breakdown is what's useful.
         Month view: the individual invoices behind the number. */
      var table;
      if(md.isYear){
        table = '<table><thead><tr>' +
            '<th style="width:34%">Month</th>' +
            '<th style="width:22%" class="num">Boxes</th>' +
            '<th style="width:22%" class="num">Invoices</th>' +
            '<th style="width:22%" class="num">Payout</th>' +
          '</tr></thead><tbody>' +
          a.months.map(function(m){
            return '<tr>' +
              '<td>' + monthLabel(m.month) + '</td>' +
              '<td class="num">' + fmtN(m.boxes) + '</td>' +
              '<td class="num muted">' + m.invoices + '</td>' +
              '<td class="num">$' + fmt(m.payout) + '</td>' +
            '</tr>';
          }).join("") + '</tbody></table>';
      } else {
        table = '<table><thead><tr>' +
            '<th style="width:14%">Date</th>' +
            '<th style="width:31%">Customer</th>' +
            '<th style="width:11%">Invoice</th>' +
            '<th style="width:10%" class="num">Boxes</th>' +
            '<th style="width:14%" class="num">Monitoring</th>' +
            '<th style="width:8%" class="num">Rate</th>' +
            '<th style="width:14%" class="num">Payout</th>' +
          '</tr></thead><tbody>' +
          a.invoices.map(function(i){
            return '<tr>' +
              '<td class="muted">' + esc(usDate(i.date)) + '</td>' +
              '<td title="' + esc(i.customer) + '">' + esc(i.customer) +
                (i.partial ? ' <span class="chip chip-30">' + i.partial + '% paid</span>' : '') + '</td>' +
              '<td>' + invLink(i.doc, i.qboId) + '</td>' +
              '<td class="num">' + fmtN(i.boxes) + '</td>' +
              '<td class="num">$' + fmt(i.monitoring) + '</td>' +
              '<td class="num muted">' + Math.round((i.share || 0) * 100) + '%</td>' +
              '<td class="num">$' + fmt(i.payout) + '</td>' +
            '</tr>';
          }).join("") + '</tbody></table>';
      }

      return '<div class="agrow' + open + '" data-agent="' + a.agent + '">' +
          '<div class="aghead">' +
            '<span class="agcaret">\u25B6</span>' +
            '<span class="agname">' + esc(a.name) + '</span>' +
            '<span class="agshare">' + shareLabel(a) + '</span>' +
            '<span class="agmeta">' + fmtN(a.boxes) + ' boxes \u00b7 ' +
              (md.isYear ? a.months.length + ' mo' : a.invoices.length + ' inv') + '</span>' +
            '<span class="agpay">$' + fmt(a.payout) + '</span>' +
          '</div>' +
          '<div class="agdetail">' + math + flag + table + '</div>' +
        '</div>';
    }).join("");
  }

  /* Payments from customers who map to no agent. Left unsaid, this is
     somebody's commission quietly going missing. */
  var orphan = '';
  if(md.unmapped && md.unmapped.length){
    var when = state.agMonth ? monthLabel(state.agMonth) : yr;

    orphan = '<div class="agflag" style="margin-top:14px;">' +
      '<b>' + md.unmapped.length + ' customer(s) paid in ' + when +
        ' but map to no agent.</b><br>' +
      md.unmapped.slice(0,8).map(function(u){
        // In the year view, say which months - otherwise "$2,200 in 2025"
        // leaves you hunting through twelve tabs for it.
        var ms = (u.months && u.months.length)
          ? ' <span style="opacity:.75">(' +
              u.months.slice(0,4).map(monthShort).join(', ') +
              (u.months.length > 4 ? ', +' + (u.months.length - 4) : '') + ')</span>'
          : '';
        return esc(u.customer) + ' \u2014 $' + fmt(u.amount) + ms;
      }).join('<br>') +
      (md.unmapped.length > 8 ? '<br>\u2026and ' + (md.unmapped.length - 8) + ' more' : '') +
      '<br><br>If any of these belong to an agent, add them to the Agent Map tab.' +
      '</div>';
  }

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="agYr" aria-label="Year">' + yrOpts + '</select>' +
          '<div class="fbar-t">' + (state.agMonth ? monthLabel(state.agMonth) : yr + ' \u2014 full year') +
            ' <span class="amt">\u00b7 ' + agents.length + ' agents \u00b7 $' +
            fmt(total) + ' total</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower" style="padding:4px 16px 8px;">' + body + '</div>' +
    '</div>' + orphan;
}

function fmt(n){
  return (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtN(n){
  n = Number(n)||0;
  return n % 1 === 0 ? String(n) : n.toFixed(1);
}

/* An agent may be paid at more than one rate - the exception lives on the
   account, not the person. Show every rate rather than picking one. */
function shareLabel(a){
  var r = (a.rates && a.rates.length) ? a.rates : [a.share];
  return r.map(function(x){ return Math.round(x * 100) + '%'; }).join(' / ');
}

/* Fetch a whole year. ~600 commissionable payments - months are then
   switched on the client with no further requests. */
function loadPayouts(year){
  if(state.agLoading) return;
  state.agLoading = true;

  jsonp({ action:"payouts", key:KEY, year: year || "" }, function(data){
    state.agLoading = false;
    if(!data || !data.ok){
      showError((data && data.error) || "Could not work out payouts.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.agMonths = data.months || [];
    state.agYears  = data.years  || [];
    state.agYear   = data.year   || state.agYear;
    state.agByYear[state.agYear] = data.byMonth || {};
    state.agLoaded = true;

    // Land on the newest month that actually has payments in this year.
    // Land on the full-year view. It answers "what did each agent make
    // this year" without a click, and the months are one tap away.
    state.agMonth = "";

    renderSummary();
    renderBody();
  });
}

function wireAgents(){
  /* The whole year is loaded, so switching months is a lookup. No spinner,
     no request. */
  document.querySelectorAll(".ftab[data-agmonth]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-agmonth");   // "" = the year view
      if(m === state.agMonth) return;
      state.agMonth = m;
      state.agOpen = {};
      renderSummary();
      renderBody();
    };
  });

  var yr = document.getElementById("agYr");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.agYear) return;
      state.agYear = y;
      state.agMonth = "";      // show the new year's full-year view
      state.agOpen = {};

      if(state.agByYear[y]){          // already fetched - nothing to wait for
        renderSummary();
        renderBody();
      } else {
        document.getElementById("body").innerHTML =
          '<div class="empty-state"><span class="spinner"></span>Working out ' + y + '&hellip;</div>';
        loadPayouts(y);
      }
    };
  }

  document.querySelectorAll(".agrow").forEach(function(el){
    var head = el.querySelector(".aghead");
    if(!head) return;
    head.onclick = function(){
      var k = el.getAttribute("data-agent");
      state.agOpen[k] = !state.agOpen[k];
      el.classList.toggle("open");
    };
  });
}

/* ---------- payments ---------- */
function renderCollections(){
  if(!state.colLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading payments&hellip;</div>';
  }
  if(!state.months.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  /* months in the loaded year, newest first */
  var shown = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });

  var tabs = '<div class="folder-tabs">' + shown.map(function(m){
    return '<button class="ftab' + (state.month === m.month ? " sel" : "") + '" ' +
           'data-month="' + m.month + '">' + monthShort(m.month) + '</button>';
  }).join("") + '</div>';

  /* Payments for the loaded year are already here - slice by month with
     no round trip. */
  var rows = (state.payByYear[state.year] || []).filter(function(p){
    return String(p.txnDate).slice(0,7) === state.month;
  });

  if(state.colSearch){
    var q = state.colSearch.toLowerCase();
    rows = rows.filter(function(p){
      return String(p.customer).toLowerCase().indexOf(q) !== -1 ||
             String(p.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.colSortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.colSortKey){
      case "cust":   av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "inv":    av = String(a.docNumber); bv = String(b.docNumber); break;
      case "amount": av = Number(a.amount)||0; bv = Number(b.amount)||0; break;
      default:       av = String(a.txnDate); bv = String(b.txnDate);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.colSortKey !== k) return "";
    return ' <span class="sc">' + (state.colSortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-csort="date"   style="width:17%">Date'     + caret("date")   + '</th>' +
      '<th data-csort="cust"   style="width:42%">Customer' + caret("cust")   + '</th>' +
      '<th data-csort="inv"    style="width:18%">Invoice'  + caret("inv")    + '</th>' +
      '<th data-csort="amount" style="width:23%" class="num">Amount' + caret("amount") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="4" style="text-align:center; padding:26px 8px; color:var(--ink-2);">No payments in this month.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(p){
      /* No invoice link = a credit or prepayment. Shown plainly rather
         than hidden - the money did arrive. */
      var inv = p.docNumber
        ? invLink(p.docNumber, p.qboId)
        : '<span class="chip chip-30">unapplied</span>';
      return '<tr>' +
        '<td class="muted">' + esc(usDate(p.txnDate)) + '</td>' +
        '<td title="' + esc(p.customer) + '">' + esc(p.customer) + '</td>' +
        '<td>' + inv + '</td>' +
        '<td class="num">' + money(p.amount) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var total = rows.reduce(function(s,p){ return s + (Number(p.amount)||0); }, 0);

  /* Each option carries what that year collected, so the totals are
     visible in the list itself - and the closed pill shows the selected
     year's total without costing another line of chrome. */
  var yrOpts = state.years.map(function(y){
    return '<option value="' + y.year + '"' + (state.year === y.year ? " selected" : "") + '>' +
             y.year + '  \u00b7  ' + moneyShort(y.total) + '</option>';
  }).join("");

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="yrSel" aria-label="Year">' + yrOpts + '</select>' +
          '<div class="fbar-t">' + monthLabel(state.month) +
            ' <span class="amt">\u00b7 ' + rows.length + ' payments \u00b7 ' + moneyShort(total) + '</span></div>' +
          '<input class="search" id="colSearch" type="text" placeholder="Search customer or #" value="' + esc(state.colSearch) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower"><table>' + head + tbody + '</table></div>' +
    '</div>';
}

/* ---------- billing ---------- */
/* The invoice log.
 *
 * Past months are the RECORD - what was actually billed, with the original
 * notes. The next unbilled month is DRAFTED: invoice numbers continuing the
 * sequence, the billing month from each customer's cadence, and the amount
 * carried from the last invoice.
 *
 * The two things a draft shows that a person scanning a spreadsheet cannot:
 * who has not paid, and whose box count moved. */

function bMonthRows(){
  var y = state.bByYear[state.bYear] || {};
  if(y[state.bMonth]) return { rows: y[state.bMonth], history: true };
  if(state.bDraft && state.bMonth === state.bDraftMonth){
    return { rows: state.bDraft.rows || [], history: false };
  }
  return { rows: [], history: true };
}

function renderBilling(){
  if(!state.bLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading the log&hellip;</div>';
  }

  var md = bMonthRows();
  var all = md.rows;
  var hist = md.history;
  state.bHistory = hist;

  var yr = state.bYear || String(new Date().getFullYear());

  /* Twelve tabs, always. A month with no log yet is faded. */
  var tabs = '<div class="folder-tabs">' + MONTH_NAMES.map(function(nm, i){
    var ym = yr + "-" + (i < 9 ? "0" : "") + (i + 1);
    var has = (state.bByYear[yr] && state.bByYear[yr][ym]) || ym === state.bDraftMonth;
    return '<button class="ftab' + (state.bMonth === ym ? " sel" : "") + '" ' +
           'data-bmonth="' + ym + '"' + (has ? '' : ' style="opacity:.5"') + '>' + nm + '</button>';
  }).join("") + '</div>';

  var yrOpts = state.bYears.map(function(y){
    return '<option value="' + y + '"' + (yr === y ? " selected" : "") + '>' + y + '</option>';
  }).join("");

  var unpaid = all.filter(function(r){ return r.unpaid; });
  var boxed  = all.filter(function(r){ return r.boxChange; });

  var rows = all;
  if(!hist){
    if(state.bFilter === "unpaid") rows = unpaid;
    if(state.bFilter === "boxes")  rows = boxed;
  }

  var chips = hist
    ? '<span class="bsub" style="display:inline; color:var(--green-dark);">' +
        all.length + ' invoices \u00b7 as billed</span>'
    : '<button class="bchip' + (state.bFilter==="all"?" on":"") + '" data-bf="all">' +
        'All \u00b7 ' + all.length + '</button>' +
      '<button class="bchip' + (state.bFilter==="unpaid"?" on":"") + '" data-bf="unpaid">' +
        'Unpaid \u00b7 ' + unpaid.length + '</button>' +
      '<button class="bchip' + (state.bFilter==="boxes"?" on":"") + '" data-bf="boxes">' +
        'Box changed \u00b7 ' + boxed.length + '</button>';

  /* A quarterly customer who isn't due doesn't appear in the list - and a
     name simply missing looks like something went wrong. So say it. */
  var skip = "";
  if(!hist && state.bNotDue.length){
    skip = '<div class="bskip"><b>Not billed this month \u2014 quarterly:</b> ' +
      state.bNotDue.map(function(q){
        return esc(q.shorthand) + ' <span style="color:var(--ink-3)">(last billed ' +
               esc(q.lastBilled) + ', next ' + esc(q.nextDue) + ')</span>';
      }).join(' \u00b7 ') + '</div>';
  }

  var body;
  if(!rows.length){
    body = skip + '<div class="empty-state">Nothing logged for this month.</div>';
  } else {
    body = skip + '<table class="btable"><thead><tr>' +
        '<th style="width:24%">Name</th>' +
        '<th style="width:9%">Invoice #</th>' +
        '<th style="width:15%">Month</th>' +
        '<th style="width:15%" class="num">Amount</th>' +
        '<th style="width:9%">Send</th>' +
        '<th style="width:28%">Notes</th>' +
      '</tr></thead><tbody>' +
      rows.map(function(r){
        var cls = r.unpaid ? ' class="unpaid"' : (r.boxChange ? ' class="flagged"' : '');

        var warn = "";
        if(r.unpaid){
          warn += '<div class="bwarn pay">Invoice ' + esc(r.lastDoc) + ' still owes $' +
                  fmt(r.unpaidAmt) + ' \u2014 send a reminder, don\'t carry it forward</div>';
        }
        if(r.boxChange){
          warn += '<div class="bwarn box">Boxes went ' + r.boxChange.from + ' \u2192 ' +
                  r.boxChange.to + ' \u2014 check the amount</div>';
        }
        if(r.neverBilled){
          warn += '<div class="bwarn box">Never billed \u2014 no history to copy</div>';
        }

        /* Delivery has its own column now. A portal is the one that costs
           real time to find, so it carries its link. */
        var d = (r.delivery || "email").toLowerCase();
        var deliv;
        if(d === "portal" && r.portalUrl){
          deliv = '<a class="bdeliv d-portal" href="' + esc(r.portalUrl) + '" ' +
                  'target="_blank" rel="noopener" title="' + esc(r.portalUrl) + '">portal \u2197</a>';
        } else if(d === "portal"){
          deliv = '<span class="bdeliv d-portal" style="cursor:default;">portal</span>';
        } else if(d === "mail"){
          deliv = '<span class="bdeliv d-mail">mail</span>';
        } else {
          deliv = '<span class="bdeliv d-email">email</span>';
        }

        var note = r.notes || "";

        return '<tr' + cls + '>' +
          '<td>' +
            '<span class="bname">' + esc(r.shorthand) + '</span>' +
            (r.customer ? '<span class="bsub">' + esc(r.customer) + '</span>' : '') +
            warn +
          '</td>' +
          /* A logged invoice exists in QuickBooks, so it opens. A drafted one
             does not exist yet - it will once the billing is done - so it
             stays plain text rather than becoming a link to nothing. */
          '<td>' + (hist
            ? '<span class="binv">' + invLink(r.invoiceNo, "x") + '</span>'
            : '<span class="binv">' + esc(r.invoiceNo) + '</span>') + '</td>' +
          '<td>' + esc(r.serviceMonth) +
            (r.quarterly ? '<span class="bsub">quarterly</span>' : '') + '</td>' +
          '<td class="num">' +
            (r.amount == null ? '\u2014' : '$' + fmt(r.amount)) +
            (r.boxes ? '<span class="bsub">' + r.boxes + ' box' + (r.boxes > 1 ? 'es' : '') + '</span>' : '') +
            /* A replacement monitor, or any other one-time charge, gets added
               here. Nothing can predict it from last month's invoice, so it
               has to be typed. */
            (hist ? '' :
              '<div class="bfeewrap">' +
                '<span class="bfeelbl">+ $</span>' +
                '<input class="bfee" type="number" step="1" min="0" ' +
                  'data-fee="' + esc(r.shorthand) + '" ' +
                  'value="' + (r.fee ? r.fee : '') + '" placeholder="0" ' +
                  'title="One-time fee \u2014 a replacement monitor, say">' +
              '</div>' +
              (r.fee
                ? '<div class="bbase">$' + fmt(r.baseAmount) + ' + $' + fmt(r.fee) + '</div>'
                : '<div class="bfeehint">one-time fee</div>')) +
          '</td>' +
          '<td>' + deliv + '</td>' +
          '<td>' + (hist
            ? '<span class="bnote">' + esc(note) + '</span>'
            : '<textarea class="bedit" rows="1" data-note="' + esc(r.shorthand) + '" ' +
              'placeholder="Add a note\u2026">' + esc(note) + '</textarea>') +
          '</td>' +
        '</tr>';
      }).join("") + '</tbody></table>';
  }

  /* The invoice range, for a past month as much as a drafted one. A record
     should say what it covers. */
  var right = '';
  if(hist){
    var ns = all.map(function(r){ return Number(r.invoiceNo) || 0; })
                .filter(Boolean).sort(function(a,b){ return a - b; });
    if(ns.length){
      right = '<span class="bsub" style="display:inline;">invoices ' +
              ns[0] + '\u2013' + ns[ns.length - 1] + '</span>';
    }
  } else if(state.bDraft){
    right = '<span class="bsub" style="display:inline;">invoices ' + state.bDraft.startNumber +
            '\u2013' + (state.bDraft.startNumber + all.length - 1) + '</span>';
  }

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="bYr" aria-label="Year">' + yrOpts + '</select>' +
          '<div class="bfilter">' + chips + '</div>' +
          '<div class="fbar-right" style="display:flex; gap:7px; align-items:center;">' + right + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower" style="padding:2px 14px 8px;">' + body + '</div>' +
    '</div>';
}

/* One request per YEAR. Month tabs then switch with no round trip at all. */
function loadBilling(year){
  if(state.bLoading) return;
  state.bLoading = true;

  jsonp({ action:"billing", key:KEY, year: year || "" }, function(data){
    state.bLoading = false;
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load the log.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.bYear       = data.year || "";
    state.bYears      = data.years || [];
    state.bMonths     = data.logMonths || [];
    state.bByYear[state.bYear] = data.byMonth || {};
    state.bDraftMonth = data.draftMonth || "";
    state.bDraft      = data.draft || null;
    state.bNotDue     = (data.draft && data.draft.notDue) || [];
    state.bLoaded     = true;
    state.bFilter     = "all";

    /* Land on the month that still needs billing - that is the one being
       worked on. Failing that, the latest month with a log. */
    var logged = Object.keys(state.bByYear[state.bYear]).sort();
    if(state.bDraftMonth) state.bMonth = state.bDraftMonth;
    else if(logged.length) state.bMonth = logged[logged.length - 1];
    else state.bMonth = state.bYear + "-01";

    renderSummary();
    renderBody();
  });
}

function wireBilling(){
  document.querySelectorAll(".ftab[data-bmonth]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-bmonth");
      if(m === state.bMonth) return;
      state.bMonth = m;
      state.bFilter = "all";
      renderSummary();
      renderBody();
    };
  });

  var yr = document.getElementById("bYr");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.bYear) return;
      if(state.bByYear[y]){
        state.bYear = y;
        var logged = Object.keys(state.bByYear[y]).sort();
        state.bMonth = (y === (state.bDraftMonth || "").slice(0,4) && state.bDraftMonth)
          ? state.bDraftMonth
          : (logged.length ? logged[logged.length - 1] : y + "-01");
        renderSummary();
        renderBody();
      } else {
        document.getElementById("body").innerHTML =
          '<div class="empty-state"><span class="spinner"></span>Loading ' + y + '&hellip;</div>';
        loadBilling(y);
      }
    };
  }

  document.querySelectorAll("[data-bf]").forEach(function(el){
    el.onclick = function(){
      state.bFilter = el.getAttribute("data-bf");
      renderBody();
    };
  });

  /* Notes and one-time fees save on blur, not on every keystroke - each save
     is a round trip, and typing a sentence should not fire twenty of them. */
  var saveEdit = function(name, el){
    var noteEl = document.querySelector('[data-note="' + name.replace(/"/g,'\\"') + '"]');
    var feeEl  = document.querySelector('[data-fee="'  + name.replace(/"/g,'\\"') + '"]');

    var notes = noteEl ? noteEl.value : "";
    var fee   = feeEl  ? (Number(feeEl.value) || 0) : 0;

    el.classList.remove("saved");
    el.classList.add("saving");

    jsonp({ action:"saveedit", key:KEY, month:state.bMonth,
            name:name, fee:fee, notes:notes }, function(data){
      el.classList.remove("saving");
      if(!data || !data.ok){
        el.style.borderColor = "var(--red)";
        return;
      }
      el.classList.add("saved");
      setTimeout(function(){ el.classList.remove("saved"); }, 1400);

      // Keep the in-memory draft in step, so re-rendering doesn't undo it.
      if(state.bDraft && state.bDraft.rows){
        state.bDraft.rows.forEach(function(r){
          if(r.shorthand !== name) return;
          r.notes = notes;
          r.fee = fee;
          r.amount = (r.baseAmount || 0) + fee;
        });
      }
    });
  };

  document.querySelectorAll("[data-note]").forEach(function(el){
    el.onblur = function(){ saveEdit(el.getAttribute("data-note"), el); };
  });

  document.querySelectorAll("[data-fee]").forEach(function(el){
    el.onblur = function(){
      saveEdit(el.getAttribute("data-fee"), el);
      // The amount at the top of the page changes, so redraw the scorecard.
      setTimeout(renderSummary, 300);
    };
    el.onkeydown = function(e){ if(e.key === "Enter") el.blur(); };
  });
}

/* ---------- body ---------- */
function renderBody(){
  var el = document.getElementById("body");

  if(state.section === "billing"){
    el.innerHTML = renderBilling();
    wireBilling();
    measurePin();
    return;
  }

  if(state.section === "agents"){
    el.innerHTML = renderAgents();
    wireAgents();
    measurePin();
    return;
  }

  if(state.section === "payments"){
    el.innerHTML = renderCollections();
    wireCollections();
    measurePin();
    return;
  }

  if(!state.loaded){
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>';
    return;
  }

  el.innerHTML = renderReceivables();
  wireBody();
  measurePin();
}

/* The sticky table header needs to sit exactly below the pinned tabs +
   green bar, whose height depends on wrapping. Measure it and hand the
   number to CSS rather than hardcoding a guess. */
function measurePin(){
  var ph = document.getElementById("pinhead");
  var h = ph ? ph.getBoundingClientRect().height : 0;
  document.documentElement.style.setProperty("--pinh", Math.round(h) + "px");
}
window.addEventListener("resize", function(){ if(state.section !== "agents") measurePin(); });

/* ---------- events ---------- */
function wireBody(){
  document.querySelectorAll(".ftab").forEach(function(el){
    el.onclick = function(){
      state.age = el.getAttribute("data-age");
      renderBody();
    };
  });

  document.querySelectorAll("th[data-sort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-sort");
      if(state.sortKey === k){
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = k;
        state.sortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("search");
  if(s){
    s.oninput = function(){
      state.search = s.value;
      renderBody();
      var again = document.getElementById("search");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

function wireCollections(){
  var yr = document.getElementById("yrSel");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.year) return;

      state.year = y;
      state.colSearch = "";

      // Default to the newest month in that year.
      var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === y; });
      state.month = inYear.length ? inYear[0].month : "";

      // Already fetched this year? Then nothing to wait for.
      if(state.payByYear[y]){
        renderSummary();
        renderBody();
      } else {
        loadCollections(y);
      }
    };
  }

  /* Month switching is a client-side filter - the whole year is already
     loaded, so no round trip. */
  document.querySelectorAll(".ftab[data-month]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-month");
      if(m === state.month) return;
      state.month = m;
      state.colSearch = "";
      renderSummary();
      renderBody();
    };
  });

  document.querySelectorAll("th[data-csort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-csort");
      if(state.colSortKey === k){
        state.colSortDir = state.colSortDir === "asc" ? "desc" : "asc";
      } else {
        state.colSortKey = k;
        state.colSortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("colSearch");
  if(s){
    s.oninput = function(){
      state.colSearch = s.value;
      renderBody();
      var again = document.getElementById("colSearch");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

/* Fetch a whole year (~700 rows). Months are then switched on the
   client with no further requests. */
function loadCollections(year){
  if(state.colLoading) return;
  state.colLoading = true;

  if(state.colLoaded){
    document.getElementById("body").innerHTML =
      '<div class="empty-state"><span class="spinner"></span>Loading ' + (year || "") + '&hellip;</div>';
  }

  var params = { action:"collections", key:KEY };
  if(year) params.year = year;

  jsonp(params, function(data){
    state.colLoading = false;

    if(!data || !data.ok){
      showError((data && data.error) || "Could not load payments.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.months = data.months || [];
    state.years  = data.years  || [];
    state.ytd    = Number(data.ytd) || 0;
    state.year   = data.year || state.year;
    state.payByYear[state.year] = data.payments || [];

    // Land on the newest month of the loaded year.
    var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });
    if(!state.month || state.month.slice(0,4) !== state.year){
      state.month = inYear.length ? inYear[0].month : "";
    }

    state.colLoaded = true;
    renderSummary();
    renderBody();
  });
}

document.querySelectorAll(".sec").forEach(function(el){
  el.onclick = function(){
    state.section = el.getAttribute("data-sec");
    document.querySelectorAll(".sec").forEach(function(x){ x.classList.remove("on"); });
    el.classList.add("on");

    // Payments load on first visit to Collections, not at page load.
    if(state.section === "payments" && !state.colLoaded && !state.colLoading){
      renderSummary();
      renderBody();
      loadCollections("");
      return;
    }

    if(state.section === "agents" && !state.agLoaded && !state.agLoading){
      renderSummary();
      renderBody();
      loadPayouts("");
      return;
    }

    if(state.section === "billing" && !state.bLoaded && !state.bLoading){
      renderSummary();
      renderBody();
      loadBilling("");
      return;
    }

    renderSummary();
    renderBody();
  };
});

function showError(msg){
  var b = document.getElementById("banner");
  b.textContent = msg;
  b.className = "banner show";
  document.getElementById("body").innerHTML =
    '<div class="empty-state">Couldn\'t load invoices.</div>';
}

/* ---------- load ---------- */
function load(){
  document.getElementById("stamp").textContent = "Loading\u2026";
  jsonp({ action:"receivables", key:KEY }, function(data){
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load invoices.");
      document.getElementById("stamp").textContent = "";
      return;
    }
    document.getElementById("banner").className = "banner";
    state.invoices   = data.invoices || [];
    state.paidCount  = Number(data.paidCount) || 0;
    state.totalCount = Number(data.totalCount) || 0;
    state.loaded     = true;
    document.getElementById("stamp").textContent =
      state.totalCount.toLocaleString("en-US") + " invoices";
    renderSummary();
    renderBody();
  });
}

/* ---------- header ---------- */
var viewBtn  = document.getElementById("viewBtn");
var viewDrop = document.getElementById("viewDrop");
viewBtn.onclick = function(e){ e.stopPropagation(); viewDrop.classList.toggle("open"); };
document.addEventListener("click", function(){ viewDrop.classList.remove("open"); });
document.getElementById("goMonitor").onclick = function(){ window.location.href = MONITOR_URL; };
document.getElementById("refreshBtn").onclick = function(){ load(); };

/* ---------- lock ---------- */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.classList.add("hide");
    document.getElementById("lockErr").style.display = "none";
    load();
  }

  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){
    lock.classList.add("hide");
    load();
  } else {
    lockIn.focus();
  }
})();
</script>
</body>
