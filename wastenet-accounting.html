/* ---------- agents ---------- */
/* An agent's address belongs on Agent Settings, NOT in the box contacts.
   The staff column on the Master Box List is who gets copied on SERVICE emails
   to haulers - put John Lydick there and he is emailed every time a compactor
   at Post Oak is scheduled. Contacts are organised by BOX; agents are organised
   by CUSTOMER. Agent Map has tied John to his 27 customers all along. The only
   thing ever missing was this one field. */
/* ================= THE COMMISSION STATEMENT =================

   TWO DATES ON EVERY LINE, and this is the whole point of the thing.

   Commission is paid on money RECEIVED, not money invoiced. A July statement is
   therefore mostly June's invoices, finally paid. Show only the payment date and
   John sees six July dates and reasonably concludes he is looking at July's
   business - and when July's invoices land on August's statement he will believe
   he has been paid twice for the same month, or not at all. That gap is where
   commission arguments start, and they start with the statement, not the maths.

   So: Invoiced 06/17 / Paid 07/04, side by side, on every row. Plus one line at
   the top saying it in words. He never has to remember being told once.

   The fee is shown per line too. An agent checking his own statement should not
   have to work out 25 boxes x $25 in his head to see where $625 went. */
/* The preview is not a courtesy. This is money, going to someone who will
   check the arithmetic, and it is the last moment a mistake costs nothing. */
function openStmtPreview(agent, mode){
  var md = agMonthData();
  // agMonthData() returns { agents: [...] } - not rows. Getting this wrong made
  // the button say "could not find that agent" on a page that was displaying him.
  var a = (md.agents || []).filter(function(x){ return x.agent === agent; })[0];
  if(!a){ showNote("Could not find that agent in the current month.", true); return; }
  var cfg = (state.agSettings || {})[agent] || {};
  if(!cfg.email){ showNote("No email address on file for " + a.name + ".", true); return; }

  var docs = (a.invoices || []).map(function(i){ return i.doc; }).filter(Boolean);

  var build = function(){
    state.stmt = {
      agent: agent, name: a.name, period: state.agMonth,
      to: cfg.email ? splitEmails(cfg.email) : [],
      cc: [], bcc: [], note: "",
      _a: a, _agentEmail: cfg.email || "", _book: stmtBook(),
      subject: "WasteNet Commission Statement \u2014 " + stmtPeriodLabel(state.agMonth),
      payout: a.payout, boxes: a.boxes, invoices: docs.length,
      mode: mode || "view",
      sending: false
    };
    renderStmtModal();
  };

  if(!docs.length){ build(); return; }

  // ensureAgentLines already fetched the detail when the agent was selected. Only
  // fetch what is genuinely missing - and if nothing is, go straight to the send
  // box (no re-fetch, no "loading" strip, no empty banner).
  state.stmtLines = state.stmtLines || {};
  var missing = docs.filter(function(d){ return !(d in state.stmtLines); });
  if(!missing.length){ build(); return; }

  state.stmtFetching = agent;

  jsonp({ action:"invoice_lines", key:KEY, docs: missing.join(","), }, function(data){
    state.stmtFetching = null;
    /* If the detail did not load, DO NOT quietly render a statement without it.
       A statement missing its itemisation still looks complete - the totals are
       all there - and the one person who would notice is the agent, after it
       has been sent. */
    if(!data || !data.ok){
      refreshAgStmt();
      showNote(esc((data && data.error) || "Could not load the invoice detail.") +
               " The statement has not been drafted.", true);
      return;
    }
    var L = data.lines || {};
    for(var k in L){ state.stmtLines[k] = L[k]; }
    missing.forEach(function(d){ if(!(d in state.stmtLines)) state.stmtLines[d] = null; });
    if(data.missing && data.missing.length){
      showNote("No stored line items for invoice(s) " + esc(data.missing.join(", ")) +
               ". They will appear on the statement as a total only.", true);
    }
    refreshAgStmt();
    build();          // the draft opens
  });
}

/* ---- statement recipients: token fields, +Add, type-ahead (ported from the
   compose window). Address book = agent emails from Agent Settings + staff. ---- */
function splitEmails(s){ return String(s || "").split(/[;,]/).map(function(x){ return x.trim(); }).filter(Boolean); }
var ST_STAFF = "office@wastenetinc.com; lgrundy@wastenetinc.com; kim@wastenetinc.com";

/* Staff addresses come from the ONE contacts directory (Master Box List staff
   column), served by the monitor script's master_contacts endpoint - the same
   source the Contacts page uses. No hand-typed list to drift out of date. */
function loadStaff(){
  if(state.staffLoaded) return;
  state.staffLoaded = true;
  jsonpTo(MONITOR_API, { action:"master_contacts", key:KEY }, function(data){
    var contacts = (data && data.contacts) || {};
    var seen = {};
    Object.keys(contacts).forEach(function(boxId){
      var c = contacts[boxId] || {};
      splitEmails(c.staffRecipients).forEach(function(e){
        var k = e.toLowerCase(); if(k && !seen[k]) seen[k] = e;
      });
    });
    state.staffEmails = Object.keys(seen).map(function(k){ return seen[k]; });
    if(state.stmt) state.stmt._book = stmtBook();   // refresh an open modal
  });
}
function staffStr(){ return (state.staffEmails || []).join("; "); }
var ST_ROLE = { agent:{ label:"Agent", dot:"#5CAA16" }, staff:{ label:"Staff (WasteNet)", dot:"#7A5320" } };
function stmtBook(){
  var seen = {};
  Object.keys(state.agSettings || {}).forEach(function(code){
    splitEmails((state.agSettings[code] || {}).email).forEach(function(e){ var k=e.toLowerCase(); if(!seen[k]) seen[k]={email:e,role:"agent"}; });
  });
  (state.staffEmails || []).forEach(function(e){ var k=e.toLowerCase(); if(k && !seen[k]) seen[k]={email:e,role:"staff"}; });
  return Object.keys(seen).map(function(k){ return seen[k]; });
}
function stmtRole(email){
  var k=String(email).toLowerCase();
  var f=((state.stmt && state.stmt._book) || []).filter(function(b){ return b.email.toLowerCase()===k; })[0];
  return f ? f.role : "agent";
}
function noteBlockHtml(note){
  note = String(note || "").trim();
  if(!note) return "";
  return '<div style="margin:0 0 18px;padding:12px 14px;background:#F4FAEC;border:1px solid #C0DD97;border-radius:6px;font-size:13px;line-height:1.6;color:#1A1D1A;white-space:pre-wrap;">'+ esc(note) +'</div>';
}
function srCloseMenus(){ var m=document.querySelectorAll(".st-menu,.st-ta"); for(var i=0;i<m.length;i++) m[i].parentNode.removeChild(m[i]); }
function srAddRecip(which, email){ email=String(email).trim(); if(!email) return; var st=state.stmt; if(st[which].indexOf(email)===-1) st[which].push(email); srRenderRecip(which); srUpdateSummary(); }
function srDelRecip(which, email){ var st=state.stmt; st[which]=st[which].filter(function(e){ return e!==email; }); srRenderRecip(which); srUpdateSummary(); }
function srRenderRecip(which){
  var box=document.getElementById("st-"+which+"-box"); if(!box) return;
  var st=state.stmt;
  box.innerHTML = st[which].map(function(e){
    return '<span class="st-tok '+stmtRole(e)+'"><span class="a" title="'+esc(e)+'">'+esc(e)+'</span>'+
      '<button type="button" class="tx" data-del="'+esc(which)+'\u0001'+esc(e)+'">\u00d7</button></span>';
  }).join("")+
    '<input class="st-rin" data-rin="'+which+'" placeholder="'+(st[which].length?"":"Type a name or address\u2026")+'">'+
    '<button type="button" class="st-addbtn" data-radd="'+which+'">+ Add \u25be</button>';
  srWireRecip(which);
}
function srWireRecip(which){
  var box=document.getElementById("st-"+which+"-box"); if(!box) return;
  box.querySelectorAll("[data-del]").forEach(function(b){ b.addEventListener("click", function(){ var p=b.getAttribute("data-del").split("\u0001"); srDelRecip(p[0],p[1]); }); });
  var inp=box.querySelector("[data-rin]");
  inp.addEventListener("input", function(){ srTypeahead(which, inp); });
  inp.addEventListener("keydown", function(e){ if(e.key==="Enter"&&inp.value.trim()){ e.preventDefault(); srAddRecip(which, inp.value); srCloseMenus(); } });
  inp.addEventListener("focus", function(){ box.closest(".st-rfield").classList.add("focus"); });
  inp.addEventListener("blur", function(){ box.closest(".st-rfield").classList.remove("focus"); });
  box.querySelector("[data-radd]").addEventListener("click", function(e){ e.stopPropagation(); srAddMenu(which, box.querySelector("[data-radd]")); });
}
function srAddMenu(which, anchor){
  srCloseMenus();
  var st=state.stmt;
  var roles=[]; if(st._agentEmail) roles.push(["agent", st._agentEmail]); roles.push(["staff", staffStr()]);
  var m=document.createElement("div"); m.className="st-menu";
  m.innerHTML='<div class="sec">Add</div>'+roles.map(function(r){
    var meta=ST_ROLE[r[0]], n=splitEmails(r[1]).length;
    return '<button type="button" class="mi" data-role="'+which+'\u0001'+r[0]+'"><span class="dot" style="background:'+meta.dot+'"></span>'+meta.label+'<span class="n">'+n+'</span></button>';
  }).join("");
  anchor.parentNode.appendChild(m);
  m.querySelectorAll("[data-role]").forEach(function(b){
    b.addEventListener("click", function(){
      var p=b.getAttribute("data-role").split("\u0001");
      var src=(p[1]==="agent") ? st._agentEmail : staffStr();
      splitEmails(src).forEach(function(e){ srAddRecip(p[0], e); });
      srCloseMenus();
    });
  });
}
function srTypeahead(which, inp){
  srCloseMenus();
  var q=inp.value.trim().toLowerCase(); if(q.length<2) return;
  var st=state.stmt;
  var hits=(st._book||[]).filter(function(b){ return b.email.toLowerCase().indexOf(q)!==-1 && st[which].indexOf(b.email)===-1; }).slice(0,6);
  if(!hits.length) return;
  var t=document.createElement("div"); t.className="st-ta";
  t.innerHTML=hits.map(function(h){ return '<div class="opt" data-pick="'+which+'\u0001'+esc(h.email)+'"><b>'+esc(h.email)+'</b><span class="role">'+esc(h.role)+'</span></div>'; }).join("");
  inp.closest(".st-rfield").appendChild(t);
  t.querySelectorAll("[data-pick]").forEach(function(o){ o.addEventListener("mousedown", function(){ var p=o.getAttribute("data-pick").split("\u0001"); srAddRecip(p[0],p[1]); srCloseMenus(); }); });
}
function srUpdateSummary(){
  var el=document.getElementById("stRsum"); if(!el || !state.stmt) return;

/* Scale the real 600px email down to fit the (narrower) preview pane, so the
   whole statement is visible and nothing on the right edge - amounts, disclaimer
   - clips. The email that actually sends is unchanged; only the preview scales. */
function fitStmtFrame(){
  var fr=document.getElementById("stmtFrame"),
      inner=document.getElementById("stFrameInner"),
      wrap=document.getElementById("stFrameWrap");
  if(!fr || !inner || !wrap) return;
  var LOGICAL=624; // the email's true width (600px card + 12px padding each side)
  var avail=wrap.clientWidth-32; if(avail<80) avail=80; // pane width minus padding
  var s=Math.min(1, avail/LOGICAL);
  var h=0; try{ h = fr.contentDocument ? fr.contentDocument.body.scrollHeight : 0; }catch(e){}
  if(!h) h=900;
  fr.style.height=h+"px";
  fr.style.transform="scale("+s+")";
  inner.style.width=(LOGICAL*s)+"px";
  inner.style.height=(h*s)+"px";
}
window.addEventListener("resize", function(){
  var modal=document.getElementById("stmtModal");
  if(modal && modal.classList.contains("show")) fitStmtFrame();
});
document.addEventListener("mousedown", function(e){
  var modal=document.getElementById("stmtModal");
  if(!modal || !modal.classList.contains("show")) return;

function wireStmtModal(){
  var st = state.stmt; if(!st) return;
  var mode = st.mode || "view";
  var fr = document.getElementById("stmtFrame");
  if(fr){
    // Re-fit once the document lays out, then again after the logo image loads

    fr.onload = function(){ fitStmtFrame(); setTimeout(fitStmtFrame, 350); };
    fr.srcdoc = '<!DOCTYPE html><html><head><meta charset="utf-8">' +
      '<style>body{margin:0;padding:0;background:#FAFBF8;}</style></head><body>' +
      statementHtml(st._a, st.period, st.note, {preview:true}) + '</body></html>';
  }
  if(mode === "send"){ srRenderRecip("to"); srRenderRecip("cc"); srRenderRecip("bcc"); srUpdateSummary(); }

  var note = document.getElementById("stNote");
  if(note) note.addEventListener("input", function(){
    st.note = this.value;
    // Update the note block inside the iframe in place - no reload, no flicker.
    var d = fr && fr.contentDocument;
    if(d){ var n = d.getElementById("stmtNote"); if(n){ n.innerHTML = noteBlockHtml(st.note); fitStmtFrame(); } }
  });

  var close = function(){ state.stmt = null; renderStmtModal(); };
  var x = document.getElementById("stmtX");      if(x) x.onclick = close;
  var c = document.getElementById("stmtCancel");  if(c) c.onclick = close;
  var toSend = document.getElementById("stmtToSend");
  if(toSend) toSend.onclick = function(){ st.mode = "send"; renderStmtModal(); };
  var back = document.getElementById("stmtBack");
  if(back) back.onclick = close;
  var send = document.getElementById("stmtSend");
  if(send) send.onclick = function(){
    if(!st || st.sending) return;
    if(!st.to.length){ showNote("Add at least one To recipient before sending.", true); return; }
    var bcc = st.bcc.slice();
    if(bcc.map(function(x){ return x.toLowerCase(); }).indexOf(BCC.toLowerCase()) === -1) bcc.push(BCC);
    st.sending = true;
    renderStmtModal();

    /* Sent by the MONITOR script - SendGrid lives there. POSTed, not sent as a
       GET URL, because a many-invoice statement's HTML is far too large for a
       URL; the outcome is read back by token inside postSendEmail. */
    postSendEmail({
      key:KEY,
      to: st.to.join(", "), cc: st.cc.join(", "), bcc: bcc.join(", "),
      subject: st.subject,
      body: "Your WasteNet commission statement for " + stmtPeriodLabel(st.period) +
            " is below. Commission is calculated on payments received in this period.",
      html: statementHtml(st._a, st.period, st.note)
    }, function(data){
      if(!(data && data.ok)){
        st.sending = false;
        renderStmtModal();
        showNote(esc((data && data.error) || "Could not send the statement."), true);
        return;
      }
      jsonp({ action:"statement_sent", key:KEY, agent: st.agent, period: st.period,
              to: st.to.join(", "), payout: st.payout, boxes: st.boxes, invoices: st.invoices,
              by: "dashboard" }, function(rec){
        if(!state.statements) state.statements = {};
        state.statements[st.agent + "|" + st.period] =
          { at: new Date().toISOString(), to: st.to.join(", "), payout: st.payout };
        var name = st.name;
        state.stmt = null;
        renderStmtModal();
        renderBody();
        if(rec && rec.ok){
          showNote("Statement sent to " + esc(name) + ".", false);
        } else {
          showNote("Statement <b>WAS SENT</b> to " + esc(name) + ", but it could not be " +
                   "written to the Statement Log: " + esc((rec && rec.error) || "unknown") +
                   ". Do not send it again \u2014 it has gone.", true);
        }
      });
    });
  };
}

function stmtPeriodLabel(ym){
  var p = String(ym || "").split("-");
  if(p.length < 2) return ym || "";
  var mons = ["January","February","March","April","May","June","July",
              "August","September","October","November","December"];
  return mons[Number(p[1]) - 1] + " " + p[0];
}

/* ---- ONE BLOCK PER INVOICE, NOT A NINE-COLUMN TABLE ----
 *
 * Invoiced / Paid / Customer / Inv / Boxes / Monitoring / Cell fee / Rate /
 * Payout is nine columns, and nine columns do not fit in a 600px email. The
 * table was what forced the width, and the width was what pushed the banner and
 * the disclaimer off the edge. Shrinking the font would have bought a few
 * pixels and lost the argument.
 *
 * So the table is gone. Each invoice is a block: who and how much on top, the
 * invoice and its two dates underneath, then the arithmetic as three short
 * lines. Nothing is forced wide, so nothing can run off. A twenty-two invoice
 * month becomes a longer email rather than an illegible one.
 */

/* Group a doc's lines by rate, and reconcile them against the figure the
 * commission was actually based on.
 *
 * A statement whose line detail contradicts the payout above it hands the agent
 * an argument and us no defence. If they do not agree, we say the detail is
 * unavailable - which is true, and is the one thing that cannot mislead him. */
function invoiceLineSummary(doc, monitoringBase){
  var lines = (state.stmtLines || {})[doc] || [];
  if(!lines.length) return null;

  var groups = [], byKey = {}, charges = [];
  lines.forEach(function(L){
    if(L.kind === "HEADER") return;
    // A QuickBooks bundle header. Its components are the two lines under it, and
    // counting both the header and its children says the invoice is worth twice
    // what it is.
    if(L.bundle) return;
    if(L.kind === "CHARGE"){ charges.push(L); return; }   // never commissionable
    var key = String(L.rate == null ? "?" : L.rate);
    if(!byKey[key]){
      byKey[key] = { rate: L.rate, qty: 0, amount: 0, desc: L.desc || "" };
      groups.push(byKey[key]);
    }
    byKey[key].qty    += (L.qty == null ? 1 : L.qty);
    byKey[key].amount += (L.amount || 0);
  });

  var lineTotal = groups.reduce(function(t,g){ return t + g.amount; }, 0);
  // Half a cent of slack for floating point; anything more is a real disagreement.
  var agrees = Math.abs(lineTotal - (monitoringBase || 0)) < 0.005;

  return { groups: groups, charges: charges, lineTotal: lineTotal, agrees: agrees };
}

function stmtPeriodLabel(ym){
  var p = String(ym || "").split("-");
  if(p.length < 2) return ym || "";
  var mons = ["January","February","March","April","May","June","July",
              "August","September","October","November","December"];
  return mons[Number(p[1]) - 1] + " " + p[0];
}

/* "Jun 25" - a date a person reads, not one they parse. */
function stmtDay(d){
  var p = String(d || "").split("-");
  if(p.length !== 3) return d || "";
  var mons = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return mons[Number(p[1]) - 1] + " " + Number(p[2]);
}

function invoiceBlockHtml(i, first, linkable){
  var sum = invoiceLineSummary(i.doc, i.monitoring);
  var base = (i.monitoring || 0) - (i.fees || 0);

  var maths;
  if(sum && sum.agrees){
    maths = sum.groups.map(function(g){
      return fmtN(g.qty) + ' \u00d7 monitoring @ $' + fmt(g.rate == null ? 0 : g.rate) +
             ' &nbsp;=&nbsp; <b style="color:#1A1D1A;">$' + fmt(g.amount) + '</b>';
    }).join("<br>");
  } else {
    /* The lines and the payout disagree - so do not print both and let John
       work out which one we meant. Say the detail is unavailable, which is what
       is actually true, and give him the figure the money was calculated on. */
    maths = '$' + fmt(i.monitoring) + ' monitoring collected' +
            '<br><span style="color:#8A8F8A;font-size:11px;">'+
            'Line detail unavailable for this invoice \u2014 ask us and we will send it through.'+
            '</span>';
  }

  var chargeNote = (sum && sum.charges.length)
    ? '<br><span style="color:#854F0B;">' +
      sum.charges.map(function(c){
        return esc(c.desc || "one-time charge") + ' $' + fmt(c.amount) + ' \u2014 not commissionable';
      }).join('<br>') + '</span>'
    : '';

  return '<div style="border-top:'+ (first ? '2px solid #CFD4CA' : '1px solid #E4E7E0') +
           ';padding:13px 0 12px;">'+
    '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">'+
      '<tr>'+
        '<td style="font-size:14px;font-weight:bold;color:#1A1D1A;word-wrap:break-word;">'+ esc(i.customer) +
          (i.partial ? ' <span style="color:#854F0B;font-weight:normal;font-size:11px;">('+
            i.partial +'% paid)</span>' : '') + '</td>'+
        '<td align="right" style="font-size:16px;font-weight:bold;color:#27500A;white-space:nowrap;">$'+
          fmt(i.payout) +'</td>'+
      '</tr>'+
      '<tr><td colspan="2" style="font-size:11.5px;color:#8A8F8A;padding-top:3px;">'+
        'Invoice '+ (linkable ? invLink(i.doc, i.qboId) : esc(i.doc)) +' &nbsp;\u00b7&nbsp; invoiced '+ esc(stmtDay(i.invDate)) +
        ' &nbsp;\u00b7&nbsp; <b style="color:#3B6D11;">paid '+ esc(stmtDay(i.date)) +'</b>'+
      '</td></tr>'+
      '<tr><td colspan="2" style="padding-top:8px;">'+
        '<div style="background:#F6F7F3;border-radius:5px;padding:9px 11px;font-size:12px;'+
          'color:#525A60;line-height:1.75;">'+
          maths + chargeNote +
          '<br>less cellular fees, '+ fmtN(i.boxes) +' boxes \u00d7 $25 &nbsp;=&nbsp; '+
            '<b style="color:#A32D2D;">\u2212$'+ fmt(i.fees || 0) +'</b>'+
          '<br><span style="color:#8A8F8A;">$'+ fmt(base) +' \u00d7 '+
            Math.round((i.share || 0) * 100) +'% share</span> &nbsp;=&nbsp; '+
            '<b style="color:#27500A;">$'+ fmt(i.payout) +'</b>'+
        '</div>'+
      '</td></tr>'+
    '</table>'+
  '</div>';
}

function statementHtml(a, period, note, opts){
  var preview = !!(opts && opts.preview);   // review view omits logo + disclaimer
  var linkable = !!(opts && opts.linkable);  // clickable invoice # (dashboard review only)
  var invs = a.invoices || [];
  var blocks = invs.map(function(i, n){ return invoiceBlockHtml(i, n === 0, linkable); }).join("");
  var payTot = invs.reduce(function(t,i){ return t + (i.payout || 0); }, 0);

  var inner =
    '<div id="stmtNote">'+ noteBlockHtml(note) +'</div>'+
    '<div style="font-size:19px;font-weight:bold;color:#1A1D1A;">Commission Statement</div>'+
    '<div style="font-size:15px;color:#525A60;margin-top:3px;">'+ esc(a.name) +' \u00b7 '+
      esc(stmtPeriodLabel(period)) +'</div>'+

    '<div style="margin:18px 0;padding:11px 13px;background:#F4FAEC;border:1px solid #C0DD97;'+
      'border-radius:6px;font-size:12.5px;color:#27500A;line-height:1.6;">'+
      '<b>Commission is paid on money received, not on money invoiced.</b> '+
      'Every invoice below was paid during '+ esc(stmtPeriodLabel(period)) +'.'+
    '</div>'+

    blocks +

    '<div style="margin-top:6px;padding:14px 15px;background:#F4FAEC;border:1px solid #C0DD97;border-radius:6px;">'+
      '<table width="100%" cellpadding="0" cellspacing="0" border="0">'+
        '<tr>'+
          '<td style="font-size:13px;color:#1A1D1A;">Total commission for <b>'+
            esc(stmtPeriodLabel(period)) +'</b></td>'+
          '<td align="right" style="font-size:21px;font-weight:bold;color:#27500A;white-space:nowrap;">$'+
            fmt(payTot) +'</td>'+
        '</tr>'+
        '<tr><td colspan="2" style="font-size:11px;color:#525A60;padding-top:5px;">'+
          fmtN(invs.length) + (invs.length === 1 ? ' invoice' : ' invoices') +
          ' \u00b7 '+ fmtN(a.boxes) +' boxes \u00b7 cellular fees are $25 per box'+
        '</td></tr>'+
      '</table>'+
    '</div>';

  return '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#FAFBF8;padding:24px 12px;">'+
    '<tr><td align="center">'+
      /* table-layout:fixed is doing real work here.
       *
       * width="600" is only a HINT to an auto-layout table. The invoice blocks
       * carry white-space:nowrap on the payout cell, and a long customer name
       * next to it pushes the table's minimum width past 600 - so the table
       * quietly grows. Everything in the same cell inherits the wider box, which
       * is why the banner and the disclaimer - the only two long runs of text in
       * the email - stopped wrapping and ran off the edge, while the short blocks
       * looked perfectly fine.
       *
       * Fixed layout makes 600 a rule instead of a suggestion. Nothing can push
       * it wider, so nothing can escape it. */
      '<table width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;table-layout:fixed;background:#FFFFFF;border:1px solid #E4E7E0;border-radius:8px;">'+
        '<tr><td style="padding:26px 30px 22px;font-family:Arial,Helvetica,sans-serif;color:#1A1D1A;word-wrap:break-word;">'+ inner +'</td></tr>'+
        (preview ? '' :
        '<tr><td style="padding:0 30px 22px;"><img src="'+ LOGO +'" alt="WasteNet" width="150" style="display:block;border:0;"></td></tr>'+
        '<tr><td style="padding:16px 30px 22px;border-top:1px solid #E4E7E0;font-family:Arial,Helvetica,sans-serif;word-wrap:break-word;">'+
          '<div style="font-size:11px;font-weight:bold;color:#525A60;margin-bottom:5px;">Wasteflo, Inc. d.b.a. WasteNet</div>'+
          '<div style="font-size:10px;line-height:1.5;color:#8A8F8A;font-style:italic;">'+ DISCLAIMER +'</div>'+
        '</td></tr>')+
      '</table>'+
    '</td></tr></table>';
}

function agEmailHtml(a){
  var cfg = (state.agSettings || {})[a.agent] || {};
  var em = cfg.email || "";
  // Has this agent already had THIS month's statement? Without the answer the
  // two failure modes are sending it twice and never sending it at all, and
  // both are invisible from here.
  var sentInfo = (state.statements || {})[a.agent + "|" + state.agMonth];
  return '<div class="agmail' + (em ? "" : " none") + '">' +
      '<span class="agmail-l">Statements go to</span>' +
      (em
        ? '<span class="agmail-v">' + esc(em) + '</span>'
        : '<span class="agmail-v muted">no address yet</span>') +
      '<button class="agmail-e" data-agmail="' + esc(a.agent) + '" ' +
        'data-agname="' + esc(a.name) + '">' + (em ? "change" : "add one") + '</button>' +
      /* Only offered on a SINGLE MONTH. A year-to-date view has no month's
         invoices to itemise, and a statement you cannot itemise is a number
         with no argument behind it - exactly the thing an agent would query. */
      (em && state.agMonth
        ? '<button class="stmt-btn" data-stmt="' + esc(a.agent) + '">' +
            (sentInfo ? "View statement \u00b7 sent" : "View statement") + '</button>' +
          (sentInfo ? '<span class="stmt-sent">sent ' + esc(usDate(sentInfo.at.slice(0,10))) + '</span>' : '')
        : '') +
    '</div>' +
    (state.stmtFetching === a.agent
      ? '<div class="agfetch"><span class="agspin"></span>Fetching the invoice detail\u2026</div>'
      : '');
}

function wireStatementButtons(){
  document.querySelectorAll("[data-stmt]").forEach(function(el){
    el.onclick = function(e){
      e.stopPropagation();   // the agent header is a click target that collapses the card
      openStmtPreview(el.getAttribute("data-stmt"));
    };
  });
}

function wireAgentEmail(){
  document.querySelectorAll("[data-agmail]").forEach(function(el){
    el.onclick = function(e){
      e.stopPropagation();                       /* do not fold the panel shut */
      var code = el.getAttribute("data-agmail");
      var name = el.getAttribute("data-agname");
      var cur  = ((state.agSettings || {})[code] || {}).email || "";
      var to = prompt("Where should " + name + "'s commission statements be sent?\n\n" +
                      "This is kept on the Agent Settings tab \u2014 it is not a box contact, " +
                      "and it will not put " + name + " on any service email to a hauler.", cur);
      if(to === null) return;
      to = to.trim();
      if(to === cur) return;
      if(to && to.indexOf("@") === -1){ alert("That does not look like an email address."); return; }

      jsonp({ action:"set_agent_email", agent:code, email:to, key:KEY }, function(data){
        if(!data || !data.ok){
          alert("Could not save: " + ((data && data.error) || "no reply from the sheet"));
          return;
        }
        if(!state.agSettings) state.agSettings = {};
        if(!state.agSettings[code]) state.agSettings[code] = {};
        state.agSettings[code].email = to;
        renderBody();
      });
    };
  });
}

function renderAgents(){
  if(!state.agLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Working out payouts&hellip;</div>';
  }
  if(!state.agMonths.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  var yrList = state.agYears;
  var yr = state.agYear;
  var inYear = state.agMonths.filter(function(m){ return m.slice(0,4) === yr; });

  var md = agMonthData();
  var agents = md.agents;
  if(agents.length && !Object.keys(state.agOpen).length){ state.agOpen[agents[0].agent] = true; }

  var yrOpts = yrList.map(function(y){
    return '<option value="' + y + '"' + (yr === y ? " selected" : "") + '>' + y + '</option>';
  }).join("");

  var tabs = '<div class="folder-tabs">' +
    '<select class="ftab-yr' + (state.agMonth === "" ? " sel" : "") + '" id="agYr" aria-label="Year">' + yrOpts + '</select>' +
    inYear.map(function(m){
      return '<button class="ftab' + (state.agMonth === m ? " sel" : "") + '" ' +
             'data-agmonth="' + m + '">' + monthShort(m) + '</button>';
    }).join("") + '</div>';

  var total = agents.reduce(function(s,a){ return s + a.payout; }, 0);

  var body;
  var _agDetail = {};
  if(!agents.length){
    body = '<div class="empty-state">No commissionable payments in ' + (state.agMonth ? monthLabel(state.agMonth) : yr) + '.</div>';
  } else {
    body = agents.map(function(a){
      var open = state.agOpen[a.agent] ? " open" : "";

      /* The arithmetic, shown rather than asserted. If a number looks
         wrong, the working is right there to check it against. */
      /* With one rate the arithmetic can be stated outright. With two -
         Bob Bell has Costco at 25% and Hilton at 50% - a single "x 25%"
         would be a lie, so the per-invoice rates below do the talking. */
      var oneRate = (a.rates && a.rates.length === 1);

      var math = '<div class="agmath">' +
        '<b>$' + fmt(a.monitoring) + '</b> monitoring collected' +
        ' \u2212 <b>$' + fmt(a.fees) + '</b> cellular fees (' +
        fmtN(a.boxes) + ' boxes \u00d7 $25)' +
        ' = <b>$' + fmt(a.monitoring - a.fees) + '</b>' +
        (oneRate
          ? '<br>\u00d7 <b>' + Math.round(a.rates[0] * 100) + '%</b> share' +
            ' = <b>$' + fmt(a.payout) + '</b>'
          : '<br>paid at ' + (a.rates || []).map(function(r){
              return '<b>' + Math.round(r * 100) + '%</b>';
            }).join(' and ') + ' depending on the account' +
            ' \u2014 total <b>$' + fmt(a.payout) + '</b>') +
        '</div>';

      /* Name the invoices. "2 invoices contain a flagged line" is a dead
         end; "inv 6018 (Jun 2026), inv 5962 (Mar 2026)" can be looked up. */
      var flag = '';   // non-commissionable lines are already itemized in the statement below — no banner needed

      /* Year view: a month-by-month breakdown is what's useful.
         Month view: the individual invoices behind the number. */
      var table;
      if(md.isYear){
        table = '<table><thead><tr>' +
            '<th style="width:34%">Month</th>' +
            '<th style="width:22%" class="num">Boxes</th>' +
            '<th style="width:22%" class="num">Invoices</th>' +
            '<th style="width:22%" class="num">Payout</th>' +
          '</tr></thead><tbody>' +
          a.months.map(function(m){
            return '<tr>' +
              '<td>' + monthLabel(m.month) + '</td>' +
              '<td class="num">' + fmtN(m.boxes) + '</td>' +
              '<td class="num muted">' + m.invoices + '</td>' +
              '<td class="num">$' + fmt(m.payout) + '</td>' +
            '</tr>';
          }).join("") + '</tbody></table>';
      } else {
        table = '<table><thead><tr>' +
            '<th style="width:14%">Date</th>' +
            '<th style="width:31%">Customer</th>' +
            '<th style="width:11%">Invoice</th>' +
            '<th style="width:10%" class="num">Boxes</th>' +
            '<th style="width:14%" class="num">Monitoring</th>' +
            '<th style="width:8%" class="num">Rate</th>' +
            '<th style="width:14%" class="num">Payout</th>' +
          '</tr></thead><tbody>' +
          a.invoices.map(function(i){
            return '<tr>' +
              '<td class="muted">' + esc(usDate(i.date)) + '</td>' +
              '<td title="' + esc(i.customer) + '">' + esc(i.customer) +
                (i.partial ? ' <span class="chip chip-30">' + i.partial + '% paid</span>' : '') + '</td>' +
              '<td>' + invLink(i.doc, i.qboId) + '</td>' +
              '<td class="num">' + fmtN(i.boxes) + '</td>' +
              '<td class="num">$' + fmt(i.monitoring) + '</td>' +
              '<td class="num muted">' + Math.round((i.share || 0) * 100) + '%</td>' +
              '<td class="num">$' + fmt(i.payout) + '</td>' +
            '</tr>';
          }).join("") + '</tbody></table>';
      }

      var _em = ((state.agSettings||{})[a.agent]||{}).email || "";
      if(state.agMonth){
        _agDetail[a.agent] =
          (state.stmtFetching===a.agent ? '<div class="agfetch"><span class="agspin"></span>Loading itemization\u2026</div>' : '') +
          flag +
          '<div class="ag-stmt-doc">' + statementHtml(a, state.agMonth, "", {preview:true, linkable:true}) + '</div>';
      } else {
        _agDetail[a.agent] = '<div class="ag-annual">' + math + flag + table + '</div>';
      }
      return '<div class="agrow' + open + '" data-agent="' + a.agent + '">' +
          '<div class="aghead">' +
            '<span class="agcaret">\u25B6</span>' +
            '<span class="agname">' + esc(a.name) + '</span>' +
            '<span class="agshare">' + shareLabel(a) + '</span>' +
            '<span class="agmeta">' + fmtN(a.boxes) + ' boxes \u00b7 ' +
              (md.isYear ? a.months.length + ' mo' : a.invoices.length + ' inv') + '</span>' +
            '<span class="agpay">$' + fmt(a.payout) + '</span>' +
          '</div>' +
        '</div>';
    }).join("");
  }

  /* Payments from customers who map to no agent. Left unsaid, this is
     somebody's commission quietly going missing. */
  var orphan = '';
  if(md.unmapped && md.unmapped.length){
    var when = state.agMonth ? monthLabel(state.agMonth) : yr;

    orphan = '<div class="agflag" style="margin-top:14px;">' +
      '<b>' + md.unmapped.length + ' customer(s) paid in ' + when +
        ' but map to no agent.</b><br>' +
      md.unmapped.slice(0,8).map(function(u){
        // In the year view, say which months - otherwise "$2,200 in 2025"
        // leaves you hunting through twelve tabs for it.
        var ms = (u.months && u.months.length)
          ? ' <span style="opacity:.75">(' +
              u.months.slice(0,4).map(monthShort).join(', ') +
              (u.months.length > 4 ? ', +' + (u.months.length - 4) : '') + ')</span>'
          : '';
        return esc(u.customer) + ' \u2014 $' + fmt(u.amount) + ms;
      }).join('<br>') +
      (md.unmapped.length > 8 ? '<br>\u2026and ' + (md.unmapped.length - 8) + ' more' : '') +
      '<br><br>If any of these belong to an agent, add them to the Agent Map tab.' +
      '</div>';
  }

  var _selA = agents.filter(function(x){return state.agOpen[x.agent];})[0];
  var selName = _selA ? _selA.name : 'Select an agent';
  var selAgent = _selA ? _selA.agent : '';
  var selEmail = _selA ? (((state.agSettings||{})[_selA.agent]||{}).email || '') : '';
  return '<div class="folder">' +
      '<div class="ag-topbar">' +
        '<div class="ag-hd ag-hd-list"><div class="ag-hd-title">Agent Payouts</div>' +

          ' \u00b7 ' + agents.length + ' agents \u00b7 $' + fmt(total) + ' total</div></div>' +
        '<div class="ag-hd ag-hd-detail">' +
          '<div class="ag-hd-drow">' +

          '</div>' +
          (_selA ? '<div class="ag-hd-email">' +
            (selEmail ? '<span class="ag-hd-em">'+esc(selEmail)+'</span>' : '<span class="ag-hd-em muted">no address yet</span>') +
            '<button class="agmail-e" data-agmail="'+esc(selAgent)+'" data-agname="'+esc(selName)+'">'+(selEmail?"edit":"add")+'</button>' +

}

function fmt(n){
  return (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtN(n){
  n = Number(n)||0;
  return n % 1 === 0 ? String(n) : n.toFixed(1);
}

/* An agent may be paid at more than one rate - the exception lives on the
   account, not the person. Show every rate rather than picking one. */
function shareLabel(a){
  var r = (a.rates && a.rates.length) ? a.rates : [a.share];
  return r.map(function(x){ return Math.round(x * 100) + '%'; }).join(' / ');
}

/* Fetch a whole year. ~600 commissionable payments - months are then
   switched on the client with no further requests. */
function loadPayouts(year, then){
  if(state.agLoading) return;
  state.agLoading = true;

  jsonp({ action:"payouts", key:KEY, year: year || "" }, function(data){
    state.agLoading = false;
    if(!data || !data.ok){
      showError((data && data.error) || "Could not work out payouts.");
      return;
    }
    document.getElementById("banner").className = "banner";

    /* keyed by agent code, so agEmailHtml() can look one up */
    state.agSettings = {};
    (data.settings || []).forEach(function(s){ state.agSettings[s.agent] = s; });
    // Which statements have already gone out. Keyed "AGENT|2026-07".
    state.statements = data.statements || {};

    state.agMonths = data.months || [];
    state.agYears  = data.years  || [];
    state.agYear   = data.year   || state.agYear;
    state.agByYear[state.agYear] = data.byMonth || {};
    state.agLoaded = true;

    // Land on the newest month that actually has payments in this year.
    // Land on the full-year view. It answers "what did each agent make
    // this year" without a click, and the months are one tap away.
    state.agMonth = "";

    /* Financials waits on this. Tell it rather than making it poll. */
    if(then){ then(); return; }

    renderSummary();
    renderBody();
  });
}

function wireAgents(){
  /* The whole year is loaded, so switching months is a lookup. No spinner,
     no request. */
  document.querySelectorAll(".ftab[data-agmonth]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-agmonth");   // "" = the year view
      if(m === state.agMonth) m = "";   // click active month -> back to full year
      state.agMonth = m;
      state.agOpen = {};
      renderSummary();
      renderBody();
    };
  });

  var yr = document.getElementById("agYr");
  if(yr){
    yr.onmousedown = function(e){
      if(state.agMonth){ e.preventDefault(); state.agMonth = ""; state.agOpen = {}; renderSummary(); renderBody(); }
    };
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.agYear) return;
      state.agYear = y;
      state.agMonth = "";      // show the new year's full-year view
      state.agOpen = {};

      if(state.agByYear[y]){          // already fetched - nothing to wait for
        renderSummary();
        renderBody();
      } else {
        document.getElementById("body").innerHTML =
          '<div class="empty-state"><span class="spinner"></span>Working out ' + y + '&hellip;</div>';
        loadPayouts(y);
      }
    };
  }

  document.querySelectorAll(".agrow").forEach(function(el){
    var head = el.querySelector(".aghead");
    if(!head) return;
    head.onclick = function(){
      var k = el.getAttribute("data-agent");
      state.agOpen = {}; state.agOpen[k] = true;
      renderBody();
    };
  });

  wireAgentEmail();
  wireStatementButtons();

  document.querySelectorAll("[data-emailstmt]").forEach(function(el){
    el.onclick = function(){ openStmtPreview(el.getAttribute("data-emailstmt"), "send"); };
  });
  var _openA = Object.keys(state.agOpen || {})[0];
  if(_openA && state.agMonth) ensureAgentLines(_openA);
}

function refreshAgStmt(){
  if(!state.agMonth) return;
  var agent = Object.keys(state.agOpen || {})[0];
  if(!agent) return;
  var md = agMonthData();
  var a = (md.agents || []).filter(function(x){ return x.agent === agent; })[0];
  if(!a) return;
  var doc = document.querySelector(".ag-detail .ag-stmt-doc");
  if(doc) doc.innerHTML = statementHtml(a, state.agMonth, "", {preview:true, linkable:true});
  var note = document.querySelector(".ag-detail .agfetch");
  if(note) note.parentNode.removeChild(note);
}
function fitAgStmt(){
  var fr=document.getElementById("agStmtFrame"),
      inner=document.getElementById("agStmtInner"),
      wrap=document.getElementById("agStmtWrap");
  if(!fr || !inner || !wrap) return;
  var LOGICAL=624;
  var avail=wrap.clientWidth; if(avail<80) avail=80;
  var s=Math.min(1, avail/LOGICAL);
  var h=0; try{ h = fr.contentDocument ? fr.contentDocument.body.scrollHeight : 0; }catch(e){}
  if(!h) h=900;
  fr.style.width=LOGICAL+"px";
  fr.style.height=h+"px";
  fr.style.transform="scale("+s+")";
  fr.style.transformOrigin="top left";
  inner.style.width=(LOGICAL*s)+"px";
  inner.style.height=(h*s)+"px";
}

function ensureAgentLines(agent){
  if(!state.agMonth || !agent) return;
  var md = agMonthData();
  var a = (md.agents || []).filter(function(x){ return x.agent === agent; })[0];
  if(!a) return;
  var docs = (a.invoices || []).map(function(i){ return i.doc; }).filter(Boolean);
  if(!docs.length) return;
  state.stmtLines = state.stmtLines || {};
  var need = docs.filter(function(d){ return !(d in state.stmtLines); });
  if(!need.length || state.stmtFetching === agent) return;
  state.stmtFetching = agent;
  jsonp({ action:"invoice_lines", key:KEY, docs: need.join(",") }, function(data){
    if(state.stmtFetching === agent) state.stmtFetching = null;
    var L = (data && data.ok && data.lines) ? data.lines : {};
    need.forEach(function(d){ state.stmtLines[d] = (L[d] !== undefined ? L[d] : null); });
    if(state.section === "agents") refreshAgStmt();
  });
}

/* ---------- payments ---------- */
function renderCollections(){
  if(!state.colLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading payments\u2026</div>';
  }
  if(!state.months.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  /* months in the loaded year, newest first */
  var shown = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });

  /* Each option carries what that year collected, so the totals are visible
     in the list itself. Sits in the tabs row, left of the months - same as
     the year dropdown on Billing. */
  var yrOpts = state.years.map(function(y){
    return '<option value="' + y.year + '"' + (state.year === y.year ? " selected" : "") + '>' +
             y.year + '  \u00b7  ' + moneyShort(y.total) + '</option>';
  }).join("");

  var tabs = '<div class="folder-tabs">' +
    '<select class="ftab-yr" id="yrSel" aria-label="Year">' + yrOpts + '</select>' +
    shown.map(function(m){
      return '<button class="ftab' + (state.month === m.month ? " sel" : "") + '" ' +
             'data-month="' + m.month + '">' + monthShort(m.month) + '</button>';
    }).join("") + '</div>';

  /* Payments for the loaded year are already here - slice by month with no
     round trip. */
  var rows = (state.payByYear[state.year] || []).filter(function(p){
    return String(p.txnDate).slice(0,7) === state.month;
  });

  if(state.colSearch){
    var q = state.colSearch.toLowerCase();
    rows = rows.filter(function(p){
      return String(p.customer).toLowerCase().indexOf(q) !== -1 ||
             String(p.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.colSortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.colSortKey){
      case "cust":   av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "inv":    av = String(a.docNumber); bv = String(b.docNumber); break;
      case "amount": av = Number(a.amount)||0; bv = Number(b.amount)||0; break;
      default:       av = String(a.txnDate); bv = String(b.txnDate);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  /* Land on the first payment that is tied to an invoice - a credit or an
     unapplied prepayment has no invoice to show on the right. */
  var docd = rows.filter(function(p){ return p.docNumber; }).map(function(p){ return String(p.docNumber); });
  if(!state.pmSel || docd.indexOf(String(state.pmSel)) === -1){
    state.pmSel = docd.length ? docd[0] : "";
  }

  var caret = function(k){
    if(state.colSortKey !== k) return "";
    return ' <span class="sc">' + (state.colSortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<div class="rc-head">' +
      '<span class="pm-date" data-pmsort="date">Date'     + caret("date")   + '</span>' +
      '<span class="pm-cust" data-pmsort="cust">Customer' + caret("cust")   + '</span>' +
      '<span class="pm-inv"  data-pmsort="inv">Invoice'   + caret("inv")    + '</span>' +
      '<span class="pm-amt"  data-pmsort="amount">Amount' + caret("amount") + '</span>' +
    '</div>';

  var body;
  if(!rows.length){
    body = head + '<div class="empty-state">' +
      (state.colSearch ? "No payment matches that." : "No payments in this month.") + '</div>';
  } else {
    body = head + rows.map(function(p){
      var cells =
        '<span class="pm-date">' + esc(usDate(p.txnDate)) + '</span>' +
        '<span class="pm-cust" title="' + esc(p.customer) + '">' + esc(p.customer) + '</span>';
      if(p.docNumber){
        var sel = String(p.docNumber) === String(state.pmSel);
        return '<div class="agrow' + (sel ? " open" : "") + '" data-pmrow="' + esc(p.docNumber) + '">' +
          '<div class="aghead">' + cells +
            '<span class="pm-inv">' + esc(p.docNumber) + '</span>' +
            '<span class="pm-amt">' + money(p.amount) + '</span>' +
          '</div>' +
        '</div>';
      }
      /* Credit / prepayment - no invoice, so the row is not selectable. */
      return '<div class="agrow pm-unapplied">' +
          '<div class="aghead">' + cells +
            '<span class="pm-inv"><span class="chip chip-30">unapplied</span></span>' +
            '<span class="pm-amt">' + money(p.amount) + '</span>' +
          '</div>' +
        '</div>';
    }).join("");
  }

  var total = rows.reduce(function(s,p){ return s + (Number(p.amount)||0); }, 0);
  var noteLine = monthLabel(state.month) + ' \u00b7 ' + rows.length +
    ' payment' + (rows.length === 1 ? "" : "s") + ' \u00b7 ' + moneyShort(total);

  var green;
  if(state.pmSel && ivCache[state.pmSel]){
    green = rcPaneHtml(ivCache[state.pmSel]);
  } else if(state.pmSel){
    green = '<div class="empty-state"><span class="spinner"></span>Loading invoice\u2026</div>';
  } else {
    green = '<div class="ag-pane-empty">Select a payment on the left to view its invoice here.</div>';
  }

  return '<div class="folder rc-folder pm-folder">' +
      '<div class="ag-topbar">' +
        '<div class="ag-hd ag-hd-list">' +
          '<div class="ag-hd-drow"><div class="ag-hd-title">Payments</div>' +
            '<input class="search bsearch-hd" id="colSearch" type="text" placeholder="Search customer or #" value="' + esc(state.colSearch) + '"></div>' +
          '<div class="ag-hd-note">' + noteLine + '</div>' +
        '</div>' +
        '<div class="ag-hd ag-hd-detail"><div class="ag-hd-title">Invoice View</div></div>' +
      '</div>' +
      '<div class="ag-split"><div class="ag-list-col">' +
        '<div class="pinhead" id="pinhead">' + tabs + '</div>' +
        '<div class="folder-lower">' + body + '</div>' +
