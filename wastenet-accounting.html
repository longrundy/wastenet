<!DOCTYPE html>
<!-- wastenet-accounting · build 2026-07-11-b · tabs + slimbar + fast load -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet Accounting</title>
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B; --amber-tint:#FAEEDA;
    --coral:#D85A30; --coral-dark:#712B13; --coral-tint:#FAECE7;
    --red:#E24B4A; --red-dark:#A32D2D; --red-darker:#791F1F; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --radius:10px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font); background:var(--page); color:var(--ink);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 60px;}

  /* top card - header + scorecard. Scrolls away normally. */
  .topcard{border:0.5px solid var(--line); border-radius:12px; background:var(--card); padding:12px 16px 15px; margin-bottom:16px;}

  /* Fixed slim bar - always in the DOM, hidden until scrolled. Fades in
     via opacity/visibility (no layout change), so showing it can never
     shift the page or feed back into the scroll. Same approach as the
     monitor page. */
  .slimbar{position:fixed; left:0; right:0; top:0; z-index:40; background:var(--card); border-bottom:0.5px solid var(--line-strong); box-shadow:0 3px 12px rgba(0,0,0,0.10); opacity:0; visibility:hidden; transition:opacity .15s ease, visibility .15s ease;}
  .slimbar.show{opacity:1; visibility:visible;}
  .slimbar-inner{max-width:820px; margin:0 auto; padding:8px 16px;}
  .slimbar .header-bar{margin-bottom:8px;}
  .slimbar .score-groups{grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px;}
  .slimbar .score-half{padding:5px 6px; display:flex; align-items:baseline; justify-content:center; gap:5px;}
  .slimbar .score-half-n{font-size:15px; margin-top:0;}
  .slimbar .score-half-l{font-size:10.5px; margin-top:0;}

  .header-bar{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .brand{display:flex; align-items:center; gap:10px; min-width:0;}
  .brand-name{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); flex:0 0 auto;}
  .brand-div{width:1px; height:16px; background:var(--line-strong); flex:0 0 auto;}
  .header-right{display:flex; align-items:center; gap:8px; flex:0 0 auto;}

  .viewnav{position:relative; flex:0 0 auto;}
  .view-label{font-size:13px; color:var(--ink-2); background:transparent; border:none; padding:2px 4px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-family:var(--font);}
  .view-label:hover{color:var(--ink);}
  .view-caret{font-size:9px; color:var(--ink-3);}
  .view-drop{position:absolute; top:100%; left:0; margin-top:6px; background:var(--card); border:0.5px solid var(--line-strong); border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,0.10); min-width:190px; z-index:60; display:none; overflow:hidden;}
  .view-drop.open{display:block;}
  .view-opt{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13px; color:var(--ink); background:transparent; border:none; cursor:pointer; font-family:var(--font);}
  .view-opt:hover{background:var(--panel);}
  .view-opt.cur{color:var(--green-dark); font-weight:600; background:var(--green-tint-2);}

  .btn{font-size:12px; font-weight:500; color:var(--ink); background:var(--card); border:0.5px solid var(--line-strong); padding:6px 9px; border-radius:16px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:background .12s; font-family:var(--font);}
  .btn:hover{background:var(--panel);}
  .stamp{font-size:11px; color:var(--ink-3); white-space:nowrap;}

  /* scorecard */
  .summary{margin-top:12px;}
  .score-groups{display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px;}
  .score-group-label{font-size:10.5px; color:var(--ink-3); text-align:center; margin-bottom:4px; letter-spacing:0.02em;}
  .score-btn{display:flex; border:0.5px solid var(--line); border-radius:12px; overflow:hidden;}
  .score-btn > .score-half:first-child{border-right:0.5px solid var(--line);}
  .score-half{flex:1; min-width:0; padding:11px 6px; text-align:center;}
  .score-half-n{font-size:20px; font-weight:600; letter-spacing:-0.01em; line-height:1.15; margin-top:2px;}
  .score-half-l{font-size:11px; color:var(--ink-2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .n-ink{color:var(--ink);}
  .n-red{color:var(--red-dark);}
  .n-green{color:var(--green-dark);}

  /* aging tabs - selectable, like the monitor's pickup-date tabs */
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .tab{
    font-size:12px; font-weight:500; font-family:var(--font);
    color:var(--ink-2); background:var(--card);
    border:0.5px solid var(--line-strong); border-radius:16px;
    padding:6px 12px; cursor:pointer; white-space:nowrap;
    display:inline-flex; align-items:baseline; gap:6px;
    transition:background .12s, border-color .12s, color .12s;
  }
  .tab:hover{background:var(--panel);}
  .tab.on{background:var(--green); border-color:var(--green); color:#fff;}
  .tab-n{font-size:11px; opacity:0.75;}
  .tab.on .tab-n{opacity:0.9;}

  /* table */
  .tablecard{border:0.5px solid var(--line); border-radius:14px; background:var(--card); padding:14px 16px 6px;}
  .tablehead{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .tabletitle{font-size:14px; font-weight:600;}
  .search{font-size:12px; padding:6px 10px; border:0.5px solid var(--line-strong); border-radius:16px; width:170px; outline:none; font-family:var(--font); color:var(--ink); background:var(--card);}
  .search:focus{border-color:var(--green);}

  table{width:100%; border-collapse:collapse; table-layout:fixed;}
  th{font-size:11px; font-weight:600; color:var(--ink-2); text-align:left; padding:7px 4px; border-bottom:0.5px solid var(--line-strong); cursor:pointer; user-select:none; white-space:nowrap;}
  th:hover{color:var(--ink);}
  th .sc{color:var(--ink-3); font-size:9px;}
  td{padding:9px 4px; border-bottom:0.5px solid var(--line); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel);}
  .num{text-align:right;}
  .muted{color:var(--ink-2);}

  .chip{display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; white-space:nowrap;}
  .chip-cur{background:var(--green-tint); color:var(--green-darker);}
  .chip-30{background:var(--amber-tint); color:var(--amber-dark);}
  .chip-60{background:var(--coral-tint); color:var(--coral-dark);}
  .chip-90{background:var(--red-tint); color:var(--red-dark);}
  .chip-90p{background:var(--red-tint); color:var(--red-darker);}

  .empty-state{text-align:center; padding:36px 16px; color:var(--ink-2); font-size:13px;}
  .banner{display:none; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner.show{display:block; background:var(--red-tint); color:var(--red-darker); border:0.5px solid var(--red);}
  .spinner{display:inline-block; width:13px; height:13px; border:2px solid var(--line-strong); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin-right:7px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* lock screen */
  .lock{position:fixed; inset:0; z-index:100; background:var(--page); display:flex; align-items:center; justify-content:center; padding:20px;}
  .lock.hide{display:none;}
  .lock-card{width:min(360px,100%); background:var(--card); border:0.5px solid var(--line-strong); border-radius:12px; padding:24px; text-align:center; box-shadow:0 3px 14px rgba(0,0,0,0.07);}
  .lock-brand{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); margin-bottom:4px;}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:6px; font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:12px; padding:11px; font-size:14px; font-weight:600; border-radius:6px; border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font);}
  .lock-err{margin-top:12px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:6px; color:var(--red-dark); font-size:12.5px; font-weight:600;}

  @media (max-width:560px){
    .score-groups{grid-template-columns:1fr; gap:8px;}
    .search{width:110px;}
    th:nth-child(3), td:nth-child(3){display:none;}
  }
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-card">
    <div class="lock-brand">WASTENET</div>
    <div class="lock-sub">Enter the access code to continue.</div>
    <input class="lock-in" id="lockIn" type="password" placeholder="Access code" autofocus>
    <button class="lock-btn" id="lockBtn">Unlock</button>
    <div class="lock-err" id="lockErr" style="display:none;"></div>
  </div>
</div>

<div class="slimbar" id="slimbar"><div class="slimbar-inner" id="slimbarInner"></div></div>

<div class="wrap">

  <div class="topcard" id="topcard">
    <div class="header-bar">
      <div class="brand">
        <div class="brand-name">WASTENET</div>
        <div class="brand-div"></div>
        <div class="viewnav">
          <button class="view-label" id="viewBtn">Accounting Dashboard <span class="view-caret">&#9662;</span></button>
          <div class="view-drop" id="viewDrop">
            <button class="view-opt" id="goMonitor">Box Monitor Dashboard</button>
            <button class="view-opt cur">Accounting Dashboard</button>
          </div>
        </div>
      </div>
      <div class="header-right">
        <span class="stamp" id="stamp">Loading&hellip;</span>
        <button class="btn" id="refreshBtn" aria-label="Refresh">&#8635;</button>
      </div>
    </div>

    <div id="scoreSentinel" style="height:0; margin:0; padding:0;"></div>
    <div class="summary" id="summary"></div>
  </div>

  <div class="banner" id="banner"></div>

  <div id="body">
    <div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>
  </div>

</div>

<script>
/* ============================================================
   WasteNet Accounting - receivables view.

   Reads the `receivables` action, which returns ONLY the open
   invoices plus the counts the scorecard needs. The Invoices tab
   holds ~6,000 rows; shipping all of them to render ~140 was the
   whole reason this page used to load slowly.
   ============================================================ */

var API = "https://script.google.com/macros/s/AKfycbwvvAfVChkEJPlgz8c0iRbH23YIrtxM7SGjm5YgNz-kgs43N7hCGtd8nqBewJJOt8mV/exec";
var MONITOR_URL = "wastenet-monitor.html";

/* Access code. NOT hardcoded - this file's source is public on GitHub,
   so a baked-in key would protect nothing. Entered on the lock screen,
   held in sessionStorage for the tab session, sent with every request
   for the Apps Script to check server-side. Shares the same session
   entry as index.html and the monitor page. */
var KEY = (function(){
  try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; }
  catch(e){ return ""; }
})();

function lockOut(msg){
  try { sessionStorage.removeItem("wastenet_dashboard_key"); } catch(e){}
  KEY = "";
  var lock = document.getElementById("lock");
  var err  = document.getElementById("lockErr");
  if(lock) lock.classList.remove("hide");
  if(err){
    if(msg){ err.textContent = msg; err.style.display = "block"; }
    else { err.style.display = "none"; }
  }
  var inp = document.getElementById("lockIn");
  if(inp){ inp.value = ""; inp.focus(); }
}

var state = {
  invoices: [],      // open only
  paidCount: 0,
  age: "all",
  search: "",
  sortKey: "age",
  sortDir: "desc"
};

/* ---------- JSONP ---------- */
function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var s;
  var timeout = setTimeout(function(){
    cleanup();
    cb({ ok:false, error:"Request timed out. Check your connection." });
  }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){
    cleanup();
    if(data && data.authRequired){
      lockOut("That access code was not accepted. Please try again.");
      return;
    }
    cb(data);
  };
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);
  }).join("&");
  s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* ---------- helpers ---------- */
function money(n){
  n = Number(n) || 0;
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function moneyShort(n){
  n = Number(n) || 0;
  return "$" + Math.round(n).toLocaleString("en-US");
}
function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* Days past due. Zero or negative = not yet due. */
function daysOverdue(inv){
  if(!inv.dueDate) return 0;
  var due = new Date(inv.dueDate + "T00:00:00");
  if(isNaN(due.getTime())) return 0;
  var t = new Date();
  t = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  return Math.floor((t - due) / 86400000);
}

function bucketOf(inv){
  var d = daysOverdue(inv);
  if(d <= 0)  return "current";
  if(d <= 30) return "b30";
  if(d <= 60) return "b60";
  if(d <= 90) return "b90";
  return "b90p";
}

var BUCKETS = [
  { key:"current", label:"Current",    chip:"chip-cur"  },
  { key:"b30",     label:"1\u201330 days",  chip:"chip-30"   },
  { key:"b60",     label:"31\u201360 days", chip:"chip-60"   },
  { key:"b90",     label:"61\u201390 days", chip:"chip-90"   },
  { key:"b90p",    label:"90+ days",   chip:"chip-90p"  }
];

function chipFor(inv){
  var d = daysOverdue(inv);
  var b = bucketOf(inv);
  var meta = BUCKETS.filter(function(x){ return x.key === b; })[0];
  return '<span class="chip ' + meta.chip + '">' + (d <= 0 ? "Current" : d + "d") + '</span>';
}

/* ---------- render ---------- */
function summaryHTML(compact){
  var open = state.invoices;
  var outstanding = open.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);
  var pastDue = open.filter(function(i){ return daysOverdue(i) > 0; });
  var pastDueAmt = pastDue.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  return '<div class="score-groups">' +
      '<div>' +
        (compact ? '' : '<div class="score-group-label">receivables</div>') +
        '<div class="score-btn">' +
          '<div class="score-half">' +
            '<div class="score-half-n n-ink">' + moneyShort(outstanding) + '</div>' +
            '<div class="score-half-l">outstanding</div>' +
          '</div>' +
          '<div class="score-half">' +
            '<div class="score-half-n n-red">' + moneyShort(pastDueAmt) + '</div>' +
            '<div class="score-half-l">past due</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div>' +
        (compact ? '' : '<div class="score-group-label">invoices</div>') +
        '<div class="score-btn">' +
          '<div class="score-half">' +
            '<div class="score-half-n n-ink">' + open.length + '</div>' +
            '<div class="score-half-l">open</div>' +
          '</div>' +
          '<div class="score-half">' +
            '<div class="score-half-n n-green">' + state.paidCount.toLocaleString("en-US") + '</div>' +
            '<div class="score-half-l">paid</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function renderSummary(){
  document.getElementById("summary").innerHTML = summaryHTML(false);

  document.getElementById("slimbarInner").innerHTML =
    '<div class="header-bar">' +
      '<div class="brand"><div class="brand-name">WASTENET</div><div class="brand-div"></div>' +
        '<div style="font-size:13px; color:var(--ink-2);">Accounting Dashboard</div></div>' +
    '</div>' +
    summaryHTML(true);
}

function renderBody(){
  var open = state.invoices;

  var counts = {}, totals = {};
  BUCKETS.forEach(function(b){ counts[b.key] = 0; totals[b.key] = 0; });
  open.forEach(function(i){
    var k = bucketOf(i);
    counts[k] += 1;
    totals[k] += Number(i.balance) || 0;
  });

  /* tabs: All + each aging bucket */
  var tabs = '<div class="tabs">' +
    '<button class="tab' + (state.age === "all" ? " on" : "") + '" data-age="all">' +
      'All <span class="tab-n">' + open.length + '</span></button>' +
    BUCKETS.map(function(b){
      return '<button class="tab' + (state.age === b.key ? " on" : "") + '" data-age="' + b.key + '">' +
               b.label + ' <span class="tab-n">' + counts[b.key] + '</span></button>';
    }).join("") +
  '</div>';

  /* filter */
  var rows = open.slice();
  if(state.age !== "all"){
    rows = rows.filter(function(i){ return bucketOf(i) === state.age; });
  }
  if(state.search){
    var q = state.search.toLowerCase();
    rows = rows.filter(function(i){
      return String(i.customer).toLowerCase().indexOf(q) !== -1 ||
             String(i.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  /* sort */
  var dir = state.sortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.sortKey){
      case "inv":     av = String(a.docNumber); bv = String(b.docNumber); break;
      case "cust":    av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "due":     av = String(a.dueDate); bv = String(b.dueDate); break;
      case "balance": av = Number(a.balance)||0; bv = Number(b.balance)||0; break;
      default:        av = daysOverdue(a); bv = daysOverdue(b);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.sortKey !== k) return "";
    return ' <span class="sc">' + (state.sortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-sort="inv"     style="width:13%">Invoice'  + caret("inv")  + '</th>' +
      '<th data-sort="cust"    style="width:36%">Customer' + caret("cust") + '</th>' +
      '<th data-sort="due"     style="width:17%">Due'      + caret("due")  + '</th>' +
      '<th data-sort="balance" style="width:18%" class="num">Balance' + caret("balance") + '</th>' +
      '<th data-sort="age"     style="width:16%" class="num">Age' + caret("age") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="5" style="text-align:center; padding:26px 8px; color:var(--ink-2);">No invoices match.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(i){
      return '<tr>' +
        '<td class="muted">' + esc(i.docNumber) + '</td>' +
        '<td title="' + esc(i.customer) + '">' + esc(i.customer) + '</td>' +
        '<td class="muted">' + esc(i.dueDate || "\u2014") + '</td>' +
        '<td class="num">' + money(i.balance) + '</td>' +
        '<td class="num">' + chipFor(i) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var label = state.age === "all"
    ? "Open invoices"
    : BUCKETS.filter(function(b){ return b.key === state.age; })[0].label;

  var owed = rows.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  var table =
    '<div class="tablecard">' +
      '<div class="tablehead">' +
        '<div class="tabletitle">' + label +
          ' <span style="color:var(--ink-3); font-weight:400;">\u00b7 ' + moneyShort(owed) + '</span></div>' +
        '<input class="search" id="search" type="text" placeholder="Search customer or #" value="' + esc(state.search) + '">' +
      '</div>' +
      '<table>' + head + tbody + '</table>' +
    '</div>';

  document.getElementById("body").innerHTML = tabs + table;
  wireBody();
}

/* ---------- events ---------- */
function wireBody(){
  document.querySelectorAll(".tab").forEach(function(el){
    el.onclick = function(){
      state.age = el.getAttribute("data-age");
      renderBody();
    };
  });

  document.querySelectorAll("th[data-sort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-sort");
      if(state.sortKey === k){
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = k;
        state.sortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("search");
  if(s){
    s.oninput = function(){
      state.search = s.value;
      renderBody();
      var again = document.getElementById("search");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

function showError(msg){
  var b = document.getElementById("banner");
  b.textContent = msg;
  b.className = "banner show";
  document.getElementById("body").innerHTML =
    '<div class="empty-state">Couldn\'t load invoices.</div>';
}

/* ---------- load ---------- */
function load(){
  document.getElementById("stamp").textContent = "Loading\u2026";
  jsonp({ action:"receivables", key:KEY }, function(data){
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load invoices.");
      document.getElementById("stamp").textContent = "";
      return;
    }
    document.getElementById("banner").className = "banner";
    state.invoices  = data.invoices || [];
    state.paidCount = Number(data.paidCount) || 0;
    document.getElementById("stamp").textContent =
      (Number(data.totalCount) || 0).toLocaleString("en-US") + " invoices";
    renderSummary();
    renderBody();
  });
}

/* ---------- header ---------- */
var viewBtn  = document.getElementById("viewBtn");
var viewDrop = document.getElementById("viewDrop");
viewBtn.onclick = function(e){ e.stopPropagation(); viewDrop.classList.toggle("open"); };
document.addEventListener("click", function(){ viewDrop.classList.remove("open"); });
document.getElementById("goMonitor").onclick = function(){ window.location.href = MONITOR_URL; };
document.getElementById("refreshBtn").onclick = function(){ load(); };

/* ---------- slim bar ----------
   Watches a zero-height sentinel just above the scorecard. Once it
   scrolls above the viewport top, the fixed slim bar fades in. The bar
   is a separate fixed element, so showing it never shifts layout and
   can't feed back into the scroll. Same mechanism as the monitor page. */
(function(){
  var sentinel = document.getElementById("scoreSentinel");
  var slim = document.getElementById("slimbar");
  if(!sentinel || !slim) return;
  if("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      slim.classList.toggle("show", !entries[0].isIntersecting);
    }, { threshold:0 });
    io.observe(sentinel);
  } else {
    var onScroll = function(){
      slim.classList.toggle("show", sentinel.getBoundingClientRect().top <= 0);
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    onScroll();
  }
})();

/* ---------- lock screen ---------- */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.classList.add("hide");
    document.getElementById("lockErr").style.display = "none";
    load();
  }

  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){
    lock.classList.add("hide");
    load();
  } else {
    lockIn.focus();
  }
})();
</script>
