/* ---------- deposits ---------- */

/* The Frost statement, reconciled against the open invoices.
 *
 * This page NEVER writes to QuickBooks. It works out which invoices a
 * deposit paid and says so; Kim records the payment herself, in QBO, where
 * it belongs. The dashboard is doing the arithmetic nobody wants to do by
 * hand - not taking over the books.
 */

function depKey(d){ return d.date + "|" + d.amount + "|" + (d.desc || ""); }

function renderDeposits(){
  if(!state.loaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>';
  }

  /* Nothing pasted yet - explain the job, then get out of the way. The input
     lives in the gray column; the note about not touching QuickBooks sits in
     its own card in the green "Notes" pane on the right. */
  if(!state.dRows.length){
    return '<div class="folder rc-folder dz-folder">' +
        '<div class="ag-topbar">' +
          '<div class="ag-hd ag-hd-list"><div class="ag-hd-title">Deposits</div></div>' +
          '<div class="ag-hd ag-hd-detail"><div class="ag-hd-title">Notes</div></div>' +
        '</div>' +
        '<div class="ag-split"><div class="ag-list-col"><div class="dz-pad">' +
          '<div class="dz" id="dropZone">' +
            '<div class="dz-t">Drop the Frost CSV here</div>' +
            '<div class="dz-d">Or paste it below. Export from Frost Connect \u2014 ' +
              'account activity, CSV. Money going out is ignored.</div>' +
            '<input type="file" id="dFile" accept=".csv,text/csv" style="display:none;">' +
            '<button class="btn" id="dPickFile" style="margin-top:14px;">Choose a file</button>' +
          '</div>' +
          '<textarea class="dpaste" id="dPaste" rows="5" ' +
            'placeholder="\u2026or paste the CSV text here"></textarea>' +
          '<div style="text-align:right; margin-top:9px;">' +
            '<button class="btn" id="dGo">Match deposits</button>' +
          '</div>' +
        '</div></div>' +
        '<aside class="ag-detail"><div class="rc-iv-card"><div class="dz-note">' +
          '<b>Nothing here touches QuickBooks.</b> This works out which open invoices ' +
          'each deposit paid and shows you. Recording the payment stays a human ' +
          'decision, made in QuickBooks.' +
        '</div></div></aside></div>' +
      '</div>';
  }


  var all = state.dMatched;
  var isWork = function(r){
    return (r.kind === "ach" || r.kind === "check") && !r.recorded && r.candidates.length;
  };
  // Anonymous cheque slips - no payer in the export by nature. Their own
  // pile, so they stop burying the genuine anomalies below.
  var isChecks = function(r){
    return r.kind === "unknown" && r.checkSlip === true;
  };
  var isStuck = function(r){
    return ((r.kind === "ach" || r.kind === "check") && !r.recorded && !r.candidates.length)
           || (r.kind === "unknown" && !r.checkSlip);
  };
  var isDone = function(r){
    return r.kind === "paylink" || r.kind === "internal" || !!r.recorded;
  };

  var counts = {
    todo:   all.filter(isWork).length,
    checks: all.filter(isChecks).length,
    stuck:  all.filter(isStuck).length,
    done:   all.filter(isDone).length
  };

  var rows = all;
  if(state.dFilter === "todo")   rows = all.filter(isWork);
  if(state.dFilter === "checks") rows = all.filter(isChecks);
  if(state.dFilter === "stuck")  rows = all.filter(isStuck);
  if(state.dFilter === "done")   rows = all.filter(isDone);

  var chip = function(k, label, n){
    return '<button class="bchip' + (state.dFilter===k?" on":"") + '" data-df="' + k + '">' +
           label + ' \u00b7 ' + n + '</button>';
  };

  var total = rows.reduce(function(s,r){ return s + r.deposit.amount; }, 0);

  var body = rows.map(function(r){
    var d = r.deposit;
    var k = depKey(d);
    var picked = state.dPick[k];

    var tag, why = r.why || "";
    if(r.kind === "paylink")        tag = '<span class="chip chip-cur">pay-link \u00b7 done</span>';
    else if(r.kind === "internal")  tag = '<span class="chip chip-60">internal</span>';
    else if(r.kind === "unknown" && r.checkSlip) tag = '<span class="chip chip-60">check deposit</span>';
    else if(r.kind === "unknown")   tag = '<span class="chip chip-90">unknown payer</span>';
    else if(r.recorded)             tag = '<span class="chip chip-cur">recorded \u2713</span>';
    else if(r.tooMany)              tag = '<span class="chip chip-60">can\'t tell</span>';
    else if(!r.candidates.length)   tag = '<span class="chip chip-90">unexplained</span>';
    else if(r.candidates.length === 1) tag = '<span class="chip chip-30">record this</span>';
    else tag = '<span class="chip chip-30">' + r.candidates.length + ' possible</span>';

    /* Already recorded. Show the receipt - the payments Kim keyed, and when -
       so the confirmation can be believed rather than merely asserted. */
    var done = "";
    if(r.recorded){
      done = '<div class="ddone">' +
        '<span class="dd-t">Already recorded</span>' +
        r.recorded.map(function(p){
          return '<span class="dc-inv"><b>#' + esc(p.docNumber) + '</b> $' +
                 fmt(p.amount) + ' <span class="dc-amt">keyed ' + esc(usDate(p.date)) +
                 '</span></span>';
        }).join('') +
      '</div>';
    }

    /* The candidates. One is an answer; several is a question. Say which. */
    var cands = "";
    if(r.candidates.length){
      cands = '<div class="dcands">' +
        (r.candidates.length > 1
          ? '<div class="dhint">More than one set of customers adds up to this. ' +
            'Pick the right one \u2014 the dashboard cannot know which cheques were ' +
            'in the envelope.</div>'
          : '') +
        r.candidates.map(function(c, i){
          var on = (picked === i) || (r.candidates.length === 1);
          return '<button class="dcand' + (on ? " on" : "") + '" ' +
              'data-dpick="' + esc(k) + '" data-di="' + i + '">' +
              '<span class="dc-sum">$' + fmt(c.total / 100) + '</span>' +
              c.parts.map(function(p){
                /* More invoice ids than slots means a choice remains - two
                   identical invoices for the same customer, and only their
                   dates can say which one this cheque settled. */
                var ids = (p.docs.length > p.n)
                  ? '<b>#' + p.docs.join(' or #') + '</b>'
                  : '<b>#' + p.docs.join(' + #') + '</b>';
                return '<span class="dc-inv">' + ids + ' ' + esc(p.customer) +
                  ' <span class="dc-amt">' + (p.n > 1 ? p.n + ' \u00d7 ' : '') +
                  '$' + fmt(p.cents / 100) + '</span></span>';
              }).join('') +
            '</button>';
        }).join("") +
      '</div>';
    }

    return '<div class="drow' + (isDone(r) ? " quiet" : "") + '">' +
        '<div class="dmain">' +
          '<span class="dc-date">' + esc(usDate(d.date)) + '</span>' +
          '<span class="ddesc">' + (d.desc ? esc(d.desc) :
            '<i style="color:var(--ink-3)">no description \u2014 cheque deposit</i>') + '</span>' +
          '<span class="damt">$' + fmt(d.amount) + '</span>' +
          '<span class="dtag">' + tag + '</span>' +
        '</div>' +
        (r.customer ? '<div class="dwho">Bank names <b>' + esc(r.customer) + '</b>' +
           (r.aliasNote ? ' \u2014 <span style="color:var(--ink-3)">' + esc(r.aliasNote) + '</span>' : '') +
           '</div>' : '') +
        (why ? '<div class="dwhy">' + esc(why) + '</div>' : '') +
        done +
        cands +
      '</div>';
  }).join("");

  if(!rows.length) body = '<div class="empty-state">Nothing in this bucket.</div>';

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        '<div class="fbar">' +
          '<div class="fbar-t">' + all.length + ' deposits ' +
            '<span class="amt">\u00b7 ' + moneyShort(total) + ' shown</span></div>' +
          '<div class="bfilter">' +
            chip("todo",   "To record", counts.todo) +
            chip("checks", "Checks", counts.checks) +
            chip("stuck",  "Unexplained", counts.stuck) +
            chip("done",   "Nothing to do", counts.done) +
            chip("all",    "All",       all.length) +
          '</div>' +
          '<button class="btn" id="dReset">Start over</button>' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower" style="padding:10px 14px 8px;">' + body + '</div>' +
    '</div>';
}

function wireDeposits(){
  var go = function(text){
    var p = parseFrostCsv(text);
    if(p.error){ alert(p.error); return; }
    if(!p.rows.length){ alert("No deposits found in that file - only money going out."); return; }

    /* The statement has to be reconciled against the PAYMENTS Kim already
       keyed, not only against open invoices. A deposit she dealt with months
       ago has closed its invoice - searching open invoices for it finds
       nothing and says "no match", which is alarming and wrong. Fetch the
       payments recorded around these dates and ask the real question first:
       has this already been handled? */
    var dates = p.rows.map(function(r){ return r.date; }).sort();
    var from = dates[0], to = dates[dates.length - 1];

    document.getElementById("body").innerHTML =
      '<div class="empty-state"><span class="spinner"></span>Reading the books&hellip;</div>';

    jsonp({ action:"reconcile", key:KEY, from:from, to:to }, function(data){
      if(!data || !data.ok){
        alert("Couldn't read the payments: " + ((data && data.error) || "no reply"));
        state.dRows = []; renderBody(); return;
      }

      state.dRows    = p.rows;
      state.dMatched = matchDeposits(p.rows, data.open || [], data.payments || [], state.dPayers);
      state.dPick    = {};
      state.dFilter  = "todo";
      renderBody();
    });
  };

  var fileBtn = document.getElementById("dPickFile");
  var file    = document.getElementById("dFile");
  if(fileBtn && file){
    fileBtn.onclick = function(){ file.click(); };
    file.onchange = function(){
      var f = file.files && file.files[0];
      if(!f) return;
      var fr = new FileReader();
      fr.onload = function(){ go(String(fr.result || "")); };
      fr.readAsText(f);
    };
  }

  var zone = document.getElementById("dropZone");
  if(zone){
    zone.ondragover = function(e){ e.preventDefault(); zone.classList.add("over"); };
    zone.ondragleave = function(){ zone.classList.remove("over"); };
    zone.ondrop = function(e){
      e.preventDefault();
      zone.classList.remove("over");
      var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if(!f) return;
      var fr = new FileReader();
      fr.onload = function(){ go(String(fr.result || "")); };
      fr.readAsText(f);
    };
  }

  var goBtn = document.getElementById("dGo");
  var paste = document.getElementById("dPaste");
  if(goBtn && paste) goBtn.onclick = function(){ go(paste.value); };

  var reset = document.getElementById("dReset");
  if(reset) reset.onclick = function(){
    state.dRows = []; state.dMatched = []; state.dPick = {};
    renderBody();
  };

  document.querySelectorAll("[data-df]").forEach(function(el){
    el.onclick = function(){ state.dFilter = el.getAttribute("data-df"); renderBody(); };
  });

  /* Choosing between two combinations that both add up. The dashboard has
     done all it can here - it cannot know which cheques were in the
     envelope, and it should not pretend to. */
  document.querySelectorAll("[data-dpick]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-dpick");
      var i = Number(el.getAttribute("data-di"));
      state.dPick[k] = (state.dPick[k] === i) ? null : i;
      renderBody();
    };
  });
}

/* The Payer Map lives in the sheet, so it can be corrected without a
   deploy - a new customer, a new bank alias, a customer who switches from
   cheque to ACH. */
function loadPayers(){
  if(state.dPayersLoaded) return;
  jsonp({ action:"payers", key:KEY }, function(data){
    state.dPayers = (data && data.payers) || [];
    state.dPayersLoaded = true;
    if(state.section === "deposits") renderBody();
  });
}

/* ---------- financials ---------- */

/* Three numbers, one page: what came in, what CES cost, what the agents were
   paid. Everything else the company spends is real but is not on this page,
   and the page says so rather than letting a reader assume otherwise.

   BASIS - worth understanding before trusting the margin line.

   Revenue and commissions are CASH: money collected, and the share of that
   money the agents earned on it. Both come from the same two endpoints the
   Payments and Agents pages already use, so this page cannot disagree with
   those pages.

   CES is BILLED, not paid. Deliberately. What CES bills is the cost of
   monitoring the boxes that month, and it is steady - a base fee plus
   per-incident charges. What leaves the bank is whatever was sent, which is
   not the same thing: March 2026 paid nothing and April paid $15,000, while
   the real cost of both months was ordinary. Charting payments would show a
   cliff that never happened and a recovery that never happened. A pulse that
   jumps for no reason is worse than no pulse.

   So the margin mixes bases slightly. That is a choice, not an oversight. */

/* A month with no CES row is a month we cannot cost. Revenue and commissions
   still draw - they are known - but the margin does not, and the CES bar is
   left hollow. Treating a missing row as zero would print a 69% margin and
   call it the best month in company history. */
function finRows(){
  var yr = state.finYear;
  if(!yr) return [];

  var pay = state.agByYear[yr] || {};

  var rev = {};
  (state.months || []).forEach(function(m){
    if(String(m.month).slice(0,4) === yr) rev[m.month] = Number(m.total) || 0;
  });

  /* Every month any source knows about, so a month with revenue but no CES
     row still appears - hollow - rather than vanishing. */
  var keys = {};
  Object.keys(rev).forEach(function(k){ keys[k] = 1; });
  Object.keys(pay).forEach(function(k){ if(k.slice(0,4) === yr) keys[k] = 1; });
  Object.keys(state.finCes).forEach(function(k){ if(k.slice(0,4) === yr) keys[k] = 1; });

  /* Never show the current, in-progress month. Only part of its revenue has
     been collected and its CES statement has not arrived, so it would read
     as a cliff plus a hollow bar - both artifacts of the month not being
     over. Dropping it means the chart self-corrects: next month it fills in
     on its own. Past years are untouched; this only ever hides "now". */
  var now = new Date();
  var curMonth = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2);
  delete keys[curMonth];

  return Object.keys(keys).sort().map(function(m){
    var c = state.finCes[m];
    var comm = ((pay[m] && pay[m].agents) || []).reduce(function(s,a){
      return s + (Number(a.payout) || 0);
    }, 0);

    var revenue = rev[m] || 0;
    var billed  = c ? (Number(c.billed) || 0) : 0;
    var known   = !!c;
    var gross   = revenue - billed - comm;
    var invoiced = Number(state.finInv[m]) || 0;

    return {
      month:    m,
      revenue:  revenue,
      invoiced: invoiced,
      ces:      billed,
      comm:     comm,
      gross:    known ? gross : null,
      margin:   (known && revenue > 0) ? (gross / revenue) * 100 : null,
      known:    known
    };
  });
}

/* Hand-drawn SVG rather than a charting library. The page has no build step
   and no dependencies, and pulling one in for six bars would be the largest
   thing on it. */
function finChart(rows){
  if(!rows.length) return "";

  var W = 720, H = 250, L = 50, R = 42, T = 14, B = 26;
  var iw = W - L - R, ih = H - T - B;

  var max = 0;
  rows.forEach(function(r){ max = Math.max(max, r.revenue, r.invoiced, r.ces, r.comm); });
  if(max <= 0) max = 1;

  /* Round the ceiling up to a number a human would have picked, so the
     gridlines read $10k and $20k rather than $17,431. */
  var step = Math.pow(10, String(Math.round(max)).length - 1);
  var top  = Math.ceil(max / step) * step;
  if(top <= 0) top = step;

  var gw = iw / rows.length;
  var bw = Math.max(4, Math.min(15, (gw - 16) / 3));
  var y0 = T + ih;

  function yv(v){ return y0 - (Math.max(0, v) / top) * ih; }
  function ym(p){ return y0 - (p / 100) * ih; }

  var s = '<svg class="finsvg" viewBox="0 0 ' + W + ' ' + H + '" ' +
          'role="img" aria-label="Revenue, CES cost, agent commissions and gross margin by month">';

  // A faint band behind every other month, so it reads clearly which three bars
  // belong to one month.
  rows.forEach(function(r, i){
    if(i % 2 === 1){
      s += '<rect class="finband" x="' + (L + gw * i) + '" y="' + T + '" width="' + gw + '" height="' + ih + '"/>';
    }
  });

  var g, gy, gv;
  for(g = 0; g <= 4; g++){
    gy = T + (ih / 4) * g;
    gv = top - (top / 4) * g;
    s += '<line class="fingrid" x1="' + L + '" y1="' + gy + '" x2="' + (L + iw) + '" y2="' + gy + '"/>';
    s += '<text class="finax" x="' + (L - 8) + '" y="' + (gy + 4) + '" text-anchor="end">$' +
         Math.round(gv / 1000) + 'k</text>';
  }

  var p;
  for(p = 0; p <= 100; p += 25){
    s += '<text class="finax" x="' + (L + iw + 8) + '" y="' + (ym(p) + 4) + '">' + p + '%</text>';
  }

  rows.forEach(function(r, i){
    var cx = L + gw * i + gw / 2;
    var x0 = cx - (bw * 3 + 8) / 2;

    s += '<rect class="finbar b-rev" x="' + x0 + '" y="' + yv(r.revenue) +
         '" width="' + bw + '" height="' + Math.max(0, y0 - yv(r.revenue)) + '" rx="2"/>';
    s += '<rect class="finbar b-comm" x="' + (x0 + bw + 4) + '" y="' + yv(r.comm) +
         '" width="' + bw + '" height="' + Math.max(0, y0 - yv(r.comm)) + '" rx="2"/>';

    /* No CES row for this month. Draw the slot it would have filled as a
       dashed outline, so the absence is visible rather than silent. */
    if(r.known){
      s += '<rect class="finbar b-ces" x="' + (x0 + (bw + 4) * 2) + '" y="' + yv(r.ces) +
           '" width="' + bw + '" height="' + Math.max(0, y0 - yv(r.ces)) + '" rx="2"/>';
    } else {
      s += '<rect class="finbar b-none" x="' + (x0 + (bw + 4) * 2) + '" y="' + (y0 - 10) +
           '" width="' + bw + '" height="10" rx="2"/>';
    }

    s += '<text class="finax" x="' + cx + '" y="' + (H - 7) + '" text-anchor="middle">' +
         monthShort(r.month) + '</text>';
  });

  /* The billed line: what was invoiced each month, drawn behind everything
     as context. It is nearly flat - and that is the point. Collected bounces
     around it, and the gap between the two is the receivables swing, not a
     change in the business. Dashed, so it reads as a reference, not a series
     that competes with the bars. */
  var inv = rows.filter(function(r){ return r.invoiced > 0; });
  if(inv.length > 1){
    s += '<polyline class="fininv" points="' +
         rows.map(function(r, i){
           return r.invoiced > 0
             ? (L + gw * i + gw / 2) + ',' + yv(r.invoiced)
             : null;
         }).filter(Boolean).join(" ") + '"/>';
  }

  /* The margin line BREAKS at any month with no CES. It does not bridge the
     gap - bridging would draw a number nobody measured. */
  var seg = [], segs = [];
  rows.forEach(function(r, i){
    if(r.margin === null){
      if(seg.length) segs.push(seg);
      seg = [];
      return;
    }
    seg.push([L + gw * i + gw / 2, ym(r.margin)]);
  });
  if(seg.length) segs.push(seg);

  segs.forEach(function(sg){
    if(sg.length > 1){
      s += '<polyline class="finline" points="' +
           sg.map(function(pt){ return pt[0] + ',' + pt[1]; }).join(" ") + '"/>';
    }
    sg.forEach(function(pt){
      s += '<circle class="findot" cx="' + pt[0] + '" cy="' + pt[1] + '" r="3.5"/>';
    });
  });

  return s + '</svg>';
}

/* The year, in a sentence or three. Not a caption on one number - the shape
   of the whole twelve months: is billing steady, is collection lumpy, and if
   so, is one customer's timing the reason. Everything here is computed from
   data already on the page; nothing new is fetched. */
function finNarrative(rows, tRev, prevRev, prevYr, yr, cmp){
  var costed = rows.filter(function(r){ return r.known; });
  if(costed.length < 2) return "";

  var bits = [];
  cmp = cmp || {};

  /* 1. Direction, stated against the SAME months last year (tRev and prevRev
        are already computed that way in renderFinancials). */
  if(prevRev > 0 && tRev > 0){
    var d = ((tRev - prevRev) / prevRev) * 100;
    var word = Math.abs(d) < 3 ? "held roughly flat"
             : d > 0 ? "rose " + Math.round(d) + "%"
             : "fell " + Math.round(Math.abs(d)) + "%";
    bits.push("Collections " + word + " against the same months of " + prevYr + ".");
  }

  /* 1b. The two costs, versus the same months last year. This is the reason
         the cost cards now carry a delta - and the narrative says out loud
         which way each moved and, more importantly, whether MARGIN held. */
  function movePhrase(now, prev, have, noun){
    if(!have || !prev || !now) return null;
    var d = ((now - prev) / prev) * 100;
    if(Math.abs(d) < 3) return noun + " held about flat";
    return noun + (d > 0 ? " rose " : " fell ") + Math.round(Math.abs(d)) + "%";
  }
  var mCes  = movePhrase(cmp.ces,  cmp.prevCes,  cmp.cesHave,  "CES");
  var mComm = movePhrase(cmp.comm, cmp.prevComm, cmp.commHave, "commissions");
  if(mCes && mComm){
    bits.push("Against the same months last year, " + mCes + " and " + mComm + ".");
  } else if(mCes){
    bits.push("Against the same months last year, " + mCes + ".");
  } else if(mComm){
    bits.push("Against the same months last year, " + mComm + ".");
  }

  /* The verdict that matters most: did the MARGIN hold? Costs can both rise
     and margin still be fine if revenue kept pace. Say which happened. */
  if(cmp.marginHave && cmp.prevMargin && cmp.margin){
    var md = cmp.margin - cmp.prevMargin;   // percentage POINTS
    if(Math.abs(md) < 1){
      bits.push("Gross margin held steady at about " + Math.round(cmp.margin) +
                "\u00a2 on the dollar - the costs moved together with revenue, " +
                "so the shape of the business did not change.");
    } else {
      bits.push("Gross margin " + (md > 0 ? "improved" : "slipped") + " about " +
                Math.abs(Math.round(md)) + " point" + (Math.abs(Math.round(md)) === 1 ? "" : "s") +
                ", from " + Math.round(cmp.prevMargin) + "\u00a2 to " +
                Math.round(cmp.margin) + "\u00a2 on the dollar.");
    }
  }

  /* 2. Billed vs collected. If billing is steady but collection is not, say
        so plainly - it is the single most useful thing on the page. */
  var inv = rows.filter(function(r){ return r.invoiced > 0; });
  if(inv.length >= 3){
    var iVals = inv.map(function(r){ return r.invoiced; });
    var iMax = Math.max.apply(null, iVals), iMin = Math.min.apply(null, iVals);
    var iAvg = iVals.reduce(function(a,b){ return a+b; }, 0) / iVals.length;
    var billedSteady = (iMax - iMin) / iAvg < 0.25;   // within a quarter, month to month

    var cVals = rows.filter(function(r){ return r.revenue > 0; }).map(function(r){ return r.revenue; });
    var cMax = Math.max.apply(null, cVals), cMin = Math.min.apply(null, cVals);
    var cAvg = cVals.reduce(function(a,b){ return a+b; }, 0) / cVals.length;
    var collectSwings = (cMax - cMin) / cAvg > 0.4;    // swings more than 40%

    if(billedSteady && collectSwings){
      bits.push("Billing was steady all year - about " + moneyShort(iAvg) +
        " a month - while collections swung from " + moneyShort(cMin) + " to " +
        moneyShort(cMax) + ". That swing is payment timing, not the business " +
        "changing: the flat billed line is the truer picture of the work.");
    } else if(billedSteady){
      bits.push("Billing ran about " + moneyShort(iAvg) + " a month, steadily.");
    }
  }

  /* 3. Name the biggest single swing month, and - when the loaded payment
        year matches - the customer behind it. This is the SPM story, found
        rather than hard-coded. */
  var big = null;
  for(var i = 1; i < rows.length; i++){
    var jump = rows[i].revenue - rows[i-1].revenue;
    if(rows[i-1].revenue > 0 && (!big || Math.abs(jump) > Math.abs(big.jump))){
      big = { i: i, jump: jump, month: rows[i].month, prev: rows[i-1].month };
    }
  }

  if(big && Math.abs(big.jump) > 8000){
    var mover = biggestMover(big.prev, big.month, yr);
    var dir = big.jump > 0 ? "more than" : "less than";
    var line = monthShort(big.month) + " collected " + moneyShort(Math.abs(big.jump)) +
               " " + dir + " " + monthShort(big.prev);
    if(mover){
      line += " - largely " + mover.name + ", whose payments moved by " +
              moneyShort(Math.abs(mover.delta)) + " between the two months";
    }
    bits.push(line + ".");
  }

  if(!bits.length) return "";
  return '<div class="finnote finstory"><b>' + yr + ' at a glance.</b> ' +
         bits.join(" ") + '</div>';
}

/* Which customer's collections changed most between two months - the reason a
   month looks better or worse than its neighbour. Returns null unless the
   payment rows for this year happen to be loaded, so the narrative degrades
   to "no name" rather than guessing. */
function biggestMover(mPrev, mThis, yr){
  var rows = state.payByYear[yr];
  if(!rows || !rows.length) return null;

  var a = {}, b = {};
  rows.forEach(function(p){
    var m = String(p.txnDate || "").slice(0, 7);
    var who = p.customer || "?";
    if(m === mPrev) a[who] = (a[who] || 0) + (Number(p.amount) || 0);
    else if(m === mThis) b[who] = (b[who] || 0) + (Number(p.amount) || 0);
  });

  var best = null;
  var names = {};
  Object.keys(a).forEach(function(k){ names[k] = 1; });
  Object.keys(b).forEach(function(k){ names[k] = 1; });
  Object.keys(names).forEach(function(who){
    var delta = (b[who] || 0) - (a[who] || 0);
    if(!best || Math.abs(delta) > Math.abs(best.delta)) best = { name: who, delta: delta };
  });

  return (best && Math.abs(best.delta) > 3000) ? best : null;
}

function finCard(label, big, sub, cls, delta2, cls2){
  var line1 = '<div class="fin-s ' + (cls || "") + '">' + (sub || "\u2014") + '</div>';
  var line2 = delta2 ? '<div class="fin-s fin-d ' + (cls2 || "") + '">' + delta2 + '</div>' : "";
  return '<div class="fincell">' +
           '<div class="fin-l">' + label + '</div>' +
           '<div class="fin-n">' + big + '</div>' +
           line1 + line2 +
         '</div>';
}

function renderFinancials(){
  if(!state.finLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Working out the numbers&hellip;</div>';
  }

  var rows = finRows();
  if(!rows.length){
    return '<div class="empty-state">Nothing to show for ' + state.finYear + '.</div>';
  }

  var known   = rows.filter(function(r){ return r.known; });
  var missing = rows.filter(function(r){ return !r.known; });

  /* The totals cover only the months we can actually cost. Including a month
     with no CES row would understate cost and overstate margin. */
  var tRev  = known.reduce(function(s,r){ return s + r.revenue; }, 0);
  var tCes  = known.reduce(function(s,r){ return s + r.ces; }, 0);
  var tComm = known.reduce(function(s,r){ return s + r.comm; }, 0);
  var tGross = tRev - tCes - tComm;

  function pct(v){ return tRev > 0 ? (v / tRev * 100).toFixed(1) + "%" : "\u2014"; }

  /* Last year, but only the SAME months, so six months of this year are never
     compared against twelve of last. Every card compares like-for-like: the
     months costed THIS year, matched to the same months last year. If last
     year is missing a piece (no CES entered, payouts not loaded), that card's
     delta simply stays blank rather than comparing against a false zero. */
  var prevYr = String(Number(state.finYear) - 1);
  var mons = {};
  known.forEach(function(r){ mons[r.month.slice(5,7)] = 1; });
  function sameMonth(m){ return String(m).slice(0,4) === prevYr && mons[String(m).slice(5,7)]; }

  var prevRev = (state.months || []).filter(function(m){
    return sameMonth(m.month);
  }).reduce(function(s,m){ return s + (Number(m.total) || 0); }, 0);

  var prevCes = 0, prevCesHave = false;
  Object.keys(state.finCes).forEach(function(k){
    if(sameMonth(k)){ prevCes += Number(state.finCes[k].billed) || 0; prevCesHave = true; }
  });

  var prevComm = 0, prevCommHave = false;
  var pyPay = state.agByYear[prevYr];
  if(pyPay){
    Object.keys(pyPay).forEach(function(k){
      if(sameMonth(k)){
        prevCommHave = true;
        prevComm += ((pyPay[k] && pyPay[k].agents) || []).reduce(function(s,a){
          return s + (Number(a.payout) || 0);
        }, 0);
      }
    });
  }

  var prevGross = prevRev - prevCes - prevComm;
  var prevGrossHave = prevRev > 0 && prevCesHave && prevCommHave;

  /* One delta line, built the same way every time. `costUp` flips the colour:
     for a cost, growing is BAD (red) and shrinking is GOOD (green); for
     revenue and margin it is the other way round. Returns blank when there is
     no prior figure to compare against, so a card never invents a delta. */
  function deltaLine(now, prev, have, costUp){
    if(!have || !prev || !now) return { txt: "", cls: "" };
    var d = ((now - prev) / prev) * 100;
    var up = d >= 0;
    var txt = (up ? "\u2191 " : "\u2193 ") + Math.abs(d).toFixed(0) + "% vs " + prevYr;
    var good = costUp ? !up : up;   // for a cost, down is good
    return { txt: txt, cls: good ? "f-up" : "f-down" };
  }

  var dRev  = deltaLine(tRev,  prevRev,  prevRev > 0,   false);
  var dCes  = deltaLine(tCes,  prevCes,  prevCesHave,   true);
  var dComm = deltaLine(tComm, prevComm, prevCommHave,  true);
  var dGross= deltaLine(tGross,prevGross,prevGrossHave, false);

  /* Only offer years CES has been entered for - otherwise the page would
     invite a year it can only draw hollow. Derived from the CES data, so
     adding 2024 later widens the dropdown on its own, no code change. */
  var cesYears = {};
  Object.keys(state.finCes).forEach(function(m){ cesYears[m.slice(0,4)] = 1; });
  var yrOpts = (state.years || []).filter(function(y){
    return cesYears[y.year];
  }).map(function(y){
    return '<option value="' + y.year + '"' +
           (state.finYear === y.year ? " selected" : "") + '>' + y.year + '</option>';
  }).join("");

  var yrDrop = '<select id="finYr" class="finyr">' + yrOpts + '</select>';
  var legend =
    '<div class="finlegend finlegend-hd">' +
      '<span><i class="sw sw-rev"></i>Revenue</span>' +
      '<span><i class="sw sw-comm"></i>Commissions</span>' +
      '<span><i class="sw sw-ces"></i>CES</span>' +
      '<span><i class="sw sw-inv"></i>Billed</span>' +
      '<span><i class="sw sw-line"></i>Margin %</span>' +
    '</div>';

  var cards =
    '<div class="fincards">' +
      finCard("Revenue",      moneyShort(tRev),   "100%",      "",  dRev.txt,   dRev.cls) +
      finCard("CES Expense",  moneyShort(tCes),   pct(tCes),   "",  dCes.txt,   dCes.cls) +
      finCard("Agent Commissions", moneyShort(tComm), pct(tComm), "", dComm.txt, dComm.cls) +
      finCard("Gross Margin", moneyShort(tGross), pct(tGross), "",  dGross.txt, dGross.cls) +
    '</div>';

  /* Say plainly what is missing and what is not counted. A financial page that
     quietly leaves things out is worse than one that owns up to it. */
  var notes = "";
  if(missing.length){
    notes += '<div class="finnote f-warn">No CES cost recorded for ' +
      missing.map(function(r){ return monthShort(r.month); }).join(", ") +
      '. Those months are drawn hollow and left out of the totals \u2014 the margin ' +
      'is unknown, not zero. Add them to the <b>CES Costs</b> tab to fill them in.</div>';
  }
  notes += '<div class="finnote">Revenue and commissions are cash collected. CES is what ' +
    'CES <b>billed</b> that month, not what was paid \u2014 payments lag, the cost does not. ' +
    'Overhead, staff and owner distributions are not on this page.</div>';

  var thisMargin = tRev > 0 ? (tGross / tRev * 100) : 0;
  var prevMargin = prevRev > 0 ? (prevGross / prevRev * 100) : 0;
  var cmp = {
    ces: tCes, prevCes: prevCes, cesHave: prevCesHave,
    comm: tComm, prevComm: prevComm, commHave: prevCommHave,
    margin: thisMargin, prevMargin: prevMargin, marginHave: prevGrossHave
  };
  var story = finNarrative(rows, tRev, prevRev, prevYr, state.finYear, cmp);

  return '<div class="folder">' +
      '<div class="ag-topbar">' +
        '<div class="ag-hd ag-hd-list">' +
          '<div class="ag-hd-drow"><div class="ag-hd-title">Financials</div>' + yrDrop + '</div>' +
          legend +
        '</div>' +
        '<div class="ag-hd ag-hd-detail"><div class="ag-hd-title">Notes</div></div>' +
      '</div>' +
      '<div class="ag-split"><div class="ag-list-col fin-list-col">' +
        finChart(rows) + cards +
      '</div>' +
      '<aside class="ag-detail"><div class="fin-notes-card">' + story + notes + '</div></aside></div>' +
    '</div>';
}

function wireFinancials(){
  var sel = document.getElementById("finYr");
  if(!sel) return;

  sel.onchange = function(){
    var y = sel.value;
    state.finYear = y;

    /* Payouts come a year at a time. If this year is already in hand,
       switching is a lookup and nothing goes over the wire. */
    if(state.agByYear[y]){
      renderSummary();
      renderBody();
      return;
    }

    state.finLoaded = false;
    renderBody();
    loadPayouts(y, function(){
      state.finLoaded = true;
      renderSummary();
      renderBody();
    });
  };
}

/* Three sources, and the page cannot draw until all three are in. Rather than
   nest the callbacks three deep, count them down. */
function loadFinancials(){
  if(state.finLoading) return;
  state.finLoading = true;

  var yr = state.finYear ||
           (state.years && state.years[0] && state.years[0].year) ||
           String(new Date().getFullYear());
  state.finYear = yr;

  var waiting = 1;   // start at 1 so an all-cached path cannot finish early

  function done(){
    if(--waiting > 0) return;
    state.finLoading = false;
    state.finLoaded  = true;

    /* The year list arrives WITH collections, so the newest year may only
       become knowable now. */
    if(!state.finYear && state.years && state.years[0]){
      state.finYear = state.years[0].year;
    }

    /* Land on a year we can actually cost. The default is the newest
       collections year, which may be one CES has no rows for yet - in which
       case fall back to the newest year that DOES have CES, so the page never
       opens on an all-hollow year that is not even in its own dropdown. */
    var cesYears = {};
    Object.keys(state.finCes).forEach(function(m){ cesYears[m.slice(0,4)] = 1; });
    if(state.finYear && !cesYears[state.finYear]){
      var pick = (state.years || []).map(function(y){ return y.year; })
                   .filter(function(y){ return cesYears[y]; })[0];
      if(pick) state.finYear = pick;
    }

    /* Collections may have landed on a different year than the one payouts
       were fetched for. If so, fetch the payouts that match. */
    if(state.finYear && !state.agByYear[state.finYear]){
      state.finLoaded = false;
      renderBody();
      loadPayouts(state.finYear, function(){
        state.finLoaded = true;
        renderSummary();
        renderBody();
      });
      return;
    }

    renderSummary();
    renderBody();
  }

  if(!state.finCesLoaded){
    waiting++;
    jsonp({ action:"ces", key:KEY }, function(data){
      if(data && data.ok){
        state.finCes = {};
        (data.ces || []).forEach(function(c){ state.finCes[c.month] = c; });
      }
      state.finCesLoaded = true;
      done();
    });
  }

  if(!state.finInvLoaded){
    waiting++;
    jsonp({ action:"invoiced", key:KEY }, function(data){
      if(data && data.ok){
        state.finInv = {};
        (data.months || []).forEach(function(m){ state.finInv[m.month] = m.total; });
      }
      state.finInvLoaded = true;
      done();
    });
  }

  if(!state.colLoaded){
    waiting++;
    loadCollections("", done);
  }

  if(!state.agByYear[yr]){
    waiting++;
    loadPayouts(yr, done);
  }

  done();   // clears the initial 1
}

/* ---------- body ---------- */
function renderBody(){
  var el = document.getElementById("body");

  if(state.section === "billing"){
    el.innerHTML = renderBilling();
    wireBilling();
    measurePin();
    return;
  }

  if(state.section === "agents"){
    el.innerHTML = renderAgents();
    wireAgents();
    loadStaff();
    measurePin();
    return;
  }

  if(state.section === "deposits"){
    el.innerHTML = renderDeposits();
    wireDeposits();
    measurePin();
    return;
  }

  if(state.section === "payments"){
    el.innerHTML = renderCollections();
    wireCollections();
    measurePin();
    return;
  }

  if(state.section === "financials"){
    el.innerHTML = renderFinancials();
    wireFinancials();
    measurePin();
    return;
  }

  if(!state.loaded){
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>';
    return;
  }

  el.innerHTML = renderReceivables();
  wireBody();
  measurePin();
}

/* The sticky table header needs to sit exactly below the pinned tabs +
   green bar, whose height depends on wrapping. Measure it and hand the
   number to CSS rather than hardcoding a guess. */
/* Two things stack above a table header: the fixed slim bar, and the sticky
   tabs+search bar under it. --pinh is their combined height, which is where
   a <thead th> has to pin. Measured rather than hard-coded, because the
   tabs row wraps to two lines on a narrow window and a guessed number would
   be wrong exactly then. */
function measurePin(){
  var slim = document.getElementById("slimbar");
  var ph   = document.getElementById("pinhead");
  /* visibility:hidden still has layout, so the bar can be measured before
     it is ever shown. display:none could not be. */
  var sh = slim ? slim.getBoundingClientRect().height : 0;
  var h  = ph   ? ph.getBoundingClientRect().height   : 0;
  document.documentElement.style.setProperty("--slimh", Math.round(sh) + "px");
  document.documentElement.style.setProperty("--pinh",  Math.round(sh + h) + "px");
}
window.addEventListener("resize", measurePin);

/* The slim bar appears the moment the section switcher is about to be lost -
   not when the whole top card has finally gone, which felt late and dropped
   the bar in on top of rows already being read.

   It is a separate FIXED element that only fades. It never resizes and never
   takes part in layout, so revealing it cannot shift the page and cannot
   feed back into the scroll position that revealed it. */
(function(){
  var sentinel = document.getElementById("scoreSentinel");
  var slim = document.getElementById("slimbar");
  if(!sentinel || !slim) return;

  if("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      // still on screen = hide; scrolled above the top edge = show
      slim.classList.toggle("show", !entries[0].isIntersecting);
    }, { threshold: 0 });
    io.observe(sentinel);
  } else {
    var onScroll = function(){
      slim.classList.toggle("show", sentinel.getBoundingClientRect().top <= 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  }

  /* Measure once up front. Until data lands, renderBody bails out early with
     a spinner and never reaches its own measurePin() - leaving --slimh at 0
     and the tabs pinning underneath the bar for the first scroll. */
  measurePin();
})();

/* ---------- events ---------- */
function wireBody(){
  /* Aging folders. Switching a bucket re-lands on that bucket's top invoice -
     renderReceivables handles the re-selection. */
  document.querySelectorAll(".ftab[data-age]").forEach(function(el){
    el.onclick = function(){
      state.age = el.getAttribute("data-age");
      renderBody();
    };
  });

  /* Sortable column labels in the gray list. */
  document.querySelectorAll("[data-rsort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-rsort");
      if(state.sortKey === k){
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = k;
        state.sortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  /* Click a row -> that invoice paints in the green pane on the right. */
  document.querySelectorAll(".agrow[data-rcrow] .aghead").forEach(function(el){
    el.onclick = function(){
      var doc = el.parentNode.getAttribute("data-rcrow");
      if(String(doc) === String(state.rcSel)) return;
      state.rcSel = String(doc);
      renderBody();
    };
  });

  var s = document.getElementById("search");
  if(s){
    s.oninput = function(){
      state.search = s.value;
      renderBody();
      var again = document.getElementById("search");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }

  /* If the landed / selected invoice is not cached yet, fetch it into the pane
     now. Cached selections render inline during renderReceivables, so typing in
     the search box does not reload the pane on every keystroke. */
  if(state.rcSel && !ivCache[state.rcSel]) loadRcInvoice(state.rcSel);
}


function wireCollections(){
  var yr = document.getElementById("yrSel");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.year) return;

      state.year = y;
      state.colSearch = "";
      state.pmSel = "";

      // Default to the newest month in that year.
      var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === y; });
      state.month = inYear.length ? inYear[0].month : "";

      // Already fetched this year? Then nothing to wait for.
      if(state.payByYear[y]){
        renderSummary();
        renderBody();
      } else {
        loadCollections(y);
      }
    };
  }

  /* Month switching is a client-side filter - the whole year is already
     loaded, so no round trip. */
  document.querySelectorAll(".ftab[data-month]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-month");
      if(m === state.month) return;
      state.month = m;
      state.colSearch = "";
      state.pmSel = "";
      renderSummary();
      renderBody();
    };
  });

  /* Sortable column labels in the gray list. */
  document.querySelectorAll("[data-pmsort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-pmsort");
      if(state.colSortKey === k){
        state.colSortDir = state.colSortDir === "asc" ? "desc" : "asc";
      } else {
        state.colSortKey = k;
        state.colSortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  /* Click a payment row -> its invoice paints in the green pane. */
  document.querySelectorAll(".agrow[data-pmrow] .aghead").forEach(function(el){
    el.onclick = function(){
      var doc = el.parentNode.getAttribute("data-pmrow");
      if(String(doc) === String(state.pmSel)) return;
      state.pmSel = String(doc);
      renderBody();
    };
  });

  var s = document.getElementById("colSearch");
  if(s){
    s.oninput = function(){
      state.colSearch = s.value;
      renderBody();
      var again = document.getElementById("colSearch");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }

  if(state.pmSel && !ivCache[state.pmSel]) loadPmInvoice(state.pmSel);
}


/* Fetch a whole year (~700 rows). Months are then switched on the
   client with no further requests. */
function loadCollections(year, then){
  if(state.colLoading) return;
  state.colLoading = true;

  /* Only paint the spinner if Collections is the page being looked at.
     Financials also calls this, and must not blank someone else's body. */
  if(state.colLoaded && state.section === "payments"){
    document.getElementById("body").innerHTML =
      '<div class="empty-state"><span class="spinner"></span>Loading ' + (year || "") + '&hellip;</div>';
  }

  var params = { action:"collections", key:KEY };
  if(year) params.year = year;

  jsonp(params, function(data){
    state.colLoading = false;

    if(!data || !data.ok){
      showError((data && data.error) || "Could not load payments.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.months = data.months || [];
    state.years  = data.years  || [];
    state.ytd    = Number(data.ytd) || 0;
    state.year   = data.year || state.year;
    state.payByYear[state.year] = data.payments || [];

    // Land on the newest month of the loaded year.
    var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });
    if(!state.month || state.month.slice(0,4) !== state.year){
      state.month = inYear.length ? inYear[0].month : "";
    }

    state.colLoaded = true;

    if(then){ then(); return; }

    renderSummary();
    renderBody();
  });
}

/* Both bars carry the same four buttons, so ".sec" wires both at once. The
   ON state has to be set by KEY, not on the element that happened to be
   clicked - otherwise clicking Billing in the slim bar lights it there while
   the top card still insists you are on Receivables. */
/* The (i) always explains the section you are LOOKING at, so there is one of
   them rather than five competing for the same corner. */
var secInfo = document.getElementById("secInfo");
if(secInfo) secInfo.onclick = function(){ openLogic(state.section); };
var lgX = document.getElementById("logicClose");
if(lgX) lgX.onclick = closeLogic;
var lgM = document.getElementById("logicModal");
if(lgM) lgM.onclick = function(e){ if(e.target === lgM) closeLogic(); };

document.querySelectorAll(".sec").forEach(function(el){
  el.onclick = function(){
    var key = el.getAttribute("data-sec");
    state.section = key;
    document.querySelectorAll(".sec").forEach(function(x){
      x.classList.toggle("on", x.getAttribute("data-sec") === key);
    });

    /* Switching section from the slim bar means arriving at a new page
       already scrolled halfway down someone else's list. Go to the top -
       which also retracts the slim bar, because the real header is back. */
    window.scrollTo(0, 0);

    // Payments load on first visit to Collections, not at page load.
    if(state.section === "payments" && !state.colLoaded && !state.colLoading){
      renderSummary();
      renderBody();
      loadCollections("");
      return;
    }

    if(state.section === "agents" && !state.agLoaded && !state.agLoading){
      renderSummary();
      renderBody();
      loadPayouts("");
      return;
    }

    if(state.section === "billing" && !state.bLoaded && !state.bLoading){
      renderSummary();
      renderBody();
      loadBilling("");
      return;
    }

    if(state.section === "financials" && !state.finLoaded && !state.finLoading){
      renderSummary();
      renderBody();
      loadFinancials();
      return;
    }

    /* Deposits needs two things: the open invoices (already loaded with
       Receivables) and the Payer Map, which is fetched once. */
    if(state.section === "deposits" && !state.dPayersLoaded){
      loadPayers();
    }

    renderSummary();
    renderBody();
  };
});

/* A NOTICE, not a page failure.
   showError() below replaces the whole body with "Couldn't load invoices" -
   right when a load has failed, catastrophic when a single email has. Using it
   to report a send would blank the dashboard under a message about one agent. */
function showNote(msg, isErr){
  var b = document.getElementById("banner");
  if(!msg){ b.className = "banner"; b.innerHTML = ""; return; }
  b.innerHTML = msg;
  b.className = "banner show" + (isErr ? "" : " ok");
  if(!isErr) setTimeout(function(){
    if(b.className.indexOf("ok") !== -1) b.className = "banner";
  }, 6000);
}

function showError(msg){
  var b = document.getElementById("banner");
  b.textContent = msg;
  b.className = "banner show";
  document.getElementById("body").innerHTML =
    '<div class="empty-state">Couldn\'t load invoices.</div>';
}

/* ---------- load ---------- */
function load(){
  document.getElementById("stamp").textContent = "Loading\u2026";
  jsonp({ action:"receivables", key:KEY }, function(data){
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load invoices.");
      document.getElementById("stamp").textContent = "";
      return;
    }
    document.getElementById("banner").className = "banner";
    state.invoices   = data.invoices || [];
    state.paidCount  = Number(data.paidCount) || 0;
    state.totalCount = Number(data.totalCount) || 0;
    state.loaded     = true;
    document.getElementById("stamp").textContent =
      state.totalCount.toLocaleString("en-US") + " invoices";
    renderSummary();
    renderBody();
    // If we land directly on a lazily-loaded section (Agents is now the
    // default), fetch its data now the same way clicking the tab would.
    if(state.section === "agents" && !state.agLoaded && !state.agLoading) loadPayouts("");
  });
}

/* ---------- header ---------- (nav lives in logic.js) */
document.getElementById("refreshBtn").onclick     = function(){ load(); };
document.getElementById("slimRefreshBtn").onclick = function(){ load(); };

/* ---------- lock ---------- */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.classList.add("hide");
    document.getElementById("lockErr").style.display = "none";
    load();
  }

  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){
    lock.classList.add("hide");
    load();
  } else {
    lockIn.focus();
  }
})();
</script>
