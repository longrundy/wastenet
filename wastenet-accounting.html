/* ---------- agents ---------- */
function renderAgents(){
  if(!state.agLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Working out payouts&hellip;</div>';
  }
  if(!state.agMonths.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  var yrList = state.agYears;
  var yr = state.agYear;
  var inYear = state.agMonths.filter(function(m){ return m.slice(0,4) === yr; });

  var md = agMonthData();
  var agents = md.agents;

  var tabs = '<div class="folder-tabs">' +
    '<button class="ftab' + (state.agMonth === "" ? " sel" : "") + '" data-agmonth="">' +
      yr + '</button>' +
    inYear.map(function(m){
      return '<button class="ftab' + (state.agMonth === m ? " sel" : "") + '" ' +
             'data-agmonth="' + m + '">' + monthShort(m) + '</button>';
    }).join("") + '</div>';

  var yrOpts = yrList.map(function(y){
    return '<option value="' + y + '"' + (yr === y ? " selected" : "") + '>' + y + '</option>';
  }).join("");

  var total = agents.reduce(function(s,a){ return s + a.payout; }, 0);

  var body;
  if(!agents.length){
    body = '<div class="empty-state">No commissionable payments in ' + (state.agMonth ? monthLabel(state.agMonth) : yr) + '.</div>';
  } else {
    body = agents.map(function(a){
      var open = state.agOpen[a.agent] ? " open" : "";

      /* The arithmetic, shown rather than asserted. If a number looks
         wrong, the working is right there to check it against. */
      /* With one rate the arithmetic can be stated outright. With two -
         Bob Bell has Costco at 25% and Hilton at 50% - a single "x 25%"
         would be a lie, so the per-invoice rates below do the talking. */
      var oneRate = (a.rates && a.rates.length === 1);

      var math = '<div class="agmath">' +
        '<b>$' + fmt(a.monitoring) + '</b> monitoring collected' +
        ' \u2212 <b>$' + fmt(a.fees) + '</b> cellular fees (' +
        fmtN(a.boxes) + ' boxes \u00d7 $25)' +
        ' = <b>$' + fmt(a.monitoring - a.fees) + '</b>' +
        (oneRate
          ? '<br>\u00d7 <b>' + Math.round(a.rates[0] * 100) + '%</b> share' +
            ' = <b>$' + fmt(a.payout) + '</b>'
          : '<br>paid at ' + (a.rates || []).map(function(r){
              return '<b>' + Math.round(r * 100) + '%</b>';
            }).join(' and ') + ' depending on the account' +
            ' \u2014 total <b>$' + fmt(a.payout) + '</b>') +
        '</div>';

      /* Name the invoices. "2 invoices contain a flagged line" is a dead
         end; "inv 6018 (Jun 2026), inv 5962 (Mar 2026)" can be looked up. */
      var flag = '';
      if(a.review){
        var rl = (a.reviewList || []).slice();
        rl.sort(function(x,y){ return String(y.date).localeCompare(String(x.date)); });

        var listed = rl.slice(0, 6).map(function(r){
          return 'inv ' + invLink(r.doc, r.qboId) + ' \u00b7 ' + esc(usDate(r.date)) +
                 ' \u00b7 ' + esc(String(r.customer).slice(0, 28));
        }).join('<br>');

        flag = '<div class="agflag">' +
          '<b>' + a.review + ' invoice(s) here contain a line the engine judged to be a ' +
          'one-time fee from its price rather than its wording.</b> Those lines earn no ' +
          'commission. Worth a look if this figure seems light.<br><br>' +
          listed +
          (rl.length > 6 ? '<br>\u2026and ' + (rl.length - 6) + ' more' : '') +
          '</div>';
      }

      /* Year view: a month-by-month breakdown is what's useful.
         Month view: the individual invoices behind the number. */
      var table;
      if(md.isYear){
        table = '<table><thead><tr>' +
            '<th style="width:34%">Month</th>' +
            '<th style="width:22%" class="num">Boxes</th>' +
            '<th style="width:22%" class="num">Invoices</th>' +
            '<th style="width:22%" class="num">Payout</th>' +
          '</tr></thead><tbody>' +
          a.months.map(function(m){
            return '<tr>' +
              '<td>' + monthLabel(m.month) + '</td>' +
              '<td class="num">' + fmtN(m.boxes) + '</td>' +
              '<td class="num muted">' + m.invoices + '</td>' +
              '<td class="num">$' + fmt(m.payout) + '</td>' +
            '</tr>';
          }).join("") + '</tbody></table>';
      } else {
        table = '<table><thead><tr>' +
            '<th style="width:14%">Date</th>' +
            '<th style="width:31%">Customer</th>' +
            '<th style="width:11%">Invoice</th>' +
            '<th style="width:10%" class="num">Boxes</th>' +
            '<th style="width:14%" class="num">Monitoring</th>' +
            '<th style="width:8%" class="num">Rate</th>' +
            '<th style="width:14%" class="num">Payout</th>' +
          '</tr></thead><tbody>' +
          a.invoices.map(function(i){
            return '<tr>' +
              '<td class="muted">' + esc(usDate(i.date)) + '</td>' +
              '<td title="' + esc(i.customer) + '">' + esc(i.customer) +
                (i.partial ? ' <span class="chip chip-30">' + i.partial + '% paid</span>' : '') + '</td>' +
              '<td>' + invLink(i.doc, i.qboId) + '</td>' +
              '<td class="num">' + fmtN(i.boxes) + '</td>' +
              '<td class="num">$' + fmt(i.monitoring) + '</td>' +
              '<td class="num muted">' + Math.round((i.share || 0) * 100) + '%</td>' +
              '<td class="num">$' + fmt(i.payout) + '</td>' +
            '</tr>';
          }).join("") + '</tbody></table>';
      }

      return '<div class="agrow' + open + '" data-agent="' + a.agent + '">' +
          '<div class="aghead">' +
            '<span class="agcaret">\u25B6</span>' +
            '<span class="agname">' + esc(a.name) + '</span>' +
            '<span class="agshare">' + shareLabel(a) + '</span>' +
            '<span class="agmeta">' + fmtN(a.boxes) + ' boxes \u00b7 ' +
              (md.isYear ? a.months.length + ' mo' : a.invoices.length + ' inv') + '</span>' +
            '<span class="agpay">$' + fmt(a.payout) + '</span>' +
          '</div>' +
          '<div class="agdetail">' + math + flag + table + '</div>' +
        '</div>';
    }).join("");
  }

  /* Payments from customers who map to no agent. Left unsaid, this is
     somebody's commission quietly going missing. */
  var orphan = '';
  if(md.unmapped && md.unmapped.length){
    var when = state.agMonth ? monthLabel(state.agMonth) : yr;

    orphan = '<div class="agflag" style="margin-top:14px;">' +
      '<b>' + md.unmapped.length + ' customer(s) paid in ' + when +
        ' but map to no agent.</b><br>' +
      md.unmapped.slice(0,8).map(function(u){
        // In the year view, say which months - otherwise "$2,200 in 2025"
        // leaves you hunting through twelve tabs for it.
        var ms = (u.months && u.months.length)
          ? ' <span style="opacity:.75">(' +
              u.months.slice(0,4).map(monthShort).join(', ') +
              (u.months.length > 4 ? ', +' + (u.months.length - 4) : '') + ')</span>'
          : '';
        return esc(u.customer) + ' \u2014 $' + fmt(u.amount) + ms;
      }).join('<br>') +
      (md.unmapped.length > 8 ? '<br>\u2026and ' + (md.unmapped.length - 8) + ' more' : '') +
      '<br><br>If any of these belong to an agent, add them to the Agent Map tab.' +
      '</div>';
  }

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="agYr" aria-label="Year">' + yrOpts + '</select>' +
          '<div class="fbar-t">' + (state.agMonth ? monthLabel(state.agMonth) : yr + ' \u2014 full year') +
            ' <span class="amt">\u00b7 ' + agents.length + ' agents \u00b7 $' +
            fmt(total) + ' total</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower" style="padding:4px 16px 8px;">' + body + '</div>' +
    '</div>' + orphan;
}

function fmt(n){
  return (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtN(n){
  n = Number(n)||0;
  return n % 1 === 0 ? String(n) : n.toFixed(1);
}

/* An agent may be paid at more than one rate - the exception lives on the
   account, not the person. Show every rate rather than picking one. */
function shareLabel(a){
  var r = (a.rates && a.rates.length) ? a.rates : [a.share];
  return r.map(function(x){ return Math.round(x * 100) + '%'; }).join(' / ');
}

/* Fetch a whole year. ~600 commissionable payments - months are then
   switched on the client with no further requests. */
function loadPayouts(year){
  if(state.agLoading) return;
  state.agLoading = true;

  jsonp({ action:"payouts", key:KEY, year: year || "" }, function(data){
    state.agLoading = false;
    if(!data || !data.ok){
      showError((data && data.error) || "Could not work out payouts.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.agMonths = data.months || [];
    state.agYears  = data.years  || [];
    state.agYear   = data.year   || state.agYear;
    state.agByYear[state.agYear] = data.byMonth || {};
    state.agLoaded = true;

    // Land on the newest month that actually has payments in this year.
    // Land on the full-year view. It answers "what did each agent make
    // this year" without a click, and the months are one tap away.
    state.agMonth = "";

    renderSummary();
    renderBody();
  });
}

function wireAgents(){
  /* The whole year is loaded, so switching months is a lookup. No spinner,
     no request. */
  document.querySelectorAll(".ftab[data-agmonth]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-agmonth");   // "" = the year view
      if(m === state.agMonth) return;
      state.agMonth = m;
      state.agOpen = {};
      renderSummary();
      renderBody();
    };
  });

  var yr = document.getElementById("agYr");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.agYear) return;
      state.agYear = y;
      state.agMonth = "";      // show the new year's full-year view
      state.agOpen = {};

      if(state.agByYear[y]){          // already fetched - nothing to wait for
        renderSummary();
        renderBody();
      } else {
        document.getElementById("body").innerHTML =
          '<div class="empty-state"><span class="spinner"></span>Working out ' + y + '&hellip;</div>';
        loadPayouts(y);
      }
    };
  }

  document.querySelectorAll(".agrow").forEach(function(el){
    var head = el.querySelector(".aghead");
    if(!head) return;
    head.onclick = function(){
      var k = el.getAttribute("data-agent");
      state.agOpen[k] = !state.agOpen[k];
      el.classList.toggle("open");
    };
  });
}

/* ---------- payments ---------- */
function renderCollections(){
  if(!state.colLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading payments&hellip;</div>';
  }
  if(!state.months.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  /* months in the loaded year, newest first */
  var shown = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });

  var tabs = '<div class="folder-tabs">' + shown.map(function(m){
    return '<button class="ftab' + (state.month === m.month ? " sel" : "") + '" ' +
           'data-month="' + m.month + '">' + monthShort(m.month) + '</button>';
  }).join("") + '</div>';

  /* Payments for the loaded year are already here - slice by month with
     no round trip. */
  var rows = (state.payByYear[state.year] || []).filter(function(p){
    return String(p.txnDate).slice(0,7) === state.month;
  });

  if(state.colSearch){
    var q = state.colSearch.toLowerCase();
    rows = rows.filter(function(p){
      return String(p.customer).toLowerCase().indexOf(q) !== -1 ||
             String(p.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.colSortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.colSortKey){
      case "cust":   av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "inv":    av = String(a.docNumber); bv = String(b.docNumber); break;
      case "amount": av = Number(a.amount)||0; bv = Number(b.amount)||0; break;
      default:       av = String(a.txnDate); bv = String(b.txnDate);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.colSortKey !== k) return "";
    return ' <span class="sc">' + (state.colSortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-csort="date"   style="width:17%">Date'     + caret("date")   + '</th>' +
      '<th data-csort="cust"   style="width:42%">Customer' + caret("cust")   + '</th>' +
      '<th data-csort="inv"    style="width:18%">Invoice'  + caret("inv")    + '</th>' +
      '<th data-csort="amount" style="width:23%" class="num">Amount' + caret("amount") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="4" style="text-align:center; padding:26px 8px; color:var(--ink-2);">No payments in this month.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(p){
      /* No invoice link = a credit or prepayment. Shown plainly rather
         than hidden - the money did arrive. */
      var inv = p.docNumber
        ? invLink(p.docNumber, p.qboId)
        : '<span class="chip chip-30">unapplied</span>';
      return '<tr>' +
        '<td class="muted">' + esc(usDate(p.txnDate)) + '</td>' +
        '<td title="' + esc(p.customer) + '">' + esc(p.customer) + '</td>' +
        '<td>' + inv + '</td>' +
        '<td class="num">' + money(p.amount) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var total = rows.reduce(function(s,p){ return s + (Number(p.amount)||0); }, 0);

  /* Each option carries what that year collected, so the totals are
     visible in the list itself - and the closed pill shows the selected
     year's total without costing another line of chrome. */
  var yrOpts = state.years.map(function(y){
    return '<option value="' + y.year + '"' + (state.year === y.year ? " selected" : "") + '>' +
             y.year + '  \u00b7  ' + moneyShort(y.total) + '</option>';
  }).join("");

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="yrSel" aria-label="Year">' + yrOpts + '</select>' +
          '<div class="fbar-t">' + monthLabel(state.month) +
            ' <span class="amt">\u00b7 ' + rows.length + ' payments \u00b7 ' + moneyShort(total) + '</span></div>' +
          '<input class="search" id="colSearch" type="text" placeholder="Search customer or #" value="' + esc(state.colSearch) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower"><table>' + head + tbody + '</table></div>' +
    '</div>';
}

/* ==================================================================
   DEPOSIT MATCHER

   Given a Frost statement and the list of open invoices, work out which
   invoices each deposit paid.

   Three kinds of deposit, three completely different answers:

     INTUIT   - the pay-link. Intuit batches several customers' money into
                one deposit, so it will never equal any single invoice, and
                QuickBooks marked those invoices paid the moment the
                customer clicked Pay. NOTHING TO DO. Trying to match one is
                a guaranteed waste of an afternoon.

     NAMED    - an ACH. The statement names the payer, so we know the
                customer. All that is left is which of their invoices it
                covers - usually one, sometimes several.

     ANONYMOUS- a cheque deposit. Several cheques on one slip, recorded by
                the bank as a single lump with NO NAMES. Nothing identifies
                the payer. The only way back is arithmetic: which open
                invoices add up to exactly this number?

   The arithmetic only works because we know WHO PAYS BY CHEQUE. Searching
   every open invoice for a combination summing to $1,850 returns a fistful
   of answers, most of them wrong. Searching only the twenty customers who
   actually write cheques usually returns one.
   ================================================================== */

/* Amounts are money. Compare them as integer cents, never as floats -
   0.1 + 0.2 !== 0.3, and a rounding error here means a deposit silently
   fails to match anything. */
function cents(n) { return Math.round((Number(n) || 0) * 100); }

function parseFrostCsv(text) {
  var lines = String(text || '').split(/\r?\n/).filter(function (l) { return l.trim(); });
  if (!lines.length) return { rows: [], error: 'The file is empty.' };

  var head = splitCsvLine(lines[0]).map(function (h) { return h.trim().toLowerCase(); });
  var iDate = head.indexOf('transaction date');
  var iType = head.indexOf('type');
  var iDesc = head.indexOf('description');
  var iAmt  = head.indexOf('amount');

  if (iDate === -1 || iAmt === -1) {
    return { rows: [], error: 'That does not look like a Frost export - no Transaction Date / Amount columns.' };
  }

  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var c = splitCsvLine(lines[i]);
    if (c.length <= iAmt) continue;

    var amt = Number(String(c[iAmt]).replace(/[$,\s]/g, ''));
    if (!isFinite(amt) || amt <= 0) continue;   // money OUT is not our business

    var d = String(c[iDate]).trim();            // MM/DD/YYYY
    var m = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    var iso = m ? (m[3] + '-' + pad2(m[1]) + '-' + pad2(m[2])) : d;

    rows.push({
      date:   iso,
      type:   String(c[iType] || '').trim(),
      desc:   String(c[iDesc] || '').trim(),
      amount: amt
    });
  }
  rows.sort(function (a, b) { return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });
  return { rows: rows, error: '' };
}

function pad2(n) { n = String(n); return n.length < 2 ? '0' + n : n; }

/* A CSV field can contain a comma inside quotes - "Nabors Property, LLC" -
   so the line cannot simply be split on commas. */
function splitCsvLine(line) {
  var out = [], cur = '', q = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (q && line[i + 1] === '"') { cur += '"'; i++; }
      else q = !q;
    } else if (ch === ',' && !q) {
      out.push(cur); cur = '';
    } else cur += ch;
  }
  out.push(cur);
  return out;
}

/* ------------------------------------------------------------------
   Which customer does the bank mean?

   Frost truncates the payer to about 16 characters and then bolts its own
   reference numbers on the end - "GULF STATES TOYO AP PAYMENT 0008000137".
   So this matches on the FRONT of the string, not the whole of it, and not
   on the QuickBooks name (which the bank has never heard of).
   ------------------------------------------------------------------ */
function payersFor(desc, payerMap) {
  var d = String(desc || '').trim().toUpperCase();
  if (!d) return [];

  var hits = [];
  payerMap.forEach(function (p) {
    if (!p.bankName) return;
    if (d.indexOf(p.bankName.toUpperCase()) === 0) hits.push(p);
  });

  /* Longest bank name wins, so a specific rule beats a general one. */
  hits.sort(function (a, b) { return b.bankName.length - a.bankName.length; });
  if (!hits.length) return [];

  var best = hits[0].bankName.toUpperCase();
  return hits.filter(function (p) { return p.bankName.toUpperCase() === best; });
}

function isPaylinkDeposit(desc) {
  return /^INTUIT\b/i.test(String(desc || '').trim());
}

/* ------------------------------------------------------------------
   Which invoices add up to this?

   Depth-first over the candidate invoices, biggest first, pruning any
   branch whose remaining invoices cannot possibly reach the target. Capped
   at maxN invoices and maxHits answers, because a deposit is a handful of
   cheques, not thirty, and because an unbounded search over fifty invoices
   is 2^50 branches and would hang the browser.
   ------------------------------------------------------------------ */
function findCombos(invoices, targetCents, opts) {
  opts = opts || {};
  var maxN    = opts.maxN    || 6;
  var maxHits = opts.maxHits || 8;

  var inv = invoices.slice().sort(function (a, b) { return b.cents - a.cents; });

  /* suffix[i] = everything from i onwards, so we can bail the moment the
     rest of the list cannot reach the target. */
  var suffix = new Array(inv.length + 1);
  suffix[inv.length] = 0;
  for (var i = inv.length - 1; i >= 0; i--) suffix[i] = suffix[i + 1] + inv[i].cents;

  /* Nearly every invoice is a round number of dollars. So a deposit of
     $1,875.70 CANNOT be made of round invoices - the 70 cents has to come
     from somewhere, and only an odd-cent invoice can supply it. If nothing
     left in the list has cents on it, and we still owe cents, this branch
     is dead. That one rule collapses the search enormously: it was what
     turned eight plausible-looking answers into one. */
  var oddAhead = new Array(inv.length + 1);
  oddAhead[inv.length] = false;
  for (var k = inv.length - 1; k >= 0; k--) {
    oddAhead[k] = oddAhead[k + 1] || (inv[k].cents % 100 !== 0);
  }

  var hits = [];
  var chosen = [];

  function walk(i, remaining) {
    if (remaining === 0) { hits.push(chosen.slice()); return; }
    if (hits.length >= maxHits) return;
    if (i >= inv.length || chosen.length >= maxN) return;
    if (remaining < 0 || suffix[i] < remaining) return;   // cannot reach it
    if (remaining % 100 !== 0 && !oddAhead[i]) return;    // cents unreachable

    for (var j = i; j < inv.length; j++) {
      if (hits.length >= maxHits) return;
      if (inv[j].cents > remaining) continue;             // too big, try smaller
      if (suffix[j] < remaining) return;                  // nothing left is enough
      chosen.push(inv[j]);
      walk(j + 1, remaining - inv[j].cents);
      chosen.pop();
    }
  }

  walk(0, targetCents);
  return hits;
}

/* A deposit made on the 10th cannot be paying an invoice raised on the
   20th. Anything issued after the money landed is not a candidate. */
function issuedBy(invoices, date) {
  if (!date) return invoices;
  return invoices.filter(function (v) { return !v.txnDate || v.txnDate <= date; });
}

/* ------------------------------------------------------------------
   Rank the answers.

   Several combinations can sum to the same number. Fewer invoices is more
   likely than more. One customer paying their whole balance is more likely
   than four customers coincidentally adding up. And an invoice that has
   been sitting there for two months is a likelier thing to be paid than
   one raised last Tuesday.
   ------------------------------------------------------------------ */
function scoreCombo(combo, depositDate) {
  var custs = {};
  combo.forEach(function (v) { custs[v.customer] = true; });
  var nCust = Object.keys(custs).length;

  var age = 0;
  combo.forEach(function (v) {
    if (v.txnDate && depositDate) {
      age += Math.max(0, (new Date(depositDate) - new Date(v.txnDate)) / 86400000);
    }
  });
  age = combo.length ? age / combo.length : 0;

  /* Lower is better. */
  return combo.length * 10 + nCust * 6 - Math.min(age, 90) / 30;
}

/* ------------------------------------------------------------------
   The whole job.
   ------------------------------------------------------------------ */
/* ------------------------------------------------------------------
   Six answers that are really two.

   Pillsbury has two open invoices at $675. Yoplait has two at $225. So a
   search for combinations that sum to $1,875.70 dutifully enumerates every
   permutation of which duplicate got picked - four "answers" that name the
   same four customers paying the same four amounts.

   That is not four answers. It is one answer with a footnote. What Kim needs
   to decide is WHO PAID; which of a customer's two identical invoices to
   apply it to is a separate and much smaller question, and one she can
   settle by looking at the invoice dates.

   So collapse combinations that differ only in which interchangeable invoice
   was chosen, and carry the alternatives along as a footnote.
   ------------------------------------------------------------------ */
function collapseCombos(combos) {
  var groups = {};

  combos.forEach(function (c) {
    /* Count how many invoices each (customer, amount) pair contributes. WNJ
       can settle TWO $325 invoices in one deposit, and an earlier version of
       this keyed the slot on customer+amount alone - which merged the two
       into one and quietly lost $325. A collapse that loses money is worse
       than no collapse at all. The COUNT is part of the identity. */
    var tally = {};
    c.forEach(function (v) {
      var slot = v.customer + '|' + v.cents;
      if (!tally[slot]) tally[slot] = { customer: v.customer, cents: v.cents, docs: [] };
      tally[slot].docs.push(v.docNumber);
    });

    var sig = Object.keys(tally).map(function (s) {
      return s + '|x' + tally[s].docs.length;
    }).sort().join('||');

    if (!groups[sig]) groups[sig] = { slots: {}, order: [] };
    var g = groups[sig];

    Object.keys(tally).forEach(function (s) {
      var t = tally[s];
      if (!g.slots[s]) {
        g.slots[s] = { customer: t.customer, cents: t.cents, n: t.docs.length, docs: [] };
        g.order.push(s);
      }
      /* every invoice id seen in this slot across all permutations - the
         choices Kim still has to make, gathered rather than multiplied out */
      t.docs.forEach(function (dn) {
        if (g.slots[s].docs.indexOf(dn) === -1) g.slots[s].docs.push(dn);
      });
    });
  });

  return Object.keys(groups).map(function (k) {
    var g = groups[k];
    var parts = g.order.map(function (s) {
      var p = g.slots[s];
      p.docs.sort();
      return p;
    });
    return {
      parts: parts,
      /* n invoices of that amount, not one - this is the line that was wrong */
      total: parts.reduce(function (s, p) { return s + p.cents * p.n; }, 0),
      /* more invoice ids than slots to fill = a choice remains */
      ambiguous: parts.some(function (p) { return p.docs.length > p.n; })
    };
  });
}

function matchDeposits(deposits, openInvoices, payments, payerMap) {
  payments = payments || [];

  var openByCustomer = {};
  openInvoices.forEach(function (v) {
    (openByCustomer[String(v.customer || '')] = openByCustomer[String(v.customer || '')] || []).push(v);
  });

  var payByCustomer = {};
  payments.forEach(function (p) {
    (payByCustomer[String(p.customer || '')] = payByCustomer[String(p.customer || '')] || []).push(p);
  });

  /* Who could be inside an anonymous lump: the cheque payers, plus the two
     who mostly use the pay-link but have been known to key one by hand. NOT
     the ACH payers - they get named - and not the pay-link crowd, whose
     invoices Intuit already closed. */
  var checkCustomers = payerMap
    .filter(function (p) { return p.channel === 'check' || p.channel === 'mixed'; })
    .map(function (p) { return p.customer; });

  var poolFrom = function (index, names) {
    var out = [];
    names.forEach(function (n) { (index[n] || []).forEach(function (v) { out.push(v); }); });
    return out;
  };

  /* A payment keyed on the 20th is not settling a deposit that landed on the
     2nd. Ten days either way covers a cheque sitting in a drawer. */
  var near = function (list, date, days) {
    if (!date) return list;
    var t = new Date(date).getTime();
    return list.filter(function (p) {
      if (!p.date) return true;
      return Math.abs(new Date(p.date).getTime() - t) <= days * 86400000;
    });
  };

  return deposits.map(function (d) {
    var target = cents(d.amount);

    /* ---- 1. the pay-link. Intuit already closed those invoices. ---- */
    if (isPaylinkDeposit(d.desc)) {
      return {
        deposit: d, kind: 'paylink', candidates: [], recorded: null,
        why: 'QuickBooks Payments. Intuit batched several customers into this one ' +
             'deposit and marked each invoice paid when the customer paid. Nothing ' +
             'to do - and it will never equal a single invoice.'
      };
    }

    /* ---- 2. money you moved between your own accounts. ---- */
    if (/^(FROM|TO) ACCOUNT\b/i.test(d.desc) || /fund transfer/i.test(d.type || '')) {
      return {
        deposit: d, kind: 'internal', candidates: [], recorded: null,
        why: 'Moved from another Frost account. Not a customer payment.'
      };
    }

    var payers = payersFor(d.desc, payerMap);
    var isAch  = payers.length > 0;
    var names  = isAch ? payers.map(function (p) { return p.customer; }) : checkCustomers;

    if (!isAch && d.desc) {
      return {
        deposit: d, kind: 'unknown', candidates: [], recorded: null,
        why: 'The statement names a payer nobody recognises. If this is a customer, ' +
             'add the name to the Payer Map tab and it will be matched from here on.'
      };
    }

    /* ---- 3. IS IT ALREADY RECORDED?
             The question the bank statement was consulted to answer.

             For an ACH the bank named the payer, so only their payments can be
             in it. For a CHEQUE deposit it must be every payment near the date,
             not just the twenty customers we believe write cheques - an
             envelope can hold a cheque from anyone, and an ACH payer who posts
             one in December does not stop being an ACH payer. Narrowing this
             search was a real bug: it meant a deposit Kim HAD recorded came
             back "not recorded", and the tool then went off inventing
             combinations of unpaid invoices to explain money that was never
             missing. ---- */
    var payPool = near(isAch ? poolFrom(payByCustomer, names) : payments, d.date, 10)
      .map(function (p) {
        return { docNumber: p.docNumber, customer: p.customer, date: p.date,
                 cents: cents(p.amount), amount: p.amount };
      });

    var done = findCombos(payPool, target, { maxN: 8, maxHits: 4 });
    if (done.length) {
      done.sort(function (a, b) { return scoreCombo(a, d.date) - scoreCombo(b, d.date); });
      return {
        deposit: d, kind: isAch ? 'ach' : 'check',
        customer: isAch ? names.join(' / ') : '',
        aliasNote: isAch ? (payers[0].note || '') : '',
        recorded: done[0],
        candidates: [],
        why: ''
      };
    }

    /* ---- 4. Not recorded. NOW propose what it probably pays. ---- */
    var invPool = poolFrom(openByCustomer, names)
      .filter(function (v) { return !v.txnDate || !d.date || v.txnDate <= d.date; })
      .map(function (v) {
        return { docNumber: v.docNumber, customer: v.customer, txnDate: v.txnDate,
                 cents: cents(v.balance), amount: v.balance };
      })
      .filter(function (v) { return v.cents > 0; });

    var raw = findCombos(invPool, target, { maxN: 6, maxHits: 60 });
    raw.sort(function (a, b) { return scoreCombo(a, d.date) - scoreCombo(b, d.date); });
    var combos = collapseCombos(raw);

    /* Arithmetic will always find SOMETHING. With 139 open invoices, most of
       them small round numbers, there is always a way to make $1,850 - and
       showing eighteen of them is not eighteen answers, it is a failure
       dressed up as a menu. Someone will pick one because it is on the screen,
       and mark the wrong invoice paid.

       Past a handful, the honest thing is to say the search cannot separate
       them, and hand the question back. */
    var TOO_MANY = 4;
    if (combos.length > TOO_MANY) {
      return {
        deposit: d, kind: isAch ? 'ach' : 'check',
        customer: isAch ? names.join(' / ') : '',
        aliasNote: isAch ? (payers[0].note || '') : '',
        recorded: null,
        candidates: [],
        tooMany: combos.length,
        why: combos.length + ' different sets of invoices add up to this exactly, ' +
             'and nothing in the data can tell them apart. Any one of them would be ' +
             'a guess. If this deposit really has not been recorded, the deposit ' +
             'slip is the only thing that can settle it.'
      };
    }

    return {
      deposit: d, kind: isAch ? 'ach' : 'check',
      customer: isAch ? names.join(' / ') : '',
      aliasNote: isAch ? (payers[0].note || '') : '',
      recorded: null,
      candidates: combos,
      why: combos.length ? '' :
        (isAch
          ? 'The bank names ' + names.join(' / ') + ', but no payment was recorded ' +
            'near this date and no open invoice of theirs adds up to it. Worth a look.'
          : 'A cheque deposit with no name on it. No payment was recorded near this ' +
            'date, and no combination of the cheque payers\' open invoices adds up to ' +
            'it. Worth opening by hand.')
    };
  });
}

/* ---------- billing ---------- */
/* The invoice log.
 *
 * Past months are the RECORD - what was actually billed, with the original
 * notes. The next unbilled month is DRAFTED: invoice numbers continuing the
 * sequence, the billing month from each customer's cadence, and the amount
 * carried from the last invoice.
 *
 * The two things a draft shows that a person scanning a spreadsheet cannot:
 * who has not paid, and whose box count moved. */

function bMonthRows(){
  var y = state.bByYear[state.bYear] || {};
  if(y[state.bMonth]) return { rows: y[state.bMonth], history: true };
  if(state.bDraft && state.bMonth === state.bDraftMonth){
    return { rows: state.bDraft.rows || [], history: false };
  }
  return { rows: [], history: true };
}

/* One row, by the name the log calls them. Wanted because a click on a
   header has to know whether there is anything behind it to open. */
function bRowByName(name){
  var rows = bMonthRows().rows || [];
  for(var i = 0; i < rows.length; i++){
    if(rows[i].shorthand === name) return rows[i];
  }
  return null;
}

function renderBilling(){
  if(!state.bLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading the log&hellip;</div>';
  }

  var md = bMonthRows();
  var all = md.rows;
  var hist = md.history;
  state.bHistory = hist;

  var yr = state.bYear || String(new Date().getFullYear());

  /* Twelve tabs, always. A month with no log yet is faded. */
  var tabs = '<div class="folder-tabs">' + MONTH_NAMES.map(function(nm, i){
    var ym = yr + "-" + (i < 9 ? "0" : "") + (i + 1);
    var has = (state.bByYear[yr] && state.bByYear[yr][ym]) || ym === state.bDraftMonth;
    return '<button class="ftab' + (state.bMonth === ym ? " sel" : "") + '" ' +
           'data-bmonth="' + ym + '"' + (has ? '' : ' style="opacity:.5"') + '>' + nm + '</button>';
  }).join("") + '</div>';

  var yrOpts = state.bYears.map(function(y){
    return '<option value="' + y + '"' + (yr === y ? " selected" : "") + '>' + y + '</option>';
  }).join("");

  var unpaid = all.filter(function(r){ return r.unpaid; });
  var boxed  = all.filter(function(r){ return r.boxChange; });

  var rows = all;
  if(!hist){
    if(state.bFilter === "unpaid") rows = unpaid;
    if(state.bFilter === "boxes")  rows = boxed;
  }

  /* Billing was the only one of the four pages with no search box - and the
     only one with 53 rows. Finding Gaylord meant scrolling for it. */
  if(state.bSearch){
    var q = state.bSearch.toLowerCase();
    rows = rows.filter(function(r){
      return String(r.shorthand).toLowerCase().indexOf(q) !== -1 ||
             String(r.customer || "").toLowerCase().indexOf(q) !== -1 ||
             String(r.invoiceNo).toLowerCase().indexOf(q) !== -1;
    });
  }

  /* Sorting the flag column is what makes the filter chips optional: one
     click and every unpaid customer sits together at the top. */
  var rank = function(r){
    if(r.unpaid) return 3;
    if(r.neverBilled) return 2;
    if(r.boxChange) return 1;
    return 0;
  };
  var dir = state.bSortDir === "asc" ? 1 : -1;
  rows = rows.slice().sort(function(a, b){
    var av, bv;
    switch(state.bSortKey){
      case "inv":    av = Number(a.invoiceNo) || 0;  bv = Number(b.invoiceNo) || 0;  break;
      case "amount": av = Number(a.amount) || 0;     bv = Number(b.amount) || 0;     break;
      case "flag":   av = rank(a);                   bv = rank(b);                   break;
      default:       av = String(a.shorthand).toLowerCase();
                     bv = String(b.shorthand).toLowerCase();
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.bSortKey !== k) return "";
    return ' <span class="sc">' + (state.bSortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  /* Only the drafted month can be filtered - a past month is a record, and
     hiding rows of a record is just losing them. */
  var chips = hist ? '' :
      '<div class="bfilter">' +
        '<button class="bchip' + (state.bFilter==="all"?" on":"") + '" data-bf="all">' +
          'All \u00b7 ' + all.length + '</button>' +
        '<button class="bchip' + (state.bFilter==="unpaid"?" on":"") + '" data-bf="unpaid">' +
          'Unpaid \u00b7 ' + unpaid.length + '</button>' +
        '<button class="bchip' + (state.bFilter==="boxes"?" on":"") + '" data-bf="boxes">' +
          'Box \u00b7 ' + boxed.length + '</button>' +
      '</div>';

  /* A quarterly customer who isn't due doesn't appear in the list - and a
     name simply missing looks like something went wrong. So say it. */
  var skip = "";
  if(!hist && state.bNotDue.length){
    skip = '<div class="bskip"><b>Not billed this month \u2014 quarterly:</b> ' +
      state.bNotDue.map(function(q){
        return esc(q.shorthand) + ' <span style="color:var(--ink-3)">(last billed ' +
               esc(q.lastBilled) + ', next ' + esc(q.nextDue) + ')</span>';
      }).join(' \u00b7 ') + '</div>';
  }

  var head = '<div class="bhead">' +
      '<span class="agcaret"></span>' +
      '<span class="bname" data-bsort="name">Name' + caret("name") + '</span>' +
      '<span class="bc-inv" data-bsort="inv">Invoice' + caret("inv") + '</span>' +
      '<span class="bc-mon">Month</span>' +
      '<span class="bc-amt" data-bsort="amount">Amount' + caret("amount") + '</span>' +
      '<span class="bc-del">Send</span>' +
      '<span class="bc-flag"' + (hist ? '' : ' data-bsort="flag"') + '>' +
        (hist ? '' : 'Flags' + caret("flag")) + '</span>' +
    '</div>';

  var body;
  if(!rows.length){
    body = skip + head + '<div class="empty-state">' +
      (state.bSearch ? 'No customer matches that.' : 'Nothing logged for this month.') +
      '</div>';
  } else {
    body = skip + head + rows.map(function(r){

      /* A past month is a RECORD. There is nothing to type into it, so the
         only thing a row can open onto is the note it was billed with. No
         note, no caret - a caret that opens an empty panel is a lie about
         there being something there. */
      var hasDetail = hist ? !!(r.notes) : true;
      var open = (hasDetail && state.bOpen[r.shorthand]) ? " open" : "";

      /* The same chips Receivables uses for aging. Red already means money
         that is late on that page, so it means the same thing here rather
         than becoming a second private language. */
      var flags = "";
      if(r.unpaid){
        flags += '<span class="chip chip-90" title="$' + fmt(r.unpaidAmt) + ' still owed">' +
                 esc(r.lastDoc) + ' unpaid</span> ';
      }
      if(r.boxChange){
        flags += '<span class="chip chip-30">' + r.boxChange.from + '\u2192' +
                 r.boxChange.to + '</span>';
      }
      if(r.neverBilled){
        flags += '<span class="chip chip-30">never billed</span>';
      }

      var d = (r.delivery || "email").toLowerCase();
      var deliv;
      if(d === "portal" && r.portalUrl){
        deliv = '<a class="bdeliv d-portal" href="' + esc(r.portalUrl) + '" ' +
                'target="_blank" rel="noopener" data-stop="1" ' +
                'title="' + esc(r.portalUrl) + '">portal \u2197</a>';
      } else if(d === "portal"){
        deliv = '<span class="bdeliv d-portal" style="cursor:default;">portal</span>';
      } else if(d === "mail"){
        deliv = '<span class="bdeliv d-mail">mail</span>';
      } else {
        deliv = '<span class="bdeliv d-email">email</span>';
      }

      /* "Haldor Topsoe / Haldor Topsoe" is a line that says nothing. */
      var dba = (r.customer &&
                 r.customer.trim().toLowerCase() !== String(r.shorthand).trim().toLowerCase())
        ? '<span class="dba">' + esc(r.customer) + '</span>' : '';

      var note  = r.notes || "";
      var fdesc = r.feeDesc || "";

      /* The reason, said ONCE, to the person who opened the row - rather
         than shouted on every one of fifty rows in the list. */
      var why = "";
      if(r.unpaid){
        why += '<div class="bwhy pay">Invoice <b>' + esc(r.lastDoc) + '</b>' +
               (r.lastDate ? ' from <b>' + esc(usDate(r.lastDate)) + '</b>' : '') +
               ' is still open \u2014 <b>$' + fmt(r.unpaidAmt) + '</b> outstanding. ' +
               'Send a reminder; do not carry it forward into this invoice.</div>';
      }
      if(r.boxChange){
        why += '<div class="bwhy box">The last invoice billed <b>' + r.boxChange.from +
               '</b> boxes; the newest shows <b>' + r.boxChange.to + '</b>. ' +
               'Check the amount before this goes out.</div>';
      }
      if(r.neverBilled){
        why += '<div class="bwhy box">Never billed \u2014 there is no history to copy ' +
               'an amount from. This one has to be typed.</div>';
      }

      var detail;
      if(hist){
        detail = note ? '<div class="bwhy"><b>Billed with this note:</b><br>' +
                        '<span class="bnote">' + esc(note) + '</span></div>' : '';
      } else {
        detail = why +
          /* The line the CUSTOMER reads. */
          '<div class="bxline">' +
            '<span class="bxlbl out">One-time fee $</span>' +
            '<input class="bfee" type="number" step="1" min="0" ' +
              'data-fee="' + esc(r.shorthand) + '" ' +
              'value="' + (r.fee ? r.fee : '') + '" placeholder="0" ' +
              'title="One-time fee \u2014 a replacement monitor, say">' +
            '<input class="bfdesc" type="text" ' +
              'data-fdesc="' + esc(r.shorthand) + '" ' +
              'value="' + esc(fdesc) + '" ' +
              'placeholder="What the fee is for \u2014 goes on the invoice" ' +
              'title="This becomes the line-item text on the customer\'s invoice.">' +
          '</div>' +
          /* The line only WasteNet reads. */
          '<div class="bxline">' +
            '<span class="bxlbl in">Internal</span>' +
            '<textarea class="bedit" rows="1" data-note="' + esc(r.shorthand) + '" ' +
              'title="Internal \u2014 stays in the log, never reaches the customer" ' +
              'placeholder="Internal note \u2014 not sent to the customer">' + esc(note) + '</textarea>' +
          '</div>' +
          (r.fee
            ? '<div class="bbase" style="text-align:left; margin-top:8px;">Invoice total: $' +
              fmt(r.baseAmount) + ' monitoring + $' + fmt(r.fee) + ' one-time = $' +
              fmt(r.amount) + '</div>'
            : '');
      }

      return '<div class="agrow' + open + '" data-brow="' + esc(r.shorthand) + '">' +
          '<div class="aghead"' + (hasDetail ? '' : ' style="cursor:default"') + '>' +
            '<span class="agcaret">' + (hasDetail ? '\u25B6' : '') + '</span>' +
            '<span class="bname">' + esc(r.shorthand) + dba + '</span>' +
            '<span class="bc-inv">' +
              (hist ? invLink(r.invoiceNo, "x") : esc(r.invoiceNo)) + '</span>' +
            '<span class="bc-mon">' + esc(r.serviceMonth) +
              (r.quarterly ? ' \u00b7 qtr' : '') + '</span>' +
            '<span class="bc-amt">' +
              (r.amount == null ? '\u2014' : '$' + fmt(r.amount)) +
              (r.boxes ? ' <span class="bx">\u00b7 ' + r.boxes + '</span>' : '') + '</span>' +
            '<span class="bc-del">' + deliv + '</span>' +
            '<span class="bc-flag">' + flags + '</span>' +
          '</div>' +
          '<div class="agdetail">' + detail + '</div>' +
        '</div>';
    }).join("");
  }

  /* The running total, in the same place and the same words the other three
     pages use. The invoice range folds into it rather than costing its own
     slot on the right. */
  var total = rows.reduce(function(s, r){ return s + (Number(r.amount) || 0); }, 0);

  var ns = all.map(function(r){ return Number(r.invoiceNo) || 0; })
              .filter(Boolean).sort(function(a, b){ return a - b; });
  var range = ns.length
    ? ' \u00b7 #' + ns[0] + (ns.length > 1 ? '\u2013' + ns[ns.length - 1] : '')
    : '';

  var title = '<div class="fbar-t">' + monthLabel(state.bMonth) +
    ' <span class="amt">\u00b7 ' + rows.length + ' invoice' + (rows.length === 1 ? '' : 's') +
    ' \u00b7 ' + moneyShort(total) + range +
    (hist ? ' \u00b7 as billed' : '') + '</span></div>';

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="bYr" aria-label="Year">' + yrOpts + '</select>' +
          title +
          chips +
          '<input class="search" id="bSearch" type="text" ' +
            'placeholder="Search customer or #" value="' + esc(state.bSearch) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower" style="padding:2px 14px 8px;">' + body + '</div>' +
    '</div>';
}

/* One request per YEAR. Month tabs then switch with no round trip at all. */
function loadBilling(year){
  if(state.bLoading) return;
  state.bLoading = true;

  jsonp({ action:"billing", key:KEY, year: year || "" }, function(data){
    state.bLoading = false;
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load the log.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.bYear       = data.year || "";
    state.bYears      = data.years || [];
    state.bMonths     = data.logMonths || [];
    state.bByYear[state.bYear] = data.byMonth || {};
    state.bDraftMonth = data.draftMonth || "";
    state.bDraft      = data.draft || null;
    state.bNotDue     = (data.draft && data.draft.notDue) || [];
    state.bLoaded     = true;
    state.bFilter     = "all";
    state.bSearch     = "";
    state.bOpen       = {};

    /* Land on the month that still needs billing - that is the one being
       worked on. Failing that, the latest month with a log. */
    var logged = Object.keys(state.bByYear[state.bYear]).sort();
    if(state.bDraftMonth) state.bMonth = state.bDraftMonth;
    else if(logged.length) state.bMonth = logged[logged.length - 1];
    else state.bMonth = state.bYear + "-01";

    renderSummary();
    renderBody();
  });
}

function wireBilling(){
  document.querySelectorAll(".ftab[data-bmonth]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-bmonth");
      if(m === state.bMonth) return;
      state.bMonth = m;
      state.bFilter = "all";
      state.bSearch = "";
      state.bOpen = {};      // a row opened in July is not a row opened in June
      renderSummary();
      renderBody();
    };
  });

  var yr = document.getElementById("bYr");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.bYear) return;
      if(state.bByYear[y]){
        state.bYear = y;
        var logged = Object.keys(state.bByYear[y]).sort();
        state.bMonth = (y === (state.bDraftMonth || "").slice(0,4) && state.bDraftMonth)
          ? state.bDraftMonth
          : (logged.length ? logged[logged.length - 1] : y + "-01");
        renderSummary();
        renderBody();
      } else {
        document.getElementById("body").innerHTML =
          '<div class="empty-state"><span class="spinner"></span>Loading ' + y + '&hellip;</div>';
        loadBilling(y);
      }
    };
  }

  document.querySelectorAll("[data-bf]").forEach(function(el){
    el.onclick = function(){
      state.bFilter = el.getAttribute("data-bf");
      renderBody();
    };
  });

  /* Sortable headers, same as Receivables and Payments. Clicking the flag
     column is the fastest way to bring every unpaid customer together. */
  document.querySelectorAll("[data-bsort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-bsort");
      if(state.bSortKey === k){
        state.bSortDir = state.bSortDir === "asc" ? "desc" : "asc";
      } else {
        state.bSortKey = k;
        /* Names read A-Z; money and flags are wanted biggest-first. */
        state.bSortDir = (k === "name") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  /* The row opens the way an agent's row opens - same class, same caret,
     same green panel. A portal link inside the row is a link, not a
     toggle, so it has to stop the click from reaching the header. */
  document.querySelectorAll(".agrow[data-brow]").forEach(function(el){
    var head = el.querySelector(".aghead");
    if(!head) return;
    head.onclick = function(ev){
      if(ev.target.closest && ev.target.closest("[data-stop]")) return;
      var k = el.getAttribute("data-brow");
      var row = bRowByName(k);
      if(state.bHistory && !(row && row.notes)) return;   // nothing to open
      state.bOpen[k] = !state.bOpen[k];
      el.classList.toggle("open");
      if(state.bOpen[k] && !state.bHistory){
        var fee = el.querySelector(".bfee");
        if(fee) fee.focus();
      }
    };
  });

  /* Notes and one-time fees save on blur, not on every keystroke - each save
     is a round trip, and typing a sentence should not fire twenty of them. */
  var saveEdit = function(name, el){
    var q = name.replace(/"/g,'\\"');
    var noteEl  = document.querySelector('[data-note="'  + q + '"]');
    var feeEl   = document.querySelector('[data-fee="'   + q + '"]');
    var descEl  = document.querySelector('[data-fdesc="' + q + '"]');

    var notes   = noteEl ? noteEl.value : "";
    var fee     = feeEl  ? (Number(feeEl.value) || 0) : 0;
    var feeDesc = descEl ? descEl.value : "";

    el.classList.remove("saved");
    el.classList.add("saving");

    jsonp({ action:"saveedit", key:KEY, month:state.bMonth,
            name:name, fee:fee, notes:notes, feeDesc:feeDesc }, function(data){
      el.classList.remove("saving");
      if(!data || !data.ok){
        el.style.borderColor = "var(--red)";
        return;
      }
      el.classList.add("saved");
      setTimeout(function(){ el.classList.remove("saved"); }, 1400);

      // Keep the in-memory draft in step, so re-rendering doesn't undo it.
      if(state.bDraft && state.bDraft.rows){
        state.bDraft.rows.forEach(function(r){
          if(r.shorthand !== name) return;
          r.notes = notes;
          r.fee = fee;
          r.feeDesc = feeDesc;
          r.amount = (r.baseAmount || 0) + fee;
        });
      }
    });
  };

  document.querySelectorAll("[data-note]").forEach(function(el){
    el.onblur = function(){ saveEdit(el.getAttribute("data-note"), el); };
  });

  document.querySelectorAll("[data-fdesc]").forEach(function(el){
    el.onblur = function(){ saveEdit(el.getAttribute("data-fdesc"), el); };
    el.onkeydown = function(e){ if(e.key === "Enter") el.blur(); };
  });

  /* Billing's search, same behaviour as the Payments one: re-render on every
     keystroke, then put the cursor back - the input is destroyed by the
     redraw that the keystroke caused. */
  var bs = document.getElementById("bSearch");
  if(bs){
    bs.oninput = function(){
      state.bSearch = bs.value;
      renderBody();
      var again = document.getElementById("bSearch");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }

  document.querySelectorAll("[data-fee]").forEach(function(el){
    el.onblur = function(){
      saveEdit(el.getAttribute("data-fee"), el);
      // The amount at the top of the page changes, so redraw the scorecard.
      setTimeout(renderSummary, 300);
    };
    el.onkeydown = function(e){ if(e.key === "Enter") el.blur(); };
  });
}

/* ---------- deposits ---------- */

/* The Frost statement, reconciled against the open invoices.
 *
 * This page NEVER writes to QuickBooks. It works out which invoices a
 * deposit paid and says so; Kim records the payment herself, in QBO, where
 * it belongs. The dashboard is doing the arithmetic nobody wants to do by
 * hand - not taking over the books.
 */

function depKey(d){ return d.date + "|" + d.amount + "|" + (d.desc || ""); }

function renderDeposits(){
  if(!state.loaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>';
  }

  /* Nothing pasted yet - explain the job, then get out of the way. */
  if(!state.dRows.length){
    return '<div class="folder"><div class="folder-lower" style="padding:30px 22px;">' +
      '<div class="dz" id="dropZone">' +
        '<div class="dz-t">Drop the Frost CSV here</div>' +
        '<div class="dz-d">Or paste it below. Export from Frost Connect \u2014 ' +
          'account activity, CSV. Money going out is ignored.</div>' +
        '<input type="file" id="dFile" accept=".csv,text/csv" style="display:none;">' +
        '<button class="btn" id="dPickFile" style="margin-top:14px;">Choose a file</button>' +
      '</div>' +
      '<textarea class="dpaste" id="dPaste" rows="5" ' +
        'placeholder="\u2026or paste the CSV text here"></textarea>' +
      '<div style="text-align:right; margin-top:9px;">' +
        '<button class="btn" id="dGo">Match deposits</button>' +
      '</div>' +
      '<div class="dnote">' +
        '<b>Nothing here touches QuickBooks.</b> This works out which open invoices ' +
        'each deposit paid and shows you. Recording the payment stays a human ' +
        'decision, made in QuickBooks.' +
      '</div>' +
    '</div></div>';
  }

  var all = state.dMatched;
  var isWork = function(r){
    return (r.kind === "ach" || r.kind === "check") && !r.recorded && r.candidates.length;
  };
  var isStuck = function(r){
    return ((r.kind === "ach" || r.kind === "check") && !r.recorded && !r.candidates.length)
           || r.kind === "unknown";
  };
  var isDone = function(r){
    return r.kind === "paylink" || r.kind === "internal" || !!r.recorded;
  };

  var counts = {
    todo:  all.filter(isWork).length,
    stuck: all.filter(isStuck).length,
    done:  all.filter(isDone).length
  };

  var rows = all;
  if(state.dFilter === "todo")  rows = all.filter(isWork);
  if(state.dFilter === "stuck") rows = all.filter(isStuck);
  if(state.dFilter === "done")  rows = all.filter(isDone);

  var chip = function(k, label, n){
    return '<button class="bchip' + (state.dFilter===k?" on":"") + '" data-df="' + k + '">' +
           label + ' \u00b7 ' + n + '</button>';
  };

  var total = rows.reduce(function(s,r){ return s + r.deposit.amount; }, 0);

  var body = rows.map(function(r){
    var d = r.deposit;
    var k = depKey(d);
    var picked = state.dPick[k];

    var tag, why = r.why || "";
    if(r.kind === "paylink")        tag = '<span class="chip chip-cur">pay-link \u00b7 done</span>';
    else if(r.kind === "internal")  tag = '<span class="chip chip-60">internal</span>';
    else if(r.kind === "unknown")   tag = '<span class="chip chip-90">unknown payer</span>';
    else if(r.recorded)             tag = '<span class="chip chip-cur">recorded \u2713</span>';
    else if(r.tooMany)              tag = '<span class="chip chip-60">can\'t tell</span>';
    else if(!r.candidates.length)   tag = '<span class="chip chip-90">unexplained</span>';
    else if(r.candidates.length === 1) tag = '<span class="chip chip-30">record this</span>';
    else tag = '<span class="chip chip-30">' + r.candidates.length + ' possible</span>';

    /* Already recorded. Show the receipt - the payments Kim keyed, and when -
       so the confirmation can be believed rather than merely asserted. */
    var done = "";
    if(r.recorded){
      done = '<div class="ddone">' +
        '<span class="dd-t">Already recorded</span>' +
        r.recorded.map(function(p){
          return '<span class="dc-inv"><b>#' + esc(p.docNumber) + '</b> $' +
                 fmt(p.amount) + ' <span class="dc-amt">keyed ' + esc(usDate(p.date)) +
                 '</span></span>';
        }).join('') +
      '</div>';
    }

    /* The candidates. One is an answer; several is a question. Say which. */
    var cands = "";
    if(r.candidates.length){
      cands = '<div class="dcands">' +
        (r.candidates.length > 1
          ? '<div class="dhint">More than one set of customers adds up to this. ' +
            'Pick the right one \u2014 the dashboard cannot know which cheques were ' +
            'in the envelope.</div>'
          : '') +
        r.candidates.map(function(c, i){
          var on = (picked === i) || (r.candidates.length === 1);
          return '<button class="dcand' + (on ? " on" : "") + '" ' +
              'data-dpick="' + esc(k) + '" data-di="' + i + '">' +
              '<span class="dc-sum">$' + fmt(c.total / 100) + '</span>' +
              c.parts.map(function(p){
                /* More invoice ids than slots means a choice remains - two
                   identical invoices for the same customer, and only their
                   dates can say which one this cheque settled. */
                var ids = (p.docs.length > p.n)
                  ? '<b>#' + p.docs.join(' or #') + '</b>'
                  : '<b>#' + p.docs.join(' + #') + '</b>';
                return '<span class="dc-inv">' + ids + ' ' + esc(p.customer) +
                  ' <span class="dc-amt">' + (p.n > 1 ? p.n + ' \u00d7 ' : '') +
                  '$' + fmt(p.cents / 100) + '</span></span>';
              }).join('') +
            '</button>';
        }).join("") +
      '</div>';
    }

    return '<div class="drow' + (isDone(r) ? " quiet" : "") + '">' +
        '<div class="dmain">' +
          '<span class="dc-date">' + esc(usDate(d.date)) + '</span>' +
          '<span class="ddesc">' + (d.desc ? esc(d.desc) :
            '<i style="color:var(--ink-3)">no description \u2014 cheque deposit</i>') + '</span>' +
          '<span class="damt">$' + fmt(d.amount) + '</span>' +
          '<span class="dtag">' + tag + '</span>' +
        '</div>' +
        (r.customer ? '<div class="dwho">Bank names <b>' + esc(r.customer) + '</b>' +
           (r.aliasNote ? ' \u2014 <span style="color:var(--ink-3)">' + esc(r.aliasNote) + '</span>' : '') +
           '</div>' : '') +
        (why ? '<div class="dwhy">' + esc(why) + '</div>' : '') +
        done +
        cands +
      '</div>';
  }).join("");

  if(!rows.length) body = '<div class="empty-state">Nothing in this bucket.</div>';

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        '<div class="fbar">' +
          '<div class="fbar-t">' + all.length + ' deposits ' +
            '<span class="amt">\u00b7 ' + moneyShort(total) + ' shown</span></div>' +
          '<div class="bfilter">' +
            chip("todo",  "To record", counts.todo) +
            chip("stuck", "Unexplained", counts.stuck) +
            chip("done",  "Nothing to do", counts.done) +
            chip("all",   "All",       all.length) +
          '</div>' +
          '<button class="btn" id="dReset">Start over</button>' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower" style="padding:10px 14px 8px;">' + body + '</div>' +
    '</div>';
}

function wireDeposits(){
  var go = function(text){
    var p = parseFrostCsv(text);
    if(p.error){ alert(p.error); return; }
    if(!p.rows.length){ alert("No deposits found in that file - only money going out."); return; }

    /* The statement has to be reconciled against the PAYMENTS Kim already
       keyed, not only against open invoices. A deposit she dealt with months
       ago has closed its invoice - searching open invoices for it finds
       nothing and says "no match", which is alarming and wrong. Fetch the
       payments recorded around these dates and ask the real question first:
       has this already been handled? */
    var dates = p.rows.map(function(r){ return r.date; }).sort();
    var from = dates[0], to = dates[dates.length - 1];

    document.getElementById("body").innerHTML =
      '<div class="empty-state"><span class="spinner"></span>Reading the books&hellip;</div>';

    jsonp({ action:"reconcile", key:KEY, from:from, to:to }, function(data){
      if(!data || !data.ok){
        alert("Couldn't read the payments: " + ((data && data.error) || "no reply"));
        state.dRows = []; renderBody(); return;
      }

      state.dRows    = p.rows;
      state.dMatched = matchDeposits(p.rows, data.open || [], data.payments || [], state.dPayers);
      state.dPick    = {};
      state.dFilter  = "todo";
      renderBody();
    });
  };

  var fileBtn = document.getElementById("dPickFile");
  var file    = document.getElementById("dFile");
  if(fileBtn && file){
    fileBtn.onclick = function(){ file.click(); };
    file.onchange = function(){
      var f = file.files && file.files[0];
      if(!f) return;
      var fr = new FileReader();
      fr.onload = function(){ go(String(fr.result || "")); };
      fr.readAsText(f);
    };
  }

  var zone = document.getElementById("dropZone");
  if(zone){
    zone.ondragover = function(e){ e.preventDefault(); zone.classList.add("over"); };
    zone.ondragleave = function(){ zone.classList.remove("over"); };
    zone.ondrop = function(e){
      e.preventDefault();
      zone.classList.remove("over");
      var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if(!f) return;
      var fr = new FileReader();
      fr.onload = function(){ go(String(fr.result || "")); };
      fr.readAsText(f);
    };
  }

  var goBtn = document.getElementById("dGo");
  var paste = document.getElementById("dPaste");
  if(goBtn && paste) goBtn.onclick = function(){ go(paste.value); };

  var reset = document.getElementById("dReset");
  if(reset) reset.onclick = function(){
    state.dRows = []; state.dMatched = []; state.dPick = {};
    renderBody();
  };

  document.querySelectorAll("[data-df]").forEach(function(el){
    el.onclick = function(){ state.dFilter = el.getAttribute("data-df"); renderBody(); };
  });

  /* Choosing between two combinations that both add up. The dashboard has
     done all it can here - it cannot know which cheques were in the
     envelope, and it should not pretend to. */
  document.querySelectorAll("[data-dpick]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-dpick");
      var i = Number(el.getAttribute("data-di"));
      state.dPick[k] = (state.dPick[k] === i) ? null : i;
      renderBody();
    };
  });
}

/* The Payer Map lives in the sheet, so it can be corrected without a
   deploy - a new customer, a new bank alias, a customer who switches from
   cheque to ACH. */
function loadPayers(){
  if(state.dPayersLoaded) return;
  jsonp({ action:"payers", key:KEY }, function(data){
    state.dPayers = (data && data.payers) || [];
    state.dPayersLoaded = true;
    if(state.section === "deposits") renderBody();
  });
}

/* ---------- body ---------- */
function renderBody(){
  var el = document.getElementById("body");

  if(state.section === "billing"){
    el.innerHTML = renderBilling();
    wireBilling();
    measurePin();
    return;
  }

  if(state.section === "agents"){
    el.innerHTML = renderAgents();
    wireAgents();
    measurePin();
    return;
  }

  if(state.section === "deposits"){
    el.innerHTML = renderDeposits();
    wireDeposits();
    measurePin();
    return;
  }

  if(state.section === "payments"){
    el.innerHTML = renderCollections();
    wireCollections();
    measurePin();
    return;
  }

  if(!state.loaded){
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>';
    return;
  }

  el.innerHTML = renderReceivables();
  wireBody();
  measurePin();
}

/* The sticky table header needs to sit exactly below the pinned tabs +
   green bar, whose height depends on wrapping. Measure it and hand the
   number to CSS rather than hardcoding a guess. */
/* Two things stack above a table header: the fixed slim bar, and the sticky
   tabs+search bar under it. --pinh is their combined height, which is where
   a <thead th> has to pin. Measured rather than hard-coded, because the
   tabs row wraps to two lines on a narrow window and a guessed number would
   be wrong exactly then. */
function measurePin(){
  var slim = document.getElementById("slimbar");
  var ph   = document.getElementById("pinhead");
  /* visibility:hidden still has layout, so the bar can be measured before
     it is ever shown. display:none could not be. */
  var sh = slim ? slim.getBoundingClientRect().height : 0;
  var h  = ph   ? ph.getBoundingClientRect().height   : 0;
  document.documentElement.style.setProperty("--slimh", Math.round(sh) + "px");
  document.documentElement.style.setProperty("--pinh",  Math.round(sh + h) + "px");
}
window.addEventListener("resize", measurePin);

/* The slim bar appears the moment the section switcher is about to be lost -
   not when the whole top card has finally gone, which felt late and dropped
   the bar in on top of rows already being read.

   It is a separate FIXED element that only fades. It never resizes and never
   takes part in layout, so revealing it cannot shift the page and cannot
   feed back into the scroll position that revealed it. */
(function(){
  var sentinel = document.getElementById("scoreSentinel");
  var slim = document.getElementById("slimbar");
  if(!sentinel || !slim) return;

  if("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      // still on screen = hide; scrolled above the top edge = show
      slim.classList.toggle("show", !entries[0].isIntersecting);
    }, { threshold: 0 });
    io.observe(sentinel);
  } else {
    var onScroll = function(){
      slim.classList.toggle("show", sentinel.getBoundingClientRect().top <= 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  }

  /* Measure once up front. Until data lands, renderBody bails out early with
     a spinner and never reaches its own measurePin() - leaving --slimh at 0
     and the tabs pinning underneath the bar for the first scroll. */
  measurePin();
})();

/* ---------- events ---------- */
function wireBody(){
  document.querySelectorAll(".ftab").forEach(function(el){
    el.onclick = function(){
      state.age = el.getAttribute("data-age");
      renderBody();
    };
  });

  document.querySelectorAll("th[data-sort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-sort");
      if(state.sortKey === k){
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = k;
        state.sortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("search");
  if(s){
    s.oninput = function(){
      state.search = s.value;
      renderBody();
      var again = document.getElementById("search");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

function wireCollections(){
  var yr = document.getElementById("yrSel");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.year) return;

      state.year = y;
      state.colSearch = "";

      // Default to the newest month in that year.
      var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === y; });
      state.month = inYear.length ? inYear[0].month : "";

      // Already fetched this year? Then nothing to wait for.
      if(state.payByYear[y]){
        renderSummary();
        renderBody();
      } else {
        loadCollections(y);
      }
    };
  }

  /* Month switching is a client-side filter - the whole year is already
     loaded, so no round trip. */
  document.querySelectorAll(".ftab[data-month]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-month");
      if(m === state.month) return;
      state.month = m;
      state.colSearch = "";
      renderSummary();
      renderBody();
    };
  });

  document.querySelectorAll("th[data-csort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-csort");
      if(state.colSortKey === k){
        state.colSortDir = state.colSortDir === "asc" ? "desc" : "asc";
      } else {
        state.colSortKey = k;
        state.colSortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("colSearch");
  if(s){
    s.oninput = function(){
      state.colSearch = s.value;
      renderBody();
      var again = document.getElementById("colSearch");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

/* Fetch a whole year (~700 rows). Months are then switched on the
   client with no further requests. */
function loadCollections(year){
  if(state.colLoading) return;
  state.colLoading = true;

  if(state.colLoaded){
    document.getElementById("body").innerHTML =
      '<div class="empty-state"><span class="spinner"></span>Loading ' + (year || "") + '&hellip;</div>';
  }

  var params = { action:"collections", key:KEY };
  if(year) params.year = year;

  jsonp(params, function(data){
    state.colLoading = false;

    if(!data || !data.ok){
      showError((data && data.error) || "Could not load payments.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.months = data.months || [];
    state.years  = data.years  || [];
    state.ytd    = Number(data.ytd) || 0;
    state.year   = data.year || state.year;
    state.payByYear[state.year] = data.payments || [];

    // Land on the newest month of the loaded year.
    var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });
    if(!state.month || state.month.slice(0,4) !== state.year){
      state.month = inYear.length ? inYear[0].month : "";
    }

    state.colLoaded = true;
    renderSummary();
    renderBody();
  });
}

/* Both bars carry the same four buttons, so ".sec" wires both at once. The
   ON state has to be set by KEY, not on the element that happened to be
   clicked - otherwise clicking Billing in the slim bar lights it there while
   the top card still insists you are on Receivables. */
document.querySelectorAll(".sec").forEach(function(el){
  el.onclick = function(){
    var key = el.getAttribute("data-sec");
    state.section = key;
    document.querySelectorAll(".sec").forEach(function(x){
      x.classList.toggle("on", x.getAttribute("data-sec") === key);
    });

    /* Switching section from the slim bar means arriving at a new page
       already scrolled halfway down someone else's list. Go to the top -
       which also retracts the slim bar, because the real header is back. */
    window.scrollTo(0, 0);

    // Payments load on first visit to Collections, not at page load.
    if(state.section === "payments" && !state.colLoaded && !state.colLoading){
      renderSummary();
      renderBody();
      loadCollections("");
      return;
    }

    if(state.section === "agents" && !state.agLoaded && !state.agLoading){
      renderSummary();
      renderBody();
      loadPayouts("");
      return;
    }

    if(state.section === "billing" && !state.bLoaded && !state.bLoading){
      renderSummary();
      renderBody();
      loadBilling("");
      return;
    }

    /* Deposits needs two things: the open invoices (already loaded with
       Receivables) and the Payer Map, which is fetched once. */
    if(state.section === "deposits" && !state.dPayersLoaded){
      loadPayers();
    }

    renderSummary();
    renderBody();
  };
});

function showError(msg){
  var b = document.getElementById("banner");
  b.textContent = msg;
  b.className = "banner show";
  document.getElementById("body").innerHTML =
    '<div class="empty-state">Couldn\'t load invoices.</div>';
}

/* ---------- load ---------- */
function load(){
  document.getElementById("stamp").textContent = "Loading\u2026";
  jsonp({ action:"receivables", key:KEY }, function(data){
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load invoices.");
      document.getElementById("stamp").textContent = "";
      return;
    }
    document.getElementById("banner").className = "banner";
    state.invoices   = data.invoices || [];
    state.paidCount  = Number(data.paidCount) || 0;
    state.totalCount = Number(data.totalCount) || 0;
    state.loaded     = true;
    document.getElementById("stamp").textContent =
      state.totalCount.toLocaleString("en-US") + " invoices";
    renderSummary();
    renderBody();
  });
}

/* ---------- header ---------- */
var viewBtn  = document.getElementById("viewBtn");
var viewDrop = document.getElementById("viewDrop");

/* One helper for both bars. The button carries the .open class too, so the
   caret can flip and the control can show it is holding a menu open. */
function wireViewNav(btn, drop){
  if(!btn || !drop) return;
  btn.onclick = function(e){
    e.stopPropagation();
    var open = !drop.classList.contains("open");
    closeAllViewNavs();
    drop.classList.toggle("open", open);
    btn.classList.toggle("open", open);
  };
}
function closeAllViewNavs(){
  document.querySelectorAll(".view-drop").forEach(function(d){ d.classList.remove("open"); });
  document.querySelectorAll(".view-label").forEach(function(b){ b.classList.remove("open"); });
}

wireViewNav(viewBtn, viewDrop);
wireViewNav(document.getElementById("slimViewBtn"), document.getElementById("slimViewDrop"));
document.addEventListener("click", closeAllViewNavs);

document.getElementById("goMonitor").onclick     = function(){ window.location.href = MONITOR_URL; };
document.getElementById("slimGoMonitor").onclick = function(){ window.location.href = MONITOR_URL; };
document.getElementById("refreshBtn").onclick     = function(){ load(); };
document.getElementById("slimRefreshBtn").onclick = function(){ load(); };

/* ---------- lock ---------- */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.classList.add("hide");
    document.getElementById("lockErr").style.display = "none";
    load();
  }

  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){
    lock.classList.add("hide");
    load();
  } else {
    lockIn.focus();
  }
})();
</script>
