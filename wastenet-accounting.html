<!DOCTYPE html>
<!-- wastenet-accounting · build 2026-07-11-c · sections + sticky folder -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WasteNet Accounting</title>
<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B; --amber-tint:#FAEEDA;
    --coral:#D85A30; --coral-dark:#712B13; --coral-tint:#FAECE7;
    --red:#E24B4A; --red-dark:#A32D2D; --red-darker:#791F1F; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --pinh:0px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font); background:var(--page); color:var(--ink);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px; margin:0 auto; padding:16px 16px 60px;}

  /* ---- top card: brand + sections + compact scorecard ---- */
  .topcard{border:0.5px solid var(--line); border-radius:12px; background:var(--card); padding:10px 14px 12px; margin-bottom:14px;}

  .header-bar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;}
  .brand{display:flex; align-items:center; gap:9px; min-width:0;}
  .brand-name{font-size:15px; font-weight:800; letter-spacing:0.04em; color:var(--green); flex:0 0 auto;}
  .brand-div{width:1px; height:14px; background:var(--line-strong); flex:0 0 auto;}
  .header-right{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .stamp{font-size:10.5px; color:var(--ink-3); white-space:nowrap;}
  .btn{font-size:12px; color:var(--ink); background:var(--card); border:0.5px solid var(--line-strong); padding:4px 9px; border-radius:14px; cursor:pointer; font-family:var(--font); transition:background .12s;}
  .btn:hover{background:var(--panel);}

  .viewnav{position:relative; flex:0 0 auto;}
  .view-label{font-size:12.5px; color:var(--ink-2); background:transparent; border:none; padding:2px 4px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-family:var(--font);}
  .view-label:hover{color:var(--ink);}
  .view-caret{font-size:9px; color:var(--ink-3);}
  .view-drop{position:absolute; top:100%; left:0; margin-top:6px; background:var(--card); border:0.5px solid var(--line-strong); border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,0.10); min-width:190px; z-index:80; display:none; overflow:hidden;}
  .view-drop.open{display:block;}
  .view-opt{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13px; color:var(--ink); background:transparent; border:none; cursor:pointer; font-family:var(--font);}
  .view-opt:hover{background:var(--panel);}
  .view-opt.cur{color:var(--green-dark); font-weight:600; background:var(--green-tint-2);}

  /* section switcher */
  .sections{display:flex; gap:6px; margin-bottom:11px; flex-wrap:wrap;}
  .sec{
    font-size:12px; font-weight:500; font-family:var(--font);
    padding:5px 13px; border-radius:15px; cursor:pointer; white-space:nowrap;
    border:0.5px solid var(--line-strong); background:var(--card); color:var(--ink-2);
    transition:background .12s, color .12s, border-color .12s;
  }
  .sec:hover:not(.on){background:var(--panel);}
  .sec.on{background:var(--green); border-color:var(--green); color:#fff;}

  /* compact scorecard - one strip, four figures */
  .score{display:flex; border:0.5px solid var(--line); border-radius:10px; overflow:hidden;}
  .score-cell{flex:1; min-width:0; padding:8px 6px; text-align:center; border-right:0.5px solid var(--line);}
  .score-cell:last-child{border-right:none;}
  .score-n{font-size:17px; font-weight:600; letter-spacing:-0.01em; line-height:1.2;}
  .score-l{font-size:10px; color:var(--ink-2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .n-ink{color:var(--ink);}
  .n-red{color:var(--red-dark);}
  .n-green{color:var(--green-dark);}

  /* ---- folder: five tabs, one body. Tabs + bar pin on scroll. ---- */
  .folder{margin-bottom:20px;}

  .pinhead{position:sticky; top:0; z-index:30; background:var(--page); padding-top:6px;}

  .folder-tabs{display:flex; gap:4px; flex-wrap:wrap; padding-left:2px;}
  /* Months don't wrap - a year of them would stack three deep. Scroll
     sideways instead, newest first. */
  .folder-tabs.scroll{flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding-bottom:0;}
  .folder-tabs.scroll::-webkit-scrollbar{display:none;}
  .folder-tabs.scroll .ftab{flex:0 0 auto;}

  /* There are years of months, so the tab strip scrolls sideways. The
     fade is on the WRAPPER, not the scroller - on the scroller it would
     slide away with the content and stop meaning anything. It hides
     itself once you reach the end. */
  /* year picker - first thing in the green bar */
  .yrsel{
    font-size:12px; font-family:var(--font); font-weight:600;
    color:var(--green-dark); background:var(--card);
    border:0.5px solid var(--green-border); border-radius:15px;
    padding:6px 28px 6px 13px; cursor:pointer; outline:none; flex:0 0 auto;
    max-width:190px;
    /* the native arrow sits flush against the text in a pill this small,
       so draw our own and give it room */
    appearance:none; -webkit-appearance:none; -moz-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='9' height='6' viewBox='0 0 9 6'%3E%3Cpath d='M1 1l3.5 3.5L8 1' stroke='%233B6D11' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 10px center;
  }
  .yrsel:focus{border-color:var(--green);}

  .tabscroll{position:relative;}  .tabscroll{position:relative;}
  .tabscroll::after{
    content:""; position:absolute; top:0; right:0; bottom:0; width:44px;
    pointer-events:none; opacity:1; transition:opacity .15s;
    background:linear-gradient(to right, rgba(250,251,248,0), var(--page) 72%);
  }
  .tabscroll.at-end::after{opacity:0;}
  .ftab{
    display:inline-flex; align-items:center;
    background:var(--green-tint); border:0.5px solid var(--green-border);
    border-bottom:none; border-radius:9px 9px 0 0;
    padding:7px 13px 8px; font-size:12px; font-weight:600;
    color:var(--green-dark); cursor:pointer; font-family:var(--font);
    white-space:nowrap; position:relative; z-index:1; margin-bottom:-1px;
    transition:background .12s, color .12s;
  }
  .ftab:hover:not(.sel){background:var(--green-border);}
  .ftab.sel{background:var(--card); color:var(--green-darker); z-index:3; padding-bottom:9px;}

  /* the green bar - last thing that stays put when you scroll */
  .fbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 14px; background:var(--green-tint-2);
    border-left:0.5px solid var(--green-border);
    border-right:0.5px solid var(--green-border);
    border-top:0.5px solid var(--green-border);
    border-bottom:0.5px solid var(--line);
    position:relative; z-index:2;
  }
  .fbar-t{font-size:12.5px; font-weight:600; color:var(--green-darker); min-width:0; flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fbar-t .amt{font-weight:400; color:var(--green-dark); font-size:11.5px;}

  .search{font-size:11.5px; padding:5px 10px; border:0.5px solid var(--green-border); border-radius:14px; width:165px; outline:none; font-family:var(--font); color:var(--ink); background:var(--card); flex:0 0 auto;}
  .search:focus{border-color:var(--green);}

  .folder-lower{
    border-left:0.5px solid var(--green-border);
    border-right:0.5px solid var(--green-border);
    border-bottom:0.5px solid var(--green-border);
    border-radius:0 0 12px 12px;
    background:var(--card); padding:0 16px 6px;
  }

  table{width:100%; border-collapse:collapse; table-layout:fixed;}
  thead th{
    position:sticky; top:var(--pinh); z-index:5; background:var(--card);
    font-size:10.5px; font-weight:600; color:var(--ink-2); text-align:left;
    padding:7px 4px; border-bottom:0.5px solid var(--line-strong);
    cursor:pointer; user-select:none; white-space:nowrap;
  }
  thead th:hover{color:var(--ink);}
  th .sc{color:var(--ink-3); font-size:9px;}
  td{padding:8px 4px; border-bottom:0.5px solid var(--line); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel);}
  .num{text-align:right;}
  .muted{color:var(--ink-2);}

  .chip{display:inline-block; padding:2px 8px; border-radius:11px; font-size:10.5px; font-weight:600; white-space:nowrap;}
  .chip-cur{background:var(--green-tint); color:var(--green-darker);}
  .chip-30{background:var(--amber-tint); color:var(--amber-dark);}
  .chip-60{background:var(--coral-tint); color:var(--coral-dark);}
  .chip-90{background:var(--red-tint); color:var(--red-dark);}
  .chip-90p{background:var(--red-tint); color:var(--red-darker);}

  /* coming soon */
  .soon{border:0.5px solid var(--line); border-radius:14px; background:var(--card); padding:30px 26px; text-align:center;}
  .soon-disc{width:52px; height:52px; border-radius:50%; margin:0 auto 14px; background:var(--green-tint); border:1px solid var(--green-border); display:flex; align-items:center; justify-content:center; color:var(--green-dark);}
  .soon-disc svg{width:24px; height:24px;}
  .soon-t{font-size:15px; font-weight:600; margin-bottom:5px;}
  .soon-tag{display:inline-block; font-size:10.5px; font-weight:600; color:var(--amber-dark); background:var(--amber-tint); padding:2px 9px; border-radius:11px; margin-bottom:12px;}
  .soon-d{font-size:13px; color:var(--ink-2); line-height:1.6; max-width:440px; margin:0 auto 16px;}
  .soon-list{text-align:left; max-width:390px; margin:0 auto; font-size:12.5px; color:var(--ink-2); line-height:1.9;}
  .soon-list li{margin:0;}
  .soon-note{margin-top:16px; font-size:11.5px; color:var(--ink-3); font-style:italic;}

  .empty-state{text-align:center; padding:36px 16px; color:var(--ink-2); font-size:13px;}
  .banner{display:none; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner.show{display:block; background:var(--red-tint); color:var(--red-darker); border:0.5px solid var(--red);}
  .spinner{display:inline-block; width:13px; height:13px; border:2px solid var(--line-strong); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin-right:7px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* lock */
  .lock{position:fixed; inset:0; z-index:200; background:var(--page); display:flex; align-items:center; justify-content:center; padding:20px;}
  .lock.hide{display:none;}
  .lock-card{width:min(360px,100%); background:var(--card); border:0.5px solid var(--line-strong); border-radius:12px; padding:24px; text-align:center; box-shadow:0 3px 14px rgba(0,0,0,0.07);}
  .lock-brand{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); margin-bottom:4px;}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:6px; font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:12px; padding:11px; font-size:14px; font-weight:600; border-radius:6px; border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font);}
  .lock-err{margin-top:12px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:6px; color:var(--red-dark); font-size:12.5px; font-weight:600;}

  @media (max-width:560px){
    .search{width:104px;}
    th:nth-child(3), td:nth-child(3){display:none;}
    .score-n{font-size:15px;}
    .ftab{padding:6px 9px 7px; font-size:11px;}
  }
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-card">
    <div class="lock-brand">WASTENET</div>
    <div class="lock-sub">Enter the access code to continue.</div>
    <input class="lock-in" id="lockIn" type="password" placeholder="Access code" autofocus>
    <button class="lock-btn" id="lockBtn">Unlock</button>
    <div class="lock-err" id="lockErr" style="display:none;"></div>
  </div>
</div>

<div class="wrap">

  <div class="topcard">
    <div class="header-bar">
      <div class="brand">
        <div class="brand-name">WASTENET</div>
        <div class="brand-div"></div>
        <div class="viewnav">
          <button class="view-label" id="viewBtn">Accounting <span class="view-caret">&#9662;</span></button>
          <div class="view-drop" id="viewDrop">
            <button class="view-opt" id="goMonitor">Box Monitor Dashboard</button>
            <button class="view-opt cur">Accounting Dashboard</button>
          </div>
        </div>
      </div>
      <div class="header-right">
        <span class="stamp" id="stamp">Loading&hellip;</span>
        <button class="btn" id="refreshBtn" aria-label="Refresh">&#8635;</button>
      </div>
    </div>

    <div class="sections" id="sections">
      <button class="sec on" data-sec="receivables">Receivables</button>
      <button class="sec" data-sec="collections">Collections</button>
      <button class="sec" data-sec="commissions">Commissions</button>
    </div>

    <div id="summary"></div>
  </div>

  <div class="banner" id="banner"></div>

  <div id="body">
    <div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>
  </div>

</div>

<script>
/* ============================================================
   WasteNet Accounting

   Three sections, three different jobs:
     Receivables  - who owes us (open invoices, by aging bucket)
     Collections  - what actually came in, by month   [coming]
     Commissions  - what we owe the six agents        [coming]

   Reads the `receivables` action, which returns ONLY the open
   invoices plus the counts the scorecard needs. The Invoices tab
   holds ~6,000 rows; shipping all of them to render ~140 was why
   this page used to load slowly.
   ============================================================ */

var API = "https://script.google.com/macros/s/AKfycbwvvAfVChkEJPlgz8c0iRbH23YIrtxM7SGjm5YgNz-kgs43N7hCGtd8nqBewJJOt8mV/exec";
var MONITOR_URL = "wastenet-monitor.html";

/* Access code. NOT hardcoded - this file's source is public on GitHub,
   so a baked-in key would protect nothing. Entered on the lock screen,
   held in sessionStorage, sent with every request for the Apps Script
   to check server-side. Same session entry as index and the monitor. */
var KEY = (function(){
  try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; }
  catch(e){ return ""; }
})();

function lockOut(msg){
  try { sessionStorage.removeItem("wastenet_dashboard_key"); } catch(e){}
  KEY = "";
  var lock = document.getElementById("lock");
  var err  = document.getElementById("lockErr");
  if(lock) lock.classList.remove("hide");
  if(err){
    if(msg){ err.textContent = msg; err.style.display = "block"; }
    else { err.style.display = "none"; }
  }
  var inp = document.getElementById("lockIn");
  if(inp){ inp.value = ""; inp.focus(); }
}

var state = {
  section: "receivables",
  invoices: [],      // open only
  paidCount: 0,
  totalCount: 0,
  loaded: false,
  age: "current",
  search: "",
  sortKey: "age",
  sortDir: "desc",

  // collections
  months: [],          // [{month,total,count}] newest first
  month: "",           // selected yyyy-mm
  payments: [],        // rows for the selected month
  ytd: 0,
  colLoaded: false,
  colLoading: false,
  colSearch: "",
  colSortKey: "date",
  colSortDir: "desc",
  year: "",           // which year is loaded
  years: [],          // [{year,total}] newest first
  payByYear: {}       // year -> payment rows, so month switching is free
};

/* ---------- JSONP ---------- */
function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var s;
  var timeout = setTimeout(function(){
    cleanup();
    cb({ ok:false, error:"Request timed out. Check your connection." });
  }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){
    cleanup();
    if(data && data.authRequired){
      lockOut("That access code was not accepted. Please try again.");
      return;
    }
    cb(data);
  };
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);
  }).join("&");
  s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* ---------- helpers ---------- */
function money(n){
  n = Number(n) || 0;
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function moneyShort(n){
  n = Number(n) || 0;
  return "$" + Math.round(n).toLocaleString("en-US");
}
function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* Days past due. Zero or negative = not yet due. */
function daysOverdue(inv){
  if(!inv.dueDate) return 0;
  var due = new Date(inv.dueDate + "T00:00:00");
  if(isNaN(due.getTime())) return 0;
  var t = new Date();
  t = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  return Math.floor((t - due) / 86400000);
}

function bucketOf(inv){
  var d = daysOverdue(inv);
  if(d <= 0)  return "current";
  if(d <= 30) return "b30";
  if(d <= 60) return "b60";
  if(d <= 90) return "b90";
  return "b90p";
}

var BUCKETS = [
  { key:"current", label:"Current",         chip:"chip-cur"  },
  { key:"b30",     label:"1\u201330 days",  chip:"chip-30"   },
  { key:"b60",     label:"31\u201360 days", chip:"chip-60"   },
  { key:"b90",     label:"61\u201390 days", chip:"chip-90"   },
  { key:"b90p",    label:"90+ days",        chip:"chip-90p"  }
];

function chipFor(inv){
  var d = daysOverdue(inv);
  var meta = BUCKETS.filter(function(x){ return x.key === bucketOf(inv); })[0];
  return '<span class="chip ' + meta.chip + '">' + (d <= 0 ? "Current" : d + "d") + '</span>';
}

/* ---------- scorecard ---------- */
function cell(n, label, cls){
  return '<div class="score-cell">' +
           '<div class="score-n ' + (cls || "n-ink") + '">' + n + '</div>' +
           '<div class="score-l">' + label + '</div>' +
         '</div>';
}

var MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function monthLabel(m){
  if(!m || m.length < 7) return m || "";
  var mi = parseInt(m.slice(5,7), 10) - 1;
  return (MONTH_NAMES[mi] || "?") + " " + m.slice(0,4);
}

/* Tabs show the month alone - the year is right there in the dropdown,
   and dropping it lets all twelve sit on one row. */
function monthShort(m){
  if(!m || m.length < 7) return m || "";
  return MONTH_NAMES[parseInt(m.slice(5,7), 10) - 1] || "?";
}

function renderSummary(){
  var el = document.getElementById("summary");

  if(state.section === "commissions"){
    el.innerHTML = "";
    return;
  }

  if(state.section === "collections"){
    if(!state.colLoaded){ el.innerHTML = ""; return; }

    var cur  = state.months[0];
    var prev = state.months[1];
    var sel  = state.months.filter(function(m){ return m.month === state.month; })[0];

    el.innerHTML = '<div class="score">' +
      cell(moneyShort(sel ? sel.total : 0), monthLabel(state.month) + " collected", "n-ink") +
      cell(moneyShort(prev ? prev.total : 0), monthLabel(prev ? prev.month : ""), "n-ink") +
      cell(moneyShort(state.ytd), "year to date", "n-green") +
      cell(sel ? sel.count : 0, "payments", "n-ink") +
    '</div>';
    return;
  }

  var open = state.invoices;
  var outstanding = open.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);
  var pastDueAmt = open.filter(function(i){ return daysOverdue(i) > 0; })
                       .reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  el.innerHTML = '<div class="score">' +
    cell(moneyShort(outstanding), "outstanding", "n-ink") +
    cell(moneyShort(pastDueAmt),  "past due",    "n-red") +
    cell(open.length,             "open",        "n-ink") +
    cell(state.paidCount.toLocaleString("en-US"), "paid", "n-green") +
  '</div>';
}

/* ---------- receivables ---------- */
function renderReceivables(){
  var open = state.invoices;

  var counts = {};
  BUCKETS.forEach(function(b){ counts[b.key] = 0; });
  open.forEach(function(i){ counts[bucketOf(i)] += 1; });

  /* Five folder tabs. No counts on them - the green bar below reports
     the count and the dollar total for whichever tab is open. */
  var tabs = '<div class="folder-tabs">' + BUCKETS.map(function(b){
    return '<button class="ftab' + (state.age === b.key ? " sel" : "") + '" data-age="' + b.key + '">' +
             b.label + '</button>';
  }).join("") + '</div>';

  var rows = open.filter(function(i){ return bucketOf(i) === state.age; });

  if(state.search){
    var q = state.search.toLowerCase();
    rows = rows.filter(function(i){
      return String(i.customer).toLowerCase().indexOf(q) !== -1 ||
             String(i.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.sortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.sortKey){
      case "inv":     av = String(a.docNumber); bv = String(b.docNumber); break;
      case "cust":    av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "due":     av = String(a.dueDate); bv = String(b.dueDate); break;
      case "balance": av = Number(a.balance)||0; bv = Number(b.balance)||0; break;
      default:        av = daysOverdue(a); bv = daysOverdue(b);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.sortKey !== k) return "";
    return ' <span class="sc">' + (state.sortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-sort="inv"     style="width:13%">Invoice'  + caret("inv")  + '</th>' +
      '<th data-sort="cust"    style="width:36%">Customer' + caret("cust") + '</th>' +
      '<th data-sort="due"     style="width:17%">Due'      + caret("due")  + '</th>' +
      '<th data-sort="balance" style="width:18%" class="num">Balance' + caret("balance") + '</th>' +
      '<th data-sort="age"     style="width:16%" class="num">Age' + caret("age") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="5" style="text-align:center; padding:26px 8px; color:var(--ink-2);">Nothing in this bucket.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(i){
      return '<tr>' +
        '<td class="muted">' + esc(i.docNumber) + '</td>' +
        '<td title="' + esc(i.customer) + '">' + esc(i.customer) + '</td>' +
        '<td class="muted">' + esc(i.dueDate || "\u2014") + '</td>' +
        '<td class="num">' + money(i.balance) + '</td>' +
        '<td class="num">' + chipFor(i) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var cur = BUCKETS.filter(function(b){ return b.key === state.age; })[0];
  var owed = rows.reduce(function(s,i){ return s + (Number(i.balance)||0); }, 0);

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<div class="fbar-t">' + cur.label +
            ' <span class="amt">\u00b7 ' + rows.length + ' invoices \u00b7 ' + moneyShort(owed) + '</span></div>' +
          '<input class="search" id="search" type="text" placeholder="Search customer or #" value="' + esc(state.search) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower"><table>' + head + tbody + '</table></div>' +
    '</div>';
}

/* ---------- coming soon panels ---------- */
function soonPanel(icon, title, desc, bullets, note){
  return '<div class="soon">' +
      '<div class="soon-disc">' + icon + '</div>' +
      '<div class="soon-t">' + title + '</div>' +
      '<div class="soon-tag">Coming soon</div>' +
      '<div class="soon-d">' + desc + '</div>' +
      '<ul class="soon-list">' + bullets.map(function(b){ return '<li>' + b + '</li>'; }).join("") + '</ul>' +
      (note ? '<div class="soon-note">' + note + '</div>' : '') +
    '</div>';
}

var ICON_COLLECT =
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" ' +
  'stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/>' +
  '<path d="M16.5 7.2A3.4 3.4 0 0 0 13.4 5.4h-2.2a2.9 2.9 0 0 0 0 5.8h1.6a2.9 2.9 0 0 1 0 5.8H10a3.4 3.4 0 0 1-3.1-1.8"/></svg>';

var ICON_COMMISSION =
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" ' +
  'stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7.5" r="3"/>' +
  '<path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16.5 11.5h5"/><path d="M19 9v5"/>' +
  '<path d="M16.5 18h5"/></svg>';

/* ---------- collections ---------- */
function renderCollections(){
  if(!state.colLoaded){
    return '<div class="empty-state"><span class="spinner"></span>Loading payments&hellip;</div>';
  }
  if(!state.months.length){
    return '<div class="empty-state">No payments found.</div>';
  }

  /* months in the loaded year, newest first */
  var shown = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });

  var tabs = '<div class="folder-tabs">' + shown.map(function(m){
    return '<button class="ftab' + (state.month === m.month ? " sel" : "") + '" ' +
           'data-month="' + m.month + '">' + monthShort(m.month) + '</button>';
  }).join("") + '</div>';

  /* Payments for the loaded year are already here - slice by month with
     no round trip. */
  var rows = (state.payByYear[state.year] || []).filter(function(p){
    return String(p.txnDate).slice(0,7) === state.month;
  });

  if(state.colSearch){
    var q = state.colSearch.toLowerCase();
    rows = rows.filter(function(p){
      return String(p.customer).toLowerCase().indexOf(q) !== -1 ||
             String(p.docNumber).toLowerCase().indexOf(q) !== -1;
    });
  }

  var dir = state.colSortDir === "asc" ? 1 : -1;
  rows.sort(function(a,b){
    var av, bv;
    switch(state.colSortKey){
      case "cust":   av = String(a.customer).toLowerCase(); bv = String(b.customer).toLowerCase(); break;
      case "inv":    av = String(a.docNumber); bv = String(b.docNumber); break;
      case "amount": av = Number(a.amount)||0; bv = Number(b.amount)||0; break;
      default:       av = String(a.txnDate); bv = String(b.txnDate);
    }
    if(av < bv) return -1 * dir;
    if(av > bv) return  1 * dir;
    return 0;
  });

  var caret = function(k){
    if(state.colSortKey !== k) return "";
    return ' <span class="sc">' + (state.colSortDir === "asc" ? "\u25B2" : "\u25BC") + '</span>';
  };

  var head =
    '<thead><tr>' +
      '<th data-csort="date"   style="width:17%">Date'     + caret("date")   + '</th>' +
      '<th data-csort="cust"   style="width:42%">Customer' + caret("cust")   + '</th>' +
      '<th data-csort="inv"    style="width:18%">Invoice'  + caret("inv")    + '</th>' +
      '<th data-csort="amount" style="width:23%" class="num">Amount' + caret("amount") + '</th>' +
    '</tr></thead>';

  var tbody;
  if(!rows.length){
    tbody = '<tbody><tr><td colspan="4" style="text-align:center; padding:26px 8px; color:var(--ink-2);">No payments in this month.</td></tr></tbody>';
  } else {
    tbody = '<tbody>' + rows.map(function(p){
      /* No invoice link = a credit or prepayment. Shown plainly rather
         than hidden - the money did arrive. */
      var inv = p.docNumber
        ? esc(p.docNumber)
        : '<span class="chip chip-30">unapplied</span>';
      return '<tr>' +
        '<td class="muted">' + esc(p.txnDate) + '</td>' +
        '<td title="' + esc(p.customer) + '">' + esc(p.customer) + '</td>' +
        '<td class="muted">' + inv + '</td>' +
        '<td class="num">' + money(p.amount) + '</td>' +
      '</tr>';
    }).join("") + '</tbody>';
  }

  var total = rows.reduce(function(s,p){ return s + (Number(p.amount)||0); }, 0);

  /* Each option carries what that year collected, so the totals are
     visible in the list itself - and the closed pill shows the selected
     year's total without costing another line of chrome. */
  var yrOpts = state.years.map(function(y){
    return '<option value="' + y.year + '"' + (state.year === y.year ? " selected" : "") + '>' +
             y.year + '  \u00b7  ' + moneyShort(y.total) + '</option>';
  }).join("");

  return '<div class="folder">' +
      '<div class="pinhead" id="pinhead">' +
        tabs +
        '<div class="fbar">' +
          '<select class="yrsel" id="yrSel" aria-label="Year">' + yrOpts + '</select>' +
          '<div class="fbar-t">' + monthLabel(state.month) +
            ' <span class="amt">\u00b7 ' + rows.length + ' payments \u00b7 ' + moneyShort(total) + '</span></div>' +
          '<input class="search" id="colSearch" type="text" placeholder="Search customer or #" value="' + esc(state.colSearch) + '">' +
        '</div>' +
      '</div>' +
      '<div class="folder-lower"><table>' + head + tbody + '</table></div>' +
    '</div>';
}

/* ---------- body ---------- */
function renderBody(){
  var el = document.getElementById("body");

  if(state.section === "commissions"){ el.innerHTML = renderCommissions(); return; }

  if(state.section === "collections"){
    el.innerHTML = renderCollections();
    wireCollections();
    measurePin();
    return;
  }

  if(!state.loaded){
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading invoices&hellip;</div>';
    return;
  }

  el.innerHTML = renderReceivables();
  wireBody();
  measurePin();
}

/* The sticky table header needs to sit exactly below the pinned tabs +
   green bar, whose height depends on wrapping. Measure it and hand the
   number to CSS rather than hardcoding a guess. */
function measurePin(){
  var ph = document.getElementById("pinhead");
  var h = ph ? ph.getBoundingClientRect().height : 0;
  document.documentElement.style.setProperty("--pinh", Math.round(h) + "px");
}
window.addEventListener("resize", function(){ if(state.section !== "commissions") measurePin(); });

/* ---------- events ---------- */
function wireBody(){
  document.querySelectorAll(".ftab").forEach(function(el){
    el.onclick = function(){
      state.age = el.getAttribute("data-age");
      renderBody();
    };
  });

  document.querySelectorAll("th[data-sort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-sort");
      if(state.sortKey === k){
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = k;
        state.sortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("search");
  if(s){
    s.oninput = function(){
      state.search = s.value;
      renderBody();
      var again = document.getElementById("search");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

function wireCollections(){
  var yr = document.getElementById("yrSel");
  if(yr){
    yr.onchange = function(){
      var y = yr.value;
      if(y === state.year) return;

      state.year = y;
      state.colSearch = "";

      // Default to the newest month in that year.
      var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === y; });
      state.month = inYear.length ? inYear[0].month : "";

      // Already fetched this year? Then nothing to wait for.
      if(state.payByYear[y]){
        renderSummary();
        renderBody();
      } else {
        loadCollections(y);
      }
    };
  }

  /* Month switching is a client-side filter - the whole year is already
     loaded, so no round trip. */
  document.querySelectorAll(".ftab[data-month]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-month");
      if(m === state.month) return;
      state.month = m;
      state.colSearch = "";
      renderSummary();
      renderBody();
    };
  });

  document.querySelectorAll("th[data-csort]").forEach(function(el){
    el.onclick = function(){
      var k = el.getAttribute("data-csort");
      if(state.colSortKey === k){
        state.colSortDir = state.colSortDir === "asc" ? "desc" : "asc";
      } else {
        state.colSortKey = k;
        state.colSortDir = (k === "cust" || k === "inv") ? "asc" : "desc";
      }
      renderBody();
    };
  });

  var s = document.getElementById("colSearch");
  if(s){
    s.oninput = function(){
      state.colSearch = s.value;
      renderBody();
      var again = document.getElementById("colSearch");
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    };
  }
}

/* Fetch a whole year (~700 rows). Months are then switched on the
   client with no further requests. */
function loadCollections(year){
  if(state.colLoading) return;
  state.colLoading = true;

  if(state.colLoaded){
    document.getElementById("body").innerHTML =
      '<div class="empty-state"><span class="spinner"></span>Loading ' + (year || "") + '&hellip;</div>';
  }

  var params = { action:"collections", key:KEY };
  if(year) params.year = year;

  jsonp(params, function(data){
    state.colLoading = false;

    if(!data || !data.ok){
      showError((data && data.error) || "Could not load payments.");
      return;
    }
    document.getElementById("banner").className = "banner";

    state.months = data.months || [];
    state.years  = data.years  || [];
    state.ytd    = Number(data.ytd) || 0;
    state.year   = data.year || state.year;
    state.payByYear[state.year] = data.payments || [];

    // Land on the newest month of the loaded year.
    var inYear = state.months.filter(function(m){ return m.month.slice(0,4) === state.year; });
    if(!state.month || state.month.slice(0,4) !== state.year){
      state.month = inYear.length ? inYear[0].month : "";
    }

    state.colLoaded = true;
    renderSummary();
    renderBody();
  });
}

document.querySelectorAll(".sec").forEach(function(el){
  el.onclick = function(){
    state.section = el.getAttribute("data-sec");
    document.querySelectorAll(".sec").forEach(function(x){ x.classList.remove("on"); });
    el.classList.add("on");

    // Payments load on first visit to Collections, not at page load.
    if(state.section === "collections" && !state.colLoaded && !state.colLoading){
      renderSummary();
      renderBody();
      loadCollections("");
      return;
    }

    renderSummary();
    renderBody();
  };
});

function showError(msg){
  var b = document.getElementById("banner");
  b.textContent = msg;
  b.className = "banner show";
  document.getElementById("body").innerHTML =
    '<div class="empty-state">Couldn\'t load invoices.</div>';
}

/* ---------- load ---------- */
function load(){
  document.getElementById("stamp").textContent = "Loading\u2026";
  jsonp({ action:"receivables", key:KEY }, function(data){
    if(!data || !data.ok){
      showError((data && data.error) || "Could not load invoices.");
      document.getElementById("stamp").textContent = "";
      return;
    }
    document.getElementById("banner").className = "banner";
    state.invoices   = data.invoices || [];
    state.paidCount  = Number(data.paidCount) || 0;
    state.totalCount = Number(data.totalCount) || 0;
    state.loaded     = true;
    document.getElementById("stamp").textContent =
      state.totalCount.toLocaleString("en-US") + " invoices";
    renderSummary();
    renderBody();
  });
}

/* ---------- header ---------- */
var viewBtn  = document.getElementById("viewBtn");
var viewDrop = document.getElementById("viewDrop");
viewBtn.onclick = function(e){ e.stopPropagation(); viewDrop.classList.toggle("open"); };
document.addEventListener("click", function(){ viewDrop.classList.remove("open"); });
document.getElementById("goMonitor").onclick = function(){ window.location.href = MONITOR_URL; };
document.getElementById("refreshBtn").onclick = function(){ load(); };

/* ---------- lock ---------- */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.classList.add("hide");
    document.getElementById("lockErr").style.display = "none";
    load();
  }

  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){
    lock.classList.add("hide");
    load();
  } else {
    lockIn.focus();
  }
})();
</script>
