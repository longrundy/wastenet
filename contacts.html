<style>
  :root{
    --green:#5CAA16; --green-dark:#3B6D11; --green-darker:#27500A;
    --green-tint:#EAF3DE; --green-tint-2:#F4FAEC; --green-border:#C0DD97;
    --amber:#EF9F27; --amber-dark:#854F0B;
    --red:#E24B4A; --red-dark:#A32D2D; --red-darker:#791F1F; --red-tint:#FCEBEB;
    --ink:#1A1D1A; --ink-2:#525A60; --ink-3:#8A8F8A;
    --line:#E4E7E0; --line-strong:#CFD4CA;
    --track:#D3D1C7;
    --card:#FFFFFF; --panel:#F6F7F3; --page:#FAFBF8;

    /* ---- SHAPE ----
       Chrome is rectangular, tokens are round.
       Anything that FRAMES content - a toolbar control, a card, a menu, an
       inner panel - is a rectangle. Anything that IS a small piece of
       content - a status you read, a filter you toggle - is a pill.
       That one line decides every future case without another audit.

       These six values are identical in wastenet-accounting.html. The two
       dashboards do different jobs; they should not look like they were
       drawn by different people. Before this there were SEVEN radii doing
       four jobs, and the same control was 8px here and 14px there. */
    --r-input:6px;    /* text fields */
    --r-ctl:8px;      /* buttons, selects, dropdown triggers, search, inner panels */
    --r-menu:10px;    /* popovers */
    --r-card:12px;    /* containers, cards, list wrappers */
    --r-pill:999px;   /* status chips and filter toggles */
    --h-ctl:30px;     /* every toolbar control is this tall */
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{font-family:var(--font); background:var(--page); color:var(--ink);
       font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 80px;}
  .header{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .header-left{display:flex; align-items:center; gap:10px;}
  .brand-name{font-size:14px; font-weight:800; color:var(--green); letter-spacing:.04em;}
  .brand-div{width:1px; height:14px; background:var(--line-strong);}
  .viewnav{position:relative;}
  .topcard{border:0.5px solid var(--line); border-radius:var(--r-card); background:var(--card); padding:12px 16px 15px; margin-bottom:16px;}
  .topcard .scorecard{border:none; border-radius:0; background:transparent; padding:0; margin:12px 0 0;}
  .plain-list > .cd-head:first-child{border-top:none;}
  .plain-list{border:0.5px solid var(--line); border-radius:var(--r-card); overflow:hidden; background:var(--card);}
  .plain-list .row{border-bottom:0.5px solid var(--line);}
  .btn{font-size:12px; font-weight:500; color:var(--ink); background:var(--card); border:0.5px solid var(--line-strong); height:var(--h-ctl); padding:0 12px; border-radius:var(--r-ctl); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:5px; box-sizing:border-box; transition:background .12s;}
  .btn:hover{background:var(--panel);}
  .btn.on{background:var(--green); color:#fff; border-color:var(--green);}
  .btn.ghost{background:transparent;}
  .icon-btn{width:var(--h-ctl); padding:0;}
  .empty-state{text-align:center; padding:60px 20px; color:var(--ink-2);}

  @keyframes spin{to{transform:rotate(360deg);}}
  .lock{position:fixed; inset:0; z-index:100; background:var(--page); display:flex; align-items:center; justify-content:center; padding:20px;}
  .lock.hide{display:none;}
  .lock-card{width:min(360px,100%); background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-card); padding:24px; text-align:center; box-shadow:0 3px 14px rgba(0,0,0,0.07);}
  .lock-brand{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); margin-bottom:4px;}
  .lock-sub{font-size:13px; color:var(--ink-2); margin-bottom:16px;}
  .lock-in{width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px; border:1px solid var(--line-strong); border-radius:var(--r-input); font-family:var(--font); color:var(--ink); outline:none;}
  .lock-in:focus{border-color:var(--green);}
  .lock-btn{width:100%; margin-top:12px; padding:11px; font-size:14px; font-weight:600; border-radius:var(--r-input); border:none; cursor:pointer; background:var(--green); color:#fff; font-family:var(--font);}
  .lock-err{margin-top:12px; padding:8px 10px; background:var(--red-tint); border:0.5px solid var(--red); border-radius:var(--r-input); color:var(--red-dark); font-size:12.5px; font-weight:600;}
  .brand-name{font-size:17px; font-weight:800; letter-spacing:0.04em; color:var(--green); flex:0 0 auto;}
  .brand-logo{height:24px; width:auto; display:block; flex:0 0 auto;}
  .brand-div{width:1px; height:16px; background:var(--line-strong); flex:0 0 auto;}
  .viewnav{position:relative; flex:0 0 auto;}
  .view-label{font-size:12.5px; font-weight:500; color:var(--ink); font-family:var(--font);
              background:var(--card); border:0.5px solid var(--line-strong);
              height:var(--h-ctl); padding:0 9px 0 11px; border-radius:var(--r-ctl); cursor:pointer;
              display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
              box-sizing:border-box; transition:background .12s, border-color .12s;}
  .view-label:hover{background:var(--panel); border-color:var(--ink-3);}
  .view-label.open{background:var(--green-tint); border-color:var(--green-border); color:var(--green-darker);}
  .view-label:hover .view-caret{color:var(--ink);}
  .view-label.open .view-caret{transform:rotate(180deg); color:var(--green-dark);}
  .view-caret{font-size:11px; color:var(--ink-2); transition:transform .14s ease;}
  .view-drop{position:absolute; top:100%; left:0; margin-top:6px; background:var(--card); border:0.5px solid var(--line-strong); border-radius:var(--r-menu); box-shadow:0 4px 14px rgba(0,0,0,0.10); min-width:190px; z-index:60; display:none; overflow:hidden;}
  .view-drop.open{display:block;}
  .view-opt{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13px; color:var(--ink); background:transparent; border:none; cursor:pointer; font-family:var(--font);}
  .view-opt:hover{background:var(--panel);}
  .view-opt.cur{color:var(--green-dark); font-weight:600; background:var(--green-tint-2);}
  .header-bar{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .header-right{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .header-tools{display:flex; align-items:center; gap:8px;}
  .cbar{padding:12px 14px; margin-bottom:12px;}
  .cbar-top{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .cbar-t{font-size:13.5px; font-weight:600;}
  .cbar-sub{font-size:11.5px; color:var(--ink-3);}
  .cbar-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .cspacer{flex:1 1 auto;}
  .cchip{font-size:11px; font-weight:500; color:var(--ink); background:var(--card);
         border:0.5px solid var(--line-strong); border-radius:var(--r-pill);
         padding:5px 12px; cursor:pointer; font-family:var(--font); white-space:nowrap;
         transition:background .12s, border-color .12s;}
  .cchip:hover:not(.on){background:var(--panel);}
  .cchip.on{background:var(--green); border-color:var(--green); color:#fff;}
  .cchip-n{opacity:0.65; margin-left:2px;}
  .csearch{display:flex; align-items:center; gap:6px; height:var(--h-ctl);
           padding:0 10px; border:0.5px solid var(--green-border);
           border-radius:var(--r-ctl); background:var(--card); width:240px; box-sizing:border-box;}
  .csearch:focus-within{border-color:var(--green);}
  .csearch input{border:none; outline:none; background:transparent; font-size:12px;
                 color:var(--ink); flex:1; height:100%; font-family:inherit; min-width:0;}
  .cadd{margin-top:11px; padding-top:11px; border-top:0.5px solid var(--line);}
  .cadd-row{display:flex; align-items:center; gap:6px; margin-bottom:7px;}
  .cadd-in{height:var(--h-ctl); padding:0 10px; font-size:12px; flex:1; min-width:0;
           border:0.5px solid var(--line-strong); border-radius:var(--r-ctl);
           font-family:var(--font); color:var(--ink); background:var(--card);
           outline:none; box-sizing:border-box;}
  .cadd-in:focus{border-color:var(--green);}
  .cadd-box{max-width:110px; flex:0 0 110px;}
  .cadd-sel{height:var(--h-ctl); padding:0 8px; font-size:12px; flex:0 0 auto;
            border:0.5px solid var(--line-strong); border-radius:var(--r-ctl);
            font-family:var(--font); color:var(--ink); background:var(--card);
            cursor:pointer; outline:none; box-sizing:border-box;}
  .cadd-note{font-size:11px; line-height:1.6; color:var(--ink-3);}
  .cd-head{display:flex; align-items:center; gap:8px; padding:7px 14px;
           background:var(--green-tint-2); border-bottom:0.5px solid var(--green-border);
           border-top:0.5px solid var(--green-border);}
  .cd-pen{width:17px; height:17px; padding:0; flex:0 0 auto; margin-left:1px;
          border:none; background:transparent; color:var(--green-dark);
          font-size:11px; line-height:1; cursor:pointer; border-radius:var(--r-input);
          opacity:0; transition:opacity .12s, background .12s;}
  .cd-head:hover .cd-pen{opacity:0.7;}
  .cd-pen:hover{opacity:1; background:var(--green-tint);}
  .cd-co{font-size:12.5px; font-weight:600; color:var(--green-darker);}
  /* The domain stays visible under the company name. companyOf() GUESSES where
     the words break in "acedisposal" - so the thing it guessed from stays on
     screen, and a wrong guess is visibly a wrong guess rather than a quiet lie. */
  .cd-dom{font-size:11px; color:var(--green-dark); opacity:0.75;}
  .cd-n{font-size:11px; color:var(--green-dark);}
  .crow{border-bottom:0.5px solid var(--line);}
  .crow:last-child{border-bottom:none;}
  .crow.open{background:var(--green-tint-2);}
  .crow:not(.open) .cmain:hover{background:var(--panel);}
  .crow.open .cdisc{background:var(--green); color:#fff;}
  .cmain{display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer;}
  .cdisc{width:26px; height:26px; flex:0 0 26px; border-radius:var(--r-pill);
         background:var(--green-tint); color:var(--green-darker); font-size:10px;
         font-weight:600; display:flex; align-items:center; justify-content:center;}
  .cmail{font-size:13px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cat{color:var(--ink-3);}
  .crole{font-size:10px; font-weight:600; padding:2px 8px; border-radius:var(--r-pill); white-space:nowrap;}
  .crole-hauler{background:var(--green-tint); color:var(--green-darker);}
  .crole-customer{background:#E7EEF6; color:#274766;}
  .crole-corp{background:#EDE7F6; color:#4A2E83;}
  .crole-staff{background:#F5E9D6; color:var(--amber-dark);}
  .cboxn{font-size:11px; color:var(--ink-3); width:58px; flex:0 0 58px; text-align:right;}
  .cdetail{padding:0 14px 14px 50px;}
  .cstats{display:flex; gap:8px; margin-bottom:10px;}
  .cstat{flex:1; background:var(--card); border:0.5px solid var(--line);
         border-radius:var(--r-ctl); padding:9px 11px;}
  .cstat-n{font-size:18px; font-weight:600; color:var(--green-darker); line-height:1.2;}
  .cstat-l{font-size:11px; color:var(--ink-2);}
  .cboxes{background:var(--card); border:0.5px solid var(--line);
          border-radius:var(--r-ctl); overflow:hidden;}
  .cbox{display:flex; align-items:center; gap:9px; padding:7px 11px;
        border-bottom:0.5px solid var(--line); font-size:12px;}
  .cbox:last-child{border-bottom:none;}
  .cbox-id{font-weight:600; color:var(--green-dark); width:44px; flex:0 0 44px;}
  .cbox-site{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cbox-haul{font-size:11px; color:var(--ink-3); width:70px; flex:0 0 70px; text-align:right;}
  .cbox-x{font-size:11px; color:var(--red-dark); background:transparent; border:none;
          cursor:pointer; padding:2px 5px; border-radius:var(--r-input); flex:0 0 auto;
          font-family:var(--font);}
  .cbox-x:hover{background:var(--red-tint);}
  .cbox-more{width:100%; padding:8px 11px; font-size:11.5px; color:var(--ink-2);
             background:var(--panel); border:none; border-top:0.5px solid var(--line);
             cursor:pointer; font-family:var(--font);}
  .cbox-more:hover{background:var(--green-tint-2); color:var(--green-darker);}
  .cd-act{margin-top:10px;}

/* ============================================================
   Mobile responsiveness + sticky header  (added 2026-07-15)
   - Brand bar (.header) freezes on every screen size.
   - Toolbar (.cbar: title + Add + filters + search) freezes
     from tablet width up (>=561px covers iPad portrait 768px);
     on phones (<=560px) it scrolls normally so only the brand
     bar stays pinned.
   - The ::after strips are page-coloured masks that cover each
     card's bottom margin so list rows can't peek through the
     gap while scrolling under the pinned cards.
   ============================================================ */
.header{ position:sticky; top:0; z-index:31; }
.header::after{ content:""; position:absolute; left:0; right:0; top:calc(100% + 1px); height:18px; background:var(--page); }

@media (min-width:561px){
  .cbar{ position:sticky; top:var(--cstick,78px); z-index:30; }
  .cbar::after{ content:""; position:absolute; left:0; right:0; top:calc(100% + 1px); height:14px; background:var(--page); }
}

@media (max-width:560px){
  .header-left{ flex-wrap:wrap; }
  .csearch{ width:100%; }
  .cbar-row .cspacer{ display:none; }
  .cadd-row{ flex-wrap:wrap; }
  .cadd-in, .cadd-sel{ flex:1 1 100%; }
  .cadd-box{ flex:1 1 100%; max-width:none; }
  .cmain .cspacer{ display:none; }
  .cmail{ flex:1 1 auto; }
}

</style>

.wn-rail__brand{padding:22px 18px 18px;border-bottom:1px solid #265c39;display:flex;
  flex-direction:column;gap:10px;align-items:center;text-align:center;}
.wn-rail__brand img{width:150px;height:auto;display:block;margin:0 auto;}
.wn-rail__sub{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#7ea589;}
.wn-rail__nav{padding:12px;flex:1;}
.wn-rail__h{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5d8168;padding:10px 8px 8px;}
.wn-rail__link{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:8px;
  font-size:13.5px;color:#c1d3c6;text-decoration:none;border-left:2px solid transparent;margin-bottom:2px;}
.wn-rail__link:hover{background:#1c4a2c;color:#fff;}
.wn-rail__link.is-active{background:#1c4a2c;color:#fff;border-left-color:#5CAA16;font-weight:600;}
.wn-rail__link .i{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#8fbf9c;}
.wn-rail__link:hover .i,.wn-rail__link.is-active .i{color:#fff;}
.wn-rail__link .i svg{width:18px;height:18px;display:block;}
.wn-rail__foot{padding:14px 18px;border-top:1px solid #265c39;font-size:11px;color:#6f9179;text-align:center;}
.wn-rail__menu{width:100%;margin-top:14px;}
.wn-rail .wn-nav{display:block;width:100%;position:relative;}
.wn-rail .wn-trigger{width:100%;justify-content:space-between;background:rgba(255,255,255,0.08);border-color:#2f5d40;color:#eaf3de;height:38px;font-size:13px;}
.wn-rail .wn-trigger:hover{background:rgba(255,255,255,0.14);border-color:#3f7050;}
.wn-rail .wn-trigger.wn-open{background:rgba(92,170,22,0.18);border-color:#5CAA16;color:#fff;}
.wn-rail .wn-caret{color:#9fc0a8;}
.wn-rail .wn-drop{left:0;right:0;min-width:0;width:auto;z-index:200;box-sizing:border-box;}
.wn-rail__sections{padding:10px 12px;display:flex;flex-direction:column;gap:2px;margin-top:12px;flex:1;}
.wn-rail__sections .sec{display:block;width:100%;text-align:left;background:none;border:none;border-radius:8px;cursor:pointer;padding:10px 12px;color:#c1d3c6;font-family:inherit;font-size:13.5px;font-weight:500;border-left:2px solid transparent;}
.wn-rail__sections .sec:hover{background:#1c4a2c;color:#fff;}
.wn-rail__sections .sec.on{background:#1c4a2c;color:#fff;border-left-color:#5CAA16;font-weight:600;}
.wn-rail__sections .sec .n{float:right;opacity:.55;font-weight:500;}
body{padding-left:280px;}
.wrap{max-width:1160px;}
.wn-lock-logo{width:172px;height:auto;display:block;margin:0 auto 12px;}

@media(max-width:860px){
  body{padding-left:0;}
  .wn-rail{position:static;width:auto;height:auto;flex-direction:row;align-items:center;overflow:visible;}
  .wn-rail__brand{border-bottom:none;flex-direction:row;align-items:center;padding:10px 14px;gap:8px;}
  .wn-rail__brand img{width:118px;}
  .wn-rail__sub,.wn-rail__h,.wn-rail__foot{display:none;}
  .wn-rail__nav{display:flex;gap:2px;padding:8px;overflow-x:auto;flex:1;}
  .wn-rail__link{white-space:nowrap;margin-bottom:0;}
  .wrap{max-width:100%;}
  .slimbar{left:0!important;}
}
</style>
<style id="wn-contacts3">
.c-split{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start;}
.c-detail{position:sticky;top:calc(var(--cstick,72px) + 6px);background:var(--card);border:0.5px solid var(--line);border-radius:var(--r-card);overflow:hidden;min-height:240px;}
.cd-empty{padding:52px 24px;text-align:center;color:var(--ink-3);font-size:13px;line-height:1.5;}
.cd-p-head{display:flex;align-items:center;gap:12px;padding:18px 18px 16px;border-bottom:0.5px solid var(--line);}
.c-detail .cdisc-lg{width:40px;height:40px;flex:0 0 40px;font-size:15px;background:var(--green);color:#fff;}
.cd-p-mail{font-size:15px;font-weight:600;word-break:break-word;line-height:1.25;}
.cd-p-mail .cat{color:var(--ink-3);font-weight:400;}
.cd-p-roles{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;}
.c-detail .cdetail{padding:16px 18px 18px;}
@media(max-width:900px){.c-split{grid-template-columns:1fr;}.c-detail{position:static;}}
</style>
<style id="cn-console">
:root{--list-bg:#F3F5F1;--sel:#E7F1D8;--sel-border:#BBD892;}
#app.wrap{max-width:none !important; margin:0 !important; padding:0 !important; min-height:100vh;
  background:linear-gradient(to right, var(--list-bg) 0, var(--list-bg) 50%, var(--sel) 50%, var(--sel) 100%);}
.ag-topbar{position:sticky; top:0; z-index:30; display:grid; grid-template-columns:1fr 1fr; gap:0; background:#fff;}
.ag-hd{height:80px; padding:16px 24px; display:flex; flex-direction:column; justify-content:center; border-bottom:1px solid var(--line); overflow:hidden;}
.ag-hd-list{background:var(--list-bg); border-right:1px solid var(--line);}
.ag-hd-detail{background:var(--sel); padding:14px 24px !important; justify-content:center;}
.ag-hd-title{font-size:17px; font-weight:700; letter-spacing:-.01em; color:var(--ink);}
.ag-hd-note{font-size:12.5px; color:var(--ink-2); margin-top:5px;}
.ag-hd-drow{display:flex; align-items:center; justify-content:space-between; gap:12px; width:100%; min-width:0;}
.ag-hd-drow .ag-hd-title{flex:0 0 auto;}
.cn-hd-tools{display:flex; align-items:center; gap:8px; min-width:0; flex:0 1 auto;}
.cn-hd-tools .csearch{width:220px; max-width:42vw; min-width:0;}
.cn-hd-tools .btn{flex:0 0 auto;}
.ag-split{display:grid; grid-template-columns:1fr 1fr; gap:0; align-items:stretch;}
.ag-list-col{background:var(--list-bg); border-right:1px solid var(--line); min-width:0; padding:0 0 40px;}
.ag-detail{position:sticky; top:80px; max-height:calc(100vh - 80px); overflow-y:auto; background:var(--sel); border:none; border-radius:0; padding:20px 24px 40px;}
.cn-chips{display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:12px 22px 10px;
  position:sticky; top:80px; z-index:20; background:var(--list-bg); border-bottom:0.5px solid var(--line);}
.cn-folder .plain-list{border:none !important; border-radius:0 !important; background:transparent !important;}
.cn-folder .cd-head{padding-left:22px; padding-right:22px;}
.cn-folder .cmain{padding-left:22px; padding-right:22px;}
#cAddForm{background:var(--list-bg); padding:0 22px;}
.ag-pane-empty{padding:52px 22px; text-align:center; color:var(--ink-3); font-size:13px; line-height:1.5;}
.rc-iv-card{background:#fff; border:0.5px solid var(--line); border-radius:12px;
  box-shadow:0 2px 14px rgba(20,40,20,.10); padding:20px 22px 22px; max-width:680px; margin:2px auto 0; overflow:hidden;}
.rc-iv-card .cd-p-head{padding:0 0 14px; border-bottom:0.5px solid var(--line); margin-bottom:14px;}
.rc-iv-card .cdetail{padding:0;}
@media(max-width:760px){
  #app.wrap{background:var(--list-bg);}
  .ag-topbar{grid-template-columns:1fr;}
  .ag-hd-detail{display:none;}
  .ag-split{grid-template-columns:1fr;}
  .ag-list-col{border-right:none;}
  .cn-chips{position:static; top:auto;}
  .ag-detail{position:static; max-height:none; top:auto;}
}
</style>
</head>

<script>
var API = "https://script.google.com/macros/s/AKfycbwc3siwl0OTP2O5WzNZCDn4cj3MDVRfcVxJW0TZtoPnAKLwhYSwmW_m1h7ib6Yf_Dvk9w/exec";
var KEY = (function(){
  try { return sessionStorage.getItem("wastenet_dashboard_key") || ""; }
  catch(e){ return ""; }
})();

/* Contacts is not a Box Monitor feature and never was. Haulers, customers and
   staff are a COMPANY directory - so it lives on its own page, reachable from
   either dashboard, rather than wedged into the monitor's header where the
   search box next to it made it look like you were searching contacts. */
var state = { rows: [], cDir: [], cLoaded: false, cSearch: "", cRole: "all",
              cOpen: null, cShowAll: null, cRaw: null,
              /* corrections a person typed. They outrank the guess. */
              cNames: {} };

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function jsonp(params, cb){
  var name = "wn_cb_" + Math.random().toString(36).slice(2);
  var timeout = setTimeout(function(){ cleanup(); cb({ ok:false, error:"Request timed out." }); }, 30000);
  function cleanup(){
    clearTimeout(timeout);
    try{ delete window[name]; }catch(e){ window[name] = undefined; }
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  window[name] = function(data){ cleanup(); cb(data); };
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  }).join("&");
  var s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = function(){ cleanup(); cb({ ok:false, error:"Could not reach the server." }); };
  document.body.appendChild(s);
}

/* ==================================================================
   CONTACTS  -  every address WasteNet has, in one place

   WHERE THE DATA LIVES - and where it does NOT

   Master Box List, three columns, semicolon-separated, PER BOX:

       G  Haulers          who you telephone to arrange a pickup
       H  Customers        the site
       I  WasteNet staff   whoever here is on the thread

   So the same hauler's address is written out again on every box they
   service. David appears on 439 rows. Until now there was no way to ask
   "who is Samantha, and which boxes is she on?" without reading 478 rows
   by eye. That is what this page is for.

   IT STORES NOTHING. It reads those three columns, turns them inside out
   - grouping by PERSON instead of by BOX - and writes every edit straight
   back. A second contacts table would have to be kept in step with the
   first, and a thing that has to be kept in step eventually is not.

   ------------------------------------------------------------------
   TWO THINGS THE FIRST VERSION GOT WRONG

   1. It listed all 439 of David's boxes, each with a Remove button.
      Nobody is going to click Remove four hundred times. That is not
      information, it is noise in the shape of information. What you want
      to know is: how many, which haulers, and can I change his address in
      one go. So: three numbers, the first few boxes, the rest on request.

   2. The search lost focus on every keystroke, because the whole panel
      was re-rendered and the input destroyed along with it. The header is
      now rendered ONCE; only the list beneath it redraws.
   ================================================================== */

/* ------------------------------------------------------------------
   A COMPANY NAME OUT OF A DOMAIN

   "acedisposal.com" should read "Ace Disposal", not "acedisposal.com".
   But there is no dot between "ace" and "disposal" - so where the words
   break has to be GUESSED, and a guess dressed up as a fact is how
   IP ARDMORE got filed under International Paper this morning.

   So this is three things, in order:

     1. OVERRIDES  - the ones we actually know. Always right.
     2. a split on a list of words that really do end company names
        in this industry (disposal, carting, waste, services...).
        Gets most of the rest.
     3. failing both, just capitalise it and leave it alone.

   And the real domain stays on screen underneath, in small type. If a
   split comes out wrong you can SEE that it is wrong, which is the whole
   difference between a guess and a lie.
   ------------------------------------------------------------------ */

var COMPANY_OVERRIDES = {
  "wastenetinc":       "WasteNet",
  "baycare":           "BayCare",
  "fccenvironmental":  "FCC Environmental",
  "costco":            "Costco",
  "raleys":            "Raley's",
  "usps":              "USPS",
  "gm":                "GM",
  "spx":               "SPX",
  "lpf":               "LPF",
  "wm":                "Waste Management",
  "republicservices":  "Republic Services",
  "gflenv":            "GFL Environmental",
  "divert360":         "Divert360",
  "houstonzoo":        "Houston Zoo"
};

/* Words that genuinely END a company name in this trade. Order matters:
   longest first, so "environmental" is tried before "mental" could be. */
var TAIL_WORDS = [
  "environmental","transportation","sanitation","management","industries",
  "solutions","recycling","logistics","resources","properties","enterprises",
  "hospital","services","products","disposal","container","holdings",
  "hauling","medical","carting","company","systems","service","haulers",
  "county","health","realty","hotels","group","waste","foods","corp",
  "care","city","zoo","inc","llc"
];

function companyOf(domain){
  var d = String(domain || "").toLowerCase();
  var base = d.split(".")[0];
  if(!base) return domain;

  /* Highest authority: somebody typed it into the sheet. A guess you cannot
     correct is just a lie with better manners. */
  if(state.cNames && state.cNames[d]) return state.cNames[d];

  if(COMPANY_OVERRIDES[base]) return COMPANY_OVERRIDES[base];

  var cap = function(w){ return w.charAt(0).toUpperCase() + w.slice(1); };

  /* Peel known words off the END, repeatedly. "bakersfieldcity" -> city,
     leaving "bakersfield". */
  var tail = [], head = base;
  var peeled = true;
  while(peeled && head.length > 2){
    peeled = false;
    for(var i = 0; i < TAIL_WORDS.length; i++){
      var w = TAIL_WORDS[i];
      if(head.length > w.length && head.slice(-w.length) === w){
        tail.unshift(cap(w));
        head = head.slice(0, -w.length);
        peeled = true;
        break;
      }
    }
  }

  if(!tail.length) return cap(base);          // nothing to split on
  return cap(head) + " " + tail.join(" ");
}

function splitEmails(cell){
  return String(cell || '')
    .split(/[;,]/)
    .map(function(e){ return e.trim(); })
    .filter(function(e){ return e.indexOf('@') !== -1; });
}

function initialsOf(email){
  var local = String(email || '').split('@')[0];
  var parts = local.split(/[._\-]+/).filter(Boolean);
  if(parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return local.slice(0, 2).toUpperCase();
}

/* Turn boxes-with-people into people-with-boxes. */
function buildDirectory(contacts, rows){
  var boxById = {};
  (rows || []).forEach(function(b){ boxById[String(b.id)] = b; });

  var dir = {};
  var add = function(email, role, boxId){
    var key = email.toLowerCase();
    if(!dir[key]) dir[key] = { email: email, roles: {}, boxes: [], haulers: {} };
    var d = dir[key];
    d.roles[role] = true;
    if(d.boxes.indexOf(boxId) === -1) d.boxes.push(boxId);
    var b = boxById[boxId];
    if(b && b.haulCode && b.haulCode !== "\u2014") d.haulers[b.haulCode] = true;
    /* Keep the best-cased spelling. Samantha.Hernandez@ is how she spells her
       own name; it is not our business to lower-case her. */
    if(email !== email.toLowerCase() && d.email === d.email.toLowerCase()) d.email = email;
  };

  Object.keys(contacts || {}).forEach(function(boxId){
    var c = contacts[boxId] || {};
    splitEmails(c.toRecipients).forEach(function(e){ add(e, "hauler", boxId); });
    splitEmails(c.ccRecipients).forEach(function(e){ add(e, "customer", boxId); });
    splitEmails(c.corpRecipients).forEach(function(e){ add(e, "corp", boxId); });
    splitEmails(c.staffRecipients).forEach(function(e){ add(e, "staff", boxId); });
  });

  return Object.keys(dir).map(function(k){
    var d = dir[k];
    return {
      email: d.email,
      domain: (d.email.split("@")[1] || "").toLowerCase(),
      roles: Object.keys(d.roles),
      boxes: d.boxes.sort(function(a,b){
        return String(a).localeCompare(String(b), undefined, { numeric:true });
      }),
      haulers: Object.keys(d.haulers).sort()
    };
  });
}

/* ---------- the header. Rendered ONCE, so the search keeps focus. ---------- */
function contactsHeaderHtml(){
  var dir = state.cDir || [];
  var counts = { all: dir.length, hauler:0, customer:0, corp:0, staff:0 };
  dir.forEach(function(c){ c.roles.forEach(function(r){ counts[r]++; }); });

  var chip = function(k, label){

           label + ' <span class="cchip-n">' + counts[k] + "</span></button>";
  };

  return '<div class="folder rc-folder cn-folder">' +
      '<div class="ag-topbar">' +
        '<div class="ag-hd ag-hd-list">' +
          '<div class="ag-hd-drow">' +
            '<div class="ag-hd-title">Contacts</div>' +
            '<div class="cn-hd-tools">' +
              '<div class="csearch"><i class="search-ico">\u2315</i>' +
                '<input type="text" id="cSearch" placeholder="Name, address, hauler, box #\u2026" ' +
                  'value="' + esc(state.cSearch||"") + '" autocomplete="off"></div>' +
              '<button class="btn" id="cAddBtn">+ Add</button>' +
            '</div>' +
          '</div>' +
          '<div class="ag-hd-note">' + (dir.length).toLocaleString("en-US") + ' people</div>' +
        '</div>' +
        '<div class="ag-hd ag-hd-detail"><div class="ag-hd-title">Contact Info</div></div>' +
      '</div>' +
      '<div class="ag-split">' +
        '<div class="ag-list-col">' +
          '<div id="cAddForm"></div>' +
          '<div id="cList"></div>' +
        '</div>' +
        '<aside id="cDetail" class="ag-detail">' +

        '</aside>' +

    '</div>';
}


/* ---------- the list. The ONLY part that redraws on a keystroke. ---------- */
function contactsListHtml(){
  var dir = state.cDir || [];
  var q = (state.cSearch || "").trim().toLowerCase();

  var shown = dir.filter(function(c){
    if(state.cRole !== "all" && c.roles.indexOf(state.cRole) === -1) return false;
    if(!q) return true;
    if(c.email.toLowerCase().indexOf(q) !== -1) return true;
    if(c.haulers.some(function(h){ return h.toLowerCase().indexOf(q) !== -1; })) return true;
    /* typing "ace disposal" should find acedisposal.com */
    if(companyOf(c.domain).toLowerCase().indexOf(q) !== -1) return true;
    if(c.boxes.some(function(b){ return String(b) === q; })) return true;   // "716" finds everyone on box 716
    return false;
  });

  shown.sort(function(a,b){
    if(a.domain !== b.domain) return a.domain.localeCompare(b.domain);
    return a.email.localeCompare(b.email);
  });

  if(!shown.length){
    return '<div class="plain-list"><div class="empty-state">Nobody matches that.</div></div>';
  }

  var groups = {}, order = [];
  shown.forEach(function(c){
    if(!groups[c.domain]){ groups[c.domain] = []; order.push(c.domain); }
    groups[c.domain].push(c);
  });

  return '<div class="plain-list">' + order.map(function(dom){
    var list = groups[dom];
    var known = !!(state.cNames && state.cNames[dom]);
    return '<div class="cd-head">' +
        '<span class="cd-co">' + esc(companyOf(dom)) + "</span>" +
        '<button class="cd-pen" data-cco="' + esc(dom) + '" title="' +
          (known ? "Change this company name" : "This name was worked out from the domain. Fix it if it is wrong.") +
          '">\u270e</button>' +
        /* The domain stays on screen. companyOf() GUESSES where the words break
           in "acedisposal" - so what it guessed FROM stays visible, and a wrong
           guess is visibly a wrong guess rather than a quiet lie. */
        '<span class="cd-dom">' + esc(dom) + "</span>" +
        '<span class="cspacer"></span>' +
        '<span class="cd-n">' + list.length + "</span>" +
      "</div>" +
      list.map(contactRowHtml).join("");
  }).join("") + "</div>";
}

function contactRowHtml(c){
  var open = state.cOpen === c.email.toLowerCase();
  return '<div class="crow' + (open ? " open" : "") + '">' +
      '<div class="cmain" data-cmail="' + esc(c.email) + '">' +
        '<span class="cdisc">' + esc(initialsOf(c.email)) + "</span>" +
        '<span class="cmail">' + esc(c.email.split("@")[0]) +
          '<span class="cat">@' + esc(c.domain) + "</span></span>" +
        '<span class="cspacer"></span>' +
        c.roles.sort().map(function(r){
          return '<span class="crole crole-' + r + '">' + (r === "corp" ? "corporate" : r) + "</span>";
        }).join("") +
        '<span class="cboxn">' + c.boxes.length + " box" + (c.boxes.length===1?"":"es") + "</span>" +
      "</div>" +
      "" +
    "</div>";
}

function contactDetailHtml(c){
  var total = (state.rows||[]).length || 1;
  var pct = Math.round(c.boxes.length / total * 100);
  var showAll = state.cShowAll === c.email.toLowerCase();
  var CAP = 6;
  var list = showAll ? c.boxes : c.boxes.slice(0, CAP);
  var hidden = c.boxes.length - list.length;

  var boxRows = list.map(function(id){
    var b = (state.rows||[]).filter(function(x){ return String(x.id) === String(id); })[0];
    return '<div class="cbox">' +
        '<span class="cbox-id">#' + esc(id) + "</span>" +
        '<span class="cbox-site">' + esc(b ? b.desc : "(not in this scan)") + "</span>" +
        '<span class="cbox-haul">' + esc(b ? b.haulCode : "") + "</span>" +
        '<button class="cbox-x" data-cdrop="' + esc(c.email) + "|" + esc(id) + '">remove</button>' +
      "</div>";
  }).join("");

  if(hidden > 0){
    boxRows += '<button class="cbox-more" data-cmore="' + esc(c.email) + '">' +
      "Show the other " + hidden + " box" + (hidden===1?"":"es") + "</button>";
  }

  return '<div class="cdetail">' +
      /* Three numbers instead of a wall of box ids. David is on 439 boxes and
         the list of them is not the answer to any question anybody has. */
      '<div class="cstats">' +
        '<div class="cstat"><div class="cstat-n">' + c.boxes.length + "</div>" +
          '<div class="cstat-l">box' + (c.boxes.length===1?"":"es") + "</div></div>" +
        '<div class="cstat"><div class="cstat-n">' + c.haulers.length + "</div>" +
          '<div class="cstat-l">hauler' + (c.haulers.length===1?"":"s") + "</div></div>" +
        '<div class="cstat"><div class="cstat-n">' + pct + "%</div>" +
          '<div class="cstat-l">of all boxes</div></div>' +
      "</div>" +
      '<div class="cboxes">' + boxRows + "</div>" +
      '<div class="cd-act">' +
        /* The operation people ACTUALLY need. Nobody clicks Remove 439 times;
           they change the address once, when somebody leaves. */
        '<button class="btn" data-crename="' + esc(c.email) + '">' +
          "Change this address on all " + c.boxes.length + " box" +
          (c.boxes.length===1?"":"es") + "</button>" +
      "</div>" +
    "</div>";
}

/* ---------- adding somebody ----------
   One address, but with a SCOPE. The whole point of office@wastenetinc.com is
   that it belongs on every box, and putting it on 478 boxes one at a time is
   not a feature, it is a punishment. */
function contactAddHtml(){
  var haulers = {};
  (state.rows||[]).forEach(function(b){
    if(b.haulCode && b.haulCode !== "\u2014") haulers[b.haulCode] = (haulers[b.haulCode]||0) + 1;
  });
  var hOpts = Object.keys(haulers).sort().map(function(h){
    return '<option value="' + esc(h) + '">' + esc(h) + " \u00b7 " + haulers[h] + " boxes</option>";
  }).join("");

  return '<div class="cadd">' +
      '<div class="cadd-row">' +
        '<input type="text" id="cAddEmail" class="cadd-in" placeholder="name@company.com" autocomplete="off">' +
        '<select id="cAddRole" class="cadd-sel">' +
          '<option value="hauler">Hauler</option>' +
          '<option value="customer">Customer</option>' +
          '<option value="corp">Corporate customer</option>' +
          '<option value="staff">WasteNet staff</option>' +
        "</select>" +
      "</div>" +
      '<div class="cadd-row">' +
        '<select id="cAddScope" class="cadd-sel">' +
          '<option value="box">On one box\u2026</option>' +
          '<option value="haul">On every box of one hauler\u2026</option>' +
          '<option value="all">On EVERY box</option>' +
        "</select>" +
        '<input type="text" id="cAddBox" class="cadd-in cadd-box" placeholder="Box #">' +
        '<select id="cAddHaul" class="cadd-sel" style="display:none;">' + hOpts + "</select>" +
        '<span class="cspacer"></span>' +
        '<button class="btn" id="cAddGo">Add</button>' +
        '<button class="btn" id="cAddCancel">Cancel</button>' +
      "</div>" +
      '<div class="cadd-note">Writes to the <b>Master Box List</b>, columns G/H/I \u2014 the same ' +
        "sheet the scanner reads. There is no separate contacts table.</div>" +
    "</div>";
}

  var pane = document.getElementById("cDetail");
  if(!pane) return;
  var sel = state.cOpen;
  var c = sel ? (state.cDir||[]).filter(function(x){ return x.email.toLowerCase() === sel; })[0] : null;
  if(!c){ pane.innerHTML = '<div class="ag-pane-empty">Select someone to see their boxes and options.</div>'; return; }
  pane.innerHTML =
    '<div class="rc-iv-card">' +
    '<div class="cd-p-head">' +
      '<span class="cdisc cdisc-lg">' + esc(initialsOf(c.email)) + '</span>' +
      '<div><div class="cd-p-mail">' + esc(c.email.split("@")[0]) +
        '<span class="cat">@' + esc(c.domain) + '</span></div>' +
        '<div class="cd-p-roles">' + c.roles.sort().map(function(r){
          return '<span class="crole crole-' + r + '">' + (r==="corp"?"corporate":r) + '</span>';
        }).join("") + '</div></div>' +

}

function renderRailFilters(){
  var el = document.getElementById("cFilters");
  if(!el) return;
  var dir = state.cDir || [];
  var counts = { all: dir.length, hauler:0, customer:0, corp:0, staff:0 };
  dir.forEach(function(c){ c.roles.forEach(function(r){ counts[r]++; }); });
  var defs = [["all","Everyone"],["hauler","Haulers"],["customer","Customers"],["corp","Corporate"],["staff","WasteNet"]];
  el.innerHTML = defs.map(function(d){
    return '<button class="sec' + (state.cRole===d[0] ? " on" : "") + '" data-crole="' + d[0] + '">' +
           d[1] + '<span class="n">' + counts[d[0]] + '</span></button>';
  }).join("");
  el.querySelectorAll("[data-crole]").forEach(function(btn){
    btn.onclick = function(){
      state.cRole = btn.getAttribute("data-crole");
      el.querySelectorAll("[data-crole]").forEach(function(x){
        x.classList.toggle("on", x.getAttribute("data-crole") === state.cRole);
      });
      renderContactsList();
    };
  });
}

function renderContactsAll(){
  var el = document.getElementById("list");
  el.innerHTML = contactsHeaderHtml();
  document.getElementById("cList").innerHTML = contactsListHtml();
  renderContactsDetail();
  wireContactsHeader();
  wireContactsList();
  renderRailFilters();
  syncStick();
}

// Pin point for the sticky toolbar = brand-bar height + its 14px gap.
// Recomputed on resize so it stays correct if the brand bar wraps.
function syncStick(){
  var h = document.querySelector(".header");
  if(!h) return;
  document.documentElement.style.setProperty("--cstick", (h.offsetHeight + 14) + "px");
}
window.addEventListener("resize", syncStick);

/* Only the list redraws. The header - and the cursor inside the search box -
   stays exactly where it was. */
function renderContactsList(){
  var el = document.getElementById("cList");
  if(!el){ renderContactsAll(); return; }
  el.innerHTML = contactsListHtml();
  renderContactsDetail();
  wireContactsList();
}

function wireContactsHeader(){
  var s = document.getElementById("cSearch");
  if(s) s.oninput = function(){ state.cSearch = s.value; renderContactsList(); };

  var addBtn = document.getElementById("cAddBtn");
  var form   = document.getElementById("cAddForm");
  if(addBtn && form){
    addBtn.onclick = function(){
      if(form.innerHTML){ form.innerHTML = ""; return; }
      form.innerHTML = contactAddHtml();
      wireContactsAdd();
      var e = document.getElementById("cAddEmail");
      if(e) e.focus();
    };
  }
}

function wireContactsAdd(){
  var scope = document.getElementById("cAddScope");
  var box   = document.getElementById("cAddBox");
  var haul  = document.getElementById("cAddHaul");
  var sync = function(){
    box.style.display  = (scope.value === "box")  ? "" : "none";
    haul.style.display = (scope.value === "haul") ? "" : "none";
  };
  scope.onchange = sync; sync();

  document.getElementById("cAddCancel").onclick = function(){
    document.getElementById("cAddForm").innerHTML = "";
  };

  document.getElementById("cAddGo").onclick = function(){
    var email = document.getElementById("cAddEmail").value.trim();
    var role  = document.getElementById("cAddRole").value;
    if(email.indexOf("@") === -1){ alert("That does not look like an email address."); return; }

    var ids = [], what = "";
    if(scope.value === "all"){
      ids = state.rows.map(function(b){ return String(b.id); });
      what = "EVERY box \u2014 all " + ids.length + " of them";
    } else if(scope.value === "haul"){
      var h = haul.value;
      ids = state.rows.filter(function(b){ return b.haulCode === h; }).map(function(b){ return String(b.id); });
      what = "every box of hauler " + h + " \u2014 " + ids.length + " box" + (ids.length===1?"":"es");
    } else {
      var one = box.value.trim();
      if(!one){ alert("Which box?"); return; }
      ids = [one];
      what = "box " + one;
    }
    if(!ids.length){ alert("That matches no boxes."); return; }

    contactWrite({ op:"add", email:email, role:role, boxIds:ids.join(",") },
      email + " will be added as a " + role + " on " + what + ".");
  };
}

function wireContactsList(){
  document.querySelectorAll("[data-cmail]").forEach(function(el){
    el.onclick = function(){
      var m = el.getAttribute("data-cmail").toLowerCase();
      state.cOpen = (state.cOpen === m) ? null : m;
      state.cShowAll = null;
      renderContactsList();
    };
  });
  document.querySelectorAll("[data-cco]").forEach(function(el){
    el.onclick = function(e){
      e.stopPropagation();
      var dom = el.getAttribute("data-cco");
      var now = companyOf(dom);
      var to = prompt(
        "What is this company actually called?\n\n" + dom +
        "\n\nThe dashboard worked out \"" + now + "\" from the domain, which is a " +
        "guess. Whatever you type here is kept in the sheet and used from now on.",
        now);
      if(to === null) return;
      to = to.trim();
      if(!to || to === now) return;
      contactWrite({ op:"company", domain:dom, to:to, email:"n/a@n/a" },
        dom + " will be shown as \"" + to + "\".");
    };
  });

  document.querySelectorAll("[data-cmore]").forEach(function(el){
    el.onclick = function(e){
      e.stopPropagation();
      state.cShowAll = el.getAttribute("data-cmore").toLowerCase();
      renderContactsList();
    };
  });
  document.querySelectorAll("[data-cdrop]").forEach(function(el){
    el.onclick = function(e){
      e.stopPropagation();
      var parts = el.getAttribute("data-cdrop").split("|");
      contactWrite({ op:"remove", email:parts[0], boxId:parts[1] },
        parts[0] + " comes off box " + parts[1] + ".");
    };
  });
  document.querySelectorAll("[data-crename]").forEach(function(el){
    el.onclick = function(e){
      e.stopPropagation();
      var from = el.getAttribute("data-crename");
      var c = state.cDir.filter(function(x){ return x.email === from; })[0];
      var n = c ? c.boxes.length : 0;
      var to = prompt("Change this address EVERYWHERE it appears.\n\n" + from +
        "\n\nis on " + n + " box" + (n===1?"":"es") + ". Every one of them will be rewritten " +
        "on the Master Box List.\n\nNew address:", "");
      if(!to || to.indexOf("@") === -1) return;
      contactWrite({ op:"rename", email:from, to:to.trim() },
        from + " becomes " + to.trim() + " on all " + n + " box" + (n===1?"":"es") + ".");
    };
  });
}

function contactWrite(payload, plainEnglish){
  if(!confirm(plainEnglish + "\n\nThis edits the Master Box List. Go ahead?")) return;
  payload.action = "edit_contact";
  payload.key = KEY;
  jsonp(payload, function(data){
    if(!data || !data.ok){
      alert("Could not save: " + ((data && data.error) || "no reply from the sheet"));
      return;
    }
    var form = document.getElementById("cAddForm");
    if(form) form.innerHTML = "";
    state.cLoaded = false;
    load();
  });
}

/* Three independent fetches - the latest scan (so a box has a name and a
   hauler, not just a number), the company names, and the contact columns off
   the Master Box List. They do not depend on each other, so they are fired in
   PARALLEL and assembled once all three return; the page used to wait for them
   one after another, which is why it was slow to load. */
function load(){
  var got = {}, done = 0;
  function finish(){
    if(++done < 3) return;
    var rows = (got.scan && got.scan.rows) || [];
    state.rows = rows.map(function(r){
      return {
        id: String(parseInt(r["Box ID"], 10)),
        desc: String(r["Description"] || ""),
        haulCode: String(r["Haul Code"] || "").trim() || "\u2014"
      };
    });
    state.cNames = (got.names && got.names.names) || {};
    state.cRaw = (got.contacts && got.contacts.contacts) || {};
    state.cDir = buildDirectory(state.cRaw, state.rows);
    state.cLoaded = true;
    renderContactsAll();
  }
  jsonp({ action:"latest", key:KEY }, function(scan){ got.scan = scan; finish(); });
  jsonp({ action:"company_names", key:KEY }, function(cn){ got.names = cn; finish(); });
  jsonp({ action:"master_contacts", key:KEY }, function(data){ got.contacts = data; finish(); });
}

/* ---------- lock ----------
   Same as both dashboards: the key is whatever you type, kept in sessionStorage,
   and the SERVER decides whether it is right. Nothing is validated here. */
(function(){
  var lock    = document.getElementById("lock");
  var lockIn  = document.getElementById("lockIn");
  var lockBtn = document.getElementById("lockBtn");

  function unlock(){
    var v = (lockIn.value || "").trim();
    if(!v) return;
    try { sessionStorage.setItem("wastenet_dashboard_key", v); } catch(e){}
    KEY = v;
    lock.style.display = "none";
    document.getElementById("app").style.display = "";
    document.getElementById("lockErr").style.display = "none";
    load();
  }
  lockBtn.onclick = unlock;
  lockIn.onkeydown = function(e){ if(e.key === "Enter") unlock(); };

  if(KEY){
    lock.style.display = "none";
    document.getElementById("app").style.display = "";
    load();
  }
})();
</script>
