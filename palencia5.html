<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Yards to green</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;min-height:100dvh;display:flex;justify-content:center;background:#0b0f13;color:#eef1ee;font-family:Inter,system-ui,sans-serif}
  .frame{position:relative;width:100%;max-width:430px}
  img{display:block;width:100%;height:auto;cursor:crosshair}
  svg.ov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

  .pin{position:absolute;transform:translate(-50%,-50%);pointer-events:none}
  .pin .dot{width:15px;height:15px;border-radius:50%;background:#fff;border:3px solid #e0483a;
    box-shadow:0 0 0 6px rgba(224,72,58,.22),0 2px 6px rgba(0,0,0,.6)}

  .card{position:absolute;left:4%;top:33%;background:rgba(12,16,19,.8);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:9px 15px 8px;text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,.45);pointer-events:none}
  .card .n{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:50px;line-height:.88}
  .card .u{font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;font-size:11px;color:#9fb0bd;text-transform:uppercase}

  .tip{position:absolute;left:50%;top:8px;transform:translateX(-50%);background:rgba(12,16,19,.82);
    border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:7px 14px;font-size:12px;color:#cfe0d6;white-space:nowrap}
  .tip.gone{display:none}

  .bar{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(12,16,19,.86);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px}
  .st{display:flex;gap:8px;align-items:center;font-size:12px;color:#c7d2da;margin-bottom:10px}
  .fix{width:8px;height:8px;border-radius:50%;background:#e8863b;flex:none}
  .fix.live{background:#57c257;animation:ping 1.6s ease-out infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(87,194,87,.5)}100%{box-shadow:0 0 0 8px rgba(87,194,87,0)}}
  button{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
    font-size:15px;color:#0c1013;background:#57c257;border:none;border-radius:11px;padding:13px;cursor:pointer;width:100%}
  .row{display:flex;gap:7px;margin-top:8px}
  input{flex:1;min-width:0;background:#0e1216;border:1px solid #33404c;border-radius:8px;color:#eef1ee;padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:14px}
  input::placeholder{color:#5f6f7b}
  .ghost{background:#1a2027;color:#eef1ee;border:1px solid #33404c;font-size:13px;padding:9px}
  .hide{display:none}
  .toggle{background:none;border:none;color:#7d8d99;width:auto;padding:6px 0 0;font-size:11px;letter-spacing:1px;cursor:pointer}
</style>
</head>
<body>
<div class="frame" id="frame">
  <img id="img" alt="Golf hole aerial"/>
  <svg class="ov" viewBox="0 0 100 100" preserveAspectRatio="none">
    <line id="ld" x1="64" y1="21" x2="26" y2="37" stroke="#ffffff" stroke-width="1.6" stroke-dasharray="3 2.5" opacity="0.75" vector-effect="non-scaling-stroke"/>
  </svg>
  <div class="card"><div class="n" id="val">&mdash;</div><div class="u">yds to center</div></div>
  <div class="pin" id="pin" style="left:64%;top:21%"><div class="dot"></div></div>
  <div class="tip" id="tip">Tap the center of the green to set the pin</div>

  <div class="bar">
    <div class="st"><span class="fix" id="fix"></span><span id="msg">Set the pin, then tap Use my location</span></div>
    <button id="go">Use my location</button>
    <div class="row hide" id="testrow">
      <input id="lat" placeholder="test lat"/><input id="lng" placeholder="test lng"/>
      <button class="ghost" id="calc" style="width:auto">Go</button>
    </div>
    <button class="toggle" id="tt">Test from desk</button>
  </div>
</div>

const T={lat:30.014937949774136,lng:-81.37843920493921};
const R=6371000,YD=1.0936133;
function yards(a){const t=x=>x*Math.PI/180;
  const dLat=t(T.lat-a.lat),dLng=t(T.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(t(a.lat))*Math.cos(t(T.lat))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s))*YD;}

const img=document.getElementById('img'),pin=document.getElementById('pin'),ld=document.getElementById('ld'),tip=document.getElementById('tip');
function setPin(fx,fy){
  pin.style.left=fx+'%'; pin.style.top=fy+'%';
  ld.setAttribute('x1',fx); ld.setAttribute('y1',fy);   // leader starts at the pin
}
img.addEventListener('click',e=>{
  const r=img.getBoundingClientRect();
  const fx=((e.clientX-r.left)/r.width*100), fy=((e.clientY-r.top)/r.height*100);
  setPin(fx.toFixed(1),fy.toFixed(1)); tip.classList.add('gone');
});

const val=document.getElementById('val'),fix=document.getElementById('fix'),msg=document.getElementById('msg');
document.getElementById('go').onclick=()=>{
  if(!('geolocation' in navigator)){msg.textContent='No GPS here — use Test from desk.';return;}
  msg.textContent='Locating…';
  navigator.geolocation.watchPosition(p=>{
    val.textContent=Math.round(yards({lat:p.coords.latitude,lng:p.coords.longitude}));
    fix.classList.add('live');
    msg.innerHTML='Live GPS &middot; \u00b1'+Math.round((p.coords.accuracy||0)*YD)+' yds';
  },e=>{fix.classList.remove('live');
    msg.textContent='GPS blocked ('+e.message+'). Open in Safari/Chrome, or use Test from desk.';
  },{enableHighAccuracy:true,maximumAge:1000,timeout:12000});
};
document.getElementById('tt').onclick=()=>document.getElementById('testrow').classList.toggle('hide');
document.getElementById('calc').onclick=()=>{
  const a={lat:parseFloat(lat.value),lng:parseFloat(lng.value)};
  if(isNaN(a.lat)||isNaN(a.lng)){msg.textContent='Type a valid lat and lng.';return;}
  val.textContent=Math.round(yards(a));fix.classList.remove('live');msg.textContent='Computed from typed spot.';
};
